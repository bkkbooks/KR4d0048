front:
  text: 陳眉公先生訂正丹淵集卷拾遺下
  hash: sha256:cac4dd97f3b8d573537600c639df70e46996e4eac1ce694f60e15dead25ad1b8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_043-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳吳一標建先雜著移蒲江縣學諸生文人旣生其五常之美巳潜牙于其中渾渾融融冥漫晦䨴而罔克自章從之師所道有法駸駸焉適柔良粹厚之區會眞參元而爲正人端士矣反此固隔蔽其素所有也去而名嵬瑣兇桀叢然于天地間口鼻耳目眉齒鬚髪徒人耳亡他繇始習之是與否巳諸生資朴淳茂歷監之咸可彫飾繪畫以爲令器今旣學于元防當進退勿怠以充溢乎所以願來之意元防貯儲其深而宏予昔與之游備識之且不敢以誣諸生諸生宜修心治身趨敎嚮誼毋甘浮淫毋生夸驕毋輕語議毋妄施設毋尚䙝狎毋念荒逸毋聽䜛嫉毋起怨背則諸生於謀巳也甚善予亦重諸生習之是必見諸生爲正人端士矣恭之哉時皇祐四年二月七日書卭州天慶觀希夷先生詩後希夷先生陳摶字圖南後晉天福中來遊蜀聞是州天師觀都威儀何昌一有道術善鎻鼻息飛精漠然一就枕輙越月始寤遂留此學卒能行之後歸關中所修益高蛻老而嬰動如神人太宗朝甞召入對問俞旨賜詩與號放居華山章靈暴奇乆乃解去逮今海內愚耋蚩稚具齒舌者灼灼能道先生之所爲先生本儒人旣繇虛無凢作謌詩皆擺落世故披聾劀盲蹊穴易知毎一篇墜塵中雖市人亦誦誦不休謂眞關秘區若可自到當時有贈昌一者親墨殿楹上後人巳恐渝樠刻之歷祀多自丁酉訖今實一百一十四年也苔塗埃昏藏隱晦黒積政不問皇祐庚寅歲郡將博陵崔公制治之明年廷事簡休恬於放奇考志得此卽徃臨視讀巳歎云此非遠形外器者言耶解名纓脫利拲扶人于夷曠之鉅逵爾達者所存深如是哉惜其陊腐不能乆傅寓於石其幾乎乃求摸之顧謂其幕中文同曰子可作系䟽其繇俾來者知所以然因而護持貤于亡窮亦我曹謀也同唯唯謹執筆願書其觕屬之末且拜公之所趣特高乎閡善而勿通者萬萬矣中元日書重序九臯集大邑缺令余以郡從事來攝其治旣至樂其少訟而多暇獨未見有過從可延之與語議者問左右皆言静林有老僧曰惟巳戒業甚高凢士大夫之賢與其徒之名者多與之游無不謌詠以道其爲人在里閭一切皆歸尊之不敢怠此疑可以當君子之求訪者遂召來果與它浮圖者異狀貌秀徤襟宇恢擴辯論博給根固基厚信釋氏之門景星慶雲爾余大喜明日詣其所居一室寥然遠介江上幽澹虛潔整整可愛視其壁有畫儒者像榜云長秋山人胡昭甫字惟岳眞者旁有賛乃巳師之辭講胡之美尤盛問之曰此巳師師也當僣孟朝渠爲進士有詩名于時不第巳師得學四聲於其門下今不幸而其嗣泯絕巳師旣荷其敎誘竊懼其爲鬼而死所食處故圖之庶朝夕得以瞻慕而歲時得以獻享也余聞之益重其所存因而歎曰夫世之具儒衣冠而把吾孔氏之書卷者過耳歷目莫非皆仁義之說及於其所事師一反面不復更名之者多矣況肯有䘏其沒後者耶巳師乃學佛者斷念割愛實曰其事今反能如此宜乎吾心之信確確而愈堅因索其詩得七百首携歸諷誦累日温純謹愿含蓄意思誠鍾磬塤箎之雅韻鸞鳳虎豹之奇采其春容彪炳不假於他而一岀于自然矣余固願爲之序使行于世期覽之者知巳師不獨號方𫀆而能爲辭章亦著其行義磊砢魁特而絕出于衆人爾巳師字亞休姓仇氏識余時年七十五歲云皇祐癸巳下元夜三更杳杳堂書此序崇壽禪師塔銘禪師俗姓仇氏名惟巳字亞休卭州蒲頓人自趣尚便高遠不與鄰里諸兒同嬉戲惟是聞作佛事則汛灑供獻恭勤精愿不敕之而自率常恐若不能如法者父母異之乃俾隷大邑静林僧籍以仁普爲師年十六遂落髪二十受具戒來成都太慈寺聽講大乘諸經盡通曉奥義後七年還舊居其所止悉荒落不治但腐椽破壁欹邪罅漏陳屋數間而巳師恬然安一榻處其中無厭色鄕人有胡昭甫惟岳者高世之士善吟詩其最深處雖唐人蓋亦有未能到者師師之入室矣師甞以詩見邑宰秘書丞滕喬喬一讀重之來謝師見庭廡壞裂殆不可坐起倡邑人爲修之未幾臺殿樓觀一一完具師之德業自此愈遠聞閭里之人皆欽嚮之師是後不復他出掃静室據古几宴坐一食遇物感興時亦作詩其句度夷澹淸粹不若其徒之所爲者與人語和輭未嘗輙迕人出入縣中六十年亦未嘗以愛惡置利害於其間衆皆稱之師素堅强少疾狀貌修偉慈恕温裕縣人無長少咸願見之見必拜伏欣喜丁寧留連師誨諭慰滿而後去一日忽召其弟子在前且曰人旣生理當有死死常事非異事吾無死生且乆矣汝等當體吾之所以無死生者愼勿戚戚如衆人乃不累吾今日之所咐囑爾慕安等泣曰師胡爲是言有何所緣耶師曰吾之神光一道去矣留此無數刻汝當奉吾所戒曰惡不宜爲善不宜失語巳攝足趺坐疊手瞑目而逝摇挽不動嶷如塑刻享年八十六治平元年十月二十三日也遠近緇素來赴哭者殆千人衆謂宜以師之眞身建蘇塗而扄藏之使來者觀相起善芟去三毒回面正法不墮惡道亦師之不言之敎也慕安等遂從其謀風神凝然愈乆不壊見者謹畏如侍諸側余徃年嘗居郡幕識師甚熟後復來權州事師則巳化矣歸日枉道過邑詣師塔下旋遶瞻禮悲悼歎息雖然師之面目如生而師之語言已不聞矣嗚呼熈寧五年余知陵州師之孫慕眞來詣余求文以銘師之塔余昔旣聞道於師也辭將云何乃銘之曰是身如浮雲倐生而忽滅形質本何有聚散俱爲幻夫人而昧此演起無量法從一十百千乃至萬億兆譬如蚕吐絲纒縳身自獄旣倮而復羽孳種無由斷出此而入彼輪廻豈知覺師有大智鏡初誰爲磨拂光明發虛空浄無一塵染大曜滿法界欲照誰能執收歛付諸匣乃是所假者示現干世人師以願力故師之所非相眞實不思議凢所見聞者依以爲漸入由此登佛地其則固不遠書以告諸後咸願起正信䊸竹記䊸竹生于陵陽守居之北崖其始共本以出去土未幾而遽分其三裁三尺倮然無他枝乃枿蓋其顚未脫籜時蝎害之使然爾其一旣獨盛將挺起爲垂巖所軋力不得競乃求虛以伸所趣觝礙無所容屈已自保生意愈艱蟠空繚隙拳局以進伏碻磝蔽蓊薉曾莫知其歷寒暑之何許也余采藥過其下見之命聱齾二童奴撥荒榛除腐蔓扶起而支持之則巳堅彊偃蹇宛骫附地若不欲使人加哀憐於其不得遂諸生理者然觀具抱節也剛潔而隆高其布葉也瘦㾪而修長是所謂戰風日傲冰霜凌突四時磨轢萬草之奇植也余歎視良乆聱者進而言曰是將以瑞而名之可乎曰瑞生于人所易見俾得以致之此獨處窮僻非瑞也齾者進而言曰是將以怪而名之可乎曰怪起於不常有物體自効以見駭於世此因地而然非怪也然則何名而可曰天之生物槩授以生其各有所得失之者莫不常繫乎其所託竹之爲物乃草水之中甚賢者今此不幸不得其地以完其生上蔽旁閼不使自通遂至於質狀如此然其天之所與雖不能奮迅條達以盡其性而其所得短長巨細之分當亦緣理而浸長之故其氣不能暢茂於其內而其勢所以促蹙於其外也且其所以若是者夫豈得巳哉今也就其所以不得巳者而名之曰䊸庶使後之人知其得名之由以不得巳而取之也於是聱齾並進而言曰公名之旣聞命矣公平居常好戲爲此者盍摹之以示於人乎余許之使聱者裂素齾者漬墨淸暁上平雲閣爲濡毫而揮灑之自卯至辰而就乃言此題其下熈寧壬子孟冬辛丑與可記丹淵集卷拾遺下終
