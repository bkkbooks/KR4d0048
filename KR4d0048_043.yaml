front:
  text: 陳眉公先生訂正丹淵集卷拾遺下
  hash: sha256:cac4dd97f3b8d573537600c639df70e46996e4eac1ce694f60e15dead25ad1b8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_043-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同參吳吳一標建先雜著移蒲江縣學諸生文人既生其五常之美巳潛牙于其中渾渾融融冥漫晦䨴而罔克自章從之師所道有法駸駸焉適柔良粹厚之區會真參元而為正人端士矣反此固隔蔽其素所有也去而名嵬瑣凶桀叢然于天地間口鼻耳目眉齒鬚髮徒人耳亡他繇始習之是與否巳諸生資朴淳茂歷監之咸可雕飾繪畫以為令器今既學于元防當進退勿怠以充溢乎所以願來之意元防貯儲其深而宏豫昔與之遊備識之且不敢以誣諸生諸生宜修心治身趨教嚮誼毋甘浮淫毋生夸驕毋輕語議毋妄施設毋尚褻狎毋念荒逸毋聽讒嫉毋起怨背則諸生於謀巳也甚善豫亦重諸生習之是必見諸生為正人端士矣恭之哉時皇祐四年二月七日書卭州天慶觀希夷先生詩後希夷先生陳摶字圖南後晉天福中來遊蜀聞是州天師觀都威儀何昌一有道術善鎖鼻息飛精漠然一就枕輒越月始寤遂留此學卒能行之後歸關中所修益高蛻老而嬰動如神人太宗朝嘗召入對問俞旨賜詩與號放居華山章靈暴奇久乃解去逮今海內愚耋蚩稚具齒舌者灼灼能道先生之所為先生本儒人既繇虛無凡作歌詩皆擺落世故披聾劀盲蹊穴易知每一篇墜塵中雖市人亦誦誦不休謂真關祕區若可自到當時有贈昌一者親墨殿楹上後人巳恐渝樠刻之歷祀多自丁酉訖今實一百一十四年也苔塗埃昏藏隱晦黑積政不問皇祐庚寅歲郡將博陵崔公制治之明年廷事簡休恬於放奇考志得此即往臨視讀巳歎云此非遠形外器者言耶解名纓脫利拲扶人于夷曠之巨逵爾達者所存深如是哉惜其陊腐不能久傅寓於石其幾乎乃求摸之顧謂其幕中文同曰子可作系疏其繇俾來者知所以然因而護持貤于亡窮亦我曹謀也同唯唯謹執筆願書其粗屬之末且拜公之所趣特高乎閡善而勿通者萬萬矣中元日書重序九臯集大邑缺令余以郡從事來攝其治既至樂其少訟而多暇獨未見有過從可延之與語議者問左右皆言靜林有老僧曰惟巳戒業甚高凡士大夫之賢與其徒之名者多與之遊無不歌詠以道其為人在里閭一切皆歸尊之不敢怠此疑可以當君子之求訪者遂召來果與它浮圖者異狀貌秀健襟宇恢擴辨論博給根固基厚信釋氏之門景星慶雲爾余大喜明日詣其所居一室寥然遠介江上幽淡虛潔整整可愛視其壁有畫儒者像榜云長秋山人胡昭甫字惟嶽真者旁有贊乃巳師之辭講胡之美尤盛問之曰此巳師師也當僣孟朝渠為進士有詩名于時不第巳師得學四聲於其門下今不幸而其嗣泯絶巳師既荷其教誘竊懼其為鬼而死所食處故圖之庶朝夕得以瞻慕而歲時得以獻享也余聞之益重其所存因而歎曰夫世之具儒衣冠而把吾孔氏之書卷者過耳歷目莫非皆仁義之説及於其所事師一反面不復更名之者多矣況肯有恤其沒後者耶巳師乃學佛者斷念割愛實曰其事今反能如此宜乎吾心之信確確而愈堅因索其詩得七百首携歸諷誦纍日溫純謹願含蓄意思誠鍾磬塤箎之雅韻鸞鳳虎豹之奇采其春容彪炳不假於他而一出于自然矣余固願為之序使行于世期覽之者知巳師不獨號方𫀆而能為辭章亦著其行義磊砢魁特而絶出于衆人爾巳師字亞休姓仇氏識余時年七十五歲云皇祐癸巳下元夜三更杳杳堂書此序崇壽禪師塔銘禪師俗姓仇氏名惟巳字亞休卭州蒲頓人自趣尚便高遠不與鄰里諸兒同嬉戲惟是聞作佛事則汛灑供獻恭勤精願不敕之而自率常恐若不能如法者父母異之乃俾隸大邑靜林僧籍以仁普為師年十六遂落髮二十受具戒來成都太慈寺聽講大乘諸經盡通曉奧義後七年還舊居其所止悉荒落不治但腐椽破壁欹邪罅漏陳屋數間而巳師恬然安一榻處其中無厭色鄉人有胡昭甫惟嶽者高世之士善吟詩其最深處雖唐人蓋亦有未能到者師師之入室矣師嘗以詩見邑宰祕書丞滕喬喬一讀重之來謝師見庭廡壞裂殆不可坐起倡邑人為修之未幾臺殿樓觀一一完具師之德業自此愈遠聞閭里之人皆欽嚮之師是後不復他出掃靜室據古几宴坐一食遇物感興時亦作詩其句度夷淡淸粹不若其徒之所為者與人語和軟未嘗輒忤人出入縣中六十年亦未嘗以愛惡置利害於其間衆皆稱之師素堅強少疾狀貌修偉慈恕溫裕縣人無長少咸願見之見必拜伏欣喜丁寧留連師誨諭慰滿而後去一日忽召其弟子在前且曰人既生理當有死死常事非異事吾無死生且久矣汝等當體吾之所以無死生者愼勿戚戚如衆人乃不纍吾今日之所咐囑爾慕安等泣曰師胡為是言有何所緣耶師曰吾之神光一道去矣留此無數刻汝當奉吾所戒曰惡不宜為善不宜失語巳攝足趺坐疊手瞑目而逝搖挽不動嶷如塑刻享年八十六治平元年十月二十三日也遠近緇素來赴哭者殆千人衆謂宜以師之真身建蘇塗而扄藏之使來者觀相起善芟去三毒回面正法不墮惡道亦師之不言之教也慕安等遂從其謀風神凝然愈久不壞見者謹畏如侍諸側余往年嘗居郡幕識師甚熟後復來權州事師則巳化矣歸日枉道過邑詣師塔下旋繞瞻禮悲悼歎息雖然師之面目如生而師之語言已不聞矣嗚呼熙寧五年余知陵州師之孫慕真來詣余求文以銘師之塔余昔既聞道於師也辭將云何乃銘之曰是身如浮雲倐生而忽滅形質本何有聚散俱為幻夫人而昧此演起無量法從一十百千乃至萬億兆譬如蠶吐絲纒縳身自獄既倮而復羽孳種無由斷出此而入彼輪回豈知覺師有大智鏡初誰為磨拂光明發虛空淨無一塵染大曜滿法界欲照誰能執收斂付諸匣乃是所假者示現干世人師以願力故師之所非相真實不思議凡所見聞者依以為漸入由此登佛地其則固不遠書以告諸後咸願起正信紆竹記紆竹生于陵陽守居之北崖其始共本以出去土未幾而遽分其三裁三尺倮然無他枝乃枿蓋其顚未脫籜時蝎害之使然爾其一既獨盛將挺起為垂巖所軋力不得競乃求虛以伸所趣抵礙無所容屈已自保生意愈艱蟠空繚隙拳局以進伏碻磝蔽蓊薉曾莫知其歷寒暑之何許也余采藥過其下見之命聱齾二童奴撥荒榛除腐蔓扶起而支持之則巳堅強偃蹇宛骫附地若不欲使人加哀憐於其不得遂諸生理者然觀具抱節也剛潔而隆高其布葉也瘦㾪而修長是所謂戰風日傲冰霜凌突四時磨轢萬草之奇植也余歎視良久聱者進而言曰是將以瑞而名之可乎曰瑞生于人所易見俾得以致之此獨處窮僻非瑞也齾者進而言曰是將以怪而名之可乎曰怪起於不常有物體自效以見駭於世此因地而然非怪也然則何名而可曰天之生物槩授以生其各有所得失之者莫不常繫乎其所託竹之為物乃草水之中甚賢者今此不幸不得其地以完其生上蔽旁閼不使自通遂至於質狀如此然其天之所與雖不能奮迅條達以盡其性而其所得短長巨細之分當亦緣理而浸長之故其氣不能暢茂於其內而其勢所以促蹙於其外也且其所以若是者夫豈得巳哉今也就其所以不得巳者而名之曰紆庶使後之人知其得名之由以不得巳而取之也於是聱齾並進而言曰公名之既聞命矣公平居常好戲為此者盍摹之以示於人乎余許之使聱者裂素齾者漬墨淸曉上平雲閣為濡毫而揮灑之自卯至辰而就乃言此題其下熙寧壬子孟冬辛丑與可記丹淵集卷拾遺下終
