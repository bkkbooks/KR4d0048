front:
  text: 陳眉公先生訂正丹淵集卷三
  hash: sha256:878f45e66f80dfbe8ffb1bd7ae630e67caf975c03dcfd9e33d775fac1c351539
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_003-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同參吳吳一標建先詩五十七首貴侯行將軍功勳滿旗常昨日賜對開明光腰懸槖馱紫金鈕爵號進拜諸侯王戟衣翩翩弄春影大第高門臨萬井但願囊書絶邊警常官中都奉朝請朱櫻歌金衣珍禽弄深樾禁蘌朱櫻斑若纈上幸離宮促薦新藤藍寶籠貂璫發凝霞作丸珠尚軟油露成津蜜𥘉割君王日午坐猗蘭翡翠一盤紅靺鞨拾羽曲新羅砑紅裙褶齊綵縷刺衫花倒提新晴暖日麗煙草金獸齧鎖藏春閨朱橋逼江曉沙白錦帶交風大堤窄蘭洲遺翎得殘碧歸來驚飛上嬌額沙堤行金吾馳騎東復西督兵萬指平沙堤傳言築路拜新相恐與九衢同一泥夜來上在蓬箂宿手寫姓名符夢卜連詔黃門下北扉趣草贊辭登力牧平明劒珮羅東閣大字滿行書德業謁者長言告紫宸感召一庭和氣合上心喜曰豫良弼未謝急宣令直筆群吏迎歸政事堂指顧之間歌畫一午漏𥘉移催入馬寶帶盤腰印垂胯歸來冠蓋爛盈門異口同音賀太平五原行雲蕭蕭草搖搖風吹黃沙昏沉寥胡兒滿窟臥寒日卓旗繫馬人一匹夜來烽火連篝起銀鶻呼兵捷如鬼齊集弓刀上隴行犬譟狐嘷繞空壘羌人鈔暴為常事見敵不爭收若雨自高聲勢敘邊功歲歲年年皆一同將軍玩冦五原上朝廷不知但推賞讀武紀嗟哉徹之有天下甘心神仙希羽化五十餘丈起樓觀萬八千里走車駕安期羡門竟何在五利文成終死詐若非留意尚文學嬴政且賢非爾亞題東嵓隱者壁青峰叢叢擁危壑緑樹團團扶曲閣幽人睡起漱寒泉坐看一林山雨落岩前火氣雜芝术澗下苔痕亂猿鶴自憐塵土滿衣衫欲解從君今尚莫東山亭朝陽之峰乃天設曲嶺長岡地盤結下臨絶澗走縈回上聳巍亭飛􅏭嵲晚雲幾處水墨畫秋樹數畨紅緑纈安能恰會此時間靜與詩翁吟曉雪水邊春半芹牙差差蘭笋短石渠氷銷水色淺倡情冶思不可奈好鳥間關花婉娩鮮衫翠裾者誰氏行歌楊枝惜時晚臨流有客抱危膝苦調長謡問誰遣採藥歸晚因宿野人山舍東岩隂深崖巘古夾澗垂泉結鵝乳我來採藥晚忘歸試宿荆扉問雞黍春風滿林燈火冷一夜不眠山月苦平明携策下青蒼松葉紛紛灑新雨後溪晚步隂隂芳樹暗回堤路入蒙籠轉野溪澤雉應媒高復下林鴉引子歇還啼青蒲宛宛全淹水紫笋斑斑半出泥倚杖風前感時節亂煙斜日一蟬嘶山中新晴山中新晴曉煙暖散帶頽冠漱岩畔海鹽未去猿鶴喜柴桑𥘉歸松菊亂林間餘雨時一滴嶺上飛雲忽雙斷安能舉手恣扶搖欲共高鴻拂霄漢鹽亭縣永樂山叩雲亭長江合高峰爽氣左右繞中流望絶巘萬丈見木杪孤亭揭其上隱隱一拳小李君令兹邑邀我升縹眇是時天宇淨晴色洗霜曉萬象滿四隅轉盻皆可了神淸壓塵坌志適喜猿鳥人生貴軒豁世務苦紛擾兹焉獲登覽浩思欲飛矯令謂亭我為勝絶此應少願子立佳號光輝飾松蔦因名之叩雲大字榜霞表杜逸人歸龍山上亭北望二百里頽巘墮壑圍龍山余嘗往來見之喜飮食夢寐皆孱顔恨無羽翼一飛到羡子長往不欲還安得擺手掉世故相與傲兀於其間曉入東谷振纓效王官釋耒去鄉縣十年始還此景物覺盡變東谷素所愛乍到若創見煙雲引晨䇿數里入蔥蒨明霞照溪口花草露初泫長松盤高岡竦竦擢秀幹垂隂雜群木上欲接霄漢柔羅互鈎鎖攬地走荒蔓修篁揭其間萬個挺若箭登臨愴舊歷眺聽恱新玩讀書破茅蘆徑彴已漂斷唯餘舍南水尚吐石竇濺潺潺落危壑衮衮引飛練臨流濯塵襟照影實覿靣功名竟何所旅迹轉孤賤引手謝猿鶴深慙爾驚怨東谷沿小澗樹木叢蔚中有圓潭愛之久坐書所見野水㵼古穴石岸盤回淵飛塵不可入竹樹圍清漣靜往得勝玩深居逃俗緣寒光照煩襟景寂心自圓枯篁蹲碧禽垂頸窺沉鮮對之不敢動相望兩俱禪東谷茅齋野徑轉深密靜無車馬痕松花金粉墮苔葉翠茸翻蟲鳥春音雜煙雲晚色昏俗塵何處入長是掩溪門夏樹夏樹始繁密條縷方且柔左右覆吾廬合如張碧油新蟬噪晴午餘響藏深幽軒窗轉炎日淸影為我留蚊蚋亦取庇閙若春雨稠拂揮不停手咀嚼胡爾讎何當薰風來一與掃蕩收吾將就高蔭濯足臨寒流田舍園林曉氣清籬巷夕陽明石竇聞寒碓煙坡見晚耕豚蹄供禱賽龜殼問隂晴欲識豐年樂一村雞犬聲高槐高槐夾前除合蔭卷若洞交柯載宿雨壓地翠色重青蟲暖自挂黃鳥晴輒哢枕簟傲炎風為君高興動春閨枕帶縈春思窗紗漏曉光蠨蛸傷遠别鶗鴂感流芳粧匣蒸殘粉薰爐試舊香洞房燈燭外只有夢悠揚採桑溪橋接桑畦鈎籠曉群過今朝去何早向晚蠶恐臥家家五十日誰敢一日墮未言給私用日以應官課青城山丈人觀群峰垂碧光下擁岷仙家神皇被金巾坐領五帝衙威靈攝真境俗語不敢譁精心叩殊庭俯首仰紫華願言鳳羅盟畢世驅塵邪循奉蘂珠戒期之飛太霞上青宮瓊臺橫紫霄上有縹眇居雲霞抱窗戶日月循庭除飛羽下金輦隱芝吟玉書俯首視人間人間臭如帤張少愚書院澗水侵斷橋車馬不得通飛嵐積庭礎秋蘚垂紫茸窗𥿄爛溪雨簾衣拆林風主人殊未歸使我煙景空誓鬼碑正一受天籙腰垂神虎章群魔獄幽隱祕篆刻青蒼故事駭前志餘威驚大荒誰能識奧訣禹步學魁罡天師栗天師携此種至自上饒遠當時十七樹高幹倚孤巘蒼蓬蒺藜大紫殼檳榔軟蜀部名果中推之為上選孫知微畫太古竒偉士精思獨於畫馳心入茫昧萬物赴揮灑當時一名重顧陸非爾亞卓哉青城筆妙絶冠天下寥寥九天仗一一若神寫吾恐千載後是終無繼者早晴至報恩山寺山石巉巉磴道微拂松穿竹露沾衣煙開遠水雙鷗落日照高林一雉飛大麥未收治圃晚小𧖟猶臥斫桑稀暮煙巳合牛羊下信馬林間步月歸楊山人歸綿竹一别江梅十度花相逢重為講胡麻火鈴未降真君宅金鈕曾盟太帝家道氣滿簪凝緑髮神光飛鼎護黃芽青騾不肯留歸馭又入無為咽曉霞間遣庭竹擁高叢移床就好風掩門休務外隱几坐忘中世事元何物人心了即空客來休借問此意浩無窮睡起寥寥公館靜門掩似山家竹簟屢移枕石盤頻浸花間多新得䇿事少早休衙一覺高春睡誰來伴試茶梅寒梅引舊枝映竹復臨池朵露深開處香聞瞥過時凌兢侵臘雪散漫入春詩贈我歲寒色憐君冰玉姿永泰劉令淸曦亭木杪照𥘉日捲簾知曉晴軒窗無限思圖史有餘清露下濛花重風來泛竹輕何須嫌五斗持此謝淵明貧居繩床擁敝裯𥘉起髮未櫛南窗展書卷就暖讀寒日門前絶車馬薄暮垂片席短墻挂纎蔓幽鳥啄紅實群蝸惡積雨繚繞篆空壁男兒處貧賤舉首宇宙窄翩翻槍榆鳩宛轉匿絮蝨妻孥競相笑憔悴守文筆惜花胡蜂採花花氣薄黃鳥啄花花蘂落林風吹花花片亂池水浸花花色惡少年惜花會花意晴張青幃雨油幕勸君直須為花飮明日春歸空晚蕚正女吟身外無一簮何以供鉛華飾行不飾容濁水白藕花藕心亂如絲妾心圓如珠絲亂端緒多珠圓瑕纇無焉得偶君子奉之此高節所生雖至親此意安可説莫折花莫折花花好亦自喜勿謂花無言請以君心酌花意君容待花轉豐艷花枝因君愈憔悴莫折花任花飛地但對春風倚芳樹長遣香英伴君醉織婦怨擲梭兩手倦踏籋雙足趼三日不住織一匹才可剪織處畏風日剪時謹刀尺皆言邊幅好自愛經緯密昨朝持入庫何事監官怒大字雕印文濃和油墨汚父母抱歸舍拋向中門下相看各無語淚迸若傾瀉質錢解衣服買絲添上軸不敢輒下機連宵停火燭當須了租賦豈暇恤𥜗袴前知寒切骨甘心肩骭露里胥踞門限呌罵嗔納晚安得織婦心變作監官眼野花歎昨看百草抽新芽今看百草開新花岩隈水側自成列紅醜紫賤何交加東皇施恩豈不溥隨所付受無少差爾之瑣細亦蒙被盡使奮發爭春華織叢密蔓不可數競起塗抹如矜誇妖鶯冶蝶不爾顧去爾自欲尋名葩爾知有艷貴爾否歌管匝樹侯王家爾徒此地弄顔色只自狼籍隨泥沙何當照水自窺覽枝報葉懼相藏遮晚村無限曬殘日索酒為爾成吁嗟均逸亭普州三亭亭宇跨城端新苔磴道盤風光晴水石煙景暮林巒薄領仍多暇賔從每盡歡何由掉塵鞅聊問借闌干東溪亭短彴逶迤渡高櫩夭矯沉波光環堵淨日色綵梁深萍荇翻金鯽蘭苕超翠禽主人公事簡時此照清襟碧崖亭斷巘淥溪邊危亭翠壁前軒窗誰是客詩酒自稱仙遠壑春藏雨長波晝起煙吏人休報事高興正陶然送郭經知縣促促送歸客短亭垂柳風離樽掩殘日去騎若輕蓬百里謳歌內三年畏謹中鄉人問蜀物笑指一囊空過祿氏山齋過水得慿檻滿川皆夕陽江山逢勝絶手筆恨荒唐城郭蒙籠近汀洲杳靄長明朝又東去塵土入衣裳題李處士月軒圓蟾噴金波萬里灑清滴幽軒得虛敞皓彩溢素壁繩床有高隱苦調起岑寂盈襟納孤光靜與爽氣敵余過興州太守朝侯延之於東池晴碧亭且道其所以為此池亭之意使余賦詩鄭谷題詩處荒涼不復知使君來問日景物欲歸時崖巘供淸溜亭臺繞翠漪主人憐過客借與傲炎曦蒲氏别墅十詠風交蒲葦亂煙斷鳬鶩飛日暮一笛起扁舟垂釣歸右方湖軒窗曉吹清枕簟晴光冷亭上逍遙人滿身搖水影右涵碧亭逼簾呈素艷入座薦清香何以陪暑飮對之飛玉觴右白蓮堂曉靄滋花色晴輝發水光何人露新纈不管著秋霜右芙蓉溪積水自淵淵來源常汨汨岸上翠衣禽對人時一沒右魚池紫蓋嫩貼水玉梢長刺沙避風紅出沒驚雨緑交加右蓮池溪光搖玉壁雲影漏金盤誰此伴高興畫橋慿曲欄右清蟾橋決水轉橫渠交塍畫方罫秋風報秋熟滿頃吹罷亞右稻畦高臺按虛境飛駕羅太空小兆佩神虎每來清夜中右朝真堂深深鄭真谷小小焦光廬借問貯何物滿床皆隱書右草庵丹淵集卷第三終
