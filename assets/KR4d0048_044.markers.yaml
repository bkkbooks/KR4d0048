  - {type: variant, offset: 676, length: 4, content: 二月二十, WYG: 亦未嘗以愛惡置利害於其間衆皆稱之師素堅強少疾狀貌修偉慈恕温裕縣人無長少咸願見之見必拜伏欣喜丁寧留連師誨諭慰滿而後去}
  - {type: variant, offset: 682, length: 6, content: 太守竇平立石, WYG: 忽召其弟子在前且曰人既生理當有死死常事非異事吾無死生且久矣汝等當體吾之所以無死生者慎勿戚戚如衆人乃}
