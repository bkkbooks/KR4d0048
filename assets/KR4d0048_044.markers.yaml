  - {type: variant, offset: 351, length: 15, content: 縣東三十里有忠孝寺柱間有紀行云, WYG: 其㡬乎乃求摸之顧謂其幕中文同曰子可作系疏其繇俾來者知所以然因而䕶持貤於亡窮亦我曹謀也同唯唯謹執筆願書其觕屬之末且拜公之所趣特高乎閡善而勿通者萬萬矣中元日書重序九臯集大邑缺令余以}
