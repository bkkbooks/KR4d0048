  - {type: variant, offset: 651, length: 1, content: 今, WYG: 但腐椽破壁欹邪罅漏陳屋數間而已師恬然安一榻處其中無厭色鄉人有胡昭甫惟岳者高世之士善吟詩其最深處雖唐人盖亦有未能到者師師之入室矣師嘗以詩見邑宰秘書丞滕喬喬一讀重之來謝師見庭廡壞裂殆不可坐起倡邑人為修之木幾臺殿樓觀一一完具師之徳業自此愈逺聞閭里之人皆欽嚮之師是後}
  - {type: page-break, offset: 651, content: '', id: KR4d0048_WYG_042-5b, image: WYG1096/WYG1096-0806d.png}
  - {type: variant, offset: 654, length: 9, content: 存矣然先生有賞豐亭, WYG: 他出掃静室據古几宴坐一食遇物感興時亦作}
  - {type: variant, offset: 664, length: 11, content: 刻在今郡圃豐榭乃皇祐五, WYG: 其句度夷澹清粹不若其徒之所為者與人語和輭未嘗輒迕人出入縣中六十}
