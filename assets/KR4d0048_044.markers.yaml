  - {type: variant, offset: 1337, length: 356, content: 年辛丑是歲先生倅卭州按墨林碑先生親筆云嘉祐辛丑來倅郡又作嘉州平羗縣夫子廟記云道士李有慶過卭訪余五月十日記又作成都楞嚴院畫六祖記後云予自秘閣校理乞侍親得相於臨卭郡嘉祐六年辛丑五月十五日東園芳洲亭書東園卽今倅㕔之圃也郡圃在西故以東别之同日又作鳯凰山新禪院記鳯凰屬卭之大邑縣思安鎭然按先生墓誌云通判卭州至未幾丁都官公憂則知先生是年必以憂去先生後通判漢州謝成都端明啓云向嘗遂外官之請尋用持先子之憂一居家山四改歲序蓋自是至治平二年公赴漢州四年矣七年壬寅是歲先生居憂在鄕按先生家集有作卭州永福院新修桂華閣記後云壬寅六月十日記必在家時作也今碑巳不復存不可考矣八年癸卯是歲先生居憂在鄕按先生作梓州處士張希澤墓誌云治平改元正月以疾終於家希澤初得疾余持服里居考希澤得疾之初必是年也又按先生作費先生詩集序亦稱嘉祐癸卯東平先生以詩爲示云, WYG: ''}
