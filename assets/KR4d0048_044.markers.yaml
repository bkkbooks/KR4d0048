  - {type: variant, offset: 5, length: 9, content: 譜曲沃家誠之冝父編, WYG: 相思惟是誦嘉篇因來守郡空山裏又喜通名畫㦸前抵掌劇談猶矍鑠堆胷豪氣尚蜿延近聞買得鵝池住且向人間作地仙和陳基載重陽日文酒尋常不厭求坐中須得賈長頭幸逢九日稱佳節宜對三嵎賞素秋歲月但看随葉落利名當信與雲浮憑君且學龍川飲一醉能令萬事休寄張郎中常媿無才動有權十年鄉里但留連養成答颯人應笑學得支離自謂賢三館舊逰層漢上一麾今守亂峯前幸逢别駕如張軌免對蘓章説二}
