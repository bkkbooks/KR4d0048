  - {type: variant, offset: 3432, length: 416, content: 年十箇月因改州爲監復蒙就差知興元府今到任巳及一年五箇月替期非遠切慮差官代臣赴闕乞再差知洋州一次奏當作於此時八年乙卯是歲先生在興元按先生作送張益孺學士知嘉州序後有云朝中士大夫以詩餞之視事之明日卽走書興元求余爲序熈寧八年上元甚美堂書堂必興元之府治也又作靈夢記云興元府唐安寺戒壇院六臂大悲觀世音菩薩者乃通判軍府事太子中舎盧洪徽之之夫人長安縣君朱氏之全節也後云熈寧八年歲次乙卯二月十五日丁丑記又按先生將赴洋州書東谷舊隱詩其間云昨從漢中歸於此度炎燠還當武康去就養若雞鶩又作夏日墨君堂詩云先人有弊廬涪水之東邊我罷漢中守歸此聊息焉是時五六月赤日烘遥天又云行將佩守符復爾趍洋川又種榆詩序云熈寧辛亥春予自京師赴陵州過家省墳墓見所居長衢比戶競取榆栽列植官道後移興元滿替復歸待洋州闕始四年爾而榆巳高大䌓茂深宻可愛予正得此過一夏蒙庇厚矣詩盖作於是年之夏意公歸鄕度夏方赴洋州耳九年丙辰是歲先生在洋州按先生題魯肅簡公尺牘後云熈寧九年丙辰七月癸酉洋州守居灙泉亭記, WYG: 百三}
