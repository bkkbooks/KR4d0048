  - {type: variant, offset: 369, length: 3, content: 文同䣢, WYG: 來攝其治既至樂其少訟而多暇獨未見有過從可延之與語議者問左右皆言静林有老僧曰惟已戒業甚高凡士大夫之賢與其徒之名者多與之游無不謌詠以道其為人在里閭一切皆歸尊之不敢怠此疑可以當君子之求訪者遂召來果與他浮圗者異狀貌秀健襟宇恢擴辯論博洽根固基厚信釋氏之門景星慶雲爾余大喜明日詣其所居一室寥然逺介}
