  - {type: variant, offset: 767, length: 569, content: 二月二十九日赴上訖又云向官西䣢幸迯過尤此官南豳誓謹名節啓必作次年之春則知赴官於此年之冬末也嘉祐元年丙申是歲先生在邠州按先生作靜難軍靈峯寺新閣記云嘉祐元年同佐靜難幕紫微山靈峯寺者凡出必造焉五月𥘉一日記又作問神詞序云丙申歳夏五月南豳大旱土人走寧之要冊池取神水禱兩不應余爲作問神詞使歌之二年丁酉是歲先生在邠州按公作捕魚圖記後云嘉祐丁酉二月十日新平官舎記又作樗蒲格序後云嘉祐二年丁酉仲冬月十有三日新平官舎序按九域志邠州新平郡靜難軍節度使三年戊戌是歲先生在邠州有送通判張總之都官赴闕序云徃年拜總之於成都及來南豳復得預總之職事反覆參視無有欹缺以先生墓誌考之秩滿改太常丞赴官靜難在至和二年之末秩當滿於是年次年則召試矣序蓋作於此時四年巳亥是歲先生召試舘職判尚書職方兼編校史舘書籍按先生墓誌云爾又按先生謝舘職啓云更佐兩郡行周十年近緣公章入改朝序先生於皇祐二年赴卭州判官至和二年赴靜難判官至是蓋十年矣五年庚子是歲先生在朝按先生作道士袁惟正字行之序其畧云予典校中秘書暇日納凉於城南道宇有道士肅予坐堂上以字請其後云嘉祐五年庚子元日謹序又作種柳詩序其畧日楊君灝巨川爲令種柳千根表絡諸道作三詩紀其事和者連章以至大軸携入都下示余屬以序後云嘉祐庚子人日安靜文同序然先生墓誌云以親老請通判卭州先生又作榮州楊處士墓誌云嘉祐五年二月葬以書狀拜道士李有慶來詣山居意先生是年歸鄕矣, WYG: ''}
