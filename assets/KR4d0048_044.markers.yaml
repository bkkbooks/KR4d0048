  - {type: variant, offset: 332, length: 0, content: '', WYG: 人既生其五常之美已潛牙于其中渾渾融融冥漫晦䨴而㒺克自章從之師所道有法駸駸焉適柔良粹厚之區㑹真參元而為正人端士矣反此固隔蔽其素所有也去而名嵬瑣兇桀叢然于天地間口鼻耳目眉齒鬚髮徒人耳亡他繇始習之是與否巳諸生質朴淳茂厯監之咸可彫飾繪畫以為令器今既學于元防當進退勿怠以充溢乎所以願來之意元防貯儲甚深而宏予昔與之㳺備識之且不敢以誣諸生諸生宜修心治身趨教嚮誼毋甘浮淫毋生夸驕毋輕語議毋妄施設毋尚䙝狎毋念荒逸毋聽讒嫉毋起怨背則諸生於謀已也甚善予亦重諸生習之自必見諸生為正人端士矣恭之哉時}
  - {type: page-break, offset: 332, content: '', id: KR4d0048_WYG_042-1b, image: WYG1096/WYG1096-0804d.png}
  - {type: variant, offset: 340, length: 6, content: 司戶叅軍權縣, WYG: 書卭州天慶觀希夷先生詩後希夷先生陳摶字圖南後晉天福中來逰蜀聞是州天師觀都威儀何昌一有道術善鎖鼻息飛精漠然一就枕輒越月始寤遂留此學卒能行之後歸闗中所修益高蜕老而嬰動如神人太宗朝嘗召入對問被俞㫖賜詩與號放居華山章靈暴竒久乃解去逮今海内愚耋蚩稚具齒舌者灼灼能道先生之所為先生本儒人既繇虚無凡作謌詩皆擺落世故披聾劀盲蹊穴易知每一篇墜塵中雖市人亦諷誦不休謂真闗秘區若可自到當時有贈昌一者親墨殿楹上後人已恐渝樠刻之厯祀孔多自丁酉訖今實一百一十四年也苔塗埃昏藏隐晦黑積久不問皇祐庚寅歲郡將博陵崔公制治之明年廷}
