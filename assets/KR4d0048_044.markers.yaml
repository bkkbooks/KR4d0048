  - {type: variant, offset: 445, length: 187, content: 仲冬月書則先生自蒲江又攝大邑也五年癸巳是歲先生在卭州按先生親筆墨林碑云余皇祐癸巳從事此州因閑爲此後爲好事者所䕶其迹如新嘉祐辛丑來倅郡治平乙巳復權守事一紀之中凡三覽此舊墨令人眷眷又題云余皇祐癸巳從事此州因閑作此二壁嘉祐辛丑自秘閣復貳郡政巳爲好事者欄䕶其蹟如新治平乙巳復權守印再覽舊墨裴回其下計此歲巳十三秋矣又按先生留題鶴鳴化上淸宫詩後癸巳歲季春月題又有重序靜林寺僧惟巳九皐集後, WYG: ''}
