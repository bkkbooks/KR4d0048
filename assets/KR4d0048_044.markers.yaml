  - {type: variant, offset: 689, length: 4, content: 知詩作於, WYG: 累吾今日之所付囑爾慕安等泣曰師胡為是言有}
  - {type: variant, offset: 694, length: 5, content: 時立石在是, WYG: 所緣耶師曰吾之神光一道去矣留此無數刻汝當奉吾所戒曰惡不宜為善不宜失語已攝足趺坐疉手暝目而逝揺挽不動嶷如塑刻享}
