  - {type: variant, offset: 0, length: 0, content: '', WYG: 集拾遺卷上宋文同撰詩卭州賞豐亭并序賞豐亭太守竇公為而名之也摸景畫意羣賢皆榜詩其上同忝𨽻大幕理亦當有紀述遂為此百五十言塵於其間然句斷甚俗而文辭不深者葢欲使溝壠之下耕夫餉婦讀易曉誦易記用而歌太守之徳也易傳爾故不懼人之指笑而敢以獻云人之創亭意大率繇已便夫何我公者所作異他見臨卭郡東北井井畫羣甸其民喜施力無歲不登衍公因到城上有此多稼羡而云彼嘉榖誠我民所擅如其每用此豈不鄉土戀伊我牧其衆胡爾懼流轉遂兹謀棟宇顯顯向一面題為賞豐字義不止營繕常時命僚侣扵時歌管薦高談詫上瑞衮衮莫之倦擎酒揖大野指顧一欣抃田夫各相語我輩誰曰賤太守亦為我今日又張讌卭州倅㕔三省堂將欲言治人必先由正身身正人自治此化行如神總緫羣聖書論説尤諄諄後賢守為法不敢㤀逡廵有欲著其跡更假他物伸或取几杖明或用盤盂陳或則銘於座或則書於紳此皆貪道者欲巳日夕親涵泳既滋久盛德光璘璘魯侯相門子佩義而服仁來乗别駕輿齒髮何青春開口議政事條件皆有倫春露與秋霜畏愛其吏民尚懼有片缺不使其質純乃於㕔事側開軒承甲寅題曰三省堂大構高榜新地古物象野水竹清衣巾公暇每居此寂嘿如隐淪㝠心以自觀外揣復内循一有所不逮補綻無纎塵既已自作詩文理相彬彬宛轉示明戒欲使風俗淳愚重侯所存再拜無辭頻待已固如此賢哉君子鄰常願此基構永不罹荆榛有壊則請修使之名不泯題何靖山人隱居二首靖蒲江人錦屏山下何夫子鐵帯麻衣真古人苦學詩來偷鬢老樂為儒後却家貧酒中酌月江村夜琴上彈風鸖寺春君已歸尋舊閒味肯騎肥馬入紅塵其二因循失計下青山却恨谿雲占斷閒黄巻聖賢忻對語青雲歧路秪低顔月墻槐影侵堦暗雨檻秋花滿目斑自愛蕭條真吏隐心清不累有無間題兠率寺簿領迷人喜暫閒聊尋古寺陟孤巒栢藏一逕中間窄雲歛千峰四面寛逺目已將飛鳥過寸心更乞老僧安若為借得禪房宿卧看龕燈一㸃殘題鳯凰山後巖此景又竒絶半空生曲欄蜀塵隨眼斷蕃雪滿襟寒澗下雨聲急巖頭雲色乾歸鞍休報晩吾待且盤桓子瞻戲子由依韻奉和子由在陳窮於丘正若淺港横巨舟每朝升堂講書罷𦂳合兩眼深埋頭才名至高位至下此事自屬他人羞猶勝俁俁彼賢者手把翟籥随羣優岌如老鸖立海上退避不與鶖鶬逰文章豈肯用一律獨取無問有神術所蓄未嘗資巳身搰搰恰如蜂聚蜜有時七日不火食支體雖羸心不屈陵陽謬守卑且勞馬前空媿持旌旄平生讀書苦􅀢詬老大下筆侵離騷貧且賤焉真可恥欲撻羣邪無尺箠安得來親絳帳旁日與諸生供唯唯須知道義故可樂莫問功名能得幾君子道逺不計程死而後巳方成名千鈞一羽不須校女子小人知重輕依韻和子瞻逰孤山跨明越壓蘓湖錢塘風物天下無玉峯孱顔}
