  - {type: variant, offset: 2711, length: 1, content: 四, WYG: 也逺近緇素來赴哭者殆千人衆謂宜以師之真身建蘇塗而扄藏之使來者觀相起善芟去三毒回面正法不墮惡道亦師之不言之教也慕安等遂從其謀風神凝然愈久不壊見者謹畏如侍諸側余往}
  - {type: page-break, offset: 2711, content: '', id: KR4d0048_WYG_042-6b, image: WYG1096/WYG1096-0807b.png}
  - {type: variant, offset: 2713, length: 5, content: 辛亥是歲先, WYG: 嘗居郡幕識師甚熟後復來權州事師則已化矣歸日枉道過邑詣師塔下旋遶瞻禮悲悼歎息雖然師之面目如}
  - {type: 'kr:newline', offset: 2715, content: '

      ', id: KR4d0048_krp_044-bkkkrnewl213}
  - {type: line-break, offset: 2715, content: '', id: KR4d0048_SBCK_044-11b04}
  - {type: indent, offset: 2715, content: 　, id: KR4d0048_krp_044-bkkind118}
  - {type: variant, offset: 2719, length: 3, content: 歸鄕赴, WYG: 而師之語言已不聞矣嗚呼熙寜五年余知}
  - {type: substitution, offset: 2720, original: 鄕, replacement: 鄉, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19673}}
  - {type: variant, offset: 2724, length: 2, content: 按先, WYG: 師之孫慕真來詣余求文以銘師之塔余昔既聞道於師也辭將云何乃銘之曰是身如浮雲倐}
  - {type: variant, offset: 2727, length: 1, content: 作, WYG: 而忽滅形質本何有聚散俱為幻夫人而昧死演起無量法從一十百千乃至萬億兆譬如蠶吐絲纒縛身自獄既倮而復羽孳種無由斷出此而入彼輪廻豈知覺師有大智鏡初誰為磨拂光明發虚空浄無一塵染大曜滿法界欲照誰能執收歛付諸匣乃是所假者示現于世人師以願力故師之所非相真實不思議凡所見聞者依以為漸入由此登佛地其則固不逺書以告諸後咸願起正信紆竹記紆竹生于}
  - {type: page-break, offset: 2727, content: '', id: KR4d0048_WYG_042-7a, image: WYG1096/WYG1096-0807c.png}
  - {type: variant, offset: 2729, length: 6, content: 州謝表云臣巳, WYG: 陽守居之北崖其始共本以出去土未幾而遽分其三裁三尺倮然無他枝乃枿盖其顛未脫籜時蝎害之使然爾其一既獨盛將挺起為垂巖所軋力不得競乃求虚以伸所趣觝礙無所容屈已自保生意愈艱蟠空繚隙拳局以進伏碻磝蔽蓊薉曽莫知其厯寒暑之何許也余采藥過其下見之命聱齾二童奴撥荒榛除腐蔓扶起而支持之則已堅彊偃蹇宛骫附地若不欲使人加哀憐}
  - {type: page-break, offset: 2729, content: '', id: KR4d0048_WYG_042-7b, image: WYG1096/WYG1096-0807d.png}
  - {type: 'kr:newline', offset: 2732, content: '

