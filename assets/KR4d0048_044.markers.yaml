  - {type: variant, offset: 2822, length: 1, content: 瞻, WYG: 後}
  - {type: variant, offset: 2824, length: 1, content: 遣, WYG: 人知其得名之由以不得已而取之也於是聱齾並進而言曰公名之既聞命矣公平居常好戲為此者盍摹之以示於人乎余許之}
  - {type: variant, offset: 2826, length: 8, content: 致書後云壬子中元, WYG: 聱者裂素齾者漬墨清曉上}
  - {type: variant, offset: 2837, length: 4, content: 序閣必陵, WYG: 為濡毫而揮灑}
  - {type: 'kr:newline', offset: 2839, content: '

