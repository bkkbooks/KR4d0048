  - {type: variant, offset: 379, length: 8, content: 翰進上文象皇祐四, WYG: 庶朝夕得此瞻慕而歲時得以獻享也余聞之益重其所存因而歎曰夫世之具儒衣冠而把吾孔氏之書巻者過耳厯目莫非皆仁義之説及於其所事師一反面不復更名之者多矣况肯有䘏其沒後者耶已師乃學佛者斷念割愛實曰其事今反能如此宜乎吾心之信確確而愈堅因索其詩得七百首攜歸諷誦累日温純謹愿含蓄意思誠鐘磬塤箎之雅韻鸞鳯虎豹之竒采其舂容彪炳不假於他而一出于自然矣余固願為之序使行于世期覧之者知已師不獨號方袍而能為辭章亦著其行義磊砢魁特而絶出於衆人爾已師字亞休姓仇氏識余時}
