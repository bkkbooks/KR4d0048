  - {type: variant, offset: 1, length: 1, content: 室, WYG: 穿漏雪海浩蕩潮喧呼舊嘗持之詫吾孥㑹挈爾去相與娯宦逰若不來此都腰間綵組徒云紓子瞻鳯咮新結廬日哦其間興不孤平生美志自償足休問滿眼生雈蒲有物可比中鄙夫蜉蝣朝生死於晡公攘顯奪入胠篋驕穉無乃非良圗子瞻之樂固有餘辨説是非從魯蘧我今有索君勿逋歸日好景為我摹再和問子瞻何江湖乃心魏闕君豈無胡為放浪檢束外日與隐者相招呼藍輿往往從以孥靈運石壁無此娛窮深極險興未已豈復更憚梯登紆過客休誇衡與廬天下此景君勿孤欲將文字寫物象當截無限尋江蒲登髙能賦屬大夫逰覧木厭嗟已晡安得世上有絶筆盡取君詩粧在圗此身之外何贏餘成然而寐其覺蘧請看湖上人名逋此子形相誰解摹和陳基載大雨黕黕雲如湧淙淙雨若傾驟翻銀漢濁勻洒玉䋲明雷怒無停勢風豪有遏聲危樓已初伏猶謂裌衣輕和張推官荔枝長嗟珍果滯遐方好種華林奉帝王夏簟滿風羅秀色曉梯乗露摘新香潑霞乍染愁將變烹玉纔凝忍更嘗正在臨卭病痟甚忽䝉佳惠敢相㤀贈李仲祥道士不見}
