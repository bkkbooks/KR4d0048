  - {type: variant, offset: 1933, length: 773, content: 二月七日張赴以虞部郎中到任治平二年八月二十四日劉介亦以虞部郎中到任張必未滿秩而去先生必攝守於張之後劉之前也又按先生權卭州謝成都府尹啓云爲治中之官殊恐不職行太守之事固非其冝然而一紀之中三來於此自爲從事至攝守十二年矣然先生作羅屯田墓誌首云治平二年九月十日職方員外郎羅公登詣同於成都囘車館手授其先人行狀則先生八月解臨卭歸廣漢道出成都作此誌銘無疑矣三年丙午是歲先生在漢州六月知普州按先生作成都府運判霍侯燕思堂記云旣落之侯謂廣漢都尉文同日無石以載疑事之闕將以屬子子其謂何同日諾治平三年二月十五日記又作仁壽縣太君李氏埋銘云宋治平三年丙午春太常博士宋璋與其弟瑄葬其母夫人仁壽太君李氏於犀浦縣俾其友廣漢郡尉秘閣校理文同謹歲月之實納諸壙中又按先生作綿州李處士墓誌云治平四年十月十五日以疾卒于家嘗憶去年六月自廣漢移守安岳道先生門下入拜於南堂先生與語恐不能乆留於世别未百日而秘書丞君遣使以狀來日先人臨終攬誼伯手屬之日吾死當使普州誌吾墓則知先生是年六月赴普州矣四年丁未是歲先生在普州按先生作成都府學射山新修祠宇記云龍圖閣直學士趙公治平二年夏四月𬒳詔守蜀明年春三月上巳來遊學射山四年初五日記此記疑作於普州又有普州三亭詩日均逸日東溪曰碧崖然按先生墓誌云賜五品服知普州丁仁壽憂服除熈寧三年知太常禮院則是年必以憂去官矣熈寧元年戊申是歲先生居憂在鄕二年巳酉是歲先生居憂在鄕按先生題黄氏易圖後云熈寧巳酉孟冬望日墨君堂書又有夏日閑書墨君堂壁詩云先人有弊廬涪水之東邊我罷漢中守歸此聊息焉則墨君堂在先生所居明矣十月十五日又作茂州汶川縣勝因院記十一月十五日又作彭州永昌縣治巳堂記三年庚戌是歲先生在朝按先生墓誌云熈寧三年加太常禮院兼編修大宗正司條貫又作送朱郎中詩序首云熈寧三年庚戌三月癸丑同自蜀還臺宿臨潼華淸道館朱康叔引名見訪又作利州羊模谷仙洞記云熈寧庚戌春予還朝利州通判冦諲爲予言云云記後九, WYG: ''}
