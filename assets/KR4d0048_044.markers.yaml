  - {type: line-break, offset: 2732, content: '', id: KR4d0048_SBCK_044-11b05}
  - {type: indent, offset: 2732, content: 　, id: KR4d0048_krp_044-bkkind119}
  - {type: variant, offset: 2736, length: 3, content: 三月五, WYG: 其不得遂諸生理者然觀其抱節也剛潔而隆高其布葉也痩㾪而修長是所謂戰風}
  - {type: variant, offset: 2740, length: 8, content: 赴任訖又作榆隂詩, WYG: 傲氷霜凌突四時磨轢萬草之竒植也余歎視良久聱者進而言曰是將以瑞而名之可乎曰瑞生于人所易見俾得以致之此獨處窮僻非瑞也齾者進而言曰是將以怪而名之可乎曰怪起於不常有物體}
  - {type: page-break, offset: 2740, content: '', id: KR4d0048_WYG_042-8a, image: WYG1096/WYG1096-0808a.png}
