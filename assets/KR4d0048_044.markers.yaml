  - {type: variant, offset: 373, length: 3, content: 李奐太, WYG: 上幽澹虚潔整整可愛視其壁有畫儒者像榜云長秋山人胡昭甫字惟岳真者旁有贊乃已師之辭講胡之美尤盛問之曰此已師師也當僣孟朝渠為進士有詩名于時不第已師得}
  - {type: variant, offset: 377, length: 1, content: 周, WYG: 四聲於其門下今不幸而其嗣冺絶巳師既荷其教誘竊懼其為鬼而死無食處故圗}
