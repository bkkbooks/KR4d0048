  - {type: variant, offset: 118, length: 99, content: 年甲申是歲按實錄文潞公除樞宻直學士知益州七年擢諫議大夫入政府按先生墓誌潞公守成都譽公所䞇文字以示府學學者一時稱慕之必在是年或五年六年之間也皇祐元年己丑是歲先生登進士第按登科記皇祐元年三月策進士馮京以, WYG: 庫全書丹淵集拾遺卷}
