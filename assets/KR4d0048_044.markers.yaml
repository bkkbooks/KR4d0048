  - {type: variant, offset: 1697, length: 235, content: 甲辰是歲先生在鄕按先生作梓州永泰縣重建北橋記云上卽位之明年永泰縣重建北橋旣成其令佐有請於邑人文同治平元年二月一日記又作東橋記後日同者字與可縣人又作中江縣樂閑堂記後云治平元年五月日記又按先生墓誌服除歸館又以母年請通判漢州蓋在是年二年乙巳是歲先生赴通判漢州又攝守卭州按漢倅題名記治平二年二月五日到任又按墨林碑先生親筆云治平乙巳復攝守事蓋以漢倅來攝臨卭也又作中江縣新堤記云治平二年春河內廖君子孟爲之令貢士賈汝奇等二百人請余求文意此記作於未赴漢倅之時以卭州太守題名記考之嘉祐八年, WYG: ''}
