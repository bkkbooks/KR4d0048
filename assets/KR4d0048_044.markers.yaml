  - {type: variant, offset: 2749, length: 9, content: 序云熈寧辛亥歲春予, WYG: 効以見駭於世此因地而然非怪也然則何名而可曰天之生物槩授以生其各有所得失之者莫不啻繫乎其所託竹之為物乃草木之中甚賢者今此不幸不得其地以完其生上蔽旁閼不使}
  - {type: substitution, offset: 2751, original: 熈, replacement: 熙, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-17668}}
  - {type: substitution, offset: 2757, original: 予, replacement: 豫, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20745}}
  - {type: variant, offset: 2759, length: 29, content: 京師赴陵州因過家省墳墓云云又有辛亥孟秋虹下飮古井詩五年壬子, WYG: 通遂至於質狀如此然則天之所與雖不能奮迅條達以盡其性而其所得短長巨細之分當亦緣理而浸長之故其氣不能暢茂於其内而其勢所以促蹙於其外也且其所以若}
  - {type: page-break, offset: 2759, content: '', id: KR4d0048_WYG_042-8b, image: WYG1096/WYG1096-0808b.png}
