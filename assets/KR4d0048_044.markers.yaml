  - {type: variant, offset: 2842, length: 26, content: 州治也又作仁宗皇帝飛白書序其略日太子賔客掌公禹錫時預, WYG: 自卯至辰而就乃言}
  - {type: 'kr:newline', offset: 2856, content: '

