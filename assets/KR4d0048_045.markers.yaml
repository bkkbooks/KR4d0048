  - {type: variant, offset: 115, length: 1, content: 慰, SBCK: 􅇺}
  - {type: variant, offset: 117, length: 1523, content: 理明語快到古作者第歎服而巳何日珍集下懷瞻詠不宣某祗拜送與可通判卭州詩范鎭半刺爲官美臨卭自古名何言緹軾寵更侍版輿行仙藉新年貴賔僚舊日榮壺漿故父老應在半途迎送知湖州浙西古名城號稱水晶宫史君老手筆文字窺化工江山乆有待瑩潔如磨礲堂階走淸渠珮玉鳴丁東臺觀靣衆巖擁抱開屏風遥知到未幾都下傳詩筒西南四麾守一一獄戶空今行定論最歸來掖垣中送與可通判卭州王安石文翁岀治蜀蜀士始文章司馬唱成都嗣音得王楊犖犖漢守孫千秋起相望操筆賦上林脫巾選爲郎擁書天祿閣奇字校偏傍忽乘駟馬車牛酒過故鄕時平無諭檄不訪誓羅祥問君行何爲關隴正繁霜中和助宣布循吏綴前芳豈特爲親榮區區夸一鄕送出守陵州蘇軾壁上墨君不解語見之尚可消百憂而况我友似君者素節凛凛欺霜秋淸詩健筆何足數逍遥齊物追莊周奪官遣去不自覺暁梳脫髪誰能收江邊亂山赤如赭陵陽正在千山頭君知遠别懷抱惡時遣墨君解我愁和與可洋川園池三十首湖橋朱欄畫柱照湖明白葛烏紗曵履行橋下龜魚晚無數識君拄杖過橋聲橫橋貪㸔翠蓋擁紅粧不覺湖邉一夜霜卷却天機霜錦叚從教匹練寫秋光書軒雨昬石硯寒雲色風動牙籖亂葉聲庭下巳生書帶草使君疑是鄭康成冰池不嫌冰雪遶池㸔誰似詩人巧耐寒記取羲之洗硯處碧琉璃下黑蛟蟠竹塢晚節先生道轉孤歲寒惟有竹相娛麤才杜牧眞堪笑喚作軍中十萬夫荻浦雨折霜乾不耐秋白花黃葉使人愁月明小艇湖邊宿便是江南鸚鵡洲蓼嶼秋歸南浦蟪蛄鳴霜落橫湖沙水淸卧雨幽花無限思抱叢寒蝶不勝情望雲樓隂晴朝暮幾回新巳向虗空付此身出本無心歸亦好白雲還似望雲人天漢臺漾水東流舊見經銀潢左界上通靈此臺試向天文覔閣道中間第幾星待月臺月與高人本有期挂簷低戸映蛾眉只從昨夜十分滿漸覺冰輪出海遲二樂榭此間真趣豈容談二樂并君已是三仁智更煩訶妄見坐令魯叟作瞿曇來詩云二見因妄生灙泉亭聞道池亭勝兩川應須爛醉荅雲烟勸君多揀長腰米消破亭中萬斛泉吏隠亭縱横憂患滿人間頗怪先生日日閑昨夜淸風眠北牗朝來爽氣在西山霜筠亭解籜新篁不自持嬋娟巳有歲寒姿要㸔凛􅏮霜前意須待秋風粉落時無言亭慇懃稽首維摩詰敢問如何是法門彈指未終千偈了向人還道本無言露香亭亭下佳人錦繡衣滿身瓔珞綴明璣晩香消歇無尋處花巳飄零露巳晞函虗亭水軒花榭兩爭妍秋月春風各自偏惟有此亭無一物坐觀萬景得天全溪光亭决去湖波尚有情却隨初日動簷楹溪光自古無人畫慿仗新詩與冩成過溪亭身輕歩穏去忘歸四柱亭前野彴微忽悟過溪還一笑水禽驚落翠毛衣披錦亭煙紅露綠暁風香燕舞鸎啼春日長誰道使君貧且老繡屏錦帳咽笙簧禊亭曲池流水細鱗鱗高會傳觴似洛濵紅粉翠蛾應不要畫船來徃勝於人菡萏亭日日移床趂下風淸香不盡思何窮若爲化作龜千歲巢向田田亂葉中荼䕷洞長憶故山寒食夜野荼䕷發暗香來分無素手簮羅䯻且折霜㽔浸玉醅篔簹谷漢川修竹賤如蓬斤斧何曾赦籜龍料得淸貧饞大守渭濵千畆在胸中寒蘆港溶溶晴港漾春暉蘆笋生時柳絮飛還自江南風物否桃花流水鮆魚肥野人廬少年辛苦事犂鉏剛厭靑山遶故居老覺華堂無意味却須時到野人廬此君庵寄與庵前抱節君與君到處合相親冩眞雖是文夫子我亦眞堂作記人金橙徑金橙縱復里人知不見鱸魚價自低須是松江煙雨裏小船燒薤擣香虀南園不種夭桃與綠楊使君應欲候農桑春畦雨過羅紈膩夏壠風來餅餌香北園漢水巴山樂有餘一麾從此首歸塗北園草木慿君問許我他年作主無與可有詩見寄云待將一叚鵝溪絹掃取寒梢萬尺長次韻荅之爲愛鵝溪白蠒光掃殘雞距紫毫鋩世間亦有千尋竹月落庭空影許長林子中以詩寄與可及餘與可旣没追和其韻斯人所甚厭投卑毎不受欲其少須臾奪去惟恐後云誰尸此職無乃亦假守賦才有巨細無異斛與㪷胡不安其分但聽物所誘時來各飛動意合無妍醜坐令雞栖車長載未伯厚平生無一旅旣死咤萬口自聞與可亡胷臆生堆阜懸知臨絕意要我一執手相望五百里安得自其牗遺文付來哲後事待諸友伶俜嵇紹孤老病孟光偶世人賤目見爭笑千金帚君詩與楚詞識者當有取但如愛, WYG: ''}
