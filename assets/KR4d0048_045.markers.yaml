  - {type: variant, offset: 3714, length: 4214, content: 議姻極爲喜幸從來交契如此又復結此無窮之歡美事美事但寒門不稱計與可必不見鄙也臨行冗甚奉書殊不謹竢到任别上問次又軾再拜姪女子獲執箕箒非獨渠厚幸而不肖獲交于左右者緣此愈親篤矣欣慰之懷殆不可言不敢復具啓狀必不見罪也聞舍弟談壻之賢公之子固應爾姪女子粗知書暁義理計亦稱公家婦也更望訓誨其不逮也又軾啓疊辱來教承起居佳適聞中間復微恙且喜尋巳平復軾比來亦多病漸老不耐小放意輒成疾不可不加意謹護也水後彌年勞役今復聞决口未可塞紛紛何時定乎寄和潞老詩甚精奇稍閑當亦作六言殆難繼也未緣會晤萬萬以時珍重又軾啓稍不馳問不審入冬尊體何如想舊疾盡去眠食益佳矣見秋榜知八郎巳捷不勝欣慰惟十一郎偶失甚爲悵然然一跌豈廢千里想不以介意寄示碑刻作語古妙非世俗所能髣髴長句偈甚奇非獨文字甘降便當北靣參問也近有一僧名道潛字參寥杭人也時來相見詩句淸絕可與林逋相上下而通了道義見之令人蕭然有一詩與之錄呈爲一笑也未由展奉萬萬以時自重不宣黄樓賦如巳了望付去人如未幸留意又軾啓近逓中辱書承非乆到闕卽日想巳入覲矣無緣一見於邑可知苦寒尊候何似貴眷令子各安勝軾蒙庇粗遣秋來水災幾巳爲魚必知之矣寄惠六言小集古人之作今世未省見老兄别後道德文章日進追配作者而劣弟懶墯日退卒爲庸人他日何以見左右慙悚而巳所要拙文實未有以應命又見兄之作但欲焚筆硯耳何敢自露兄淹外旣乆雖與時闊疎而公議卓然當遂踐淸近也歲行盡萬萬以時自重不宜又軾啓郡人還疊辱書敎承尊候微違和尋巳平愈然尚未甚美食又得蒲大書云尊貌頗淸削伏料道氣乆充微疾不能近然未免憂愁惟謹擇毉藥痛加調練莫須燃艾否軾近來亦自多病年老使然無足怪者蒙寄惠偃竹真可爲古今之冠謹當綴黃素其後作十餘軸謹援此例不可過望所示當作歌詩題之軾作此乃莫大之幸日夜所願而不得者今後更不敢送浙物去矣老兄恐嚇之術一何疎哉想當一大噱别後亦有拙詩百餘首方令人編錄以求斤斧後信寄去老兄盛作尚恨見少當更蒙借示使劣弟稍稍長進此其爲賜又非頒惠墨竹之比也冗中奉啓不盡言又軾啓冗迫稍踈上問伏想尊履佳勝承書領吳興衆議謂公當在近侍故不甚快然不肖深爲左右賀也吳興山水淸遠公雅量弘度在王謝閒此授殆天意耳軾欲乞宣城若幸得之當與公爲隣國真是一叚奇事然事之如人意者亦自難遂從古以然公自南河赴任舟行艱澁何不自五丈河由曹鄆濟過我於徐自泗入淮乎但恐五丈河無氷不然者公必出此也且更熟籌之餘惟萬萬以時自重筆凍奉啓殊不謹石㓜安言亦可呼水精宫使此語可記墨君堂記凡人相與號呼者貴之則曰公賢之則曰君自其下則爾汝之雖公卿之貴天下貌畏而心不服則進而君公退而爾汝者多矣獨王子猷謂竹君天下從而君之無異辭今與可又能以墨象君之形容作堂以居君而屬余爲文以頌君德則與可之於君信厚矣與可之爲人也端靜而文明哲而忠士之修潔博習朝夕磨治洗濯以求交於與可者非一人也而獨厚君如此君又疎簡抗勁無聲色臭味可以娛恱人之耳目鼻口則與可之厚君也其必有以賢若矣世之能寒燠人者其氣𦦨亦未至若雪霜風雨之切於饑膚也而士鮮不以爲欣戚喪其所守自植物而言之四時之變亦大矣而君獨不顧雖微與可天下其孰不賢之然與可獨能得君之深而知君之所以賢雍容談笑揮灑奮迅而盡君之德稚壯枯老之容披折偃仰之勢風雪凌厲以觀其操崖石犖确以致其節得志遂茂而不驕不得志瘁瘠而不辱羣居不倚獨立不懼與可之於君可謂得其情而盡其性矣余雖不足以知君願從與可求君之昆弟子孫族屬朋友之象而藏於吾室以爲君之别館云與可畫篔簹谷偃竹記竹之始生一寸之萌耳而節葉具焉自蜩腹虵蚹以至于劒㧞千尋者生而有之也今畫者乃節節而爲之葉葉而累之豈復有竹乎故畫竹必先得成竹於胷中執筆熟視乃見其所欲畫者急走從之振筆直遂以追其所見如兎走鶻落少縱則逝矣與可之教予如此予不能然也而心識其所以然夫旣心識其所以然而不能然者內外不一心手不相應不學之過也故凡有見於中而操之不摯者平居自視了然而臨事忽焉喪之豈獨竹乎子由爲墨竹賦以遺與可曰庖丁解牛者也而養生者取之輪扁斵輪者也而讀書者與之今夫夫子之託於斯竹也而予以爲有道者則非邪子由未嘗畫也故得其意而巳若予者豈獨得其意并得其法與可畫竹𥘉不自貴重四方之人持縑素而請者足相躡於其門與可厭之投諸地而罵曰吾將以爲韈士大夫傳之以爲口實及與可自洋州還而余爲徐州與可以書遺余曰近語士大夫吾墨竹一派近在彭城可徃求之韈材當萃於予矣書尾復冩一詩其畧曰擬將一叚鵝谿絹掃取寒梢萬尺長予謂與可竹長萬尺當用絹二百五十匹知公倦於筆硯願得此絹而巳與可無以荅則曰吾言妄矣世豈有萬天竹哉余因而實之荅其詩曰世間亦有千尋竹月落庭空影許長與可笑曰蘇子辯則辯矣然二百五十匹吾將買田而歸老焉因以所畫篔簹谷偃竹遺予曰此竹數尺耳而有萬尺之勢篔簹谷在洋州與可嘗令予作洋州三十韻篔簹谷其一也予詩云漢川脩竹賤如蓬斤斧何曾赦籜龍料得淸貧饞太守渭濵千畝在胸中與可是日與其妻遊谷中燒筍晚食發函得詩失笑噴飯滿案元豐二年正月二十一日與可没于陳州是歲七月七日予在湖州曝書畫見此竹廢卷而哭失聲昔曹孟德祭橋公文有車過腹痛之語而予亦載與可疇昔戲笑之言者以見與可於予親厚無間如此也祭與可文年月日從表弟蘇軾謹以淸酌庶羞之奠致祭于故湖州文府君與可學士兄之靈曰嗚呼哀哉與可能復飮此酒也夫能復賦詩以自樂皷琴以自侑也夫嗚呼哀哉余尚忍言之氣噎悒而填胷淚疾下而淋衣忽收淚以自問非夫人之爲慟而誰爲乎道之不行哀我無徒豈無友朋逝莫告余惟余與可匪亟匪徐招之不來麾之不去不可得而親其可得而踈之耶嗚呼哀哉孰能敦德秉義如與可之和而正乎孰能養民厚俗如與可之寛而明乎孰能爲詩與楚詞如與可之婉而淸乎孰能齊寵辱忘得喪如與可之安而輕乎嗚呼哀哉余聞訃之三日夜不眠而坐喟夢相從而驚覺滿茵蓆之濡淚念有生之歸盡雖百年其必至惟有文爲不朽與有子爲不死雖冨貴夀考之人未必皆有此二者也然余嘗聞與可之言是身如浮雲無去無來無亡無存則夫所謂不朽與不死者亦何足云乎嗚呼哀哉尚饗黄州再祭與可文年月日從表弟具官蘇軾謹以淸酌庶羞之奠昭告于亡友湖州府君與可學士文兄之靈嗚呼哀哉我官于岐實始識君廣口秀眉忠信而文志氣方剛談詞如雲一别五年君譽日聞道德爲膏以自濯薰藝學之多蔚如秋蕡脫口成章粲莫可耘馳騁百家錯落紛紜使我羞歎筆硯爲焚再見京師黙無所云杳兮淸深落其華英昔蓻我黍今熟其饋啜漓歌呼得淳而醺天力自然不施膠筋坐了萬事氣回三軍笑我皇皇獨違垢紛俯仰三州眷戀桑枌仁施草木信及䴥􅍪昻然來歸獨立無羣俛焉復去初無戚欣大哉死生悽愴蒿蔒君没談笑大鈞徒勤喪之西歸我竄江濆何以薦君採江之芹相彼日月有朝必曛我在茫茫凡幾合分盡此一觴歸安于墳嗚呼哀哉尚饗與可學士墨君堂蘇轍虗堂竹叢閒那復厭竹遠風庭響交戞月牖散凌亂尚恐晝掩關嬋娟不長見中堂開素壁蕭颯起霜幹隨宜賦生意落筆皆䓤蒨根莖雜土石枝葉互長短依依露下綠冉冉風中展開門視叢薄與此終何辨和與可洋州園亭三十韻湖橋湖南堂宇深湖北林亭遠不作過湖橋兩處那相見横橋湖裏種荷花湖邊種楊柳何處渡橋人問是人閒否書軒綠竹覆淸渠塵心日月踈使君遺癖在苦要讀文書􅖅池水深􅖅亦厚滉蕩鋪寒玉好在水中魚何愁池上鶩竹塢空陂放修竹肅肅復冥冥莫除塢外笋從使入園生荻浦離披寒露下蕭索微風觸摧拆有餘靑從橫未須束蓼嶼風高蓮欲衰霜重蓼𥘉發會使此池中秋芳未嘗歇望雲樓雲生如湧泉雲散如飜水百變一凭欄悠悠定誰使禊亭觴流無定處客醉醒還酌毋令仲御歌空使人驚愕菡䔰亭開花濁水中抱性一何㓗朱檻月明時淸香爲誰發􅙐醾洞猗猗翠蔓長藹藹繁香足綺席墮殘英芳罇漬餘馥此君菴風稍遶林匝霜幹當窻靜遥知素壁上醉墨森相映金橙逕葉如石楠堅實比霜柑大穿逕得新苞令公憶鱸鱠南園官是勸農官種桑亦其所安得陌上人隔葉攀條語北園使君美且仁遍地種桃李豈獨放春花行㸔食秋子荅與可十首遠遊旣爲東魯迁居又愛南山齒髪自知將老心懷且欲偷安舜井溢流陌上歷山近在城頭覊旅三年忘云故園何日歸休野歩西湖綠縟晴登北渚煙綿蒲蓮自可供腹魚蠏何嘗要錢飮酒方橋夜月釣魚畫舫秋風冉冉荷香不斷悠悠水靣無窮雨過山光欲溜寒來水氣如蒸勝處何須吳越隨方亦有遊朋楊雄執戟雖乆陶令歸田未能眼㸔雲山無柰神傷簿領相仍終歲常親鞭朴此生知負詩書欲尋舊學無處時有故人起予故人遠在江漢萬里時寄聲音聞道禪心寂寞未廢詩人苦吟佳句近參風雅微詞間發離騷竊欲比君庾信莫年詩賦尤高相思欲見無路滿秩西歸有時及君鈴閤少事飮我松醪滿巵送與可知湖州連持梁洋卯乆作溪山主深知爲郡樂但畏買茶若來歸天祿閣坐守登聞皷九重未明入百辟盈庭舞城南獨歸卧心事誰當語舊聞吳興勝試問天公取家貧槖裝盡歲莫輕㠶舉苕溪淨多石弁嶺瘦無土湖藕雪冰絲山茶潑牛乳香粳飯玉粒鮮鯽鱠紅縷宫開水精㓗人寄畫屏住俗吏自難堪詩翁正當與從來思淸絕况乃病新愈團團肘後丹暠暠胷中素高卧鎭夸俗淸談靜煩訴應笑杜紫微湖亭但狂顧墨竹賦與可以墨爲竹視之良竹也客見而驚焉曰今夫受命於天賦形於地涵濡雨露振蕩風氣春而萌芽夏而解弛散柯布葉逮冬而遂性剛㓗而疎直姿嬋娟以閑媚渉寒暑之徂變傲冰雪之凌厲均一氣於草木嗟壤同而性異信物生之自然雖造化其能使今子研靑松之煤運脫兎之毫睥睨牆堵振洒繒綃須臾而成鬱乎蕭騷曲直橫斜穠纖􅋻高竊造物之潛思賦生意於崇朝子豈誠有道者耶與可听然而笑曰夫予之所好者道也放乎竹矣始予隱乎崇山之陽廬乎脩竹之林視聽漠然無槩乎予心朝與竹乎爲游莫與竹乎爲朋飮食乎竹間偃息乎竹隂觀竹之變也多矣若夫風止雨霽山空日出猗猗其長森乎滿谷葉如翠羽筠如蒼玉澹乎自持淒兮欲滴蟬鳴鳥噪人響寂歴忽依風而長嘯眇掩冉以終日笋含籜而將墜根得土而横逸絕澗谷而蔓延散子孫乎千億至若藂薄之餘斤斧所施山石犖埆荆棘生之蹇將抽而莫逹紛旣折而猶持氣雖傷而益壯身巳病而増奇淒風號怒乎隙穴飛雪凝􅴟乎陂池悲衆木之無頼雖百圍而莫支猶復蒼然於旣寒之後凛乎無可憐之姿追松栢以自偶竊仁人之所爲此則竹之所以爲竹也始也余見而恱之今也恱之而不自知也忽乎忘筆之在手與帋之在前勃然而興而脩竹森然雖天造之無朕亦何以異於茲焉客曰蓋予聞之庖丁解牛者也而養生者取之輪扁斵輪者也而讀書者與之萬物一理也其所從爲之者異爾况夫夫子之託於斯竹也而予以爲有道者則非耶與可曰唯唯祭文與可學士文維元豐二年歳次巳未二月庚子朔具官蘇轍謹以淸酌庶羞之奠致祭于故吳興太守與可學士親家翁之靈嗚呼與君結交自我先人舊好不忘繼以新姻鄕黨之歡親友之恩豈無他人君則兼之君牧吳興我官南京從君季子長女實行君次于陳徃見姑嫜使者未反而君淪亡于何不淑以至于斯匪人所知神實爲之昔我愛君忠信篤實廉而不劌柔而不屈發爲文章實似其德風雅之深追配古人翰墨之工世無擬倫人得其一足以自珍縱橫放肆乆而疑神晚歲好道耽恱至理洗濯塵翳湛然不起病革不亂遺書滿𥿄嗟乎今日見此而巳我欲哭君神徃身留遣使徃奠涕泗橫流絳幡素車歸安故丘嗚呼哀哉尚饗丹淵集附録終, WYG: 䟦}
