front:
  text: 陳眉公先生訂正丹淵集卷十四
  hash: sha256:7fe45c2d39a1284fb8554581025c0420843ae290d259fdafc52896793ec5a0a7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_014-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同參吳吳一標建先詩四十九首子駿運使八詠堂八首寶峯亭嘉陵抱江回平衍出橫澨中間築雄壘獨據兩川會行臺敞嚴府磊砢北城外潭潭走群楹直上巒嶺背危墻繚空闊飛閣入茫昧上有寶峯亭仰見白雲內岧嶤占孤絶下與萬山對層櫩動寥廓曲檻枕闤闠主人從藍輿晚興在公退心掩萬象逺目引八極大鈎簾拂坐榻隱几緩衣帶詩書抉關鍵筆硯産珠貝是時衆吏去不敢呈計會雖然彼郡邑原本窮利害自取金穀饒無煩米鹽碎此地寄清襟歲書從屢最桐軒晴影滿空壁晨曦上清軒庭下雙高桐枝葉蔚以繁種者意自逺豈並群木論謂可絙朱絲中有雅韻存成之在誰手但為培霜根須知治世音盡付於此孫柏軒沈沈敞幽軒聳聳列寒柏清音納窗戶爽氣逼枕席主人重端徑坐若對佳客時復下撫摩破蘚交履迹此意乃如是來者當愛惜大厦須良材相期早千尺竹軒此景絶可愛叢筠挺修竿侵簾復映愰翠影何擅欒霜威忌晚秀雨氣矜睛寒每向極靜時幽禽發清彈自無車馬塵飛來泊琅玕宜遣老鈴下日日申平安李衛公言北地童子寺有好竹其綱維令人每日報竹平安巽堂華堂聳嚴臺地勢側隨水高臨巽官上其取名以是峩峩寶峯頂日影正辰巳繚棧入雲林詰屈如篆字輕霏牙虧蔽亂樾紛間厠賔來獲清歡吏散生野思靜見萬物本一一齊於此體道以行權端居得深旨山齋職事凡少休餘復不經眼幽齋設橫榻盡日對層巘遙懷寄浩蕩靜想縈􅑬嵼松雨潤書奩竹風吹酒盞榮名付傲兀勝事入清簡雖有舊林泉何須嗟去晚間燕亭靜宇占幽深是中何所有軒窗極清潔硯席羅左右公餘每休此俗客曽不受六尺局腳床解帶就橫肘掃除間景物健筆當大帚敢問公許年得詩凡幾首會景亭誰兹敞高亭磴道繞千踏江山接平逺百里俱會合人間最佳景窗戶供逺納煙雲互蔽虧蟲鳥相應答吟箋摘奇勝畫筆寫紛雜安得日從公短屐手自蠟呈李堅甫中舍𣏌往年曽憶過長安短𥿄書名詣門下君時延我坐終日灑掃東軒留看畫橫圖巨軸不知數但見匣中時一把甲猶未竟乙復作門類著畨開滿架使人歎羡不能巳只恨有門歸隔夜歸來兀坐想精絶念此榮觀若為謝就中寒林兩大幅此物世間誰敢價倐然一别十五載常向人前盛誇詫因君奉使臨敝邑見先問此餘不暇君能為我再講説座上不容人俗話如君所蓄更誰有有亦未能無笑罵况君纍世盡清職摹本敢來前弄詐君今還省正擢用異日須求作鄰舍峩巾曵屨日相謁更欲重煩開幾帊待尋前輩用心處欵曲應須頻假借每厨閲訖當便還不敢奉欺言羽化采芡通判盧微之携種種之次年大盛芡盤團團開碧輪城東壕中如疊鱗漢南父老舊不識日日岸上多少人駢頭鬅鬆露秋熟緑刺紅針割寒玉提籠當筵破紫苞老蚌一開珠一掬吹臺北下凝祥池圃田東邊僕射陂如今兩處盡堙沒異日此地名應馳物貴新成味尤美可惜飄零還入水料得明年轉更多一匝清波流子子峯鐵峽東風吹空力何短三月隴山全未暖文法姦酋引騎兵飛隨銀鶻弓刀滿霜矛雪甲寒如水候卒何由知首尾君不見峰鐡峽頭雲色死一過蕭然五十里周思道如詔亭繁上先生教子時義方題榜貼亭楣當年此地開師席今日其言入制詞鄉里共傅為盛事鬼神相助使前知後人若續成都記第一詳書不可遺陵井喻氏歲寒山居蕨平處士居山日手種青松一萬根歲月漸深枝盡偃雪霜雖厚葉仍繁本營勝槩逃軒冕更結清風遺子孫寄語後人須愛護莫教空有今名存提刑司勳示及瞑禽圗作詩詠之朱華盛發穿疏竹寒枿齊枯遍野磯大雪蔽天方亂下衆禽爭地各相依非公好事誰能得此畫如今自巳稀試待晴明挂軒壁定開群眼一時飛北齋雨後小庭幽圃絶清佳愛此常教放吏衙雨後雙禽來占竹秋深一蝶下尋花喚人掃壁開吳畫留客臨軒試越茶野興漸多公事少宛如當日在山家北城樓上滿目望不極城樓當最高地形連楚闊山勢入秦豪平外斜通駱深中逺認褒圖經何壯觀故事有蕭曹晴登北城積雨巳逾月久妨於此行雲山勞夢想風日幸晴明常愛往來處盡皆苔蘚生一壕新草木強半不知名寒食書事感懷寥寥官舍靜於僧雖有園亭亦倦登桃杏花隂流似水圖書滋味冷如氷坐觀棨戟慙無狀歸掃松楸恨未能得報君恩便休去虞卿前日本擔登送李堅甫中舍奉使還闕自洮西又入蜀曽歌出塞愁又遣使西州去國星辰動還家歲月流褒斜新路晚鄠杜故園秋歸對延和殿從容問講求漢中城樓二首解帶綬幽憂登城復上樓斷煙橫沔水孤鶩入洋州浩蕩成遙望凄涼起暮愁山中自有桂何事此淹留其二蘚徑踏層斑高林古木間鴈隨平楚逺雲共太虛間晚靄昏斜谷晴陽露斗山將身就清曠名路爾何顔凝雲榭晚興晚策倚危榭群峯天際橫雲隂下斜谷雨勢落褒城逺渡孤煙起前村夕照明遙懷寄新月又見一稜生山堂偶書幾日無公事山堂興頗清和詩防積壓丸藥趂晴明斸石新稜出澆蔬晚甲生此皆忙外得低首笑塵纓清閣治庭區紜紛齋閣簡應接身間喜枕簟慮靜厭圖牒孤芳媚深叢幽哢出密葉物理兹領會真境知可躡靜庵問此初誰築經營羡爾能依深還巨木就蔭覆高藤坐與境同寂來無人可憎一床黃臥具茂灌本如僧忘憂堂磴道循城近垣墻占地幽軒窗誰指畫硯席我優遊不許簿書到恐為圖史羞此心元自適何處欲忘憂夏日官舍省事公多暇虛心景更長捨書無可樂就枕不能忘短葛沾肌薄寒泉沃肺涼何當逢靖節相與話羲皇寄成都趙資政才承寵詔聮公鼎便謁除書别帝閽萬口一詞歌盛德四年三度福遐藩巳為魁壘無雙士更入摩訶不二門應笑臨卭病痟客最先參見在江原晴步西園急雨正新霽林端明晚霞松亭臨曠絶竹徑入欹斜花落留深草泉生上淺沙稚圭貧亦樂一部奏池蛙金影軒開軒俯清溪正在修篁內霜筠抱氷節爽氣常四會主人厭俗客日與此君對月上寒影來滿襟搖瑣碎忽憶故園修竹因作此詩故園修竹繞東溪占水侵沙一萬枝我走宦途休未得此君應是怪歸遲寄景孺提刑時按武興夾欄虛棧武興西使騎翩翩晚夕馳想過飛仙須下馬此中佳景入吟詩子駿遊沙溪洞聞有沙溪洞公將柅使輪還如探禹穴應見避秦人石繖形容古琳房氣象春若逢丹輦客問取虎文巾送郭榮叔秀才應武舉愛君才辨吐如傾圓直橫斜善講兵休弄向時間筆硯破蠻征虜是功名乞畫鴈寄涇州母使君寒影亂翻秦嶺月晚行高處隴山雲回中有客能傳鴈異日從公乞一群興元府園亭雜詠甚美堂潭潭棟宇盛窅窅軒窗闢高深與地稱可大張宴席府事如少休兹焉會佳客武陵軒水從前嵓來轉入後溪去中間載酒下各到客前住醉後皆恍然再來無覔處緑景亭竹間有幽亭所宜惟暑飮層隂隔炎日四坐障緑錦過午不可留單絺覺微凛激湍亭高輪轉深淵下㵼石蟾口臨之設軒檻清絶更無有愛此山中來應須坐良久凝雲榭朝雲南山吐暮雲北山翕來往高榭中留者頗堆積坐客如久之去須襟袖濕照筠壇積土削為壇險然在深竹中惟一詩石獨坐擁寒玉勿謂人少知此境不容俗桂石堂嘗聞陽朔山萬尺從地起孤峯立庭下此石無乃似愛爾常獨來一日須三四四照亭巒嶺附梁山汀洲隨漢水秋容上屏障左右二百里此景誰能論殘霞獨慿几埀蘿徑長蘿託高株暗曖蔽煙霧埀蔓巳百尺更引欲何處願少放餘條恐傷君所附盤雲塢幾曲上層城盤盤次文石愛之有佳趣不倦紆晚策禽蟲應見疑日遇此狂客北軒天上之貴神所居皆在北有軒正相望慢恐取隂劾余常過則趍不敢兹少息棊軒北城云最高上復有喬木埀蘿密如帳中乃營小屋時引方外人百憂銷一局山堂何以山名堂層石作崖巘余本嵓穴士每往不欲返公吏呈俗書還來愧冠冕靜庵知動以為幻既知即非靜名庵以靜者無乃自起爭為語庵中人勿以靜為病丹淵集卷十四終
