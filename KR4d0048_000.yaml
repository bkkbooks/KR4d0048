front:
  text: 宋故尚書司封員外郎充祕閣校理新知湖州文公墓志銘資政殿學士太中大夫知河陽府范百祿撰元豐二年正月二十一日尚書司封員外郎充祕閣校理新知湖州文公以疾卒于陳州之賔館享年六十有二其孤朝光奉其柩以歸以元祐九年二月五日葬于梓州永泰縣新興鄉新興里前此狀公行事始卒來求銘公百祿所畏者且同年進士也不可辭故書公諱同字與可其先文翁廬江人為蜀守子孫因家焉至立徙巴之臨江學周門人推為顏子其後又徙梓州永泰之新興鄉新興里曾祖彥明祖廷藴考昌翰皆儒服不仕考公以公贈尚書都官郎中妣李氏仁壽縣太君公幼志于學不羣鄉人異之都官公嘗誨之日吾世為德汝其起家乎將高吾門於吾廬之東偏以待汝冝勉之公時年十三俯而對日謹奉教自是晝悉力家事夕常讀書逹旦遂博通經史諸子無所不究未冠能文慶曆中今太師潞公守成都譽公所贄文以示府學學者一時稱慕之再舉鄉書第一皇祐元年登科第五調卭州軍事判官更攝蒲江大邑繩治豪放或辨折欺偽然後敦學政勸邑之子弟召其長者與語名教使歸諭里人再調靜難軍節度判官秩滿改太常丞嘉祐四年召試館職判尚書職方兼編校史館書籍以親老請通判卭州至未幾丁都官憂服除歸館又以母年請通判漢州遷太常博士明堂覃恩遷尚晝祠部員外郎賜五品服知普州丁仁壽憂服除熙寧三年知太常禮院兼編修太宗正司條貫時執政欲興事功多所更釐創造附麗者衆根排異論公獨遠之及與陳薦等議宗室襲封事執據典禮坐非是奪一官再請鄉郡以太常博士知陵州州𪠘徒倚於培塿之間土風習龎守長至者或鄙易之公訪民疾苦得城中羣不逞主名常以夕時凌轢途弄良民暮即闔戶不敢出及是率以事收至廷峻繩之且戒毋復亂吾治是後郡民慶弔相往來雖篝火宵行無復擾者上元嬉遊野民扶老携稚趨城市數習晏然父老相慶曰不圖吾鄉今日安居行樂近比都會也貴平男子依假靈惠以鬼道惑人遠近走隼爭投貨財將大侈叢祠公聞之乃移尉捕其首黥而徙之餘置不問以其材新甲仗庫嘗使諭尉曰西山之隈居者數家有盜匿焉亟捕之尉果禽盜鄉人神之知興元府漢中沃腴俗饒財寡文未有第進士者公先治庠序擇行藝之秀者使掌之風諭境內使民遣子弟就學暇日躬往閲視而誨導之於是風俗䆮改向學為多有盜雜居闤闠公使捕詰之叩頭伏發其藏皆穿窬所得未之易也土民每春出遊觀常苦秦隴惡少從褒斜間道往來剽竊吏不能禁公嚴治之盜不敢犯城固之上原巴城民頑逋租不以時人人苦鄉徭代輸破産公督勵之革其弊既復舊秩歷度支司封員外郎徙知洋州興勢環境皆山谷民以茶為産使者方行榷法歲課四十餘萬斤商旅不通山民及其孥荷簷趣郡遠者往返千里公條奏其不便時茶場歲額有曰綱外者有司新其法止通商於蜀出他路者禁之然蜀産茶郡居多商亡繇通於是綱外茶山積使者又督主吏必盡易之腐敗者償納人為憂惴公又奏論其不可皆不報茶司方輦致解鹽就易於郡冀以阜茶本而盡榷民間食鹽商旅不行官鹽復不繼於是民苦食淡公又言臣州榷茶雖久其間措置未有衷比又盡榷解鹽官自出賣不許商販雖利歸公上而民不便之冝預為津調娖然有備則法行之後售之民間涓涓不絶若一日弗繼則人亡以食詔為弛禁輿誦歡然代還判登聞鼓院數月乞郡東南除知湖州神宗召見延問公條對有緒建言二事一日洋與秦鳯壤錯比往時凶盜剽掠境上人不得安急則逃匿山谷恐一旦嘯聚呼白地劒外當小警請置吏於五丈原否則駱谷與華陽鎮相援以禦絶諸偷二日遠民詣登聞鼓院投訴無虗日間有判然易以敕律辨者官司不為區處第援舊牘抑却之冤民廢農桑走數千里抱書立鼓下非朝廷為民設官意請凡訟訴滯枉或不為決致詣闕得直者重其坐使吏知恤職民無嗟蹙上然之公資廉方居家不問資産所至尤恤民事民有不便如巳納之阱中必為出之而後巳退而齋居一室書史圖畫羅列左右彈琴著文寒暑不廢事親孝未嘗違去晨莫恬於遠官以便旨甘者十有餘年不趣時好不避權仇修其在巳而不求其在人者安義與命蓋超然自得平居以言誨諸子而自踐之者其大旨如此故凡與之遊皆名節文行之士顯用於今者而公獨不與焉命也夫司馬溫公嘗遺書日與可襟韻蕭灑如晴雲秋月塵埃不到光心服者非特辭翰而巳公博學雖星經地理方藥音律靡不究古篆行草皆能精之好水石松竹每佳賞幽趣樂而忘返發於逸思形於筆妙摸寫四物頗臻其極士大夫多寶之其殁於宛丘也梁洋之民悲思焉娶衛氏追封旌德縣君再娶李氏封永和縣君子男五人朝光為彭州軍事判官葆光舉進士埀光務光及幼未名者三人皆早亡女二人長亡次適進士張元弼孫男七人機楫皆業進士餘悉幼女四人平生所為文五十卷銘日
