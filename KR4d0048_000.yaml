body:
  text: 蹈直方而不詘兮不負其君樂吾土而徜徉兮不遺其親處單邈而懷國兮恤一物之不伸琢至寶而不售兮韞吾櫝而晦珍令有否而膠盩兮誠激烈而儻陳善則擇於太上兮不忘於梁洋之民芻豢牢醴之不吾嗜兮甘吾之芹黼黻貂冠之不吾好兮服吾之文道渺莾兮東南遊漠然命兮逝宛丘魂萬里兮返故州從先壟兮植新楸埀令名其不朽兮蓋不特王褒相如之儔石室先生墓志銘終吳郡重刋攴湖州丹淵集序文湖州髙攴健茟虎視西州與睂山蘇氏並轡聮鑣接軫中原若無能當其兾麗鸛鵝而在當時秪知其畫竹于詩文莫有好者見于大蘇跋語何况吳蜀萬里寥寥四百馀年之久乎曲沃家誠誠于宋寧宗慶元改元編次其集與先生孫所編略有更易中間遘黨禍熾烈所有與蘇家文字一切抹殺不存至有改子瞻為子乎者嘻亦可笑哉非賴蘇集互見將不謂公與蘇家少情雽慶元刻夲世所罕覩頃內江李務滿重為校刻而吳士人吳建先受之雲間陳仲醇仲醇復為校讎付建先剞劂以鮮藏書之家縱有之上者錦苞綾襲供骨董之玩在塵積雨謮光蠧魚之飱未嘗討論也不佞鄙陋粗俗豈足以窺先生萬一近得借觀疾覽具見才逸于翩翩欲仙閎議曠􅲎侃侃不阿詩律清新興髙寄逺大都出入杜陵文體煥爛句琢字煉不無蹤迹昌黎皆不苟茟而心能運腕腕能應心如其畫也者于宋體其超然持詣者歟誆可以畫竹藝掩于高哉宜雽虎視西州與蘇氏並馳也丗傳先生吐舌至鼻三疊如餅狀雖將赴湖州卆于宛丘賔館其仙者當不誣耳杜念其集經黨禍之讀刪削過半正與范攴正忠宣二集相類然當時爾誠之别為續集年譜附録今時李務陳仲醇吳建先後先相與挍刻吳蜀萬里寥寥四百餘年皆非志先生之心哀先生之遇者哉建先謂不佞冝有序序非不佞所敢當既讀先生集有概于中故不辭而書之如此庸以質之仲醇萬曆庚戍閏三月三十日吳郡後學錢允治撰蘇漢先書按先生曾孫鷟所編家集詩分為十八卷各以所居為别東谷古今詩三卷南豳古今詩二卷臨卭廣漢古今詩各一卷陵陽古今詩三卷漢中古今詩二卷梁洋古今詩三卷西岡古今詩一卷畫厨樂府雜詠各一卷東谷先生里居也而青城山六詩普慈三詩閬中雜詠與夫過興州晴碧亭蒼溪山寺新津退思堂左綿富樂山海師彭州南樓詩皆在焉臨卭先生官居也而彭山縣居題象耳山過金雞關晉原清溪閣詩皆在焉廣漢詩中則有成都楊氏江亭劒州東園詩陵陽詩中則有續青城四詩子駿寶峰亭華山等詩漢中先生出鎮之地則有江原善頌堂峰鐵峽詩西岡先生京師僦居之地復有閿鄉值風大熱過散關將至隴城鳴玉籌筆夜發散關等詩雖或出於寄題或賦於沿檄蓋未可知然别之以所居之地則不能不致後學之疑且超然臺賦蓮松等賦雜出於詩中樂府獨殿於詩後挽詩既别之以門復附之於詩編次可謂不倫矣先生之詩用是不復可譜但譜其平生出處大槩耳詩之次序則從其舊惟取其詞賦列於首篇以見先生用意於古學樂府次之古今詩又次之他文又次之仍分為四十卷又尋訪先生遺文分為兩卷復以諸公往來書翰詩文繫之於末庶知先生師友淵源所自云慶元乙卯五月既望南窗書文與可先生丹淵集目録卷第一詞賦超然臺賦石姥賦蓮賦松賦問神詞三首并序去陵秋望送李道士哭仲蒙二章臨高懷嵩哭任遵聖哭許駕部送人玉女登山卷第二樂府雜詠秦王卷衣殿前生桂樹臨高臺自君之出矣東門行西門行塘上行釣竿烏生八九子野田黃雀行苦寒行苦熱行俠客行巫山高水仙操大垂手採蓮曲對酒白頭吟芳樹武溪深走馬引起夜來長安道王昭君四首吳趍曲三首劉生紫騮馬驄馬卷第三詩五十七首舊集東谷詩貴侯行朱櫻歌拾羽曲沙堤行五原行讀武紀題東巖隱者壁東山亭水邊春半採藥宿野人山舍後溪晚步山中新晴鹽亭縣扣雲亭杜逸人歸龍山曉入東谷東谷久坐書所見東谷茅齋夏樹田舍高槐春閨採桑青城山丈人觀上淸宮張少愚書院誓鬼碑天師栗孫知微畫早晴至報恩山寺楊山人歸綿竹間遣睡起梅永泰劉令清䂀亭貧居惜花正女吟莫折花織婦怨野花嘆均逸亭普州三亭東溪亭碧崖亭送郭經知縣過祿氏山齋題李處士月軒賦興州池亭方湖巳下蒲氏别墅十詠涵碧亭白蓮堂芙蓉溪魚池蓮池清蟾橋稻畦朝真堂草庵卷第四詩五十一首舊集東谷詩蒼溪山寺五里三灘咱公溉王會之山亭謝友人寄畫書墨君堂壁二首送馮允南倅梓宿東山村舍季夏巳亥大雨謝任遵聖光祿惠詩謝任師中荔支霹靂後溪黃功成嵐城閣鳳山古祠靜中吟送黃庶先赴舉大熱見田中病牛呈里中諸友寄任遵聖光祿庶先北谷謝王庶軻見贈諸篇前溪獨遊書緑帷亭壁青山道野老誰氏子秋興二首書平泉草木記二首重過舊學山寺書隱者壁訪古寺老僧不遇書壁村居宿田家大熱間樂寄楊歸一行李載書成詠還友人詩卷上亭北軒吹笛三首寄苗運判二首孫懷恱𥿄本亂石種榆旱雷久不雨喜見晚雲卷第五詩五十一首舊集東谷詩賈佩蘭歌徐太元蓋寬饒諸葛豐新津退思堂墨君堂晚晴憑欄山舍早起探晴東谷獨往西崦道友送李野夫兼簡公擇任居雲棲枝閣朱康叔棄官求母蓬溪均利泉冤婦行林居墨君堂鑑崖宿超果山寺富樂山海師彭州南樓交師演古軒新晴後溪樹隂黃秀才書堂讀楊山人詩巳師竹杖晚至村家雨喜客過墅居東窗大雨芹歎憂居任氏鳴璫橋過友人溪居江上主人詠月五十攬照梁景和何桂林𨫼吏錦屏閣閬州東園十詠清風臺四照亭柳橋曲池明月臺三角亭花塢藥欄郎中庵卷第六詩四十首舊集南豳詩和仲蒙石龍渦和仲蒙山城和子山春日雨中書事見寄二首馬子山作題名記官舍書懷二首登邠州城樓秋盡登白佛閣極寒謝惠橘登山城書事送夏殿直送錢判官歸蜀覲親遂之嶽陽和梨花山櫻秋子桃花杏花秋日寄呂永壽微中吟春琵琶泉和子山種花五首和張屯田雪中朝拜天慶觀二首送酒與呂令二首初雪對雪獨酌槐莊渡口約春和子山遊西湖三絶探春春寒卷第七詩四十首舊集南豳詩新秋讀書貧士行馮氏道中早行宿李同年蔭碧亭李生畫鶴豳州寄友人和仲蒙夜坐明教院在涇北賀貴谷和仲蒙夏日即事西軒秋日和張屯田秋晚間望春庭過永夀縣東谷偶成宜祿昭仁寺後軒過高塶城夏日翠漪堂約遊玉峰園送張無悔赴調避暑值雨咸陽道上晚晴歲晚登清素院北閣炭泉險道玉峰園避暑早起覽物成詠寄馮永州暑夕待月以病不遊玉峰興平原上亦熱因寄永夀同年亭口淺水原興平原上西湖荷花石龍渦水葓黃蜀葵千葉鼓子花鄠上懷古石竹卷第八詩五十一首舊集臨卭詩卭州東園晚興雨過側調題象耳山寺題舒太博清溪閣縣樓獨酌殘秋郊外郊外靜林詩僧巳老高堂山兜率寺間居院上方晚景李道士惠琴軒集二首彭山縣居下金雞山過金雞關夜靜獨登小閣送黃夢得送郭方叔送張郭二秀才赴舉謝人寄蒙頂茶謝惠茶圖茶詩雨後看山因憶黃世南先生詩以相招送楊議卿赴舉和春難度三首和何靖山人海棠訪李奐山人隱居冬晚書事晚次江上十月梅花吉祥院書鶴鳴化壁題鶴鳴化上清宮寄題何靖山人隱居寄楞嚴大師揖山閣杳杳堂安仁道中早行竹閣尋春孫太博遊火井因寄墅居面川亭南亭北郭讀史夜學畫眉禽鶯佛頭卷第九詩三十五首舊集廣漢詩和子平弔猿和子平悼馬泠瓶中秋夜試院寄子平贈觀音院廣師送韓都官監渭州酒成都楊氏江亭漢州王氏林亭春雪呈知府龍圖同蘇子平登延暉故亭金桃房公湖錦雞竹棕無為山寺劒州東園運判園瞻民閣讀淵明集張太博歸閬中寄成都監庫石屯田宿隆平精舍弭蓋亭什邡道中夜思寄蘇子平祕丞西湖猿幽沼步月中秋對月懷寄鳳凰山鄧道人秋日晚晴呈同院戲呈鳳皇長老用師郡學鎖宿督子平茶墨李晦叔醉老庵和邵興宗碁聲卷第十詩二十三首舊集陵陽詩昭慶觀續青城山四詠天倉山威儀觀飛赴寺香積寺夏氏枕流亭已下五首夏氏江居鬭碧亭天隱洞直鈎磯醉經庵杭州鳳咮堂已下杭倅胡學士官居四首濺玉齋方庵月巖齋寄員文饒屯田送少訥還青神送無演歸成都謝閻君見示岷山賦閻生談黃庭送范堯夫謝推官惠篆字和提刑度支王店雞詩送李道士送韓山人卷第十一詩五十四首舊集陵陽詩二年不見月夜聲送棊僧惟照送喻介夫飛泉山寺山雨送牟太素山人送龎中秀才遣興效樂天遣興三首中秋夜坐遣興臨闤閣野徑寒蜩虹下飮古井寄何首烏丸與友人霜柏亭試墨閲史感事冨春山人獲石平雲閣偶作問陳山人覔丹猒蟲新晴山月送堯夫二首秋日田家二色芙蓉洗竹明堂赦不得觀賦詩經史閣有懷景仁侍郎吳公惠酒因謝登雲山閣寄吳尹和寄白聖均和提刑郎中閲兵之什晚坐山亭口占送王晦叔重送又六言登山亭霜柏亭殘梅和張推官元夕小閣戲書伐枯株可笑口號七章近日卷第十二詩五十首舊集陵陽詩送知府吳龍圖送通判喻郎中再送喻倅二首山城秋日野望五首東丘老人送堅甫同年五首送李道士師厚還朝牽牛織女金鳳花亭前高柏凌霄附柏謝黃森惠詩并草書東齋悶書寒食感事呈同官惜杏讀蔣都官畫像記題黎公照序訓堂朝陽亭觀風閣山池憶西湖舊遊再送師厚平雲閣觀雨不雨久雨山園石泉促史少訥江豚北園梨花華山二首黃崖洞謝推官惠甘蔗寄呈溫江安寺丞嘲任昉袁術偶成即事薄命女蘇子平服山藥雜言卷第十三詩四十四首舊集漢中詩李太尉趙一張騫冡祠駱谷慈濟院雙楠觀音院怪松張景通善頌堂夏夕寄宇文公南北禪龍井送潘司理祕校又五言收復河湟故地斜谷泝舟觀石門宿斗山奉真宮晴望漢川淸景堂梁山大雪寄夏左藏二首狗溪迎湫祈雨輒應晚興嘉川道中寄周正孺還李中舍奉使集雪後寄景孺提刑寄吳給事三首不飮自嘲寄紀禪師中梁山寺四絶仙人二首鸚鵡石柘枝石狻猊石崑崙石羅剎石珊瑚石病眼和務深嘆琴卷第十四詩四十九首舊集漢中詩寶峰亭子駿運使八詠下同桐軒柏軒竹軒巽堂山齋間燕亭會景亭呈李堅甫中舍采芡峰鐡峽周思道如詔亭喻氏歲寒山居瞑禽圖北齋雨後北城樓上晴登北城寒食感懷送李中舍還闕漢中城樓二首凝雲榭晚興山堂偶書清閣靜庵忘憂堂夏日官舍寄成都趙資政晴步西園金影軒憶故園修竹寄景孺提刑子駿遊沙溪洞郭秀才應武舉乞畫鴈甚美堂興元府園亭十四詠武陵軒緑景亭激湍亭凝雲榭照筠壇桂石堂四照亭垂蘿徑盤雲塢北軒棊軒山堂靜庵卷第十五詩六十三首舊集梁洋詩書東谷舊隱崔覲詩寄道澤師竹軒題密州快哉亭獨遊夏日湖亭試筆楊山人草堂詠鳬弄珠亭春望新晴望北山城南江館屬疾梧軒北園避熱施公潭罷郡送文鑄師遊襄陽夏日南園北樓晚晴望秦嶺柳枝送王存之放言寄褒城宰贈竹竹答湖橋守居園池三十詠橫湖書軒水池竹塢菡蓞軒荼䕷洞篔簹谷金橙徑荻浦蓼嶼望雲樓待月臺二樂榭天漢臺吏隱亭霜筠亭灙泉亭無言亭露香亭涵虛亭溪光亭過溪亭褉亭南園北園寒蘆港野人廬披錦亭此君庵淘河湖上衆禽盡以俗呼為題五首連點七拖白練泥滑滑提葫蘆詠蓮題友人書齋壁張淨琬待雪卷第十六詩四十七首舊集梁洋詩送提刑司勳翡翠平阿馬上依韻和圖南已下共五首過朝天嶺晚泊金牛金牛相别呈誠之大桃途次見菊弄珠亭下柳弄珠亭間望寄子駿運使寄景孺提刑公館衰晚欲雪晴山臨漢亭雪中寄景孺晚