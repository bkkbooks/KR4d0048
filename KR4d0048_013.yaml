front:
  text: 陳眉公先生訂正丹淵集卷十三
  hash: sha256:0d40284ecd88c33746ce61a95a4b3da466631335bc16ec67fbce0af2ff33f0d3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_013-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳吳一標建先詩四十四首李太尉固昏雺翳紫極橫霓勢光大妖威集凶冀忍穢實中頼姦鋩日増剡誰汝觸取害驕根愈自固所植利孱昧容容彼群輔竄伏皆䑕軰側視况未敦肯復形嘆慨太尉漢中士氣引八極外岌然處大麓天下聳風采自開煑餅禍賊意巳莫快移書瀝憤膽語激益睚眦罹冤卒用此數與六九㑹基兹𬒳沈酷爕免乃天貸高忠掲萬古宇宙莫能載埀晶耀簡策糞土視廣戒歸來葬埇墝祠冡兹儼在宏垣敞深豁巨木森晻曖神靈皎如日過者知再拜同愚忝郡寄公里曰境內心期欵舉像所顧官有礙精衷託明酌舉手向東酹趙壹壹也本西縣狀㒵徒磊砢其才固難得行有所不可世人詎能掩而爾輒自我旣慾焉得剛所守實未果抵罪當至死其中遂水火一爲人所活上賦何瑣瑣爲文好譏罵惡吻事掀簸逢陟與規軰次第滋爾禍無成困鄕里倔僵老愈叵何煩遣相視器識自么麽余因守漢中作詩掲墓左勸君莫學壹學壹終坎軻張騫冡祠一日災冢中梁山麓漢水濵路側有墓高嶙峋叢祠蓊蔚蔽野霧榜曰博望侯之神當年寳幣走絶域此日鷄豚邀小民君不見武帝甘心事逺略靡壞財力由斯人駱谷高峯偃塞雲崔嵬層崖巨壑長峽開龍蛇縱橫虎豹亂古棧朽裂埋深苔行人側足恐懼過飛鳥歛趐哀鳴囘君不見德宗注意用姦慝大駕從此蒼黃來慈濟院雙楠雙楠高聳綠氤氲宻葉長柯䕃四鄰佛現寳幢經幾刼天開雲帳待何人護持必有諸賢聖觸犯寧無惡鬼神付囑寺僧常灑掃莫令向下有纎塵觀音院怪松恠松屢見無如此毎度來觀說向僧若遇風雷宜守護恐生頭角便飛騰秋聲遶殿隨齋磬夜影侵廊對佛燈韋偃畢宏今不在欲求人畫有誰能江原張景通善頌堂庭前雲蓋碧巉嵓堂上先生雪滿髯說藥客來聊下榻謁齋僧去便埀簾種時法好花難謝買處錢多石易添子舎光榮身壯徤只將香火事華嚴雲蓋堂下石銘夏夕池館蕭然夜欲分滿林蟲鳥寂無聞風吹松子下如雨月照荷花䌓若雲泉作小灘聲浙瀝筍成新竹氣氤氲清隂正覆吟詩石更引高梧拂練裙寄宇文公南自文州曲水令棄官彭澤長謡便歸去君辭曲水亦其徒一官何藉五㪷米二子况皆千里駒懶對俗人常答颯厭聞時事但盧胡從來綿竹多賢者唯是楊雄識壯夫北禪龍井城北神龍去幾年近日人言歸舊止澄潭沈沈不可近百歩之外毛骨起今年興元輒愆雨衆懇問龍求滴水香煙纔上雲滿空一夜滂沱遍千里送潘司理秘校二首巳自多時賦式微五峯佳景夢長飛四年逺地爲官去萬里高堂喜客歸下馬便呈新授敕開箱争認舊縫衣鄕人覔次來相賀蓴菜鱸魚三軟肥又五言曲棧繞斜谷鉤欄天際分吟鞭搖嶺月倦枕拂溪雲好景不關俗新詩皆屬君西南有歸客一一幸相聞收復河湟故地啞兒峽西山已塵䭾金輦帛無斷群河湟故疆盡收復解辮厥角歸如雲堂中玉帶賜丞相隴外金節酬將軍唐兵萬里若日月請作古今人未聞自斜谷第一偃泝舟上觀石門兩岸奇峯最爲佳絶北風吹雲落寒水逆波刺船行五里層巒夾空抱叢石萬劒側脊翠烟起草木枝葉自殊别禽蟲羽毛亦奇詭安得鷄冠數稜田便可誅茅此居止宿斗山奉眞宮山形如斗勢坡陀魁枕杓擕萬尺高近世無人知火棗當年有客得蟠桃靈蟾尚隱凝瓊髓神鶴常歸隨玉毛一夜杉松響天籟滿空疑是奏雲璈晴望漢川城頭看雨霽天地若新浴晚容變雲霞秋意著草木四時易遷改萬事苦迫促舊山何日歸三徑有松菊清景堂公外捐塵慮閑中見物情蕉花紅炬宻竹節粉環輕鷰泊簾鉤語蜂尋筆架鳴静能知此趣吃吃笑勞生梁山大雪嚴風吹屋鳴向曉尤凛冽應從北山上一夜吹猛雪幽人不能飮身體冷如鐡空向龍具中苦吟聲不絶寄夏文州左藏佾二首翩翩貴公子佳譽本能文大第辭京輦高旌擁塞雲勸農唐刺史養士漢將軍莫刻和戎誓朝廷立功勲其二寄語文川守謀邊想甚勞封疆通鳥䑕種落雜猿猱甲馬廉頗少詩書郄縠高當須辦乃事不用恥弓刀狗溪迎湫祈雨輒應夏雨渇乆矣秋苗憂槁然至誠通祝版靈貺逐香煙桐祓應無訟囷倉定有年曹公三大堰一夜滿民田晚興衆吏晩巳散西園常訪尋覆棊苔閣静行藥草橋深草色晴承屐松隂宻灑襟山蚿欲重賦倚竹聽清音嘉川道中寄周正孺草木春深後山川雨過時清佳常滿目衰倦敢忘詩好尚舊若此飄零今比誰争如畫堂上日日聽新詞還李中舎杞奉使集奉使道中詩百首古人遺落盡冥捜自憐吳蜀佳山水一夜燈前得遍遊雪後寄景孺提刑時按洋川雲隂低重雪花繁夾道歡謡引使軒何處郵亭錬佳句綵毫揮罷索清罇寄永興吳龍圖給事三首高春鈴下索焚香鏤管紋牋發綵章應在後園凉榭裏玄霜仙㡌紫霓裳其二見山樓逈倚晴虛看展終南百幅圖聞說二林尤勝絶想公高興在香爐公有别集在爐山其三土風豪盛古長安誰謂元侯臥治難使客不來公事少一牀蘄簟石林寒不飮自嘲能詩何水曹眼不識盃鐺而我豈解吟亦得不飮名持此以立世可笑實浪生寄紀禪師自笑塵中游宦客長輸林下坐禪僧水田百畆一區宅歸老城南何日能中梁山寺四絶臺殿晻曖山蕉蕘雲霞鮮明天泬寥側身下望厭塵世安得羽翼凌九霄其二煙巒彩翠霜林紅層樓複閣雲霧中襟懷太爽睡不得一夜滿山鈴鐸風其三群峯南北争嵯峨如㵼大壑翻衆波愛之欲把入圖畫世無好手將柰何其四上方梯磴繞嵓頭誰就孤高更起樓直望漢江三百里一條如線下洋州仙人二首身著青羅緋衣裙口誦白羽黒翮文半空欲下復不下囘首翩然歸五雲頭梳三角䯻餘髪散埀腰時伴秦樓女月明吹紫簫山堂前庭有奇石數種其狀皆與物形相類在此乆矣自余始名而詩之鸚鵡石静立身微聳驚窺首略囘何人將至此應自隴山來柘枝石紫蘚裝花㡌紅藤纒臂㡚被誰留斷拍長舞不教休狻猊石巨尾蟠深草豐毛覆古苔雕欄臨綺席長欲上香臺崑崙石雨漬身如􅃮苔侵面若藍問時都不語應是憶扶南羅刹石洗濯形容露剜挑口眼通試教常點檢毎夜定飛空珊瑚石海底初生處扶疎苦未全幾時隨鐡網流落漢江邊病眼病眼毎至午其視何昏昏安得張中書就欲求古方吾友務深有嘆琴之什運使子駿荅之佳章務深亦使余繼作白水滿方湖山中好秋色逋翁促瑶軫來坐湖水側臨風起高調此興浩無極波静戢游鱗雲空矯飛翼蕭條變林野萬籟一以息且莫緩商絃令人涕橫臆丹淵集卷十三
