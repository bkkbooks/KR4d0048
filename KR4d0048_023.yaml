body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳吳一標建先記梓州中江縣樂閑堂記客有言於余曰天下郡縣之政其守令或謂有難乎其力者氣俗狃狀好犯幾禁之使然乎何獨常指其地而固名之也余曰不然是其謬泥迂曲不逹其體而後獲此之論也夫民之所以資而生者求將以自贍其欲其勢不能無動以役其所任之智旣爾則情貌矯譎𥘉若不可知其是非利害之形煥然常自兩立矣孰者或違聖賢所正之道與國家所制之令者哉我凢以其取聽於巳者以義而枉直之無濟以私所以理斷矣郡縣有大小其事有煩約之異才者臨之一術也雖民訟雜集吏書擁進其於區處但財勞指顧耳曰難者何耶昧者不能故有人情狡詭不可諭契要深濫不可辨之說是則天下郡縣常容有不可調一之治者矣豈其然乎中江爲梓之三萬戸縣生齒旣衆分地旣陿其爭闘之辯侵越之訴畨巳遽作紛午交衍鞭之庭而械之獄者亡虗日矣所决一未厭其願則號冤唱屈奔走跳盪于勸農使前者絕復續焉士大夫以無可柰何而適爲之令者何嘗不望名而起畏茲有年矣河南廖君自福昌移治于此聞之所以爲政之大氐也無急擊無緩縱棼以櫛之結以觽之摩撫柔愿規厲陶突善端姦幾觀聽而盡民自戒告無敢欺瀆曾未逾歳巳底無事噫才者也君亦自顧如此宜順是以就燕佚之高乃營聽事之西爲堂四百椽萃蓄經史以朝夕訓育子弟爲園五十歩蒔植蘤木以時節笑㑹賔友深虗曠潔雅若世外他日冩書畫圖抵余使名而記之余因爲文道其所以爲是之意復以其堂命之曰樂閑以君之政治之閑而於此爲樂也君學精而才長貎温而氣嚴襟矩風尚淹重宏遠如使其立行道之地發畜德之府蹈切烈之途闘名聲之塲可量也哉簿書之期㑹土木之興作於君末故也豈煩余之多言乎治平元年五月日記梓州中江縣新堤記縣爲江所環因名之其源蓋出于綿之龍安鹿爬山𥘉若二帶其深財漸車至神泉始與諸谷瀵水㑹爲一西至于羅江南至于陽平匯東南復吞旁流廼浩漾爲洪波浮于縣之西郊歷坤隅勢下頗壯猛南注折而東斗且閼遂㢋擊左岸土毳善崩歲歲內蝕若刳以刃若掃以帚邑人惴恐弗安厥居治平二年春河內廖君子孟爲之令將解去尚訪遺敝及此卽行視歎曰是將禍于後者失吾不爲地陂而民魚有日矣於是料材課工趣之成期𥙷完墊漏塡築堅垍以循㳂而推軋之其夏大雨澤潦屢集至此力不勝廼逶迤漢安王諱行復走故道積塡累塗隱爲金堤望之岌然直偃横斷初民來觀萬首如蟻朋行旅聚讙譟踊躍詠誦今德老穉一口且曰秦之冰唐之兼瓊嘗以水利遺蜀民民至于今神祀之今吾廖君殄水害於吾邑吾邑之人又將何以報之哉謹當戒告子孫卽其地以祠世世不敢忘也君聞之笑曰過矣此非所以盡吾之所爲者曷足以云爾之德耶貢士賈汝奇等二百人遝然進而言曰夫古之賢者凡是建立豈與夫蒙其利者必固徼其所以見思者耶蓋仁惠浹人其乆愈深雖欲巳之自不能矣竊謂君之懿迹與古何愧當附之金石以信于萬年君又笑曰過矣愚何敢當此願母言謹以謝諸君汝奇等退以圖以書詣余求文其言具如此余受之曰是可紀也廼爲論次其所以云隄凡大小五其長共百三十七丈高一丈廣倍其高用人三萬計日四十五隄旣成無有一人議之曰不可者噫如君者賢令矣梓州永泰縣重建北橋記上卽位之明年永㤗縣重建北橋旣成其令郭君經與其佐史君潤辭有請于邑人文同曰經潤辭不佞竊廩食於此伏自念終無以施短才立異効鄕者議與斯民興是役以利其徃來此前人憚勞畏譏乆而不克爲之者工今休矣問諸左右約諸所以調用民實不艱其供而咸謂其且當然者經潤辭輒不愧宜其文紀其上敢以累執事庶因之以傳乎亡窮經潤辭幸矣同曰唯唯二君之治端幹明以㓗便人謹巳聞之長老舊無有也均繇賦平訴訟它人蓋亦有能之者夫何足書是舉也同甞觀二君之爲乃有志於行愛惠之深者勞躬率心旦夕歐勵暴外風露曾不以懈勤王事恤民隱古之賢吏凡不過此是可書爾二君雖不見屬同亦將件次休績揭諸華表之末以視于後人况二君所以來之意誠且愿耶謹不避譲爲之詞云維縣爲梓之所領西上府治蓋百有三十里叢岡沓嶺圍聚邑屋疆畛蹙陿號最險下然賔旅還過此焉要隙大氐閬中淸化始寧符陽諸郡所仰二川産殖繒錦枲紵荈茗刺繡鏤刻髹治之物與所市易牛驘羊彘絲繭椒蜜之貨日夜旁午絡繹它負羸揭抗蹄裂局如水上下故北出之道趾踵相織近郭有澗自東迤西横匯曲决峭絕傾㫁自昔經制有橋甚偉以利其渉逾五十祀至和甲午夏潦浲溢遠谿逆譲噎滀不冩鐫豗隑岸級礎崩納角楹翹虗羣版散墮日欹月䧟以至大壓庸吏數易一不省問人擠溝馬還濘間則有矣維汾陽君爲令之二年慈惠宣浹民實信頼諸敝巳捄回力圖此因倡于衆曰是橋廢圯爾所痌悼予其爾復謂予何者萬口一和令謀我恊不煩令指願進諸辦材糧交委日謁就事於是集斤鋸㑹錐鍤治木伐石均功授巧維武昌軍適調此尉喜相厥役與令鳬藻昬旭臨視犒饟豐美作息時節咸樂其用無少倦􅒵始癸卯仲冬之丁未末訖甲辰孟春之壬子幠棧杇堊一巳絕手觀其横虗亘遠妖矯虹截鉅載鉤㩴攅扶瑣綰覺直如削堅鞏如鑄厓亷褥緻阿榮跂竦湍瀬搪激無以泐其固風日掀暴無以液其壯百數十年之利過莫知爾旣而行者止居者起田野甿􅊢閭閧賈儈提引穉㓜扶翼耆耋聮行散走環擁登降睨高窺深歎息欣喜如是累日始肯罷靜爰有杖者倚柱而歌曰昔政之鄙寢以毁兮今治之賢倐以全兮興事以時罔齎咨兮取用有度胡恕怒兮無貲之仁濟斯民兮不朽之利安此地兮同旣爲貳君委以論譔以詳言之矣復取杖者之歌系于後刻石道下以永行人之思治平元年二月一日記東橋記縣旣宮於羣山其修隴楙麓逶迤曼衍分勢而住爭㑹于左鯨偃鼇卧尾吻相屬谿溝澗谷蟠綰破斷蓋荒源野溜瀵湧潨激夏浲秋潦相倚爲暴故東郊之地少夷陸矣距市門百舉趾衢道横裂岸土脆墮舊架短彴􅋻劣湫下歲累民一再易登揺蹋漏過者歎愾如是不知凡幾百年人無謀之北橋成之明日其令經尉潤辭又相與議曰此旣爾舍彼謂何譬之像飾冠笄而不顧其袂之壞衊豈威容哉材糗羡贏幸可并就遂移工爲之廣陿四楹咄嗟以具無慮治木百章礱石百磸覆瓦五千枚剖竹三百个役匠四百指費曰三千刻無横歛無雪使而告罷矣噫二君者孰爲其端然負此千室之邑耶發巳之仁興民之利實亦盡其所職矣同復從而文之以道建置之始曰經者字義府姓郭氏鄆人曰潤辭者字堅叔姓史氏眉人曰同者字與可姓文氏縣人成都府運判㕔讌思堂記天下之事物常相與冝稱則文理順而制度得或鉅細輕重一有未合率病之以爲不當然遂起衆論矣區宇之大吾宋盡有之四指之極幅員萬里旁裁直製界爲諸道其置使以轉運爲名者常愼選注徃服其職底財賦察僚吏宣布威惠顗假之柄其所與蓋巳重矣惟劒南西川原壄演沃甿庶豐夥金繒紵絮天灑地發裝餽日報舟浮輦走以給中府以贍諸塞號居大農所調之半縣官倚之固以爲寳藪珍藏云其所謂佐者旣非齪齪循絫歲月者之所能得其所止亦當崇大閎顯與主者儀形無欹缺始云其可矣今其所謂佐者之居舊嘗一切置之尋廢旣復亦踐襲徃制囘曲庳狹不足以視淸曠講燕休餘基蓊然蔽没蓬藋嚮所涖者未遑營之職方員外郎霍侯以經行明修所赴冝頼將漕之貳實以才擢旣至攷䆒內外靜煩省劇隱謬革悛潜利宣章列城信畏俯伏觀望不煩告諭自底恬肅惟是居處厭不如事思有以增易之使夫文理制度一與事物相表襮矣龍圖閣直學士趙公昔總外計其巳詳此今復杖節臨鎮于是聞侯之議志與侯恊乃規斥其地墻爲一圃集材於羡命工於隙合諸意慮授以程品築隆址植巨厦曾不累月匠以成告危譙支空廣廇延廕衡欄擁衛牎戶通㓗若翔而尚矯將蟠而復振奇巒秀巘發遠思于其上鮮蘤珍木恱眞賞于其下寛衺可以觴賔侣靖宻可以籌金糓壯哉雄乎誠大邦之崇構而外臺之偉觀也旣落之侯謂廣漢郡尉文同曰是乃昔之所可指處今巳化爲佳境爾無石以載疑事之闕將以屬子子其謂何同曰諾退自念昔韓退之爲王南昌紀滕王閣柳子厚楊長沙叙戴氏常皆部吏也同今奉侯命而記此職正冝矣其敢以不敏辭乃次其畧刻置宇下以夸示永乆然慙不文治平三年二月十五日記綿州通判㕔伐木堂記巴西郡處二蜀之㑹人饒地腴賦貨繁茂官於是者力勤于它應兩道使傳之出入領八邑民居之利病二千石旣主辦于上事以熟至則爲之商輕重决可否爲其丞者最繫一府之煩畧繇體均勢平上下易交有從事可以持未便比膝較語以相辨白研理之極得平而後去有椽屬可以覆訴競議法律恬妥詳緩鋪述枉正不用惴懾以盡意見丞才如彊明則攬衆說之是以與厥長相名而行故無有不可外人之善議官政者或齟齬踸踔高簡自用不以誠盡下則庶務放紛所趍背盭以至民輸冤吏肆姦泪淢龎緻廢亂條紀是則聽斷裁撥猶且未給又豈暇更營館舎恱書史以偃取佐郡之樂者哉故子駿來是州而得以爲伐木堂也聽事之東舊有羡宇􅋻陋偪仄欎而不舒子駿至未幾而宿積乆敝切理以解紛亂梳結內外次序居餘間廼㯙匱篋出簡册以治素學顧此地謀高新之㑹羣材溢山流積岸下移運掄擇以足其用增引欹裂改貿陳蠧凡成屋大小共若干楹軒牎虗明几案新潔視公事巳此焉旦暮子駿治易有聞當世不以其能自爲夸高尚取詩人以道德相切正之義榜名其楣朋友故舊有來過者必引納於是講䆒不倦廼知子駿非但如衆人者築觀宇設亭榭以侈巳之燕逸蓋將於此窮爻考辭磨瀝心髓以㑹三聖人之意爾堂成明年俾同爲之記子駿姓鮮于氏名侁閬中人著易斷彭州永昌縣治巳堂記常人患負巳之所有而不能自增廣之猶田焉雖美沃腴墳殖蒔蕃猥然弗時芟薅亦巳見其報之㓕裂如也其有紃鈆故高懼忽墊墮務以不足耻其躬營營焉日求所以勝于心淬愈堅而礪愈銛者非賢者誰其能之狄道李子忠性明徹而才果利厥聲鏗然憺于縉紳崇卿巨侯交啓薦辟今尚令于永昌也其處之譬倕之視桮圈而丁之睨㹠莬豈假施其功而肆其力欤旣至未幾乃構堂于其所居之西北隅闢二室敞一軒曰蒙曰晦曰黙總而名之曰治巳脩筠珍幹羅立環擁寒溜衮衮渠行沼滀茂樾淸嚮旦夕滿坐子忠公事旣休卽來其間其所以題之曰治巳者有㫖夫楊雄曰治巳以仲尼曾參曰夫子之道忠恕而巳矣子忠其尚以我之所得者爲未厭將酣飮而飽飫乎旣蒙且晦而又黙於此期深探而極取之乎噫內以忠而盡乎心外以恕而接乎物如是豈獨行於世而無所悔也愚將見其騰于天而没于淵横軼于四海之外孰有一議而缺於巳者耶子忠之賢七十子之徒也見屬記之觕爲道此熈寧二年十一月十五日記武信杜氏南園記慶曆中武信始奉詔立學郡人杜氏方將教其子航乃合其州邑士人之議聞府具書召予領其事予旣至暇日多游息于杜氏城南園亭當是時其處所始經度編列排置未若完具然巳見其氣象雄侈縱衡高􅋻次第甚設私自念在蜀土田險陿民屋䌓㑹得平地若頃許愛惜摩撫分溝裂畦種種蒔植于其間冀四時孕利出没相屬號爲中人生涯者百二三爾是能捐倚城腴田萬金爲游觀燕佚之所將誰肯然耶杜氏嘗亦指而謂予曰有一子其材性以嗜學家亦幸歲入有羡可卒就其業後時欲於此飾賔館於此敞書室於此開讌堂於此闢射圃使四方名人聞士或至卽舎此相與朝夕講肄評議將贍給之無厭或異日渠能挾藝業取科級歸以㑹郡官鄕人嘉辰令節于是爲一日之娛以榮其私此區區也予心尚之後予從官關中相去逮十年其子果登嘉祐二年進士客凢有至自武信者語次杜氏園亭必曰夥是甲蜀矣岑蔚幽邃明露宣豁有取必得心適意㑹實佳境也復見府中羣公燕集之詠大誇花木之麗池觀之美予旣恨不能再至周覽勝絕且曰夫世人欲治一物計一事求所以卒償其志願者未始不齟齬而難合也多矣大抵患力有所不足而不克成或至有可成而患不能乆見以如其所素望若杜氏之爲此也可謂兼得之矣始也教其子以儒術吏事求應有司之合法今巳見其一上入等而再官有名矣始也披刜荆莽輦朽削薉以裁築基級今巳見其巍軒夏宇華而明煥矣始也折本而種擇技而附今巳見華曄曄而實纍纍矣始也瘞萌於町扶孽於徑今巳見蕭然爲長林而竦然爲高株矣杜氏復未老輕速强徤家事一切委其季不間日爲其子營飭所以延候賔友之事於此始也雖役智慮而勞指畫今巳見其外足自慰而中無所歉矣予故曰杜氏之爲此也可謂兼得之矣㑹其子用薦者得令綿之龍安躬來求記爲道其所以然衆㑹鎭南橋記士志於學而底其道之深也凡所錯事於理莫不順而於物未嘗有以不合相蓋正性以復渾融粹熟經營指顧一繇於仁義耳中山鮮于端夫淹茂而好善正重而有謀方朝廷𥘉有枹罕之地端夫首以才選貳其治虜嘗薄城欲肆其醜者甚力端夫先身麾士衆乘陴分制禦具隨迮之虜度不可角遁去巳而正總守事勢益專諸羗畏攝不敢動創心羣疑釋然而安兠零不舉渠荅不設致諸其隣仰首取法是功業者最焯焯矣大旣處之若無事惟其小者顧咄嗟而有所不冝耶坐累家居杅杅然不自廢猶視其所以當爲者爲之衆㑹鎭端夫别集在焉南出有道素號湫底甌窪不夷病諸徃來歲乆矣無能慮者時或積雨綿日赤埴散潰傾膠覆鬻骭没股䧟噎鬲不吐釀爲汙塗端夫昔巳深惻治且未暇殆今視之猶爾議將橋焉其季師臯聞而說之願亦輸其家貲以佐厥役架材通溝琢石𥙷道長袤高廣完好堅直回流變壤坦若無礙閭里耄倪過者歌德端夫以書聞余求紀歲月余愛端夫好學而信道以資其長才自從宦四方有惠利於乆者莫不先之天子亦知其可用屢𬒳旌典委以疆場之任洮西大効世實知之矣竊嘗揆其美志其所以方厭然者必將犁結囉之田奴耶律之種乃事始止耳豈茲瑣瑣可盡端夫之所爲哉故書此示其里人俾勿壞蘄後世有以原其所先丹淵集卷二十三終
