front:
  text: 陳眉公先生訂正丹淵集卷三十三
  hash: sha256:9399ae7a72f021c7eaf0810f3f9dc94097f84239e5897dfcee1e937e1232d834
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_033-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同參吳吳一標建先先狀成都新尹趙龍圖先狀伏審某官進登延閣之華出守右川之重蒙休者衆竊幸焉深恭惟某官性稟道沖體兹坤直端方徑潔博𥙿寬閎究學淵淳成文雅健事親以孝而行聳羣俗納巳於道而名高當時優遊仕榮增衍賢美嚮自亨衢振采禁路升華奉白簡以繩愆朝倫以肅伏靑蒲而納誨帝念其嘉以至總金幣佐會省之繁調芻糗贍朔陲之給皆凝茂績實稔休聲蜀為遠邦邑曰巨鎮其政繫於國體所寄繼于上心地望素隆事權時重將委任於守土實艱難於擇人付卑或差經營且力會此及瓜之代久煩玩印之求作牧以行非公其可是用褒升邇職慰寵遐民巳聞高牙漸出危棧木牛舊地重識孔明竹馬前人再迎郭伋某傾依有素汨沒無庸忝佐偏州幸當洪蔭歡欣踴躍倍萬于他云云漢牧先狀某自遠標符僅周歲序瞻懷靡極跂引為勞顧惟書問之踈實繫事為之冗側承興止舉集嘉休此者某營祿養親列情干上尋膺宸檢獲二藩條得遂依仁豈勝為幸巳計出都之日即聞赴治之期瞻拜有涯欣歈是切成都韓端明先狀某近奉恩除幸叨職委顧惟支郡託在洪庥拜命之𥘉撫躬以抃某嚮終親制屢抗愚衷所聽云高斯誠未允某官內存愛恕深軫孤平謂宜還官使得就養猥蒙奏列盡道哀窮今此陶甄實由薦藉巳戒出都之日即諧趨府之期將侍崇嚴併陳悃愊漕憲先狀此者某拜恩天朝守職鄉郡侍親以便撫巳為榮某嚮起憂廬召還祕館常念慈闈之養屢祈嚴扆之私愚悃盡傾聖心下側許歸舊里得佐偏州顧兹職守之微獲在按臨之下惟天與幸有地庇身巳戒輕裝即趨賤局瞻依甚邇喜抃無涯運使蘇刑部先狀伏審某官榮服命書移領使節提封舊俗參語以交歡屬部下僚撫躬而自慶竊承行府巳涉近疆偃冒勤劬起居休豫恭惟某官探道奧祕業文精深藏以在身施之行事用無不效績故常尤按三尺之書了無冤議調九年之食頻倚辦才所至也人皆賴之其功焉上實知矣猶煩遠使將漸邇臣且蜀號財賦之撓於國當調度之半有藉供億必繄強明智敏所臨課力惟最兼以重柄委之外臺民之利害得以興除吏之善惡因而懲勸高車在道列部傾風某奉親還鄉倅職屬郡比受按司之檄此讐利局之符有幸孱涼得依庇護即趨近甸引拜旅旌運使度支先狀梓州竊伏下風講聞高誼自為晚輩未嘗獲對於晤言徒仰盛名不敢輒通於音問此者伏審某官以才能之重受神聖之知蜀有兩川梓為一道財賦之衍常供邊埸之求郡邑之繁須慰吏民之望孰膺上眷僉謂老成高車未來列部相慶某庇族下邑居官鄰城企漕節之華願贍風而實切守倅車之賤顧通謁以無由聊導懇誠少塵几格云云提刑宋郎中先狀伏審某官更麾南豳按憲西蜀邸訊𥘉諭輿情巳歡蓋重名之久馳宜遠人之甚慰恭惟某官器略宏遠材資粹方蚤歷榮途盛著徽節科條易避參修三尺之書飛挽均輸佐調九年之食休有丕績簡于上心此者出為外臺專按一道中典之重方委平亭列部至繁盡歸廉紏此之要劇宜以通明某昔在上都幸觀高誼今居支郡獲庇洪庥聞命之𥘉抃懷增劇云云李殿丞權交代先狀嚮由貴治嘗挹高風違闊踰時候問無所此者某叨膺宸檢分守郡條矧漕臺之借才屈明府而承乏獲交善矩且慰愚衷未遑馳書先辱賜教仰佩推褒之重實懷悚愧之深即遂披瞻預增喜躍湖州提轉先狀將赴湖州忝膺宸綍薦卑藩條顧惟無似之姿謬此惟良之寄撫衷自省竊幸焉深伏念某單涼遠人漂泊孤宦賦命譾薄與時闊踈故常守於外官輒屢更於數郡雖蔑殊尤之效僅逃殿劣之譏三館既還豈涓埃之云輔一麾重請得江海之于宣此者伏遇某官𬒳眷九重理財一道布惟新之政惠養民氓按所部之城澄淸寮吏秉剛方之節威惠風行持察舉之權否臧洞照幸將蹇迹仰記殊休某巳謀便道之行即次提封之下有期瞻倚無量欣歈丹淵集卷三十三終
