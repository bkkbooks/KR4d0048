  text: 丹淵集附録諸公書翰詩文
  hash: sha256:410affb151cfa567492f88cd57db489e0048daf3fca4232a3d5d90771dc06bf1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_045-1a}
body:
  text: 蜀內江李應魁務滋甫纂吳長洲吳一標建先甫校小簡司馬光某再啓特承寵惠詩序石刻渺然想見與可襟韻遊處之狀高遠蕭灑如晴雲秋月塵埃所不能到某所以心服者非特詞翰之美而已也某再拜小簡趙抃某别啓向以蕪旨况聞承未鄙誚過有稱肯副之佳頌為况讀復數四益用感慰其理明語快到古作者第歎服而巳何日珍集下懷瞻詠不宣某祗拜送與可通判卭州詩范鎮半刺為官美臨卭自古名何言緹軾寵更侍版輿行仙藉新年貴賔僚舊日榮壺漿故父老應在半途迎送知湖州浙西古名城號稱水晶宫史君老手筆文字窺化工江山久有待瑩潔如磨礲堂階走淸渠珮玉鳴丁東臺觀靣衆巖擁抱開屏風遙知到未幾都下傳詩筒西南四麾守一一獄戶空今行定論最歸來掖垣中送與可通判卭州王安石文翁出治蜀蜀士始文章司馬唱成都嗣音得王楊犖犖漢守孫千秋起相望操筆賦上林脫巾選為郎擁書天祿閣奇字校偏傍忽乘駟馬車牛酒過故鄉時平無諭檄不訪誓羅祥問君行何為關隴正繁霜中和助宣布循吏綴前芳豈特為親榮區區夸一鄉送出守陵州蘇軾壁上墨君不解語見之尚可消百憂而况我友似君者素節凛凛欺霜秋淸詩健筆何足數逍遙齊物追莊周奪官遣去不自覺曉梳脫髮誰能收江邊亂山赤如赭陵陽正在千山頭君知遠别懷抱惡時遣墨君解我愁和與可洋川園池三十首湖橋朱欄畫柱照湖明白葛烏紗曵履行橋下龜魚晚無數識君拄杖過橋聲橫橋貪看翠蓋擁紅粧不覺湖邉一夜霜卷却天機霜錦假從教匹練寫秋光書軒雨昏石硯寒雲色風動牙籖亂葉聲庭下巳生書帶草使君疑是鄭康成冰池不嫌冰雪繞池看誰似詩人巧耐寒記取羲之洗硯處碧琉璃下黑蛟蟠竹塢晚節先生道轉孤歲寒惟有竹相娛粗才杜牧真堪笑喚作軍中十萬夫荻浦雨折霜乾不耐秋白花黃葉使人愁月明小艇湖邊宿便是江南鸚鵡洲蓼嶼秋歸南浦蟪蛄鳴霜落橫湖沙水淸卧雨幽花無限思抱叢寒蝶不勝情望雲樓隂晴朝暮幾回新巳向虗空付此身出本無心歸亦好白雲還似望雲人天漢臺漾水東流舊見經銀潢左界上通靈此臺試向天文覔閣道中間第幾星待月臺月與高人本有期挂簷低戶映蛾眉只從昨夜十分滿漸覺冰輪出海遲二樂榭此間真趣豈容談二樂并君已是三仁智更煩訶妄見坐令魯叟作瞿曇來詩云二見因妄生灙泉亭聞道池亭勝兩川應須爛醉答雲煙勸君多揀長腰米消破亭中萬斛泉吏隱亭縱橫憂患滿人間頗怪先生日日間昨夜淸風眠北牗朝來爽氣在西山霜筠亭解籜新篁不自持嬋娟巳有歲寒姿要看凛􅏮霜前意須待秋風粉落時無言亭殷勤稽首維摩詰敢問如何是法門彈指未終千偈了向人還道本無言露香亭亭下佳人錦繡衣滿身瓔珞綴明璣晚香消歇無尋處花巳飄零露巳晞函虗亭水軒花榭兩爭妍秋月春風各自偏惟有此亭無一物坐觀萬景得天全溪光亭決去湖波尚有情却隨初日動簷楹溪光自古無人畫慿仗新詩與寫成過溪亭身輕步穩去忘歸四柱亭前野彴微忽悟過溪還一笑水禽驚落翠毛衣披錦亭煙紅露緑曉風香燕舞鶯啼春日長誰道使君貧且老繡屏錦帳咽笙簧禊亭曲池流水細鱗鱗高會傳觴似洛濵紅粉翠蛾應不要畫船來往勝於人菡萏亭日日移床趂下風淸香不盡思何窮若為化作龜千歲巢向田田亂葉中荼䕷洞長憶故山寒食夜野荼䕷發暗香來分無素手簮羅髻且折霜㽔浸玉醅篔簹谷漢川修竹賤如蓬斤斧何曾赦籜龍料得淸貧饞大守渭濵千畝在胸中寒蘆港溶溶晴港漾春暉蘆笋生時柳絮飛還自江南風物否桃花流水鮆魚肥野人廬少年辛苦事犂鉏剛厭靑山繞故居老覺華堂無意味却須時到野人廬此君庵寄與庵前抱節君與君到處合相親寫真雖是文夫子我亦真堂作記人金橙徑金橙縱復里人知不見鱸魚價自低須是松江煙雨裏小船燒薤搗香虀南園不種夭桃與緑楊使君應欲候農桑春畦雨過羅紈膩夏壠風來餅餌香北園漢水巴山樂有餘一麾從此首歸塗北園草木慿君問許我他年作主無與可有詩見寄云待將一假鵝溪絹掃取寒梢萬尺長次韻答之為愛鵝溪白繭光掃殘雞距紫毫鋩世間亦有千尋竹月落庭空影許長林子中以詩寄與可及餘與可既沒追和其韻斯人所甚厭投卑每不受欲其少須臾奪去惟恐後云誰尸此職無乃亦假守賦才有巨細無異斛與斗胡不安其分但聽物所誘時來各飛動意合無妍醜坐令雞栖車長載未伯厚平生無一旅既死吒萬口自聞與可亡胸臆生堆阜懸知臨絶意要我一執手相望五百里安得自其牗遺文付來哲後事待諸友伶俜嵇紹孤老病孟光偶世人賤目見爭笑千金帚君詩與楚詞識者當有取但如愛墨竹此難吾巳久故人多厚祿能復哀君否不見林與蘇飢寒自奔走書與可墨竹并序亡友文與可有四絶詩一楚詞二草書三畫四與可嘗云世無知我者惟子瞻一見識吾妙處既沒七年覩其遺迹而作是詩筆與子皆逝詩今誰為新空遺運斤質却弔斷絃人題與可墨竹并序故人文與可為道師王執中作墨竹且謂執中勿使他人書字待蘇子瞻來令作詩其側與可既沒八年而軾始還朝見之乃賦一首斯人定何人遊戲得自在詩鳴草聖餘兼入竹三昧時時出水石荒怪軼象外舉世知珍之賞會獨余最知音古難合奄忽不少待雖云死生隔相見如龔隗與可字説鄉人皆好之何如曰未可也鄉人皆惡之何如曰未可也不如鄉人之善者好之其不善者惡之善者好之不善者惡之足以為君子乎曰未也孔子為問者言也以為賢于所問者而巳君子之居鄉也善者以勸不善者以耻夫何惡之有君子不惡人亦不惡於人子夏之於人也可者與之其不可者拒之子張曰君子尊賢而容衆嘉善而矜不能我之大賢歟於人何所不容我之不賢歟人將拒我如之何其拒人也子張之意豈不曰與其可者而不可者自遠乎使不可者而果遠也則其為拒也甚矣而子張何惡於拒也曰惡其有意於拒也夫苟有意於拒則天下相率而去之吾誰與居然則孔子之於孺悲也非拒歟曰孔子以不屑教誨者也非拒也夫苟無意於拒則可者與之雖孔子子張皆然吾友文君名同字與可或曰為子夏也歟曰非也取其與不取其拒為子張者也與可之為人也守道而忘勢行義而忘利修德而忘名與為不義雖祿之千乘不顧也雖然未嘗有惡于人人亦莫之惡也故曰與可為子張者也與可琴銘攫之幽然如水赴谷釋之蕭然如葉脫木按之噫然應指而長言者似君置之枵然遺形而不言者似僕與可畫墨竹屏風贊與可之文其德之糟粕與可之詩其文之毫末詩不能盡溢而為書變而為畫皆詩之餘其詩與文好者益寡有好其德如好其畫者乎悲夫戒壇院與可畫墨竹贊風梢雨籜上傲冰雹霜根雪節下貫金鐵誰為此君與可姓文惟其有之是以好之石室先生畫竹贊并序與可文翁之後也蜀人猶以石室名其家而與可自謂笑笑先生蓋可謂與道皆逝不留於物者也顧嘗好畫竹客有贊之者曰先生間居獨笑不巳問安所笑笑我非爾物之相物我爾一也先生又笑笑所笑者笑笑之餘以竹發妙竹亦得風天然而笑與可飛白贊嗚呼哀哉與可豈其多好好奇也歟抑其不試故藝也始豫見其詩與文又得見其行草篆􅊢也以為止此矣既沒一年而復見其飛白美哉多乎其盡萬物之態也霏霏乎其若輕雲之蔽月翻翻乎其若長風之卷斾也猗猗乎其若遊絲之縈柳絮裊裊乎其若流水之舞荇蒂也離離乎其遠而相屬縮縮乎其近而不隘也其工至于如此而余乃今知之則余之知與可者固無幾而其所不知者蓋不可勝計也嗚呼哀哉與可枯木贊怪木在庭枯柯北走窮猿投壁驚雀入牗居者蒲氏畫者文叟贊者蘇子觀者如後與可畫竹木石贊并引友人文與可既沒十四年見其遺墨於吕元鈞之家嗟歎之餘輒復贊之竹寒而笑木瘠而壽石醜而文是為三益之友粲乎其可接邈乎其不可囿我懷斯人烏乎其可復覯也跋與可墨竹昔時與可墨竹見精縑良𥿄輒憤筆揮灑不能自巳坐客爭奪持去與可亦不甚惜後來見人設置筆研即逡巡避去人就求某至終歲不可得或問其故與可曰吾乃者學道未至意有所不適而無所遣之故一發於墨竹是病也今吾病良巳可若何然以余觀之與可之病亦未得為巳也獨不容有發者乎余將伺其發而掩取之然彼方以為病而吾又利其病是吾亦病也熙寧庚戌七月二十一日子瞻書跋與可紆竹紆竹生于陵陽守居之北崖蓋歧竹也其一未脫籜為蝎所傷其一困於嵌巖是以為此狀也吾亡友文與可為陵陽守見而異之以墨圖其形余得其摹本以遺玉册官祁永使刻之石以為好事者動心駭目詭特之觀且以想見亡友之風節其屈而不撓者蓋如此云跋趙㞦屏風文與可竹與可所至詩在口竹在手來京師不及歲請郡還鄉而詩與竹皆西矣一日不見使人思之其靣目嚴泠可使靜險躁厚鄙薄今相去數千里其詩可求其竹可乞其所以靜厚者不可致此豫所以見竹而歎也跋與可草書李公擇𥘉學草書所不能者輒雜以真行劉貢甫謂之鸚哥嬌其後稍進問僕吾書比來何如僕對可謂秦吉了矣與可聞之大笑是日坐人爭索與可草書落筆如風𥘉不經意劉意謂鸚鵡之于人言止能道此數句耳十月一日張長史草書必俟醉或以為奇醒即天真不全此乃長史未妙猶有醉醒之辨若逸少何嘗寄於酒乎僕亦未免此事書𥘉無意於嘉乃嘉爾草書雖是積學乃成然要是出于欲速古人云匆匆不及草書此語非是若匆匆不及乃是平時亦有意於學此弊之極遂至於周越仲翼無足怪者吾書雖不甚佳然自出新意不踐古人是一快也跋與可論草書後與可云余學書凡十年終未得古人用筆相傳之法後因見道上鬪蛇遂得其妙乃知顛素之為各有所悟然後至于如此耳留意於物往往成趣昔人有好草書夜夢則見蛟龍紏結後數年或晝日見之草書則工矣而所見亦可患與可之所見豈真蛇耶抑草書之精也豫平生好與與可劇談大噱此語恨不令與可聞之令其一捧腹絶倒也小簡八首軾啓近承書誨喜聞尊候益康勝見乞浙郡不知得否相次入文字乞宣與明若得與兄聮棹南行一假異事也中前桑榆之詞極為工妙尋曾有書道此却是此書不逹耶老兄詩筆當今少儷惟劣弟或可以髣佛墨竹即未敢云爾呵呵佳墨比望老兄分惠反蒙來索大好禪機何處學得來大軸揮灑必已了專令人候請切告烏綵欄兩卷稍暇便寫去近見子由作墨竹賦意思蕭散不復在文字畛域中真可以配老筆也亦欲寫在絹卷上如何如何乍涼萬萬珍重又軾自密移河中至京城外改差徐州復挈而東仕宦本不擇地然彭城於私計比河中為便安耳今日沿汴赴任與舍弟同行聞與可與之議姻極為喜幸從來交契如此又復結此無窮之歡美事美事但寒門不稱計與可必不見鄙也臨行冗甚奉書殊不謹俟到任别上問次又軾再拜姪女子獲執箕帚非獨渠厚幸而不肖獲交于左右者緣此愈親篤矣欣慰之懷殆不可言不敢復具啓狀必不見罪也聞舍弟談壻之賢公之子固應爾姪女子粗知書曉義理計亦稱公家婦也更望訓誨其不逮也又軾啓疊辱來教承起居佳適聞中間復微恙且喜尋巳平復軾比來亦多病漸老不耐小放意輒成疾不可不加意謹護也水後彌年勞役今復聞決口未可塞紛紛何時定乎寄和潞老詩甚精奇稍間當亦作六言殆難繼也未緣會晤萬萬以時珍重又軾啓稍不馳問不審入冬尊體何如想舊疾盡去眠食益佳矣見秋榜知八郎巳捷不勝欣慰惟十一郎偶失甚為悵然然一跌豈廢千里想不以介意寄示碑刻作語古妙非世俗所能髣佛長句偈甚奇非獨文字甘降便當北靣參問也近有一僧名道潛字參寥杭人也時來相見詩句淸絶可與林逋相上下而通了道義見之令人蕭然有一詩與之録呈為一笑也未由展奉萬萬以時自重不宣黃樓賦如巳了望付去人如未幸留意又軾啓近遞中辱書承非久到闕即日想巳入覲矣無緣一見於邑可知苦寒尊候何似貴眷令子各安勝軾蒙庇粗遣秋來水災幾巳為魚必知之矣寄惠六言小集古人之作今世未省見老兄别後道德文章日進追配作者而劣弟懶墯日退卒為庸人他日何以見左右慙悚而巳所要拙文實未有以應命又見兄之作但欲焚筆硯耳何敢自露兄淹外既久雖與時闊疏而公議卓然當遂踐淸近也歲行盡萬萬以時自重不宜又軾啓郡人還疊辱書教承尊候微違和尋巳平愈然尚未甚美食又得蒲大書云尊貌頗淸削伏料道氣久充微疾不能近然未免憂愁惟謹擇醫藥痛加調練莫須燃艾否軾近來亦自多病年老使然無足怪者蒙寄惠偃竹真可為古今之冠謹當綴黃素其後作十餘軸謹援此例不可過望所示當作歌詩題之軾作此乃莫大之幸日夜所願而不得者今後更不敢送浙物去矣老兄恐嚇之術一何疏哉想當一大噱别後亦有拙詩百餘首方令人編録以求斤斧後信寄去老兄盛作尚恨見少當更蒙借示使劣弟稍稍長進此其為賜又非頒惠墨竹之比也冗中奉啓不盡言又軾啓冗迫稍踈上問伏想尊履佳勝承書領吳興衆議謂公當在近侍故不甚快然不肖深為左右賀也吳興山水淸遠公雅量弘度在王謝間此授殆天意耳軾欲乞宣城若幸得之當與公為鄰國真是一假奇事然事之如人意者亦自難遂從古以然公自南河赴任舟行艱澀何不自五丈河由曹鄆濟過我於徐自泗入淮乎但恐五丈河無氷不然者公必出此也且更熟籌之餘惟萬萬以時自重筆凍奉啓殊不謹石幼安言亦可呼水精宫使此語可記墨君堂記凡人相與號呼者貴之則曰公賢之則曰君自其下則爾汝之雖公卿之貴天下貌畏而心不服則進而君公退而爾汝者多矣獨王子猷謂竹君天下從而君之無異辭今與可又能以墨象君之形容作堂以居君而屬余為文以頌君德則與可之於君信厚矣與可之為人也端靜而文明哲而忠士之修潔博習朝夕磨治洗濯以求交於與可者非一人也而獨厚君如此君又疏簡抗徑無聲色臭味可以娛恱人之耳目鼻口則與可之厚君也其必有以賢若矣世之能寒燠人者其氣𦦨亦未至若雪霜風雨之切於飢膚也而士鮮不以為欣戚喪其所守自植物而言之四時之變亦大矣而君獨不顧雖微與可天下其孰不賢之然與可獨能得君之深而知君之所以賢雍容談笑揮灑奮迅而盡君之德稚壯枯老之容披折偃仰之勢風雪凌厲以觀其操崖石犖確以致其節得志遂茂而不驕不得志瘁瘠而不辱羣居不倚獨立不懼與可之於君可謂得其情而盡其性矣余雖不足以知君願從與可求君之昆弟子孫族屬朋友之象而藏於吾室以為君之别館云與可畫篔簹谷偃竹記竹之始生一寸之萌耳而節葉具焉自蜩腹蛇蚹以至于劒拔千尋者生而有之也今畫者乃節節而為之葉葉而纍之豈復有竹乎故畫竹必先得成竹於胸中執筆熟視乃見其所欲畫者急走從之振筆直遂以追其所見如兔走鶻落少縱則逝矣與可之教豫如此豫不能然也而心識其所以然夫既心識其所以然而不能然者內外不一心手不相應不學之過也故凡有見於中而操之不摯者平居自視了然而臨事忽焉喪之豈獨竹乎子由為墨竹賦以遺與可曰庖丁解牛者也而養生者取之輪扁斫輪者也而讀書者與之今夫夫子之託於斯竹也而豫以為有道者則非邪子由未嘗畫也故得其意而巳若豫者豈獨得其意并得其法與可畫竹𥘉不自貴重四方之人持縑素而請者足相躡於其門與可厭之投諸地而罵曰吾將以為襪士大夫傳之以為口實及與可自洋州還而余為徐州與可以書遺余曰近語士大夫吾墨竹一派近在彭城可往求之襪材當萃於豫矣書尾復寫一詩其略曰擬將一假鵝溪絹掃取寒梢萬尺長豫謂與可竹長萬尺當用絹二百五十匹知公倦於筆硯願得此絹而巳與可無以答則曰吾言妄矣世豈有萬天竹哉余因而實之答其詩曰世間亦有千尋竹月落庭空影許長與可笑曰蘇子辨則辨矣然二百五十匹吾將買田而歸老焉因以所畫篔簹谷偃竹遺豫曰此竹數尺耳而有萬尺之勢篔簹谷在洋州與可嘗令豫作洋州三十韻篔簹谷其一也豫詩云漢川修竹賤如蓬斤斧何曾赦籜龍料得淸貧饞太守渭濵千畝在胸中與可是日與其妻遊谷中燒筍晚食發函得詩失笑噴飯滿案元豐二年正月二十一日與可沒于陳州是歲七月七日豫在湖州曝書畫見此竹廢卷而哭失聲昔曹孟德祭橋公文有車過腹痛之語而豫亦載與可疇昔戲笑之言者以見與可於豫親厚無間如此也祭與可文年月日從表弟蘇軾謹以淸酌庶羞之奠致祭于故湖州文府君與可學士兄之靈曰嗚呼哀哉與可能復飮此酒也夫能復賦詩以自樂鼓琴以自侑也夫嗚呼哀哉余尚忍言之氣噎悒而填胸淚疾下而淋衣忽收淚以自問非夫人之為慟而誰為乎道之不行哀我無徒豈無友朋逝莫告余惟余與可匪亟匪徐招之不來麾之不去不可得而親其可得而踈之耶嗚呼哀哉孰能敦德秉義如與可之和而正乎孰能養民厚俗如與可之寬而明乎孰能為詩與楚詞如與可之婉而淸乎孰能齊寵辱忘得喪如與可之安而輕乎嗚呼哀哉余聞訃之三日夜不眠而坐喟夢相從而驚覺滿茵席之濡淚念有生之歸盡雖百年其必至惟有文為不朽與有子為不死雖冨貴夀考之人未必皆有此二者也然余嘗聞與可之言是身如浮雲無去無來無亡無存則夫所謂不朽與不死者亦何足云乎嗚呼哀哉尚饗黃州再祭與可文年月日從表弟具官蘇軾謹以淸酌庶羞之奠昭告于亡友湖州府君與可學士文兄之靈嗚呼哀哉我官于岐實始識君廣口秀眉忠信而文志氣方剛談詞如雲一别五年君譽日聞道德為膏以自濯薰藝學之多蔚如秋蕡脫口成章粲莫可耘馳騁百家錯落紛紜使我羞歎筆硯為焚再見京師默無所云杳兮淸深落其華英昔蓻我黍今熟其饋啜漓歌呼得淳而醺天力自然不施膠筋坐了萬事氣回三軍笑我皇皇獨違垢紛俯仰三州眷戀桑枌仁施草木信及麚􅍪昻然來歸獨立無羣俯焉復去初無戚欣大哉死生悽愴蒿蔒君沒談笑大鈞徒勤喪之西歸我竄江濆何以薦君採江之芹相彼日月有朝必曛我在茫茫凡幾合分盡此一觴歸安于墳嗚呼哀哉尚饗與可學士墨君堂蘇轍虗堂竹叢間那復厭竹遠風庭響交戞月牖散凌亂尚恐晝掩關嬋娟不長見中堂開素壁蕭颯起霜幹隨宜賦生意落筆皆䓤蒨根莖雜土石枝葉互長短依依露下緑冉冉風中展開門視叢薄與此終何辨和與可洋州園亭三十韻湖橋湖南堂宇深湖北林亭遠不作過湖橋兩處那相見橫橋湖裏種荷花湖邊種楊柳何處渡橋人問是人間否書軒緑竹覆淸渠塵心日月踈使君遺癖在苦要讀文書􅖅池水深􅖅亦厚滉蕩鋪寒玉好在水中魚何愁池上鶩竹塢空陂放修竹肅肅復冥冥莫除塢外笋從使入園生荻浦離披寒露下蕭索微風觸摧拆有餘靑從橫未須束蓼嶼風高蓮欲衰霜重蓼𥘉發會使此池中秋芳未嘗歇望雲樓雲生如湧泉雲散如翻水百變一憑欄悠悠定誰使禊亭觴流無定處客醉醒還酌毋令仲御歌空使人驚愕菡葍亭開花濁水中抱性一何潔朱檻月明時淸香為誰發􅙐醾洞猗猗翠蔓長藹藹繁香足綺席墮殘英芳樽漬餘馥此君菴風稍繞林匝霜幹當窗靜遙知素壁上醉墨森相映金橙徑葉如石楠堅實比霜柑大穿徑得新苞令公憶鱸鱠南園官是勸農官種桑亦其所安得陌上人隔葉攀條語北園使君美且仁遍地種桃李豈獨放春花行看食秋子答與可十首遠遊既為東魯遷居又愛南山齒髮自知將老心懷且欲偷安舜井溢流陌上歷山近在城頭羈旅三年忘云故園何日歸休野步西湖緑縟晴登北渚煙綿蒲蓮自可供腹魚蟹何嘗要錢飮酒方橋夜月釣魚畫舫秋風冉冉荷香不斷悠悠水靣無窮雨過山光欲溜寒來水氣如蒸勝處何須吳越隨方亦有遊朋楊雄執戟雖久陶令歸田未能眼看雲山無奈神傷簿領相仍終歲常親鞭朴此生知負詩書欲尋舊學無處時有故人起豫故人遠在江漢萬里時寄聲音聞道禪心寂寞未廢詩人苦吟佳句近參風雅微詞間發離騷竊欲比君庾信莫年詩賦尤高相思欲見無路滿秩西歸有時及君鈴閣少事飮我松醪滿巵送與可知湖州連持梁洋卯久作溪山主深知為郡樂但畏買茶若來歸天祿閣坐守登聞鼓九重未明入百辟盈庭舞城南獨歸卧心事誰當語舊聞吳興勝試問天公取家貧槖裝盡歲莫輕帆舉苕溪淨多石辨嶺瘦無土湖藕雪冰絲山茶潑牛乳香粳飯玉粒鮮鯽鱠紅縷宫開水精潔人寄畫屏住俗吏自難堪詩翁正當與從來思淸絶况乃病新愈團團肘後丹皓皓胸中素高卧鎮夸俗淸談靜煩訴應笑杜紫微湖亭但狂顧墨竹賦與可以墨為竹視之良竹也客見而驚焉曰今夫受命於天賦形於地涵濡雨露振蕩風氣春而萌芽夏而解弛散柯布葉逮冬而遂性剛潔而疏直姿嬋娟以間媚涉寒暑之徂變傲冰雪之凌厲均一氣於草木嗟壤同而性異信物生之自然雖造化其能使今子研靑松之煤運脫兔之毫睥睨牆堵振灑繒綃須臾而成鬱乎蕭騷曲直橫斜穠纖􅋻高竊造物之潛思賦生意於崇朝子豈誠有道者耶與可聽然而笑曰夫豫之所好者道也放乎竹矣始豫隱乎崇山之陽廬乎修竹之林視聽漠然無槩乎豫心朝與竹乎為遊莫與竹乎為朋飮食乎竹間偃息乎竹隂觀竹之變也多矣若夫風止雨霽山空日出猗猗其長森乎滿谷葉如翠羽筠如蒼玉淡乎自持淒兮欲滴蟬鳴鳥噪人響寂歷忽依風而長嘯眇掩冉以終日笋含籜而將墜根得土而橫逸絶澗谷而蔓延散子孫乎千億至若藂薄之餘斤斧所施山石犖埆荆棘生之蹇將抽而莫逹紛既折而猶持氣雖傷而益壯身巳病而增奇淒風號怒乎隙穴飛雪凝􅴟乎陂池悲衆木之無賴雖百圍而莫支猶復蒼然於既寒之後凛乎無可憐之姿追松柏以自偶竊仁人之所為此則竹之所以為竹也始也余見而恱之今也恱之而不自知也忽乎忘筆之在手與紙之在前勃然而興而修竹森然雖天造之無朕亦何以異於茲焉客曰蓋豫聞之庖丁解牛者也而養生者取之輪扁斫輪者也而讀書者與之萬物一理也其所從為之者異爾况夫夫子之託於斯竹也而豫以為有道者則非耶與可曰唯唯祭文與可學士文維元豐二年歲次巳未二月庚子朔具官蘇轍謹以淸酌庶羞之奠致祭于故吳興太守與可學士親家翁之靈嗚呼與君結交自我先人舊好不忘繼以新姻鄉黨之歡親友之恩豈無他人君則兼之君牧吳興我官南京從君季子長女實行君次于陳往見姑嫜使者未反而君淪亡于何不淑以至于斯匪人所知神實為之昔我愛君忠信篤實廉而不劌柔而不屈發為文章實似其德風雅之深追配古人翰墨之工世無擬倫人得其一足以自珍縱橫放肆久而疑神晚歲好道耽恱至理洗濯塵翳湛然不起病革不亂遺書滿𥿄嗟乎今日見此而巳我欲哭君神往身留遣使往奠涕泗橫流絳幡素車歸安故丘嗚呼哀哉尚饗丹淵集附録終
