front:
  text: 陳眉公先生訂正丹淵集卷二十八
  hash: sha256:01b7c7ca19e5543049347e1ed42f0c218dc185728222ce0de24f5c055aac8b36
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_028-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同參吳吳一標建先表謝就差知興元府表臣某言今月二十日進奏院遞到勑牒一道伏蒙聖慈以臣陳乞特除授臣知興元府仍放朝辭者便私之請輒昧死以上聞從欲之仁遽推恩而下及臣何為者幸至是哉舉千里之大而使之撫綏顧一介之輕而敢不勤瘁望過心悸感深涕流臣某誠惶誠恐頓首頓首念臣誤緣科名竊簉館閣是正訛謬學問淺而未精講磨本元才識短而多泥居中無補請外尤頻嚮蒙朝廷俾守仁壽當奉行條詔之始固勿憚簿書之勞踰年於兹庶事頗集殆將滿歲當趣還朝因念骨肉衆多道途緬邈加有為纍之婚嫁殊無可仰之耕桑何所賣琅邪之田徒爾索長安之米以再求僻郡少緩私門豈謂伏遇皇帝陛下照以天光函之海量俯矜愚妄特逭誅夷亟下武都之書使紆南鄭之紱矧兹善地實曰鄰鄉川陸寬平魚稻豐美顧惟多士有願往而不能豈爾賤臣或陳請而遂得被恩若此圖報用何止俟交官即赴新治誓盡么髍之一節庶酬汪濊之萬分但竭愚衷敢誣天鑒臣無任感神荷聖忭蹈欣躍激切屏營之至謹奉表稱謝以聞興元府謝上任表臣某言伏蒙聖慈就差臣知興元軍府事臣巳於三月十八日上任訖前俾為州愧無善狀今叨易地竊荷優恩退視溢滿之材薦霑汪濊之澤揆其不稱常爾為虞臣某誠惶誠感頓首頓首伏念臣稟才不高涉學甚淺偶塵仕路輒玷儒林曾無可觀謬被朝紱獨有甚幸屢親藩條方解組於隆山之陽復移麾於漢水之上逾旬至止盡室安然竊觀風物之宜實與鄉關之近庶事易輯羣情相通顧雖孱庸粗可臨涖此蓋伏遇皇帝陛下全大勝之德運無私之仁遂使孤生亦膺遠寄臣謹當竭巳思慮求民隱微諭陛下愛人之心行陛下考古之政不敢立異自徼虛名惟知盡忠庶酬大惠朝夕於是死生以之臣無任瞻天望聖激切屏營之至謹奉表稱謝以聞洋州謝到任表臣某言臣伏蒙聖恩就差臣知洋州軍州事巳於十月十三日上任訖解麾漢水之陽卒無善狀剖竹洋川之上重沐殊恩嚮露愚衷常虞愆責忽汚睿聽遽賜矜從臣某誠惶誠感頓首頓首伏念臣生西南僻陋之邦本草莽孤寒之士守章句之學曾未達於淵源登詞賦之科幸且緣於階漸期行所願不負於官粗知亷耻立身之大端素識忠義報國之名節以至四參郡事三佩守符曾亡纖疵上抵明憲惟憂所得過分不敢别有妄營止求便麾屢瀆嚴扆此蓋伏遇皇帝陛下憐其雖愚而未至無狀許以堅請而尚令有為惟洋號曰小州在蜀最稱善地所樂有江山之勝其飬得魚稻之饒疆界甚遠而民人朴淳牒訴不繁而獄犴希少比之前治事不及於一分在於愚臣心實知其萬幸惟勤夙夜以布教條事有未便則裁而失中民或不然則諭以循理誓殫駑力仰答鴻私臣無任感天荷聖激切屏營之至謹奉表稱謝以聞陵州謝上任表臣某言臣伏奉勑差知陵州軍州事巳於三月五日赴任訖竊以陵州在崎嶇山谷之中城壘邑屋與巒領澗壑相為上下所領縣四戶口裁三萬稅錢止千三百緡租不滿萬石土田瘠鹵民頗善耕稼然其性椎質各守護本業不喜作訴訟為之長吏者但能奉諭朝廷所以愛養遠民之意外惟輯簿書趣期會而巳如是亦可謂之善辦夫職業者而臣此時輒當斯任豈不為至幸哉臣誠喜誠懼頓首頓首伏念臣顓蒙淺陋素無才術但偶以辭律獲中科選既而用此復列館閣惟是稟賦孱薄動涉艱梗凡自近歲巳來愈罹患難連綿家禍幾濵於死才得舊官復以罪失臣常自念生平蹤迹如此而欲久居圖書之府重費太官之膳苟福不稱是必轉為咎悔臣嚮者所以懇求補外願以所學施於有政冀獲萬一上圖補報頻煩干叩不避誅戮伏蒙皇帝陛下天地父母涵容養育察見幽隱遂賜矜恤不惜千里遣臣試守此州最為僻陋殊無將迎之勞加復其民素號易治臣之得此誠極優幸若夫均稅賦簡徭役撫惸獨明冤滯臣旦夕區區所以留意於其間者願持此效仰答恩賜策駑礪鈍不知止息臣無任喜懼交集誠悃激切之至謹奉表稱謝以聞謝復官表臣某言某今月一日進奏院遞到勑牒官誥各一道伏蒙聖恩以祀明堂禮畢特授臣尚書祠部員外郎者議禮不當奪官至輕固宜終身不復舊秩豈謂今日再蒙新恩緣聖主講右個之洪儀致愚臣歸左曹之末屬被命忭躍撫躬憂惶臣某誠惶誠感頓首頓首伏念臣出身寒微受性迂闊偶從鄉版獲隸朝紳迹甚羇孤勢無援助加以讀書不能究其根本臨事所以失其源流當獲罪之時人皆謂其末減在布慶之後天難酬其大均此蓋伏遇皇帝陛下執道之公御臣以一昔之行罰蓋懲其疏略之非今也推恩式示其昭灑之用臣愈當循省敢怠操修惟勤討論庶備驅使誓殫眇節圖報鴻私臣無任感恩荷德喜懼交集之至謹奉表稱謝以聞謝轉官表臣某言九月十六日進奏院遞到勑牒官誥各一道伏蒙聖慈特授臣度支員外郎仍加輕車都尉者録此微勤進之榮秩念無最績徒被優恩欽閲訓辭交橫感涕自顧漂零之賤常霑優渥之華臣某誠惶誠感頓首頓首伏念臣出西南僻陋之邦本田壠孤寒之士偶緣文藝誤中科名二紀歷於仕途一生困於末路若絶陘之弊轂屢挽而莫前如隤岸之積沙將通而輒塞所以為大常博士自首至尾也僅十年轉祠部員郎既得復失也凡三次蹇難若此窮薄使然退常自循本因無狀用何才業稱是寵靈得居班聯巳過涯分屬展年之甫滿會奏課以當遷伏遇皇帝陛下發天地之德而溥生開日月之光而遍照枯根腐柢煦以陽和側隙窮涯破其昏蔀是使吏闈之蕞品亦升計省之中行臣敢不恪奉官針究行民政誓殫愚效仰報鴻私臣無任瞻天望聖激切屏營之至謹奉表稱謝以聞謝賜曆日表熙寧五年臣某言本州進奏院遞到詔書一道伏蒙聖恩賜臣熙寧五年曆日一卷者切以王者求天之端用正厥事聖人合時之序乃繼其神是故凡當改歲之初必布授人之法以頒宣於列郡以揭示於羣氓使之奉行罔或遺廢臣某誠惶誠感頓首頓首伏惟皇帝陛下仰規洪宰俯育黎元深詔疇人精窮統母撰定歲律編為國章賜諸守土之臣諭彼食毛之俗使之知氣朔之早晚識功緒之後先順本隂陽調為玉燭臣謹當被受敢怠施行捧戴之初忭躍無巳臣無任佩恩服德激切屏營之至謹奉表稱謝以聞謝賜曆日表熙寧七年臣某言都進奏院遞到宣一道伏蒙聖恩賜臣熙寧七年曆日一卷者竊以天道運動而生時所以合靈文於璿蓋王者遵承而布政所以定寶曆於淸臺步日月盈縮之纒均節候早晚之序以示萬寓以明兆民付諸守臣謹是彜憲臣某誠惶誠感頓首頓首伏惟皇帝陛下總元立極執象求端御六氣以宣和撫五辰而在宥於是訂考靈曜之説正斗位以無差造攝提格之書成歲功而有緒編研甚密推測尤精臣於此時寵被其賜謹當仰虔君惠俯親農期俾遂嘉生庶迎協氣臣無任瞻天荷聖激切屏營之至謹奉表稱謝以聞謝賜曆日表熙寧九年臣某言今月十三日進奏院遞到宣一道賜臣熙寧九年曆日一本者上天運至神均隂陽之氣而序成四立之功者謂之時聖人命有司推分至之度而編為一期之事者謂之曆大抵皆因萬民資用而立本蓋慮忽有一物過差而失宜故每於首歲而成書必布之諸夏而垂法君心溥愛民意交歡臣某誠惶誠感頓首頓首伏惟皇帝陛下體合道淵用符天縡謂度類生生而有理當謹候於陽秋謂黎元泯泯而無知必先明於氣朔遂俾淸臺而鈎校實如靈憲之精微是則卦氣效而無災沴之虞月令正而合發斂之節盡躋庶俗皆底大和臣幸守半符叨承中旨謹當宣布不敢廢違臣無任佩荷恩詔喜忭激切之至謹奉表稱謝以聞為林大卿轉官表臣某言正月八日進奏院遞到誥勑牒各一道伏蒙聖恩授臣光祿卿仍放朝謝者詔下九關實從於蕳顧職通三義遽屬於孤平𬒳寵有殊仄身無所臣某誠惶誠感頓首頓首切念臣早編仕籍久玷榮階積處艱煩粗傾庸愞不圖脅諂之賤自企公忠之為盡蒙宸襟深體愚節用絶衆援進由上知出付巨藩入均會省權寄之重者三路嘗備選求宦遊之貴者九卿屢叨除委上課雖否取尤則微退念所蒙每虞不稱敢期省録復用褒遷此蓋伏遇皇帝陛下象天高明與日臨照覆露旁薄光輝顯融顧惟衰孱亦在存録念以久業加之至恩品序淸崇屬以領大官之任訓言溫厚勉其紹先子之休拜命云初􅋏懷兹甚以何才效可答深仁臣方佩守符遠臨邉屏止能練輯羣武撫綏遐氓以赫揚陛下之威靈以宣浹陛下之慈愛竭臣短力緩主西憂盡巳之謀畢生以報臣無任感恩佩德激切屏營之至謹奉表稱謝以聞為夏宮苑邠州上任表臣某言伏蒙聖恩就差知邠州巳於十月四日到任訖領戎轄於維陽愧無善狀易守麾於邠土遽沐殊恩拜命之優省躬而畏臣某誠惶誠感頓首頓首切念臣材甚梗鬱器非通閎徒以偶逢辰之榮叨延世之幸因玷官簿遂塵使階凡名劇煩亦誤掄委然而宣罷軟之力雖勉而不前慕殊尤之功以愚而莫致宜投散地尚卑雄藩此蓋伏遇皇帝陛下大和浹人廣度容物禮遇先臣之厚慶流弱嗣之深再使臨民用觀為政臣器雖至淺心亦自明敢不履蹈氷淵佩服繩墨撫養百姓訓齊三軍願竭涓埃之勤庶酬天地之造臣無任感天荷聖喜懼交集之至謹奉表稱謝以聞謝轉官表臣某言今月二十五日進奏院遞到勑牒官告各一道伏蒙聖恩授臣司封員外郎仍加上輕車都尉散官賜如故者分三郡之符慙無後效考四年之績濫進前行被命優華撫躬惶戢中謝伏念臣本生寒賤之族幸遘明昌之辰官叨淸曹職冒祕閣費廪祿巳逾於二紀隸朝紳亦預於五遷耻從它求榮自上賜此蓋伏遇皇帝陛下廓大度以御世操兼術而取人是致庸虛復膺敘轉敢不益循涯分更勵亷隅上堅報國之心下固立身之節忠義大者死生以之臣無任銜恩荷德喜懼交集之至謹奉表稱謝以聞丹淵集卷二十八終
