front:
  text: 陳眉公先生訂正丹淵集卷二十九
  hash: sha256:32924eac0b5c4c9d370829fc0a19ea00645eed2b5a42e609f93c9347e3c7f729
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_029-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同參吳吳一標建先啓謝吳龍圖啓某啓近者伏蒙知府龍圖諌議為某發章薦於朝廷乞召還書殿以備咨訪者聞命倣徨撫躬戰栗伏念某材惟朽下性實枵疏稟之自然確不能變然而才於為學之始便識立身之端唾詈諂諛憎惡詭激惟嗜古人曰仁義者飾諸巳不隨世俗謂富貴者移于心所以自從登科巳至遊宦二紀於此一節不回雖然官升朝省久軋而難遷職隸館閣一置而不問中間纍經患難固亦自安困窮私念既無援助於當途常謂莫如退縮於散地向竊請郡聊圖庇身豈謂孤迹之有依獲在穠隂之所覆每自戒飭庶逃譏訶伏惟某官學洞聖賢之深器懷公相之重臺諌風采至今凛然藩鎮威名所治肅若其如好引後輩曲揚小才忘長醜於流離采下體於葑非謂某自登門館巳歷歲時知其亡它憐以甚蠢今兹守土復在提封考其效官之方參以行巳之事雖亡善狀可免嚴科遂抗薦章特形褒語蒙見挽之若是在論酬而謂何謹當愈勵淸修益勤素行所貴異日獲在洪鈞之前不後它人亦預巧陶之末過此以往未知所裁謹奉啓謝不宣謹啓謝運判韓都官啓某啓近者伏承某官特為某發狀保薦聞於朝廷者反視諸巳止如常人念無它才取重賢者聞命之始撫躬若驚竊念某本出孤寒素無才譽自常審巳不敢求人獨於執事之門闌向在京師而出入所以南陽丞相嘗為發章北門主人久與同事至蒙存録尤恤單平豈期今守於偏州復幸託居於大庇蓋藏其短巳荷殊恩升薦於朝甚出過望何於巳而萬幸惟受眷於一門感發于中言出不妄止勤薄效上答深知謹奉啓謝不宣謹啓謝運使韓少卿啓某啓近者伏承運使少卿發狀論薦乞朝廷召某任使者顧此無狀聞之若驚將何營為可用報稱伏念某本無藝業偶竊科名復幸散材更塵文苑稟資鈍縵臨事迀疏用既無堪援亦甚寡然而耻謀優佚願試繁難向請外官蒙除此郡政多廢墮事狃因循凡謂綱條諸無件目加以地産豐夥俗習僣豪疆戾相高孤弱無告某止能為明枉直聊正典章惟存至誠豈有它術伏遇運使少卿選從中扆委付外臺旌别羣僚臨按一道猥收蒙鄙曲為薦揚取困轅間奪燋竈下施之寶校飾以珍徽俾騰長途使備雅樂存憐若此感激無涯惟務操修庶酬知遇卑情無任佩荷深切之至謹奉啓稱謝不宣謹啓謝成都知府啓某啓解麾漢水之陽愧無善狀剖竹洋川之上重沐殊恩退惟謭薄之姿薦託醇醲之蔭已頒條教謹佩針規切念某性本椎儲學無根據誤中太常之異等獲陪祕府之英遊然而蹤迹甚孤媒援絶寡常務以繩墨而勵巳豈暇學脂韋而事人衆皆憐之盡謂其不肖獨無愧者自知其當然況其幸之巳多於所請而常得矧兹刺史之職任實曰難才惟是上官之保存方能免過此者伏遇某官以高才奧學而升法從以奇謀妙略而居要權總鈐兩道之兵符提按諸城之吏瑣向嘗備吏巳荷庇饒今復為州又煩提教屬守符之所系伏賔戺以無由跂引崇嚴下情無任喜懼交集之極謹奉啓謝不宣謹啓謝中書啓某啓郡易其名罷當還館詔俞所表許復為州從人欲之便安何君恩之寬大重煩宰制竊負兢榮某巳於三月二十八日到任上訖伏念某門地至寒資材甚淺宦途蕞品儒館陳人學每強而不高命初稟而且薄從仕二紀罹憂百端居嘗自知分蓋如此鄉因乞守於鄉近曾未滿期而地遷既屬減休之員實虞轉徙之患遂陳悃愊仰瀆朝廷敢期下貸徼求再蒙寵寄此蓋伏遇某官以經術講大政以器識觀羣材輯和衆功製冶元化所以陶鈞之下無坯㙞之差丈墨之前盡輪轅之適用巧所及雖微必收故兹孱庸亦被掄委敢不飮食王事寤寐政經對諸吏民之言諭以君相之意凡云釐政止在矜寬庶知為國之仁少報代天之惠某無任感荷激切之至謹奉啓謝不宣謹啓謝文潞公啓某頓首上季夏極熱伏惟樞密太師侍中台候萬福同違離門館兹巳逾年想望恩闕豈忘夢寐自顧寒賤之品不敢非時奏記貴平掌縣令到州伏蒙侍中存録孤生特頒手誨丁寧告諭若語子姓奔騰浩蕩揮灑纍幅開緘之初勢欲飛騰伏誦數過暖如布帛出詫僚友盡恨不為巳物歸示妻孥皆云便是家寶台躔引照蔀室生輝昔人有受細林之言而退書諸紳獲山隂之字而别為一帙豈與不肖今日所得相比擬哉佩服嘉貺榮望巳足珠璣滿斗實輕此惠永言藏去以傳世衍同無任忭蹈激切之至謹奉啓謝不宣謹啓别𥿄某出入門下殆三十年賦命薄淺牽挽不上侍中每憐孤蹇顧遇不替凡列左右溫慰如一同所恨窘迫急於救贍不得居官輦下日趨恩屏得郡於此至為牢落山谷之中殊無氣味飮食之物藥劑之品悉仰它處速不能得巳過五十漸入衰病生平苦學自知無用間方僻所且冒祿食實亦自愧矣侍中常賜存恤敢此具道某上覆謝王尚書啓某啓某近至幕府少謝尚書為辦東行之惠以某之散冗以尚書之貴重其謁見接遇之禮止當一賜之坐一召之食則其體宜矣而尚書厚自損抑絶去崖岸延引勞問言貌溫悅遊騎燕席皆許參侍有所過慢一用恕悉此尚書立德之隆取義之重為之而可也其如某之負抱靜無所有使之將何以報尚書如是存眷者耶某此者幸得試職文館尚書將旦夕召用歌勳頌業燀耀尚書之休懿者某僅能為之是亦可以對今日所蒙之萬分爾漸遠軒屏某無任瞻系激切之至謹奉啓謝干浼威重伏增恐栗不宣謹啓謝提刑謝司封啓某啓某近者竊聞某官以某備吏於所部之下憐其亡狀之迹不能激昻奮迅自求所以比數於人亦巳久矣故深欲車推而綆汲之使不至留礙沈溺乃持其姓名覬有聞於朝廷之上而且謂其亦可以施用於當時者某蒙德之厚將何所有以謝公如此之貺於門下者哉某不勝喜懼交集倣􆁺展轉之至伏念某出於孤賤資品殆不能及於中人學進士本無望遂至於顯榮止欲求升斗之粟尺寸之帛以免夫終歲飢寒之患不幸天與之性使之簡介而專僻於人事殊不通曉常自顧其中枵然無它奇才以求知於人斂默羞畏固未嘗敢輒一開口問寵官要人丐少餘論執之以為進取之階從讀書應舉及第守官以至遷改資序召試貼職皆以在上者之人見愛謂某所行道途後日當必至其所至之地乃相與極力牽挽僅能致如此之今日雖然所獲能幾而巳似夫不可當得十年之中罹禍難𬒳困苦蓋濵於顚隕蹶踣之危者實屢矣昨蒙除恩粗得試守此郡正謂居明公提按之下殊不敢儕於􅊢人有斯須自便之懈循大端略冗目擊豪暴撫柔良如是焉而巳矣且欲勉在賢人君子之側不使少有罷軟不識之過以取煩於芘賴或至於不可留以為民之師帥又懼取煩於啓上而斥去之豈謂某官以恢博之量通察之明訾相官屬內辨良苦必以某底裏椎縵甘守頑藐偃然自治以安不肖垂哀下閔將灑濯而熏袚之使焯然發光焰出文采從學士大夫之後無或少愧某被賜厚矣言之無由以殫其為感之心矣其如所以日念報稱於左右者惟當飭羈勒駷鑣轡施鞭策就康莊而以事夫駸駸不巳者焉有阻趨瞻實增戀慕謹具啓謝謹啓謝張度支啓某啓近者伏承某官遠馳輶軒下歷敝邑傾望之始人皆憚於嚴明按視以來衆盡蒙於寬假官吏識提綱之體兵民忘持斧之疑才賢所臨風誼斯在竊惟布郡國之政皆以分朝廷之憂然於察亷必用照恕有智力雖短而顧無貪冒之惡有措置或爽而能盡公忠之心至如決罰微涉於笞杖之差區撥略失於關移之緩整比未稱占對稍愆此乃衆人常情庶事末節若次第皆指以為罪則煩碎下無其所安須存其權使盡乃術伏惟某官治巳以禮示人不疑通逹以該乎物情文雅以飾乎吏事凡閲諸目生求大端但觀為治者何如其人曾莫更問其至小之過深副上詔大歡羣心某退自省循實蒙存録惟堅其守用塞所知卑情無任感忭激切之至謹奉啓謝不宣謹啓謝張提刑啓某啓近者伏審提刑郎中不以某無狀特論薦於朝廷者承命悚愧處之不遑竊念某生於遠方世事畎畝稟賦不厚諸無所長止好讀書幸輒登第間關二紀患難百端雖通籍朝閨隸名儒館而自顧不肖常甘退藏向得此州實滿素望驅勤飾拙僅以逾年至於簿書紛叢獄犴煩瑣丁寧區撥骫曲辨明摧屈姦頑撫字惸弱未嘗一日敢懈於公謀免過尤恐負除委心勞如此才短奈何豈無不然上達有位伏惟提刑郎中取人無備接下以寬不職之愆過蒙覆護非次之舉復為翦揚荷所眷存敢忘報稱惟期勉懋用答奬知限守麾符阻趍墻閾某無任感佩慚忭激切之至謹奉啓謝不宣謹啓謝田京待制啓某啓昨侍燕坐親承誨言心相矜存意在推挽荷德之重撫躬而榮竊念某稟生甚微為學差晚勉道不至強文非高偶塵賢科遂去民籍一命佐府止安勤愚三年歸銓幸免愆曠比調藩候之幕獲依臺使之庥赴官未期託迹于是此者伏遇都運待制持斧按部驅車過州例參羣名進拜崇采接以溫𥙿巳被寵華之深憐其單平復形恩意之厚退念所守何堪其承再惟顓蒙本喜論撰公有奇節時方盛傳止能竭豎儒章句之微托賢者忠義之實會以逸事張之纍篇或播之於樂工或附之於史氏歷世兹永大名其新惟持此懷庶答乃惠謝都運傅諌議啓某啓伏蒙聖恩授前件官巳於去年十二月二十九日赴上訖莫府承寮巳編吏瑣嚴臺取庇謹佩官針省巳枵孱側身悚靦伏念某處地遐絶託宗衰寒易業耘芟嚮術鉛槧專尚以學妄追源流偶程其文謬玷科選既策足以從仕遂刻心而首公願殫勤愚儻稱恩遇向宦西都幸逃過尤此官南豳誓謹名節然而賦守椎滯云為拙蒙深繄賢明大與寬假伏遇某官德厚而載才高且通接物於誠待人以恕西道籍用簡君相之憂列城承流聳士民之望某幸以眇迹簉于洪庥常祈台光有照隟漏止營寸效仰報全仁某無任喜懼激切之至謹具啓謝與犯崇重伏增戰越不宣謹啓轉官啓某啓考績中臺叨奏成於吏效引名便殿獲序進於朝倫服寵命以優榮揆孤衷而悚越切原夫歷代之典最重者太常之司有虞之隆兼禮樂者秩宗之任惟周之盛次天地者春官之聯其後取名各殊定品尤貴於以表國家盛大之義謂其練朝廷沿革之文既為之卿也總正其端原又設之丞也佽助其區處苟非達聖作明𫐠之奧辨功成治定之宜識無不通才有可議則何以槩隸此局濫塵厥官就失慎於選掄是輕蒙於稱誦如某者出在遠蜀生於窮閻自曾高巳還而未嘗服官因文物之盛而輒自嚮學性薤梜以非頴文支離而不工偶叨薦書獲置仕版贊佐兩郡周回十年上官交章謂其可以任使本部按詔乃曰當乎敘遷有持所得之科名為引久行之恩例銓啓上列宸音下俞超居衆前使異平選逮趨雲陛之對親邇天言之臨錫之恩章命以通籍乃署此職以榮其躬何不肖之賤生受常存之要秩乃幸孰與其緣有來此蓋伏遇某官平誠接人用恕及物凡在顧矚悉生輝華剔鏤枵液而冀成美材鎔鑠堅頑而使就利器兹所蒙𬒳實由翦揚退惟孱冥粗識依嚮某敢不夙夜自敕起居弗寧率道而行徇公以處貴少收於治最勉後報於恩仁心所記藏書焉簡漏卑情無任感荷激切之至謹奉啓謝不宣謹啓上知府吳龍圖啓某啓仲夏毒熱伏惟某官尊體動止萬福即日某蒙恩伏念某違去左右倐焉三月嚮慕旌棨發于夢寐候問之簡念常愧仄實謂明公愛恕臨下須煩寵答所以用此有如惰略仰計崇量曾莫垂責伏惟鎮撫方面安靜如堵晹雨時節稼穡登楙善良伸展姦豪屏縮治蜀之績轉聞久矣惟虞鼎席之缺即下鋒車之召西南民吏求借不得某出入門下十年于此被顧良厚實越倫輩今復試守支郡獲依使芘蒙賴台照日晞光焰敢不夙夜思懋厥職上報大君之殊惠次酬明公之優眷符守所拘阻趨嚴屏乞上為宗社精調寢餗某卑情無任系戀之至謹奉啓上問台候不宣謹啓賀昭文文相公啓某此者伏審昭文相公寵𬒳明詔召還宰席朝野之士揖拜相賀誠以相公器度識略實冠流品洞明前世經權之會探究當今治忽之體用之於文則修舊起廢而倫理備施之於武則翦暴除亂而姦究息有惠利以浹民之骨髓有勳烈以載國之旗常窮涯缺隅孰不瞻系而一旦在外頻年不歸雖有美化止及乎一方實使重望久虛於四海皇上懷眷舊德企渴嘉論亟下宸旨以促其入追復正治易如指顧方今四夷未甚率服百姓未甚冨庶隂陽未甚調泰稼穡未甚蕃衍相公登庸羣議欣洽感動和氣煙霏雲浮熏蒸悠揚疵癘皆愈太平之遇期在旦夕天下幸甚某早荷存顧無所報效側聞休命跳地而舞伏限官守所拘不獲奔詣左右某無任喜躍之至謹奉啓賀不宣謹啓獻文字啓某啓某荒暗鈍呐幸庇迹於麾下以某嘗用文字進取科級以某官有重名于當世復仗使節臨按其上固宜整緝舊學蚤先諸人以獻左右為下吏導名姓於上官之禮然猶省慮忖審欲往而復郤者二年干兹矣無他實謂本期用此以求一顧之惠或懼惡其蕪雜蓄亂聽覽反獲投棄之辱職是故默然者久焉今歲官滿有旨召試在豳蒙蔭局事甚簡時亦強自搜剔營新補故聯比綴次以備其事雖日無取詎敢藏匿今輒繕寫古今雜著共二編上塵台几裁制之暇願賜披閲可進可止唯俟嚴教干凂威重無任戰栗之極不宣謹啓丹淵集卷二十九終
