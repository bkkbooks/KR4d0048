front:
  text: 陳眉公先生訂正丹淵集卷二十一
  hash: sha256:0a1f805d72da55a781a9bed76a788564f7bbd65726aa8d3617fa556ff4bbef59
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_021-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同參吳吳一標建先雜著黃氏易圖後題易以數變以管攝天下之事物橫該直涉窮崇擴遠幽么隱奧無所不及古之人得一緒而力引之舒演盤約以系其説滂洋滉漭而𥘉若有以可紀者究其推合遷就往往於端末亦自盩今之所謂京房之學者是巳房既受術於焦延壽延壽嘗謂房必以吾道亡其身後果然豈以其自置太審而尚鑿者歟取六十卦更直日事候一歲風雨寒溫以效其災休獨以坎離震兊號方伯監司以分至專王之氣主之其事疑強配不精解勤且勤矣然後人臨文所惑奈何故吾庶先之論由此而興矣庶先少遊四方博學善辨議湛思無不曉貫因悟周流六虗之説遂以完合京之罅漏散八卦所重之畫均諸消息而著之圖焉終始出入無一悖謬如瑵之聚斗如輻之擁轂循睨僂指不失倫類復撰明閠衍圖卦氣三篇以正諸家之未至以辨傳記所以昧沒之意磨神睛輔鬼髓庶先之深功厚力也欲視於世求此題述試為道其大氐世之君子考其圖閲其書者皎然若粉墨卑畫不待講解而其法自得此吾所以不復區區也熙寧巳酉孟冬望日墨君堂書張景儒先公手澤題後提刑司勳景儒嘗以其先正尚書公手書十九帖示其乃公之守成都時通洛中之家問也厚𥿄細字勻圓滿幅行楷相密淨無改竄讀之其間雖與其家人語言然未嘗不以巳之治蜀求宜于遠人及戒告其子使居官當務以淸愼端潔與人恭順為意者世之人徒知公生平立朝以風節修謹為名臣且未知公於其閨門不以私忘國不以下廢禮亦如是之至也賢人君子修身治心正家以至于任天下之事豈有內外大小之異耶其誠固以一矣某今見之於公也景儒公之苐三子自幼以孝友聞于人凡公之寸簡尺札盡能收拾裒聚躬自綴緝褾為大軸此其尤完者也景儒謂某曰是不獨自愛以為歲時霜露之思蓋將傳諸後世子孫使之知前人所為一切不簡妄知信蹈之是無忘乃祖之懿範矣因捧之愴恨良久某遂借去展玩纍日乃曰昔袁彖懷其父集未始一日離於身孔休源每見其親所寫書輒哀慟流涕景儒高行斯人之徒歟其有開畫扇而追悼持遺劒而祭奠者固未若景儒之所藏真迹燦然終身常在乎其目矣於其將還謹題於後魯肅簡公尺牘題後余過城因問魯肅簡公向時為縣之遺迹有言演覺寺愛山亭之榜公親筆也因往觀焉徘徊其下凛然若在其左右歎息良久顧慕不忍去寺僧可吟復出公書凡六𥿄煙昏雨浥幾至腐爛乃公去縣後與甘泉經邑真琛二上人之手書天禧𥘉仁宗為皇太子公自祕書丞以右正言召改戶部員外郎為諭德仁宗既即位公遂參預大政公生平以剛重潔直聞天下故𬒳選為調護之職當時士論無不相慶以謂用人蓋無誰可踰於公者今觀其字畫與其所以為書究其留意於舊故周旋委折諄諄訪問無一事不至者噫誠忠厚惇實之正人端士也世何有哉今夫人少相與從遊平居勢相若則嘗欲合兩心以為一交內于腹中一日趍所利僅爭頃步之差則闊視遠走亟往先就之既得乃反靣不復相誰何狠驁恣肆軒然自以我正當如此甚者交相詆毁或盡力排迮置死地嘗試以視公彼何等人耶雖然彼二上人者能以道行取重於公信亦非衮衮浮屠氏之徒耳因囑可吟令完綴緘鐍之勿妄以示人會進士李宏隨計入京可吟委之裝背褾軸俾稱其事宏歸携以過余且求余跋其後庶傳之永久也無疑熙寧九年丙辰七月癸酉洋州守居灙泉亭記八師經題後佛書載地獄事謂與人間造罪業而死入此者大小相較各以苦惱報無毫髮荖謬者具言所以為報之狀種種怪異初若不可信然往往呈露以警動世俗是果然矣吾友直閣吕縉叔敘八師經述陳氏子事迹甚詳密乃言其自見聞也如此縉叔性堅正其語且不妄豫遂得此本持歸蜀願鏤板以傳布庶當世有乖矞暴戾務為不逞者雖曰巳幸免國刑逃天禍完皮革以就死亦使其知幽隂之中法令悽楚慘雪不可得而苟脫矣以恐懼故或能易心改行以自懴首乃此經今人歸依之明效大驗也楞嚴道人繼舒師善化人者人大信之可主此事付此經白狻猊圖贊白狻猊圖蓬山太守安子野之見寄也子野言世傳此本甚古識者謂陸探微之筆郡有畫工善摸搭今試使為此謾持去敢求評之余愛其凡用意處非尋常畫人之所能及此雖不逮前人而典刑在矣乃作贊以示子野至陽之精動而為物豪健趫猛力不可屈伊惟狻猊質狀仡仡西海之中洲名聚窟厥生其間萬里中國請試言之大略詞曰肩凥抗衡鬛尾蓬勃口哆舌掉耳衝目突竄海鈹蛟捎空碎鶻虎豹飮髓犀象咽骨胇胃鬱攂不敢前捽忽時驚奔天出地沒有皓然者來何歲月陸生探微寫以奇筆筯緊肉怒常憂竊發後人傳摹粗得髣佛有客好事遠以書逹挂之高堂氣象崷崒每至昏夜鬼神窸窣瞥然觀之寒聳毛髮世有此類其勇莫越為之贊云大愧孱訥覺濟大師真贊并序成都府大慈寺有高行僧曰覺濟大師繼舒者以某年某月某日殁于其室其學人文照其弟子居逸等議葬之於彭州九隴縣選勝地而塔焉既巳又繪其像於塔中而恭事之請于常所與往來者文同為真贊同為贊之其詞曰有上品人學大雄氏了一切法到三摩地自領祕囑震音西南化同毗耶現比優曇倡導演教危歷四紀計所悟入屈忘其指在在處處瞻承光聲歸如羣流望海以傾貴主欽依重侯諦仰寵服恩名取卑天上乃數須盡示滅浮提孰窮其端住東院西丹景山前大乘寺側藏固遺燼表崇高級是咨妙繪圖寫淸真儀形則然不知者神怪石銘并序聶侯友仲立漢學制度宏侈為二蜀之冠當時不知何所得巨石置講堂之後質狀怪偉勢若飛動昔孟氏僣竊苑囿所蓄者皆寧武軍節度使顧璘所進昶既靣縳是物亦散落民間余在成都往往見於好事者園館凡自璘許來者一一皆具欵勒此非耳而其完厚瓌詭上下可愛雖到茂灌牛奇章號為好事諒亦未嘗見此者也治平丙午秋余視羣進士試於此旦暮環繞其下歎惜之不足乃為之銘其辭曰廣漢學宮後有奇石磊砢一抱嶔崟九尺怒蜃驤首狂龍轉脊拏空將翻壓地欲坼神乳溜腹老苔漬額堅包徑膂潤吐活脈誇殺羽人詠窮墨客敢告存護千古怪碧盧𣏌傳題後盧𣏌少時巳險矞無正行藉父奕淸名人不識其醜為號州刺史號有官豬三千𣏌因奏言豬患民甚德宗為徙沙苑𣏌復言彼亦陛下百姓莫如食之便德宗喜曰𣏌守此而憂它宰相材也乃賜豬貧民立召𣏌為御史中丞遷大夫遂以門下侍郎平章事異乎哉𣏌也士大夫立朝能自以其才結上知而都貴位者於古幾耶蓋常有所因于人然後可以脫塵泥而薄雲霄矣彼因之者或未有以能厭於中雖非巳所願求而它自欲以已為其重行之至此尚冝逡巡顧慮擇去就以避天下之大論一失之巳為當時所謂君子賢人者姍笑不存録所服塗地矣自昔帝王命相以夢以卜以自識其器業以得之於左右正人端士以深知其久負于海內之望者既審矣乃置之巖廊之上朝夕與之講議所以安養元元之治動神幾宣靈謀崇固萬世大業而共饗無疆之休烈乃當然爾今𣏌皆不然獨以豬為謀而遂至於宰制天下士民之命毁國章貽主禍頺替壞爛顛覆狼藉如此豈上天以時將溷亂擾攘不可支持而生𣏌與國俾造此紛紛者耶無乃先以其兆示人謂𣏌體雖人而行禽獸故使由畜産以進者耶何其本末輕賤陋惡若此之甚也天意若曰𣏌狠躁穢衊類豬故以豬發其身噫𣏌可賤矣然天之所以命人而作監於其後者亦巳怪矣李兊尚書諡議尚書恬簡和𥙿廉明敏給幼而警悟有成人之志壯且該洽中求士之選兩贊府事再涖邑政居為僚友之嚮服去得吏民之懷仰常致顯積用傳淸議道才美者公常在焉慶曆中魚周詢為御史中丞好善樂義賞拔賢俊乃獨表公求以自副公居臺侃侃甚著風力事略細故言存大體上常納其中啓人不知其外迹會廣言路尋當諫職遇有所發強且不避屢詆重戚謂辱於要位深排貴寺盡奪其寵勢當時衆論于今在耳既膺延閣之命頻委名藩之寄佩越印守杭符建廣牙握孟節旋旟自鄧典憲在洛泊然知止還政就第其有斷積訟止暴役活冤命辨鬻獄公之在官常所從事行巳至是與人何愧以壽而沒世亦鮮儷易名之典禮具于國謹按諡法曰履正志和曰莊公之居職乃心夙夜義不勢屈名非訐取考合懿行宜與此對請諡公曰莊謹議素靈宮醮詞某年月日具官某今差某官賚香果醪饌攝行淸醮于大聖金闕真元帝君某伏奉十月二十一日赦書致祭者皇帝因星文謫見肆赦天下蓋慮方宇之內物有不得其所而寃憤上激以成茲變者夙夕警懼無或處寧以至避正殿撤常膳而深自損抑寅畏天戒欽修聖德如此之至也復命守臣於其境內神靈之所宅皆俾虔恪供事以道上如此孜孜之意庶期消伏災沴以召休應帝君昔嘗顯章威靈偃禦元惡棲真祕奧光景如在某謹如皇帝詔旨上薦圭潔伏望下從人欲埀享精願攘妖萃祉保衛方國某無任虔叩激切屏營之至頓首頓首謹詞丹淵集卷二十一終
