front:
  text: 陳眉公先生訂正丹淵集卷二十五
  hash: sha256:f9bd4c0e7041377c6fa2c97c2f38002655bb6dd93373003e2be64f398ca5eedc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_025-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳吳一標建先序御賜飛白書序仁宗皇帝飛白書乃聖人不可窮之大藝而無所儗之絶學者也法傳之於天義授之於神淵情睿思下寓毫墨揮灑變動函負藏畜齊隂陽之功合造化之巧冝乎世人莫得窺其至精極妙之端涯者巳若夫皇居奥瑑貴室珎刻有容摹肖時亦飄墮其能於此以幸而獲之者自將别爲秘衷盡略他玩流卑後嗣傳于無極而况密繇嚴從躬𬒳寵錫將宜何如以奉其休榮者哉嘉祐七年冬十二月戊申帝召侍臣二十有八人觀書于龍圖天章閣又幸寶文閣是日上親御寶跗縱冩華楮貂璫遞薦簮笏環視雲飛霧散之狀龍蟠鳳矯之勢震聳驚眩流動衆目旣而遂命以書分賜左右太子賔客掌公禹錫時預此集乃蒙帝子之殊渥焉懷歸有光展對猶濕觀其點分璽角下壓秦寶畫立圭植高掩周瑞仰惟祥符之書氏陽之詔始可相與配其瓌麗而並其崇嚴者歟熈寧五年十月其孫文紀爲陵州貴平縣令襲衍複櫝載以臨治願將刋鏤布示于遠謀奉堅琰留寘佛廟見求短引以著其下懿哉侈君之賜揚祖之美乃文紀爲人臣子之道於是乎至矣故爲題此初八日謹序拈古頌序甚哉物之勝于人也乆矣萬利舞于前其心未甞不艶然願得悉厭於已者所欲一動厥本遂失而不可求旣爾將何䕶持而復能固之者邪彼根種鈍下迷謬惽塞入類旣淺餘習未斷者故不足與道此嗟夫世之衒智巧挾姦妄假名敎冐資級養巳謂無輩視衆若不覿者尚亦睢盰惘敞不自省覺其神巳爲有力者奪去淪虚浮空餘止腐殻猶務以氣自侈變改形狀標立高遠誇穉庸惑殊未知一息絕纊百骸附紟則隨業散墮灑隷羣趣沈幽沒冥無可洗脫柰何日日戴此重障了不明悟此尤爲最可憐者也嗚呼幻美溺人之深也如此其有能于其中視之謂非巳之常所能有故不仞其毒若水之不能濡膏之不能塗者間有人焉資政殿大學士趙公以台鼎之重再尹於蜀蜀之人三十年中凡五見公矣求公之迹終未能得或曰公之位旣愈高而其色若愈下謙靜恬懿無一易徳者何耶曰是亡他也脩眞逹元總了妄法物有不能勝之者矣所以常㨿三旌之榮饗萬鍾之厚固如飄風値劒暫有一吷彼又豈能轉之如俳兒顐娼執綸曵俛仰顛側諠詉伏罷一由於他人所役邪公旣以無事爲治其下亦各以無事安其職化旣成矣因萃㑹古人禪門語錄之深隱者拈而頌之凡百篇掲月昏衢擊霆奥􅒸瞽者瞶者悉使覺知仁人之言所利信博一得永得公之志歟嘉祐紀禪師出入公之門下香山如滿從白傅之遊圭峯宗密接裴相之論得公所迹願布行之冩鏤云初屬予爲序因爲道公之髣髴云時熈寧七年甲寅五月戊子日謹序射中金錢序學以正治心心以明養神神以玅應物是三者常相爲用然後始能就乎可致之事蓋發乎其內而不失其成于外者繇素具此爾古之君子於射事尤所重擇侯選士莫不先之豈非謂其善知夫此理者歟提刑度支張公文章政事之外弓矢之學號爲精絶求之縉紳實鮮其類近甞以金錢置之畫帖之上以壓其的用明其中之審與僚友競勝約先取以爲樂公徐立諦視一發而遂獲之正投其虚鏃若手貫坐客歛色相拱而顧左右驚聳都人歎詫皆曰昔人以楊葉衒巳㦸支伏衆者旣大且近何足夸侈較公之善彼有餘拙公因作詩以志其事大尹而下咸屬和焉馳寄於同使序其略同曰世常謂夫射而能居所中之多者豈天性之本然在乎習之之乆而後能也如志不自懈日事於其中無賢不肖者一皆底乎其善矣豈他術耶噫非也是不知夫所謂三者常相爲用之理也彼知之者則不然取於精微付之於手指之間省度而釋惟意所在未有不如其所欲者矣齊工之于削輪郢匠之于斵堊與公之於今日之事其道一也彼習之之乆而能之者末矣哉熈寧六年正月甲子謹序種柳詩序樂蟠地切邊其土燥澀磽㯺雖春陽震憤剖發以導仁氣亦踈散不演潤凡草樹託殖生意結結無人許長大柯幹局然皮葉磔然抱節起癭不中材用豈和理近戎落不霑浹抑西北性慘洌舄鹵與中州相絕至是耶楊君灝巨川爲令之明年暇日乘高窺臨笑此童秃曰宜物之術人常與天地相比儗寧有施力顓致不可歟遂種柳殆千根表絡諸道旣自指閱各任其地闌迾灌浸期以必活生脉通定一無殭者春條森森夏隂團團禽弄蜩喝薈翳蕃茂於是彼人乃能識榮落以記時節行者得休䕃無懼暍乏爾變此川谷一若關鋪巨川爲政之大抵也乃作三詩記其事且欲俾後人相增成和者連章以至大軸巨川携入都下示余属以序予曰事有利於用求成於本無或不謂爲難旣成而嗣守之能不毁乃難矣蓋人皆喜善自巳出若名于他則萬計沮礙無少假貸者十常八九今巨川營此亦巳勤矣來者能爲撫摩而不樵薪之是亦賢君子之所爲也詩將刻石於縣故余因以告後人云嘉祐庚子人日安靜文同序賞梅唱和詩序蜀之梅與海棠在衆蘤中最爲高第他雖號有處殊瑣陋孱瘠苦不可與爲類者然海棠用冶麗妖冨偏擅民家取悅羣目無所遴擇梅獨以靜艶寒香占深林出幽境當萬木未競華侈之時寥然孤芳閑澹簡潔重爲恬爽淸曠之士之所矜賞故其苐又自高也成都鈐轄東衙園有素芳亭亭下有梅因名之慶曆中四方館使太原王公䕶兵此邦是花正穠盛公命府尹程公而下七人飮亭上第賦詩道其美石刻存焉後二十年太原公之子道恭醇之用閤門使繼領此職其花依然尚如當時之繁醇之復㑹其帥龍圖趙公抃閱道運使史館榮公諲仲思同僚左藏武侯永孚及之運判職方霍侯交敦誠於此讌集而又詩之語精意新聮照牙映落墨未燥衆吻爭習他日醇之錄以示同俾載厥事同曰異乎哉彼梅者生于深嵓邃谷之中又居西南絕遠辟陋之國幸一得其所託遂爲王公大人所愛惜而詠歌之以傳乎無窮信夫天之生物滿盈于地中者徒芸芸耳豈能令之各善効其所負以取貴於一時耶蓋須待人而然後其名始有所成矣噫果如是則成之之力其勝愈於生之者耶一人之功殆高兹天耶同甞於此爲識者議之因序賞梅唱和詩故復云樗蒲格序李習之有五木經余常愛其叙所以爲樗蒲之用者始未皆具然其戯最古世之人罕有能作之者故曰木曰馬曰關曰矢之類雕鏤彩飾短長鉅細曾莫識其制度矣忠牧夏公守豳暇日出其家所藏先帝之賜者爲其僚屬講而行之於是盡曉習之之說也如此獨所異者盧白雉犢開塞塔秃撅梟之外復加進退二采蓋使其投無一或虛者焉又以秃爲黑以梟爲雞者疑語近爾按馬融張華皆云老子入胡爲此戯楚辭有呼白之語周史載擲盧之事臧質劉毅何尚之高光宗之徒皆以是而立善名也乃知士君子者亦無害留意于此彼王或王洪之墨黷鮑泉蕭望之泥嗜掠惡取禍固宜所鄙焉嘉祐二年丁酉仲冬月十有三日新平官舍序費先生詩集序嘉祐癸卯春東平先生以古律五七言詩共六帙因其甥朱景副書爲示且屬余以序置其首余熟讀者累日甚愛之余居常敢言唐人風調渉五代衰季巳淪委而不振及見先生之所爲信遺音餘響乆浮大空至治世而復下今又軋然發于先生之筆舌爾按先生閬中人少舉進士自勝冠走四方游名公鉅卿之門命旣不偶退返林壑盡諱其他能而一從事于此凡四十年探深摘幽愈老益工大抵氣和平而意精新使人嗜之而不厭也近世文士以篇什自名者甚衆如使先生之言雜行于其中彼將左右顧楫相推以爲先余恐先生得所濮上諱者固多傲然而獨居其前矣是可傳布於天下也郭令送行詩序汾陽郭君以成都府節度推官治永㤗旣二年凡內外職事官得以言舉善於爲政者共若干人以狀穪其治其將代也凡遠近士大夫喜以文章道人之美者共若干人以詩贈其行大抵君之爲令之術以廉以恕以不自懈以終始之若一也故吏不得肆其暴而民皆曰是未甞擾於我者如是安得穪其治者不交章而贈其行者不累篇耶其詩君次第爲一編持以示余俾余題其首將布之余爲之云云丹淵集卷二十五終
