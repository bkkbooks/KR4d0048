body:
  text: 丹淵集巻三宋文同撰詩五十七首貴侯行將軍功勲滿旂常昨日賜對開明光腰懸槖駝紫金鈕爵號進拜諸侯王㦸衣翩翩弄春影大第高門臨萬井但願嚢書絶邊警常官中都奉朝請朱櫻歌金衣珍禽弄深樾禁籞朱櫻斑若纈上幸離宫促薦新藤籃寳籠貂璫發凝霞作丸珠尚軟油露成津蜜初割君王日午坐猗蘭翡翠一盤紅靺鞨拾羽曲新羅砑紅裙襵齊綵縷刺衫花倒提新晴暖日麗烟草金獸齧鎖藏春閨朱橋逼江曉沙白錦帶交風大堤窄蘭洲遺翎得殘碧歸來驚飛上嬌額沙堤行金吾馳騎東復西督兵萬指平沙堤傳言築路拜新相恐與九衢同一泥夜來上在蓬萊宿手寫姓名符夢卜連詔黄門下北扉趣草賛辭登力牧平明劒珮羅東閣大字滿行書德業謁者長言告紫宸感召一庭和氣合上心喜曰予良弼未謝急宣令直筆羣吏迎歸政事堂指顧之間歌畫一午漏初移催入馬寳帶盤腰印垂胯歸來冠盖爛盈門異口同音賀太平五原行雲蕭蕭草搖搖風吹黄沙昏泬寥胡兒滿窟臥寒日卓旗繫馬人一疋夜來烽火連篝起銀鶻呼兵㨗如鬼齊集弓刀上隴行犬譟狐嘷繞空壘羌人鈔暴為常事見敵不争收若雨自高聲勢叙邊功歲歲年年皆一同將軍玩冦五原上朝廷不知但推賞讀武紀嗟哉武之有天下甘心神仙希羽化五十餘丈起樓觀萬八千里走車駕安期羡門竟何在五利文成終死詐若非留意尚文學嬴政且賢非爾亞題東嵓隠者壁青峰叢叢擁危壑綠樹團團扶曲閣幽人睡起漱寒泉坐看一林山雨落岩前火氣雜芝术澗下苔痕亂猿鶴自憐塵土滿衣衫欲解從君今尚莫東山亭朝陽之峰乃天設曲嶺長崗地盤結下臨絶澗走縈回上聳巍亭飛􅏭嵲晩雲幾處水墨畫秋樹數畨紅綠纈安能恰㑹此時閒静與詩翁吟曉雪水邊春半芹牙差差蘭笋短石渠氷銷水色淺倡情冶思不可奈好鳥間關花婉娩鮮衫翠裾者誰氏行歌楊枝惜時晩臨流有客抱危膝苦調長謡問誰遣採藥歸晩因宿野人山舍東岩隂深崖巘古夾澗垂泉結鵝乳我來採藥晩忘歸試宿荆扉問鷄黍春風滿林燈火冷一夜不眠山月苦平明携策下青蒼松葉紛紛洒新雨後溪晩歩隂隂芳樹暗回堤路入蒙籠轉野溪澤雉應媒高復下林鵶引子歇還啼青蒲宛宛全淹水紫笋斑斑半出泥倚杖風前感時節亂烟斜日一蟬嘶山中新晴山中新晴曉烟暖散帶頽冠漱岩畔海鹽未去猿鶴喜柴桑初歸松菊亂林間餘雨時一滴嶺上飛雲忽雙斷安能舉手恣扶摇欲共高鴻拂霄漢鹽亭縣永樂山叩雲亭長江合高峰爽氣左右繞中流望絶巘萬丈見木杪孤亭揭其上隱隱一拳小李君令兹邑邀我升縹緲是時天宇净晴色洗霜曉萬象滿四隅轉盼皆可了神清壓塵坌志適喜猿鳥人生貴軒豁世務苦紛擾兹焉獲登覽浩思欲飛矯令謂亭我為勝絶此應少願子立佳號光輝飾松蔦因名之叩雲大字榜霞表杜逸人歸龍山上亭北望二百里頽巘墮壑圍龍山余嘗往來見之喜飲食夢寐皆孱顔恨無羽翼一飛到羡子長往不欲還安得擺手掉世故相與傲兀於其間曉入東谷振纓効王官釋耒去鄉縣十年始還此景物覺盡變東谷素所愛乍到若創見烟雲引晨策數里入葱蒨明霞照溪口花草露初泫長松盤高崗竦竦擢秀幹垂隂雜羣木上欲接霄漢柔蘿互鈎鎖攬地走荒蔓修篁揭其間萬个挺若箭登臨愴舊厯眺聽恱新翫讀書破茅廬徑彴巳漂斷唯餘舍南水尚吐石竇濺潺潺落危壑衮衮引飛練臨流濯塵襟照影寔覿靣功名竟何所旅跡轉孤賤引手謝猿鶴深慙爾驚怨東谷沿小澗樹木叢蔚中有圓潭愛之乆坐書所見野水㵼古穴石岸盤回淵飛塵不可入竹樹圍清漣静往得勝玩深居逃俗緣寒光照煩襟景寂心自圓枯篁蹲碧禽垂頸窺沉鮮對之不敢動相望兩俱禪東谷茅齋野徑轉深密静無車馬痕松花金粉墮苔葉翠茸翻蟲鳥春音雜烟雲晩色昏俗塵何處入長是掩谿門夏樹夏樹始繁密條縷方且柔左右覆吾廬合如張碧油新蟬噪晴午餘響藏深幽軒窻轉炎日清影為我留蚊蚋亦取庇閙若春雨稠拂揮不停手咀嚼胡爾讎何當薰風來一與掃蕩收吾將就高䕃濯足臨寒流田舍園林曉氣清籬巷夕陽明石竇聞寒碓烟坡見晩耕豚蹄供禱賽龜殻問隂晴欲識豐年樂一村雞犬聲高槐高槐夾前除合䕃巻若洞交柯載宿雨壓地翠色重青蟲煖自挂黄鳥晴輙哢枕簟傲炎風為君高興動春閨枕帶縈春思窻紗漏曉光蠨蛸傷逺别鶗鴂感流芳粧匣蒸殘粉薰爐試舊香洞房燈燭外只有夢悠揚採桑谿橋接桑畦鈎籠曉羣過今朝去何早向晩蠶恐卧家家五十日誰敢一日惰未言給私用且以應官課青城山丈人觀羣峰垂碧光下擁岷僊家神皇被金巾坐領五帝衙威靈攝真境俗語不敢譁精心叩殊庭俯首仰紫華願言鳯羅盟畢世驅塵邪循奉蘂珠戒期之飛太霞上清宫瓊臺横紫霄上有縹緲居雲霞抱窻户日月循庭除飛羽下金輦隱芝吟玉書俯首視人間人間臭如帤張少愚書院澗水侵斷橋車馬不得通飛嵐積庭礎秋蘚垂紫茸窻紙爛溪雨簾衣拆林風主人殊未歸使我烟景空誓鬼碑正一受天籙腰垂神虎章羣魔獄幽隱秘篆刻青蒼故事駭前志餘威驚大荒誰能識奥訣禹歩學魁罡天師栗天師携此種至自上饒逺當時十七樹高幹倚孤巘蒼蓬蒺藜大紫殻㯽榔軟蜀部名果中推之為上選孫知微畫太古奇偉士精思獨於畫馳心入茫昧萬物赴揮灑當時一名重顧陸非爾亞卓哉青城筆妙絶冠天下寥寥九天仗一一若神冩吾恐千載後是終無繼者早晴至報恩山寺山石巉巉磴道微拂松穿竹露沾衣烟開逺水雙鷗落日照高林一雉飛大麥未收治圃晚小蠶猶臥斫桑稀暮烟巳合牛羊下信馬林間歩月歸楊山人歸綿竹一别江梅十度花相逢重為講胡麻火鈴未降真君宅金鈕曾盟太帝家道氣滿簪凝綠髮神光飛鼎䕶黄芽青騾不肯留歸馭又入無為嚥曉霞閒遣庭竹擁高叢移床就好風掩門休務外隱几坐忘中世事元何物人心了即空客來休借問此意浩無窮睡起寥寥公館静門掩似山家竹簟屢移枕石盤頻浸花閒多新得策事少早休衙一覺高舂睡誰來伴試茶梅寒梅引舊枝映竹復臨池朶露深開處香聞瞥過時凌兢侵臘雪散漫入春詩贈我歲寒色憐君氷玉姿永泰劉令清曦亭木杪照初日捲簾知曉晴軒窻無限思圖史有餘清露下濛花重風來泛竹輕何須嫌五㪷持此謝淵明貧居䋲床擁敝裯初起髮未櫛南窻展書巻就暖讀寒日門前絶車馬薄暮垂片席短墻挂纎蔓幽鳥啄紅實羣蝸惡積雨繚繞篆空壁男兒處貧賤舉首宇宙窄翩翻搶榆鳩宛轉匿絮蝨妻孥競相笑憔悴守文筆惜花胡蜂採花花氣薄黄鳥啄花花蘂落林風吹花花片亂池水浸花花色惡少年惜花㑹花意晴張青幃雨油幕勸君直須為花飲明日春歸空晩萼貞女吟身外無一簮何以供鉛華飾行不飾容濁水白藕花藕心亂如絲妾心圓如珠絲亂端緒多珠圓瑕纇無焉得偶君子奉之此高節所生雖至親此意安可說莫折花莫折花花好亦自喜勿謂花無言請以君心酌花意君容待花轉豐艶花枝因君愈憔悴莫折花任花飛落地但對春風倚芳樹長遣香英伴君醉織婦怨擲梭兩手倦踏籋雙足趼三日不住織一疋纔可剪織處畏風日剪時謹刀尺皆言邊幅好自愛經緯密昨朝持入庫何事監官怒大字雕印文濃和油墨汚父母抱歸舍抛向中門下相看各無語淚迸若傾瀉質錢解衣服買絲添上軸不敢輙下機連宵停火燭當須了租賦豈暇恤襦袴前知寒切骨甘心肩骭露里胥踞門限叫罵嗔納晩安得織婦心變作監官眼野花歎昨看百草抽新芽今看百草開新花岩隈水側自成列紅醜紫賤何交加東皇施恩豈不溥隨所付受無少差爾之瑣細亦蒙被盡使奮發争春華纎叢密蔓不可數競起塗抹如矜誇妖鶯冶蝶不爾顧去爾自欲尋名葩爾知有艶貴爾否歌管匝樹侯王家爾徒此地弄顔色只自狼藉隨泥沙何當照水自窺覽枝赧葉懼相藏遮晩村無限曬殘日索酒為爾成吁嗟均逸亭普州三亭亭宇跨城端新苔磴道盤風光晴水石烟景暮林巒簿領仍多暇賔從每盡歡何由掉塵鞅聊問借闌干東溪亭短彴逶迤渡高櫩夭矯沉波光環堵浄日色綵梁深萍荇翻金鯽蘭苕超翠禽主人公事簡時此照清襟碧崖亭斷巘淥溪邊危亭翠壁前軒窻誰是客詩酒自稱僊逺壑春藏雨長波晝起烟吏人休報事高興正陶然送郭經知縣促促送歸客短亭垂柳風離罇掩殘日去騎若輕蓬百里謳歌内三年畏謹中鄕人問蜀物笑指一嚢空過祿氏山齋過水得慿檻滿川皆夕陽江山逢勝絶手筆恨荒唐城郭蒙籠近汀洲杳靄長明朝又東去塵土入衣裳題李處士月軒圓蟾噴金波萬里灑清滴幽軒得虛敞皓彩溢素壁繩床有高隐苦調起岑寂盈襟納孤光靜與爽氣敵余過興州太守晁侯延之於東池晴碧亭且道其所以為此池亭之意使余賦詩鄭谷題詩處荒凉不復知使君來問日景物欲歸時崖巘供清溜亭臺繞翠漪主人憐過客借與傲炎曦蒲氏别墅十詠風交蒲葦亂烟斷鳬鶩飛日暮一笛起扁舟垂釣歸右方湖軒窻曉吹清枕簟晴光冷亭上逍遥人滿身摇水影右涵碧亭逼簾呈素艶入座薦清香何以陪暑飲對之飛玉觴右白蓮堂曉靄滋花色晴輝發水光何人露新纈不管著秋霜右芙蓉溪積水自淵淵來源常汩汩岸上翠衣禽對人時一沒右魚池紫盖嫰貼水玉梢長刺沙避風紅出沒驚雨綠交加右蓮池溪光摇玉壁雲影漏金盤誰此伴高興畫橋慿曲欄右清蟾橋決水轉横渠交塍畫方罫秋風報秋熟滿頃吹䆉稏右稻畦高臺按虚境飛駕羅太空小兆佩神虎每來清夜中右朝真堂深深鄭真谷小小焦先廬借問貯何物滿床皆隱書右草庵丹淵集巻三
