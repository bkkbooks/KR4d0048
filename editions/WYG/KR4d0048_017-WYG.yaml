  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_WYG_017-1a, image: WYG1096/WYG1096-0654a.png}
body:
  text: 丹淵集巻十七宋文同撰詩五十二首往年寄子平徃年記得歸在京日日訪子來西城雖然對坐兩寂寞亦有大笑時相轟顧子心力苦未老猶弄故態如狂生書忩畫壁恣掀倒脱帽褫帶隨縱横諠詉歌詩嘂文字蕩突不管鄰人驚更呼老卒立臺下使抱短簫吹月明清歡居此僅數月夜夜放去常三更别來七年在鄉里已忝三度移雙旌今茲惛惛意思倦加以跕跕疾病嬰毎思此樂一絶後更不逢人如夜行贈日新禪師嶣嶤祝融峯䆗窱懶瓉巖師也西南人甞居彼巉巉十年不下山煙雲爛衣衫借問爾何為法味見愈饞妄萌將軋然即以慧刃芟既久闢門户不須更封緘龍神䕶水缾鬼物扶經函疊足坐蒼石放身依古杉一日望劍門歸心瞥如帆過我畫㦸前清晨投短銜欣然揖師坐未語已不凡再勘自不破誰敢分酸鹹大朴本無痕巧者强削劖師如捉龜拂定不空諵諵送竇僉判同年冰霜滿清漢此地送君歸天涯作遠别懐抱殊依依短亭臨灙水楊柳長條稀道傍有寒梅幽香撲人衣折以持贈君愛之含春暉酒罷不可留晩鴻隨馬飛拙詩六韻奉寄興州分判誠之蒲兄武興山水郡左右有佳處仙巖蟬兩殻何賈二真人佛宇玉一柱神坑孕金礫冝口金穴靈竇洩瓊乳鄭都縣泉乳柱石窟寺不辨文字古郙閣漢銘主人好事者乃我詩酒侣安得陪後乘放蕩此歴覩依韻和蒲誠之春日即事輕煙漠漠雨斜斜無事常敎放兩衙問客江邊求好石倩人山裏覔竒花新蔬宛宛生晴圃淺溜涓涓出暖沙入夏盃盤須准備繞畦親灌邵平𤓰和提刑子功喜雨時雨已可喜况當春發生入地如流膏浸灌萬物萌真宰每自惜纔灑復却晴常時稍霑濕庶彚亦已榮昨宵忽盛下欄宇翻瓶罌髙原與庳陸旦可一尺盈尋觀太陽起紅光吐崢嶸萬里洗氛濁四顧蒼煙平羣農悉就野上下羅晨耕父老荷鋤鍤林間笑相迎盡言此美澤天意恤下甿麻麥固已足預見禾黍成且幸賦輸辦敢望求他贏次第還與官口腹甘别營願常獲豐稔自覺所取輕言罷乃散去溝壠紛縱横使者有職事其喜誰與并髙齋聽淙淙不寐達五更豈不省文移頼此一夕傾天明作浩歌滿紙編和聲謝夏文州寄金線狨天地生竒獸朝廷寵近臣覆鞍須用此投網為何人梨栗恩雖厚雲山夢想頻煩君遠相惠時為一沾巾依韻和子駿雪山圖一白溪山六幅中其間雪意與雲容君應記得飛仙下飇馭亭前此數峯此樂吏散收簿書公館如山居歸來換野服攜策將焉如園亭極瀟灑隂森脩竹下拂石坐終日徙倚不知夜山月照我明林風吹我清口誦太古文往來池上行露下覺㣲凛南忩歸就枕心閒神自安達旦得酣寢亂曰嬾守爾何為日日常若斯為言我自爾此樂非汝知百舌鳥衆禽乘春喉吻生滿林無限啼新晴南園花木正繁盛小小大大皆來鳴藏枝映葉復誰使不肯停住常嚶嚶就中百舌最無謂滿口學盡羣鳥聲自無一語出於已徒爾嘲􅑜誇從横朝朝泊我高柳上叫破一牕殘月明幽人穩睡正酣美無計可奈遭爾驚少年挾彈彼誰者安得為我來五更莫掃花莫掃花從敎花滿地縱然堆積亦何害留之且重東君意君不見昨朝枝上正芳菲今日庭前已憔悴中間得好能㡬時用此請君窮物理一榮一謝兩皆空若了非真本自同但對落英開酒盞毎年如此任春風詠竹一字至十字成章竹竹森寒潔緑湘江濵渭水曲帷幔翠錦戈矛蒼玉心虛異衆草節勁踰凡木化龍枝入仙陂呼鳯律鳴神谷月娥巾帔靜苒苒風神笙竽清簌簌林間飲酒碎影揺罇石上圍棊輕隂覆局屈大夫逐去徒悦椒蘭陶先生歸來但尋松菊若論檀欒之操無敵於君欲圖瀟灑之姿莫賢於僕詠石石石隂黑陽白岸肧胎山骨骼天地鎔鑄鬼神刻畫鯤鯢張怒眼虎兕交鬪額敲如温玉聲清洗似精銅色碧花邊矹爾盡竒品林下礴然無俗格冰霜慘冽堅操不移塵土昏冥孤標自隔嶤矹獨立見到侍中家磊落羣居在牛丞相宅昔時大士常命汝曰聽徒今日衰翁且對君為佳客深渡前日寒食在綿州牡丹盛開海棠落今巳逾旬過深渡山桃一枝横曉閣此花平川最為早何乃於此才破蕚化工豈爾用功偏蓋爾所生居絶壑一年春事但自了勿較後先嗟寂寞嘉川嘉川之西過新棧㡬里朱欄繞青壁我行落月尚在水水影照人襟袖白繁英雜綴脩蔓上緑錦纈帶垂百尺清香滿馬去未休頼爾春風慰行客青烏青烏客館之東軒前對長江隔層嶂欹危一徑入林外竹柵茅簷儼相向愛其生事亦自足牛羊縱横雞犬放安得與爾號比鄰為作野歌供吹唱木𤓰園驅馬下髙崗吟鞭只自揚溪山過新霽草木發清香浩蕩來江闊縈紆去棧長春風去欲盡樽酒嘆何甞長舉山色滿西閣到江知㡬層峯巒李成似澗谷范寛能闊外晴煙落深中晚靄凝無由畫竒絶已下更重登水磑激水為磑嘉陵民構髙穴深良苦辛十里之間凡共此麥入麵出無虛人彼甿居險所産薄世世食此江之濵朝廷遣使興水利嗟爾平輪與側輪長舉驛樓爽氣浮空紫翠濃隔江無限有竒峯君如要識營丘畫請㸔東頭第五重正月八日峽中新花深碧長條淺紫芽曉叢無數傲霜華只應恥在江梅後未著葉時先放花贈淘金叟濯石淋沙不自勞抉光挑屑甚么麽世間有客能胠篋比爾元來得校多過青泥鐵山正月雪交加欲探東風未有涯纔過青泥春便好水邊林下見梅花過大散寄子駿纔過嘉陵心自喜歸來一夜冩君書明朝便送層冰底定有西行雙鯉魚飛仙石溪愛此潺湲任濺衣獨尋幽石坐多時日斜徒御應相笑底事教公上馬遲籌筆諸峯君㸔籌筆驛江邊翠壁蒼崖起晝煙正是峽中佳絶處土人休用作畬田柳池贈丁絪場屋聲名四十年五車書誤一嚢錢老來山驛為監吏相對春風但惘然偶題鬢雲雙墮結明珠窄窄羅裙短短襦閒把花枝起新樣滿調金粉畫交輸天漢橋風吹兩岸菰蒲乾雨灑一汀鳬鶩寒夜深霜月照湖水須上此橋憑畫欄望雲樓南山北嶺遠如層朝雲暮雨濃若蒸樓髙百尺見萬里更有底事須來登灙泉亭竹列蒼㦸枝幹稠亭開翠幄窓户幽下分灙水入渠口正坐小榻臨清流此君庵斑斑墮籜開新筠粉光璀璨香氤氲我常愛君此黙坐勝見無限尋常人二樂榭㬊山北來聳峨峨漢水東下流滔滔開軒直可望百里最愛此榭凌雲髙漫郎亭鑿城為洞深且長㳂壕開逕閒復荒有亭如許入蒙密誰比次山稱漫郎涵虛亭雲外衆峯簷際横竹間飛泉窓下鳴欲往二樂即歇此胷懐已自如冰清菡萏亭日髙過竹湖水光風長入座荷花香交紅映緑滿渠下各有意態隨低昂篔簹谷池通一谷波溶溶竹合兩岸煙濛濛尋幽直去景漸野宛爾不似在塵中王氏北溪榮州石龜州北羣峯起一去距城無十里煙嵐秀氣䕶巖扄松菊清香泛溪水輕裘肥馬正榮耀春韭秋菘任凋毁待将底物勒移文谷口濃雲白如紙雋老水墨之人勃海後所尚亦瀟灑不承春秋學乃好水墨畫鵞溪吾鄉里有絹滑如砑君凡㡬多筆為我秃數把李堅甫淨居雜題一十三首并序堅甫旣得請太平宫遂於長安里第營治亭館為逍遥種種之樂巳而作詩十三篇遠來見寄且使余亦為之余愛其趣尚清遠因以累句附其所題之末慙非精工聊以塞命云爾何事當清世歸來詠考槃近聞新住處不似在長安右静居米鹽辭劇務宫觀得清資自取閒官樂爭敎俗客知右靜叟將何冩幽意有此古桐聲為問好彈處誰來聽蠏行右琴室身閒無可奈惟此度晨昏與客正爭局問誰休叩門右棊室縑緗羅几格無限有竒書想在中間坐渾如獺祭魚見義山别錄右書齋試品齋中畫曽無第二流頑礓與亂篠應挂在當頭二畫余之筆因戱及之右畫齋日光明駘蕩天氣暖氤氲草木徧庭檻清香朝暮聞右春軒清飇動蕭瑟翠樾减婆娑却愛夜來月滿忩寒影多右秋軒鐵石枝梢勁冰霜節目圓淨搖風苒苒閒映月娟娟右竹軒翠羽攅何密青丸綴實繁誰知人與木俱是太清孫右檜軒寒溜日涓涓縈紆小檻前不知明月下誰與弄潺湲右水亭未老先求退題庵乃自呼有才須進用能保此名無右退庵淨居都葺了餘地蓋斯堂不用栽萱草無憂可得忘右北堂丹淵集巻十七
