body:
  text: 丹淵集巻二宋文同撰樂府雜詠秦王巻衣咸陽秦王家宫闕明曉霞丹文映碧鏤光采相鈎加銅螭逐銀猊壓屋矜蟠拏洞户鎖日月其中光景賖春風動珠箔鸞額金窠斜美人却扇坐羞落庭下花閒弄玉指環輕氷扼紅牙君王顧之笑為駐七寳車自巻金縷衣龍鸞蔚紛葩持以贈所愛結歡期無涯殿前生桂樹童童彼芳桂藹藹生廣内靈根浹和液柯葉冬不改日月最臨照雨露偏汪濊願保剛勁質與君同萬嵗臨髙臺臨高臺望故鄉地千里天一方極目外空茫茫孤雲飛不我將安得羽翼西南翔自君之出矣自君之出矣弔影度晨夕中門一歩地未省有行迹閨闈足儀檢常恐犯繩尺欲寄錦字書知誰者云的東門行士有失所偶難甘蓬蓽微拔劍出東門感憤不願歸賢哉彼嘉匹逐逐牽其衣願同此饘粥節義安得違況今謂清世不可復為非西門行盛年可愛重芳辰宜嬉遊金甕釀醇酒玉盤炙肥牛青春九十日不可一日休勿自汩浩氣滿胷蔵百憂君莫惜黄金黃金身後讎自古貪與吝常為賢者羞塘上行寒塘漲新雨灧灧翠波滿沙晴步聲澁風引羅帶緩蒲牙妬舌利荷葉歡心巻生平玉衣夢至此神亦誕徒誦小星篇無人覺腸斷釣竿霜刀裁緑筠桂餌掛輕緡歛迹天地間側身江海濱悠悠寳帳夜寂寂烟波春何時投竿歸再與君子親烏生八九子南山有烏鳥生子層崖巔戢戢新羽成相將弄晴烟朝饑集壠上暮渇來溪前託居深林中自足終爾年胡為去所依無乃甘棄捐却愛庭樹好羣飛投碧圓高枝踏未穏身已隨潜弦因知萬物理主者黙持權凢云愛此命生死期已然出入既有定何歎於後先野田黄雀行搥鼉鏗鯨宴瑶臺紅鵶弄翼春徘徊和風入坐賓主樂金觥玉豆天中來勸君劇飲莫自訴暗中光景能相催試看庭前好花謝枝下落多枝上開人生不厭苦行樂勿用蹙促相驚猜賢愚貴賤各有命此理悟者眞賢哉苦寒行上太行兮髙盤盤日將暮兮嵗已闌入谷口兮出林端風慘慘兮吹骨寒氷霜結兮玉㠝岏光上照兮天色乾紛橫委兮草樹殘黯慄烈兮烟雲􅟎僕足皸兮馬蹄抏望所舍兮摧心肝囊立空兮衣且單嗟道途兮胡艱難苦熱行黄人頓駕留天中金鵶吐火燒碧空炎光染雲聳岌岌旱氣爍土飛蓬蓬龍揺乾胡不作雨虎裂渇吻無生風安得有術擘海水入底一扣鮫人宫俠客行紫髯圍碧瞳勇氣炙坐熱生平脫覉靮少小服義烈堂堂吐髙論牙齒若嚼鐵寳劍壓䏶橫誰恥我可雪酣歌入都市當靣洗人血常言荆軻愚毎笑豫讓拙事已不受謝門前車馬絶自謂取功名焉能由筆舌巫山髙巫山髙髙凝烟十二碧簮寒挿天危嵓絶壁已飛動況復下壓萬丈之蒼淵波衝浪激作深井虎眼徹底時一漩長風澒湧發灔澦惡色怒勢因誰然我欲截中流虹梁莫得施􅠠蜷東西相逺望不到兩目欲斷心將穿囘看髙唐廟下灑靈雨遣我歸意常翩翩水仙操嗟哉先生去何所兮杳不可尋捨我於此使形影之外兮唯莽蒼之山林仰圓嶠之峩峩兮俯大壑之沉沉長波澒涌以蕩潏兮羣鳥翻翻而悲吟寂擾擾之煩慮兮納㝠㝠之至音先生將一我之正性兮何設意之此深我已窮神而造妙兮達眞指於素琴先生盍還此兮度明明乎我心大垂手華堂合樂轟春晝鳳呌龍嘶畫鼉吼瓊猊壓地開組繡美人舞兮獻君夀紅婆娑兮翠蚴蟉雪飜花兮風入栁曳輕裾兮揚綵綬金鸞飛兮玉麟走入急破大垂手香檀扎扎江雨驟情凝力定方舉袖烟收霧歛曲徹後錦盈車兮珠滿斗採蓮曲緑纈襠紅繡裳衫盤蜂蝶裙鴛鴦雕瑰錯寳垂鬢長紫冒翠盖行新粧蹁躚曲堤下囘塘畫橈送入波中央羅袖巻起金釧光揺輕撼脆敲短芒丹瓊紺玉低復昻霑裛薄粉撲嫰黃蠶腰蛛腹絲飃揚列坐綵舫求比方笑聲吃吃動明璫挨蒲拂蓼次岸旁風吹落霞供晚涼西城鵶鵶啼女墻歸來索酒酌滿觴吳屏蜀帳圍象床困卧不起燈燭張琉璃盎缶叢生香對酒朝廷皦如日區宇清若水殊方文教達微品徳澤被伊人復何幸遇此栗陸氏茫然大虛内蒸鬱盡和氣眞風浹敦俗無所容一偽唯宜對罇酒酣飲樂無事人閒此昭世得偶須自貴無為名所勞區區取愚諡白頭吟憶昔宴華堂金徽𨗳幽意雖知取名賤越禮奉君子相期本同穴誰復恥犢鼻一見茂陵人烟霄與泥滓願言保新愛妾以甘自棄恩義薄所終多生於富貴芳樹庭前有芳樹穠隂滿軒碧莫惜更携酒醉此青春色朝來見鶗鴂飛鳴繞其側光景不可留徒遣君歎息武溪深嶠南之武溪其深不能測潭潭滀瘴癘水色重如墨昏然潦霧作上下毒氣塞仰視髙飛鳶跕跕墮兩翼交州惡女子制馭費銜勒伊余繆兵寄得總浪泊役常甘馬革死持此期報國卧念少游言從之何可得走馬引羣蹄踏空山半夜若風雨平明即其地已復天上去惟予廹大義盍免以名捕蟠蝸入寒殻此豈謂安處脱身入浩𣺌固有神物護禮謂不戴天天知天亦許起夜來曉牕明緑紗蜀錦壓春卧橫腮虎魄冷驚起新夢破玲瓏轉條脱縹緲梳矮墮髙軸響銀床時誤君車過長安道長安道隋唐宫殿生秋草若使皆知嗣業難爭得行人望中老王昭君四首不惜將黃金争頭買顔色妾貌自可恃誰能苦勞力其二絶艷生殊域芳年入内庭誰知金屋寵只是信丹青其三㡬嵗後宫塵今朝絶國春君王重恩信不欲遣他人其四極目胡沙滿傷心漢月圓一生埋没恨長入四條絃吳趨曲三首萬頃平湖水晴光射早霞紅裙鬪畫楫相結採荷花又岸上相將疊鼔催青翰齊上碧波開鵁鶄屬玉不驚起慣見蘭橈日日來又蕩漾水中舟徘徊岸邉馬相看兩不語密意待誰寫劉生厯古推任俠彼劉生者何提椎擊朱亥引劍刺荆軻飲肆扶頭出歌樓掉臂過無人繼義勇關隴氣消磨紫騮馬翩翩紫騮馬爛爛黃金鞍流水四蹄急飛星雙目寒擁頭青玉釳蔽臆綵絲鞶誰取交州鼓摸將骨去看驄馬鬐鬛擁如雲西人號乞銀更逄桓御史特地起精神丹淵集巻二
