body:
  text: 其墨竹曰其詩與文好者益寡有好其徳如好其畫者乎又賛其飛白曰始予見其詩與文又見其行草篆𨽻以為止此矣復見其飛白則予之知與可者固無幾而其所不知者盖不可勝計也然則自當時知之者已寡況後世乎卭舊有湖州墨竹堂誠之既為立祠堂上以致卭人不忘之意人刋其集以廣於世庶幾因其文以知其人勁正豪邁不獨在于區區之疎篁怪木也雖然湖州之文散落不存者多矣石林先生云東坡倅杭與可送以詩有北客若來休問事西湖雖好莫吟詩之句及詩禍作世以為知言而東坡亦嘗移書湖州趣其賦黄樓二者集中皆無之間有詩與坡往還者輒易其姓字如杭州鳯咮堂坡所作也則易以胡侯詩中凡及子瞻者率以子平易之葢當時黨禍未解故其家從而竄易斯文厄至于如此可勝歎哉今但掇拾其遺亡數篇以附于後後有同志者或又能訪其遺餘尚可以續編云慶元元年五月既望曲沃家誠之䟦
