body:
  text: 丹淵集卷四十宋文同撰墓誌任郎中夫人宋氏墓誌銘宋夫人職方員外郎任伋師中之元配也父廣陵先生凡數女而夫人最為先生之所愛簡静寡語言居處有度不妄易尺寸家名髙貲先生常營諸嫁贈紫金大珠巧繡華熾日為收置他皆以先得為已物而夫人第拱手嘻笑若都不欲求之者先生竊視之歎曰是不可不以耦佳士故歸之師中既來事姑嫜接先後勤順柔婉有儀法師中性儻逷畛宇宏大好賔友每相聚集必辦具嘂謼酣飲連日夜不管無有索足夫人豫敇僮婢色色給過無少厭他日問之已脫簮珥襆袿裾質酒肉供矣未嘗以為言教諸子與其壻學至夜分讀書聲未絶夫人亦不去房下時至勉勵之寓家蔡之新息忽語其子曰吾夀不能永異時蔵吾扵淮上汝等之孝也家人初甚怪之但不詰其何以出如此語已而果得疾遂瞑目終日而去春秋五十矣熙寜元年九月三十日也明年正月二十九日葬之于光州光山縣千步村從其志也男二人大節大防女子四人長適高遇次適楊亷善二幼大節自蔡歸蜀見其父友文同伏地哭拜所訴不忍聞起即求同銘其墓乃銘之曰異哉夫人生於眉之眉山而塟於光之光山也其間相濶五千里胡為自彼而止此人事萬變孰可得而知之矣夫之官日髙子之學日新後事如是之盛也豈不足下慰於夫人嗚呼哀哉壽安縣太君何氏墓誌銘秘書丞趙䝉將以熙寜九年正月癸酉塟其母夫人夀安縣太君以其狀來求余誌其墓余昔嘗學易於秘丞君之父秘丞君又嘗為余僚於興元府之南鄭縣其為舊如此當為之書按夫人姓何氏咸安郡人少孤其母愛其敏惠有智思視遇過諸子鄉里大族有求姻之者母悉置不答嘗謂人曰是女非得佳士誰可婦者有馬服先生者名某眉山人儻逷任氣俠風槩高逺以文章道義㳺兩蜀聲稱爛然士人欲宗師之至蓬母聞其名曰可妻也遂求以夫人歸之秘丞君生方數月馬服去客諸郡為人挽留主師席凡不歸者十四年夫人依其弟右賛善大夫絳之家寥然專一室以居日夜候其子裁能道語言乃教之學書念文字既冠遣從師為詞章後登嘉祐某年進士獨夫人訓導之力也馬服初無預焉馬服常曰吾子有母吾何憂贊善尤悌順事夫人至謹凡家事一以諉夫人不問夫人為之收拾藏貯歲時均節調用内外所給如一無半毫之私識者各以諭其家指夫人為姆師焉贊善捐館貧甚㑹夫人從其子解官歸盡傾其橐装葬如禮乃攜其孤女撫視養育擇可婿者嫁之匳具稱足如已出者夫人性仁愛凡左右使令常自視其飲食衣服俾各滿其所欲無歎恨鞭朴未嘗施于家而閨庭凛然每戒其子曰罪囚不幸觸憲網爾既治之刑常宜輕不獨成爾善名慶當流扵後世居處嚴潔四坐清灑几榻帷幔屏障之類整娖次置無一塵之栖所服不務華靡自非臨祭祀對賔客之外袿裾帬襦皆補澣者家人每難進之夫人曰是物闕但被體不至穿敝何在新麗紡績之工可惜也素安強雖春秋甚高而鍼縷不廢八年八月十九日忽得疾卒於漢中所寓唐安佛舍男子三人曰䝉秘丞君曰莘曰荀皆舉進士銘曰於乎夫人柔婉静黙午髮未筓已聞懿德出配有道生子岌岌教以詩書日夜訓飭居貧益堅禮䋲義墨愈久不渝鄉閭矜式見子成名至升閨籍覃慶疏封夀安有邑金屑塗羅華誥五色持此就地何慊於臆八十一年晩具五福世亦鮮儷可瞑去目陳倉之山有名雞幘問之青烏此云佳宅宜爾子孫世緒奕奕告後以辭鏤之堅石文安縣君劉氏墓誌銘蜀有賢婦曰文安縣君劉氏者簡州陽安人著作佐郎琚之女故太子中允許平施益之之夫人也性巧慧志尚柔婉在家常以孝謹稱於其親長嗜學書傳無有不經覧者於左氏春秋尤能通誦之中間事跡詞語㳂端極涯開說講辯名氏世族地里歲月條分緒解癸甲不亂自歸許氏事上接下祥順友愛循蹈矩法益之資禀曠濶磨盪崖畛常以讌飲敖佚自喜夫人每乗間引古之所以因是而取諸悔咎者指諭之益之未嘗不懾然愧畏遂至扵不復更敢為此恐或戾夫人之所陳者益之每語人曰予之所以將放而復歛者謂何慮其聞於予之梱中也盖使人聽其言惕然若嚴師良友在側動静語黙以教義諄諄警誨人者予過漸鮮有奥助爾從知平定軍樂平縣未幾而益之卒夫人擕諸孤奉輤車還成都至則舊産已空蕭然無一椽之屋以居寄人舍下合聚閭巷親族良家兒女之稚齒者授訓誡教書字逾十年獲所遺以給朝夕僅取足不營於他其所居左右之人凡過其門悉俛首遽進不敢諠謼作高語大笑懼聞于夫人清風滿家寒苦霜雪督諸子學晝夜不廢改詰撿問使中程律一或不及譙勵不貸故其子天啟嘗預郡府貢書名在高等夫人教之也自是夫人之徽烈懿行愈聞于人萬口一詞謂絶倫類忽得疾於熙寜五年七月二十三日卒于家享年四十八人無賢愚相與嗟悼有六男子曰某某某天啟娶閻氏太常博士灝之女天𠂻娶陳氏屯田員外郎昻之女餘未娶然皆俊爽愿飭異時當盡能成立者天啟卜以某年十一月四日塟夫人於華陽縣某鄉里海雲山之東原與益之之域同焉以同昔年嘗誌益之之墓遣天衷來陵陽以夫人之治命俾同亦為夫人銘之乃為之銘銘曰猗猗夫人夙懋廼德厯求扵他類者鮮克既畀令淑復輔以文有蔚其章蘭薰茝芬自居州閭養善秘閾化流郡閨不戒亦式顯懿旁衍衆齠之師十年其家觀書誦詩匳盝久捐裁辨袿䘿踐履幽素以儀自律恫視諸藐其孤而煢經耕史耘待獲厥成遽爾云亡聞者愕􅇇無誰不知語即涕洟可㑹風節詳而記諸附史以篇庸完國書彼幽良人一紀與别東山之陽遂此同穴能事金石其有子賢為次清休刻之墓前長夀縣太君楊氏墓誌銘職方員外郎許儀之母夫人姓楊氏彭州濛陽人世以大族雄其邑夫人柔懿端靖自覊貫已為其内外戚屬所稱服年十九歸太常博士許瞻太博占籍成都之新繁自得夫人遂相與奉其母來府中就師友以學太博性高爽不惜所有以交當時之賢俊朝夕㑹遇講磨其所習夫人常自臨竈鬴手和羮炙以過給賔客無一日不如事且未嘗有倦􅓈之色事其姑尤孝謹凡曰婦之淑節懿行他不能行之者夫人服之為終身太博以母老職方君等皆漸長乃謂夫人曰新繁我舊業曏來此者為將營進士求起家今齟齬矣命也太夫人念故里數子已可教盍歸以新吾之所為乎夫人喜遂復還所居新繁督諸子學愈勤而親見其子為尚書員外郎用其恩進封長夀縣君太博治家號嚴飭夫人每以慈恕潤飾之故梱内斬然若官府纚纚可述為鄉里所矜尚夫人好施舍不嗜蔵盖閭巷媪嫗每告所乏未嘗不稱其求予足且謝其所以為報者後見夫人春秋高潜相與語出涕淚祝天願夫人更逾百年我曹常所欲芘頼之其愛惠得人也如此夫人晩喜酒然杯杓甚淺但日日索當有既飲色愈温而氣和語言尤婉緻故諸女暨衆婦常好酌進之乃歡素安強忽得病遂不効扵藥熙寜四年二月一日卒於其第享年八十一職方君初以太博服除赴闕授通判綿州以夫人之年日夜西走至家夫人疾雖棘見職方君歸尚怡然起與語若甚慰其所以願見之者後四日乃啟手足矣夫人生四男子曰伸曰儀曰倫曰偕伸尚舉進士偕七舉一試殿廷下倫治産贍其昆弟以學二女子長適勾叔良次適周惣皆服習夫人之訓戒事親從人咸有佳譽男孫五人善之慶之餘未名内外女孫七人以是年四月二十九日葬夫人於萬善鄉修仁里祔于太博之塋職方君與同為有舊書來俾同銘夫人之墓同不當拒而當銘也乃為之銘銘曰猗歟夫人有顯令徳修于其家而外以則女婦懿行母姑嘉式曰其宗姻循蹈矩墨慈柔恕惠芬楙閫閾䝯諸里閭撫濟艱棘積報在子外科列職暨登于朝取寵自國軸瑁囊錦金羅五色天子命書夫人封邑富木長夀錫畀以食夫人氶之能自謙抑惟衆所豔䝉祉疇克饗年滋高獲疹遂亟命屬以纊告不能息聞之逺邇孰㒺不衋彼繁之陽在益以北夫也良兆同歸其域猝次徽範琅然秘刻期千萬年廼銘之泐張夫人墓誌銘夫人張氏其上世為武信軍大姓少䘮父以孝謹事母兄有聞里巷宗族凡稱道夫人者必曰是性固所有不待訓戒而後能也年二十嫁始平先生希元希元有才名夫人既歸之人皆以嘉耦賀兩家然恨已失舅姑不得以􅎵瀡從事希元舊結廬墓側夫人與同去不入城市凡十年撤紈綺屏脂澤惨慘朝暮奠饋有法希元以經史教子弟夫人亦班班成誦之講解義訓無不通曉希元喜接士賔客日滿門下終歲未嘗獨執匕箸以食夫人多自調絮和齊供儗無少倦至猝遽無有乃解装購物以治其具惟恐一缺不能相屬者生四子正已正雅正卿皆不許視家事督之學常以願成汝父之志勵之故正符以春秋學為龍圗閣直學士刑部侍郎知梓州何公取其書聞朝廷正雅以明經正卿以進士為郡國所貢一門佳士鄉人仰伏夫人力也三女長適鄉貢進士王賁次適進士賈端次適前青石縣令陳公錫治平元年三月十日夫人以疾卒享年五十八以三年四月十四日葬于小溪縣永夀鄉鳯凰山之先塋曽祖德權祖昉父奎皆不仕正符以余與其父子游見余哭且拜求銘夫人之墓余銘之曰幽閑而為女柔婉而為婦慈嚴而為母是皆有令譽余豈愧銘其墓兮華陽縣君楊氏墓誌銘宋治平二年十月二日故太原先生太子中舍致仕閻君諱路字蹈之之夫人以疾卒享年七十九明年正月十一日葬于普安鄉沙坎里與先生之穴同焉其子灝以同為同年進士來求文誌其墓同故采其善狀以書夫人姓楊氏華陽人父諱元吉安道守節鄉里信慕有善人君子之稱夫人少孤外祖張崇文春卿携養於其家春卿為孟昶時秀才通五經博極羣書鏗然有聲于當年昶歸朝春卿留蜀畏逺仕遂為西南士人文章宗師既老無子止有女及夫人在左右恭愿柔懿動嚮禮法薰漬善術該涉文史徽德婉行聞之閭里成都多豪宗巨家有以媒求姻接跡于門者春卿每拒之曰是女與孫循服素儉甚已深矣蓋非可以侈麗華靡之好以化其所嗜者吾將求朴茂清粹嘉才美業之士以歸之且當其意爾後果以女妻國子助教周式而以夫人配先生者焉式講道著書為詩書名儒先生履尚簡潔學問無厭常以易禮春秋左氏傳名其家居陋巷坐黌舍教諸生與二子四時弦誦風雨不廢夫人亦以章句字畫訓誨諸女及里中内外親表之甥姪每佳時令節車交馬集衣冠擁㑹立候墻宇隣釵巷帔招約呼引帬裾以次羅列梱内修弟子之禮為經師教姆之賀如是者凡三十年逺近稱仰之先生素貧窶衣椸食囷無有贏衍而夫人服敝惡享麤淡怡如也雖華章美品之在側未嘗以我之無有恥之性孝且慈奉養舅姑無闕禮撫育諸叔一盡乎仁愛生二子旦暮督其學長曰温景祐元年進士及第以職方員外郎通判戎州代歸逆江上至嘉州舟覆溺死次曰灝中皇祐元年丙科遷秘書丞授雅州名山縣縣在層巒複嶺之中林莽隂鬱嵐霧日發殊不與高年者起居相宜灝重其行部刺史知之使假蜀之永康縣夫人至縣才七月病乃作灝言之復得就藥成都九月二十四日至私第厯請諸醫卒不效遂啟手足矣夫人既知書達理道不若尋常婦人女子之所為親見温湛沒不救收泣抆淚一斷以命不復更嗟悼為不可活之計被疾歸圍兒女與語無戚戚愛戀難舍之意此儻非盡道事物當爾之說雖烈丈夫吾固知其未必能矣夫人以温封華陽縣君三女適無錫唐棐崔庶幾劉繹孫二人仲㬢仲韙銘曰惟夫人出甲族粤在少失所育祖外氏恤之獨養而教性渾淑鍼縷餘親簡牘配先生保邕睦執閫範端且肅固窘陋安水菽以書史化邑屋生二子勤其讀並入仕及以祿夫人者備五福數云盡瞑就木歲時吉問厯卜彼東山地高陸從先生關陵谷刻銘章慰子哭仁夀縣太君李氏埋銘宋治平三年丙午春正月壬午太常博士宋璋與其弟瑄葬其母夫人仁夀太君李氏於犀浦縣金砂下村從其父贈殿中丞諱某字易從之神域也夫人扵元年閏五月二十三日以疾卒享年七十有九惟其懿徳徽行宜所以表之扵墓者皆具於興元太守集賢校理楊君繪之文博士復俾其友廣漢郡尉秘閣校理文同謹歲月之實納壙中以告其後人同乃系以辭云藏扵此者誰歟是為母歸而有令嘉之稱於其宗族鄉黨者成紀夫人爾後千萬年兀者夷缺者闐而瑑者或不漫而泐也嗣人其知之矣噫此博士所以屬余渠渠者之志耶書以薶諸幽丹淵集卷四十
