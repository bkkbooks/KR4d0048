body:
  text: 丹淵集巻七宋文同撰詩四十首新秋讀書高風發逺籟轉響為清商隆曦減炎威未晩先自涼庭前碧桐樹昨日聞早霜朝來逐葉上已暈一拂黄壯歲覺時節㸌若翻電光自顧勿嗟惋徒然攪中腸官居幸少事署案日幾行公退清且閒垂簾坐虛堂解帶輙傲兀左右羅縑緗所務唯討論一燈從夜長貧士行側身入窮閻跼影守環堵日高齒未嚼風勁骭猶露胡為迫凍餓此道吾所素出每駕雞棲歸仍伏龍具原生本非病董子盖不遇誰將斗升水活此轍中鮒不見裹糧人欲死者亦屢徒自諷詩書區區立名譽馮氏道中早行畏暑事晨役高原動征覊遥遥歴廣博浩浩長風吹踈星才出没河漢西南垂林端啓明上飛光發丹曦熒熒洒晴露百物含華滋爽氣入肝膈宿濁無一絲寒泉潄清甘洗滌俗慮遺還憂火輪怒萬里燒雲逵宿李同年䕃碧亭時自長安慮囚屬疾抱病出煩闠投此青林間高軒得清涼坐致精爽還主人止之宿借與終南山中宵皓月起繞枕皆孱顔望乆氣自清心胷無結頑平明又西走勝軌不可攀李生畫鶴昻昻青田姿杳杳在輕素一身萬里意雙目九霄顧釤釤羽翮利竦竦骨節露君初本誰學我恐必神悟得於想像外看在絶筆處稷筌如復生相與較獨歩豳州昔年戎馬盡南豳今日風光已太文雅吹夜喧金府月靚粧春艷玉峯雲泉亭柳色濃將滴水寨荷香逺更薰邏候不驚烽燧息高原閒獵舊將軍寄友人惟秦抵於蜀間可厯萬􅇖遥懐嚮英義潜想一夕馳乏人探道奥求合常苦竒音覉見謂可招納欲與相塤篪夫何屢乖絶出處各一涯秋風動孤況回首勞所思和仲蒙夜坐宿鳥驚飛斷鴈號獨凭幽几静塵勞風鳴北户霜威重雲壓南山雪意高少睡始知茶効力大寒須遣酒爭豪硯氷巳合燈花老猶對羣書擁敝袍明教院在涇北賀貴谷野逕欹危入谷斜曲崗回嶺共交加經年不到為隔水此日獨遊因看花兩岸烟雲閒景物一軒泉石静生涯自憐冠珮嬰身者直入樊籠老歲華和仲蒙夏日即事簿領初休几案清西軒移枕臥前楹香從菡萏紅苞發粉入篔簹翠節生不分去聲便衰聞蟻鬭可嗟俱妄見蝸爭日長景静官曹冷莫厭頻來對一枰西軒秋日官舍蕭然似隱居一軒秋色伴恬如深藏宿雨樹木暗高灑夕陽籬落踈景物静思臨水石光隂閒覺入圖書此心只有雲相信長伴吟魂遶太虛和張屯田秋晩靈峯東閣閒望直欄横絶紫微隂凭久秋光照客襟一道山川寒色逺萬家烟火夕陽深涇灘水落羣鵶集秦嶺雲高斷雁沉此興浩然須把酒可憐難醉異鄉心春庭春院隂隂翠靄低春庭寂寂曉光迷花間蜂去抱黄粉苔上鷰來銜緑泥兩行高梧初䕃合一畨新草恰生齊微禽巳識幽人意飛下欄干向裏啼過永壽縣驅馬上危坂暮鞭摇客愁峯巒驚滿目咫尺擬回頭紅樹擁野店白雲藏縣樓須知此北下地底見豳州杜老有豳郊入地底之句東谷偶成府事幸稀簡常為東谷遊舊山兹髣髴佳景每遲留斷續溪雲起縱横野水流拂衣知未得聊此慰鄉愁宜祿昭仁寺後軒危欄憑絶壑欲奈此時何但有夕陽處就中秋色多與誰同徙倚空自發吟哦便覺成覉旅歸心逐鴈過過高塶城頽壁乍高低中間已亂蹊長原想鵝鸛大塜記鯨鯢黯澹寒雲結蕭踈野草齊興亡盡遺迹立馬看扶犁夏日翠漪堂湖水碧溶溶寒漪四望通龜魚遊浩渺鳬鶩下虛空爽氣吟窻外清光釣艇中一襟時自快多謝北軒風玉峯園經春不得一過因成詩呈同官約遊春來少嬉遊俗事日相耗南園只城外累月不一到花香雨後歇樹色風中老惟有嵓下泉猶能滌幽抱送張兢無悔秘校赴調無悔富道誼巻藏無所施端笏拜上官十年走堦墀人皆為嗟惋君獨安且怡又執考書去當衡誰與知六月十日中伏玉峯園避暑值雨南園避中伏意適晩忘歸墻外谷雲起簷前山雨飛興餘思秉燭坐久欲添衣為愛東嵓下泉聲通翠微咸陽道上晩晴有作積靄晩盡散南山明夕陽秋容徧豐鎬古恨入隋唐草木咸摇落風烟自渺茫客亭須下馬把酒慰殊鄉歲晩登清素院北閣雲端訪古寺樹杪臨危閣風厲懾草木霜乾喜鵰鶚天時既悽慘人意亦寂寞回念故山逺心隨日西落炭泉險道一澗呀然截亂峯更於何處問途窮高深出井又入井曲直上弓還下弓絶底乍臨渾偪仄危顛纔徹似飛沖我來行縣須經此正在炎炎三伏中玉峯園避暑伏日當飲酒南城㑹羣賢開樽䕃碧樹移席臨清泉浩意脫塵土高懐軼雲烟早歸休信俗須待月娟娟早起覽物成詠移枕出幽幌披衣歩前楹秋容草木静曉氣烟雲輕蟬噪宿露滴鴈飛朝霞明塵心幸未動聊此納餘清寄馮永州山水永最善守居聞更優烟雲萬石古風月九岩秋几案少俗事壺觴多雅遊無因陪後乘幽意滿湘流暑夕待月庭下夜深方歸晝蠅方少夜蚊多摇脫霜紈奈熱何獨向中庭待明月一身清露瀉金波中伏日諸君㑹玉峯余以病不預作詩寄呈去年中伏在南園同聽清泉引綠樽今日諸君又高㑹獨嗟移疾臥西軒興平原上赤熱因寄永壽同年日午終南翠色燃滿襟飛土下秦川是時獨想君高尚正在山亭弄野泉亭口林下翩翩鴈影斜滿川紅葉映人家岩頭孤寺見横閣有客獨來登暮霞淺水原鶉觚西北地鱗鱗此處當年起戰塵見說如今溝壠下斷鋒殘鏃屬耕民興平原上東西車馬走秦川擾擾飛塵混曉烟我亦中間遊宦者尚慚無語賦歸田西湖荷花紅苞綠葉共低昻滿眼寒波映碧光應是西風拘管得是人須與一襟香石龍渦嶮勢圍空斷壁圓四時常見聚雲烟為霖救旱今何在徒有遺文記昔年有李懐又記備述禱雨有驗之亊水葓紅芳宵露清翠節曉霜犯雨後曬殘日秋容滿庭檻黄蜀葵錦江何日别漆水今朝見清露染顔色秋鵝一分淺千葉鼓子花柔條長百尺秀蕚包千葉不惜作高架為君相引接鄠上懐古未曉南山去從禽夜不歸凡行多少地十二所更衣石竹蜂齧紅蘂爛蟲啼碧叢短秋風畧地起惟有蒼苔管丹淵集巻七
