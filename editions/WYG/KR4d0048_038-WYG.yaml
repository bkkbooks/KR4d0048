body:
  text: 丹淵集卷三十八宋文同撰墓誌試秘書省校書郎趙君墓誌銘治平二年五月十三日龍圗閣直學士吏部員外郎知成都府天水趙公某之子新授將仕郎試秘書省校書郎知杭州於潜縣事監西京糧料院名屼字景山以疾卒于洛陽之官舍卜以某年某月某日載其柩歸衢州葬於某縣某鄉某里某原龍圗公一日召其部吏廣漢郡尉文某語之曰余之子不幸蚤棄世余常觀其所為宜有以舒發流聞扵後者今已矣使其志不克就嗚呼余識子且舊子可為余誌其墓同被命唯唯退自念同文字樸澁何足以綴緝於潜君之美行告于無窮然辱龍圗公眷愛之重當勉強無以辭乃按於潜君之叔著作佐郎楊之狀云君之生風度竦秀寡言笑既毁齒性益聰悟誦書畫字無一日不加進龍圗公友愛羣弟多攜之官每退食即便舍相與磨講道誼為文章而君常入諸父行謹謹就業未始畧遨嬉不滿其所程淳粹和厚無毫髮兒姪之過一家欣愛之年十六舉進士不中歸自閉嘿愈奮厲増力極取㳺太學事先生胡瑗授諸經鉤探擿抉造詣深隠纂譔辭語精簡渾重瑗獨常稱之同舍生三十人君最少動有儀法衆以君不敢燕惰廢所事兩就天府貢禮部輒落龍圗公為益州路轉運使用祫享授君太廟齋郎嘉祐中鏁試嘉慶院復得是時場屋方議以策論取士天下豪俊並挾藝京師無一人肯自以為吾不如某人而願下之者南宫主司皆禁林鉅公亦審慎戒飭以待多士既試文卷坌入悉高譚劇辨磊磊可畏而柬次其可以應當世之所宜用者上之以君當奏名第六扵是都下烜然馳聲稱遂逺聞龍圗公嚮在臺諫論事不少避權貴風威逼人海内駭伏人至是得君名皆曰趙氏復有此子矣中第御前調憲州司理参軍或謂曰君盛年有令譽從宦邉藩榮途自此逺矣君曰雖然吾安念此吾親之側無他兄弟以恃且旦暮去左右豈所云樂耶因留不之官今皇帝改元之二年春龍圗公自河北都轉運使移成都朝廷以君為縣令假局河南府且使視其家未治事得疾藥不效寖革母夫人在旁日夜憂泣無所問計君徐起安坐怡顔色如平時曰死生固有定期自昔人誰逃者願母自苦恐耿耿祗以累阿􅀢因索紙為書將留訣成都裁數行復裂之曰此又重吾大人之傷也遂投筆以卒時年三十一噫君之事其止此耶君既為名臣子早以文行知扵人死之日中外士大夫與其所往還及龍圗公嘗所臨之吏民無不嗟悼以泣且疑夫天地鬼神以禍福考善惡而施之者於君殊未為可諒矣君博學喜辨論雅善鼓琴平居入静室為雍容閒澹之音以揄揚其和易之性聞之者皆泊然㤀世慮擾其中好黄帝書曉診法明藥品之所以能為功與病之可治不治之狀嘗被羸疾懼其親為憂隂自療之至愈不以告有文數十篇語氣浩蕩皆可與當時號能為詞章者較上下餘未就君之先本㑹稽人上有官於衢州者因留不去今家焉曾祖諱某廬州廬江縣尉善吟詩其語清深險峭不類近世作者有集行人間人争誦之祖諱某廣州南海縣主簿贈給事中君娶時氏生女子四人長十三嵗餘尚幼男子一人名河北郎始三嵗母安定郡君徐氏見君物故聞君語一悟遂自解不邑邑銘曰惟君之生蹈慶之基憑堅乗完孰憚以危爰初横經在勤弗嬉道妙聖真取深其師乃試天官汪洋發詞下動諸公争收競持籍名於髙盛譽四馳獲第入銓犴獄是司曰吾之親有子止斯敢名宦㳺去左右為遂留其旁氣下聲怡餘力扵行學問愈滋帝用成都疏恩淋漓居君洛陽廪事以尸乃進爾資乃便爾私曾不久焉得疾莫醫遂至奄然羣啼衆嬉於嗟乎君命曷若兹回誼之亡君齒與差何天扵賢不假以耆紛紜妄庸夀或介眉當其在嬰百福承之太末之􅇕舊兆纍纍君歸其丘列祖是毗山磨水淤名豈即衰刻詞茫茫以慰永思梓州處士張公墓誌銘有篤行君子姓張氏名溫其字希澤居梓州城中六十五年治平改元正月日以疾終于家閭巷田野之人凡見聞其所以為人者皆涕泣相弔曰天胡為而遽奪若人之夀耶如是者累月矣希澤少喜儒術經傳百家曲學小說無不盡讀既讀無不盡曉其大抵舉進士不中乃放肆自得與世俗俯仰浩然若不可以法制收歛之者性明悟内行孝謹知是身不足以為巳有故投之於自然之域而不以貧賤富貴累其心謂捄人疾苦其惠利為無涯故顓嚮醫藝而大究其精巧父母死日夜膜拜西方聖人自閱十二分教者數過以圗報㒺極至老無少倦赴人病急雖風雨道途之阻未嘗輒以辭既而不復計校其所以為謝死之日使人攀慕哀戚者以此好飲酒至頽倒而語言不亂善談謔亹亹可聽人多記去以娛其坐賔與人交終身常恐有毫髮之缺而不得其歡心也人或非意侵之曾不以恨至胷中遇之如平時其人久亦自悔年未三十䘮其配遂終身不娶慶厯中余始自水㤗來應舉是時郡中諸君未甚識余然槩以疏外闢之希澤一見余於稠人遂引其友陳顒信臣詣余於邸退相謂曰吾輩有子常患無良師友以磨切之者今見其人矣於是二人者各遣其子以從余逰待余二十年日日益恭希澤初得疾余持服里居遣人候之希澤報曰我無狀子最為知我者今病革不復見子願得子之文以記我死死瞑目矣既死其子以某年某月某日塟於某鄉某里余方在京師不得哭送輤車之後又不得以文與俱薶扵幽壤誠所恨矣歸而其子擇交以其先人嘗見累於余也叙其理命屢以抵余且曰陳臯希古先生既已誌先人之墓矣其所以為之表者非君也其誰為之余乃具次希澤之生平如此復系以辭而哀之云禀完而弗駮又輔以學性其渾矣檢諸身動不失倫何疵咎之或履得於是陶然自貴可以謂之君子天胡以夀畀彼厚而獨嗇於此嗟乎希澤魂安所適兮一世云已秘書丞陳君墓誌銘君諱叔獻字元之蜀州新津人其上丗由潁川從僖宗入蜀因不歸籍此縣東北鳯皇岡有丘墓十許世深林巨木蔚然有豪宗大姓氣象而自五代已降無仕者君生而聳慧始讀書一厯目而遂貫扵心不廢㤀下筆走詞語駸駸不可止遏其徒尊畏之中皇祐元年進士第為萬州司户参軍居官如故習老黠吏不敢肆其巧忠守缺轉運使以君攝其事久之郡政大治人盡服察舉得令移郴縣郴湖南小邑民吏雜擾牒訴日日堆几案索裁决君始視事睨廷下忽取一人者鉤詰之本䖍民也寓扵此凡二十年受賕出入鄉市搆兩訟以亂令治謂君新至故雜稠人觀君聽斷是否期中之得情如此具對聞之安撫使流他郡自是惡少相語以君為神不知其用何術也獄辭遂省縣之粟移扵衡往反數百里下户不能獨去人有倍歛其酬為輸之者往往遁避不可求遂至再納此弊尤甚君擇高貲附其直與并幹之故賦入辦先諸縣里民有各失一犢者踰年甲始獲於乙乙拒益堅詣縣辨君俾引其㹀使視犢躍就其乳乃還甲争遂定一邑嗟尚之馬氏􅅗竊多橫賦每丁嵗有常率幾百年仁宗朝有詔一切除之而郴道衡永桂陽監不諭㫖督歛尚急君建言轉運使悉免㤀慮數萬萬而方二三千里之民始得擲去重壓而舒四體矣羣口邕邕頌君不休同年陳啟期過縣聞之作詩與君有巨刃秋霜寒之句及罷民遮道涕挽極謝乃得行入朝授著作佐郎知綿州魏城縣遷秘書丞賜緋衣銀魚魏城之政大抵不甚力而自占八邑之最嵗滿以太夫人年髙乞便地復得巴西縣未赴因卧疾熙寜元年七月某日遂卒於其家享年五十一君素羸㾪平時常喘喘畏風蕭然骨立若不能朝暮人也然臨事講利害决是非氣厲而語壯短長見前不可屈蓋剛果内蓄以學術輔之而吐理明白也性孝友事太夫人每懼以已疾為憂常強飯設精神以立左右問之答亡恙太夫人乃喜姊二人貧且孀君指腴田二頃賙之終身以及其甥又為經營其家使其族之狠忿暴戾者不敢犯與人交簡介若不相宻而遇有所急難冒鋒刃入湯火肯為也死之日無誰不沾泣初病革其弟叔達問所以欲為君曰我何所言但佩恨入地而不能冺滅者使老母不及封而哭我矣雖然願得與可文納吾壙中乃幸也淚數行下氣遂絶曽祖某祖某考某母唐氏年八十君娶樂氏再娶周氏男一人君軫女一人適太學進士勾龍􅨈孫女二人以某年某月日葬扵某鄉某原叔達以君之見屬具書遣介來道君之語求銘其墓同乃君之同年進士與㳺甚熟泣而銘之曰奄奄其息兮嶄嶄其形人視之而不知其中兮但常惜其不能以久生然其論議之髙兮區處之明蓋受於所禀兮而發扵所行胡不錫以永年兮中道以傾伊神理之茫昧兮善惡安足以講評嗚呼元之兮吾何忍而此銘李公澤墓誌銘君諱慎從字公澤曽祖諱某父諱某其先八世祖諱逺本京兆府萬年縣人廣明中隨駕入蜀為晉原令後遂不去家成都之温江今又遷為郫人至大父始不仕父贈太常少卿母文氏某縣君少卿有子五人盡使學進士教導有法自成童悉與他兒異至有未勝冠而能中其科等者慎修慎交也慎㣲後亦取皇祐元年高第二已物故惟慎修今為都官郎中君性精敏自少其氣骨已岌然秀爽讀書不廢㤀為文辭皆具曉大端不煩其師少卿厭世諸兄既從宦弟幼各未立君視家事缺然亡他贏以待供索乃脫身治産設次第積居與時遂未幾號饒益督其弟慎用日夜從於學不容墮㳺嘗語之曰爾勿與我事凡婚嫁一主於我爾自勤爾之所當為勿中休給逺資近上下䆒足無間言慎思亦登皇祐五年進士先卒而君獨享優㳺之樂扵其里閭為善人君子衆雖景慕之而不可以力致苐嗟咨信嚮而退自恨其不能如也君復和裕堅正内外親友以至􅇕落鄰閧之人無不相與驩遇其有所未善不屑正之無不改以謝凡吉凶燕集未有一日忽在衆人之後客子㳺仕至其邑有所求須先詣君君為之推引裁處各稱其所欲以去故其善譽寖聞於人人賢之盖用此也張少愚明勁辯博少所推借走海内識人無限而每謂君彊果通幹生於自然不假増修而皆詣當處他不能及也少愚將有所欲為而尚猶豫者必更取君講解辨析然後乃定其扵治事明審能厭人意也如此君平時嘗謂人云吾夀已自知不能久於世問之但笑不道其所以能得自知之者故於易老莊釋之書必亹亹再三研玩其極深之論而有意於其間者焉某年某月忽得疾雖甚革而神意不亂治後事尤委曲至某日遂不起享年若干君娶申氏繼娶王氏生五男曰某某皆好學整飭不務敖盪人皆曰公澤宜有後也三女長適何氏二許嫁某等將以某年某月某日葬君於某鄉某原謂某於君為親且宻知君最詳來求銘君之墓某泣而為之銘銘曰於乎公澤之為人也外雖夷易而中甚端勁故其接乎物也以和而處乎事也以正惜其名位有遺其才謀而鄉黨止述其誼行胡為善不得其酬兮卒閼之以所命甫五十而遂沒兮夫何遘兹乎不幸推其無所欿然兮有後之盛何以知其然兮曰元昆之顯而諸嗣之令卭州處士郭君墓誌銘余少時與郭周田蟠叟同學西州交㳺甚熟知其父處士者之為人常愛之處士今既死蟠叟求余銘其墓處士諱某字某自言本汾陽忠武之後子孫流落居蜀不知凡幾世占民於卭家素饒財處士少任俠倜儻無畛域善格五意錢之戲每入市羣豪朋來從隨上下酣飲謳歌嘂謼擊鞠弄鷹犬罷即入隐坊與其徒投五木争繒綵金貝一擲不盧遂推去不顧藉時亦勝人不貲為寒士丐乞盡畀之不以為已物故義聲錚然不瑣瑣治家事人語之處士曰爾焉知我但我業此而所恃者我有子矣異日教之使立千萬人上令曉道義善文章者争來推髙之視此詎不若爾曹占田藏鏹之無涯哉我豈欲效里閭庸人旦暮齪齪經營後時不使寒餓計耶於是出蟠叟令力學蟠叟才冠便知名四方所友皆當世才傑處士之高識自此愈逺聞處士晩好讀書尤扵班馬二史為精深與人議論牽引證據甚可聽治平三年四月十一日忽被病遂不起年七十五其配文氏生蟠叟後一年亦卒年若干治平四年十月一日蟠叟葬之扵臨卭縣思君鄉豐義里息頭山蟠叟蓬頭蠒足披風露踐泥潦晝夜號哭負土為墳凡三年逺近觀者日日來不絶歎喟嗟悼而去銘曰人生常患已之所欲樂為而禮法從而攖之束縛如囚曽不得恣肆而自嬉若處士者少脫畧而無羈敖盪一世而胷中不置乎險夷以夀而返兮羣口為之齎咨發其慶以昌後兮其子宜之榮州楊處士墓誌銘君諱某字某榮州榮徳人其上世官族見紫㣲石公楊休龍圗李公絢為其考虞部郎中見素妣崇徳縣君袁氏之墓銘君少敏慧嘗授經於唐安羅勉先生通博善講議辨者不能敵晩工扵詩既久且精意詞髙新無所得其迹於父母昆弟一盡其孝友崇徳病累亟君再剔髀肉以饌進悉愈郎中好接賔客兩蜀聞人無不至門下君善治産致資以贍給其用多寡稱之楊氏所以義聲滿天下實由君振之也間嘗語羣弟曰家事不可以累大人予其主之爾曹苐力學予將資爾異時求有以昌大門户者是後屢有繇郡舉試禮部而若冲者遂中其第今已入尚書為郎矣君性方亷重許諾視人有不類輒恥遇之如一善可喜則奨勵稱述亹亹不已宗族鄰里婚䘮之用所不能足者君咸為辦之頼逺别業為一郡之冠其林巒之秀澗谷之異圍擁列位若設圗畫君扵其間築室百楹裒輯古今書史萬卷引内外良子弟數十人召耆儒之有名業者教之其子約果登皇祐五年進士授遂州小溪縣主簿先君卒餘皆摐摐號稱佳士者君以至和二年九月十五日以疾不起享年若干娶王氏生男子五人綱約絪紀紘女子六人壻普州進士汝某資州資陽縣尉袁某進士勾某袁某張某著作佐郎知綿州魏城縣張某孫男十人某曽孫某君以嘉祐五年二月二十五日葬於崇徳縣榮川鄉南坦莊錡以書并狀拜道士李有慶來詣同山居始求銘君之墓同亦與錡識故為之銘銘曰古語有之天道難論吾今於君以為知言種善殖徳所穫未蕃中夀亟亡人聞而寃何以慰君有文諸孫綿州李處士墓誌銘先生諱某字某綿州巴西縣人曽祖某仕孟昶意其國不能以久復位下無所信道遂解官以去就閒居焉祖某善計策廣政末年兩川搶攘郡邑多寇盜能用之以庇護族黨獲亡恙鄉人以才豪名之父某博學有智思尤深於診劑人逺近頼其術而不夭枉者無㡬數然未嘗蘄之來以賄為謝者有問之曰吾求以此徳遺後人生先生遂使被儒服先生少通敏才辯傾給自嚮師學專精講問一力不厭橫波絶浪大涉經史時出其語以聳坐客雖其朋流率無不下之者景祐初就進士舉試禮部既不得歎曰吾不能是矣吾有子宜其為之扵是歸教其子及里中良子弟晝夜相臨隨自不少懈不十年其子文藝益精凡兩偕計吏一試大廷下遂中皇祐五年第蜀人常謂先生意與物出入相應効乃如此性孝友家饒財不自靳嗇養同産常使厚於已歸二甥扵良家奩盝所與視已子一㮣獨不異寳元蜀旱大饑朝廷遣貴臣撫諭發私峙合程者畀赤牒先生曰民困蹙上憂之若此豈幸之以儌身名時耶吾所蓄雖不能如其格忍自閉以視元元捐瘠乎悉倒廪輸之官無徳色在位咸髙之士有來綿者未授館悉先詣先生所先生從之㳺無間風雨相驩至去皆滿意不戚戚故其好事之聲聞四方也以此所居西偏構月軒常隐几其中端静凝黙人不知其所以為時復論譔有書號百一者凡十卷大抵明古意述世務自言此書百分厪有一能補於吾道者乃名耳好吟詩逮千餘篇語近而意高皆不徒為之者治平四年十月十五日以疾卒扵家病已革尚能作詩以與其交親為訣其日起索冠帯坐求筆疏紙曰不為不道不為不正裁八字氣漸短目瞑筆落遂化去一城之人無誰何皆奔走哭嘂相屬道上春秋六十有六矣娶文氏生一男三女男誼伯為秘書丞知卭州大邑縣女適周氏范氏文氏周范二女先亡孫若干人卜以某年某月日葬先生於某鄉某里祖塋之東嗚呼同嘗憶去年六月自廣漢移守安嶽道先生門下入拜先生於南堂先生與同語時有不任被病恐不能久留於世之說同解之先生笑曰事當然者何足異矣别未百日而秘丞君遣使以狀來且謂同曰誼伯惡逆深重而遽䘮所天先人臨終攬誼伯手屬之曰吾死當使普州誌吾墓幸矣慎無㤀誼伯敢持遺訓以累君誠死罪同讀已曰噫善人也今死矣其治命尚能以予文為求於予厚矣肯不為之銘之歟遂為之銘銘曰山蟠於離而水走乎乾之維中有墓兮蹲而巍問焉居之者云誰成紀先生之所歸先生之生兮為鄉里之所師宜其遺光餘耀兮愈華而不衰吾恐綿人世世之子孫兮望者趨之而過者拜之刻載善行無愧辭嗚呼先生安所虧丹淵集卷三十八
