body:
  text: 丹淵集巻三十六宋文同撰墓誌屯田郎中石君墓誌銘嘉祐七年十一月二十一日朝奉郎守尚書郎中知遼州軍州兼管内勸農事輕車都尉賜緋魚袋借紫石公以疾卒於公館其子蒼舒奉衛輤車還長安卜㠯熙寧元年八月庚申塟于萬年縣鳴犢鎭之某村蒼舒以同嘗遊於其父子之間以疏麗公之高行凢六七致而不倦其辭愈勤而愈哀將求同之文寘公之所藏同自視孱呐何以盡公之休懿然豈忍不受其子之惓惓勉為次之公諱某字君瑜世居關中曽祖某祖某生五代荒季之末恥食之粟潜遁自高父某累封太常博士母李氏封清河縣君太博旣生于國初聞其父祖說前朝穢凟攘劫之亂謂今有天子在汳除灑潔祓一布休治鋪張建置文采爛蔚輦轂之下士民恬安於是遂攜家以東公因生於京師占籍祥符縣公少舉進士繇開封府薦景祐元年一中上第調孟州河隂縣主簿縣踞汴渠之咽歲驅兵夫十萬餘厮折寘滅堅菑揵以瀉其流絶滎波直王城會長淮通東南之漕給中都事務㝡嚴劇大農每嵗度諸郡之榖峙於縣以禀其用所領内者非精健有智數則禍其囏而使令謾誣受賕矣公始任即當此衆未信其能評之他負蟻入公制以術部後先無相躐才鋒森然批斷翦翦無一粒宿于外日日用此道塗謡誦之遂著名矣再授扶溝縣主簿王畿之吏大抵尚因循好取譽民狃悍猾務不直以亂治亡所尊畏侮慢驕狠或時執上官短長側睨若相角急則投銗筩撾登聞鼔矣公至不能耐一切根排剷劀䋲以國律無所借宥久之惡少相敎敕避去曰是不如他人慎無犯入即虀汝肉矣一邑斂手翕息不敢議公令嘗間語公謂寰内之治難以比諸外當少寛取無事以去不爾忽失慮中其竒安可悔公曰用法有内外之異非朝廷所以待天下之意也愚職在奉助惟知以徇公為稱不知其餘矣事在齟齬令輙入告公獨處之益辦内史鄭文肅公聞而喜謂其僚曰石君新進乃能如此後日有勢位何施而不宜優詞薦之改大理寺丞知虹縣虹屬宿當江淮楚泗之會俗尚雜惡昧利而嗜訟令始至先以事鈎之既得乃緣其間巧刻放横肆己所欲以求縣如其意後窮訊暴其情反詰之伏出即飛不穩語攅嘷旅吠中外喧誻往往為立獄令不勝頋被謫若此者屢矣公初來謁守守視公少年易之撼以虹治留公假州局公曰奉詔書不敢私自免試往臨之苟有可以上關願府無見爽相庇頼事不枝柱政無難為矣守頷之曰然既至嚴肅閉黙不露缺􅇖釁衆莫測其端涯但密記姦桀䟽捕幾輩白府逐他所自是一境平靜㠯善譽聞富人責租使其奴歐逋者疻之公曰奴罪當然敎之者主耳并錄之主懼匿不出捕急其徒計賂人代焉至廷下公曰是富人耶衣冠則爾其質乃賤𨽻袒視之膚革皸瘠果其家役僕也杖去直得其主而坐之自是彊宗大姓俯首躡地栗不敢鼔踵謂神為公矣亡命多聚居辟隙晝則人夜相結為盜椎剽寇敓入舟撇大浪杳不得其所之廵儌日以告求問莫獲民苦此公為立法以閭里編户什伍相保信一敗並繫無貸悉感懼相伺察訖公去無人遺一金至今長老道公即歎息矣遷殿中丞移綿州羅江縣蜀人柔良畏事索摩撫公易虹治一用清簡未逾時縣事已告無所設簿書凝然械杻積蠧廡下徒吏偃倨門宇終日居甿不識追胥之擾盡力田事新黌舍聚良子弟置師敎之親為講說義訓使循服其父兄感泣入謝相與謀寫公之狀于浮屠示世世無忘公成都士人盛甲天下其學術文章平日常相高不肯下服文潞公鎭蜀當貢士先時考官重其人人亦多豫以他事解不得已為之須柬輯奥大深險之目以苦之幸入等少不毁已舊常若此潞公尤慎之厯計部吏舉無如公者請公起公未行衆已曰其人矣及取士名出日皆人常所願其得之者下帖然無一語明年登第十不遺一二聞者無不嘉其精工還朝以太常博士通判許州尋改永興軍公雖佐者然齾彊煦輭潜咨宻啓府寔頼之有猾盜屢抵法黥竄嶠外者數矣每逃其家隱區落深密間出用兇力為人患人不敢正視孽久益劇後捕得法當流海上獄入公建說安撫使誅之安撫使怒瞪公曰通判欲使我撓法殺人耶公端色緩起曰愚非敢以刺骨事公者但陛下用公鎭京兆豈特區區若他郡吏守三尺事大小一委公以便宜殺一巨姦安知不治公之民數十百乎公在此渠敢衊公治奈何安撫使悟從公議明日一府讙譟皆曰非貳車不宥惡盜蔓日以滋矣改屯田員外郎大祫加都官員外郎遷職方員外郎三白渠穿涇屬之渭延袤二百里溉田無慮數千頃衣食億萬長安華原倚以為命國家為設官専總其事每秋稼罷鳩役釃闢及壤通蕩無害一不如制壅閼潰壞乃不霑足民遂竊決爭以死繇有司惰忽不厪力矣楊宣懿公辟公知渠事公自谷口行視且曰涇流本無窮率嘗不能㠯饒者用之乖方也役作公督利夫二萬築堰岸上植表鐫溝枝分股注舊嵗一過猶不給自公監乃二過有厭矣六縣之土蒙被灌沃禾黍登倍易民之訟以為謳歌距今不衰矣遷屯田郎中知慶成軍丁太夫人憂服除賜緋衣銀魚知遼州遼鄙小所治當陿阸前人忽之不事事吏頑惷民貧有欲訴者亡地益窘偪公為之籍記簿調賦役痬濯而莩飼之宛轉旬月成就人咸安之詔求舉堪清要吏梁丞相為大鹵嚴峭少合特取公應書進之宰相方將汲用而公遂病至不起享年五十二嗚呼公少好學博覽兼記其譔述有尺度名聲鏘然為人器宇儻蕩疎眉廣口望之魁崛偉人也喜大節善論議於世務纎悉無不該究聽之灼灼皆可立施用者與人欵曲接以恩意無一不相能故死之日上下咸嗟悼之娶李氏封南陽縣君知書史為婦姑跬步以禮閨帷矩範鄰里矜法自公死不復御文繡日蔬食誦佛書治家嚴嗃訓子孫益不容自放男一人蒼舒雋慧修爽雜習可喜攻詞章善草𨽻前為高陵縣主簿諸公譽之女一人適大理評事裴正民柔淑婉嬺克禀儀法孫若干人公有文集凡十卷所以為銘銘曰石以嚳源康叔有孫靖伯之支碏為純臣漢奮恂恂萬石一門昶魏守萊東陵始遷至愷過江從官晉元仲覧於唐所秩亦尊後頗班班雖晦有人公世闗中孝謹所蕃起􅌵其熒將焰以燉服采吏塗赫然厥聞宣積勠勤勢久且燔羣章交加進天之閽洊試扵州朱遼兩轓治居窮嵓胥甿樸渾公為輯齊宜有畢完求賢下書外委要官太原得公亟喜以論上將寘之崇資顯班厄乗其期中夀以淪人嗟謂天孰云而神公胡不留徳俾在民昔旟東征今柩西還御羞之隣鳴犢之原山蟠水紆問龜其言此地吉良可棲公魂公其來安以侈後昆屯田郎中閻君墓誌銘公諱某字某其先太原人五世祖某嘗為唐安郡從事因家焉曾祖某有異行鄉黨稱慕陳文忠公咸平中仗使節慰撫二蜀蒐獵幽隐表言其高朝廷下粟帛褒寵之祖某安善固節不樂仕進考某贈屯田郎中妣封旌徳縣太君郎中既嗣累世令徳之後薰濡染漬刻意扵學酣嗜典冊顛倒熟爛尤喜左氏春秋最為學者左右采獲持去精義以下其他師淳化中順賊起郡邑大擾郎中盡委去貲槖挈家所有書居二江野外奥曲賊不能到處穴地藏之曰貨財吾不屑此書如為兵火蹂燼後求無有也事平出之使子弟日夜講解誦習要之為名儒故有如公者子焉公天聖五年郡舉進士南宫類其所程文奏入高等覆試廷下唱第裁得同學究出身公進撫陛楯辭不願就願復𨽻他日薦書意甚切上使中貴人㠯溫語諭之乃已調佐永興軍醴泉縣間益自勉造為詞章遂鎖主簿㕔以起於是中八年進士乙科授本軍推官論代丁旌徳憂外除補涇州幕用舉者改著作佐郎知彭州濛陽縣遷秘書丞太常博士監在京左廂店宅務以郎中䘮去職終制授屯田員外郎通判定州今丞相昌黎韓公時為經畧使判府事事一切委公凡有可以古義装潤表疏使理趣較明有條紀不難諭者非㠯公無誰為之丞相視公禮特厚轉都官員外郎賜五品服御史闕詔近臣上有行誼者補之今孫少傅抃為中丞㠯公名聞衆憚公端勁難揉遂執仇議以罷拜職方員外郎知開封府縣縣治盡京城之半事目苛冗復為彊家巨宗佩貴挾姦侵撓紀律鐫折下户錮理專利以居於已公至逾月皆懔懔自約不敢引手探公緩急孱賤孤弱始得開蕩喑噎吐為和氣至今議者談治赤之最公先也㠯屯田郎中知磁州磁人鈍縵少文公為立學選師以教育之躬自臨視較試藝術旌引能者厲飭不逮故風尚藹然一變椎俗民既禮讓事亦休簡未幾移江南西路提㸃刑獄臨川郡丞南昌從事皆大臣子弟倚藉勢力放肆貪暴前按察者率皆顧忌遮䕶陽不省問公視事即鈎治之狀得聞上逐去由是列郡傾聳震惕食飲眠寐不㤀檢戒江南民雖嘗以訟自喜然有以詿誤入法者前人諱惡之槩嘗以例移管他處公閱籍指辨盡還之鄉袁州分宜縣具獄上兄弟二人者劚冢發柩取物敗其重意悉綴結増就一與其弟本非矣弟癡騃庸懦已悉承也公視狀直曰兄乃賊弟何預為是必有以力轉其情者屬有司謹騐卒如公言各以罪免羣論稱嘆謂公神明矣公行廬陵有婦人來自嶺南遣婢持尺紙詣公傳言夫死無所附願得適人以圗北歸望公閔肯書此貴人無疑納我公謂曰若主何在令自來婢去公曰外有人矣是將有利其財而為之謀以我為信者黙令捕之實為無頼者誘紿以覬其所齎裝公致之獄道此伏罪而遣良校䕶送婦人歸京䖍州民私貿鹽以自業世世習扺冒雖毒懲痛斷然不肯少悔者朝廷既亦以厚格當所獲故捕吏務多得其狀名至兇者取所賞往往鍜鍊平罪以當其所酬公下論切戒謂不可復者比㑹信豐令嘗繫此等囚逮二百人公引前一二簡詰獲犯實者五之二自是鹽獄遂省至今人謳歌之嘉祐六年八月二十七日公權䖍守事且出聚僚吏區决如平時罷歸食疾作藥不及下以卒年六十五也公方重端梗簡介静嘿自讀書便好追訂古聖賢所以立言示後世之意其為文章浩蕩閎碩騰高踔逺解理析義夷易明白西南士人宗師之其講議世故開列政要原所以治亂之端與夫所以致之之由如誦說可聽以紀性孝友事親生死無少怠養亡弟諸孤恩意益厚如已子善草𨽻得法然甚惜不妄寫以與人於世少合凢取交扵人必始卒用信無以寒熱易其守韓丞相最為知公方將薦用公而公遽亾矣嗚呼其命也耶公先娶勾氏早世再娶李氏贈司空若拙之孫太子洗馬綽之女柔懿恭惠治内有法封同安縣君先公而卒男三人曰高叟曰真叟並補太廟齋郎曰孟叟舉進士皆被慈訓敦厲素業非所以隕墜公之所植者女一人嫁前進士毛世勣以治平元年十一月某日葬扵晉原縣白馬鄉飛鳬里之先塋於其塟也韓丞相以詩悼之真叟以同嘗論文於公之左右來求銘為之銘曰測古之深蹈道之高極其端涯静不以勞偉然充中仁磨義軋孰司其闗久不使發有地十州既嘗少施曾不滂洋大故以隨孰謂乎公而遽及此天其昌之有書有子丹淵集卷三十六
