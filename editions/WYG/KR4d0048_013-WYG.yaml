body:
  text: 丹淵集巻十三宋文同撰詩四十四首李太尉固昏雺翳紫極横霓勢光大妖威集凶冀忍穢實中頼姦鋩日增剡誰汝觸取害驕根愈自固所植利孱昩容容彼羣輔竄伏皆䑕􅒰側視况未敢肯復形嘆慨太尉漢中士氣引八極外岌然處大麓天下聳風采自開煑餅禍賊意已莫快移書瀝憤膽語激益睚眦罹寃卒用此數與六九會基茲被沈酷燮免乃天貸髙忠揭萬古宇宙莫能載垂晶耀簡策糞土視廣戒歸來𦵏埇墝冡祠茲儼在宏垣敞深豁巨木森晻曖神靈皎如日過者知再拜同愚忝郡寄公里曰境内心期欵舉像所顧官有礙精𠂻託明酌舉手向東酹趙壹壹也本西縣狀貌徒磊砢其才固難得行有所不可世人詎能掩而爾輒自我旣慾焉得剛所守實未果抵罪當至死其中遂水火一為人所活上賦何瑣瑣為文好譏罵惡吻事掀簸逢陟與規輩次第滋爾禍無成困鄉里倔僵老愈叵何煩遣相視器識自么麽余因守漢中作詩揭墓左勸君莫學壹學壹終坎軻張騫冡祠一曰災冡中梁山麓漢水濵路側有墓高嶙峋叢祠蓊蔚蔽野霧榜曰博望侯之神當年寳幣走絶域此日鷄豚邀小民君不見武帝甘心事逺畧靡壊財力由斯人駱谷高峯偃蹇雲崔嵬層崖巨壑長峽開龍蛇縱横虎豹亂古棧朽裂埋深苔行人側足恐懼過飛鳥歛翅哀鳴回君不見德宗注意用姦慝大駕從此蒼黄來慈濟院雙楠雙楠高聳緑氤氲宻葉長柯䕃四鄰佛現寳幢經㡬刼天開雲帳待何人護持必有諸賢聖觸犯寧無惡鬼神付囑寺僧常灑掃莫令向下有纎塵觀音院怪松恠松屢見無如此毎度來觀説向僧若遇風雷宜守護恐生頭角便飛騰秋聲遶殿隨齋磬夜影侵廊對佛燈韋偃畢宏今不在欲求人畫有誰能江原張景通善頌堂庭前雲蓋碧巉嵓堂上先生雪滿髯説藥客來聊下榻謁齋僧去便垂簾種時法好花難謝買處錢多石易添子􅃕光榮身壯健只將香火事華嚴雲蓋堂下石銘夏夕池館蕭然夜欲分滿林蟲鳥寂無聞風吹松子下如雨月照荷花繁若雲泉作小灘聲淅瀝筍成新竹氣氤氲清隂正覆吟詩石更引髙梧拂練裙寄宇文公南自文州曲水令棄官彭澤長謠便歸去君辭曲水亦其徒一官何藉五㪷米二子况皆千里駒懶對俗人常答颯厭聞時事但盧胡從來綿竹多賢者唯是揚雄識壯夫北禪龍井城北神龍去㡬年近日人言歸舊止澄潭沈沈不可近百歩之外毛骨起今年興元輒愆雨衆懇問龍求滴水香煙纔上雲滿空一夜滂沱遍千里送潘司理秘校已自多時賦式㣲五峯佳景夢長飛四年遠地為官去萬里高堂喜客歸下馬便呈新授敇開箱争認舊縫衣鄉人覔次來相賀蓴菜鱸魚正軟肥又五言曲棧繞斜谷鉤欄天際分吟鞭摇嶺月倦枕拂溪雲好景不闗俗新詩皆屬君西南有歸客一一幸相聞收復河湟故地啞兒峽西山已塵䭾金輦帛無斷羣河湟故疆盡收復解辮厥角歸如雲堂中玉帯賜丞相隴外金節酬將軍唐兵萬里若日月請作古今人未聞自斜谷第一堰泝舟上觀石門兩岸竒峯最為佳絶北風吹雲落寒水逆波刺船行五里層巒夾空抱叢石萬劍側脊翠烟起草木枝葉自殊别禽蟲羽毛亦竒詭安得鷄冠數稜田便可誅茅此居止宿斗山奉真宫山形如斗勢坡陀魁枕杓攜萬尺高近世無人知火棗當年有客得蟠桃靈蟾尚隱凝瓊髓神鶴常歸墮玉毛一夜杉松響天籟滿空疑是奏雲璈晴望漢川城頭看雨霽天地若新浴晚容變雲霞秋意著草木四時易遷改萬事苦迫促舊山何日歸三徑有松菊清景堂公外捐塵慮閒中見物情蕉花紅炬宻竹節粉環輕燕泊簾鉤語蜂尋筆架鳴靜能知此趣吃吃笑勞生梁山大雪嚴風吹屋鳴向曉尤凛冽應從北山上一夜吹猛雪幽人不能飲身體冷如鐵空向龍具中苦吟聲不絶寄夏文州左藏佾二首翩翩貴公子佳譽本能文大第辭京輦髙旌擁塞雲勸農唐刺史養士漢將軍莫刻和戎誓朝廷重立勳其二寄語文川守謀邊想甚勞封疆通鳥䑕種落雜猿猱甲馬廉頗少詩書郄縠髙當須辦乃事不用恥弓刀狗溪迎湫祈雨輒應夏雨渴久矣秋苖憂槁然至誠通祝版靈貺逐香煙桐祓應無訟囷倉定有年曹公三大堰一夜滿民田晚興衆吏晚已散西園常訪尋覆棊苔閣靜行藥草橋深草色晴承屐松隂宻灑襟山蚿欲重賦倚竹聼清音嘉川道中寄周正孺草木春深後山川雨過時清佳常滿目衰倦敢忘詩好尚舊若此飄零今比誰争如畫堂上日日聽新詞還李中舍杞奉使集奉使道中詩百首古人遺落盡冥捜自憐吳蜀佳山水一夜燈前得遍遊雪後寄景孺提刑時按洋川雲隂低重雪花繁夾道歡謡引使軒何處郵亭錬佳句綵毫揮罷索清罇寄永興吳龍圖給事三首髙舂鈴下索焚香鏤管紋牋發綵章應在後園凉榭裏𤣥霜仙帽紫霓裳其二見山樓逈倚晴虛看展終南百幅圖聞説二林尤勝絶想公髙興在香爐公有别業在廬山其三土風豪盛古長安誰謂元侯臥治難使客不來公事少一牀蘄簟石林寒不飲自嘲能詩何水曹眼不識盃鐺而我豈解吟亦得不飲名持此以立世可笑實浪生寄紀禪師自笑塵中游宦客長輸林下坐禪僧水田百畆一區宅歸老城南何日能中梁山寺四絶臺殿晻曖山嶣嶤雲霞鮮明天泬寥側身下望厭塵世安得羽翼凌九霄其二煙巒彩翠霜林紅層樓複閣雲霧中襟懐太爽睡不得一夜滿山鈴鐸風其三羣峯南北争嵯峨如瀉大壑翻衆波愛之欲把入圖畫世無好手將奈何其四上方梯磴繞嵓頭誰就孤高更起樓直望漢江三百里一條如線下洋州仙人二首身著青羅緋衣裙口誦白羽黑翮文半空欲下復不下回首翩然歸五雲又頭梳三角髻餘髪散垂腰時伴秦樓女月明吹紫簫山堂前庭有竒石數種其狀皆與物形相類在此久矣自余始名而詩之鸚鵡石静立身㣲聳驚窺首畧回何人將至此應自隴山來柘枝石紫蘚裝花帽紅藤纒臂㡚被誰留斷拍長舞不教休狻猊石巨尾蟠深草豐毛覆古苔雕欄臨綺席長欲上香臺崑崙石雨漬身如漆苔侵面若藍問時都不語應是憶扶南羅刹石洗濯形容露剜挑口眼通試教常㸃檢毎夜定飛空珊瑚石海底初生處扶疎苦未全㡬時隨鐵網流落漢江邊病眼病眼毎至午其視何􅍃􅍃安得張中書就欲求古方吾友務深有嘆琴之什運使子駿荅之佳章務深亦使余繼作白水滿方湖山中好秋色逋翁促瑶軫來坐湖水側臨風起髙調此興浩無極波静戢游鱗雲空矯飛翼蕭條變林野萬籟一以息且莫緩商絃令人涕横臆丹淵集巻十三
