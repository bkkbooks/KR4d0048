body:
  text: 丹淵集巻三十三宋文同撰先狀成都新尹趙龍圖先狀伏審某官進登延閣之華出守右川之重蒙休者衆竊幸焉深恭惟某官性禀道冲體兹坤直端方勁潔博裕寛閎究學淵淳成文雅健事親以孝而行聳羣俗納已於道而名高當時優游仕榮增衍賢美嚮自亨衢振采禁路升華奉白簡以繩愆朝倫以肅伏青蒲而納誨帝念其嘉以至總金幣佐會省之繁調芻糗贍朔陲之給皆凝茂績實稔休聲蜀為逺邦邑曰巨鎭其政繫於國體所寄斷于上心地望素隆事權特重將委任於守土實艱難於擇人付畀或差經營且力會此及瓜之代久煩玩印之求作牧以行非公其可是用褒陞邇職慰寵遐民已聞高牙漸出危棧木牛舊地重識孔明竹馬前人再迎郭伋某傾依有素汩沒無庸忝佐偏州幸當洪䕃歡欣踴躍倍萬于他云云漢州牧先狀某自逺標符僅周歲序瞻懷靡極跂引為勞顧惟書問之踈實繫事為之冗側承興止舉集嘉休此者某營祿養親列情干上尋膺宸檢獲貳藩條得遂依仁豈勝為幸已計出都之日即聞赴治之期瞻拜有涯欣愉是切成都韓端明先狀某近奉恩除幸叨職委顧惟支郡託在洪庥拜命之初撫躬以抃某嚮終親制屢抗愚𠂻所聽云高斯誠未允某官内存愛恕深軫孤平謂宜還官使得就養猥蒙奏列盡道哀窮今此陶甄實由薦藉已戒出都之日即諧趨府之期將侍崇嚴併陳悃愊漕憲先狀此者某拜恩天朝守職鄉郡侍親以便撫已為榮某嚮起憂廬召還秘館常念慈闈之養屢祈嚴扆之私愚悃盡傾聖心下惻許歸舊里得佐偏州顧兹職守之㣲獲在按臨之下惟天與幸有地庇身已戒輕裝即趨賤局瞻依甚邇喜抃無涯運使蘇刑部先狀伏審某官榮服命書移領使節提封舊俗參語以交歡屬部下僚撫躬而自慶竊承行府已涉近疆偃冒勤劬起居休豫恭惟某官探道奥秘業文精深藏以在身施之行事用無不效績故常尤按三尺之書了無寃議調九年之食頻倚辦才所至也人皆頼之其功焉上實知矣猶煩逺使將漸邇臣且蜀號財賦之饒於國當調度之半有藉供億必繄強明智敏所臨課力惟最兼以重柄委之外臺民之利害得以興除吏之善惡因而懲勸高車在道列部傾風某奉親還鄉倅職屬郡比受按司之檄此讐利局之符有幸孱凉得依庇䕶即趨近甸引拜旅旌運使度支先狀梓州竊伏下風講聞髙誼自為晩輩未嘗獲對於晤言徒仰盛名不敢輙通於音問此者伏審某官以才能之重受神聖之知蜀有兩川梓為一道財賦之衍常供邊場之求郡邑之繁須慰吏民之望孰膺上眷僉謂老成高車未來列部相慶某庇族下邑居官鄰城企漕節之華願瞻風而實切守倅車之賤顧通謁以無由聊導懇誠少塵几格云云提刑宋郎中先狀伏審某官更麾南豳按憲西蜀邸訊初諭輿情已驩蓋重名之久馳宜逺人之甚慰恭惟某官器略宏逺材資粹方蚤歴榮途盛著徽節科條易避參脩三尺之書飛輓均輸佐調九年之食休有丕績簡于上心此者出為外臺専按一道中典之重方委平亭列部至繁盡歸廉紏此之要劇宜以通明某昔在上都幸觀高誼今居支郡獲庇洪庥聞命之初抃懷增劇云云李殿丞權交代先狀嚮由貴治甞挹高風違闊踰時候問無所此者某叨膺宸檢分守郡條矧漕臺之借才屈明府而承乏獲交善矩且慰愚衷未遑馳書先辱賜敎仰佩推褒之重實懷悚愧之深即遂披瞻預增喜躍湖州提轉先狀將赴湖州忝膺宸綍薦畀藩條顧惟無似之姿謬此惟良之寄撫衷自省竊幸焉深伏念某單凉逺人漂泊孤宦賦命譾薄與時闊踈故常守於外官輙屢更於數郡雖蔑殊尤之効僅逃殿劣之譏三館既還豈㳙埃之云補一麾重請得江海之于宣此者伏遇某官被眷九重理財一道布惟新之政惠養民甿按所部之城澄清寮吏秉剛方之節威惠風行持察舉之權否臧洞照幸將蹇跡仰託殊休某已謀便道之行即次提封之下有期瞻倚無量欣愉丹淵集巻三十三
