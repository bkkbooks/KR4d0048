body:
  text: 丹淵集巻二十一宋文同撰雜著黄氏易圖後題易以數變以管攝天下之事物横該直渉窮崇擴遠幽么隱奥無所不及古之人得一緒而力引之舒演盤約以系其説滂洋滉漭而初若有以可紀者究其推合遷就往往於端末亦自盭今之所謂京房之學者是已房旣受術於焦延壽延壽嘗謂房必以吾道亡其身後果然豈以其自置太審而尚鑿者歟取六十四卦更直日事候一歲風雨寒温以効其烖休獨以坎離震兊號方伯監司以分至專王之氣主之其事疑彊配不精解勤則勤矣然後人臨文所惑奈何故吾庻先之論由此而興矣庶先少遊四方博學善辯議湛思無不曉貫因悟周流六虛之説遂以完合京之罅漏散八卦所重之畫均諸消息而著之圖焉終始出入無一誖謬如瑵之聚斗如輻之擁轂循睨僂指不失倫類復撰明閏衍圖卦氣三篇以正諸家之未至以辨傳記所以昧没之意磨神睛補鬼髓庶先之深功厚力也欲視於世求此題述試為道其大氐世之君子考其圖閲其書者皦然若粉墨界畫不待講解而其法自得此吾所以不復區區也熙寜已酉孟冬望日墨君堂書張景儒先公手澤題後提刑司勳景儒嘗以其先正尚書公手書十九帖示某乃公之守成都時通洛中之家問也厚紙細字勻圓滿幅行楷相宻淨無改竄讀之其間雖與其家人語言然未嘗不以已之治蜀求宜于遠人及戒告其子使居官當務以清慎端潔與人恭順為意者世之人徒知公生平立朝以風節修謹為名臣且未知公於其閨門不以私忘國不以下廢禮亦如是之至也賢人君子修身治心正家以至于任天下之事豈有内外大小之異耶其誠固以一矣某今見之於公也景儒公之第三子自㓜以孝友聞於人凡公之寸簡尺札盡能收拾裒聚躬自綴緝褾為大軸此其尤完者也景儒謂某曰是不獨自愛以為歲時霜露之思蓋將傳諸後世子孫使之知前人所為一切不簡妄知信蹈之是無忘乃祖之懿範矣因捧之愴恨良久某遂借去展玩累日乃曰昔袁彖懐其父集未始一日離於身孔休源毎見其親所冩書輒哀慟流涕景儒髙行斯人之徒歟其有開畫扇而追悼持遺劍而祭奠者固未若景儒之所藏真蹟燦然終身常在乎其目矣於其將還謹題於後魯肅簡公尺牘題後余過城因問魯肅簡公向時為縣之遺蹟有言演覺寺愛山亭之榜公親筆也因往觀焉徘徊其下凛然若在其左右歎息良久顧慕不忍去寺僧可吟復出公書凡六紙煙昏雨浥㡬至腐爛乃公去縣後與甘泉經邑真琛二上人之手書天禧初仁宗為皇太子公自秘書丞以右正言召改户部員外郎為諭德仁宗旣即位公遂參預大政公生平以剛重潔直聞天下故被選為調䕶之職當時士論無不相慶以謂用人蓋無誰可踰於公者今觀其字畫與其所以為書究其留意於舊故周旋委折諄諄訪問無一事不至者噫誠忠厚惇實之正人端士也世何有哉今夫人少相與從遊平居勢相若則嘗欲合兩心以為一交内於腹中一日趨所利僅爭頃歩之差則闊視遠走亟往先就之旣得乃反面不復相誰何狠驁恣肆軒然自以我正當如此甚者交相詆毁或盡力排迮置死地嘗試㠯視公彼何等人耶雖然彼二上人者能以道行取重於公信亦非衮衮浮屠氏之徒耳因囑可吟令完綴緘鐍之勿妄㠯示人㑹進士李宏隨計入京可吟委之裝背褾軸俾稱其事宏歸攜以過余且求余䟦其後庻傳之永久也無疑熈寧九年丙辰七月癸酉洋州守居灙泉亭記八師經題後佛書載地獄事謂與人間造罪業而死入此者大小相較各以苦惱報無毫髪差謬者具言所以為報之狀種種怪異初若不可信然往往呈露以警動世俗是果然矣吾友直閣吕縉叔敘八師經述陳氏子事蹟甚詳宻乃言其自見聞也如此縉叔性堅正其語且不妄予遂得此本持歸蜀願鏤板以傳布庶當世有乖矞暴戾務為不逞者雖曰已幸免國刑逃天禍完皮革㠯就死亦使其知幽隂之中法令悽楚慘虐不可得而苟脱矣㠯恐懼故或能易心改行以自懴首乃此經今人歸依之明效大驗也楞嚴道人繼舒師善化人者人大信之可主此事付此經白狻猊圖賛白狻猊圖蓬山太守安子野之見寄也子野言世傳此本甚古識者謂陸探㣲之筆郡有畫工善摸搨今試使為此謾持去敢求評之余愛其凡用意處非尋常畫人之所能及此雖不逮前人而典刑在矣因為之作賛以示子野至陽之精動而為物豪健趫猛力不可屈伊惟狻猊質状仡仡西海之中洲名聚窟厥生其間萬里中國請試言之大畧詞曰肩凥抗衡鬛尾蓬勃口哆舌掉耳衝目突竄海鈹蛟捎空碎鶻虎豹飲髓犀象嚥骨胇胃鬱攂不敢前捽忽時驚奔天出地没有皓然者來何歲月陸生探微冩以竒筆筋緊肉怒常憂竊發後人傳摹粗得髣髴有客好事遠以書達掛之高堂氣象􅒞崒毎至昏夜鬼神窸窣瞥然觀之寒聳毛髪世有此類其勇莫越為之贊云大愧孱訥覺濟大師眞贊并序成都府大慈寺有高行僧曰覺濟大師繼舒者以某年某月某日殁於其室其學人文照其弟子居逸等議𦵏之於彭州九隴縣選勝地而塔焉旣已又繪其像於塔中而恭事之請於常所與往來者文同為眞贊同為贊之其詞曰有上品人學大雄氏了一切法到三摩地自領秘囑震音西南化同毗耶現比優曇倡導演教危厯四紀計所悟入屈忘其指在在處處瞻承光聲歸如羣流望海以傾貴主欽依重侯諦仰寵服恩名取畀天上乃數須盡示滅浮提孰窮其端住東院西丹景山前大乘寺側藏固遺燼表崇高級是咨妙繪圖冩清真儀形則然不知者神怪石銘并序聶侯友仲立漢學制度宏侈為二蜀之冠當時不知何所得巨石置講堂之後質狀怪偉勢若飛動昔孟氏僣竊苑囿所蓄者皆寜武軍節度使顧璘所進昶旣面縳是物亦散落民間余在成都往往見於好事者園館凡自璘所來者一一皆具欵勒此非耳食而其完厚瓌詭上下可愛雖到茂灌牛竒章號為好事諒亦未嘗見此者也治平丙午秋余視羣進士試於此旦暮環繞其下歎惜之不足乃為之銘其辭曰廣漢學宫後有竒石磥砢一抱嶔崟九尺怒蜃驤首狂龍轉脊拏空將飜壓地欲坼神乳溜腹老苔漬額堅包勁膂潤吐活脉誇殺羽人詠窮墨客敢告存護千古怪碧盧杞傳題後盧杞少時已險譎無正行藉父奕清名人不識其醜為虢州刺史虢有官豬三千杞因奏言豬患民甚德宗為徙沙苑杞復言彼亦陛下百姓莫如食之便德宗喜曰杞守此而憂他宰相材也乃賜豬貧民立召杞為御史中丞遷大夫遂以門下侍郎平章事異乎哉杞也士大夫立朝能自以其才結上知而都貴位者於古㡬耶蓋常有所因於人然後可以脫塵泥而薄雲霄矣彼因之者或未有以能厭於中雖非已所願求而他自欲以已為其重行之至此尚宜逡廵顧慮擇去就以避天下之大論一失之已為當時所謂君子賢人者姍笑不存録所服塗地矣自昔帝王命相以夢以卜以自識其器業以得之於左右正人端士以深知其久負於海内之望者旣審矣乃置之巖廊之上朝夕與之講議所以安養元元之治動神㡬宣靈謀崇固萬世大業而共饗無疆之休烈乃當然爾今杞皆不然獨以豬為謀而遂至於宰制天下士民之命毁國章貽主禍頽替壞爛顛覆狼藉如此豈上天以時將溷亂擾攘不可支持而生杞與國俾造此紛紛者耶無乃先以其兆示人謂杞體雖人而行禽獸故使由畜産以進者耶何其本末輕賤陋惡若此之甚也天意若曰杞狠躁穢衊類豬故以豬發其身噫杞可賤矣然天之所以命人而作監於其後者亦已怪矣李兊尚書諡議尚書恬簡和裕廉明敏給幼而警悟有成人之志壯且該洽中求士之選兩賛府事再涖邑政居為僚友之嚮服去得吏民之懐仰常致顯績用傳清議道才美者公常在焉慶厯中魚周詢為御史中丞好善樂義賞㧞賢俊乃獨表公求以自副公居臺侃侃甚著風力事畧細故言存大體上常納其中啓人不知其外迹㑹廣言路尋當諫職遇有所發彊且不避屢詆重戚謂辱於要位深排貴寺盡奪其寵勢當時衆論于今在耳旣膺延閣之命頻委名藩之寄佩越印守杭符建廣牙握孟節旋旟自鄧典憲在洛泊然知止還政就第其有斷積訟止暴役活寃命辨鬻獄公之在官常所從事行巳至是與人何愧以壽而没世亦鮮儷易名之典禮具於國謹按諡法曰履正志和曰莊公之居職乃心夙夜義不勢屈名非訐取考合懿行宜與此對請諡公曰莊謹議素靈宫醮詞某年月日具官某今差某官賫香果醪饌攝行清醮於大聖金闕眞元帝君某伏奉十月二十一日赦書致祭者皇帝因星文謫見肆赦天下蓋慮方宇之内物有不得其所而寃憤上激以成茲變者夙夕警懼無或處寜以至避正殿撤常膳而深自損抑寅畏天戒欽修聖德如此之至也復命守臣於其境内神靈之所宅皆俾䖍恪供事以道上如此孜孜之意庶期消伏災沴以召休應帝君昔嘗顯章威靈偃禦元惡棲真秘奥光景如在某謹如皇帝詔㫖上薦圭潔伏望下從人欲垂享精愿攘妖萃祉保衞方國某無任䖍叩激切屏營之至頓首頓首謹詞丹淵集巻二十一
