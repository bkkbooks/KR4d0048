body:
  text: 丹淵集巻二十六宋文同撰序送趙大資再任成都府詩序上五年秋七月丞相以成都守臣當更其所以宜往者名氏陳于上前曰是其職序才業皆可以稱其任惟上之所擇者上凝神久之且曰今海内之蕃域號為至重者舉莫若吾之全蜀壤土衍沃民俗豐夥外之則八國種落頼之以綏輯内之則四道郡邑倚之以康靖得人而重固異他所須智畧沈辯威惠肅給厭輿論之所與慰遐氓之所欲者始為其人矣我有耆哲宛在東土是嘗屢以仁愛明恕撫吾西南之民其民懷服其信厚逮今未聞有輙敢一日忘去者此將煩之再涖于彼其謂往制無或循襲丞相奏被上㫖乃曰聖慮所及度越常議選委良帥以遺井絡遠人蒙慶不勝至幸於是以資政殿大學士召公於營丘大斾過國詔趣見上衆悉謂公輔臣必以遠解旣對便坐獨奉天語雍容啟問移漏累刻惟以願得亟裝出都門并驛臨治以副上之所以待下之意訖不以私請自免以圖便安遂行上褒嘉之馳使勞諭眷委之厚無與為較先是公二紀之中四臨於蜀蜀人旣聞公來男謼於道女讙於竈皆曰我之匕筯安於食而枕笫樂於寢者不圖今日復因於我公矣公旣至簡條目去苛暴刷滌梗垢磨盪昏瞀羣疑革而冰消大擾息而波澄未逾月而梁岷之下晏然已為樂國矣同昔者嘗聞之於公曰夫感物患乎有心有心則接于物也泥而不博臨理貴乎無欲無欲則燭於理也明而不闇泯諸妄慮照以正見則天下之治安有所謂齟齬而難致者哉蓋公素事於此以為身術故入居嵓廟出殿巨屏曾不以内外曰輕重而一以於其所無事者為政治之本凡取知于君而獲愛於民者其將繇此者歟同常欲有所論譔以紀公之休懿會赴官興元道出門下公因授以送行詩一篇俾同為之序同乃述上之所以復用公於蜀與公之所以得蜀人之歡心者題其篇首詩自韓魏公而下凡若干章云熈寧六年上元日謹序送張學士知嘉州序熈寧六年秋吾友張益孺自太常禮院求為嘉州旣得或謂余曰益孺少有才名向嘗以辭章冠國學多士遂優中科等自召試入館凡若干年其踐厯亦已深矣方朝廷急用賢者之時如益孺不補外被寵擢列華貫旦暮期爾何遽求去以自緩邪余曰豈其然哉夫士之所以恃而立于世者固在乎知此道而已矣命旣存乎我其所以用舍之者繫人之能否爾惟能常安於中以俟時之所進退自信乃篤也或撓已以求合之雖上竊寵榮以夸耀末俗其為賢者一付清議昧然已為賤丈夫矣益孺脩正端潔治已有法度今欲使為賤丈夫者之行其肯邪况漢嘉西南之美郡益孺以二千石於此侍嚴君旦夕之膳其為人子豈不榮且樂歟以此較彼益孺所獲其少歟彼將奚為哉初出都朝中士大夫亦有以益孺之行為可賀者皆以詩餞之凡若干首益孺梘事之明日即走書興元求余為之序將刻之石故為言此八年上元甚美堂書送朱郎中詩序熈寧三年庚戌三月癸丑同自蜀還臺宿臨潼華清道館朱康叔引名見訪康叔昔守閬中以治稱同未嘗識之而嘗相通書也遇於此尢自喜問其所以西行之因康叔欿然謂同曰不肖不幸少與母氏相失及今五十年矣自省事始能得有告之者然終不能得知其所以歸逮冠游宦四方雖身居于此而其心未始輙少時不營營於彼期于母氏之見也去嵗在廣德一日若有所感者遂解官決欲走天下冀萬一或遇之當先出函谷上雍宜有得道其迹髣髴殊可信乃斷葷血食刺臂鏤板寫摹佛書輦散於所經由道區區祈徹母氏之聽聞至此累日又言儻在金州者明日且復如南矣言罷涕泣嗚嗚是時同亦新免削杖聞之摧咽不自勝起撫康叔曰君尚有母求繄我無之奈何相與歔欷久之夜分散去同輾轉至曉不得寐因口占百字詩送康叔謂其精愿如此不獲之神理昧矣明朝上馬授之而别至京未㡬聞長安大尹錢公明逸表康叔于朝曰朱某曏棄官本繇尋其母今旣得之馮翊矣宜還之舊秩且褒寵之以勸激天下當時士大夫相逢遇讙然駭異稱嘆謂非世之所有在昔亦無㡬矣其秋康叔侍太夫人入都都人逐板輿前後擁觀至所居閭巷談説抃蹈嗟咨至有感慨墮淚而不能自語者如是閲月而後已上嘉賞特召見復其官又封賜其母長安縣太君康叔請願且倅河中庶近母前所在慰之詔許於是好事者争賦詩以贈行凡若干篇五年同守陵州康叔之子雒縣尉瞻之遣使致書授之大軸于前此詩也且曰大人昔求祖母時其端涯絶未知而公與之詩謂必得後果然瞻之將欲益以諸公所為刻傳之幸公復序之使明白同旣已高康叔之懿行又愛其子能章大其父之令名故為之云云以警當世之薄俗以貽史氏之願作佳傳者康叔名壽昌今為駕部郎中壬子中元平雲閣序送敏行無演序余於莊周書讀之有年矣愛其善騁高辯一盡乎天下事物有名相者性分之理輙嘗謂曰是雖有好為横議之士於此固亦無地可以容其言矣後得僧肇法師四絶論因悟不遷不真之㫖與無知無名之義漸簡邪惑直領妙慧回視向之所嗜逍遥齊物之説何其譊譊者哉其有高不可躡而深不可汲者竊常患之講師無演自成都來為余設滅縁之梯引除妄之綆使余旁羊恣肆造詣無極俛仰一息空色皆盡斯無演之力於余大矣顧余所獲者何等物耶一日無演忽語余以西還之期挽裓以留屢不能得遂書此以贈别且自見也熈寧六年癸丑季冬甲申書送通判張總之都官赴闕序服道之深者其心必渾融淵虛寛廓夷易秉負確固動不回辟據通顯處屈約視之槩然弗汩乎中安所自存以充其元焉近世養士不以三代之法成就之使其知此術者甚鮮同嘗用是以考質士大夫之所為謂清河張侯總之者斯人歟總之仁以治已誠以接物自登科凡三十年而官不過員外郎位才止治中從事不競勢不倚俗外泊而内靜色恬而氣和其辯論正而達其文章博而粹無躁志無懟語愉如也同往年拜總之於成都及來南豳復得預總之職事反覆參視無有欹缺誠哉士者之刑範而吏者之文墨耳今解秩歸闕彼能以賢才而報國者云誰如欲為朝廷求所以有益於時者用總之則名知人矣道士袁惟正字行之序道士袁君閬中人也其所住觀與余永泰山居相距才百里予昔在鄉里時已聞袁君能用六十四卦推五行配六神使七十二煞言人禍福已發未兆之應一一若目見然竟未識袁君之面也後余典校中秘書幸與士大夫遊近日往往有為予言道士自蜀來者善以爻象消息休咎嘗與某人占某事某事約時指日無不如其説郭景純管公明之流也予雖舊聞袁君之術甚精而未敢以是必為袁君以對之爾暇日納凉於城南道宇有道士出西廡下高顴廣顙狀貌怪偉肅予以入坐堂上予因問其所從來曰來自蜀問何以居此曰往年嘗以占驗得權貴人意遂喜以紫服奏我館我於是問其術誰師而如此曰自居蜀時已得異人授秘記後復走天下東西南北殆遍聞某所有某人善此術者雖數千里必往咨焉質吾所學而遂無疑凡今所言若牛刃虱鏃見則洞然矣問其姓曰袁氏乃予昔在鄉里時所聞與近日士大夫為予言者袁君是矣遂與之往還一日詣予言諸友皆以字相稱我獨無敢以字請予曰惟正者君名歟夫正者道之所由立也凡在天地間渉形迹該事為者莫不保之以全其用者也或失之則傾側邪辟龎雜乖盭於不善無不至矣今君方以是術有名于時為人信嚮如能正以行之守之以固不為利欲撓其心若莊遵季主之所為君之道高矣宜以行之為字袁君跽而言曰方外之人未聞此語幸而君子字我又因而規我敢不佩服以終世書以贈之嘉祐五年庚子元日謹序夏佾字德卿序古者諸侯有德天子必賞之以樂有樂必飾之以舞有舞必差之以行綴其制蓋自六佾而下佾列也列行綴也夫欲識治民之勞逸者必以行綴遠近而考察焉故曰觀其舞知其德會稽夏君生於勲貴之家能不以驕蹇自汚而學問無厭其名佾有意歟其將暴厥所脩以進於位而為生民之利歟其欲謀致華顯光大以祈有德者之賞歟是必恥其行道也不充而受賜也不侈爾問字於余余以德卿呼之縁其義而就其業也君能勉之歟如能使吾言不費則君之見報者必有日也是為序丹淵集巻二十六
