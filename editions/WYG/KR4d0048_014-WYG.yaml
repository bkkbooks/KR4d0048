body:
  text: 丹淵集巻十四宋文同撰詩四十九首子駿運使八詠堂八首寳峰亭嘉陵抱江回平衍出横澨中間築雄壘獨據兩川會行臺敞嚴府磊砢北城外潭潭走羣楹直上巒嶺背危墻繚空闊飛閣入茫昧上有寳峯亭仰見白雲内岧嶤占孤絶下與萬山對層櫩動寥廓曲檻枕闤闠主人從籃轝晚興在公退心掩萬象遠目引八極大鈎簾拂坐榻隱几緩衣帶詩書抉闗鍵筆硯産珠貝是時衆吏去不敢呈計會雖然彼郡邑原本窮利害自取金􅥃饒無煩米鹽碎此地寄清襟歲書從屢最桐軒晴影滿空壁晨曦上清軒庭下雙髙桐枝葉蔚以繁種者意自遠豈並羣木論謂可絙朱絲中有雅韻存成之在誰手但為培霜根須知治世音盡付於此孫栢軒沈沈敞幽軒聳聳列寒栢清音納牕户爽氣逼几席主人重端勁坐若對佳客時復下撫摩破蘚交履跡此意乃如是來者當愛惜大厦須良材相期早千尺竹軒此景絶可愛叢筠挺修竿侵簾復映幌翠影何檀欒霜威忌晚秀雨氣矜晴寒毎向極靜時幽禽發清彈自無車馬塵飛來泊琅玕宜遣老鈴下日日申平安李衛公言北地童子寺有好竹其綱維令人毎日報竹平安巽堂華堂聳嚴臺地勢側隨水髙臨巽宫上其取名以是峩峩寳峯頂日影正辰已繚棧入雲林詰屈如篆字輕霏互虧蔽亂樾紛間厠賔來獲清歡吏散生野思靜見萬物本一一齊於此體道以行權端居得深㫖山齋職事凡少休餘復不經眼幽齋設横榻盡日對層巘遥懐寄浩蕩静想縈􅑬嵼松雨潤書匳竹風吹酒盞榮名付傲兀勝事入清簡雖有舊林泉何須嗟去晚閒燕亭静宇占幽深是中何所有軒牕極清潔硯席羅左右公餘毎休此俗客曾不受六尺局脚床解帶就横肘掃除閒景物健筆當大帚敢問公許年得詩凡㡬首㑹景亭誰兹敞高亭磴道繞千蹋江山接平遠百里俱會合人間最佳景牕户供逺納煙雲互蔽虧蟲鳥相應答吟牋摘竒勝畫筆冩紛雜安得日從公短屐手自蠟呈李堅甫中舎杞往年曾憶過長安短紙書名詣門下君時延我坐終日洒掃東軒留看畫横圖巨軸不知數但見匣中時一把甲猶未竟乙復作門類著番開滿架使人歎羨不能已只恨有門歸隔夜歸來兀坐想精絶念此榮觀若為謝就中寒林兩大幅此物世間誰敢價倏然一别十五載常向人前盛誇詫因君奉使臨敝邑見先問此餘不暇君能為我再講說座上不容人俗話如君所蓄更誰有有亦未能無笑罵况君累世盡清職摹本敢來前弄詐君今還省正擢用異日須求作鄰舍峩巾曳屨日相謁更欲重煩開㡬帊待尋前輩用心處欵曲應須頻假借毎厨閲訖當便還不敢奉欺言羽化采芡通判盧㣲之攜種種之次年大盛芡盤團團開碧輪城東壕中如疊鱗漢南父老舊不識日日岸上多少人駢頭鬅鬆露秋熟緑刺紅鍼割寒玉提籠當筵破紫苞老蚌一開珠一掬吹臺北下凝祥池圃田東邊僕射陂如今兩處盡堙没異日此地名應馳物貴新成味尤美可惜飄零還入水料得明年轉更多一匝清波流萬子峯鐵峽東風吹空力何短三月隴山全未煖文法姦酋引騎兵飛隨銀鶻弓刀滿霜矛雪甲寒如水候卒何由知首尾君不見峰鐵峽頭雲色死一過蕭然五十里周思道如詔亭繁上先生教子時義方題榜貼亭楣當年此地開師席今日其言入制詞鄉里共傳為盛事鬼神相助使前知後人若續成都記第一詳書不可遺陵井喻氏歲寒山居蕨平處士居山日手種青松一萬根歲月漸深枝盡偃雪霜雖厚葉仍繁本營勝槩逃軒冕更結清風遺子孫寄語後人須愛䕶莫敎空有令名存提刑司勲示及瞑禽圖作詩詠之朱華盛發穿疎竹寒枿齊枯徧野磯大雪蔽天方亂下衆禽争地各相依非公好事誰能得此畫如今自已稀試待晴明挂軒壁定開羣眼一時飛北齋雨後小庭幽圃絶清佳愛此常敎放吏衙雨後雙禽來占竹秋深一蝶下尋花喚人掃壁開吳畫留客臨軒試越茶野興漸多公事少宛如當日在山家北城樓上滿目望不極城樓當最髙地形連楚闊山勢入秦豪平外斜通駱深中遠認褒圖經何壯觀故事有蕭曹晴登北城積雨已逾月久妨於此行雲山勞夢想風日幸晴明常愛往來處盡皆苔蘚生一壕新草木强半不知名寒食書事感懐寥寥官舍静於僧雖有園亭亦倦登桃杏花隂流似水圖書滋味冷如冰坐觀棨㦸慙無狀歸掃松楸恨未能得報君恩便休去虞卿前日本擔簦送李堅甫中舍奉使還闕自洮西又入蜀曾歌出塞愁又遣使西州去國星辰動還家歲月流褒斜新路晚鄠杜故園秋歸對延和殿從容問講求漢中城樓二首解帶緩幽憂登城復上樓斷煙横沔水孤鶩入洋州浩蕩成遙望凄凉起暮愁山中自有桂何事此淹留其二蘚徑踏層斑髙林古木間鴈隨平楚遠雲共太虛閒晚靄昏斜谷晴陽露斗山將身就清曠名路爾何顔凝雲榭晚興晚策倚危榭羣峯天際横雲隂下斜谷雨勢落襃城遠渡孤煙起前村夕照明遙懐寄新月又見一稜生山堂偶書㡬日無公事山堂興頗清和詩防積壓丸藥趂晴明斸石新稜出澆蔬晚甲生此皆忙外得低首笑塵纓清閣治庭區紜紛齋閣簡應接身閒憙枕簟慮静厭圖牒孤芳媚深叢幽哢出宻葉物理茲領會真境知可躡静庵問此初誰築經營羨爾能依深還巨木就䕃覆髙藤坐與境同寂來無人可憎一床黄臥具茂灌本如僧忘憂堂磴道循城近垣墻占地幽軒窓誰指畫硯席我優游不許簿書到恐為圖史羞此心元自適何處欲忘憂夏日官􅃕省事公多暇虚心景更長捨書無可樂就枕不能忘短葛沾肌薄寒泉沃肺凉何當逢靖節相與話羲皇寄成都趙資政纔承寵詔聮公鼎便謁除書别帝閽萬口一詞歌盛德四年三度福遐藩已為魁壘無雙士更入摩訶不二門應笑臨卭病痟客最先參見在江原晴歩西園急雨正新霽林端明晚霞松亭臨曠絶竹逕入欹斜花落留深草泉生上淺沙稚圭貧亦樂一部奏池蛙金影軒開軒俯清溪正在修篁内霜筠抱冰節爽氣常四會主人厭俗客日與此君對月上寒影來滿襟搖瑣碎忽憶故園修竹因作此詩故園修竹遶東溪占水侵沙一萬枝我走宦途休未得此君應是怪歸遲寄景孺提刑時按武興夾欄虛棧武興西使騎翩翩晚夕馳想過飛仙須下馬此中佳景入吟詩子駿遊沙溪洞聞有沙溪洞公將柅使輪還如探禹穴應見避秦人石繖形容古琳房氣象春若逢丹輦客問取虎文巾送郭榮叔秀才應武舉愛君才辯吐如傾圓直横斜善講兵休弄向時閒筆硯破蠻征虜是功名乞畫鴈寄涇州毋使君寒影亂翻秦嶺月晚行髙處隴山雲回中有客能傳鴈異日從公乞一羣興元府園亭雜詠甚美堂潭潭棟宇盛窅窅軒窻闢髙深與地稱可大張宴席府事如少休茲焉會佳客武陵軒水從前嵓來轉入後溪去中間載酒下各到客前住醉後皆怳然再來無覔處緑景亭竹間有幽亭所宜惟暑飲層隂隔炎日四坐障綠錦過午不可留單絺覺㣲凛激湍亭髙輪轉深淵下瀉石蟾口臨之設軒檻清絶更無有愛此山中來應須坐良久凝雲榭朝雲南山吐暮雲北山翕來往髙榭中留者頗堆積坐客如久之去須襟袖濕照筠壇積土削為壇險然在深竹中惟一詩石獨坐擁寒玉勿謂人少知此境不容俗桂石堂嘗聞陽朔山萬尺從地起孤峯立庭下此石無乃似愛爾常獨來一日須三四四照亭巒嶺附梁山汀洲隨漢水秋容上屏障左右二百里此景誰能論殘霞獨憑几垂蘿逕長蘿託髙株晻曖蔽煙霧垂蔓已百尺更引欲何處願少放餘條恐傷君所附盤雲塢㡬曲上層城盤盤次文石愛之有佳趣不倦紆晚策禽蟲應見疑日遇此狂客北軒天上之貴神所居皆在北有軒正相望慢恐取隂劾余常過則趨不敢茲少息棊軒北城云最髙上復有喬木埀蘿宻如帳中乃營小屋時引方外人百憂銷一局山堂何以山名堂層石作崖巘余本嵓穴士毎往不欲返公吏呈俗書還來愧冠冕静庵知動以為幻旣知即非静名庵以静者無乃自起争為語庵中人勿以静為病丹淵集巻十四
