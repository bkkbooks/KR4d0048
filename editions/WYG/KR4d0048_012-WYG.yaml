body:
  text: 丹淵集巻十二宋文同撰詩五十首送知府吳龍圖國初已來治蜀者處置盡自乖崖公當時奏使便宜敇不與天下州府同行之已及八十載姦宄消伏誰之功因循至此漸抏敝有未曉者時相攻鞭笞小罪亦檢察不許畧出常科中下民知之頗不懼州縣往徃藏羣兇側身歛足未動者實以累朝恩澤隆公之初來蜀人喜慈愛舊熟民情通衆心歡然恥犯法捄藥浮薄歸醇醲盡將約束付僚吏興起學校還文翁二年美化極沾洽遠近循服如偃風上將歸公問誰代當使間作如笙鏞遂求元老得青社其人廊廟之宗工往年鎭撫有異績大斾再遣來於東公今與之合符去到必奉詔參䕫龍大資舊德固無慮剖判自出其心胸所憂厥後嗣之者忠定良法還如空養頑活狡作淵藪不免剪殄煩興戎同之憤懣久塡臆言賤不得通九重願公上殿起居罷第一用此聞宸聰送通判喻郎中前年為郡得陵時不謂其州陋如此蕭條官宇嵓嶺上零落民家坑谷裏西城初入已可厭竊謂豈堪余所止幸逢之彦倅郡事日月漸深殊可喜予之所禀至迂謬君亦恬然尤自委毎來聚議一朝罷各去掩門歸隱几雖然有時亦為會此事可知誰得已酒肴麄糲妓樂可况復譊譊滿公使惟於試茶并看畫以此過從不知㡬幕中有客乃佳士愛遣髙談聼亹亹如斯共處五百日索寞情懐未嘗起君今官滿忽先去撩動予愁安可抳英溪長亭一揮手自此吳蜀五千里謂言川江會北固中亦有船多上水願君因出到金山遇此莫忘批紙尾送通判喻郎中二首晴霞照西城漠漠巻宿霧高空繚危磴此乃君去路吳蜀向萬里上馬初一歩莫言道途遠况已嗟久寓今茲有行色便可到北固長亭聊把手㡬日更逢遇不敢醉君酒君意實急遽惟是送君心相隨亦東騖其二羣居五百日日日如初見一日忽逺别能不成愴戀人生三萬日光景若激箭何苦於其間喜愠費顔面茲緣勝心在胸内毎交戰旣欲多上人計校須自衒於事固無補在已亦非便仕路繁此徒可謂丈夫賤愛君性渾厚殊不與時變相共為此州敢說皆盡善何嘗分彼此惟務乃職辦所以將二年無有長短辨為人倘如此所至復何患官滿去還臺豈能忘眷眷陽闗調雖苦且盡西城宴問君到京國㡬月方下汴予亦想是時移守至梁甸佳音幸見及西南足郵傳山城秋日野望感事書懐詩五章呈吳龍圖原隰蕭條草木衰倚風渾類楚人悲便成孤憤終何事且寄遥懐對此時千里暝隂雲杳靄一川寒影鴈參差登臨自不宜覉旅更敢慿髙賸作詩其二已是秋隂更夕曛亂山髙下起寒雲危樓願見客何處遠笛不知人厭聞身外流年波𣺌渺眼前生事葉紛紛此愁萬斛誰量得直為重拈庾信文其三才力雖難敵楚騷賦詩常亦在秋多自然野思元無限不爾閑愁可奈何要路故人皆廢忘偏州佳客少經過明時且為貪榮禄豈學湘纍便九歌其四嵓谷雨餘生晚煙髙城危閣坐蕭然側身仕路本誰使回首家山空自憐遠信斷來從過鴈苦吟多後敵鳴蟬郡齋有客唯莊叟常與髙譚内外篇其五早是蓬山預校讎起居常赴殿東頭鵷鸞擁陛聨簮笏日月開天拜冕旒一出光隂銷逺郡兩形篇什詠清秋有人更在楊莊上文似相如肯見休東丘老人東丘老人眉有毫皮肉光潤牙齒牢自云新年九十九鬚髮白者無一毛問之吾術本無有嚥津納息徒嘈嘈莫將元氣佐喜怒自然所得春秋高吾嘗行之五十載此事至易曾不勞飲之以酒謝使去手足輕利如猿猱嘗聞唐人柳公度八十許歲精力豪其言與人亦如此老人無乃斯人曹送堅甫同年五首堅甫神太清不謂久流落别來二十載論議轉深博其中富所有種道以文穫鋪張講治亂破若勁弩彍衆人誚青衫可笑俗眼薄蘭筋隱瘦骨垂耳受覊絡拳攣喙拄地過者無伯樂去蜀持底歸雄藁滿壞橐朝辭玉壘闗暮上石櫃閣知子者云誰獨我懐抱惡其二得數常竒懶下籌肯來荒徼治纍囚三年笑别浙江遠萬里吟歸岷嶺秋趙壹囊空常骯髒虞卿書就愈窮愁跖香回臭都休問未有林泉且宦游其三春深行劍棧羡子此時歸照日江浮馬迎風花聚衣下程家累省對景俗題稀若遇西來客書言不可違其四春風吹雪滿西窓此夜無人對酒釭若到杭州見蘇子為言常夢過松江其五華亭有珍禽毛豐而骨細他日上隋渠為我致清唳送李道士歸先生狀貌古瘦健若老鶴秋風唳清霄寒響滿寥廓一腹氷雪詞勿為俗人作便可住鵝池乾死守嵓壑師厚還朝聞公之名三十年常恨與公不相值豈期今乃出門下毎一見公心自醉詞章豪蕩已難敵辨論注射尤可畏諮詢故事要蔣乂講正大體須賈誼荆山拾玉抵乾鵲虞坂裝鹽壓良驥用人最忌非所宜願莫使公嗟俗吏牽牛織女桂陽有仙人姓成名武丁胡為墮人世人惟識其形一日語其弟吾將返青㝠乃曰此七夕上天呼羣靈織女欲渡河暫詣牽牛星諸仙盡還宫天路羅雲軿吾亦向祈召當往不得停弟問何時還答云三千齡明日失丁在恍惚迷所經後世凡此節兒女喧家庭縱横具鍼縷花果排甘馨貪巧但云得欲寐曾莫寧俗尚毎恠妄吾言誰見聽金鳯花花有金鳯為小叢秋色已深方盛發英英秀質實具體文采爛然無少缺纎空翩翩翠影動紅白紛亂如㸃纈誰云脆弱易飄墮自卵至翼亦數月美人形相欲摹畫巧不得施暫自拙鋪茸剪綵轉難似只把長條恣穿結眼前草木盡零落憐爾開於此時節常開恰如小兒花性命所繫不忍折君不見昨夜雨今朝風一隊驚飛返丹穴亭前髙栢石田磽磽地力燥誰種雙栢已髙大長材夭矯堪巨棟老頂縈紆若層蓋雪下孔翠寒不起風中笙篁清可愛莬絲幸好求女蘿莫倚纎柔欲無賴凌霄附栢古栢蒼蒼髙入雲凌霄萬朶擁其身有如巨君染鬚髪新娶杜陵佳麗人謝黄森惠詩并草書黄蘭溪南䣢黄夫子生平氣凛然吟詩舊有癖冩字近方顛可惜空山老須為後世傳蘭溪修褉否願續永和年東齋悶書讀書已無效何用轉勞苦閒齋幸無事日共古人語古人議論好善惡皆有補舎此欲奚為惟應睡滿午寒食感事呈同官三月八日值寒食隂霾蔽空不肯收北園花木殊未動到處哭雨惟鳴鳩吾曹可憐愛薄宦甘此寂寞來山州酒肴有無更莫問逢遇相與清談休惜杏北園山杏皆高株新枝放花如㸃酥早來其間有啼鳥兒女盡識名提壺急教取酒對之飲滿頭亂揷紅糢糊可憐後日再來此定見隨風如錦鋪讀蔣都官畫像記蔣為永康軍判官甲午之亂死於賊聞昔妖氛滿巴蜀所臨州縣偃如風其城陷者盡從賊以義死之惟有公節與岷山高莫敵名隨皁水注無窮蘭臺秉筆今誰氏舍此何由壯史功題黎公照序訓堂常愛三峨臨古郡君之别業在其城近營大第當高處更起新堂立美名滿外江山皆秀絶入中文史自縱横如何置得烏尤住相與談經過此生朝陽亭峩峩乎守居已與前峯對朝陽乃危榭更在守居外煙雲一川滿林麓三山㑹近檻有胡牀無忘傲公退觀風閣危閣覆髙林晚歩聊徙倚東南兩峰斷空闊見萬里茫茫落霞外苒苒孤煙裏忽暗識歸雲乍明知積水風從半天下月向平地起夜久殊未還峩冠露盈几山池偪側蒼苔地􅏠邪白石池數枝紅菡萏㡬尺碧漣漪魚鱉争香餌兒童簇釣絲愛來芳䕃下毎日日西時憶西湖舊遊西湖晴碧晚溶溶與客常來坐好風記得有人歌小玉月明猶在畫船中再送師厚久使西南此召還鹿頭東去漸雲山莫嫌策馬經燒棧正好題詩到散闗財利文書猶絡繹邊防田地已朱殷竒謀不吐將何用况是歸臨咫尺顔平雲閣觀雨黑雲漆天雷破地風巻雷射雨傾㵼噴崖倒壑恣頽蕩咫尺不可辨牛馬鷄豚已見逐髙浪禾稻應須没平野莫言魚鼈走堂厨且看泥沙漫屋瓦不雨陵陽官居遇久旱發喘渾如起新病已驚赤日晨可畏更恨炎風午尤盛徒嗟禾黍盡焦落無奈蠅䖟轉豪横安得神龍駕九霄大霔滿傾如倒井久雨寒鳩劬劬屋上鳴欲使此雨何時晴山中有客抱幽鬱日日起望東方明今朝晚霞發光焰喜極再拜當西楹須臾雲隂又蒙没遣我涕淚流沾纓山園久雨無所適新晴歩山園西風滿髙林敗葉驚已翻時節急如此世事安可論夜歸燈下吟寒蟲伴幽喧石泉巖巖聳石壁拆穴中流泉斷崖散激激曲竇藏涓涓蓄潤活古蘚烝虛發晴煙時懐一勺惠使我心泠然史少訥見許江豚未得以詩戱霜重水落岸有氷江豚乘寒弄晴日揺波拍浪乍羣起尾厚喙長鬐鬛赤魚人清曉横巨舟一舉大網凡數頭想君盤筯已厭足何不畧遣來陵州北園梨花寒食北園春已深梨花滿枝雪圍遍清香毎向風外得秀艷應難月中見苦嫌桃李共妖冶多謝松篁相葱蒨黄鸝紫燕莫過從時有一聲拖白練華山二首嵓頭漠漠衛卿雲谷口紛紛張楷霧安得鉤梯上石龜欲看明星洗頭處其二石蓮峩峩横紫霄中㵼萬丈銀河水安得大箭長八尺欲與天神博於此黄崖洞黄崖大洞埋古雲入去所履平如席其中玉髓盡可飡只恐歸來變為石師魯推官惠甘蔗戱謝滿節甘滋滲齒寒醍醐誰與釀琅玕不知佳境何時入試似前人取倒飡寄呈溫江安寺丞髙崖古驛荒凉甚過客何嘗住久之獨有門邊君寫處毎來無不讀多時嘲任昉幸自文章亦可憐不消一事已為賢何如却逐䖝兒去忍恥更來王亮前袁術四代司空倚世勞可嗟不肖事姦豪妄云名字與䜟合直欲起應當塗高偶成僻陋為州恥不才偃然空見兩星回祗應歸舉謡言日三府諸君口盡枚即事公禮欲下格具觀人所存須知范孟博豈肯伏陳蕃薄命女夭夭東鄰姝艷色如春柔去嫁不得偶羅衣空自羞輕埃掩菱花不分鈆華休囘首視庸奴寂寞還巻收子平寄惠希夷陳先生服唐福山藥方因戱作雜言謝之蜀江之東山色盡如赭有道人云此是丹砂伏其下煙雲光潤若洗濯澗谷玲瓏如刻畫我聞神仙草藥不在凡土生是中當有靈苖異卉之根莖果然人言所出山芋爲第一西南諸郡有者皆虛名就中唐福衆稱賞肥實甘香天所養有時嵓頭倒埀三尺壯士臂忽然洞口直舉一合仙人掌土人入冬農事閒千篝萬鍤來此山可憐所鬻不甚貴著價即售曾不慳徃年子瞻為余說言君所部之内此物尤竒絶後復寄書勸我當餌之滿紙親題華嶽先生訣予因購之不惜錢依方服餌將二年其功神聖久乃覺筋牢體溢支節堅自問丹霄㡬時上早生兩翅教髙颺塵世如帤不可居待看鴻濛對雲將丹淵集巻十二
