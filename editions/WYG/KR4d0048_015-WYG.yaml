  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_WYG_015-1a, image: WYG1096/WYG1096-0641c.png}
body:
  text: 丹淵集巻十五宋文同撰詩六十三首將赴洋州書東谷舊隱晚客無一來獨歩入東谷園林已成就此景頗不俗落落巖畔松脩脩澗邊竹爽氣逼襟袖清如新出浴寒泉激亂石磊磊潄瓊玉荒溪漬餘潤滿地苔蘚綠珍禽靜相倚毛羽華且縟髙下相和鳴不去若馴伏幽花雜紅紫點滴亂盈目坐久㣲風來時聞散餘馥往年讀書處宛爾舊茅屋雖然小破壊修整可數木開門拂軒窓無限起蝙蝠縱横列蟲網不免自掃撲壁間細書字多是親寫錄當時苦謀身如此用意毒於今三十年才抵羊髀熟一從入仕路行歩毎踖踧所畏惟簡書其甘者藜菽中間何大幸致身在天祿無狀陪俊游俛首常自恧連章乞外補得郡悉鄉曲雖名二千石敢自辭碌碌朝廷設新法布作天下福或慮多詬玩訓戒稍嚴肅刺史當是時能不為驅督行之以中道勉副議者欲刻薄素所憎忍復用刑獄進身豈不願實懼有隂戮昨從漢中歸於此度炎燠親朋日相㑹分義愈敦篤便欲從之游投簮解朝服退自數年計伏臘殊未足還當武康去就養若雞鶩貧雖士之常於我何廹蹙簞瓢若自具尚可繼前躅奈何食口衆不比回也獨東方千餘騎導從催我速行復登長途貌展心甚縮淵明豈俗士幸此有松菊崔覲詩大中時人崔覲者髙士梁州城固人讀書不求官但與耕稼親夫婦旣已老左右無子孫一日召奴婢盡以田宅均俾之各為業不用來相聞遂去隱南山雜跡麋鹿羣約曰或過汝所給為我陳有時攜其妻來至諸人門乃與具酒食嘯詠相歡欣山南鄭餘慶辟之為叅軍見趣使就職漫不知吏文已復許謝事但謂長者云補闕王直方本覲之比鄰文宗時上書召見蒙咨詢薦覲有髙行用可追至淳詔授起居郎襃斜走蒲輪辭疾不肯至髙風槩秋旻我昨過其縣徘徊想芳塵訪問諸故老寂無祠與墳斯人久不競薄夫何由敦此縣漢唐時諸公揚清芬刻詩子堅廟來者期不冺寄題閬州開元寺澤師竹軒澤師種竹三十年竹成滿院生緑煙蒼龍子孫太繁盛分領眷屬來渭川藏風蓄雨䕃殿壁不敢輙近寒森然香飛常入佛座上葉落不到經窻前芟除掃掠淨如洗欄外不許行狂鞭澤師瘦健如老鶴壊衲㡬尺披左肩手持數珠讀梵筴狀貌兀若塐與鐫朝旋暮繞在其下不肯出院求齋錢古人亦有愛竹者豈得似師心意專我亦平生苦如此兼解畧把筆墨傳逢師正謂同所好但恨尚有區中縁何時相對月明下坐徹清影談幽禪寄題密州蘇學士快哉亭太史云此城之西北送客處也出城送客客未來主人到此先徘徊地臨濰水極清曠毎為送客雙眼開客來旣坐歌管作紅袖勸酒無停盃主人自醒客已醉門外落日驪駒催揖客上馬退岸幘未忍便擁千騎回滿襟髙興屬軒檻野闊風長眞快哉獨遊孤亭入隂森竹逕北松塢髙林動清吹猶滴前夕雨解衣此危坐左右一不許性本不奈雜况復茲寡侣孤懐託寥曠世慮絶參伍幽花為誰笑獨鳥只自語身閒得天全一息了萬古忽往而忽來其誰知踽踽夏日湖亭試筆亭臺清涼水竹淨愛此來避蚊與蠅蓮花窺人類楚女野鳥彈舌如胡僧旋來開巻坐松䕃却把釣竿㳂石稜二年何幸爾足樂慙報上恩無所能楊山人草堂九隴山人文父後心閒身健兩誰如玉函經外傳竒訣畫㦸門前創隱居入鼎靈丹黄似橘隔墻凡境臭如帤何時再到髙柟下倚徧清隂聽道書詠鳬雙雙紋羽弄清漪全得天眞似爾稀萬頃滄波供口腹一梁寒日曬毛衣雨歸别島嘔唲語風度前灘翕呷飛好向中流最深處等閒休要上漁磯弄珠亭春望岸柳舞毿毿春醲物象酣煙雲分極浦舟楫聚回潭上水魚千萬眠沙鴈兩三遙懐無可奈長是寄城南新晴望北山西風吹北山晚日曬新雨嵐光發巖岫草木紛可數翠壁倚萬丈白雲横一縷待訪飡霞人斯游欲誰與城南江館漢江之北涯軒宇頗高爽西南正空闊時此託遐想誰家有竹石更可悦新賞待學袁愍孫乘興欲直往屬疾梧軒髙梧覆新葉滿院發華滋白日一何永清隂閒自移暖蟲垂到地晴鳥語多時病肘倚枯几泊然忘所思北園避熱繚繞度回塘紆餘轉短墻引笻聊散誕入竹得清涼正午禽虫淨初晴果木香移床就髙處更欲解衣裳施公潭盤巖復轉溪磴道入雲㣲斷巘雙屏立垂泉一劍飛浮空交彩翠濺遠亂珠璣啼穴飢鼯出翹灘宿鷺歸寒光清徹骨晚氣潤沾衣東谷牛羊下搖鞭去夕暉罷郡自問爾何事端然信方策本是鉏犁人强為簮組客何甞補萬分徒自勞七尺還如裴昭明罷郡歸無宅送文鑄師游襄陽鹿門師今鹿門去正此冒炎曦野店乞晨饌亂山吟古詩問程行㡬日覽景立多時我有懐賢意憑㸔墮淚碑夏日南園隂隂喬木下翠影若雲浮滿地紫桑椹數枝黄栗留迎風湖上去避日竹間遊定作今宵雨繞墻啼曉鳩北樓晚晴望秦嶺秦嶺巉巉列萬峯晚嵐渾欲滴晴空如何學得崔重易吟嘯終南明月中柳枝墻宇周回院落深日光風色淨隂隂柔條一似孫荆玉帖地反腰銜寳簮送王存之野水冰生薄似綿短亭梅發大於錢想君歸到江陽日欲話今時已去年放言裨海之外旣爾知自問何苦安喧卑胡不往見蒙轂士看巻龜殻食蛤蜊寄褒城宰灧灧清波瀉石門茂林髙巘夾煙昏何當畫舫載明月共醉江心白玉盆物五斗詩潤滑可愛故云江中有大白石穴殻然如盆可撼贈竹篔簹谷我昔初來見爾時禿稍攣葉病䙰褷遮根䕶筍今成立好在清風十萬枝竹答我實仙陂百世孫二年生長感君恩近聞官滿將歸去更望臨時莫洗園守居園池雜題三十首湖橋飛橋架横湖偃若長虹臥自問一日中往來凡㡬過横湖長湖直東西漾漾承守寢一望見荷花天機織雲錦書軒清泉繞庭除緑篠映軒檻坐此何可為惟宜弄鈆槧冰池日暮池已冰翩翩下鳬鶩不怕池中寒便於冰上宿竹塢文石間蒼苔相引入深塢莫撼青琅玕有時露如雨菡萏軒朝陽媚秋漪菡萏隔深竹誰開翠錦障無限點銀燭荼䕷洞柔條綴繁英擁架若深洞是處欲清香憑風為持送篔簹谷千輿翠羽蓋萬騎綠沈槍定有葛陂種不知何處藏金橙逕金橙實佳果不為土人重上苑聞未多誰能為移種荻浦枯荻饒霜風暮寒聲索索毎見有微禽投之宿如客蓼嶼孤嶼紅蓼深清波照寒影時冇雙鷺鷥飛來作佳景望雲樓巴山樓之東秦嶺樓之北樓上捲簾時滿樓雲一色待月臺城端築層臺木杪轉深路常此候明月上到天心去二樂榭㬊山孰云靜漢水亦非動二見因妄生仁智何常用天漢臺北岸亭館衆􅆟先登此臺臺髙望羣峰萬里雲崔嵬吏隱亭竹籬如雞栖茅屋類蝸殻靜几黙如禪往來人不覺霜筠亭危亭入幽深正在修篁裏坐久寒逼人暫來須索起灙泉亭逕源分灙水衮衮出亭下横湖能許深日夜見傾瀉無言亭誰此設孏床頗稱我衰惰公事凡少休須來黙然坐露香亭宿露濛曉花婀娜清香發隨風入懷袖累日不消歇涵虚亭石磴抱城回入竹見虚檻前望佳景多倚笻聊此暫溪光亭横湖決餘波㶁㶁瀉寒溜日影上高林清光動牕牖過溪亭小彴過清溪有亭纔四柱地僻少人行翩翩下鷗鷺禊亭懸流效曲水上已娛嘉賔飲罷已陳迹􅄼復山隂人南園農桑乘曉日凌亂如碧油紫椹熟未熟但聞黄栗留北園春風有多少盡入使君家當與郡人樂滿園桃李花寒蘆港落月照冰湖曉氣何太爽兩岸雪煙昏鳬鷗出深港野人廬蕭條野人廬籬巷雜蓬葦每一過衡門歸心為之起披錦亭繁紅層若雲密緑疊如浪青帝下尋春滿園開歩障此君庵叢筠裹圜櫩淨影碧如水誰識愛君心過橋先到此湖上衆禽盡以俗呼為題六首淘河羣魚見新晴萬鬛戲清泚忽爾下淘河驚回入水底連㸃七翩翩彼珍禽金羽耀寒日飛落灘上冰對人連㸃七拖白練盤石坐深林不欲人求見隔岸誰品絃數聲拖白練泥滑滑春日正晴明滿園花盛發勸爾竹木雞莫啼泥滑滑提葫蘆花開已堪摘酒熟正好沽山禽㑹人意勸我提葫蘆詠蓮全紅開似鏡半緑巻如盃誰為回風力清香滿面來題友人書齋新壁彩槴縱横設雕厨次第開須防何法盛直入此中來張淨琬驃騎極豪侈後房多艷姬可憐張淨琬不識半酣時待雪向晚欲雪天氣隂木葉亂飛雜歸禽城頭徙倚待飄灑東北萬里皆雲林丹淵集巻十五
