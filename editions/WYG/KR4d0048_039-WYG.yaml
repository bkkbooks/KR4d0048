body:
  text: 丹淵集卷三十九宋文同撰墓誌龍圗母公墓誌銘公諱某字某其先河東人鳯翔天興令贈太子中舍諱某之曽孫汾州介休令贈比部員外郎諱某之孫國子博士贈刑部侍郎諱某之子也母裴氏累封長夀縣太君比部既倦官未六十脫簮笏以去愛鄠杜美田望紫閣並圭峯築室灌園與其人上下擊鮮釀醇相招延為林野之歡逺近附從之遂為其土人侍郎雖宦遊四十年而資尚恬泊不競回視其先人之髙亦自引避居故廬讀書吟詩教其子為學公之昆弟時甚少已皆有才名傾動闗陜識者悉曰母氏慶門也不在彼此矣公生而聰悟不煩師訓閱經史造詞章能盡至其精工應天聖八年進士中其等調原州軍事推官州倚邉凡所處輕重索謀慮適當乃無事不爾或紛亂至有可以為憂者殊與内郡政令不相若其將既用武人少曉此得公佽助裁講至去民夷帖帖無他議轉運使李紘剛嚴介急遇其下未嘗相從容獨以公為才能渭州酒稅常課屢缺紘怒主吏不職議逐去且薦公領之公至以巳所入補前之不足主吏因免戾善罷公尚以其最得大理寺丞乃知京兆府櫟陽縣縣民横猾好犯法號難治第一而公以易術治之民自信約不得妄入公之廷下遷殿中丞移知卭州蒲江縣滿歲知黎州黎為西南絶境越嚴道濵大渡連山如墻中斷一道州正扼其口乘高見卭部川聚落如餖掌上實朝廷所挂慮而擇人以為守長之處詔書常以本道按察使視其部吏有長才善撫馭者薦充之故公得以行焉百蠻都王城歲駈馬過河抵公城中與中國相貿易摩撫有術則靡耳柔服如人一不厭其欲則嘷呼搏捽羣輩跳盪閭閧不能止此其常也公既示以恩信其驁桀不馴者擒戮之衆憚且愛二年無敢輒以彊語附譯者以及公轉太常博士以侍郎憂去職服除還本官通判乾州林瑀守成州放手受賕不顧傍他鎖姦鍵惡密不可發包拯為轉運使以威察自名顧無如瑀何然疾之甚願必以誅死請公攝其州得狀即寘之獄公往見瑀以數語伏其罪不務奇中而與法正相等瑀無憾衆咸允之遷屯田員外郎通判鳯州改都官員外郎移坊州州自唐涉五代節度使麤武暴横訾用不法下禍部邑征稅闗渡多設虚筭歛以殘虐因仍至今役鄉户使典領其人得此即破産以至一縷盡輸之官而未償者公曰桀法也吾豈忍若前人坐視之耶上章極言請别立新課以下捄危亟朝廷從之坊人所以獲疽癤斷潰而肌肉完好者公惠也未幾召入為侍御史嘗賜對便坐公言帝王治國之本職在專求公相以自羽翼杜衍范仲淹不幸早去陛下左右自後所得如衍仲淹者幾何人雖有可用者皆被散使在外竊恐陛下風教自此無如先時仁宗大悟連復其所可用者朝論翕然嘉之二年除三司鹽鐵判官尋為言事御史明年拜起居舍人知諫院淮南京西轉運使以賦外他錢貢上曰羨餘請不𨽻大農給中上將議賞上曰是兩道比他財用尤為不支苟非誅取惨横安所出此如恩之是借吏手以推剥吾民之膚髓耳不可遂罷近歲士大夫多營占民田以自膏潤幸民向役出下估盡所有納之相尚無制而其諸所以徭扵官者負愈重去瘠取沃鐫蠧益暴公請限其頃畝各以官品裁約之議行上下以便國朝任子之令比前世最為優典凡得以官歲上其名者數百矣入流既繁仕路紛雜公深疏其敝章下近臣㑹議類皆顧已謂久令遽更之不宜公持之益堅道利害上前卒得請無慮歲減三百員其源少清孤平者獲叙進公之建説有大體可行之為良法皆類此長夀從其少子官南岐且疾公亟請省視獲告日夜馳往至即以居䘮聞終制用前官充兩浙路轉運使未行改兵部員外郎直史館知邠州數月授直龍圗閣知梓州歲餘乞内郡得涇州轉工部郎中移充成都府路轉運使拜刑部郎中蜀土濃演諸産極富夥官之府庫日入歲受泉幣流溢公嘗謂戌兵曰爾得賜帛與易之以錢也何利衆云帛亦貨諸市利莫如以錢便諸用外所售往往與官賈不相直得錢且幸公曰吾募願者兩可矣用是凡得十數萬疋今上即位大布恩賞事出不素他道悉配入民下旦暮高直踴數倍百姓讙擾急欲求死而公部中以所嘗居者當之閭里静黙無苛求猛督之旤事帖然濟矣永昭調用多目有司欲天下之財應所費疾若星火公以法移蜀之積錢百萬衮衮相屬陸走三千里旦暮副其急大計以辦已而公且遘疾矣嘉祐八年十二月二十八日卒于官舍享年六十公性端重寛碩質狀嚴偉望之岌然使人肅恭戒飭不敢慢惰而與之語議雍容委靡色和而氣温久不能舍而去之也其為郡邑專務究極隐敝與人興起長利故所去未嘗無餘思居臺奏正皆中外所望以為言者用諫紙不肯書竒譎么瑣事以凟上聽總大端發正論冀君相黙用之不設痕聲以夸露於已也既而一落外官頻年不歸視當年朋流已翩翩上薄霄漢人悉以用公為不當然而公亦自無一語為戚戚先帝升遐日夕涕泣遂以病病遂以死而公嘗所蒞之郡邑與常所往來之人無不哀慟號嘂云善人何負天天奪之也何遽而不少假矣公既死朝廷遣其弟沆乗驛迎其柩歸權厝於鄠縣以治平一年某月某日葬公于某所祔先侍郎之塋夫人王氏累封永安縣君男二人軻太廟齋郎十二歲輒試秘書省校書郎若干歲女一人若干歲沆以都官郎中為陜西轉運判官好學有義行奉公之夫人與公之諸孤居長安事如母教如已子愈于公之存以某嘗獲逰扵其伯仲之間來請銘銘曰鎮東儉以忠殉魏後惡禍去丘為氏積流藏晶入幽閟宜發其裔洪以熾惟公生實世所冀厥中端完外恢粹學焉久充道少試君䝉其休民被利眇然權財用曷既卒以不幸讙衆欷馳詞窮天浩無寄其將興之比賢嗣太子中舍王君墓誌銘治平二年三月二十日有以笈攜書而進立于庭下者問之曰長安王氏之僕來時主戒云汝亟往廣漢問所題官居納之自去彼凡十二日走四十驛而至此矣余曰事必有不可緩者命受其書視其所以逺來見諭之意曰希明不幸先人以去年三月十四日得疾棄諸孤于家今年某月某日欲舉其柩從祖母以塟於萬年縣龍首鄉鳯栖原之先塋竊念先人祿位不甚顯使志業不克燀燿於當時今已矣若非有以善文載其事寘諸壙中以信于人以傳於後世為人之子者之所為心乎如聞執事常以文章論譔人父祖之生平其子若孫得以實自以為事父祖之道無忝矣希明雖未嘗一見左右敢遣僕持先人行狀以聞求數語以銘其墓使先人之靈不鬱鬰於地下希明死幸矣唯執事哀憐之其詞始末悽楚讀之殆不忍聞其所以云云者余曰噫斯人也耶嘗憶皇祐初余在卭州幕時有以強幹為轉運使所委往來卭蜀間辦公事者此君耳余葢嘗識之今其死而其子幼不知余與其父有一日之素能踰重闗越險棧於二千里外以是事見屬或拒之于情可乎乃為綴次以慰其子云君諱紳字公儀其上世太原人唐末因官居閬中後復以官居長安三代矣君生十年以父䕃為太廟齋郎自少喜讀書記問精博為詞章有條理舉進士不第遂調鳯州梁泉縣主簿初仕已籍然以亷勤聞滿授漢州徳陽縣主簿令老且惽都不省職事羣吏驕恣飜亂文法以欺枉吾民民不堪矣而君且至數日視案牒閱租賦攷徭役盡暴蔽隐悉伏其罪而一縣乃治轉運使張公掞明毅端肅少所推擇獨稱君才而數任之綿州百姓馮仁美兄弟訟田十年不能决公以此獄累君未浹日其情得争語遂息雖其本郡邑之吏嘗厯手者悉曰是善治此吾不及也公乂俾其市五州絶户遺田不數月獲錢四百萬納諸庫而民恬然無驅督之擾代歸授其州長豐令未㡬以市田令轉大理評事知絳州正平縣㑹縣人行守事者有産占君籍中其鄰民張順探守意詣州言狀謂可鑿渠以引其水溉吾村地若干頃甚便守從之下縣如其議君亟至守所建利害百一于前謂不可行守怒趣君去决令開渠君抱笏徐起顧守曰渠則不可開令頭可斷也既而守亦悟遂使罷君歸一鄉之民擁馬首謝曰我輩非公壓抑且死矣願為公刻石以示吾子孫俾知公為其父母衣食之也累遷衛尉寺丞大理寺丞知鳯翔岐山縣君之父度支嘗治此彼人德之遺矩餘範君一守無易故居四年而民不敢以不可治之事干君去之日老幼婦女皆奔走涕泣謂君何時復當此來也今上即位轉太子中舍賜緋衣銀魚入朝授通判乾州事還長安遽得疾不起享年四十一君性孝友事母兄有聞於里閭含光門有大第乃唐官寺之遺址老株巨石氣勢甚古偃蹇􅍶崒羅立如畫亭觀􅄗榭號一城之甲名公巨卿才人豪士往來過雍未嘗不下馬入門登覧嘆愛君少時與兄中隐君出入迎候游陪不厭人咸喜之君素博洽好辨論尤不憙狂詭而絶重氣節在岐山時有妄人鄒僅稱先生者自言八百餘歲厯㳺公卿之門好談人前世事立禍福以揺撼人人信畏之謂神人云不知凡幾年負此術行扵世矣過縣謁君君與語察其怪謬訶下麾左右縳寘獄問狀悉伏誣誕門外要官重臣交書下捄君置之一不省械送府恐懼以死訖無他異君故人國子博士劉祺自蜀解官歸至縣寓僧舍且病其子赴舉京師顧前後皆孱輭無一人可任事君親為煮藥視食旦暮伺候且累日無少懈既卒凡䘮事一切具辦無有不如其至親欲奉其死者之意聞者嘉之君大抵所為類此亦足可紀也曾祖彬贈光祿寺丞祖識贈刑部侍郎父瀆任尚書度支員外郎三司度支判官母高氏封長安縣君贈尚書令瓊之女見君死遂寢疾後一年亦卒君娶舅氏引進使繼隆之女生五子曰希明希傑希正希亮希益女三人銘曰於乎公儀命誰君尸與其才良而不夀宜人之于官其幾謂能如君之為死有可稱身大位㣲奚足比方陵磨谷闐銘發愈光龍州助教郭君墓誌銘君諱友直字伯龍其為人也和裕淳懿畛岸曠闊兩蜀士大夫與四方從宦扵西南者於伯龍無有不識非伯龍之求之也而其人自以為苟不識伯龍則為徒至於此矣盖伯龍善與人交又喜藏書書至萬餘卷謄寫校對盡為佳本伯龍無不讀人問之者伯龍無不知所以人多與之逰伯龍亦未嘗輒厭見其人所以善譽聞於天下將五十年景祐中被薦試尚書省不第遂歸不復就舉成都學舍為諸郡之冠聚生員常數百十人伯龍典事其中凡三十年教導揖納上下信愛事繼母朱氏至孝朱嘗病痺輭不立伯龍訪諸術士力求已之遇隐者得火龍水虎之法轉授其母行之遂起體輕如風享年八十四而卒於兄弟尤友順不相狠䦧公𨽻貲産獨占其至下者後雖有所不足亦自無一語之愠有識義之治平詔求遺書伯龍所上凡千餘卷盡秘府之未有者熙寜四年四月朝廷以伯龍景祐進士恩授將仕郎守龍州助教一日忽召其子大年等曰吾生平以儒術承家已而自知扵祿位固不可以強干所以不求宦達退居田里今天子念吾之老特賜一命吾其遂止此乎是年十月果以疾卒于家初一日也伯龍既為累世令族之後内外親戚交友甚盛凡逺近慶弔伯龍未始後他人而至者才智敏給善酒戲辭吐如射坐客不能當至有叢吻急擊争欲勝之者伯龍左右酬對愈辯而愈精四坐笑伏歎其俊銳死之日無不嗟悼之春秋六十四所著書有劒南廣記四十卷毛詩統論二十卷厯代㳂革樂書十三卷曽祖某祖某考某皆不仕母楊氏夫人宇文氏乃蜀之大姓某之女年二十一歸于伯龍閨閫儀範鄰里矜式相夫以義教子以學正順慈嚴無有未至先伯龍卒生四子大年大方大亨大受皆舉進士有名稱女二人長適太常博士李彤封夀安縣君次適進士文惟幾孫男八人女八人大年以六年二月十日塟伯龍於華陽縣昇仙鄉俱利里先人之次舉夫人之塟祔焉大年等以同為姻家來求銘伯龍之墓為之銘曰學無不深行無不淑天胡嗇之弗畀以祿鸞羽鳯翼歛不得張有翾者微高鶱逺翔神道難知人理亦悖吾於伯龍一付茫昧所不已者郁然清芬更千萬年有信此文秘書丞馮君墓誌銘君諱某字某其先始平人在僖宗朝有官於蜀者廣明之亂唐統紊裂視世濁溺留避於此子孫蕃衍有居于普者五世祖紹卿於五代時以宗族門地雄于一州高祖諱光偉佐東川節度曾祖諱嶠祖諱元晏並潜隐不仕父諱某少舉進士以苦學被病遂不顧舊業專治養生之術作詩百章道其事自號丹珠子年過八十無疾而終子三人君其長也君生而頴慧不憙他技未冠求師於成都是時任玠温如李畋渭卿皆以道義文章教授諸生君執業門下並為其高弟歸將試藝扵其郡廷以干薦書而豪士惡子競以財賂占壓寒素不得一步進扵其下乃退而嘆曰是等也我安能與之以力相較耶於是收歛退縮芟去仕意僻居静處討究羣策經深史隐鉤擿蔵詣馳詞吐論坐者常屈閭里訟訴槩先詣君所平决以至不復更由官治而兩講解矣教諸子事業悉有端次慶厯中其子今中都外郎如晦用其法一舉中進士君曰是吾門户之大望自此子爾嘉祐初以子官授大理評亊致仕三遷為秘書丞賜緋衣銀魚嘗即其居盛創亭宇榜之曰榮恩自作記道其所以獲當世為人之甚幸者鄉人景慕之治平二年春中都為晉原宰君以雙輿就其養晉原之治髙出一道君實有所誨助閒則吟詩飲酒日日不倦一旦召中都語之曰官居之樂誠樂矣然而吾之舊廬近常往來扵吾懐也汝當具吾歸装宜無吾留十月促就道中都遂假檄侍還其家既至亟遣去曰汝速往無以吾累汝汝當憂民慎母吾憂也自是日召鄉里故舊聚飲歡呼歗歌愈益精健諸子立左右忽顧之曰父母之年古人謂可以喜懼者汝等當知之吾受祿養幾二紀名復挂朝籍人能如吾者幾何此可喜也然吾春秋已髙汝能無所懼乎家人聞之錯愕皇惑問何以及此體中有覺不如平時者何所但俛首嘻笑不答又數日食飲漸不進求就枕瞑目良久以纊候其氣已不屬矣遂終焉十一月十二日也享年七十五夫人趙氏同郡之甲族婉懿有善譽宗黨模其閨法四封為夀光縣君生男六人三早夭次中都也次處晦用晦並舉進士有文行聞其朋流女五人適昌元解惟正都官員外郎景思問郡人周著進士景思永歸思問者先卒後繼之以其娣封永壽縣君孫男十人某某皆嚮習文藝孫女九人其一始嫁河南趙仲遘其孤將以三年二月某日塟君於樂至縣普安鄉之西山從先塋也中都與同有塲屋之舊走僕詣同求銘其墓為之銘銘曰孰不種善君穫其多奄然而歸所少謂何子官曰榮學者愈侈君所常望久焉益偉人生世中超跌百端如君初終十八九完老安先廬沒集舊兆更萬千年銘永其詔丹淵集卷三十九
