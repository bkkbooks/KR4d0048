body:
  text: 丹淵集巻十宋文同撰詩二十三首續青城山四詠昭慶觀琳崖盤玉霄彩翠接步武雲霞不可畫泉石固難譜神幢逾百尋帝轍厯萬古靈瀑誰與窮長飛六時雨天倉山威儀觀羣峯削瓊瑶老蘚抹古綠應朝大㟭去簪笏儼相逐珠宫秘仙仗錦笈藏寶籙上帝此為倉其田堪種玉飛赴寺平林露層巘上獨置孤寺羣仙馭飛駕往往赴於此風高幡影亂日落鐘聲起誰可謂詩豪興來吟萬紙香積寺道險轉詰曲山深愈㠝岏行松耳目清入竹襟袖寒殿閣紅芙蕖嵓巒碧琅玕高僧把金字擁衲對雲看夏秀才江居五題枕流亭愛此煙景佳開軒故臨水晴暉照寒浪飛影動牕紙倚檻見魚游巻簾知鴈起憔悴笑湘纍區區詠蘭芷闘碧亭雨餘山景鮮風定水光好晴陽破宿霧秀色濃可掃平時一樽酒野客共傾倒朝暮山水間年華不知老天隱洞層崖削青瑶誰昔此鐫鏤潭潭鬭孤洞中可百人受㠝岏列岫繞洶湧大江潄虞卿方著書入此幾年就直鈎磯盡知人鈎曲獨見君鈎直年年此磯上萬掣無一得持竿只自苦吞餌何嘗識試效人所為君魚不勝食醉經庵垂茅緝為庵有類穹廬形之人伏其中日醉乎羣經世俗安爾知但謂長不醒寄此語二豪渠非彼劉伶寄題杭州通判胡學士官居詩四首鳳咮堂太史書言官居在鳳凰山下此山真如鳳有兩翅翅上各建一塔而鳳觜正落所居池上舊有一堂在山欲落處近葺之謂之鳳咮堂因而求詩四詩為子瞻賦今易以胡侯豈黨禍未解故竄易失真歟胡侯外補來錢塘所居之山名鳳凰不知元本發何處虵頸魚尾盤高岡婆娑欲下大江飲萬里一息頭低昻誰將浮圖壓兩翅直使帖地不得翔前人眼俗不知顧㑹有賢者來形相憐汝困欲共汝語故近汝咮營斯堂起居飲食不離上外孰有耳聽琅琅應云汝德未衰在旦暮可起鳴朝陽濺玉齋又言山上草中多怪石近取得百餘枚於東齋累一山激水其間謂之濺玉齋石林古木森座隅激水注射成飛渠寒音琤然落環珮爽氣颯爾生庭除主人清標自可敵底處勝槩為能如想君不欲時暫去其餘滿案堆文書方庵又言堂後有屋正方謂之方庵同按釋名庵圜屋也衆人庵盡圓君庵獨云方君雖樂其中無乃太異常勸君刓其角使稱著月牀自然制度穩名號亦可詳東西南北不足辨左右前後誰能防願君見聽便如此䑕蝎四面人恐傷月嵓齋又言累石為山上有一峯穿竅如月謂之月嵓齋詩中子平即子瞻也月為太陰精石亦月之類月常寄孕於石中事理如此何足異天地始分判日月各一物既名物乃入形器安有形器不消没况此日與月曉夜東西走珠流璧轉無暫停豈與天地同長久其為勞苦世共知惟是月有生死時既然須常換新者人但不見神所為日須天上生月必地中産君不見虢州朱陽縣之山谷間纔成未就知何限石有不才者往往其卵靈媪棄置不復惜任人取去為珍玩佳者留之待天取藏滿庫樓千萬許彦瞻博物天下稱更無定不以予之說為寱語予恐世人不知嵩丘嵓洞中中有八萬二千修月户其人所食盡玉屑昔有王生見之滿襆提斤斧應是當年靈鷲山直自天竺飛落西湖前其上有石姙月月巳滿此人朅來就彼剜剔歸上天所以此石拆疈不復合至今神胞所附之處其痕圓抛擲道傍凢幾歲風刷雨淋塵土穢子平一見初動心輦致東齋自摩洗更選他山相擁列就中獨爾一峯最奇絶每至瑶魄流光下照時玉柱横欹無少缺子平謂我同所嗜萬里書之特相寄邀我為詩我豈能窓前累日臨空紙遥想嵓前寳穴通玉蟾從此去無蹤請君為我細書字於側名為月母峰寄貟文饒屯田英英文饒江漢士何者天教䘮眸子用心專一性轉明無所不知餘兩耳能為樂府勝張籍暗誦史書過杜顗棄官新自荆渚歸萬里逆風衝峽水峩峩全家載巨艑坐臥吟詩滿千紙自言從此生事足可了芋栗及麻枲數椽舊屋蔽風雨一榻蕭然容隱几丘明國語浩如雲子夏門人紛若蟻向人問口誇舌在道義文章吾豈巳自知俗事無所觀便落雙睛君亦喜奉送少訥還青神濕雲堆空洩滛雨日與三嵎氣相軋春陽沈伏不得動萬木屈蘖草藏茁叢岡複嶺誰敢度旦暮寒鷄呌泥滑少訥胡為犯此苦特念我困來省察延之累日對佳話如侍大饗聽椌楬彦瞻弟兄别巳乆使我心胸昏莫刮天將少訥愈我病次第為取蹊茅拔長編巨軸冩治亂筆墨揮灑何横猾詞章直如子長健辯論不比仲連黠我慙無琴類師曠鶴誤銜珠投二八酌泉煑蔬共家饌敢用俗禮費烹殺少訥忽爾道其去歸轅在途不可揠此懐作惡定數日憒憒已覺漸磨戞欲留少訥意無盡更為逡廵柅西轄送無演歸成都曾讀契嵩輔教編浮屠氏有不可忽後於京師識懐璉彼上人者尤奇倔余嘗從容問其友璉復為余道居訥是三大士才過人所蓄豈肯吾儒屈文章汪洋道義富不止區區事其佛余思此等更誰似蜀有人焉頗超越成都敏行字無演所謂萬星中一月想嵩璉訥見須避不爾往往被呵咄通禪曉律兩無碍前㑹定預耆闍崛羣經列史固汗漫獨泛其深仍出沒外之所精者書畫不問不語常若吃計其夏臘殊未幾在大衆中誠突兀余守陵陽至窮陋雨浸一春泥汩汩英磎磽磝磴道嶮行客欷歔上􅍶崒無演衝冒獨不顧來欵余門手持謁呼之使前見巳喜相貌圓滿藏神骨退之送澄觀詩有坐睨神骨空澘然之句清譚坐乆愈飄灑頓遣塵襟落如拂新詩古文覽嘉貺氣格俊健凌霜鶻觀其衮衮出論議收歛便可與簮笏試將邀之使從仕笑指此頂安更髮日招與語自無厭何乃告去苦倉卒西城曉日照高嶺倒搭乾陀入深樾師歸常宜見嘉祐此老心中已無物好音相與頻寄惠余在空山正伊鬱閻君見示岷山賦因為小詩謝之大岷西南鎮嵓壑天下秀厥初造此者以作神仙囿相如子雲沒李杜繼其後欲賦俱未敢於詞怯輕構閻君通方士才力誰可闘驅聫入健筆萬狀無一漏駸駸語趫勁駿馬雜馳驟太華楊已拙天台孫亦謬示余讀數過驚聳肩縮脰勉為成短章聊酬君意厚閻生談黄庭茫茫誦靈文誰為抉乆瞽不能辨三一豈復更知五方迷得真指忽悟有奇覩自此日相親赤龍交黒虎送范堯夫遝遝走閭巷都人起中宵相擁候府門惟恐失此朝盡言來送公車馬城北橋橋邊脂轄亭大尹此相邀歌管盛宴集簮裾合羣僚四座酒既行相顧魂已銷亭前有楊栁秋風減長條折以持贈公莫猒霜葉凋節物雖謂晩比春情更饒逓起勸公飲雙呼金翠翹豈徒要公醉恐公遽乘軺借問何爾為重公若瓊瑶美質未省變與人存久要既莫不可留征衫遂飄飄鳴騶過昇遷羣甿閙如蜩感公來二年免我於無聊今公舍我去何由借諸朝願君富且貴壽命等松喬直似先令公巍巍佐唐堯涕淚逐公行不憚公更遥公誠上下通和如奏笙簫所以得如此人情不相遼嗟同繆與公一時赴弓招于今二十年不見有所超前日荷君相與印垂之腰使歸守山郡藏伏甘寂寥聞公將治行乃心日夜摇恨不能送公俛首類酸痟徒為送公詩有如草蟲喓强勉冩之去憂來立危譙推官惠李庶子鄂州篆字天下有竒篆陽氷書鄂州異獸呀五口狂咬掉三頭磥砢玻瓈盌詰屈珊瑚鈎愧無希世寳何以為子酬和提刑度支王店雞詩王店有郵吏養雞殊可笑昻然處高襟不肯以時嘂官有宿此者西征待初曉雞竟不一鳴問吏吏巳告云此最荒絶左右悉蓬蓼狐狸占為宅恣横不可道前此三四雞一一遭其暴尋聲即知處盡獲爪牙吊自後始得此其若有人教東方或未明羣醜尚騰趠此雞但鉗結直伺太陽耀雖然謂失旦似得保身要官曰此何用不然則宜糶不見不鳴鴈先死蓋自召天下已明白豈假更喧閙徒爾費稻粱曾莫知所報吏云官言是且願勿嘲誚知是本在人此物何足校送李道士先生若孤雲兩在隆山見清標瘦彌聳秀骨老愈健高談吐深詣大句冩精錬忽起憶鵝池嵒飛石泉濺送韓山人昌黎山人抱藜杖三度訪我於三隅端然入座更誰顧談辯衮衮如流珠靈丹嘗凝日月鼎至寳自産乾坤爐要行撇起不可逐安得雙舄為飛鳬丹淵集巻十
