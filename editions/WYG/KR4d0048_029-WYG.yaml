body:
  text: 丹淵集巻二十九宋文同撰啟狀謝吳龍圖啓某啓近者伏蒙知府龍圖諌議為某發章薦於朝廷乞召還書殿以備諮訪者聞命彷徨撫躬戰慄伏念某材惟朽下性實枵疏禀之自然確不能變然而纔於為學之始便識立身之端唾詈諂䛕憎惡詭激惟嗜古人曰仁義者飾諸己不隨世俗謂富貴者移于心所以自從登科以至㳺宦二紀於此一節不回雖然官升朝省久軋而難遷職𨽻館閣一置而不問中閒累經患難固亦自安困窮私念旣無援助於當途常謂莫如退縮於散地向竊請郡聊圖庇身豈謂孤迹之有依獲在穠陰之所覆每自戒飭庶逃譏訶伏惟某官學洞聖賢之深器懷公相之重臺諌風采至今凛然藩鎭威名所治肅若其如好引後輩曲揚小才忘長醜於流離采下體於葑菲謂某自登門館已厯歲時知其亡他憐以甚惷今兹守土復在提封考其効官之方參以行已之事雖亡善狀可免嚴科遂抗薦章特形襃語蒙見挽之若是在論酬而謂何謹當愈勵清修益勤素行所貴異日獲在洪鈞之前不後他人亦預巧陶之末過此以往未知所裁謹奉啓謝不宣謹啓謝運判韓都官啓某啓近者伏承某官特為某發狀保薦聞於朝廷者反視諸已止如常人念無他才取重賢者聞命之始撫躬若驚竊念某本出孤寒素無才譽自常審已不敢求人獨於執事之門闌向在京師而出入所以南陽丞相嘗為發章北門主人乆與同事至蒙存錄尤恤單平豈期今守於偏州復幸託居於大庇蓋藏其短己荷殊恩升薦於朝甚出過望何於已而萬幸惟受眷於一門感發于中言出不妄止勤薄効上答深知謹奉啓謝不宣謹啓謝運使韓少卿啓某啓近者伏承運使少卿發狀論薦乞朝廷召某任使者顧此無狀聞之若驚將何營為可用報稱伏念某本無藝業偶竊科名復幸散材更塵文苑禀資鈍縵臨事迂疎用旣無堪援亦甚寡然而耻謀優佚願試繁難向請外官蒙除此郡政多廢墮事狃因循凢謂綱條諸無件目加以地產豐夥俗習僣豪彊戾相高孤弱無告某止能為明枉直聊正典章惟存至誠豈有他術伏過運使少卿選從中扆委付外臺旌別羣僚臨按一道猥收蒙鄙曲為薦揚取困轅閒奪焦竈下施之寶校飾以珍徽俾騰長途使備雅樂存憐若此感激無涯惟務操修庶酬知遇卑情無任佩荷深切之至謹奉啓稱謝不宣謹啓謝成都知府啓某啟解麾漢水之陽愧無善狀剖竹洋川之上重沐殊恩退惟謭薄之姿薦託醇醲之䕃已頒條敎謹佩箴規切念某性本椎愚學無根據誤中太常之異等獲陪秘府之英㳺然而蹤跡甚孤媒援絶寡常務以繩墨而勵已豈暇學脂韋而事人衆皆憐之盡謂其不肖獨無愧者自知其當然況其幸之已多於所請而常得矧兹刺史之職任實曰難才惟是上官之保存方能免過此者伏過某官以高才奥學而陞法從以奇謀妙略而居要權總鈐兩道之兵符提按諸城之吏瑣向嘗備吏已荷庇饒今復為州又煩提敎屬守符之所系伏賔戺以無由跂引崇嚴下情無任喜懼交集之極謹奉啓謝不宣謹啓謝中書啓某啓郡易其名罷當還館詔俞所表許復為州從人欲之便安何君恩之寛大重煩宰制竊負兢營某已於三月二十八日到任上訖伏念某門地至寒資材甚淺宦途蕞品儒館陳人學每強而不高命初禀而且薄從仕二紀罹憂百端居嘗自知分蓋如此鄉因乞守於鄉近曾未滿期而地遷旣屬減休之員實虞轉徙之患遂陳悃愊仰凟朝廷敢期下貸儌求再蒙寵寄此蓋伏遇某官以經術講大政以器識觀羣材輯和衆功製冶元化所以陶鈞之下無坏㙞之差丈墨之前盡輪轅之適用巧所及雖微必收故兹孱庸亦被掄委敢不飲食王事寤寐政經對諸吏民之言諭以君相之意凢云釐政止在矜寛庶知為國之仁少報代天之恵某無任感荷激切之至謹奉啓謝不宣謹啓謝文潞公啓某頓首上季夏極熱伏惟樞密太師侍中台候萬福同違離門館兹已逾年想望恩闕豈忘夢寐自顧寒賤之品不敢非時奏記貴平掌縣令到州伏蒙侍中存錄孤生特頒手誨丁寧告諭若語子姓奔騰浩蕩揮灑累幅開緘之初勢欲飛騰伏誦數過暖如布帛出詫僚友盡恨不為已物歸示妻孥皆云便是家寳台躔引照蔀室生輝昔人有受細林之言而退書諸紳獲山隂之字而別為一袠豈與不肖今日所得相比儗哉佩服嘉貺榮望已足珠璣滿斗實輕此惠永言藏弆以傳世衍同無任忭蹈激切之至謹奉啓謝不宣别紙某出入門下殆三十年賦命薄淺牽挽不上侍中每憐孤蹇顧遇不替凢列左右温慰如一同所恨窘廹急於救贍不得居官輦下日趨恩屏得郡於此至為牢落山谷之中殊無氣味飲食之物藥劑之品悉仰他處速不能得已過五十漸入衰病生平苦學自知無用閒方僻所且冒祿食實亦自愧矣侍中常賜存䘏敢此具道某上覆謝王尚書啓某啓某近至幕府少謝尚書為辦東行之恵以某之散冗以尚書之貴重其謁見接遇之禮止當一賜之坐一召之食則其體宜矣而尚書厚自損抑絶去崖岸延引勞問言貌温悅遊騎燕席皆許參侍有所過慢一用恕悉此尚書立德之隆取義之重為之而可也其如某之負抱静無所有使之將何以報尚書如是存眷者耶某此者幸得試職文館尚書將旦夕召用歌勲頌業燀燿尚書之休懿者某僅能為之是亦可以對今日所蒙之萬分爾漸逺軒屏某無任瞻系激切之至謹奉啓謝干浼威重伏增恐慄不宣謹啓謝提刑謝司封啓某啓某近者竊聞某官以某備吏於所部之下憐其亡狀之迹不能激昻奮迅自求所以比數於人亦已久矣故深欲車推而綆汲之使不至留礙沈溺乃持其姓名覬有聞於朝廷之上而且謂其亦可以施用於當時者某蒙德之厚將何所有以謝公如此之貺於門下者哉某不勝喜懼交集彷徨展轉之至伏念某出於孤賤資品殆不能及於中人學進士本無望遂至於顯榮止欲求升斗之粟尺寸之帛以免夫終嵗饑寒之患不幸天與之性使之簡介而専僻於人事殊不通曉常自顧其中枵然無他奇才以求知於人斂嘿羞畏固未嘗敢輙一開口問寵官要人丐少餘論執之以為進取之階從讀書應舉及第守官以至遷改資序召試貼職皆以在上者之人見愛謂某所行道途後日當必至其所至之地乃相與極力牽挽僅能致如此之今日雖然所獲能幾而已似夫不可當得十年之中罹禍難被困苦蓋濵於顚隕蹷踣之危者實屢矣昨蒙除恩粗得試守此郡正謂居明公提按之下殊不敢儕於𨽻人有斯須自便之懈循大端略冗目擊豪暴撫柔良如是焉而已矣且欲勉在賢人君子之側不使少有罷輭不職之過以取煩於芘賴或至於不可留以為民之師帥又懼取煩於啓上而斥去之豈謂某官以恢博之量通察之明訾相官屬内辨良苦必以某底裏椎縵甘守頑藐偃然自治以安不肖垂哀下閔將洒濯而熏袚之使焯然發光焰出文采從學士大夫之後無或少愧某被賜厚矣言之無由以殫其為感之心矣其如所以日念報稱於左右者惟當飭覊勒駷鑣轡施鞭策就康莊而以事夫駸駸不已者焉有阻趨瞻實增戀慕謹具啓謝謹啓謝張度支啓某啓近者伏承某官逺馳輶軒下厯敝邑傾望之始人皆憚於嚴明按視以來衆盡蒙於寛假官吏識提綱之體兵民忘持斧之疑才賢所臨風誼斯在竊惟布郡國之政皆以分朝廷之憂然於察廉必用照恕有智力雖短而顧無貪冒之惡有措置或爽而能盡公忠之心至如決罰微渉於笞杖之差區撥略失於闗移之緩整比未稱占對稍愆此乃衆人常情庶事末節若次第皆指以為罪則煩碎下無其所安須存其權使盡乃術伏惟某官治已以禮示人不疑通達以該乎物情文雅以飾乎吏事凢閱諸目主求大端但觀為治者何如其人曾莫更問其至小之過深副上詔大懽羣心某退自省循實蒙存錄惟堅其守用塞所知卑情無任感忭激切之至謹奉啓謝不宣謹啓謝張提刑啓某啓近者伏審提刑郎中不以某無狀特論薦於朝廷者承命悚愧處之不遑竊念某生於逺方世事畎畆稟賦不厚諸無所長止好讀書幸輒登第間闗二紀患難百端雖通籍朝闈𨽻名儒館而自顧不肖常甘退藏向得此州實滿素望驅勤飾拙僅以逾年至於簿書紛叢獄犴煩瑣丁寧區撥骫曲辨明摧屈姦頑撫字惸弱未嘗一日敢懈於公謀免過尤恐負除委心勞如此才短奈何豈無不然上達有位伏惟提刑郎中取人無備接下以寛不職之愆過蒙覆䕶非次之舉復為翦揚荷所眷存敢忘報稱惟期勉懋用答奬知限守麾符阻趨墻閾某無任感佩慚忭激切之至謹奉啓謝不宣謹啓謝田京待制啓某啓昨侍燕坐親承誨言心相矜存意在推挽荷徳之重撫躬而榮竊念某稟生甚微為學差晩勉道不至強文非高偶塵賢科遂去民籍一命佐府止安勤愚三年歸銓幸免愆曠比調藩侯之幕獲依臺使之庥赴官未期託跡于是此者伏遇都運待制持斧按部驅車過州例參羣名進拜崇采接以温裕已被寵華之深憐其單平復形恩意之厚退念所守何堪其承再惟顓蒙本喜論譔公有竒節時方盛傳止能竭豎儒章句之微摭賢者忠義之實會以逸事張之累篇或播之於樂工或附之於史氏厯世兹永大名其新惟持此懷庶答乃恵謝都運傅諫議啓某啓伏蒙聖恩授前件官已於去年十二月二十九日赴上訖幕府承寮已編吏瑣嚴臺取庇謹佩官箴省已枵孱側身悚靦伏念某處地遐絶託宗衰寒易業耘芟嚮術鉛槧専尚以學妄追原流偶程其文謬玷科選既策足以從仕遂刻心而首公願殫勤愚儻稱恩遇向宦西都幸逃過尤此官南豳誓謹名節然而賦守椎滯云為拙蒙深繄賢明大與寛假伏遇某官徳厚而載才高且通接物於誠待人以恕西道藉用簡君相之憂列城承流聳士民之望某幸以眇迹簉于洪庥常祈台光有照隟漏止營寸効仰報全仁某無任喜懼激切之至謹具啓謝干犯崇重伏增戰越不宣謹啓轉官啓某啓考績中臺叨奏成於吏効引名便殿獲序進於朝倫服寵命以優榮揆孤𠂻而悚越竊原夫厯代之典最重者太常之司有虞之隆兼禮樂者秩宗之任惟周之盛次天地者春官之聨其後取名各殊定品尤貴於以表國家盛大之義謂其練朝廷沿革之文既為之卿也總正其端原又設之丞也佽助其區處苟非達聖作明述之奥辨功成治定之宜識無不通才有可議則何以槩𨽻此局濫塵厥官就失慎於選掄是輕蒙於稱誦如某者出在逺蜀生於窮閻自曾高已還而未嘗服官因文物之盛而輒自嚮學性䪥狹以非穎文支離而不工偶叨薦書獲寘仕版贊佐兩郡周回十年上官交章謂其可以任使本部按詔乃曰當乎叙遷有持所得之科名為引久行之恩例銓啓上列宸音下俞超居衆前使異平選逮趨雲陛之對親邇天顔之臨錫之恩章命以通籍乃署此職以榮其躬何不肖之賤生受常存之要秩迺幸孰與其緣有來此蓋伏遇某官平誠接人用恕及物凡在顧矚悉生輝華剔鏤枵液而冀成美材鎔鑠堅頑而使就利器兹所蒙被實由翦揚退惟孱𡨕粗識依嚮某敢不夙夜自敕起居弗寧率道而行徇公以處貴少收於治最勉後報於恩仁心所記藏書焉簡漏卑情無任感荷激切之至謹奉啓謝不宣謹啓上知府吳龍圖啓某啓仲夏毒熱伏惟某官尊體動止萬福即日某蒙恩伏念某違去左右倐焉三月嚮慕旌棨發于夢寐候問之簡念常愧仄實謂明公愛恕臨下須煩寵答所以用此有如惰略仰計崇量曾莫垂責伏惟鎮撫方面安静如堵晹雨時節稼穡登楙善良伸展姦豪屏縮治蜀之績轉聞久矣惟虞鼎席之缺即下鋒車之召西南民吏求借不得某出入門下十年於此被顧良厚實越倫輩今復試守支郡獲依使芘蒙賴台照日晞光燄敢不夙夜思懋厥職上報大君之殊恵次酬明公之優眷符守所拘阻趨嚴屏乞上為宗社精調寢餗某卑情無任繫戀之至謹奉啓上問台候不宣謹啓賀昭文文相公啓某啟者伏審昭文相公寵被明詔召還宰席朝野之士揖拜相賀誠以相公器度識略實冠流品洞明前世經權之會探究當今治忽之體用之於文則修舊起廢而倫理備施之於武則翦暴除亂而姦宄息有恵利以浹民之骨髓有勲烈以載國之旂常窮涯缺隅孰不瞻系而一旦在外頻年不歸雖有美化止及乎一方實使重望久虛於四海皇上懷眷舊徳企渴嘉論亟下宸旨以促其入追復正治易如指顧方今四夷未甚率服百姓未甚富庶隂陽未甚調泰稼穡未甚蕃衍相公登庸羣議欣洽感動和氣煙霏雲浮熏烝悠颺疵癘皆愈太平之遇期在旦夕天下幸甚某早荷存顧無所報効側聞休命跳地而舞伏限宫守所拘不獲奔詣左右某無任喜躍之至謹奉啓賀不宣謹啓獻文字啓某啓某荒闇鈍呐幸庇迹於麾下以某嘗用文字進取科級以某官有重名于當世復仗使節臨按其上固宜整緝舊學蚤先諸人以獻左右為下吏導名姓於上官之禮然猶省慮忖審欲往而復却者二年于兹矣無他實謂本期用此以求一顧之恵或懼惡其蕪雜蓄亂聽覽反獲投棄之辱職是故嘿然者久焉今嵗官滿有旨召試在豳蒙䕃局事甚簡時亦強自搜剔營新補故聯比綴次以備其事雖曰無取詎敢藏匿今輒繕寫古今雜著共二編上塵台几裁制之暇願賜披閱可進可止唯俟嚴敎干凂威重無任戰慄之極不宣謹啓丹淵集巻二十九
