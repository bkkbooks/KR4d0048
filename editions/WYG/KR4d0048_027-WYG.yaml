body:
  text: 丹淵集巻二十七宋文同撰表賀斬儂智高表臣某言伏覩進奏院報狀已斬儂智高訖蕩除妖氛天地以肅翦撲兇醜寰瀛甚安凡在聽聞孰不懽快臣某誠慶誠忭伏惟皇帝陛下機與神密道如天高威靈風雷慈惠雲雨國以内外盡陶醇醲物之生成皆荷覆育宜無獷悍之俗上黷寛仁之尊而儂智高者生於窮涯禀者盩氣善教不率狂謀自將嘯聚九真之徒跳梁五管之地尾掉蜂蝎脣張豺狼驚驅我民人搖撼我州邑陛下震動英武鋪宣睿謀暫迂材臣畧舉鋭士大號鎮壓羣頑遁逃奔流它方寄託㣲命然且質其親愛許以來馴何梟性之不移但狸蹤之自遠憬彼蕃服憚于皇家姦而弗容衆所共憤乃盡誅其殘孽仍遠告於中區掀揚曀霾芟刈繁穢是宜兼以母弟尸諸市朝大正嚴科了無遺種傳命下諭有生咸知四夷之魂盡飛萬國之手皆舞茲焉盪滅永矣恬寧臣限守邊州不獲奔詣闕庭臣無任瞻天望聖喜忭激切之至謹奉表稱賀以聞賀聖體康復表臣某言今月日本州進奏官任中立狀報聖體康復於二月二十三日御延和殿親見羣臣者嚮以皇躬忽嬰美疢勿藥有喜大易載無妄之文自得為功内經明適性之説仰聆安豫俯積欣愉臣某誠歡誠忭頓首頓首恭惟皇帝陛下乘熈明之期荷富盛之業抑畏萬務焦勞一心無逸豫以為懐有憂勤而自戒懍乎居海㝢之大愓若奉祖宗之休乃身氷淵所事宵旰屬履三陽之候偶差六辨之和而九廟䕶持萬靈綏祐僅逾旬浹已復恬寧親臨中宸燕見庻列氛祲蕩滌天地所以廓清霾翳歛藏日月所以光耀輿情旣悉黨議相驩況今遐邇乂安左右賢哲願裁思慮游神清燕之深庻召嘉祥享國厖鴻之永臣幸逢聖旦忝受邦恩限此守藩無由詣闕臣無任瞻天望聖喜忭激切之至謹奉表稱賀以聞賀乾元節表臣某言臣切以綂當大火聖人乘而上臨月在正陽真主稟而下降寰宇遇乎嘉節黎庻陶乎盛時和聲激揚協氣充衍臣某誠歡誠忭頓首頓首伏惟皇帝陛下合天地之粹憑祖宗之休誕靈中區撫衆率土纉世而治厯年以深仁恩滂洋德教醲厚顧羣萌常願於崇報盡衆美難酬於極尊唯逢慶辰乃祝睿筭巍然而峙者山嶽浩然而流者江河齊同久長無有窮盡臣被惠累世叨榮逺藩限守符章阻陪班列遙望天闕臣無任頌神禱聖踊躍忭蹈之至謹奉表稱賀以聞賀恭謝禮畢表臣某言今月十二日大慶殿恭謝禮畢大赦天下者講盛大之儀三靈集祐沛厖鴻之澤萬㝢蒙休鍧隱歡聲之馳熏蒸和氣之發浩若九土熈然一春臣某誠歡誠忭頓首頓首伏惟皇帝陛下紹會千齡之期乘臨百世之綂崇立禮樂而標于永古燀明制度而盛于前朝念天地生成之深必謹精純之饗惟祖宗功德之茂當崇配侑之文爰諏季商遂就吉夘具祲容於廣殿協大報於圓丘邦闕浸融國典尤備顧惟已事㳂此推恩思與元元之繁共均簡簡之況號令迅而風下仁慈滂而雨流臣幸遇昌辰屬臨逺郡即時分告縣邑輯呼軍民宣揚聖謨曉諭上德傾帑藏之厚賜挺狴牢之衆辜坊歌巷謠耄舞稚蹈悉能祝陛下享無疆之壽願陛下隆不㧞之基羣口皆然累日後已臣限以職事不獲陪賀闕廷無任喜忭激切之至謹奉表稱賀以聞賀明堂禮畢表臣某言伏覩今月二十日赦書到州祀明堂禮畢大赦天下臣已於當時呼集官吏軍民宣讀曉諭仍下所屬縣鎮施行訖者禮行路寢講昭曠之文詔下中區霈汪洋之澤頌聲飽滿叶氣熏烝天子修大饗之儀史臣書盛德之事一朝鉅典萬世洪猷臣某誠歡誠忭頓首頓首伏惟皇帝陛下纂嗣慶基修崇徽屋度越虞華之孝增高商乙之仁以謂展三載之精禋存五聖之舊矩顧惟仁廟之世嘗奉合宫之祠念將循仍俾罔譌墜以示降神之重以彰配帝之嚴精䖍致誠靖謐終事將均禧於四海爰發號于九闗盪垢滌瑕赦過宥罪陳租久債潜烈幽功咸在此時盡蒙其惠乾坤泰定日月清明諸産昭蘇太龢充浹臣方當盛旦出守遐州雖不能陪在位以駿奔實亦幸與斯民而宣布臣無任瞻天望聖歡忭踊躍激切屏營之至謹奉表稱賀以聞賀同天節表臣某言伏以月正乎陽體六爻之剛健日盈其數具五位之生成聖人所以出而為乎大君上帝所以命而撫乎下土嘉辰在旦綿㝢皆歡臣某誠慶誠忭頓首頓首恭惟皇帝陛下文備堯明智兼湯勇無治不究有為必成自履廣居益新大業立帝王之紀將欲度三皇之先齊天地之休豈止饗億年之久常臨大寳永覆羣生臣久去明廷叨居逺服屬縈采組是為有守之官仰薦壽觴徒祝無涯之筭臣無任瞻天仰聖激切屏營之至謹奉表稱賀以聞賀同天節表臣某言臣聞天之所以生聖人蓋表章於後世國之所以得明主期保祐於斯民乃宋重熈惟皇嗣守在傅而盛德天縱居尊而睿謨日新故得荒忽之遐辟陋之衆泳游帝渥熏灼皇明逢慶節以在茲載歡聲而無已臣某誠歡誠忭頓首頓首伏惟皇帝陛下繼堪輿之大紹宗祏之休上帝鑒觀羣靈擁衞是故月臨于已六陽儲純粹之精日浹於旬五緯合生成之數誕彌聖質對越昌期所以靜淵疏通剛健中正齊堯等禹軼漢踰唐文淳武嚴惠敏威肅雖然舉四海之内願報於帝力極萬寳之重豈酬於化功惟於降聖之辰共祝同天之壽臣幸陞仕版竊玷儒林屬紆郡紱於遐垠阻綴朝裾於廣墄願言致頌與世同辭臣無任瞻天仰聖激切屏營之至謹奉表稱賀以聞賀正旦表臣某言天道運四時之功惟春曰首王者布萬方之政以嵗為端太和發揚庶彚蕃廡羣靈儲甚盛之祉兆姓禱無窮之休至尊乘之諸福備矣臣某誠歡誠忭頓首頓首伏惟皇帝陛下稟五精之粹會一氣之元襲九廟之丕祥荷八殥之大綂日躋乃聖天祐其仁諒臨御於三朝固昌延於億載臣方當盛旦出領遐州阻陪漢㑹之朝徒祝堯封之壽遙瞻象闕限守魚符臣無任望天祝聖激切屏營之至謹奉表稱賀以聞賀冬至表臣某言天地旣復示一陽生物之端帝王其乘饗萬壽集躬之慶惟是撫内外之臣庶於以禱邦家之福禧盛德溥將綿區永頼臣某誠歡誠忭頓首頓首伏惟皇帝陛下荷堪輿之寳籙承宗祏之神基睿謨益新聖度愈逺皇明徹乎幽隱惠澤浸乎洪纎遇此昌辰備諸景貺臣蒙恩守郡待罪踰年拜綵仗之前阻聨華貫望矞雲之下徒想清光臣無任瞻天仰聖激切屏營之至謹奉表稱賀以聞代楊侍讀謝官表臣某言才短而治劇務或解去則甚安學荒而為近臣若忝冒則誠愧讓避不獲兢危以居臣某誠惶誠感頓首頓首竊念臣素無他能本自孤立天授介狹世名拙方偶塵宦遊誤應官使約已以道豈敢謀身而自營納名於忠常慙報國之未効命與羇躓職多曠隳惟頼聖神之知屢寛罷軟之責嚮蒙抆拭使辦要煩召至外臺入陪會省簿領倥偬財賦浩穰顧區撥以非能慮譴斥而不暇止幸滿嵗將從外官甘終散僚分絶榮路伏遇皇帝陛下黼飾治道興崇化原簡求多聞登采衆善演導聖智鋪宣神猷天閣之嚴署才臣而訪問書殿之秘列儒官而講陳此之清聨當以碩望況今耆雋在列吉髦盈庭宜親通才用副嘉選或下授於孱鄙實有辜於選掄然臣少雖從師久已廢業性弗解而自蔽心不磨而愈昏古今之宜究極而未至典籍之奥討論而莫精將何以上補宸聰逺答天眷重煩綸綍難避於新恩退伏縑緗復尋於舊學庶盡一節少裨萬分臣無任感荷慚恐激切屏營之至謹奉表稱謝以聞丹淵集巻二十七
