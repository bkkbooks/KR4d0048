body:
  text: 丹淵集巻三十一宋文同撰啓謝提刑張郎中啓伏審提刑郎中奉被榮恩按平祥憲西南列部上下交懽伏惟某官器度淹閎資猷敏給奥學洞羣經之本高才通庶政之宜家傳文章世仰方格豈獨推於人望固自結於主知朝廷之慮者實在乎逺方郡縣之憂者恐失乎中典當從讞正乃屬賢明嘉命初聞輿情已愜某幸兹守郡獲在提封顧蕞陋之微材託均穠之厚䕃限拘左印阻詣前旌謝韓運判啓右某近蒙高軒逺按下郡地既僻陋事皆因循某向此臨卭比裁閱月雖常整輯尚未安完以至簿書迷甲癸之行倉庾亂新陳之次運判都官持心近厚垂意見存和顏相臨温語下逮譏訶免於羣掾敲扑逭於諸胥重煩文移勤與敎示某乍兹試守竊已蒙休始常懷罷輭之虞終實荷盖藏之賜感銘斯極跬履無忘謝提刑張郎中復官啓右某近服新恩再居舊秩曲臺議禮既失於討論重屋奉祠亦霑於敘用久負寡聞之恥忽叨洪沛之榮受命云初仄身無所盖此官凢經於三拜故為謝慙致於一辭豈謂提刑郎中猥賜存憐重垂褒借念歸華省謂所行之例當然喜動沖襟見相愛之情如此敢期部使深顧州僚謙固已而有之禮待人而厚矣心之所感言不能殫限領守符阻趨賔闥謝梓州知府大監啓右某伏審知府大監榮持使節出總藩條爰自下車逮兹閱月政已成於樂易頌皆播於中和九重擇人一境蒙福恭惟知府大監徳由世積學有師傳性厚以通才高而敏踐揚仕籍該練政經所臨之地則民實宜焉凢建之功則上皆信矣泌陽美績與古相參蒲坂休聲至今為盛惟是左川之重實為全蜀之雄聊藉撫綏庶安遐逺即聞迅召別委要權某占籍提封領麾僻郡文移冗密訊記稽違當逭譏訶但深惢茹儀未伸於邑子心常系於邦侯限佩守符阻趨賓闥某無任聳慕激切之至謝鳯州都監供奉狀右某去國十年守蜀三郡居常渴徳坐失為書此奉疾郵之來忽承累幅之惠過蒙存錄深負悚惶伏惟都監供奉才辯而文性和以毅向聞詿誤偶滯騫翔頼昭洒之既眀當選掄之甚邇勉期善養用對優恩瞻晤未遑企延徒切謹奉狀謝謝西鄉西縣中舍狀右某近被中除猥遷前列豈謂眷存之厚特形慶賀之深感佩良多摛裁㒺既謹奉狀謝謝提刑學士啓右某近者伏蒙某官特迂盛節來按偏州磴道崎嶇春泥險滑屢涉郵亭之逺頗為車騎之勞然幸瞻依實虞廢弛況兹褊陋久曰因循雖自勉於剸裁但未安於稱娖此者某官究詳所治霽抑其嚴尚相嗟憐不賜譏責豈惟無狀獨承故舊之矜存以至羣僚亦有依棲之蒙頼拜違未幾系戀良深限守郡城阻趨臺府卑情無任感佩之至謝運使按巡狀右某近煩使斧逺按州麾簿領猥叢綱條棼弛重勞檢詰悉免譏訶豈惟不肖之蒙休抑亦羣僚之甚幸此盖運使少卿寛於臨下誠以接人念其間有所未周盖於理實亦可恕使新後効與霽嚴威高軒遽還畏途正熾計神明之所佑想福履之尤佳某限守郡符阻趨賓闥其諸感佩莫盡宣言謹奉狀起居兼謝謹錄狀上謝運使司封啓右某啓近者伏承運使司封為某發狀言於朝廷乞賜召還者無用之才本自流落不訾之舉遽辱薦揚伏念某椎縵不文孤平少與初登仕版便圖行已之見聞屢析藩符専務究民之利病頗聞治狀未至乖方用此免衆人之見譏因而獲上官之垂眷伏惟運使司封學問深博資猷敏眀以忠直自信而曾不他求其職任所來而皆因上選按臨本道旌別屬僚豈期樗散之頑姿亦玷衮褒之華牘盖膚美之使凢見善而必收而庸常之人宜何事而可報惟堅素節以副清言荷徳非輕引詞安盡下情無任喜懼激切之至謹奉啓謝不宣謹啓謝成都運判太博狀右某伏審被宸扆之褒章領漕臺之副節崏嶺之下豈獨幸提封之吏民涪江以東實大慰同黨之親友用才而當聞命皆歡伏惟運判太博蚤有令名共推逺器學問淹博才謀敏明歸按新書已馳平允之譽上陳美績果委將輸之權恩除初行衆望殊快何未遺於鄙樸忽先辱於音題佩服謙辭銘藏陋腑未遑瞻晤徒切傾依謹奉狀賀兼謝謹錄狀上謝成都端明啟因上任蒙恩授上件差遣已於今月日赴上訖親老切於侍膳累求便官君恩許其還鄉得佐支郡兹服嚴命已臨賤司伏念某生也至孱學焉甚陋偶時之盛從事以文謬緣賢科竊迹秘府嚮嘗遂外官之請尋用持先子之憂一居家山四改嵗序有母八十重逺於慈闈去國三千難歸於儒館敢圖就養輙以抗聞人賤言微天高聽邈中㫖敦迫羣章薦論既而還臺復爾叩閤屬聖君之孝治體人子之勤誠會此空官俾之承乏今侍親輿之至即書吏版之中伏遇某官德量粹淵端誠愛恕秉持重節攷按諸城退省懦庸實繄芘頼唯全素守以逭嚴訶謝主簿任通夫啓伏審向者召以一封之車試於四禁之地蔚矣奏成篇之上霶焉蒙䟽渥之榮光輝朝廷聳動鄉里伏惟某官詞章豪蕩學術深明久馳不偶之稱忽應特招之選果升宦牒甚慰輿情不遺鄙樸之微先賜緘幐之重私心至喜厚意難忘謝人移厨啟伏蒙某官特枉使牙逺移公饌仰荷眷存之厚敢㤀負荷之深即俟趨依併伸悃愊伏蒙某官慰道途之勞垂肴醳之賜下霑僕乘益感肺懷伏蒙某官逺枉使厨薦臨客傳感領重意銘藏鄙懷謝知興元府啓右某啓閏七月二十日進奏院遞到勑牒一道蒙恩就差某知興元府候成資日赴任者某曏輸私悃上凟公朝音驛既行實懷憂於重謫詔綸忽下果見聽於愚誠不圖猥瑣之才薦委藩宣之任叨天若此為地有緣此盖伏蒙某官禀德寛容遇物愛恕所部之吏勿盡責其無能不才之人亦蒙休而自免所以拙者為郡庇之逾年曾無譴劾之聞復有薦論之重實由覆䕶致被寵靈謹當愈勵操修庶符補塞限嬰守紱阻謁使旌卑情云云囘卭州劉駕部啓近貢柔函已通燕几念封圻之咫尺承晤語以差池仰徳之深與日而永府吏至止幐音見頒荷眷錄之殊尤增佩銘之稠沓竊惟尊履常擁神休某官洊厯榮途皆聞懿績比殿西南之服已彰畏愛之能即竚寵褒更膺華擢某向叨交政輙貢願言囘新知郡韓郎中漢州啓伏念三泉之别一紀于兹抗俗走塵屬間關於末路攀鱗附翼致契濶於高風屢嬰出處之煩久廢起居之問瞻企晤語悁勞欵悰某官上奉宸衷逺持使節鎭臨要部綏撫遐甿驛信先馳輿情甚愜某便安親養佐貳藩條未遑裁書以上凟賢明先辱賜敎而俯慰蒙陋荷眷之渥銘懷㠯深伏計涓時日之良整徒御之盛然行逺道方在清秋更希偃冒之勤少護寢興之節傾依匪邈抃蹈殊増囘綿州知郡啓膺右掖之制守左綿之符已涓良辰方布善政當駐麾於劇郡屬㳂檄於他州不時為書以賀視事正深慙悃忽受謙題仰佩眷存實銘感戢某官負才敏給禀質清淳自揚厯於仕塗悉著明於治迹邇承宣化盛已傳謡某以賤局所拘不獲云云囘漢州四縣官啓持懇聞上請官便親尋蒙詔章許倅郡事冒據貳車之委慙當聨邑之先吏指繼來書音見屬相存者過所示彌冲某官業履有聞才術兼茂乃心當國其志在民尚㠯吏衡之拘猶為縣道之屈匪人甚幸賢者在兹交期有涯瞻會伊邇囘綿倅萬職方啓此者猥膺宸綍叨佐郡符垂組過家誠當於素志侍親從政尤慰於私衷竊尋忝幸之殊槩出揄揚之始屬窘他故未輸短懷豈期眷冲先墜音訊某官曲敦惠好高喻襟期馳伉步以及門義歸欵密側微躬而戴徳心切銘藏拜賜猶賒嗇神為祝云云丹淵集巻三十一
