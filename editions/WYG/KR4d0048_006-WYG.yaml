  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_WYG_006-1a, image: WYG1096/WYG1096-0589c.png}
body:
  text: 丹淵集巻六宋文同撰詩四十首和仲蒙石龍渦羣岡壓涇湄於此聚衆首其間石屋露逺視若呀口林端躡縆上却入勢愈斗圍空豎古壁闊可百人受洪鐘誰倒仰巨甕忽側剖層岩寒泉飛絶巘怪樹走隂風喜復怒野霧吞且嘔晴嵐逼衣襟欲住不得久嘗聞耕者說自昔藏蚴蟉當年救旱事有記刻不朽近歲靈恐歇百禱無一偶至今閭里人不復來奠酒和仲蒙山城大厯年忠武居豳捍逆氐平民營板堵斷賊閇远蹊連櫓横朱鳥飛墻切紫霓縈紆圍絶巘靡迤附深谿外濬池隍險旁聯堡障低轒輼防藺石埤堄礙雲梯樹杪鳴廵鐸崖端響守鼙石頭何培塿龍首太醯雞歲久蒼苔上時平白草齊全秦襟帶地惟此壯山西和子山春日雨中書事見寄二首菀菀㝠㝠雨氣沉一春長是詠春隂鷰歸畫棟簾櫳静鸎下雕欄院宇深鬭草玉釵應復約看花金勒悞重尋謝郎風調將誰奈獨倚書床擁鼻吟其二青春已破六十日正好共攜歌管遊鶯花有意欲惱亂風雨何事相淹留南園綵棚映綠樹西湖畫舫臨清流幾時雲隂得歛霽願把一罇相獻酬馬子山為余與賀順之書記李仲蒙察推同年同幕作題名記復有詩督程適之書石余因和兼謝太常舊得同科第幕府今還次姓名作記馬周文已贍書丹程邈𨽻尤精定知二美能傳乆從此三家覺轉榮每對雄詞觀健筆自慙孤迹附羣英官舍春日書懐二首自趍戎幙佐鞬櫜四見新隂發舊柯學飲不成歡意少好吟無倦苦心多舞傷池柳風圖甚泣破庭蘭雨奈何敢對青春歎留滯且須開口更狂歌其二琵琶泉水碧溶溶又見春歸玉柱峯歡緒已闌羞老大交期將近懶遊從杏開暖蕚融紅䗶柳放晴花拆白茸賦得上林佳景盡不知誰為薦臨卭登邠州城樓試此望摇落秋襟成惘然客懐傷薄莫節物感窮邊斷燒侵高壘微陽入晩川年來舊山意常與鴈翩翩秋盡日陪諸友登白佛閣危刹隱高阜孤軒横碧虗登臨賞秋杪笑傲樂公餘野外景入畫坐中歡可書重城已嚴鑰歸馬尚踟蹰極寒燈火宜冬杪圖書稱夜長簾鈎挂新月窻紙漏飛霜酒醴慙孤宦皮毛逐異鄉誰知舊山下梅艶滿東墻謝惠橘緗葉隱朱實纍纍楚江澨寒香摘清露奔走寄迢遞琳腴滿金殻咀嚼想佳惠君未致此時風已吹削肺登山城書事節物感覉旅連空生塞隂亂鴻寒渚逺羣雀晩叢深霜重涇灘出烟高隴樹沉歳華徒自老幽憤滿登臨送夏殿直時壻於李璋太尉霜樹東門曉清寒滿客衣一樽從此别百兩幾時歸漆水魚初薦梁園雪正飛高堂今逺郡須念報春暉送錢規判官歸蜀覲親遂之岳陽嚴風吹玉柱有客動歸裝古道轉危阪全家行曉霜休嗟遊薄宦且喜拜高堂㑹合知何所春江泛楚艎和梨花素質静相依清香暖更飛笑從風外歇啼向雨中歸江令歌瓊樹甄妃夢玉衣畫堂明月地常此惜芳菲山櫻巖壁自叢叢年華寂寞中偶因移曉雨似欲占春風嫩葉藏輕綠繁葩露淺紅孤根知幸否從此對雕櫳秋子裊裊復翻翻封條壓樹繁羣芳非姊妹亂實見兒孫䕃日臨虛檻披風拂短垣主人無奈爾常為醉幽軒桃花種近短墻邊開臨小檻前倚風無限意笑日有餘妍枝輭圍深密苞穠墮碎圓祗應芳樹下時見武陵仙杏花仙杏一畨新妖嬈洗露晨待粧憂粉重欲㸃要酥勻月淡斜分影池清倒寫真君須憐舊物曾伴曲江春秋日寄吕永壽微中落日照容谷寥然官署秋開簾臨絶巘凭几對寒流古意深中得詩情静外遊三年多少景滿篋是㝠搜吟春春工運潜巧是處有行迹庭梢發新穎巖溜融暖脉晴湖影撥刺曉樹音格磔須知玉峯下日有尋芳客琵琶泉險道入幽邃深溪轉岑寂蒼烟鬰孤岩秀石圍斷壁古蘚甃碧潤寒泉灑清滴誰能厭塵襟兹可供洗滌和子山種花五首風流從事季長家遶徧官居種盡花應為清才無比敵擬將文彩競春華其二碾薄搓圓粉色匀一枝寒艶惱青春曉來帶雨西廂下恰似蓬萊見太真其三曾宴瓊林爛漫紅寳津樹下看春風今朝忽向君家見猶憶當年醉眼中其四幾樹山櫻曲檻前花開如火葉如烟待將短句誇形似已被休文道欲燃其五新自涇州趂雨移便開繁蕚擁芳枝紅霞照地清香起似到𤣥都觀裏時和張屯田雪中朝拜天慶觀二首簌簌遥空墮碎瓊一街寒色曉風清題輿想入簫臺下似駕颷輪向玉京其二寳幢珠節共玲瓏九虎嚴關有路通遥望玉宸端象簡宛然身在廣寒宫送酒與吕令答所示詩二首君無彭澤五十畆我有謫仙三百盃聞道山中足春意滿壺聊為撥新醅其二見說西溪裏羣花艷正繁不知紅影下誰共醉芳罇初雪一色隂雲蔽曉空粉英瓊屑亂茸茸不知遊騎將何處巳失南城玉柱峯對雪獨酌雲隂低重玉花繁獨擁貂裘對一樽不語佳賔是何物古書名畫滿西軒槐莊渡口雲烟飄泊樹微茫一岸人家帶夕陽欲上高原便回首可憐風物似吾鄉約春去歳相違恨巳賒今年相遇喜無涯紅情綠意知多少盡入涇川萬樹花和子山陪使君遊西湖三絶正月晦日栁色遶堤金粉明湖光浮岸玉烟輕風柔日薄恰新霽正好訪春來此行其二遊騎翩翩從使君娛賔亭上宴西矄座中不用頻辭酒明日青春已一分其三滿眼垂楊照綠波就中春意此先多不將歌管酬佳景擬奈翠漪堂上何探春豳郊寒重勒春遲消息如今尚未知只是垂楊㝡先得每朝來覔向東枝春寒東風何事力猶微澟澟邊寒犯客衣舊雪未消新雪下南園春色幾時歸丹淵集巻六
