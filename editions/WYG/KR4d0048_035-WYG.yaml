body:
  text: 丹淵集巻三十五宋文同撰文奉詔禱雨祭中梁山文某年月日朝廷以久旱不雨詔守臣各於其境内躬自精禱者某謹詣中梁山致祭于某神曰自王畿以至于天下郡國自去冬以至于今秋虐魃肆厲害兹黎首雨不時降庶種萎殄大田耗敗衆用艱食流庸載道靡所歸止天子衋然震懼夙夜勤閔抑尊損制深自刻約致欵上下久莫之應側省何咎心焉如灼走使方内靡神不舉誠亦至矣而卒未蒙報尚謂名山靈祠有或漏畧俯已博逮庶宜來相迺専詔守臣即訪所治有紀在典躬薦明饗惟神肇自融結遂司梁漢屼然巨鎭遐邇尊望旁開澗谷逺抱林藪風雷藏畜雲霧蒸吐嵗或愆旱有取必得今天子臨制海縣無不總統如神之宅是曰王土神亦自當竭蹷供事以上紓天子之憂往籲上帝均辦厥職普浹膏澤救止大命是則神之所以奉上帝輔天子愛百姓之休功茂徳恢大宏逺不獨區區限此一方也神之聰明必能體天子如此之意守土者安敢更用煩言以瀆左右哉祭諸靈祠文上以比年以來天地變怪聞於郡國亦云屢矣故嘗恐懼修省勵德勤政求所以可當神靈之心庶下祥應以安黎首而乖舛繆盭未能蠲弭今復星文謫見有駭觀聽是用博及幽隱廣覃赦宥沉寃抑憤咸與昭滌冀蒙休嘉上答明譴乃俾天下守土之臣導上意之専潔致明祀於管内之靈祠期體端誠共底消復某所目恭事修職於神之左右惟神聽之代趙龍圖祭孫觀文文惟公禀氣之英號時之傑爰始筮仕遂高懿烈才望日偉讙然衆舌踐履郡邑隨所施設人無不宜賢否信恱服采烏臺愈見風節神羊在首所觸必血權臣擅朝勢炙手熱公嘗寒之消釋如雪傾邪落膽修斂自潔皇皇當宁凛凛在列上以公賢超公要切出領榆闗當戎正穴齊輯士卒整若刀截坐作進退韓㫖彭訣制服夏虜帖不敢發西南擇侯易公之轍公以家禍解組被絰水菽三年僅將毁滅起臨彭門威恵俱徹乃徙天水中道賜鉞是時嶺蠻凶焰横發延災邕廣千里一爇公摠萬旅兵林馬鐵以氣而壓未陣先奪酋惡奔遁如雀得鶻歸仁之功與古相軋來正樞宥神武機鎋惟公之謀未嘗以殺去守東南有州控越厥敝久積根于祝髪公去大本止留牙蘖至今其徒不復少猾旋移青社逺捍東渤大鹵更麾盖防虜黠功高徳重有忌而訐還政就第屢遷嵗月符離宴居自閉如訥曽無一言以歎窮達上始即位思用耉耋詔迫公起頼公才哲褒寵之優盡還印紱奠我慶土以安隉杌高奴謀帥欲窒虜窟僉謂公宜大牙秉揭行次雲陽六氣所汩亟上鄜畤􅀈已云厥遂至大故隆棟斯折國家柱石一旦而殁上甚嗟惋臨朝以怛贈數加厚列座于八嗚呼哀哉某早荷記存推揚奬拔復許陪親肺腑之末此義至重他非比埓聞訃之日肝胃摧裂引首東望徒深涕噎限領西州川涂阻絶不得詣前撫棺一別聊陳薄奠鄙意傾竭魂兮聰明監此孱拙祭提刑邢度支文於嗟乎公世之完人敦恵和懿清莊敏文自儀于朝寖偉才譽華涂美貫匪敫是與昔在憲府風規酋酋因遷而行海上為州尋來其朋處地皆峻獨公西南淹留俯潤曾未出語歎老嗟卑乃中于于一致險夷簡潔飭身慈仁蒞職列部依嚮亡寃有徳何天之明戾此人理付公以疾遂折不起嗚呼哀哉昔至持節今歸盖棺行路嗟泣摧心落肝况同於公取頋㝡厚其所痛悼惟神可究公有幼嗣必昌後時同報公心會當此移公柩東轅來經郡下薄禮則設哀誠詎寫祭提刑李子忠太博文蒙狄道之景耀兮寢恵陵之華滋發秀敏於髫齡兮騁蔚然之麗辭中藝等以服采兮治所止而民宜羣章交㠯啓辟兮顯懿騰而上知越自邑以振擢兮一委之以新規飾㠯權而厭下兮俾分提於憲司搪衆譟以獨前兮極日夜而處之役天倪㠯造慮兮出萬緒于一絲雖食寢而靡皇兮失桉簣之以時勉營効以蘄報兮曾莫顧夫自持沴有隙而得乗兮遂劇痼而囏醫盖外戕而内涸兮繇伏職而至斯噫捐已之甚重兮將收彼之纎釐惜乃事之未立兮但久廑于有為散利目以萬牘兮後疇合乎其離嗟靈之少與年兮嬴財鈎而不訾天胡然而遽奪兮使夫志之已而惟愚叨此名牒兮獲周旋乎累朞今竊吏於所部兮羌取庇而在兹忽葦然以承諱兮涕淚紛乎滿頥顧一麾之有守兮阻詣哭于縞帷徒不腆㠯將奠兮聊倚騷而託悲幸靈轄之未駕兮願歆此而後脂祭張時仲文某向聞時仲以親老得此豈惟自喜於拙者有所蒙頼他人亦交書見慶謂得如時仲者為僚相與營治事無不輯矣計日望來屈指無幾而候吏忽報時仲以疾尚留越宿遽聞以時仲不起驚嗟久之涕淚俱落因念昔者嘗同師席義均友悌後皆從宦聞問不失每一逢遇傾倒肝鬲留連終日各不忍去而況被牒共治一郡私心常謂幸寔天與豈期相去兩舍之地止有三日之約而遂成終天之隔嗚呼哀哉太夫人年已九十積善至此反令哭子天道何耶嗚呼哀哉某承訃之辰願一拊柩還視守印去不能得彷徨西望神魂飛散徒馳薄奠以將此意時仲知之耶魂必有靈當歆之也先府君焚黄祭文年月日男具官同與岡周等謹致祭于先考寺丞之靈朝廷以同被先考慈訓之深得入官升朝序故因三年之郊再進先考之秩位于棘寺天語下諭爛然盈軸今涓選良日詣墓次焚之如儀先考至明伏賜鑒領祭梓潼神文惟神聰明正直受祀兹土彰靈暴異蜀人畏仰某此奉明詔出守仁壽千里之地某實掌之惟是撫柔良抑強悍宣敎化齊風俗行二年之政成一方之善刺史之職事也非素具才術豈能致此某性識淺陋昧於吏理臨蒞施設恐不如事負徳於上貽禍於下某於夙夜常所懔懔願神隂啓黙導時賜警拂心慮口述無使誖謬如是則朝廷之所以遣某於陵而陵之人所以望某為治之意某之飲食起居寔不望其應於神之左右也祈雨文五首祭玉女文惟神禀大霄清真之靈而天下所謂溪谷淵泉者神寔主之惟是玉井之勝蹟殊利郡志所載皆神之化力使然既㠯是惠養於一方其為福於斯民也厚矣乃今其地苦此旱熯神顧忍視之哉叢隂漬潤頃刻萬里在神之翩然飛空勑諸羣龍也監此丹素願神行之祭睿聖夫人文惟夫人昔嘗許法師求護此一境矣今陽氣驕旱多稼將落夫人眷屬善作雷雨苟未棄誓言願救此民命是則夫人享是邦之人祭祀也與天地同極亦持此以見法師無媿矣祭天王文惟北方為萬物所以終始之地天中貴神多臨嚮之而王鎮奠其鄉最稱威勝天下城壘盡祠王像生民瞻仰恃以求福今兹炎熯實害多稼王於雲雨為力易焉願慰民欲聊煩指頋祭法師文惟法師受元一正氣躬佩秘籙凡於下民有敢為之烖害者法師威神所加必底平殄此州之人蒙法師之靈貺者千餘年矣今旱將有魃菑此嵗稼法師嘘靈於刀噴雨於水詎惜俄頃之力哉願一視其槁然賜之洒濯祭諸神祠文惟神受陵人之祀者久矣陵人仰戴神之威恵未嘗敢一日忘之神之所㠯視陵人之如此歸嚮當念有以對其奉祀之意今民田正仰膏雨而風乾日烮於此為患陵人旦夕望神拯活之心豈止如窮鱗之卧涸轍渇獸之走焦原者哉俾霶􅑛矣諒神之易為力者焉謝雨文向以時雨愆候秋種不入守土者甚懼斯民罹艱食之禍徧走靈祠望所以施一漑之惠以救恤之惟神助天養育惻然下憫洒洩甘潤區壠霑足禾麻菽稻蕃茂滋長蒙神之祐念無以報修此薄奉盖惟常禮願神慰監一賜臨饗丹淵集巻三十五
