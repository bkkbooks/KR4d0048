front:
  text: 集拾遺卷上
  hash: sha256:7f69bb1497eb09679e449ea9a2337c3afd3a9c953ca4e678b64afc38ab89f75b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_WYG_043-1a, image: WYG1096/WYG1096-0809a.png}
body:
  text: 宋文同撰詩卭州賞豐亭并序賞豐亭太守竇公為而名之也摸景畫意羣賢皆榜詩其上同忝𨽻大幕理亦當有紀述遂為此百五十言塵於其間然句斷甚俗而文辭不深者葢欲使溝壠之下耕夫餉婦讀易曉誦易記用而歌太守之徳也易傳爾故不懼人之指笑而敢以獻云人之創亭意大率繇已便夫何我公者所作異他見臨卭郡東北井井畫羣甸其民喜施力無歲不登衍公因到城上有此多稼羡而云彼嘉榖誠我民所擅如其每用此豈不鄉土戀伊我牧其衆胡爾懼流轉遂兹謀棟宇顯顯向一面題為賞豐字義不止營繕常時命僚侣扵時歌管薦高談詫上瑞衮衮莫之倦擎酒揖大野指顧一欣抃田夫各相語我輩誰曰賤太守亦為我今日又張讌卭州倅㕔三省堂將欲言治人必先由正身身正人自治此化行如神總緫羣聖書論説尤諄諄後賢守為法不敢㤀逡廵有欲著其跡更假他物伸或取几杖明或用盤盂陳或則銘於座或則書於紳此皆貪道者欲巳日夕親涵泳既滋久盛德光璘璘魯侯相門子佩義而服仁來乗别駕輿齒髮何青春開口議政事條件皆有倫春露與秋霜畏愛其吏民尚懼有片缺不使其質純乃於㕔事側開軒承甲寅題曰三省堂大構高榜新地古物象野水竹清衣巾公暇每居此寂嘿如隐淪㝠心以自觀外揣復内循一有所不逮補綻無纎塵既已自作詩文理相彬彬宛轉示明戒欲使風俗淳愚重侯所存再拜無辭頻待已固如此賢哉君子鄰常願此基構永不罹荆榛有壊則請修使之名不泯題何靖山人隱居二首靖蒲江人錦屏山下何夫子鐵帯麻衣真古人苦學詩來偷鬢老樂為儒後却家貧酒中酌月江村夜琴上彈風鸖寺春君已歸尋舊閒味肯騎肥馬入紅塵其二因循失計下青山却恨谿雲占斷閒黄巻聖賢忻對語青雲歧路秪低顔月墻槐影侵堦暗雨檻秋花滿目斑自愛蕭條真吏隐心清不累有無間題兠率寺簿領迷人喜暫閒聊尋古寺陟孤巒栢藏一逕中間窄雲歛千峰四面寛逺目已將飛鳥過寸心更乞老僧安若為借得禪房宿卧看龕燈一㸃殘題鳯凰山後巖此景又竒絶半空生曲欄蜀塵隨眼斷蕃雪滿襟寒澗下雨聲急巖頭雲色乾歸鞍休報晩吾待且盤桓子瞻戲子由依韻奉和子由在陳窮於丘正若淺港横巨舟每朝升堂講書罷𦂳合兩眼深埋頭才名至高位至下此事自屬他人羞猶勝俁俁彼賢者手把翟籥随羣優岌如老鸖立海上退避不與鶖鶬逰文章豈肯用一律獨取無問有神術所蓄未嘗資巳身搰搰恰如蜂聚蜜有時七日不火食支體雖羸心不屈陵陽謬守卑且勞馬前空媿持旌旄平生讀書苦􅀢詬老大下筆侵離騷貧且賤焉真可恥欲撻羣邪無尺箠安得來親絳帳旁日與諸生供唯唯須知道義故可樂莫問功名能得幾君子道逺不計程死而後巳方成名千鈞一羽不須校女子小人知重輕依韻和子瞻逰孤山跨明越壓蘓湖錢塘風物天下無玉峯孱顔石穿漏雪海浩蕩潮喧呼舊嘗持之詫吾孥㑹挈爾去相與娯宦逰若不來此都腰間綵組徒云紓子瞻鳯咮新結廬日哦其間興不孤平生美志自償足休問滿眼生雈蒲有物可比中鄙夫蜉蝣朝生死於晡公攘顯奪入胠篋驕穉無乃非良圗子瞻之樂固有餘辨説是非從魯蘧我今有索君勿逋歸日好景為我摹再和問子瞻何江湖乃心魏闕君豈無胡為放浪檢束外日與隐者相招呼藍輿往往從以孥靈運石壁無此娛窮深極險興未已豈復更憚梯登紆過客休誇衡與廬天下此景君勿孤欲將文字寫物象當截無限尋江蒲登髙能賦屬大夫逰覧木厭嗟已晡安得世上有絶筆盡取君詩粧在圗此身之外何贏餘成然而寐其覺蘧請看湖上人名逋此子形相誰解摹和陳基載大雨黕黕雲如湧淙淙雨若傾驟翻銀漢濁勻洒玉䋲明雷怒無停勢風豪有遏聲危樓已初伏猶謂裌衣輕和張推官荔枝長嗟珍果滯遐方好種華林奉帝王夏簟滿風羅秀色曉梯乗露摘新香潑霞乍染愁將變烹玉纔凝忍更嘗正在臨卭病痟甚忽䝉佳惠敢相㤀贈李仲祥道士不見先生已數年相思惟是誦嘉篇因來守郡空山裏又喜通名畫㦸前抵掌劇談猶矍鑠堆胷豪氣尚蜿延近聞買得鵝池住且向人間作地仙和陳基載重陽日文酒尋常不厭求坐中須得賈長頭幸逢九日稱佳節宜對三嵎賞素秋歲月但看随葉落利名當信與雲浮憑君且學龍川飲一醉能令萬事休寄張郎中常媿無才動有權十年鄉里但留連養成答颯人應笑學得支離自謂賢三館舊逰層漢上一麾今守亂峯前幸逢别駕如張軌免對蘓章説二天逰閒居院乗暇訪閒居臨行欲所須急沽龍口酒忙打佛前魚丹淵集拾遺巻上欽定四庫全書丹淵集拾遺卷下下卷下宋文同撰雜著移蒲江縣學諸生文人既生其五常之美已潛牙于其中渾渾融融冥漫晦䨴而㒺克自章從之師所道有法駸駸焉適柔良粹厚之區㑹真參元而為正人端士矣反此固隔蔽其素所有也去而名嵬瑣兇桀叢然于天地間口鼻耳目眉齒鬚髮徒人耳亡他繇始習之是與否巳諸生質朴淳茂厯監之咸可彫飾繪畫以為令器今既學于元防當進退勿怠以充溢乎所以願來之意元防貯儲甚深而宏予昔與之㳺備識之且不敢以誣諸生諸生宜修心治身趨教嚮誼毋甘浮淫毋生夸驕毋輕語議毋妄施設毋尚䙝狎毋念荒逸毋聽讒嫉毋起怨背則諸生於謀已也甚善予亦重諸生習之自必見諸生為正人端士矣恭之哉時皇祐四年二月七日書卭州天慶觀希夷先生詩後希夷先生陳摶字圖南後晉天福中來逰蜀聞是州天師觀都威儀何昌一有道術善鎖鼻息飛精漠然一就枕輒越月始寤遂留此學卒能行之後歸闗中所修益高蜕老而嬰動如神人太宗朝嘗召入對問被俞㫖賜詩與號放居華山章靈暴竒久乃解去逮今海内愚耋蚩稚具齒舌者灼灼能道先生之所為先生本儒人既繇虚無凡作謌詩皆擺落世故披聾劀盲蹊穴易知每一篇墜塵中雖市人亦諷誦不休謂真闗秘區若可自到當時有贈昌一者親墨殿楹上後人已恐渝樠刻之厯祀孔多自丁酉訖今實一百一十四年也苔塗埃昏藏隐晦黑積久不問皇祐庚寅歲郡將博陵崔公制治之明年廷事簡休恬於訪奇考志得此即往臨視讀已歎云此非逺形外器者言耶解名纓脫利縳扶人于夷曠之鉅逵爾達者所存深如是哉惜其陊腐不能久傳寓於石其㡬乎乃求摸之顧謂其幕中文同曰子可作系疏其繇俾來者知所以然因而䕶持貤於亡窮亦我曹謀也同唯唯謹執筆願書其觕屬之末且拜公之所趣特高乎閡善而勿通者萬萬矣中元日書重序九臯集大邑缺令余以郡從事來攝其治既至樂其少訟而多暇獨未見有過從可延之與語議者問左右皆言静林有老僧曰惟已戒業甚高凡士大夫之賢與其徒之名者多與之游無不謌詠以道其為人在里閭一切皆歸尊之不敢怠此疑可以當君子之求訪者遂召來果與他浮圗者異狀貌秀健襟宇恢擴辯論博洽根固基厚信釋氏之門景星慶雲爾余大喜明日詣其所居一室寥然逺介江上幽澹虚潔整整可愛視其壁有畫儒者像榜云長秋山人胡昭甫字惟岳真者旁有贊乃已師之辭講胡之美尤盛問之曰此已師師也當僣孟朝渠為進士有詩名于時不第已師得學四聲於其門下今不幸而其嗣冺絶巳師既荷其教誘竊懼其為鬼而死無食處故圗之庶朝夕得此瞻慕而歲時得以獻享也余聞之益重其所存因而歎曰夫世之具儒衣冠而把吾孔氏之書巻者過耳厯目莫非皆仁義之説及於其所事師一反面不復更名之者多矣况肯有䘏其沒後者耶已師乃學佛者斷念割愛實曰其事今反能如此宜乎吾心之信確確而愈堅因索其詩得七百首攜歸諷誦累日温純謹愿含蓄意思誠鐘磬塤箎之雅韻鸞鳯虎豹之竒采其舂容彪炳不假於他而一出于自然矣余固願為之序使行于世期覧之者知已師不獨號方袍而能為辭章亦著其行義磊砢魁特而絶出於衆人爾已師字亞休姓仇氏識余時年七十五歲云皇祐癸已下元夜三更杳杳堂書此序崇夀禪師塔銘禪師俗姓仇氏名惟已字亞休卭州蒲頓人自少時趣尚便高逺不與鄰里諸兒同嬉戲惟是聞作佛事則汎灑供獻恭勤精愿不敇之而自率常恐若不能如法者父母異之乃俾𨽻大邑静林僧籍以仁普為師年十六遂落髮二十受具戒來成都太慈寺聽講大乗諸經盡通曉奥義後七年還舊居其所止悉荒落不治但腐椽破壁欹邪罅漏陳屋數間而已師恬然安一榻處其中無厭色鄉人有胡昭甫惟岳者高世之士善吟詩其最深處雖唐人盖亦有未能到者師師之入室矣師嘗以詩見邑宰秘書丞滕喬喬一讀重之來謝師見庭廡壞裂殆不可坐起倡邑人為修之木幾臺殿樓觀一一完具師之徳業自此愈逺聞閭里之人皆欽嚮之師是後不復他出掃静室據古几宴坐一食遇物感興時亦作詩其句度夷澹清粹不若其徒之所為者與人語和輭未嘗輒迕人出入縣中六十年亦未嘗以愛惡置利害於其間衆皆稱之師素堅強少疾狀貌修偉慈恕温裕縣人無長少咸願見之見必拜伏欣喜丁寧留連師誨諭慰滿而後去一日忽召其弟子在前且曰人既生理當有死死常事非異事吾無死生且久矣汝等當體吾之所以無死生者慎勿戚戚如衆人乃不累吾今日之所付囑爾慕安等泣曰師胡為是言有何所緣耶師曰吾之神光一道去矣留此無數刻汝當奉吾所戒曰惡不宜為善不宜失語已攝足趺坐疉手暝目而逝揺挽不動嶷如塑刻享年八十六治平元年十月二十三日也逺近緇素來赴哭者殆千人衆謂宜以師之真身建蘇塗而扄藏之使來者觀相起善芟去三毒回面正法不墮惡道亦師之不言之教也慕安等遂從其謀風神凝然愈久不壊見者謹畏如侍諸側余往年嘗居郡幕識師甚熟後復來權州事師則已化矣歸日枉道過邑詣師塔下旋遶瞻禮悲悼歎息雖然師之面目如生而師之語言已不聞矣嗚呼熙寜五年余知陵州師之孫慕真來詣余求文以銘師之塔余昔既聞道於師也辭將云何乃銘之曰是身如浮雲倐生而忽滅形質本何有聚散俱為幻夫人而昧死演起無量法從一十百千乃至萬億兆譬如蠶吐絲纒縛身自獄既倮而復羽孳種無由斷出此而入彼輪廻豈知覺師有大智鏡初誰為磨拂光明發虚空浄無一塵染大曜滿法界欲照誰能執收歛付諸匣乃是所假者示現于世人師以願力故師之所非相真實不思議凡所見聞者依以為漸入由此登佛地其則固不逺書以告諸後咸願起正信紆竹記紆竹生于陵陽守居之北崖其始共本以出去土未幾而遽分其三裁三尺倮然無他枝乃枿盖其顛未脫籜時蝎害之使然爾其一既獨盛將挺起為垂巖所軋力不得競乃求虚以伸所趣觝礙無所容屈已自保生意愈艱蟠空繚隙拳局以進伏碻磝蔽蓊薉曽莫知其厯寒暑之何許也余采藥過其下見之命聱齾二童奴撥荒榛除腐蔓扶起而支持之則已堅彊偃蹇宛骫附地若不欲使人加哀憐於其不得遂諸生理者然觀其抱節也剛潔而隆高其布葉也痩㾪而修長是所謂戰風日傲氷霜凌突四時磨轢萬草之竒植也余歎視良久聱者進而言曰是將以瑞而名之可乎曰瑞生于人所易見俾得以致之此獨處窮僻非瑞也齾者進而言曰是將以怪而名之可乎曰怪起於不常有物體自効以見駭於世此因地而然非怪也然則何名而可曰天之生物槩授以生其各有所得失之者莫不啻繫乎其所託竹之為物乃草木之中甚賢者今此不幸不得其地以完其生上蔽旁閼不使自通遂至於質狀如此然則天之所與雖不能奮迅條達以盡其性而其所得短長巨細之分當亦緣理而浸長之故其氣不能暢茂於其内而其勢所以促蹙於其外也且其所以若是者夫豈得已哉今也就其所以不得已者而名之曰紆庶使後之人知其得名之由以不得已而取之也於是聱齾並進而言曰公名之既聞命矣公平居常好戲為此者盍摹之以示於人乎余許之使聱者裂素齾者漬墨清曉上平雲閣為濡毫而揮灑之自卯至辰而就乃言此題其下熙寜壬子孟冬辛丑與可記丹淵集拾遺巻下䟦人知愛湖州之畫而不知愛其文非文有不工於其畫也人之所見之不至也且畫之竒怪本出於文章之餘而文之高古乂出于其人之胷懐本趣是豈有兩法哉湖州之文一出東坡兄弟皆敬而愛之前輩大老如文潞公亦為之延譽司馬温公則至于心服趙清獻公則至于歎服荆公蜀公乂皆形之歌詠湖州之為人可知矣湖州三仕於卭筆墨遺跡甚多後一百三十年誠之被命守卭凡故舊之相屬者必湖州墨竹是求而不及其文焉則知湖州之文者能幾哉東坡嘗賛
