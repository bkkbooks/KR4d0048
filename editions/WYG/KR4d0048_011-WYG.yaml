body:
  text: 丹淵集巻十一宋文同撰詩五十四首二年陵陽不見中秋月陵陽亂山中隂雺日夕發晴光尚希見况復求夜月二年逢中秋曽不識皎㓗煙雲爾何事常此作蓬勃纔令薄中明巳遣濃處沒羣邪利幽暗左右覺窸窣清光若蒙蔽誰為我磨拂庭下倚高株露華霑鬢髮夜聲秋風動衰草摵摵響夜月其下有鳴蛩到曉啼不歇乃知揺落時衆籟自感發安得苦吟人不能為一吷送棋僧惟照學成九章開方訣誦得一行乘除詩自然天性曉絶藝可敵國手應吾師牕前横榻擁爐處門外大雪壓屋時獨飜舊局辨錯著冷笑古人心許誰送喻介夫介夫陵陽竒男子節義素為人所談身長七尺氣萬丈自謂流落誰能甘去將舊學中新格坐取高第如手探明年西歸有光耀且請為我來山南飛泉山寺東城兀高峰爽氣浮翠微霞光射巖壁中有寒泉飛上方金僊家煌煌啓雙扉欄干出雲表目可了四圍我來乆不下幡影移斜暉風吹月中桂天香滿人衣逺渚鳬鴈落前嶺牛羊歸尚此戀幽勝不能手聊揮山雨山雨灑春城潗潗聲頗急牕下讀書人横編揭隂濕高鳶餓獨呌逺燕寒雙入南園有桃杏盡抱羣梢泣送牟太素山人山人高迹若孤雲聊問太虛求所止昨因隨風起西北翩然逺墮三隅裏攬之不住瞥爾去瞬息誰知幾千里東遊必定遇鴻濛請問無為最深㫖送龎中秀才曼倩學精知蜥蜴公明術妙識蜘蛛臨卭復有龎成叔萬事先將入卦圖遣興效樂天君莫學楊虞卿奉李宗閔宗閔權勢豈能乆君莫學劉栖楚附李逢吉逢吉禄位寧長守雖然一時身暫好其奈千古名常醜丈夫讀書要知道所信不篤被其誘大張富貴作羅網愚者紛紛以身就左纒右繞不可脫誅竄還當逐其後君不見虞卿須遇李固言君不見栖楚終遭韋處厚一朝摧折靈氣盡龍如蛇兮虎如狗勸君聖賢術内好潜心勸君邪佞黨中休入手豈不知潞州處士田佐時喚與美官嫌不受遣興三首惻惻抱伊欝試此登嶣嶤隂風吹繁雲黯黯蒙泰霄關河𦕈無際節物何蕭蕭過鴈安所之驚哀翻泬寥幽懐漭如失隨此羣草凋嗟予生胡為迹玷明盛朝服職詎云補赧然綴羣寮感此四序遷一昬復一朝寒霜入兩鬢漸積不肯消良辰乖所遇慨嘆心魂飄賤禀迂且介於時信無庸欲適閡所之此道當何從富貴諒非有僻陋知可容豈不媿上恩耗此釡與鍾昨歸得此州滿眼皆亂峯事物固瑣碎敢兹任頑慵報國秖自明惟神誘其胸其二少小事編簡淵源極沿洄不自測其深津涯信悠哉既長務修省日以德義培一簣敢中畫期之至崔嵬振纓仕明庭鴛鷺忝遊陪蹇修無嗣者誰可吾與媒吐艶落晩春蔫然抱枯荄因人寔自恥寂寞余敢哀何當清泠泉襟裾濯氛埃故山有松菊待賦歸去來其三連隂不肯解山霧嘗霏霏積潤日已滋厭浥沾人衣輾轉厭早起隔牕問晴暉幸聞太陽出身體輕欲飛中秋夜坐遣興素紈不揺風滿襟露氣中夜寒相侵予懐浩然杳莫寄伴月直到青天心臨闤閣絶壑迎朱檻高林拂畫楹巻簾千嶂逺入座一川平蜺綵緣雲斷霞光射水明不須誇曠望為語謝宣城野逕山圃饒秋色林亭近晩晴禽蟲依月令藥草帶人名排石鋪衣坐看雲緩帶行官閒惟此樂與世欲無營寒蜩山月滿地流金波寒蜩向秋鳴更多大都時節使如此止爾不得將奈何辛亥孟秋戊子有虹下天繞飛泉山入東谷飲古井良乆去作大雨咄之以詩長虹落天帔萬丈截羣嶺蟠身下深谷頫首飲古井居人莫之指况復敢引領幡然繞空去雲霧變俄頃乾坤為之黒噴雨極暴猛崩流匯溝瀾巨漲沒四境民田一漂蕩多稼不可省此物蓋蟲類聞亦具頭頸滛沴之所生詩傳載為眚朝西暮東出輒與日對影夫何此凶孽得使乘時逞高風掃寥廓一帚昏穢净煌煌太陽起隙穴被光景羣隂逐海内此物應逺屏寄何首烏丸與友人此草有竒效嘗聞於習之陵陽亦舊産其地尤所宜翠蔓走嵓壁芳叢蔚參差下有根如拳赤白相雄雌斸之高秋後氣味乃不虧斷以苦竹刀蒸曝凡九為夾羅下香屑石蜜相和治入臼杵萬過盈盤走纍纍日進豈厭屢初若無所滋漸乆覺膚革鮮潤如凝脂既已鬚髮換白者無一絲耳目固聰明歩履欲走馳十年親友别忽見皆生疑問胡得爾術容貌曾莫衰為之講靈苖不為世俗知蓋以多見賤蓬藋同一虧君如聽予服此語不敢欺勿信柳子厚但誇仙靈脾霜栢亭試墨山風吹早晴裌服覺微凛煙雲有佳尚竹石得幽禀閒牕覆舊局晩閣試新品幾欲賦郊居奇詞未如沈閱史感事世間諸味巳全疎惟愛縑緗似蠧魚名覇者來為御史姓闗人去作尚書晉師嘿嘿曾何害楚客昻昻只自如安得漢隂歸抱甕滿園青甲灌新蔬富春山人為予道其所獲石於江中者狀甚恠偉欲予作詩言若可得持歸刻其上當相與傳無窮余夜坐平雲閣是時山月清凛啼蟲正苦余因此景物索筆硯為山人賦之奇礓㠝岏倚秋江俗眼過幾多所忽風霜鍜鍊愈堅重怒浪噴激不可沒富春山人好尚古見此便以作吾物鐫鑱牽挽置庭下犀角鯨牙蛟蜃骨精金凝滑露筋膂老玉磥砢開竅窟狂螭奔挐勢天矯猛兕摶生氣蓬勃山人誇我謂如此欲我詩之慙拙訥何當走到山人家撫月摩煙觀突兀平雲閣偶作陵陽郡事全稀少嬾守長贏半日閒晩後須來上高閣就中無厭是雲山聞陳山人定命丹成試以詩乞水火相交養大還已聞神汞滿爐乾彘肪糓漆尋常得敢服靈丹二萬丸厭蟲月出松塢明露下蓮塘清今宵好風色獨遶林下行百蟲爾胡為嘖嘖饒秋聲求静不能得我詩何由成新晴山月高松漏疎月落影如畫地徘徊愛其下及乆不能寐怯風池荷巻病雨山果墜誰伴予苦吟滿林啼絡緯送堯夫二章有志深沉定無心出處同廟堂應為國臺省復還公肖似家聲重端方士論雄上如留左右風采壯朝中其二欲與民為利先求政所妨紛更初下議旁午遂交章不爾毛安傅其如體自傷西南餘弊在歸為對明光秋日田家淘漉溝源築野塘滿坡煙草卧牛羊今年且喜輸官辦豆莢繁多粟穗長二色芙蓉巳下五首和吳龍圖韻蜀國芙蓉名二色重陽前後始盈枝畫調粉筆分粧處繡引紅針間刺時落晩自憐窺露沼忍寒誰念倚霜籬主人日有西園客得爾方於勸酒宜洗竹斤斧從來到此稀為撩疎宻遶藩籬已繁不用饒新笋縱礙何妨惜舊枝風外清音聞曲閣月中寒影下方池想公日在琅玕逕正是棠隂訟少時琅玕逕在西園竹逕名也明堂肆赦不得預觀感而成詩季秋陽館事嚴禋能饗洪惟上至仁游廟衣冠參帝坐侍祠簮佩儼星辰歡聲被㝢和於律恊氣流天藹若春即見陪鑾千萬祀豈長如此在遐垠經史閣自持金節此為州小善何嘗不見收更起麗譙連石室盛藏縑帙擬蓬丘師延舊德皆高誼士集他邦盡乆留當念河南嚮儒意莫教弦誦少時休有懐致政景仁侍郎一生名籍占風流為識莊環可自由几杖未銷容早退廟堂將近肯中休有人把酒思高節何處揮毫詠素秋故國岷峩最佳絶幾時歸伴赤松㳺吳公惠酒因謝山城物色正嚴冬梅放長梢露小紅破蕚未深聊敵雪收香不宻任隨風儘教挿滿金釵上休管吹殘玉笛中須至開筵召佳客為公連夜賞郫筒登陵陽雲山閣寄上吳尹雲山高閣倚危墻晩意無窮在渺茫極望不知雲幾許滿空惟見鴈交相與誰把酒邀明月獨自吟詩到夕陽因念平臺有佳興鄒生枚叟奉梁王和寄白聖均年來雙鬢已絲絲頭角低摧羽翼垂無命不窮常自笑有謀皆拙敢求知榮途謾說居三館僻郡還甘守一麾頼是山城好風物不能逢子共吟詩和提刑郎中閱兵之什曉營金革列周遭大纛長牙擁帳高虎豹用韜傳妙略龍蛇供陣役羣豪言初撫處如蕭纊恩盡均時若楚醪敢謂施行剪諸盜亡之纔比一牛毛晚坐山亭口占嶺上生來月似磨嵓前斷去雲如削遥聞褐吏叩高林應是雷公催采藥送王晦叔豈無舊德為清望亦有彊親在要流班簿至今纔博士郡書猶自許諸侯貧甘逺宦氷盈腹老憶高堂雪滿頭不恃交期便求去趂歸春圃奉蘭羞重送一生自守至如此惟道外皆非所親顧已通塞盡有命是身可忍求因人又六言鷰尾歸艎正穏鴨頭春水方深不得同摇楚棹與君齊到山隂登山亭登臨平楚外徙倚夕陽間歸鳥亂飛葉暮雲凝逺山行知筋力倦愁欲鬢毛斑坐乆成搔首疎慵好强顔文領相仍意慮煩濁聊攜野策獨訪山園因覩霜栢亭殘梅憶公向時有詩酒之惠感物成詩繕冩拜呈知府龍圖諫議吳公昨日梅開飲公酒今朝梅謝念公詩眼前光景急如水案上簿書棼若絲且試輟忙來此地可憐遺恨滿殘枝西園想已成青實敢問調羮去幾時依韻和張推官元夕山郡上元榮樂事大開金地作遨塲煙雲向曉誰教霽燈燭乘春自有香紫陌熒煌隨歩逺綵棚佳麗闘眉長遊人莫惜酬高直買取銀蟾一寸光小閣戱書閒揭新刋集時裝舊窨香還如到茂灌無物在牀旁伐枯株層崖垂空石壁牢上有大木百丈高古荔全身裹鐵甲頑薑滿腹鋪金毛空根老蟒露擁腫曲枿恠􅨱争呼嘷一朝壯士揮巨斧無限隨死蓬與蒿可笑口號七章可笑庭前小兒女栽盆貯水種浮萍不知何處聞人說一夜一根生七莖其二可笑陵陽太守家閒無一事只栽花已開漸落并纔發長作亭中五色霞其三可笑此公何太惑讀書冩字到三更也知學得終無用自肯辛勤比後生其四可笑生平事迂濶向人不肯强云云到頭官職難遷轉一似城南蕭次君其五可笑為官太儌幸養愚藏拙在深山君看處置繁難者日夜經營心不閒其六可笑兒孫亦滿眼朝朝庭下立參差謂言飽讀詩書去憔悴如翁亦好為其七可笑山州為刺史寂寥都不似川城若無書籍兼圖畫便不教人白髮生近日近日簿書全簡少吏人惟趂兩衙休歸來便只尋冠屨遶遍林亭山上頭丹淵集巻十一
