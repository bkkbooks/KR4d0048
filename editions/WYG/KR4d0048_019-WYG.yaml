body:
  text: 丹淵集巻十九宋文同撰詩二十一首畫厨雜詠宋復古度支晩川晴雪霽色變雲林寒光混煙水遥山定何處𣺌漭纔可指早秋山水硯屏晚靄隔遠岫秋容入平林方素僅盈尺嵒谷能許深冦君玉郎中大蠏蠏性最難圖生意在螯跪伊人得之妙郭索不能已小蠏骨甲與支節解絡尢精研手足雖爾多能使如一錢黄筌鵲雛短羽已䙰褷弱脛方屴岌母也向何處開口猶仰食滕昌祐芙蓉雙幹發寒葩一枿立紋羽欲品精妙人君當二三數毛老鬪牛牛牛爾何爭於此輙鬭怒長鞭閙兒童大炬走翁嫗蒼㺏八九子駭立各四顧何時解角歸茅舍江村暮鄧隱老木寒牛蒼崖稜層草芊綿巨木半死生枯煙羸牛日晚已噍草稚子天寒猶打錢許道寜寒林許生雖學李營丘墨路縱横多自出交柯揮霍裴旻劍亂蔓淋漓張曉筆易元吉抱櫟狨老櫟抱擁腫金狨立鬅鬙當年隴山道似此見危層引子獐蒼獐引黄麑雙耳誰驚立髙原想新霽町疃見行迹崔白敗荷折葦寒鷺疎葦雨中老亂荷霜外凋多情惟白鳥常此伴蕭條孫太古辟支迦佛調御出火起正念薩埵捧香生信心二士之意在筆外彼太古者何情深許中正捕龍雷彼龍胡為被天謫不肯為天行雨澤天敇雷公恣搜索龍藏何所忽爾獲提之滿空若曳帛雹風電火相巻射雷張兩翅但拍拍首尾挽之足雙磔龍力與雷固不敵雷轉威怒龍褫魄須㬰定見肝胃拆萬力千氣凡㡬畫斯人斯品入神格范寛雪中孤峯大雪灑天表孤峯入雲端何人向漁艇擁褐對㠝岏晩秋煙波直於一尺素寫盡千里景雲山杳杳巳成秋烟水漻漻方入暝君應無心得此畫我豈有言能爾詠春山岡原草木秀溪谷雲霞媚君筆誰所傳獨解吐和氣秋山孤峰露蒼骨疎木聳堅幹高堂挂虛壁爽氣來不斷梁信羯鼔小圖高梧間垂楊玉宇極清邃三郎當殿坐左右擁佳麗􅉊毺近香案蹲獸吐碧穗寳几承畫控繽紛交綵袂花奴巻雙袖俛立前奏技君王顧之笑軒廡動和氣誰謂一尺素寫遍天上意聽者定何如觀之猶解穢明皇甞言花奴羯鼔可解琴穢蒲生鍾􅂒寒風酸號月慘苦梟飛狐鳴滿墟墓叢棘亂礓翳野霧古社禿剥倒枯樹下有三鬼相嘯聚初行誰家作疰忤痛熱腫痒快嘔吐塞噎咽喉脹臍肚呼巫召覡使呪詛翁驚嫗忙設賽具茅盤草舡置五路飯盂炙串狼藉布相共收斂各執去方此危坐歠且哺忽爾相視生畏怖有神傑然駕巨牯前訶後擁役二豎此神噉鬼充旦暮其腹尚餒色躁怒鬼遥見之悉失措竄匿不暇相告諭酒傾肉落雜穢汙魂魄飛蕩身偃仆一入木底只四據一尚把盞愕㠯顧一自隱蔽捩眦覷神用氣攝縛束固前死入吻無十歩計之嚼嚙或味飫蒲生胡為適爾遇畫之滿巻無一誤筆墨醜怪實可懼持以贈余子何故揺手不取一錢賂他日乞詩者尤屢試為言之寫其故折楊柳垂楊百尺臨池水風定煙濃盤不起欲折長條寄
