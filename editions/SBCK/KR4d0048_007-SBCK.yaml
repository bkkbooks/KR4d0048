front:
  text: 陳眉公先生訂正丹淵集卷七
  hash: sha256:5daabb94a8530b23770af15538ca8965ed9a2f7f1fe2a8b6e1d339d08063cf31
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_007-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳呉一標建先詩四十首新秋讀書高風發遠􅄜轉響爲淸商隆曦減炎威未晩先自涼庭前碧桐樹昨日聞早霜朝來逐葉上巳暈一拂黃壯歲覺時節㸌若翻電光自顧勿嗟惋徒然攪中腸官居幸少事署案日幾行公退清且閑垂􅄕坐虛堂解帶輙傲兀左右羅縑緗所務唯討論一燈從夜長貧士行側身入窮閻跼影守環堵日高齒未嚼風勁骭猶露胡爲迫凍餓此道吾所素出毎駕雞棲歸仍伏龍具原生本非病董子盖不遇誰將斗升水活此轍中鮒不見裹糧人欲死者亦屢徒自諷詩書區區立名譽馮氏道中早行畏暑事晨役高原動征覊遥遥歷廣博浩浩長風吹踈星才出没河漢西南垂林端啓明上飛光發丹曦熒熒洒晴露百物含華滋爽氣入肝鬲宿濁無一絲寒泉漱淸甘洗滌俗慮遺還憂火輪怒萬里燒雲逵宿李同年䕃碧亭時自長安慮囚屬疾抱病出煩闠投此青林間高軒得淸涼坐致精爽還主人止之宿借與終南山中宵皓月起繞枕皆孱顔望乆氣自淸心胷無結頑平明又西走勝􅁤不可攀李生􅀞鸖昻昻青田姿杳杳在輕素一身萬里意􅀟目九霄顧釤釤羽翮利竦竦骨節露君初本誰學我恐必神悟得於想像外看在絶筆處稷筌如復生相與較獨歩豳州昔年戎馬盡南豳今日風光巳太文雅吹夜喧金府月靚粧春艶玉峯雲泉亭柳色濃將滴水寨荷香遠更薰邏候不驚烽燧息高原閑獵舊將軍􅀉友人惟秦抵於蜀間可歷萬􅇖遥懷嚮英義潜想一夕馳乏人探道奥求合常苦竒音覉見謂可招納欲與相塤箎夫何屢乖絶出處各一涯秋風動􅀌況西首勞所思和仲蒙夜坐宿鳥驚飛斷鴈號獨凭幽几靜塵勞風鳴北戶霜威重雲壓南山雪意高少睡始知茶効力大寒須遣酒爭豪硯氷巳合燈花老猶對群書擁敞􅂁明教院野逕欹危入谷斜曲崗囘嶺共交加經年不到爲隔水此日獨遊因看花兩岸烟雲閑景物一軒泉石靜生涯自怜冠珮嬰身者􅀡入樊籠老歲華和仲蒙夏日卽事簿領初休几按淸西軒移枕臥前楹香從菡蓞紅苞發粉入篔簹翠節生不分去聲便衰聞蟻闘可嗟俱妄見蝸爭日長景靜官曹泠莫厭頻來對一枰西軒秋日官舍蕭然似隱居一軒秋色伴恬如深藏宿􅀨樹木暗高灑夕陽籬落踈景物靜思臨水石光隂閑覺入圖書此心只有雲相信長畔吟魂遶太虚和張屯田秋晚靈峯東閣閑望􅀡欄橫絶紫微隂凭久秋光照客襟一道山川寒色遠萬家烟火夕陽深涇灘水落群鵶集秦嶺雲高斷鴈沉此興浩然須把酒可怜難醉異鄕心春庭春院隂隂翠靄仾春庭寂寂曉光迷花間蜂去抱黃粉苔上鷰來㘅綠泥兩行高梧初䕃合一畨新草恰生齊微禽巳識幽人意飛下欄干向裏啼過永夀縣驅馬上危坂暮鞭揺客愁峯巒驚滿目咫尺擬囘頭紅樹擁野店白雲藏縣樓須知此北下地底見豳州杜老有豳郊入地底之句東谷偶成府事幸稀簡常爲東谷遊舊山兹髣髴佳景毎遲留斷續溪雲起縱橫野水流拂衣知未得聊此慰鄕愁宜祿昭仁寺後軒危欄慿絶壑欲奈此時何但有夕陽處就中秋色多與誰同徙􅀝空自發吟哦便覺成覉旅歸心逐鴈過過高塶城頽壁乍高低中間巳亂蹊長原想鵝鸛大塜記鯨鯢黯澹寒雲結蕭踈野草齊興亡盡遺迹立馬看扶犁夏日翠漪堂湖水碧溶溶寒漪四望通龜魚遊浩􅄅鳬鶩下虚空爽氣吟窻外清光釣艇中一襟時自快多謝北軒風玉峯園經春不得一過因成詩呈同官約遊春來少嬉遊俗事日相耗南園只城外累月不一到花香􅀨後歇樹色風中老惟有嵓下泉猶能滌幽抱送張兢無悔秘校赴調無悔富道誼卷藏無所施端笏拜上官十年走堦墀人皆爲嗟惋君獨安且怡又執考書去當衡誰與知六月十日中伏玉峯園避暑値􅀨南園避中伏意適晚忘歸墻外谷雲起簷前山􅀨飛興餘思秉燭坐久欲添衣爲愛東嵓下泉聲通翠微咸陽道上晩晴有作積靄晚盡散南山明夕陽秋容徧豐鎬古恨入隋唐草木咸揺落風烟自􅄅茫客亭須下馬把酒慰殊鄕歲晩登清素院北閣雲端訪古寺樹杪臨危閣風厲懾草木霜乾喜鵰鶚天時旣悽􅃤人意亦寂寞囘念故山遠心隨日西落炭泉險道一澗呀然截亂峯更於何處問途窮高深出井又入井曲􅀡上弓還下弓絶底乍臨渾偪仄危㒹纔徹似飛沖我來行縣須經此正在炎炎三伏中玉峯園避暑伏日當飮酒南城㑹群賢開樽䕃碧樹移席臨清泉浩意脫塵土高懷軼雲烟早歸休信俗須待月娟娟早起覽物成詠移枕出幽幌披衣歩前楹秋容草木靜曉氣烟雲輕蟬噪宿露滴鴈飛朝霞明塵心幸未動聊此納餘淸􅀉馮永州山水永最善守居聞更優烟雲萬石古風月九岩秋几案少俗事壺觴多雅遊無因陪後乘幽意滿湘流暑夕待月庭下夜深方歸晝蠅方少夜蚊多揺脫霜紈奈􅀬何獨向中庭待明月一身清露瀉金波中伏日諸君㑹玉峯余以病不預作詩􅀉呈去年中伏在南園同聽清泉引綠樽今日諸君又高㑹獨嗟移疾臥西軒興平原上赤􅀬因􅀉永夀同年日午終南翠色燃滿􅁭飛土下秦川是時獨想君高尚正在山亭弄野泉亭口林下翩翩鴈影斜滿川紅葉映人家岩頭􅀌寺見橫閣有客獨來登暮霞淺水原鶉觚西北地鱗鱗此處當年起戰塵見􅀃如今溝壠下斷鋒殘鏃屬耕民興平原上東西車馬走秦川擾擾飛塵混曉烟我亦中間遊宦者尙慚無語賦歸田西湖荷花紅苞綠葉共低昻滿眼寒波映碧光應是西風拘管得是人須與一襟香石龍渦嶮􅀔圍空斷壁圓四時常見聚雲烟爲霖救旱今何在徒有遺文記昔年有李懷又記備述禱􅀨有驗之事水葓紅芳霄露清翠節曉霜犯􅀨後曬殘日秋容滿庭楹黃蜀葵錦江何日别漆水今朝見清露染顔色秋鵝一分淺鼓子干葉者柔條長百尺秀蕚包千葉不惜作高架爲君相引接鄠上懷古未曉南山去從禽夜不歸凢行多少地十二所更衣石竹蜂齧紅蘃爛蟲啼碧叢短秋風畧地起惟有蒼苔管丹淵集卷七終
