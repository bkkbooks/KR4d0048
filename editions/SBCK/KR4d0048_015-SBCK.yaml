front:
  text: 陳眉公先生訂正丹淵集卷十五
  hash: sha256:4ff24e0ed023cf7250693a04f2dcb5a7cfe2df22ca6fb205ab65b8d79e51ddd8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_015-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳吳一標建先詩六十三首將赴洋州書東谷舊隱晚客無一來獨歩入東谷園林巳成就此景頗不俗落落巖游松脩脩澗邊竹爽氣逼􅁭䄂淸如新出浴寒泉激亂石磊磊潄瓊玉荒溪漬餘潤滿地苔蘚綠珍禽靜相倚毛羽華且縟高下相和鳴不去若馴伏幽花雜紅紫點滴亂盈目坐乆微風來時聞散餘馥往年讀書處宛爾舊茅屋雖然小破壞脩整可數木開門拂軒窻無限起蝙蝠縱橫列蟲網不免自掃撲壁間細書字多是親寫録當時苦謀身如此用意毒于今三十年才抵羊髀熟一從入仕路行歩毎踖踧所畏惟簡書其甘者藜菽中間何大幸致身在天禄無狀陪俊游俛首常自恧連章乞外補得郡悉鄕曲雖名二千石敢自辝碌碌朝廷設新法布作天下福或慮多垢玩訓戒稍嚴肅刺史當是時能不爲驅督行之以中道勉副議者欲刻薄素所憎􅃘復用刑獄進身豈不願實懼有隂戮昨從漢中歸於此度炎燠親朋日相㑹分義愈敦篤便欲從之游投簮解朝服退自數年計伏臘殊未足還當武康去就養若雞鶩貧雖士之常於我何迫蹙簞瓢若自具尚可繼前躅柰何食口衆不比回也獨東方千餘騎導從催我􅄩行復登長途貌展心甚縮淵明豈俗士幸此有松菊崔覲詩大中時人崔覲者高士梁州城固人讀書不求官但與耕稼親夫婦旣巳老左右無子孫一日召奴婢盡以田宅均俾之各爲業不用來相聞遂去隱南山雜跡麋鹿群約曰或過汝所紿爲我陳有時擕其妻來至諸人門乃與具酒食嘯詠相歡欣山南鄭餘慶辟之爲叅軍見趣使就職漫不知吏文巳復許謝事但謂長者云補闕王􅀡方本覲之比鄰文宗時上書召見蒙咨詢薦覲有高行用可追至淳詔授起居郎衰斜走蒲輪辭疾不肯至高風槩秋旻我昨過其縣裴回想芳塵訪問諸故老寂無祠與墳斯人乆不競薄夫何由敦此縣漢唐時諸公揚淸芬刻詩子堅廟來者期不冺寄題閬州開元寺澤師竹軒澤師種竹三十年竹成滿院生綠煙蒼龍子孫太䌓盛分領眷屬來渭川藏風蓄􅀨䕃殿壁不敢輙近寒森然香飛常入佛座上葉落不到經窻前芟除掃掠淨如洗欄外不許行狂鞭澤師痩徤如老鶴壞衲幾尺披左肩手持數珠讀􅆊夾狀貌兀若塐與鐫朝旋暮繞在其下不肯出院求齋錢古人亦有愛竹者豈得似師心意專我亦平生苦如此兼解略把筆墨傳逄師正謂同所好但恨尚有區中緣何時相對月明下坐徹淸影談幽禪􅀉題密州蘇學士快哉亭太史云此城之西北送客處也出城送客客未來主人到此先徘徊地臨濰水極淸曠毎爲送客􅀟限開客來旣坐歌管作紅袖勸酒無停盃主人自醒客已醉門外落日驪駒催揖客上馬退岸情未􅃘便擁千騎回滿襟高興屬軒檻野闊風長眞快哉獨遊􅀌亭入隂森竹逕北松塢高林動淸吹猶滴前夕􅀨解衣此危坐左右一不許性本不柰雜况復茲寡侶􅀌懷託寥曠世慮絕參伍幽花爲誰笑獨鳥只自語身閑得天全一息了萬古忽往而忽來其誰知踽踽夏日湖亭試筆亭臺淸凉水竹凈愛此來避蚊與蠅蓮花窺人􅀋楚女野鳥彈舌如胡僧旋來開卷坐松䕃却把釣竿㳂石稜二年何幸爾足樂慙報上恩無所能楊山人草堂九隴山人文父後心閑身徤兩誰如玉函經外傳奇訣􅀞㦸門前創隱居入鼎靈丹黃似橘隔墻凡境臭如帤何時再到高柟下倚徧淸隂聽道書詠鳬􅀟􅀟紋羽弄淸漪全得天眞似爾稀萬頃滄波供口腹一梁寒日曬毛衣雨歸别島嘔唲語風度前灘翕呷飛好向中流最深處等閑休要上漁磯弄珠亭春望岸柳舞毿毿春醲物象酣煙雲分極浦舟楫聚回潭上水魚千萬眠沙鴈兩三遥懷無可奈長是寄城南新晴望北山西風吹北山晚日曬新雨嵐光發巖岫草木紛可數翠壁倚萬丈白雲橫一縷待訪飡霞人斯游欲誰與城南江館漢江之北涯軒宇頗高爽西南正空闊時此託遐想誰家有竹石更可悅新賞待學袁􅉖孫乘興欲􅀡往屬疾梧軒高梧覆新葉滿院發華滋白日一何永淸隂閑自移暖蟲垂到地晴鳥語多時病肘倚枯几泊然忘所思北園避熱繚繞度回塘紆餘轉短墻引笻􅂓散誕入竹得淸凉正午禽虫凈初晴果木香移床就高處更欲解衣裳施公潭盤巖復轉溪磴道入雲微斷巘􅀟屏立垂泉一劔飛浮空交彩翠濺遠亂珠璣啼穴􅏇鼯出翹灘宿鷺歸寒光淸徹骨晩氣潤沾衣東谷牛羊下揺鞭去夕暉罷郡自問爾何事端然信方策本是鉏犁人强爲簮組客何甞補萬分徒自勞七尺還如裴昭明罷郡歸無宅送文鑄師游襄陽鹿門師今鹿門去正此冐炎曦野店乞晨饌亂山吟古詩問程行幾日覽景立多時我有懷賢意憑㸔墮淚碑夏日南園隂隂喬木下翠影若雲浮滿地紫桑椹數枝黃栗留迎風湖上去避日竹間遊定作今宵􅀨繞墻啼曉鳩北樓晚晴望秦嶺秦嶺巉巉列萬􅈐晚嵐渾欲滴晴空如何學得崔重易吟嘯終南明月中柳枝墻宇周回院落深日光風色淨隂隂柔條一似孫荆玉帖地反腰銜寶簮送王存之野水氷生薄似綿短亭梅發大於錢想君歸到江陽日欲話今時巳去年放言禆海之外旣爾知自問何苦安喧卑胡不往見蒙轂士㸔卷龜殻食合蜊寄褒城宰灔灔淸波瀉石門茂林高巘夾煙昏何當􅀞舫載明月共醉江心白玉盆物五斗詩潤滑可愛故云江中有大白石穴殻然如盆可撼贈竹篔簹谷我昔初來見爾時秃稍攣葉病䙰褷遮根護筍今成立好在淸風十萬枝竹答我實仙陂百世孫二年生長感君恩近聞官滿將歸去更望臨時莫洗園守居園池雜題三十首湖橋飛橋架橫湖偃若長虹臥自問一日中往來凡幾過橫湖長湖􅀡東西􅃞􅃞承守寢一望見荷花天機織雲錦書軒清泉繞庭除綠篠映軒檻坐此何可爲惟宜弄鈆槧氷池日暮池巳氷翩翩下鳬鶩不怕池中寒便於氷上宿竹塢文石間蒼苔相引入深塢莫撼靑琅玕無時露如􅀨菡蓞軒朝陽媚秋漪菡蓞隔深竹誰開翠錦障無限點銀燭荼䕷洞柔條綴繁英擁架若深洞是處欲淸香憑風爲持送篔簹谷千輿翠羽蓋萬錡綠沈槍定有葛陂種不知何處藏金橙逕金橙實佳果不爲土人重上菀聞未多誰能爲移種荻浦枯荻饒霜風暮寒聲索索無限有微禽捉之宿如客蓼嶼􅀌嶼紅蓼深淸波照寒影時有􅀟鷺鷥飛來作佳景望雲樓巴山樓之東秦嶺樓之北樓上捲簾時滿樓雲一色待月臺城端築層臺木杪轉深路常此侯明月上到天心去二樂榭㬊山孰云靜漢水亦非動二見因妄生仁智何常用天漢臺北岸亭館衆㝡先登此臺臺高望群峰萬里雲崔嵬吏隱亭竹籬如雞栖茅屋􅀋蝸殻靜几默如禪往來人不覺霜筠亭危亭入幽深正在脩篁裏坐乆寒逼人暫來須索起灙泉亭逕源分灙水衮衮出亭下橫湖能許深日夜見傾瀉無言亭誰此設孏床頗稱我衰墮公事凡少休須來默然坐露香亭宿露濛曉花妸娜淸香發隨風入懷袖累日不消歇涵虚亭石磴抱城回入竹見虗檻前望佳景多倚笻􅂓此暫溪光亭橫湖决餘波㶁㶁瀉寒溜日影上高林淸光動牕牖過溪亭小彴過淸溪有亭􅂊四柱地僻少人行翩翩下鷗鷺禊亭懸流効曲水上巳娛嘉賔飮罷已陳迹􅄼復山隂人南園農桑乘曉日凌亂如碧油紫椹熟未熟但聞黃栗留北園春風有多少盡入使君家當與郡人樂滿園􅊝李花寒蘆港落月照氷湖曉氣何太爽兩岸雪煙昏鳬鷗出深港野人廬蕭條野人廬籬巷雜􅅾葦毎一過衡門歸心爲之起披錦亭繁紅層若雲密綠疊如浪靑帝下尋春滿園開歩障此君庵叢筠裏圜櫩淨影碧如水誰識愛君心過橋先到此湖上衆禽盡以俗呼爲題五首淘河群魚見新晴萬鬛􅃧淸泚忽爾下淘河驚回入氷底連􅀧七翩翩彼珍禽金羽耀寒日飛落灘上氷對人連􅀧七拖白練盤石坐深林不欲人求見隔岸誰品絃數聲拖白練泥滑滑春日正晴明滿園花盛發勸爾竹木雞莫啼泥滑滑提葫蘆花開巳堪摘酒熟正好沽山禽㑹人意勸我提葫蘆詠蓮全紅開似鏡半綠卷如盃誰爲回風力淸香滿靣來題反人書齋新壁彩㨭縱橫設雕厨次第開須防何法盛􅀡入此中來張淨琬飄騎極豪侈後房多艶􅁎可怜張淨琬不識半酣時待雪向晩欲雪天氣隂木葉亂飛雜歸禽城頭徙倚待飄灑東北萬里皆雲林丹淵集卷十五終
