body:
  text: 丹淵集拾遺卷䟦人知愛湖州之􅀞而不知愛其文非文有不工於其􅀞也人之所見之不至也且􅀞之奇怪本出于文章之餘而文之高古又出于其人之􅅐懷本趣是豈有兩法哉湖州之文一出東坡兄弟皆敬而愛之前軰大老如文潞公亦爲之延譽司馬温公則至于心服趙淸獻公則至于歎服荆公蜀公又皆形之歌詠湖州之爲人可知矣湖州三仕於卭筆墨遺跡甚多後一百三十年誠之􅀍命守卭凢故舊之相屬者必湖州墨林是求而不及其文焉則知湖州之文者能幾哉東坡嘗賛其墨竹日其詩與文好者益寡有好其德如好其􅀞者乎又賛其飛白田始予見其詩與文又見其行草篆􅀠以爲止此矣復見其飛白則予之知與可者固無幾而其所不知者蓋不可勝計也然則自當時知之者巳寡况後世乎卭舊有湖州墨林堂誠之旣爲並祠堂上以致卭人不忘之意又刋其集以廣於世庶幾因其文以知其人勁正豪邁不獨在于區區之踈篁怪水也雖然湖州之文散落不存者多矣石林先生云東坡倅杭與可送以詩有北容􅀂來休問事西湖雖好莫吟詩之句及詩禍作世以爲知言而東坡亦嘗移書湖州趣其賦黃樓二者集中皆無之間有詩與坡徃還者輒易其姓字如杭州鳯咮堂坡所作也則易以胡侯詩中凡及子瞻者率以子平易之蓋當時黨禍未解故其家從而􅇡易斯文厄至于如此可勝歎哉今伹掇拾其遺亡數篇以附于後後有同志者或又能訪其遺餘尚可以續編云慶元元年五月旣望曲沃家誠之䟦
