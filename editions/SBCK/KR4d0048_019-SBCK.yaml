front:
  text: 陳眉公先生訂正丹淵集卷十九
  hash: sha256:e93a88b6f362f98fba947ebb2522b7fe8e29f128b19f27bfa506411fd223a748
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_019-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳吳一標建先􅀞厨雜詠宋復古度支晩川晴雪霽色變雲林寒光混煙水遥山定何處􅄅􅐯􅂊可指早秋山水硯屏晚靄隔逺岫秋容入平林方素僅盈尺嵒谷能許深冦君玉郎中大蠏蠏性㝡難圖生意在螯蛫伊人得之妙郭索不能巳小蠏骨甲與支節解絡􅀹精研手足雖爾多能使如一錢黃筌鵲雛短羽巳䄜褷弱脛方屴岌母也向何處開口猶仰食􅅬昌祐芙蓉􅀟幹發寒葩一枿立紋羽欲品精妙人君當二三數毛老闘牛牛牛爾何爭於此輙闘怒長鞭閙兒童大炬走翁嫗蒼㺏八九子駭立各四顧何時解角歸茅舍江村暮鄧隱老木寒牛蒼崖稜層草􅇗綿巨木半死生枯㷑羸牛日晚巳噍草稚子天寒猶打錢許道寧寒林許生雖學李營丘墨路縱橫多自出交柯揮霍裴旻劒亂蔓淋漓張曉筆易元吉抱櫟狨老櫟抱擁腫金狨立鬅鬠當年隴山道似此見危層引子獐蒼獐引黃麑􅀟耳誰驚立高原想新霽町疃見行迹崖白敗荷折葦寒鷺疎葦􅀨中老亂荷霜外凋多情惟白鳥常此伴蕭條孫太古辟支迦佛調御出火起正念薩埵捧香生信心二士之意在筆外彼太古者何情深許中正捕龍雷彼龍胡爲被天謫不肯爲天行􅀨澤天敇雷公恣搜索龍藏何所忽爾􅀗提之滿空若曵帛雹風電火相卷射雷張兩翅但拍拍首尾挽之足􅀟磔龍力與雷固不敵雷轉威怒龍褫魄須􅁷定見肝胃拆萬力千氣凡幾畫斯人斯品入神格范寛雪中􅀌􅄘大雪灑天表􅀌􅄘入雲端何人向漁艇擁褐對㠝岏晚秋煙波􅀡於一丈素寫盡千里景雲山杳杳巳成秋煙水漻漻方入􅊕君應無心得此􅀞我豈有言能爾詠春山岡原草木秀溪谷雲霞媚君筆誰所傳獨解吐和氣秋山􅀌峰露蒼骨疎木聳堅幹高堂挂虗壁爽氣來不斷梁信羯皷小圖高梧間垂楊玉宇極淸􅃉三郎當殿坐左右擁佳麗􅉊毺近香案蹲獸吐碧穗寳几承􅀞控􅌭紛交綵􅃑花奴卷􅀟袖俛立前奏技君王顧之咲軒廡動和氣誰謂一尺素寫遍天上意聽者定何如觀之猶解穢明皇甞言花奴羯皷可解琴穢蒲生鍾馗寒風酸號月慘苦梟飛狐鳴滿􅇕墓叢棘亂礓翳野霧古社秃剥倒枯􅀣下有三􅀑相嘯聚初行誰家作疰忤痛熱腫痒快嘔吐塞噎咽喉脹臍肚呼巫召覡使呪詛翁驚嫗忙設賽具茅盤草舡置五路飯盂炙串狼籍布相共收歛各執去方此危坐歠且哺忽爾相視生畏怖有神傑然駕巨牯前訶後擁役二豎此神噉􅀑充旦暮其腹尚餒色躁怒􅀑遥見之悉失措竄匿不暇相告諭酒傾肉落雜穢汙魄飛蕩身偃仆一入木底只四據一尚把盞愕㠯顧一自隱蔽捩眦覷神用氣攝縳束固前死入吻無十歩計之嚼嚙或味飫蒲生胡爲適爾遇􅀞之滿卷無一誤筆墨醜怪實可懼持以贈余子何故揺手不取一錢賂他日乞詩者尤屢試爲言之寫其故折楊柳垂楊百尺臨池水風定煙濃盤不起欲折長條
