front:
  text: 陳眉公先生訂正丹淵集卷十二
  hash: sha256:528d928f4eed539d2a902e4a8f3b8603b020ae56c9266dc7c8df15df668e1ca5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_012-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳吳一標建先詩五十首送知府吳龍圖國初巳來治蜀者處置盡自乖崖公當時奏使便宜敕不與天下州府同行之巳及八十載姦宄消伏誰之功因循至此漸抏敝有未曉者時相攻鞭管小罪亦檢察不許略出常科中下民知之頗不懼州縣徃徃藏群兇側身歛足未動者實以累朝恩澤隆公之初來蜀人喜􅄌愛􅃇熟民情通衆心歡然恥犯法捄藥浮薄歸醇醲盡將約束付僚吏興起學校還文翁二年羙化極沾洽逺近循服如偃風上將歸公問誰代當使間作如笙鏞遂求元老得青社其人廊廟之宗工徃年鎭撫有異績大斾再遣來於東公今與之合符去到必奉詔參夔龍大資􅃇德固無慮剖判自出其心胸所憂厥後嗣之者忠定良法還如空養頑活狡作淵藪不免剪殄煩興戎同之憤懣乆塡臆言賤不得通九重願公上殿起居罷第一用此聞宸聰送通判喻郞中前年爲郡得陵時不請其州陋如此蕭條官宇嵓嶺上零落民家坑谷裏西城初入巳可厭􅀼謂豈堪余所止幸逢之彥倅郡事日月漸深􅊋可喜予之所禀至迃謬君亦恬然尤自委毎來聚議一朝罷各去掩門歸隱几雖然有時亦爲㑹此事可知誰得巳酒肴麄糲妓樂可况復譊譊滿公使惟於試茶并看􅀞以此過從不知幾幕中有客乃佳士愛遣高談聽亹亹如斯共處五百日索寞情懷未嘗起君今官滿忽先去撩動予愁安可抳英溪長亭一揮手自此吳蜀五千里謂言川江㑹北固中亦有船多上水願君因出到金山遇此莫忘批􅁓尾送通判喻郎中二首晴霞照西城漠漠卷宿霧高空繚危磴此乃君去路吳蜀向萬里上馬初一歩莫言道途逺况巳嗟乆寓今兹有行色便可到北固長亭􅂓把手幾日更逢遇不敢醉君酒君意實急遽惟是送君心相隨亦東騖其二群居五百日日日如初見一日忽逺别能不成愴戀人生三萬日光景若激箭何若於其間喜愠費顔􅆕兹緣勝心在胸內毎交戰旣欲多上人計校須自衒於事固無􅀘在巳亦非便仕路繁此徒可謂丈夫賤愛君性渾厚􅊋不與時變相共爲此州敢說皆盡善何嘗分彼此惟務乃職辦所以將二年無有長短辨爲人倘如此所至復何患官滿去還臺豈能忘眷眷陽關調雖苦且盡西城宴問君到京國幾月方下汴予亦想是時移守至梁甸佳音幸見及西南足郵傳山城秋日野望感事書懷詩五章呈吳龍圖原隰蕭條草木衰倚風渾􅀋楚人悲便成孤憤終何事且寄遥懷對此時千里暝隂雲杳靄一川寒影鴈參差登臨自不宜覉旅更敢慿高䞉作詩其二巳是秋隂更夕曛亂山高下起寒雲危樓願見客何處逺笛不知人厭聞身外流年波􅄅􅄅眼前生事葉紛紛此愁萬斛誰量得􅀡爲重捻􅁃信文其三才力雖難敵楚騷賦詩常亦在秋多自然野思元無限不爾閑愁可柰何要路故人皆廢忘偏州佳客少經過明時且爲貪榮禄豈學湘纍便九歌其四嵓谷雨餘生晩煙高城危閣坐蕭然側身仕路本誰使囘首家山空自憐逺信斷來從過鴈苦吟多後敵鳴蟬郡齋有客唯莊叟常與高譚內外篇其五早是蓬山預校讎起居常赴殿東頭鵷鸞擁陛聮簮笏日月開天拜冕旒一出光隂銷逺郡兩形篇什詠清秋有人更在楊莊上文似相如肯見休東丘老人東丘老人眉有毫皮肉光潤牙齒牢自云新年九十九鬚髪白者無一毛問之吾術本無有嚥津納息徒嘈嘈莫將元氣佐喜怒自然所得春秋高吾嘗行之五十載此事至易曽不勞飮之以酒謝使去手足輕利如猿猱嘗聞唐人柳公度八十許歲精力豪其言與人亦如此老人無乃斯人曹送堅甫同年五首堅甫神太清不謂乆流落别來二十載論議轉深博其中富所有種道以文穫鋪張講治亂破若勁弩彉衆人誚青衫可􅀏俗眼薄蘭筋隱痩骨埀耳受覊絡拳攣喙拄地過者無伯樂去蜀持底歸雄藁滿壞橐朝辭玉壘關暮上石櫃閣知子者云誰獨我懷抱惡其二得數常奇􅂴下籌肯來荒徼治纍囚三年􅀏别浙江逺萬里吟歸岷嶺秋趙壹囊空常骯髒虞􅀸書就愈窮愁跖香囘臭都休問未有林泉且宦游其三春深行劒棧羡子此時歸照日江浮馬迎風花聚衣下程家累省對景俗題稀若遇西來客書言不可違其四春風吹雪滿西窓此夜無人對酒釭若到杭州見蘇子爲言常夢過松江其五華亭有珍禽毛豐而骨細他日上隋渠爲我致淸唳送李道士歸先生狀貌古瘦徤若老鶴秋風唳淸霄寒響滿寥廓一腹氷雪詞勿爲俗人作便可住鵝池乾死守嵓壑師厚還朝聞公之名三十年常恨與公不相値豈期今乃出門下毎一見公心自醉詞章豪蕩巳難敵辨論注射􅀹可畏諮詢故事要蔣乂講正大體須賈誼荆山拾玉抵乾鵲虞坂裝鹽􅎹良􅂹用人最忌非所宜願莫使公嗟俗吏牽牛織女桂陽有仙人姓成名武丁胡爲墮人世人惟識其形一日語其弟吾將返青㝠乃曰此七夕上天呼群靈織女欲渡河暫詣牽牛星諸仙盡還宮天路羅雲軿吾亦向祈召當徃不得停弟問何時還答云三千齡明日失丁在恍惚迷所經後世凡此節兒女喧家庭縱横具緘鏤花菓排甘馨貪巧但云得欲􅄰曽莫寧俗尚毎恠妄吾言誰見聽金鳯花花有金鳯爲小叢秋色巳深方盛發英英秀質實具體文采爛然無少缺纎空翩翩翠影動紅白紛亂如􅀧纈誰云脆弱易飄墮自􅆗至翼亦數月羙人形相欲摹􅀞巧不得施暫自拙鋪茸剪綵轉難似只把長條恣穿結眼前草木盡零落憐爾開於此時節常如小兒花性命所繫不􅃘折君不見昨夜雨今朝風一隊驚飛返丹穴亭前高栢石田磽磽地力燥誰種􅀟栢巳高大長材夭矯堪巨棟老頂縈紆若層蓋雪下孔翠寒不起風中笙篁清可愛莬絲幸好求女蘿莫倚纎柔欲無頼凌霄附栢古栢蒼蒼高入雲凌霄萬朶擁其身有如巨君染須髪新娶杜陵佳麗人謝黃森惠詩并草書黃蘭溪南黃夫子生平氣凛然吟詩􅃇有癖冩字近方顚可惜空山老須爲後世傳蘭溪修禊否願續永和年東齋悶書讀書巳無効何用轉勞苦閑齋幸無事日共古人語古人議論好善惡皆有􅀘舎此欲奚爲惟應睡滿午寒食感事呈同官三月八日値寒食隂霾蔽空不肯􅀵北園花木􅊋未動到處哭雨惟鳴鳩吾曹可憐愛薄宦甘此寂寞來山州酒肴有無更莫問逢過相與清談休惜杏北園山杏皆高株新枝放花如􅀧酥早來其間有啼鳥兒女盡識名提壺急教取酒對之飮滿頭亂挿紅糢糊可憐後日再來此定見隨風如錦鋪讀蔣都官􅀞像記蔣爲永康軍判官甲午之亂死於賊聞昔妖氛滿巴蜀所臨州縣偃如風其城䧟者盡從賊以義死之惟有公節與岷山高莫敵名隨皁水注無窮蘭臺秉筆今誰氏舎此何由壯史功題􅀺公照序訓堂常愛三峨臨古郡君之别業在其城近營大第當高處更起新堂立羙名滿外江山皆秀絶入中文史自縱橫如何置得烏尤住相與談經過此生朝陽亭峩峩乎守居巳與前􅄘對朝陽乃危榭更在守居外煙雲一川滿林麓三山㑹近檻有胡牀無忘傲公退觀風閣危閣覆高林晩歩􅂓徙倚東南兩􅈐斷空闊見萬里茫茫落霞外苒苒孤煙裏忽暗識歸雲乍明知積水風從半天下月向平地起夜乆􅊋未還峩冠露盈几山池偪側蒼苔地􅏠邪白石池數枝紅􅔽蓞幾尺碧漣漪魚鱉争香餌兒童簇釣絲愛來芳䕃下毎日日西時憶西湖􅃇遊西湖晴碧晩溶溶與客常來坐好風記得有人歌小玉月明猶在􅀞船中再送師厚乆使西南此召還鹿頭東去漸雲山莫嫌策馬經燒棧正好題詩到散關財利文書猶絡繹邊防田地巳朱殷奇謀不􅄍將何用况是歸臨咫尺顏平雲閣觀􅀨黒雲􅃮天雷破地風卷雷射􅀨傾㵼噴崖倒壑恣頺蕩咫尺不可辨牛馬鷄豚巳見逐高浪禾稻應須沒平野莫言魚龞走堂厨且看泥沙漫屋瓦不􅀨陵陽官居遇乆旱發喘渾如起新病巳驚赤日晨可畏更恨炎風午尤盛徒嗟禾􅁰盡焦落無柰蝇䖟轉豪橫安得神龍駕九霄大霔滿傾如倒井乆􅀨寒鳩劬劬屋上鳴欲使此􅀨何時晴山中有客抱幽鬱日日起望東方明今朝晩霞發光熖喜極再拜當西楹須􅁷雲隂又􅂪沒遣我涕淚流沾纓山園乆􅀨無所適新晴歩山園西風滿高林敗葉驚巳翻時節急如此世事安可論夜歸燈下吟寒􅆉伴幽喧石泉儼儼聳石壁拆穴中流泉斷崖散激激曲竇藏㳙㳙蓄􅃳活古蘚烝虛發晴煙時懷一勺惠使我心泠然史少訥見許江豚未得以詩戱霜重水落岸有氷江豚乘寒弄晴日揺波拍浪乍群起尾厚喙長鬐鬛赤魚人清曉橫巨舟一舉大網凡數頭想君盤筯巳厭足何不略遣來陵州北園梨花寒食北園春巳深梨花滿枝雪圍遍清春毎向風外得秀艷應難月中見苦嫌桃李共妖冶多謝松篁相䓤蒨黃鸝紫燕莫過從時有一聲拖白練華山二首嵓頭漠漠衛􅀸雲谷口紛紛張揩霧安得鉤梯上石􅀛欲看明星洗頭處其二石蓮峩峩橫紫霄中㵼萬丈銀河水安得大箭長八尺欲與天神博於此黃崖洞黃崖大洞埋古雲入去所􅂂平如席其中玉髓盡可飡只恐歸來變爲石師魯推官惠􅅴蔗戱謝滿節甘滋滲齒寒醍醐誰與釀琅玕不知佳景何時入試似前人取倒飡寄呈溫江安寺丞高崖古驛荒凉甚過客何嘗住乆之獨有門邊君寫處毎來無不讀多時嘲任昉幸自文章亦可憐不消一事巳爲賢何如􅁍逐䖝兒去􅃘恥更來王亮前􅀽術四代司空倚世勞可嗟不肖事姦豪妄云名字與䜟合􅀡欲起應當塗高偶成僻陋爲州恥不才偃然空見兩星囘祗應歸舉謡言日三府諸君口盡枚卽事公禮欲下格具觀人所存須知范孟博豈肯伏陳蕃薄命女夭夭東鄰姝艶色如春柔去嫁不得偶羅衣空自羞輕埃掩菱花不分鈆華休囘首視庸奴寂寞還卷收子平寄惠希夷陳先生服唐福山藥方因戱作雜言謝之蜀江之東山色盡如赭有道人云此是丹砂伏其下煙雲光潤若洗濯澗谷玲瓏如刻􅀞我聞神仙草藥不在凡土生是中當有靈苗異卉之根莖果然人言所出山芋爲第一西南諸郡有者皆虛名就中唐福衆稱賞肥實甘香天所養有時嵓頭倒埀三尺壯士臂忽然洞口􅀡舉一合仙人掌土人入冬農事閑千篝萬鍤來此山可憐所鬻不甚貴着價卽售曽不慳徃年子瞻爲余􅀃言君所部之內此物尤奇絶後復寄書勸我當餌之滿􅁓親題華嶽先生訣予因購之不惜錢依方服餌將二年其功神聖乆乃覺筯牢體溢支節堅自問丹霄幾時上早生兩趐教高颺塵世如帑不可居待看鴻濛對雲將丹淵集卷十二終
