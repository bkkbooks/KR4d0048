front:
  text: 陳眉公先生訂正丹淵集卷五
  hash: sha256:edd67ae52fe508387dd3b59cf264f474fc30a010b222bbe60cbdd84a0d88621e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_005-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳吳一標建先詩五十一首賈佩蘭歌綠髮憶新梳君前侍玉壺相隨五色鳳飛止帝宮梧鳳時入紫烟一舉萬羽趨乘風恣敖盪衆首傾雲衢帝旣天上行留鳳不與俱鎩翮下永巷髠編鉗徒赭衣舂且歌北望鸑鷟呼􅏮􅏮亦喙鴆一盃死其鶵鳳亦飮瘖藥鞠域支體殊娥姁豈不仁幸此全賤軀歸來南山下秋風裂羅襦寒床覆龍具霜雪侵肌膚忽自感時節臨風只長吁徒懷掖庭事飮泣對民夫徐太元彼徐太元者杭州之叅軍同僚曰張惠犯贓抵深文徐哀其母老詣獄輙自陳謂惠所受贓太元本同分今儻獨坐惠此獄無乃􅁈均之不滿法惠遂減死論太元亦坐免不調十餘年西臺李侍郎典選世所賢聞徐之所爲特以不次遷擢授鄭司功太元名始傳後爲申王師德行人推先嗟哉後世人恩義日不完初旣同職事言色殊相歡謟酒與佞食旦夕同杯盤一有不得意艱險立萬端推之入網羅又以毒箭攅昻然了自得衒露其術全此等雖曰人犬􅇾曾豈然眼見與耳聞天下何可言我今作此詩中有二義存欲使在位者此風幸相敦勿令有識人命爾爲蝎蚖又欲彼正士爲國掌三銓須察此惡子廢斥入冗員自然此浮薄不長其姦根覽者請味之勿罪其言煩盖寛饒次公清而狂其本出天性惜哉公㢘質不以儒術正䧟害公峭刻奸犯語堅勁在位及貴戚合然􅄷怨盛稀遷愈失意躁戾因以逞王生識其趣勸以全夀命胡爲不開納封事轉凌橫五帝官天下此語豈君聽上怒以不改章下求衆定礭然金吾奏􅀡以大逆訂雖爲鄭昌頌萬嫉掩一諍遂爾屬諸吏羞復受笞榜行當北闕下輙引佩刀剄時雖衆所憐終爲端士病諸􅁑豐少年名特立初爲貢公起元帝擢司􅀠刺舉無所避間者何久濶京師語如此馳車下許章去節自豐始上書擿章惡此舉誠可喜奈何少恩恕春夏常繫治人多訟其短遂徙城門尉復列堪猛過上爲之切齒制詔白其罪不􅃘下豐吏豐􅀄在朝時數道堪猛美失職乃自取不內省諸巳反惑怨其他轉譽以爲毁不欲加以刑上憐之老矣庶人終於家反覆豐可耻新津退思堂三江古劇邑入籍生齒夥詞源百端起區處不可惰子醇爲之宰幽隱照必破斷事精且密有若麥歷礳尙懼忽一失退卽此堂坐戾者思改易無使下罹禍如此凢二載不識有纎過賢哉令之師敢以此爲賀墨君堂晚晴凭欄墨君堂中看新霽十里平林鋪淨綠青烟一去抹遠岸白鳥􅀟來立喬木戴勝入園􅁞巳老栗留過隴麥將熟坐待月破東嶺雲自取􅄕鈎更高軸山舍早起探晴山鳥轉晴日獨行風滿林澗花薫野袂岩水濺幽襟側石驚新滑垂蘿愛近深蕭然此清興不似戴華簪東谷獨往久不到東谷晚晴欣細􅂂隂隂夾路木濺濺落溪水幽涎界屏粉亂喙刻窻􅁓兀坐忘所歸烟雲逼人起西崦道友西崦入深窅幽茅藏隱仙虚窻畫雲􅂐淨几校靈編絶巘聳玉幹危岩瀉珠涎相留飰青䭀人世凢幾年送李野夫兼簡公擇學士同年吾友野夫官滿歸峽中風物正春時莫因道路起長歎且對江山吟好詩異日滑臺君若到􅀉言别乘我相思聲名㔾重更論底但引冰堂金屈巵任居雲棲枝閣峩峩仙鸞山杳杳山上閣道傍問耕者居雲之所作居雲倜儻士韁鎻不可􅅞讀書三十年議論寫不涸縱橫入衆藝深曉不止畧自笑與世踈囘首念岩壑安排事幽隱終老期此託結茅層巒巔退比籬下雀棲枝榜其號意豈羡鵬鴞時兹入岑絶􅀉憤滿寥廓江風拂危欄澗月滿踈箔獨横古溜琴居雲琴名遠意追淡泊蕭蕭􅂂霜操隱隱天外落􅂂霜居雲之所好彈者飄揚雜仙􅄜泛響度林薄其誰共高興唯此猿與鶴願言解塵纓一赴方外約朱康叔郎中棄官求母於金州因㑹華清宫作此詩送之蟠桃實在枝蟠桃花㔾飛相隔五十春一旦還相依康叔視金龜解去如糞土徒歩入嶤關金州取其母古人亦有此比之康叔難幾時有古人能如公棄官玉蓮仙宇中相㑹談此事使我發驚歎達曉不能寐借問侍安輿輦下何時過我欲率諸君扶服詣門賀蓬溪蘓令均利泉潜流蔽荒壤嘉惠鬰所施邑人念遠汲視此無以爲蘓君作之令大利收前遺一日㑹衆䤴玆焉發清漪旣㔾就新甃瓶􅇲何纍纍盡言彼汙濁豈爾同甘滋比戸􅀗美飮頌君皆一辭何以紀君德是泉無涸時􅁈婦行婉婉西隣女韶顔􅃩朝霞淑性自天與少小傳令嘉孝愛親黨重巧慧閭里誇其母最嬌憐看若眼下花自從掙冠笄未始離窻紗讀書佩箴戒舉止無纎瑕求媒不自審得壻非良家如以瓊樹枝使之並蒹葭憶􅀄行嫁時遺贈矜豪華明珠蹙袿裾雜寳裝簮珈餘貲詎可數但較輦以車其姑本寒種貪壑常谽谺得婦不問好求索惟無涯侍奉四五年呌物愈餓鵶百欲一不應用毒同虺虵豈惟被詬辱抑亦遭笞撾馳使執賤役課責日夜加手指盡秃􅏿􅁂髪仍髟髿一旦不任事病骨枯若槎委頓臥在床尙爾磨怒牙旣死亦不顧但恣攫且拏聞之道路人涕泗而咨嗟養女擇所適此事寧輕􅁘家法要相委在邇不在遐娉禮貴得中尚約不尚奢尊章若慈仁至死甘苧麻請看西隣女一失千里差林居宿髪未暇梳林居且辰詣鮮暉散清滴濕濕滿衣袂仄行盖前礙傾視因遠翳野意浩盈懷曾忘傲公退墨君堂嗜竹種復􅀞渾如王掾居高堂􅀝空岩素壁交扶踈山影覆秋靜月色澄夜虚蕭爽只自適誰能愛吾廬鑑崖山居有青崖平滑如鑑層崖瑩青瑶泠滑不可捫秋光發淨照林影揺晴暾飛瀑滌吟肺垂蘿清飮魂惟憂漬愁霖碎蘚來相痕宿超果山寺荒途涉沮洳危嶺升坡陁愛此清淨居不倦來徃多山僧見余喜㒹倒披乾陀引我坐前軒山果丹碧羅食已歩野徑新柔踏晴莎就石枕古稜依松執長柯是夕乃宿此東山吐圓波夜久不能􅄰禽蟲伴幽哦逹旦鳴落葉固非俗士歌岩猿與谿鳥應笑頻經過富樂山海師上人者何人富樂之禪客成都昔嘗見時巳坐法席别來二十年嗟此出處隔昨過芙蓉溪捨檝得携䇿盤盤轉危磴上叩金仙宅林間識􅀌標􅆊眼老愈碧引我翠壁下煑茗拂蘚石問之第二月雄辯發古譯無由從之遊不得蒙久益翻然入塵闠俛首愧名跡彭州南樓百尺壓城端飛簷欲上摶湖光揺埤堄山影轉欄杆秀野含春煦喬林擁暮寒囘頭大㟭雪千􅌇玉㠝岏大􅄌交師演古軒萬法一軒中周囘百座容曲燃簷蔔久横掲貝多重信士供晨鉢門人集午鐘何時聽雄辨幾柄換庭松新晴後溪樹隂灑然覽景成韻􅀨後溪水急晴光鬰如浮高林放䌓隂黮黮幢蓋稠麥熟桑椹好撩亂黃栗留咿咿動新蜩􅈰􅈰啼乳鳩晩策貪靜境緩帶成獨遊照影俯囘淵濯足臨漫流願言懷世慮逐此蕭灑休定知今夕夢不作塵土憂黃秀才北郊書堂吾邑固僻陋巉巉合群山苟無賢者居孰能營幽閑黃子治北郊勝絶收其間長溪斷谷口囂譁隔塵闤始至甚夷曠漸往頗險艱洞穴烟雲昏澗壑松桂環幽芳自芬馥野哢常綿蠻繚磴挂絶壁􅀌彴飛遥灣氣象奪天奥景物搜􅀑慳築室貯群籍軒窻􅆕孱顔朱黃列几按坐把古穴刪自取天爵高下視五兩綸處心固巳定詎恤時軰訕伊余素無似謬入文墨班前得省親歸屢此容追攀時亦竊講議始蹈賢聖關譬之拉虎豹所得纔一斑自愧鄙樸姿得渉道􅁩寰余亦有東谷對此何格頑毎來輙盡日須歩明月還讀楊山人詩秋高群山空衆􅄜吐天竅霜飇擊林野岩壑起哀嘂蕭蕭寒月下合若萬􅀑嘯疑是太古魂㗀㗀此中弔山人住中巘側耳得清峭譜之入文字滿卷泠雪照其聲太淒楚勁澁皆古調俗尚正淫靡惑者自夸耀山人持之歸無乃取眔譙㑹有知此音相逢當一笑巳師竹杖巳師杖竒竹坐亦不去手循摩瑩且􅕹痩骨何蚴蟉叢枝抱奇節兩兩相對走尋常出􅀌梢上下分左右如何此獨異天産固非偶師􅀄得之誰此實世未有不爲師所用亦共衆植朽願師勿棄置珍之比靈夀晚至村家高原磽确石徑微籬巷明滅餘殘暉舊裾飄風採桑去白袷卷水秧稻歸深葭繞澗牛散臥積麥滿塲雞亂飛前谿後谷暝烟起稚子各出關柴扉􅀨喜客過積􅀨無所詣十日不出屋故人念端居牢落如槁木高軒過窮巷下馬想慰沃載酒酡楊顔裹飯飽桑腹日暮從者散還尋舊書讀墅居不復入城市亂山圍一村雲霞供几席水石佐琴罇病久筋力緩眠多頭目昏無人來谷口苔鮮上松門東窻叢榆落碎鈿蔓柳樸輕綿麗畹暗紅霧曲堤橫翠烟嘉樹正隂合好禽新語圓東窻日巳滿猶托隱嚢眠大􅀨驚雲駕長風大􅀨灑九有崩騰百川倒豪怒一雷走茫茫草木亂隱隱岩谷吼高閣晝眠人覺來但支肘芹歎清霜入寒溪水迹落一尺飛沙上芹葉脆卷如燎炙􅀌根抱生意春澤守遺瀝願奉野人薦充君盤中實憂居憂居向山林蟲鳥日爲伍形骸乍摧剝骨肉慣辛苦蔬盤羞客至病榻厭人語地僻誰往還閑門閉深􅀨任氏鳴璫橋清谿漱碧崖衮衮寒聲落子川愛溪聲架橋橫絶壑山風撼松月倚檻聽噴薄遂號曰鳴璫古人無此作過友人谿居籬巷接菰蒲閑扉掩自娛水蟲行挿岸林鳥過提壺白浪揺秋艇青烟盖晚厨主人誇野飯爲我煑新蘆江上主人客路逢江國人家占􅀞圖青林隨遠岸白水滿平湖魚小猶論尺鷗輕欲問銖何時遂休去來此伴潜夫詠月見􅀃樓臺滿玉波中間惟只鎻孀娥可憐人萬二千戸毎到缺時爭奈何五十生平曾不事悠悠倐忽年華五十秋宦意文情俱淡泊可憐渾似李蒙州攬照耻將衰晚競青春強把圓波拂曉塵自笑年來鬚􅁂白王昭不解作官人梁景和隋氏廷中列百官幾人風節動朝端越公事􅀔炎如火獨有梁毗㑹􅃘寒何桂林十萬餘工造羽儀夾堤浮浪去參差堂堂送入江都去渾忘當年攬頸時􅌯吏管馬心何在排車意自閑問時將手板柱頰對西山錦屏閣閬州東圍十詠茂林斑若錦秀巘矗如屏底處供登覽䦨干在杳㝠清風臺無時來見襲有地更臨高坐客清談起紛紛落麈毛四照亭畫箔褰何礙珍叢發巳圓願公皆遍賞莫爲一隅偏柳橋挼風誇晚態垂􅀨怯春寒爲問題芳意同誰􅀝􅀞欄曲池水似珠璫入池如玉磬開臨流唯自適魚鳥莫相猜明月臺微稜生海角圓魄到天心共上唯佳客無容照俗􅁭三角亭合棟交生角囘欄互引牙由來因地􅀔不是故尖斜花塢繚繞穿紅蕚爛斑踏紫苔誰將錦歩障端爲使君開藥欄玉笋齊抽日金釭競列時自然俱可愛莫放􅀞􅄕垂郎中庵㔾築環爲堵仍裁月作床公來時隱几身世在羲皇丹淵集卷五終
