front:
  text: 陳眉公先生訂正丹淵集卷三十九
  hash: sha256:76ddf219f57432d93dade6d8774ebc449df7c771b3ded5b2966df87e4a00ae6e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_039-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳吳一標建先墓誌龍圖母公墓誌銘公諱某字某其先河東人鳳翔天興令贈太子中舍諱某之曾孫汾州介休令贈比部員外郎諱某之孫國子愽士贈刑部侍郎諱某之子也母裴氏累封長壽縣大君比部旣倦官未六十脫簮笏以去愛鄠杜美田望紫閣並圭峯築室灌園與其人上下擊鮮釀醇相招延爲林野之歡遠近附從之遂爲其􅁟人侍郎雖宦遊四十年而資尚恬泊不競回視其先人之高亦自引避居故廬讀書吟詩敎其子爲學公之昆弟時甚少巳皆有才名傾動關陜識者悉曰母氏慶門也不在彼此矣公生而聰悟不煩師訓閱經史造詞章能盡至其精工應天聖八年進士中其等調原州軍事推官州倚邊凡所處輕重索謀慮適當乃無事不爾或紛亂至有可以爲憂者殊與內郡政令不相􅀂其將旣用武人少曉此得公佽助裁講至去民夷帖帖無佗議轉運使李紘剛嚴介急遇其下未甞相從容獨以公爲才能渭州酒稅常課屢缺紘怒主吏不職議逐去且薦公領之公至以巳所入補前之不足主吏因免戾善罷公尚以其最得大理寺丞乃知京兆府櫟陽縣縣民橫猾好犯法號難治苐一而公以易術治之民自信約不得妄入公之廷下遷殿中丞移知卭州蒲江縣滿歲知􅀺州􅀺爲西南絕境越嚴道濵大渡連山如墻中斷一道州正扼其口乗高見卭部川聚落如餖掌上實朝廷所挂慮而擇人以爲守長之處韶書常以本道按察使視其部吏有長才善撫馭者薦充之故公得以行焉百蠻都王城歲駈馬過河抵公城中與中國相貿易摩撫有術則靡耳柔服如人一不厭其欲則嘷呼搏捽羣輩跳盪閭閧不能止此其常也公旣示以恩信其鷔桀不馴者擒戮之衆憚且愛二年無敢輙以疆語附譯者以及公轉太常􅀶士以侍郞憂去職服除還本官通判乾州林瑀守成州放手受賕不顧傍他鎻姦鍵惡密不可發包拯爲轉運使以威察自名顧無如瑀何然疾之甚願必以誅死請公攝其州得狀卽寘之獄公徃見瑀以數語伏其罪不務竒中而與法正相等瑀無􅢯衆咸允之遷屯田員外郞通判鳳州改都官員外郎移坊州州自唐渉五代節度使麤武􅁀橫訾用不法下禍部邑征稅關渡多設虛筭歛以殘虐因仍至今役鄕戸使典領其人得此卽破産以至一縷盡輸之官而未償者公曰桀法也吾豈􅃘􅀂前人坐視之􅁘上章極言請别立新課以下捄危亟朝廷從之坊人所以􅀗疽癤斷潰而肌肉完好者公惠也未幾召入爲侍御史甞賜對便坐公言帝王治國之本職在專求公相以自羽翼杜􅄛范仲淹不幸早去陛下左右自後所得如􅄛仲淹者幾何人雖有可用者皆􅀍散使在外竊恐陛下風敎自此無如先時仁宗大悟連復其所可用者朝論翕然嘉之二年除三司塩鐵判官㝷爲言事御史明年拜起居舍人知諌院淮南京西轉運使以賦外它錢貢上曰羡餘請不􅀠大農給中上將議賞公曰是兩道比佗財用􅀹爲不支苟非誅取􅃤橫安所出此如恩之是借吏手以推剥吾民之膚髓耳不可遂罷近歲士大夫多營占民田以自膏􅃳幸民向役出下估盡所有納之相尚無制而其諸所以徭於官者􅀒愈重去瘠取沃鐫蠧益􅁀公請限其頃畒各以官品裁約之議行上下以便國朝任子之令比前世最爲優典凡得以官歲上其名者數百矣入流旣繁仕路紛雜公深䟽其敝章下近臣會議􅀋皆顧已謂乆今遽更之不宜公持之益堅道利害上前卒得淸無慮歲減三百員其源少淸孤平者􅀗叙進公之建說有大體可行之爲良法皆􅀋此長夀從其少子官南岐且疾公亟請省視􅀗告日夜馳徃至卽以居䘮聞終制用前官充兩浙路轉運使未行改兵部員外郎􅀡史館知邠州數月授􅀡龍圖閣知梓州歲餘乞內郡得涇州轉工部郎中移充成都府路轉運使拜刑部郎中蜀􅁟醲演諸産極冨夥官之府庫日入歲受泉幣流溢公甞謂戍兵曰爾得賜帛與易之以錢也何利衆云帛亦貨諸市利莫如以錢便諸用外所售徃徃與官賈不相􅀡得錢且幸公曰吾募願者兩可矣用是凡得十數萬疋今上卽位大布恩賞事出不素它道悉配入民下旦暮高􅀡踴數倍百姓讙擾急欲求死而公部中以所甞居者當之閭里靜野無苛求猛督之旤事帖然濟矣永昭調用多目有司欲天下之財應所費疾􅀂星火公以法移蜀之積錢百萬衮衮相屬陸走三千里旦暮副其急大計以辦已而公且遘疾矣嘉祐八年十二月二十八日卒于宫舍享年六十公性端重寛碩質狀嚴偉望之岌然使人肅恭戒飭不敢慢墮而與之語議雍容委靡色和而氣温乆不能舍而去之也其爲郡邑專務䆒極隱敝與人興起長利故所去未甞無餘思居臺奏正皆中外所望以爲言者用諫􅁓不肯書奇譎么􅃈事以瀆上聽總大端發正論兾君相黙用之不設痕聲以夸露於巳也旣而一落外官頻年不歸視當年朋流巳翩翩上薄霄漢人悉以用公爲不當然而公亦自無一語爲戚戚先帝升遐日夕涕泣遂以病病遂以死而公甞所蒞之郡邑與常所徃來之人無不哀慟號􅑧云善人何􅀒天天奪之也何遽而不少假矣公旣死朝廷遣其弟沆乗驛迎其柩歸權厝於鄠縣以治平一年某月某日塟公于某所祔先侍郎之塋夫人王氏累封永安縣君男二人軻太廟齋郎十二歲輙試秘書省校書郞􅀂干歳女一人􅀂干歲沆以都官郎中爲陜西轉運判官好學有義行奉公之夫人與公之諸孤居長安事如母敎如巳子愈于公之存以某甞獲逰於其伯仲之間來請銘銘曰鎮東儉以忠殉魏後惡禍去丘爲民積流藏晶入幽閟宜發其裔洪以熾惟公生實世所兾厥中端完外恢粹學焉乆充道少試君􅂪其休民􅀍利􅆌然權財用􅂚旣卒以不幸讙衆欷馳詞窮天浩無寄其將興之比賢嗣太子中舍王君墓誌銘治平二年三月二十日有以笈携書而進立于庭下者問之曰長安王氏之僕來時主戒云汝亟徃廣漢問所題官居納之自去彼凡十二日走四十驛而至此矣余曰事必有不可緩者命受其書視其所以遠來見諭之意日希明不幸先人以去年三月十四日得疾棄諸孤于家今年某月某日欲舉其柩從祖母以塟于萬年縣龍首鄕鳳栖原之先塋竊念先人祿位不甚顯使志業不克燀燿于當時今巳矣􅀂非有以善文載其事寘諸壙中以信于人以傳于後世爲人之子者之所爲心乎如聞執事常以文章論譔人父祖之生平其子若孫得以實自以爲事父祖之道無忝矣希明雖未甞一見左右敢遣㒒持先人行狀以聞求數語以銘其墓使先人之靈不鬱鬱於地下希明死幸矣唯執事哀憐之其詞始未悽楚讀之殆不􅃘聞其所以云云者余曰噫斯人也耶甞憶皇祐初余在卭州幕時有以強幹爲轉運使所委徃來卭蜀間辦公事者此君耳余盖甞識之今其死而其子㓜不知余與其父有一日之素能踰重關越險棧於二千里外以是事見屬或拒之于情可乎乃爲綴次以慰其子云君諱紳字公儀其上世太原人唐未因官居閬中後復以官居長安三代矣君生十年以父䕃爲太廟齋郎自少喜讀書記問精􅀶爲詞章有條理舉進士不第遂調鳳州梁泉縣主簿初仕巳籍然以廉勤聞滿授漢州德陽縣主簿令老且惽都不省職事羣吏驕恣飜亂文法以欺枉吾民民不堪矣而君且至數日視案牒閱租賦攷徭役盡􅁀蔽隱悉伏其罪而一縣乃治轉運使張公掞明毅端肅少所推擇獨稱君才而數任之綿州百姓馮仁美兄弟訟田十年不能决公以此獄累君未浹日其情得爭語遂息雖其本郡邑之吏甞歴手者悉曰是善治此吾不及也公又俾其市五州絕戸遺田不數月􅀗錢四百萬內諸庫而民恬然無驅督之擾代歸授其州長豐令未幾以市田令轉大理評事知絳州正平縣會縣人行守事者有產占君籍中其鄰民張順探守意詣州言狀謂可鑿渠以引其水漑吾村地若干頃甚便守從之下縣如其議君亟至守所建利害百一于前謂不可行守怒趣君去决令開渠君抱笏徐起顧守曰渠則不可開令頭可斷也旣而守亦悟遂使罷君歸一鄕之民擁馬首謝曰我輩非公壓抑且死矣願爲公刻石以示吾子孫俾知公爲其父母衣食之也累遷衞尉寺丞大理寺丞知鳯翔岐山縣君之父度支甞治此彼人德之遺矩餘範君一守無易故居四年而民不敢以不可治之事干君去之日老㓜婦女皆奔走涕泣謂君何時復當此來也今上卽位轉太子中舍賜緋衣銀魚入朝授通判乾州事還長安遽得疾不起享年四十一君性孝友事母兄有聞千里閭􅍭光門有大第乃唐官寺之遺址老株巨石氣勢甚古偃蹇􅒞崒羅立如􅀞亭􅀚臺榭號一城之甲名公巨卿才人豪士徃來過雍未甞不下馬入門登覽嘆愛君少時與兄中隱君出入迎候游陪不厭人咸喜之君素􅀶給好辯論􅀹不憙狂詭而絶重氣節在岐山時有妄人鄒僅稱先生者自言八百餘歲歴游公卿之門好談人前世事立禍福以揺撼人人信畏之謂神人云不知凡幾年􅀒此術行於世矣過縣謁君君與語察其怪謬訶下麾左右縳寘獄問狀悉伏誣誕門外要官重臣交書下捄君置之一不省械送府恐懼以死訖無他異君故人國子博士劉祺自蜀解官歸至縣寓僧舍且病其子赴舉京師顧前後皆孱輭無一人可任事君親爲煑藥視食旦暮伺候且累日無少懈旣卒凡喪事一切具辦無有不如其至親欲奉其死者之意聞者嘉之君大氐所爲􅀋此亦足可紀也曾祖彬贈光祿寺丞祖識贈刑部侍郞父瀆任尚書度支員外郎三司度支判官母高氏封長安縣君贈尚書令瓊之女見君死遂􅃦疾後一年亦卒君娶舅氏引進使􅁇隆之女生五子日希明希傑希正希亮希益女三人銘曰於乎公儀命誰君尸與其才良而不壽宜人之于官其幾謂能如君之爲死有可稱身大位微奚足比方陵磨谷闐銘發愈光龍州助敎郭君墓誌銘君諱友􅀡字伯龍其爲人也和􅁉淳懿畛岸曠闊兩蜀士大夫與四方從宦於西南者於伯龍無有不識非伯龍之求之也而其人自以爲苟不識伯龍則爲徒至于此矣蓋伯龍善與人交又喜藏書書至萬餘卷謄冩校對盡爲隹本伯龍無不讀人問之者伯龍無不知所以人多與之遊伯龍亦未甞輙厭見其人所以善譽聞於天下將五十年景祐中􅀍薦試尚書省不第遂歸不復就舉成都學舍爲諸郡之冠聚生員常數百十人伯龍典事其中凡三十年敎導揖納上下信愛事􅁇母朱氏至孝朱甞病痺輭不立伯龍訪諸術士力求巳之遇隱者得火龍水虎之法轉授其母行之遂起體輕如風享年八十四而卒於兄弟􅀹友順不相狠䦧分􅀠貲產獨占其至下者後雖有所不足亦自無壹語之愠有識義之治平詔求遺書伯龍所上凡千餘卷盡秘府之未有者熈寧四年四月朝廷以伯龍景祐進士恩授將仕郎守龍州助敎一日忽召其子大年等曰吾生平以儒術承家巳而自知於祿位固不可以強干所以不求宦逹退居田里今天子念吾之老特賜一命吾其遂止此乎是年十月果以疾卒千家􅀄一日也伯龍旣爲累世令族之後內外親戚交友甚盛凡遠近慶弔伯龍未始後他人而至者才智敏給善酒戯辝吐如射坐客不能當至有叢吻急擊爭欲勝之者伯龍左右酬對愈辯而愈精四坐􅀏伏歎其俊銳死之日無不嗟悼之春秋六十四所著書有劔南廣記四十卷毛詩統論二十卷歴代㳂革樂書十三卷曾祖某祖某考其皆不仕母楊氏夫人宇文氏乃蜀之大姓某之女年二十一歸于伯龍閨閫儀範鄰里矜式相夫以義教子以學正順慈嚴無有未至先伯龍卒生四子大年大方大亨大受皆舉進士有名稱女二人長適太常愽士李彤封壽安縣君次適進士文惟幾孫男八人女八人大年以六年二月十日塟伯龍於華陽縣昇仙鄕俱利里先塋之次舉夫人之塟祔馬大年等以同爲姻家來求銘伯龍之墓爲之銘曰學無不深行無不淑夭胡嗇之弗􅂌以祿鸞羽鳯翼歛不得張有翾者微高鶱遠翔神道難知人理亦悖吾於伯龍一付茫昧所不巳者郁然淸芬更千萬年有信此文秘書丞馮君墓誌銘君諱某字某其先始平人在僖宗朝有官於蜀者廣明之亂唐統紊裂視世濁溺留避於此子孫蕃􅄛有居于普者五世祖紹卿於五代時以宗族門地雄于一州高祖諱光偉佐東川節度曾祖諱嶠祖諱元晏並潜隱不仕父諱某少舉進士以苦學􅀍病遂不顧舊業專治養生之術作詩百章道其事自號丹珠子年過八十無疾而終子三人君其長也君生而頴慧不憙他技未冠求師於成都是時任玠温如李畋渭卿皆以道義文章敎授諸生君執業門下並爲其高苐歸將試藝於其郡廷以干薦書而豪士惡子競以財賂占壓寒素不得一歩進于其下乃退而嘆曰是等也我安能與之以力相較耶於是收歛退縮芟去仕意僻居靜處討䆒羣䇿經深史隱鉤擿藏詣馳詞吐論坐者常屈閭里訟訴槩先詣君所平决以至不復更由官治而兩講解矣敎諸子事業悉有端次慶曆中其子今中都外郞如晦用其法一舉中進士君曰是吾門戸之大望自此子爾嘉祐􅀄以子官授大理評事致仕三遷爲秘書丞賜緋衣銀魚甞卽其居盛創亭宇榜之曰滎恩自作記道其所以􅀗當世爲人之甚幸者鄕人景慕之治平二年春中都爲晉原宰君以􅀟輿就其養晉原之治高出一道君實有所誨助間則吟詩飮酒日日不倦一旦召中都語之曰官居之樂誠樂矣然而吾之舊廬近常徃來於吾懷也汝當具吾歸裝宜無吾留十月促就道中都遂假檄侍還其家旣至亟遣去曰汝速徃無以吾累汝汝當憂民愼毋吾憂也自是日召鄕里故舊聚飮歡嘑歗歌愈益精徤諸子立左右忽顧之曰父母之年古人謂可以喜懼者汝等當知之吾受祿養幾二紀名復挂朝籍人能如吾者幾何此可喜也然吾春秋巳高汝能無所懼乎家人聞之錯遌皇惑問何以及此體中有覺不如平時者何所但俛首嘻笑不答又數日食飮漸不進求就枕􅉂目良乆以纊候其氣巳不屬矣遂終焉十一月十二日也享年七十五夫人趙氏同郡之甲族婉懿有善譽宗黨模其閨法四封爲壽光縣君生男六人三早夭次中都也次處晦用晦并舉進士有文行聞其朋流女五人適昌元解惟正都官員外郞景思問郡人周著進士景思永歸思問者先卒後繼之以其娣封永壽縣君孫男十人某某皆嚮習文藝孫女九人其十始嫁河南趙仲遘其孤將以三年二月某日塟君於樂至縣普安鄕之西山從先塋也中都與同有塲屋之舊走僕詣同求銘其墓爲之銘銘曰孰不種善君穫其多􅍕然而歸所少謂何子官曰榮學者愈侈君所常望乆焉益偉人生世中超跌百端如君􅀄終十八尤完老安先廬沒集舊兆更萬千年銘永其詔丹淵集卷三十九終
