body:
  text: 宋尚書司封員外郎充秘閣校理新知湖州軍州事兼管內勸農事上輕車都尉文同著海虞毛􅀳子􅀳長洲吳一標建先奏狀奏爲乞修洋州城并添兵狀右臣切見本州守治之所正居漢水之上川陸平衍廣衺千里東北諸山縈帶聮屬徑路盤屈􅂩穴深逺上通荆楚旁出岐雍其中所産濟人急用之助品目甚衆旦夕贏輦道路不絶閭巷并邑百貨填委實四方商賈質易畢至之地衣被秦蜀有足仰者漢唐之際巳名重郡然而至今有所不能稱是者城池庳漫全不如事不知幾年㓕裂爲此苫茅累土宛􅀂䑕戯缺漏頺落殆不可睹姦庸取罪常在跳越倉庫所􅀉僅同空曠臣自至此卽謀增葺患無兵夫不能施手毎一慮至沉唫終日伏以國家設州郡列官府具儲蓄養士卒大抵本以爲民故如此其備也夫何此州當􅁭喉要害之處而顧無壁壘壕塹之防以保護之譬之於人也筋骨雖云完固而皮革日巳爛墮將何以爲􅀒恃而能使其中安且乆耶一體旣􅃜事不宜矣伏望朝廷慰念􅀺庻軫恤遐逺特中旨許令修築度其工力了不至大庻使郡國制度無有一物廢闕亦有俻無患之深計也臣又􅀼見管内三縣疆境絶爲曠闊高山深林蔓衍重􅃨􅀡與巴逹金鳯永興鳯翔等處脣齒相宻其逺者有至五六百里近者亦不下三四百里中間有如子午駱谷之􅀋斜通􅀡逹徑路不少私商暗旅出入如織逋姦隱罪萃爲淵藪嵓谷之民孱愞畏事迫於衆􅀔遂爾囊橐所居幽僻人不敢問旣因全無防守所以難爲檢遏臣愚常此過慮忽爾蜂驚䑕駭妄肆螫齧散走巢窟出白爲􅁀呼集除盪形影不及亦須數日爲之擾擾徃日光化軍近年慶州叛賊悉趨此路謀行於蜀是時西南郡邑聞風震聳頼以朝廷威靈元元之幸而卒以就敗然而此州旣爲凶盗累伺其􅂩是後恬然不爲之俻至今􅂄甿宿吏語議及此則無不人人咨嗟嘆惋是知如此與他州别郡封壤按聚隘阸奔衝之處平時常宜預設保禦之方其或事有萬一臨時取具必然手足錯亂不相捄應前無兵而後無城未免一方人心不得不使之旦夕恐懼而莫如之何也巳臣今欲乞朝廷特賜詳酌更添置武寧一指揮或且先於諸處那屯三五百人常令住此不許差出以俻緩急驅使如此則上可以紓朝廷之憂下可以慰百姓之望臣職任守土理當建述此二事者伏望眷慈不罪其狂瞽而留意焉謹具狀奏聞伏候勑旨奏爲乞改陵州州名狀右臣自到本州求州之所以得名之由據地志云自秦至齊本犍爲與蜀二郡之地在梁常爲懷仁郡西魏時始改爲陵州因境內有陵并故名焉陵井始後漢張陵開興因陵名遂以名井後復因井名以名其州隋雖易爲隆山郡唐又以爲仁壽郡至乾元中復以爲陵州遂因仍至今矣按陵本沛人世有别傳載其異事者尤多臣不敢以聞然觀其爲井之功實亦非常人所能建置此州之民旣頼之以爲生復畏之以爲神凡過其祠廟及道其所以昔日爲井之事皆懔然加肅不敢少懈如在其上與其前後􅀂是之恭也國家亦􅊋仰其所利以贍給諸郡凡三載郊禮頒賞軍校一切皆於此取之是所謂有功於國而有利及民者也但今以其名配井與州而使其下􅀒薪芻操瓢囊者無男子婦人稚㓜耈老之屬日日道其名千萬在口臣愚竊謂州取其名於國體固無嫌􅀂屬之斯民臣恐於義或有未安者巳臣聞晉羊祜開府南夏惠流百姓後人諱其名爲改戶曹爲辭曹王舒除㑹稽內史舒言其父名㑹求換他郡朝議以字同音異不許舒云音雖異而字同乃特命以㑹爲鄶授之唐陽城號卓行商山道中有驛曰陽城元稹過其處易之爲避賢孟浩然獨能詩襄陽有浩然亭鄭諴爲刺史更其題曰孟亭此意皆謂賢者之名當與隱避不欲使其下常斥之也載在簡牒以爲佳論讀者皆謂當時所舉宜矣今陵方之數子其功利蓋亦施于無窮有足尚者累世襃贈實有封號朝廷亦嘗因其他郡遺蹟建宮養徒俾崇奉之是則豈有國家所以存録能立豐功厚利之人而此州之民素蒙其休顧顯然無一忌憚咸得以名而稱之哉雖然千有餘年其民侮慢輕凟如此至於聖世始歆然􅀂有感發隂期祕數無乃將有所待者耶伏遇皇帝陛下光明盛大之德紹鞏固綿長之運順考古道尊尚賢哲􅃇者修之廢者起之合理當義無不條舉此者伏望聖慈埀仁降惠上嘉古昔山藏海納恕臣僣易下省臣章俯遂愚情特開宸旨别賜州號庻使此方之人存上下尊卑之體巳徃之靈受光華丕顯之賜百王未正之典千載不行之事自陛下今日正之行之爾豈獨光昭史策彰示萬世亦以知陛下不棄下臣之言而特明前人之德矣干冐宸扆俯伏待罪臣無任狂越恐懼激切屏營之至謹具狀奏聞伏候勑㫖奏爲乞置興元府府學教授狀右臣自到本府遂詣學舎􅀧檢見其處所􅄶狹僻在城下屋宇卑陋殆不可入其中生徒小大裁數人而巳臣因詢問僚屬并徧訪左右所以如此不振之由皆言本府自唐末以來並無諸科修學及第之人從前毎有科塲皆是外州軍進士暫來就此假籍寄應縱􅀗薦到省皆下第無成遂各歸還本貫不復住此修習所以其民便謂讀書無効更不從學近歲府縣雖稍有士人應舉終是素無師範所肄之業多不能上合新格臣初觀本府山川人物土風次第與東西二川大抵相􅀋彼處雖至小州郡進士常不下三百人而本府邑屋冨盛人民繁庻􅀂此豈無秀異可教之士以俻官使但自來上下因循相與廢墮使朝廷風教獨不霑浹寥然一方遂絕文采深可歎也臣伏見本府司理叅軍潘行自熈寧三年到任乃權府學教授行能爲之講說經藝教其對答大義誘掖後進孜孜不倦日授月試皆有條緒近日府縣子弟翕然盡願入學至於外郡士人聞之間亦漸有來者以此見人之趨嚮善道悉由勸奬訓勵儻得其心有所服自然不可制禦而卒至成業矣行今來舉主考第並巳該磨勘來年正月滿當解罷臣􅀼慮行去之後俾他官承乏料學者之所悅從未必有能如行者臣兼體問得本路興洋利文龍等州雖有進士徒具名爾其人亦嘗自患所居僻陋難得師友臣欲望朝廷勘㑹本府并前件五州自來實係少有舉人修學及第之處乞賜詳酌特置學官就與行改轉使正充本府府學教授所貴一府五州之人悉得就近修學不三二年當盡變此俗燦然與天下士人相侔矣臣職在守土所治之下或有可請不敢自黙臣無任恐懼激切屏營之至謹具狀奏聞伏候勑㫖奏爲乞修興元府城及添兵狀右臣竊見本府自三代巳來號爲巨鎭􅆠理所屬正當秦蜀出入之會下襃斜臨漢􅃆平陸延袤凡數百里壤土演沃堰埭棊布桑麻秔稻之富引望不及西南逾棧道抵劍門下􅃐成都岐雍諸山􅃒迾東北深蟠逺跱孕畜雲雨罅道百出相拱加輻逺通樊鄧旁接秦隴貿遷有無者望利而入􅃇制中州之人不得乆居於此今復㢮禁一切不問故四方來者頗自占業􅊋習異尚雜處閭里天下物貨種列於市金繒􅃮枲衣􅀍他所近歲洮河所仰茶産鉅意公糴私販輦􅀒不絶誠山西浩穰之粤區而朝廷所宜留意之劇地也然而事有未稱體有未俻者城與兵而巳矣城嘗度之其縱廣亡慮二十里􅋻薄毀䧟乆不營葺姦窺盗越易如短屏兵雖合聚群戌所數裁滿五百罷病孱弱下車者半分􅀠他役常非此有近復調赴文州今所留者甫二百餘人爾况一城之中民屋錯比連甍接宇可數萬計生齒雜遝塡斥坊閧臣常自顧亡狀誤蒙朝廷采用重委符守班條之暇静慮及此輒謂以如是不甚堅完之城與如是不甚齊一之兵欲控制遐逺影援邊徼保䕶井邑衆庻防固宫府儲峙􅀂止用此且恐事於臨時萬一有不副國家所以設城置兵之本意也臣毎一念此食輟輟而􅃦去枕者屢矣伏惟陛下自踐祚巳來于今七年􅂚嘗不一日孜孜安養元元者爲政理之急未治者旣治之矣巳治者復爲之立不可廢壞之法􅀘缺綻漏大小咸輯下聽不倦有宜則應臣是以敢持二者之說仰干宸扆伏望陛下不以臣疏賤而幸録其言願賜參可下詔有司遂俾如事修絫雉堞增屯營伍以赫威靈以壯制度沮邪謀定衆志安固基本萬世不動亦所謂先定應猝豫俻不虞之善計者也臣職在守土諸無報稱惟是所見不敢噤嘿臣無任僣易妄越惶恐激切屏營之至謹具狀奏聞伏􅀱勑㫖奏爲乞差知洋州一次狀右臣伏蒙聖恩除臣知陵州得一年十箇月後因改州爲監復蒙就差知興元府今到任巳及一年五箇月臣昨在陵州推行新法並成倫緒僅免敗闕自至興元府凡幹當過諸般後來續䧏指揮等事亦無曠廢盡爲兩路按察臣僚薦舉以臣頗爲辦職今來臣替期非逺切慮朝廷不乆差官代臣赴闕臣日夕惟念般挈私計實以家貧累重食口稍衆分减寄寓頗難區處臣此者愚妄輒覩八路新勑盡許指射連併差遣臣知洋州一次情願閑居待闕况臣出於畎畆粗諳民間細務幸臣未甚衰暮之時少願傾竭犬馬疲駑之力夙夜勉勵所屬僚吏宣布陛下德澤於一方百姓以圖上報國家所以養育賤臣無涯之惠臣自知才智淺短不可更俻他使惟是一郡之政猶能奉行陛下條詔不致違失伏惟陛下哀憐特賜天地生成之恩俯從私願臣惟願忠義以荅萬一干冐天威臣無任伏地待罪惶恐激切屏營之至謹具狀陳乞以聞伏候勑㫖奏爲乞免陵州井納柴狀右謹具如前臣自至當州訪問得所以爲其民之深害乆而不能去者惟管內仁壽等四縣百姓毎歲輸陵井監煎鹽木柴共計三十八萬四千二百餘束也當時立法但以五等人戸毎稅錢上以二文一分科令納柴一束故其等高者不下千束雖下戸亦三二十束矣其柴􅀂常時私下貨賣自可毎束􅀡三四十文足錢官中曏亦以其不易毎束更支鹽六兩後來常見其􅃜損百姓不復支鹽􅁍改毎束與見錢七文五分是官中大約破九文巳來貼折民下三四十文柴一束矣其百姓所得者貼錢悉爲出旁引􅄃之人諸頭銷使㝷亦隨手散盡又官中科配盡須要納乾柴其百姓自一夏巳來以􅁞麥務忙不暇更豫先營置放令乾燥皆於二稅欲起之時若本家田內所產之少則須望林囘買生濕雜木翦截齎擎上州赴塲送納依自來體例願以兩束折納一束是三四十文一束之柴又只止得四文有餘矣加此倍之則近納七八十萬束生濕柴也偏州小縣盡是山坡田土瘠薄别無他産而毎年於二稅送納疋帛斛斗并科買紅花紫草出助役還青苗之外又復有此七八十萬束木柴之役比之他州此方之民實􅀍其苦臣子細體問得二十三年巳前夲州止有官井數處所銷柴茆苦不甚費其價亦不至高大自許人開作卓筒之後部下至今巳及數百井故栽種林木不能供得公私採斫以至山谷童秃極望如赭縱有餘蘖􅂊及丈尺巳爲刀斧所環争相翦伐去輸官矣人旣匱極草木亦不得盡其生意又縁當州地皆險惡徑路狹隘磴道齟齬不通輦運臣嘗屢至納柴之處見所輸之民無老與㓜皆悉荷􅀒有縣界闊逺奔走百里之外陟歷深阻忽値霜雪風雨衝冐寒滑加以期限相逼勢不能止攀緣隕越飮食失所以至肩踵皸裂衣裳穿露身體尫瘠都無人色吁嗟之聲充溢逺近自冬及春正是他處百姓皆能有所休息之時而斯民重困狼狽如此臣常惜太平之世而尚有此無􅂓之人其􅁦衆所共知但謂官自前鬻巳來無術可以捄得此者􅀂非朝廷慱䆒民間疾苦欲盡􅁵改使之蘇息其患終無有日休巳者矣􅁦極必復今正其㑹臣伏覩詔勑遣使專務與民興除利害諸色􅂣務並令人占買以寛分外陪費臣今管見輒謂官中雖有陵井止能供得成都府一路州軍公使軍食等鹽外並無略有所􅀗雖言招召客人將絲絹展博其本監日煎鹽色皆是先巳支過諸州軍毎年所定合銷綱數更無贏餘見在以俻客人入中臣愚欲乞朝廷特下指揮令夲路轉運提刑司一就用出賣酒坊體例先爲相度擘劃諸州軍公使并軍食等鹽乞不於本監支給召人買樸上件陵井監官中自可端然收納羡利臣當試約之除餘利可以霑及買樸人外依卓筒小井課利用五分折納錢絹官中並無糜費歲可􅀗一萬三千八百餘疋絹帛并見大錢七千二百餘貫及免得酬與監中主當公人等一十一處塲務及監內諸般銷費共一萬八百餘貫其餘外州軍般鹽綱後酬奬尚不在其數內如此則七八十萬束之柴能害於民者盡去而五六萬貫之錢能利於國者盡得矣豈不稱朝廷愛養元元之意哉臣忝被國恩來守兹土斯民之病職當救療亦欲少以愚慮上報朝廷遣臣爲此千里之民長吏之意爾臣之所見止爲四縣百姓有此積乆輸柴之􅁦未嘗有人爲之言者臣今旣知矣豈敢緘嘿實恐上􅀒委寄循滿而去尸此祿食非素心也所有本監委曲事狀如􅂪朝廷􅁢臣所奏下本路相度臣自一一纎悉窮䆒利害本末供報今不敢以叢脞煩碎之事畫一條陳上凟聖覽臣無任誠懇迫切恐懼彷徨之至謹具狀奏聞伏候勑㫖奏爲乞差京朝官知井研縣事伏見管內井研縣去州治百里地勢深險最號僻漏在昔至爲山中小邑於今巳謂要劇索治之處蓋自慶曆巳來始因土人鑿地植竹爲之卓筒井以取鹹泉鬻錬鹽色後來其民盡能此法爲者甚衆遂與官中略出少月課乃倚之爲姦恣用䥴琢廣專山澤之利以供侈靡之費訪聞豪者一家至有一二十井其次亦不减七八曏時朝廷嘗亦知其如此創置無巳深慮􅃦乆事有不便遂下本路轉運司止絕不許容開造今本縣界內巳僅及百家其所謂卓筒井者以其臨時易爲藏掩官司悉不能知其的實多少數目毎一家須沒工匠四五十人至三二十人者此人皆是他州別縣浮浪無根著之徒抵罪逋逃變易名姓盡來就此傭身賃力平居無事則俯伏低折與主人營作一不如意則遞相扇誘群黨譁譟筭索工􅀡􅅯蹇求去聚墟落入鎭市飮博姦盗靡所不至巳復又投一處習以爲業切緣井戸各須藉人驅使雖知其如此橫猾實亦無術可制但務姑息滋其狡暴况復更與嘉州并梓州路榮州疆境甚宻彼處亦皆有似此卓筒鹽井者頗多相去盡不逺三二十里連溪接谷竈居鱗次又不知與彼二州者工匠移人合爲幾千萬人矣幸今累歲豐稔無少間􅂩縱有疆獪自安飽暖萬一或恐遭罹歉旱民下艱食此軰當不肻更顧一役之利必能相與唱和跳梁山谷間化爲盗賊耳當是時彼井研者區區小縣一二選人爲之令佐將何以禦之哉此臣所以日夜置心於其間不能少忘者矣臣愚不避誅責欲乞朝廷指揮下本路轉運提􅀧刑獄司相度許令二司今後於京朝官中舉清彊明斷有吏幹之人爲知縣仍乞令陵嘉榮等三州各出三五十人兵士俾兼領之所貴藉此威靈厭伏其衆自然群小之心有所畏戢此亦所謂戒不虞防未然之一慮也臣才術淺陋猥􅂪任使一州利害臣宜知悉凡有所見不當自隱伏望聖慈下采愚論特賜詳酌施行臣無任妄越恐懼激切屏營之至謹具狀奏聞伏候勑㫖奏爲乞鑄陵州團練使印狀右謹具如前臣勘㑹本州􅃇爲軍事問其父老云自淳化中因草冦擾蜀凶熖熾猛劍南列郡不隨其燎而爲之燼者十纔二三陵其一也當時實以知軍州事張亶能率其衆共力禦之旣爲完城遂不汙賊朝廷嘉奬故特以團練之額襃名其州雖然但未暇賜印因循至今臣伏見天下團練州軍凡有移牒相關至此考其印文皆有使􅂐獨惟當州尚無此者稽諸故事疑有所闕臣不言上事如未俻伏望聖朝念兹常典乆爲廢墜欲乞指揮有司創鑄頒付行用庻使威靈充浹文采完具增光偏州善守之實埀慰斯民效順之望干冐宸􅂨臣無任惶懼激切屏營之至謹具狀奏聞伏候勑㫖丹淵集卷三十四終
