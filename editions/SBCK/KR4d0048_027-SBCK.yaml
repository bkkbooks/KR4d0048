front:
  text: 陳眉公先生訂正丹淵集卷二十七
  hash: sha256:825a25a33f2b72b1607cdd38fd3ca661941312bb19bc973bf22fee3dcd9914e4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_027-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳呉一標建先表賀斬儂智高表臣某言伏覩進奏院報狀巳斬儂智高訖蕩除妖氛天地以肅翦撲兇醜寰瀛甚安凢在聽聞孰不懽快臣某誠慶誠忭伏惟皇帝陛下機與神密道如天高威靈風雷慈惠雲雨國以內外盡陶醇醲物之生成皆荷覆育宜無獷悍之俗上黷寛仁之尊而儂智高者生於窮涯禀者盩氣善敎不率狂謀自將嘯聚九眞之徒跳梁五管之地尾掉蜂蝎脣張豺狼驚驅我民人搖撼我州邑陛下震動英武鋪宣睿謀暫迀材臣略舉銳士大號鎭壓羣頑遁逃奔流它方寄託微命然且質其親愛許以來馴何梟性之不移但狸蹤之自遠憬彼蕃服憚于皇家姦而弗容衆所共憤乃盡誅其殘孽仍遠告於中區掀揚曀霾芟刈繁穢是宜兼以母弟尸諸市朝大正嚴科了無遺種傳命下諭有生咸知四夷之魂盡飛萬國之手皆舞兹焉盪滅永矣恬寧臣限守邊州不􅀗奔詣闕庭臣無任瞻天望聖喜忭激切之至謹奉表稱賀以聞賀聖體康復表臣某言今月日本州進奏官任中立狀報聖體康復於二月二十三日御延和殿親見羣臣者嚮以皇躬忽嬰美疢勿藥有喜大易載無􅄭之文自得爲功內經明適性之說仰聆安豫俯積欣歈臣某誠歡誠忭頓首頓首恭惟皇帝陛下乗熈明之期荷富盛之業抑畏萬務焦勞一心無逸豫以爲懷有憂勤而自戒懔乎居海㝢之大􅅥若奉祖宗之休乃身氷淵所事霄旰屬履三陽之候偶差六辨之和而九廟護持萬靈綏祐僅逾旬浹已復恬寧親臨中宸燕見庶列氛祲蕩滌天地所以廓淸霾翳歛藏日月所以光耀輿情旣悉黨議相驩況今遐邇乂安左右賢哲願裁思慮游神淸燕之深庶召嘉祥享國厖鴻之永臣幸逢聖旦忝受􅀖恩限此守藩無由詣闕臣無任瞻天望聖喜忭激切之至謹奉表稱賀以聞賀乾元節表臣某言臣切以綂當大火聖人乘而上臨月在正陽眞主禀而下降寰宇遇乎嘉節黎庶陶乎盛時和聲激揚協氣充衍臣某誠歡誠忭頓首頓首伏惟皇帝陛下合天地之粹慿祖宗之休誕靈中區撫衆率土纉世而治歴年以深仁恩滂洋德敎醲厚顧羣萌常願於崇報盡衆美難酬於極尊唯逢慶辰乃祝睿筭巍然而峙者山嶽浩然而流者江河齊同乆長無有窮盡臣被惠累世叨榮遠藩限守符章阻陪班列遙望天闕臣無任頌神禱聖踊躍忭蹈之至謹奉表稱賀以聞賀恭謝禮畢表臣某言今月十二日大慶殿恭謝禮畢大赦天下者講盛大之儀三靈集祐沛厖鴻之澤萬㝢蒙休鍧隱歡聲之馳熏烝和氣之發浩若九土熈然一春臣某誠歡誠忭頓首頓首伏惟皇帝陛下紹㑹千齡之期乗臨百世之綂崇立禮樂而標于永古燀明制度而盛于前朝念天地生成之深必謹精純之饗惟祖宗功德之茂當崇配侑之文爰諏季商遂就􅁻卯具祲容於廣殿協大報於圓丘􅀖浸融國典􅀹備顧惟巳事㳂此推恩思與元元之繁共均簡簡之況號令迅而風下仁慈滂而􅀨流臣幸遇昌辰屬臨遠郡卽時分告縣邑輯呼軍民宣揚聖謨曉諭上德傾帑藏之厚賜挺狴牢之衆辜坊歌巷謡耄舞稚蹈悉能祝陛下享無疆之壽願陛下隆不㧞之基羣口皆然累日後巳臣限以職事不􅀗陪賀闕廷無任喜忭激切之至謹奉表稱賀以聞賀明堂禮畢表臣某言伏覩今月二十日赦書到州祀明堂禮畢大赦天下臣巳於當時呼集官吏軍民宣讀曉諭仍下所屬縣鎭施行訖者禮行路寢講昭曠之文詔下中區霈汪洋之澤頌聲飽滿叶氣熏烝天子修大饗之儀史臣書盛德之事一朝鉅典萬世洪猷臣某誠歡誠忭頓首頓首伏惟皇帝陛下纂嗣慶基修崇徽屋度越虞華之孝增高商乙之仁以謂展三載之精禋存五聖之舊矩顧惟仁廟之世甞奉合宮之祠念將循仍俾罔譌墜以示降神之重以彰配帝之嚴精䖍致誠靖謐終事將均禧於四海爰發號于九關盪垢滌瑕赦過宥罪陳租乆債潜烈幽功咸在此時盡蒙其惠乾坤㤗定日月清明諸產昭蘇太龢充浹臣方當盛旦出守遐州雖不能陪在位以駿奔實亦幸與斯民而宣布臣無任瞻天望聖歡忭踊躍激切屏營之至謹奉表稱賀以聞賀同天節表臣某言伏以月正乎陽體六爻之剛徤日盈其數具五位之生成聖人所以出而爲乎大君上帝所以命而撫乎下土嘉辰在且綿㝢皆歡臣某誠慶誠忭頓首頓首恭惟皇帝陛下文備堯明智兼湯勇無治不究有爲必成自履廣居益新大業立帝王之紀將欲度三皇之先齊天地之休豈止饗億年之乆常臨大寳永覆羣生臣乆去明廷叨居遠服屬縈采組是爲有守之官仰薦壽觴徒祝無涯之筭臣無任瞻天仰聖激切屏營之至謹奉表稱賀以聞賀同天節表臣某言臣聞天之所以生聖人蓋表章於後世國之所以得明主期保祐於斯民乃宋重熈惟皇嗣守在傳而盛德天縱居尊而睿謨日新故得荒忽之遐辟陋之衆泳游帝渥重灼皇明逢慶節以在兹載歡聲而無巳臣某誠歡誠忭頓首頓首伏惟皇帝陛下繼堪輿之大紹宗祐之休上帝鑒觀羣靈擁衞是故月臨干巳六陽儲純粹之精日浹於旬五緯合生成之數誕彌聖質對越昌期所以静淵疏通剛徤中正齊堯等禹軼漢踰唐文淳武嚴惠敏威肅雖然舉四海之內願報於帝力極萬寶之重豈酬於化功惟於降聖之辰共祝同天之壽臣幸陞仕版竊玷儒林屬紆郡紱於遐垠阻綴朝裾於廣摵願言致頌與世同辭臣無任瞻天仰聖激切屏營之至謹奉表稱賀以聞賀正旦表臣某言天道運四時之功惟春曰首王者布萬方之政以歲爲端大和發揚庶彚蕃蕪羣靈儲甚盛之祉兆姓禱無窮之休至尊乘之諸福備矣臣某誠歡誠忭頓首頓首伏惟皇帝陛下禀五精之粹㑹一氣之元襲九廟之丕祥荷八殥之大綂日躋乃聖天祐其仁諒臨御於三朝固昌延於億載臣方當盛且出領遐州阻陪漢㑹之朝徒祝堯封之壽遙瞻象闕限守魚符臣無任望天祝聖激切屏營之至謹奉表稱賀以聞賀冬至表臣某言天地旣復示一陽生物之端帝王其乘饗萬壽集躬之慶惟是撫內外之臣庶於以禱􅀖家之福禧盛德溥將綿區永賴臣某誠歡誠忭頓首頓首伏惟皇帝陛下荷堪輿之寳籙承宗祐之神基睿謨益新聖度愈遠皇明徹乎幽隱惠澤浸乎洪纖遇此昌辰備諸景貺臣蒙無任望天祝聖激切屏營之至謹奉表稱賀以聞賀冬至表臣某言天地旣復示一陽生物之端帝王其乘饗萬壽集躬之慶惟是撫內外之臣庶於以禱􅀖家之福禧盛德溥將綿區永賴臣某誠歡誠忭頓首頓首伏惟皇帝陛下荷堪輿之寳籙承宗祐之神基睿謨益新聖度愈遠皇明徹乎幽隱惠澤浸乎洪纖遇此昌辰備諸景貺臣蒙恩守郡待罪踰年拜綵仗之前阻聯華貫望矞雲之下徒想淸光臣無任瞻天仰聖激切屏營之至謹奉表稱賀以聞爲楊侍讀謝官表臣某言才短而治劇務或解去則甚安學荒而爲近臣若忝冐則誠愧譲避不􅀗兢危以居臣某誠惶誠感頓首頓首竊念臣素無它能本自􅀌立天授介狹世名拙方偶塵宦遊誤應官使約已以道豈敢謀身而自營納名於忠常慙報國之未効命與羇躓職多曠􅈥惟賴聖神之知屢寛罷軟之責嚮蒙抆拭使辦要煩召至外臺入陪㑹省簿領倥􅘓財賦浩穰顧區撥以非能慮譴斥而不暇止幸滿歲將從外官甘終散僚分絕榮路伏遇皇帝陛下黼飾治道興崇化原簡求多聞登采衆善演導聖智鋪宣神猷天閣之嚴署才臣而訪問書殿之秘列儒官而講陳此之淸聯當以碩望況今􅂄雋在列吉髦盈庭宜親通才用副嘉選或下授於孱鄙實有辜於選掄然臣少雖從師乆巳廢業性弗解而自蔽心不磨而愈昏古今之宜究極而未至典籍之奥討論而莫精將何以上補宸聰遠答天眷重煩綸綍難避於新恩退伏縑緗復㝷於舊學庶盡一節少禆萬分臣無任感荷慚􅂲激切屏營之至謹奉表稱謝以聞丹淵集卷二十七終
