  text: 丹淵集附録諸公書翰詩文
  hash: sha256:410affb151cfa567492f88cd57db489e0048daf3fca4232a3d5d90771dc06bf1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_045-1a}
body:
  text: 蜀內江李應魁務滋甫纂吳長洲呉一標建先甫校小簡司馬光某再啓特承寵惠詩序石刻􅄅然想見與可􅁭韵游處之狀高遠蕭灑如晴雲秋月塵埃所不能到某所以心服者非特詞翰之美而已也某再拜小簡趙抃某别啓向以蕪㫖况聞承未鄙誚過有稱肯副之佳頌爲况讀復數四益用感􅇺其理明語快到古作者第歎服而巳何日珍集下懷瞻詠不宣某祗拜送與可通判卭州詩范鎭半刺爲官美臨卭自古名何言緹軾寵更侍版輿行仙藉新年貴賔僚舊日榮壺漿故父老應在半途迎送知湖州浙西古名城號稱水晶宫史君老手筆文字窺化工江山乆有待瑩潔如磨礲堂階走淸渠珮玉鳴丁東臺觀靣衆巖擁抱開屏風遥知到未幾都下傳詩筒西南四麾守一一獄戶空今行定論最歸來掖垣中送與可通判卭州王安石文翁岀治蜀蜀士始文章司馬唱成都嗣音得王楊􅕸􅕸漢守孫千秋起相望操筆賦上林脫巾選爲郎擁書天祿閣奇字校偏傍忽乘駟馬車牛酒過故鄕時平無諭檄不訪誓羅祥問君行何爲關隴正繁霜中和􅂇宣布循吏綴前芳豈特爲親榮區區夸一鄕送出守陵州蘇軾壁上墨君不解語見之尚可消百憂而况我友似君者素節凛凛欺霜秋淸詩健筆何足數逍遥齊物追莊周奪官遣去不自覺暁梳脫髪誰能􅀵江邊亂山赤如赭陵陽正在千山頭君知遠别懷抱惡時遣墨君解我愁和與可洋川園池三十首湖橋朱欄􅀞柱照湖明白􅁑烏紗曵􅂂行橋下􅀛魚晚無數識君拄杖過橋聲橫橋貪㸔翠蓋擁紅粧不覺湖邉一夜霜卷􅁍天機霜錦叚從教匹練寫秋光書軒雨昬石硯寒雲色風動牙籖亂葉聲庭下巳生書帶草使君疑是鄭康成冰池不嫌冰雪遶池㸔誰似詩人巧耐寒記取羲之洗硯處碧琉璃下黑蛟蟠竹塢晚節先生道轉孤歲寒惟有竹相娛麤才杜牧眞堪笑喚作軍中十萬夫荻浦雨折霜乾不耐秋白花黃葉使人愁月明小艇湖邊宿便是江南鸚鵡洲蓼嶼秋歸南浦蟪蛄鳴霜落橫湖沙水淸卧雨幽花無限思抱叢寒蝶不勝情望雲樓隂晴朝暮幾回新巳向虗空付此身出本無心歸亦好白雲還似望雲人天漢臺􅃞水東流舊見經銀潢左界上通靈此臺試向天文覔閣道中間第幾星待月臺月與高人本有期挂簷低戸映蛾眉只從昨夜十分滿漸覺冰輪出海遲二樂榭此間真趣豈容談二樂并君已是三仁智更煩訶妄見坐令魯叟作瞿曇來詩云二見因妄生灙泉亭聞道池亭勝兩川應須爛醉荅雲烟勸君多揀長腰米消破亭中萬斛泉吏隠亭縱横憂患滿人間頗怪先生日日閑昨夜淸風眠北牗朝來爽氣在西山霜筠亭解籜新篁不自持嬋娟巳有歲寒姿要㸔凛􅏮霜前意須待秋風粉落時無言亭慇懃稽首維摩詰敢問如何是法門彈指未終千偈了向人還道本無言露香亭亭下佳人錦繡衣滿身瓔珞綴明璣晩香消歇無尋處花巳飄零露巳晞函虗亭水軒花榭兩爭妍秋月春風各自偏惟有此亭無一物坐觀萬景得天全溪光亭决去湖波尚有情􅁍隨初日動簷楹溪光自古無人􅀞慿仗新詩與冩成過溪亭身輕歩穏去忘歸四柱亭前野彴微忽悟過溪還一笑水禽驚落翠毛衣披錦亭煙紅露綠暁風香燕舞鸎啼春日長誰道使君貧且老繡屏錦帳咽笙簧禊亭曲池流水細鱗鱗高會傳觴似洛濵紅粉翠蛾應不要畫船來徃勝於人菡萏亭日日移床趂下風淸香不盡思何窮若爲化作􅀛千歲巢向田田亂葉中荼䕷洞長憶故山寒食夜野荼䕷發暗香來分無素手簮羅䯻且折霜㽔浸玉醅篔簹谷漢川修竹賤如􅅾斤斧何曾赦籜龍料得淸貧饞大守渭濵千畆在􅅐中寒蘆港溶溶晴港􅃞春暉蘆笋生時柳絮飛還自江南風物否桃花流水鮆魚肥野人廬少年辛苦事犂鉏剛厭靑山遶故居老覺華堂無意味􅁍須時到野人廬此君庵寄與庵前抱節君與君到處合相親冩眞雖是文夫子我亦眞堂作記人金橙徑金橙縱復里人知不見鱸魚價自低須是松江煙􅀨裏小船燒薤擣香虀南園不種夭桃與綠楊使君應欲候農桑春畦􅀨過羅紈膩夏壠風來餅餌香北園漢水巴山樂有餘一麾從此首歸􅂗北園草木慿君問許我他年作主無與可有詩見寄云待將一叚鵝溪絹掃取寒梢萬尺長次韻荅之爲愛鵝溪白蠒光掃殘雞距紫毫鋩世間亦有千尋竹月落庭空影許長林子中以詩寄與可及餘與可旣没追和其韻斯人所甚厭投􅂌毎不受欲其少須􅁷奪去惟恐後云誰尸此職無乃亦假守賦才有巨細無異斛與㪷胡不安其分但聽物所誘時來各飛動意合無妍醜坐令雞栖車長載未伯厚平生無一旅旣死咤萬口自聞與可亡胷臆生堆阜懸知臨絕意要我一執手相望五百里安得自其牗遺文付來哲後事待諸友伶俜􅄞紹孤老病孟光偶世人賤目見爭笑千金帚君詩與楚詞識者當有取但如愛墨竹此難吾巳乆故人多厚祿能復哀君否不見林與蘇饑寒自奔走書與可墨竹并序亡友文與可有四絕詩一楚詞二草書三畫四與可嘗云世無知我者惟子瞻一見識吾妙處旣没七年覩其遺迹而作是詩筆與子皆逝詩今誰爲新空遺運斤質􅁍弔斷絃人題與可墨竹并序故人文與可爲道師王執中作墨竹且謂執中勿使他人書字待蘇子瞻來令作詩其側與可旣没八年而軾始還朝見之乃賦一首斯人定何人游戲得自在詩鳴草聖餘兼入竹三昧時時出水石荒怪軼象外舉世知珍之賞會獨余最知音古難合奄忽不少待雖云死生隔相見如龔隗與可字說鄕人皆好之何如曰未可也鄕人皆惡之何如曰未可也不如鄕人之善者好之其不善者惡之善者好之不善者惡之足以爲君子乎曰未也孔子爲問者言也以爲賢于所問者而巳君子之居鄕也善者以勸不善者以耻夫何惡之有君子不惡人亦不惡於人子夏之於人也可者與之其不可者拒之子張曰君子尊賢而容衆嘉善而矜不能我之大賢歟於人何所不容我之不賢歟人將拒我如之何其拒人也子張之意豈不曰與其可者而不可者自遠乎使不可者而果遠也則其爲拒也甚矣而子張何惡於拒也曰惡其有意於拒也夫苟有意於拒則天下相率而去之吾誰與居然則孔子之於孺悲也非拒歟曰孔子以不屑教誨者也非拒也夫苟無意於拒則可者與之雖孔子子張皆然吾友文君名同字與可或曰爲子夏也歟曰非也取其與不取其拒爲子張者也與可之爲人也守道而忘勢行義而忘利修德而忘名與爲不義雖祿之千乘不顧也雖然未嘗有惡于人人亦莫之惡也故曰與可爲子張者也與可琴銘攫之幽然如水赴谷釋之蕭然如葉脫木按之噫然應指而長言者似君置之枵然遺形而不言者似僕與可􅀞墨竹屏風賛與可之文其德之糟粕與可之詩其文之毫末詩不能盡溢而爲書變而爲畫皆詩之餘其詩與文好者益寡有好其德如好其畫者乎悲夫戒壇院與可畫墨竹賛風梢􅀨籜上傲冰雹霜根雪節下貫金鐵誰爲此君與可姓文惟其有之是以好之石室先生畫竹賛并序與可文翁之後也蜀人猶以石室名其家而與可自謂笑笑先生蓋可謂與道皆逝不畱於物者也顧嘗好畫竹客有賛之者曰先生閒居獨笑不巳問安所笑笑我非爾物之相物我爾一也先生又笑笑所笑者笑笑之餘以竹發妙竹亦得風天然而笑與可飛白賛嗚呼哀哉與可豈其多好好奇也歟抑其不試故藝也始予見其詩與文又得見其行草篆􅊢也以爲止此矣旣没一年而復見其飛白美哉多乎其盡萬物之態也霏霏乎其􅀂輕雲之蔽月飜飜乎其􅀂長風之卷斾也猗猗乎其􅀂遊絲之縈柳絮􅙂􅙂乎其􅀂流水之舞荇􅎞也離離乎其遠而相屬縮縮乎其近而不隘也其工至于如此而余乃今知之則余之知與可者固無幾而其所不知者蓋不可勝計也嗚呼哀哉與可枯木賛恠木在庭枯柯北走窮猿投壁驚雀入牗居者蒲氏畫者文叟賛者蘇子觀者如後與可畫竹木石賛并引友人文與可旣没十四年見其遺墨於吕元鈞之家嗟歎之餘輙復賛之竹寒而笑木瘠而壽石醜而文是爲三益之友粲乎其可接邈乎其不可囿我懷斯人烏乎其可復覯也䟦與可墨竹昔時與可墨竹見精縑良􅁓輒憤筆揮灑不能自巳坐客爭奪持去與可亦不甚惜後來見人設置筆研卽逡廵避去人就求某至終歲不可得或問其故與可曰吾乃者學道未至意有所不適而無所遣之故一發於墨竹是病也今吾病良巳可􅀂何然以余觀之與可之病亦未得爲巳也獨不容有發者乎余將伺其發而掩取之然彼方以爲病而吾又利其病是吾亦病也熈寧庚戌七月二十一日子瞻書䟦與可䊸竹䊸竹生于陵陽守居之北崖蓋歧竹也其一未脫籜爲蝎所傷其一困於嵌巖是以爲此狀也吾亡友文與可爲陵陽守見而異之以墨圖其形余得其摹本以遺玉册官祁永使刻之石以爲好事者動心駭目詭特之觀且以想見亡友之風節其屈而不撓者蓋如此云䟦趙㞦屏風文與可竹與可所至詩在口竹在手來京師不及歲請郡還鄕而詩與竹皆西矣一日不見使人思之其靣目嚴泠可使靜險躁厚鄙薄今相去數千里其詩可求其竹可乞其所以靜厚者不可致此予所以見竹而歎也䟦與可草書李公擇􅀄學草書所不能者輒雜以眞行劉貢甫謂之鸚哥嬌其後稍進問僕吾書比來何如僕對可謂秦吉了矣與可聞之大笑是日坐人爭索與可草書落筆如風􅀄不經意劉意謂鸚鵡之于人言止能道此數句耳十月一日張長史草書必竢醉或以爲奇醒卽天眞不全此乃長史未妙猶有醉醒之辨􅀂逸少何嘗寄於酒乎僕亦未免此事書􅀄無意於嘉乃嘉爾草書雖是積學乃成然要是出于欲􅄩古人云怱怱不及草書此語非是􅀂怱怱不及乃是平時亦有意於學此􅁦之極遂至於周越仲翼無足恠者吾書雖不甚佳然自出新意不踐古人是一快也䟦與可論草書後與可云余學書凡十年終未得古人用筆相傳之法後因見道上闘蛇遂得其妙乃知㒹素之爲各有所悟然後至于如此耳留意於物徃徃成趣昔人有好草書夜夢則見蛟龍紏結後數年或晝日見之草書則工矣而所見亦可患與可之所見豈真蛇耶抑草書之精也予平生好與與可劇談大噱此語恨不令與可聞之令其一捧腹絕倒也小簡八首軾啓近承書誨喜聞尊候益康勝見乞浙郡不知得否相次入文字乞宣與明若得與兄聮棹南行一叚異事也中前桑榆之詞極爲工妙尋曾有書道此􅁍是此書不逹耶老兄詩筆當今少儷惟劣弟或可以髣髴墨竹卽未敢云爾呵呵佳墨比望老兄分惠反􅀩來索大好禪機何處學得來大軸揮灑必已了專令人􅀱請切告烏綵欄兩卷稍暇便冩去近見子由作墨竹賦意思蕭散不復在文字畛域中真可以配老筆也亦欲冩在絹卷上如何如何乍凉萬萬珎重又軾自宻移河中至京城外改差徐州復挈而東仕宦本不擇地然彭城於私計比河中爲便安耳今日㳂汴赴任與舎弟同行聞與可與之議姻極爲喜幸從來交契如此又復結此無窮之歡美事美事但寒門不稱計與可必不見鄙也臨行冗甚奉書殊不謹竢到任别上問次又軾再拜姪女子􅀗執箕箒非獨渠厚幸而不肖􅀗交于左右者緣此愈親篤矣欣慰之懷殆不可言不敢復具啓狀必不見罪也聞舍弟談壻之賢公之子固應爾姪女子粗知書暁義理計亦稱公家婦也更望訓誨其不逮也又軾啓疊辱來教承起居佳適聞中間復微恙且喜尋巳平復軾比來亦多病漸老不耐小放意輒成疾不可不加意謹護也水後彌年勞役今復聞决口未可塞紛紛何時定乎寄和潞老詩甚精奇稍閑當亦作六言殆難繼也未緣會晤萬萬以時珍重又軾啓稍不馳問不審入冬尊體何如想舊疾盡去眠食益佳矣見秋榜知八郎巳捷不勝欣􅇺惟十一郎偶失甚爲悵然然一跌豈廢千里想不以介意寄示碑刻作語古妙非世俗所能髣髴長句偈甚奇非獨文字甘降便當北靣參問也近有一僧名道潛字參寥杭人也時來相見詩句淸絕可與林逋相上下而通了道義見之令人蕭然有一詩與之錄呈爲一笑也未由展奉萬萬以時自重不宣黄樓賦如巳了望付去人如未幸留意又軾啓近逓中辱書承非乆到闕卽日想巳入覲矣無緣一見於邑可知苦寒尊候何似貴眷令子各安勝軾􅀩庇粗遣秋來水災幾巳爲魚必知之矣寄惠六言小集古人之作今世未省見老兄别後道德文章日進追配作者而劣弟􅂴墯日退卒爲庸人他日何以見左右慙悚而巳所要拙文實未有以應命又見兄之作但欲焚筆硯耳何敢自露兄淹外旣乆雖與時闊疎而公議卓然當遂踐淸近也歲行盡萬萬以時自重不宜又軾啓郡人還疊辱書敎承尊􅀱微違和尋巳平愈然尚未甚美食又得蒲大書云尊貌頗淸削伏料道氣乆充微疾不能近然未免憂愁惟謹擇毉藥痛加調練莫須燃艾否軾近來亦自多病年老使然無足怪者􅀩寄惠􅅯竹真可爲古今之冠謹當綴黃素其後作十餘軸謹援此例不可過望所示當作歌詩題之軾作此乃莫大之幸日夜所願而不得者今後更不敢送浙物去矣老兄恐嚇之術一何疎哉想當一大噱别後亦有拙詩百餘首方令人編錄以求斤斧後信寄去老兄盛作尚恨見少當更􅀩借示使劣弟稍稍長進此其爲賜又非頒惠墨竹之比也冗中奉啓不盡言又軾啓冗迫稍踈上問伏想尊􅂂佳勝承書領吳興衆議謂公當在近侍故不甚快然不肖深爲左右賀也吳興山水淸遠公雅量弘度在王謝閒此授殆天意耳軾欲乞宣城若幸得之當與公爲隣國真是一叚奇事然事之如人意者亦自難遂從古以然公自南河赴任舟行艱澁何不自五丈河由曹鄆濟過我於徐自泗入淮乎但恐五丈河無氷不然者公必出此也且更熟籌之餘惟萬萬以時自重筆凍奉啓殊不謹石㓜安言亦可呼水精宫使此語可記墨君堂記凡人相與號呼者貴之則曰公賢之則曰君自其下則爾汝之雖公卿之貴天下貌畏而心不服則進而君公退而爾汝者多矣獨王子猷謂竹君天下從而君之無異辭今與可又能以墨􅁚君之形容作堂以居君而屬余爲文以頌君德則與可之於君信厚矣與可之爲人也端靜而文明哲而忠士之修潔博習朝夕磨治洗濯以求交於與可者非一人也而獨厚君如此君又疎簡抗勁無聲色臭味可以娛恱人之耳目鼻口則與可之厚君也其必有以賢􅀂矣世之能寒燠人者其氣􅆋亦未至􅀂雪霜風雨之切於饑膚也而士鮮不以爲欣戚喪其所守自植物而言之四時之變亦大矣而君獨不顧雖微與可天下其孰不賢之然與可獨能得君之深而知君之所以賢雍容談笑揮灑奮迅而盡君之德稚壯枯老之容披折􅅯仰之勢風雪凌厲以觀其操崖石犖确以致其節得志遂茂而不驕不得志瘁瘠而不辱羣居不倚獨立不懼與可之於君可謂得其情而盡其性矣余雖不足以知君願從與可求君之昆弟子孫族屬朋友之象而藏於吾室以爲君之别館云與可􅀞篔簹谷􅅯竹記竹之始生一寸之萌耳而節葉具焉自蜩腹虵蚹以至于劒㧞千尋者生而有之也今􅀞者乃節節而爲之葉葉而累之豈復有竹乎故􅀞竹必先得成竹於胷中執筆熟視乃見其所欲􅀞者急走從之振筆􅀡遂以追其所見如兎走鶻落少縱則逝矣與可之教予如此予不能然也而心識其所以然夫旣心識其所以然而不能然者內外不一心手不相應不學之過也故凡有見於中而操之不摯者平居自視了然而臨事忽焉喪之豈獨竹乎子由爲墨竹賦以遺與可曰庖丁解牛者也而養生者取之輪扁斵輪者也而讀書者與之今夫夫子之託於斯竹也而予以爲有道者則非邪子由未嘗􅀞也故得其意而巳若予者豈獨得其意并得其法與可􅀞竹􅀄不自貴重四方之人持縑素而請者足相躡於其門與可厭之投諸地而罵曰吾將以爲韈士大夫傳之以爲口實及與可自洋州還而余爲徐州與可以書遺余曰近語士大夫吾墨竹一􅂀近在彭城可徃求之韈材當萃於予矣書尾復冩一詩其畧曰擬將一叚鵝谿絹掃取寒梢萬尺長予謂與可竹長萬尺當用絹二百五十匹知公倦於筆硯願得此絹而巳與可無以荅則曰吾言妄矣世豈有萬天竹哉余因而實之荅其詩曰世間亦有千尋竹月落庭空影許長與可笑曰蘇子辯則辯矣然二百五十匹吾將買田而歸老焉因以所􅀞篔簹谷􅅯竹遺予曰此竹數尺耳而有萬尺之勢篔簹谷在洋州與可嘗令予作洋州三十韻篔簹谷其一也予詩云漢川脩竹賤如蓬斤斧何曾赦籜龍料得淸貧饞太守渭濵千畝在􅅐中與可是日與其妻遊谷中燒筍晚食發函得詩失笑噴飯滿案元豐二年正月二十一日與可没于陳州是歲七月七日予在湖州曝書􅀞見此竹廢卷而哭失聲昔曹孟德祭橋公文有車過腹痛之語而予亦載與可疇昔戲笑之言者以見與可於予親厚無間如此也祭與可文年月日從表弟蘇軾謹以淸酌庶羞之奠致祭于故湖州文府君與可學士兄之靈曰嗚呼哀哉與可能復飮此酒也夫能復賦詩以自樂皷琴以自侑也夫嗚呼哀哉余尚􅃘言之氣噎悒而填胷淚疾下而淋衣忽􅀵淚以自問非夫人之爲慟而誰爲乎道之不行哀我無徒豈無友朋逝莫告余惟余與可匪亟匪徐招之不來麾之不去不可得而親其可得而踈之耶嗚呼哀哉孰能敦德秉義如與可之和而正乎孰能養民厚俗如與可之寛而明乎孰能爲詩與楚詞如與可之婉而淸乎孰能齊寵辱忘得喪如與可之安而輕乎嗚呼哀哉余聞訃之三日夜不眠而坐喟夢相從而驚覺滿茵蓆之濡淚念有生之歸盡雖百年其必至惟有文爲不朽與有子爲不死雖冨貴夀考之人未必皆有此二者也然余嘗聞與可之言是身如浮雲無去無來無亡無存則夫所謂不朽與不死者亦何足云乎嗚呼哀哉尚饗黄州再祭與可文年月日從表弟具官蘇軾謹以淸酌庶羞之奠昭告于亡友湖州府君與可學士文兄之靈嗚呼哀哉我官于岐實始識君廣口秀眉忠信而文志氣方剛談詞如雲一别五年君譽日聞道德爲膏以自濯薰藝學之多蔚如秋蕡脫口成章粲莫可耘馳騁百家錯落紛紜使我羞歎筆硯爲焚再見京師黙無所云杳兮淸深落其華英昔蓻我􅁰今熟其饋啜漓歌呼得淳而醺天力自然不施膠筋坐了萬事氣回三軍笑我皇皇獨違垢紛俯仰三州眷戀桑枌仁施草木信及䴥􅍪昻然來歸獨立無羣俛焉復去初無戚欣大哉死生悽愴蒿蔒君没談笑大鈞徒勤喪之西歸我竄江濆何以薦君採江之芹相彼日月有朝必曛我在茫茫凡幾合分盡此一觴歸安于墳嗚呼哀哉尚饗與可學士墨君堂蘇轍虗堂竹叢閒那復厭竹遠風庭響交戞月牖散凌亂尚恐晝掩關嬋娟不長見中堂開素壁蕭颯起霜幹隨宜賦生意落筆皆䓤蒨根莖雜土石枝葉互長短依依露下綠冉冉風中展開門視叢薄與此終何辨和與可洋州園亭三十韻湖橋湖南堂宇深湖北林亭遠不作過湖橋兩處那相見横橋湖裏種荷花湖邊種楊柳何處渡橋人問是人閒否書軒綠竹覆淸渠塵心日月踈使君遺癖在苦要讀文書􅖅池水深􅖅亦厚滉蕩鋪寒玉好在水中魚何愁池上鶩竹塢空陂放修竹肅肅復􅄀􅄀莫除塢外笋從使入園生荻浦離披寒露下蕭索微風觸摧拆有餘靑從橫未須束蓼嶼風高蓮欲衰霜重蓼􅀄發會使此池中秋芳未嘗歇望雲樓雲生如湧泉雲散如飜水百變一凭欄悠悠定誰使禊亭觴流無定處客醉醒還酌毋令仲御歌空使人驚愕菡䔰亭開花濁水中抱性一何㓗朱檻月明時淸香爲誰發􅙐醾洞猗猗翠蔓長藹藹繁香足綺席墮殘英芳罇漬餘馥此君菴風稍遶林匝霜幹當窻靜遥知素壁上醉墨森相映金橙逕葉如石楠堅實比霜柑大穿逕得新苞令公憶鱸鱠南園官是勸農官種桑亦其所安得陌上人隔葉攀條語北園使君美且仁遍地種桃李豈獨放春花行㸔食秋子荅與可十首遠遊旣爲東魯迁居又愛南山齒髪自知將老心懷且欲偷安舜井溢流陌上歷山近在城頭覊旅三年忘云故園何日歸休野歩西湖綠縟晴登北渚煙綿蒲蓮自可供腹魚蠏何嘗要錢飮酒方橋夜月釣魚􅀞舫秋風冉冉荷香不斷悠悠水靣無窮雨過山光欲溜寒來水氣如蒸勝處何須吳越隨方亦有遊朋楊雄執戟雖乆陶令歸田未能眼㸔雲山無柰神傷簿領相仍終歲常親鞭朴此生知􅀒詩書欲尋舊學無處時有故人起予故人遠在江漢萬里時寄聲音聞道禪心寂寞未廢詩人苦吟佳句近參風雅微詞間發離騷竊欲比君􅁃信莫年詩賦尤高相思欲見無路滿秩西歸有時及君鈴閤少事飮我松醪滿巵送與可知湖州連持梁洋卯乆作溪山主深知爲郡樂但畏買茶􅀂來歸天祿閣坐守登聞皷九重未明入百辟盈庭舞城南獨歸卧心事誰當語舊聞吳興勝試問天公取家貧槖裝盡歲莫輕㠶舉苕溪淨多石弁嶺瘦無土湖藕雪冰絲山茶潑牛乳香粳飯玉粒鮮鯽鱠紅縷宫開水精㓗人寄􅀞屏住俗吏自難堪詩翁正當與從來思淸絕况乃病新愈團􅇛肘後丹暠暠胷中素高卧鎭夸俗淸談靜煩訴應笑杜紫微湖亭但狂顧墨竹賦與可以墨爲竹視之良竹也客見而驚焉曰今夫受命於天賦形於地涵濡雨露振蕩風氣春而萌芽夏而解弛散柯布葉逮冬而遂性剛㓗而疎􅀡姿嬋娟以閑媚渉寒暑之徂變傲冰雪之凌厲均一氣於草木嗟壤同而性異信物生之自然雖造化其能使今子研靑松之煤運脫兎之毫睥睨牆堵振洒繒綃須􅁷而成鬱乎蕭騷曲􅀡橫斜穠纖􅋻高竊造物之潛思賦生意於崇朝子豈誠有道者耶與可听然而笑曰夫予之所好者道也放乎竹矣始予隱乎崇山之陽廬乎脩竹之林視聽漠然無槩乎予心朝與竹乎爲游莫與竹乎爲朋飮食乎竹間􅅯息乎竹隂觀竹之變也多矣若夫風止􅀨霽山空日出猗猗其長森乎滿谷葉如翠羽筠如蒼玉澹乎自持淒兮欲滴蟬鳴鳥噪人響寂歴忽依風而長嘯􅆌掩冉以終日笋含籜而將墜根得土而横逸絕澗谷而蔓延散子孫乎千億至若藂薄之餘斤斧所施山石犖埆荆棘生之蹇將抽而莫逹紛旣折而猶持氣雖傷而益壯身巳病而増奇淒風號怒乎􅂩穴飛雪凝􅴟乎陂池悲衆木之無頼雖百圍而莫支猶復蒼然於旣寒之後凛乎無可憐之姿追松栢以自偶竊仁人之所爲此則竹之所以爲竹也始也余見而恱之今也恱之而不自知也忽乎忘筆之在手與帋之在前勃然而興而脩竹森然雖天造之無朕亦何以異於茲焉客曰蓋予聞之庖丁解牛者也而養生者取之輪扁斵輪者也而讀書者與之萬物一理也其所從爲之者異爾况夫夫子之託於斯竹也而予以爲有道者則非耶與可曰唯唯祭文與可學士文維元豐二年歳次巳未二月庚子朔具官蘇轍謹以淸酌庶羞之奠致祭于故吳興太守與可學士親家翁之靈嗚呼與君結交自我先人舊好不忘繼以新姻鄕黨之歡親友之恩豈無他人君則兼之君牧吳興我官南京從君季子長女實行君次于陳徃見姑嫜使者未反而君淪亡于何不淑以至于斯匪人所知神實爲之昔我愛君忠信篤實廉而不劌柔而不屈發爲文章實似其德風雅之深追配古人翰墨之工世無擬倫人得其一足以自珍縱橫放肆乆而疑神晚歲好道耽恱至理洗濯塵翳湛然不起病革不亂遺書滿􅁓嗟乎今日見此而巳我欲哭君神徃身留遣使徃奠涕泗橫流絳幡素車歸安故丘嗚呼哀哉尚饗丹淵集附録終
