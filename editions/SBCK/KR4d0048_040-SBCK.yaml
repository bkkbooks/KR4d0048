front:
  text: 陳眉公先生訂正丹淵集卷四十
  hash: sha256:e7f5520e8892a9bc0e6b08b7038c102155e196ef7283af3bcff2746b8a1d8df0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_040-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳吳一標建先墓誌任郎中夫人宋氏墓誌銘宋夫人職方員外郎任伋師中之元配也父廣陵先生凡數女而夫人最爲先生之所愛簡靜寡語言居處有度不妄易尺寸家名高貲先生常營諸嫁贈紫金大珠巧繡華熾日爲􅀵置它皆以先得爲巳物而夫人第拱手嘻笑若都不欲求之者先生竊視之歎曰是不可不以耦佳士故歸之師中旣來事姑章接先後勤順柔婉有儀法師中性儻逷畛宇宏大好賔友毎相聚集必辦具􅑧謼酣飮連日夜不管無有索足夫人愈敇僮婢色色給過無少厭它日問之巳脫簮珥襆袿􅅂質酒肉供矣未嘗以爲言教諸子與其壻學至夜分讀書聲未絕夫人亦不去房下時至勉勵之寓家蔡之新息忽語其子曰吾壽不能永異時藏吾於淮上汝等之孝也家人初甚怪之但不詰其何以出如此語巳而果得疾遂􅉂目終日而去春秋五十矣熈寧元年九月三十日也明年正月二十九日葬之于光州光山縣千歩村從其志也男四人大節大防女子四人長適高遇次適楊廉善二㓜大節自蔡歸蜀見其父友文同伏地哭拜所訴不􅃘聞起卽求同銘其墓乃銘之曰異哉夫人生於眉之眉山而葬於光之光山也其間相濶五千里胡爲自彼而止此人事萬變孰可得而知之矣夫之官日高子之學日新後事如是之盛也豈不足下慰於夫人嗚呼哀哉壽安縣太君何氏墓誌銘秘書丞趙􅀩將以熈寧九年正月癸酉葬其母夫人壽安縣太君以其狀來求余誌其墓余昔嘗學易於秘丞君之父秘丞君又嘗爲余僚於興元府之南鄭縣其爲舊如此當爲之書按夫人姓何氏咸安郡人少􅀌其母愛其敏惠有智思視遇過諸子鄕里大族有求姻之者母悉置不荅嘗謂人曰是女非得佳士誰可婦者有馬服先生者名某眉山人儻逷任氣俠風槩高遠以文章道義游兩蜀聲稱燁然士人欲宗師之至􅅾母聞之名曰可妻也遂求以夫人歸之秘丞君生方數月馬服去客諸郡爲人挽留主師席凡不歸者十四年夫人依其弟右賛善大夫絳之家寥然專一室以居日夜候其子裁能道語言乃教之學書念文字旣冠遣從師爲詞章後登嘉祐某年進士獨夫人訓導之力也馬服初無預焉馬服常曰吾子有母吾何憂賛善尤悌順事夫人至謹凡家事一以諉夫人不問夫人爲之􅀵拾藏貯歲時均節調用內外所給如一無半毫之私識者各以諭其家指夫人爲姆師焉賛善捐館貧甚會夫人從其子解官歸盡傾其􅐤裝葬如禮乃携其􅀌女撫視養育擇可壻者嫁之匳具稱足如巳出者夫人性仁愛凡左右使令常自視其飮食衣服俾各滿其所欲無歎恨鞭朴未嘗施于家而閨庭凛然毎戒其子曰罪囚不幸觸憲網爾旣治之刑常冝輕不獨成爾善名慶當流於後世居處嚴潔四坐淸灑几榻帷幔屏障之􅀋整娖次置無一塵之栖所服不務華靡自非臨祭祀對賔客之外袿裾帬􅃭皆􅀘澣者家人毎難進之夫人曰是物但􅀍體不至穿敝何在新麗紡績之工可惜也素安强雖春秋甚高而鍼縷不廢八年八月十九日忽得疾卒於漢中所寓唐安佛舎男子三人曰􅀩秘丞君曰莘曰荀皆舉進士銘曰於乎夫人柔婉靜黙午髪未笄巳聞懿德出配有道生子岌岌教以詩書日夜訓􅅚居貧益堅禮䋲義墨愈乆不渝鄕閭矜式見子成名至升閨籍覃慶疏封夀安有邑金屑􅂗羅華誥五色持此就地何慊於臆八十一年晚具五福世亦鮮儷可瞑去目陳倉之山有名雞幘問之靑烏此云佳宅冝爾子孫世緒奕奕告後以辭鏤之堅石文安縣君劉氏墓誌銘蜀有賢婦曰文安縣君劉氏者簡州陽安人著作佐郎琚之女故太子中允許平施益之之夫人也性巧慧志尚柔婉在家常以孝謹稱於其親長嗜學書傳無有不經覽者於左氏春秋尤能通誦之中間事跡詞語㳂端極涯開說講辯名氏世族地里歲月條分緒解癸甲不亂自歸許氏事上接下祥順友愛循蹈矩法益之資禀曠濶磨蕩崖畛常以醼飮敖佚自喜夫人毎乘間引古之所以因是而取諸悔咎者指諭之益之未甞不懾然愧畏遂至於不復更敢爲此恐或戻夫人之所陳者益之毎語人曰予之所以將放而復歛者謂何慮其聞於予之悃中也盖使人聽其言惕然􅀂嚴師良友在側動靜語黙以教義諄諄警誨人者予過漸鮮有奥􅂇爾從知平定軍樂平縣未幾而益之卒夫人携諸孤奉輤車還成都至則舊産巳空蕭然無一椽之屋以居寄人舎下合聚閭巷親族良家兒女之推齒者授訓誡敎書字逾十年􅀗所遺以給朝夕僅取足不營於他其所居左右之人凡過其門悉俛首遽進不敢諠謼作高語大笑懼聞于夫人淸風滿家寒苦霜雪督諸子學晝夜不廢改詰撿問使中程律一或不及譙勵不貸故其子天啓嘗預郡府貢書古在高等夫人教之也自是夫人之徽烈懿行愈聞于人萬口一詞謂絕倫􅀋忽得疾於熈寧五年七月二十三日卒于家享年四十八人無賢愚相與嗟悼有六男子曰某某某天啓娶閻氏太常博士灝之女天􅂨娶陳氏屯田員外郎昻之女餘未娶然皆俊爽愿飭異時當盡能成立者天啓卜以某年十一月四日葬夫人於華陽縣某鄕里海雲山之東原與益之之域同焉以同昔年嘗誌益之之墓遣天􅂨來陵陽以夫人之治命俾同亦爲夫人銘之乃爲之銘銘曰猗猗夫人夙􅅷廼德歴求於它􅀋者鮮克旣􅂌令淑復輔以文有蔚其章蘭薫􅊉芬自居州閭養善秘閾化流郡閨不戒亦式顯懿旁􅄛衆齠之師十年其家觀書誦詩匳盝乆捐裁辨袿䘿踐􅂂幽素以儀自律恫視諸藐其􅀌而煢經耕史耘待􅀗厥成遽爾云亡聞者愕􅇇無誰不知語卽涕涙可會風節詳而記諸附史以篇庸完國書彼幽良人一紀與别東山之陽遂此同穴能事金石其有子賢爲次淸休刻之墓前長壽縣太君楊氏墓誌銘職方員外郎許儀之母夫人姓楊氏彭州􅄥陽人世以大族雄其邑夫人柔懿端靖自覊貫已爲其內外戚屬所穪服年十九歸太常博士許瞻太博古籍成都之新䌓自得夫人遂相與奉其母來府中就師友以學太博性高爽不惜所有以交當時之賢俊朝夕會遇講磨其所習夫人常自臨烓鬴手和􅅅炙以過給賔客無一日不如事且未嘗有倦􅓈之色事其姑尤孝謹凡曰婦之淑節懿行它不能行之者夫人服之爲終身太博以母老職方君等皆漸長乃謂夫人曰新繁我舊業曏來此者爲將營進士求起家今齟齬矣命也太夫人念故里數子已可敎盍歸以新吾之所爲乎夫人喜遂復還所吾新繁督諸子學愈勤而親見其子爲尚書員外郎用其恩進封長壽縣君太博治家號嚴飭夫人毎以􅄌恕潤飾之故梱內斬然若官府纚纚可述爲鄕里所矜尚夫人好施舍不嗜藏蓋閭巷媪嫗毎告所乏未嘗不穪其求予足且謝其所以爲報者後見夫人春秋高潜相與語出涕涙祝天願夫人更逾百年我曹常所欲芘藾之其愛惠得人也如此夫人晩喜酒然杯杓甚淺但日日索當有旣飮色愈温而氣和語言尤婉緻故諸女曁衆婦常好酌進之乃歡素安强忽得病遂不効於藥熈寧四年二月一日卒于其第享年八十一職方君􅀄以太博服除赴闕授通判綿州以夫人之年日夜西走至家夫人疾雖棘見職方君歸尚怡然起與語􅀂甚慰其所以願見之者後四日乃啓手足矣夫人生四男子曰伸曰儀曰倫曰偕伸尚舉進士偕七舉一試殿庭下倫治産贍其昆其昆弟以學二女子長適勾叔良次適周惣皆服習夫人之訓戒事親從人咸有佳譽男孫五人善之慶之餘未名内外女孫七人以是年四月二十九日葬夫人於萬善鄕脩仁里祔于太博之塋職方君與同爲有舊書來俾同銘夫人之墓同不當拒而當銘也乃爲銘之銘曰猗歟夫人有顯令德修于其家而外以則女婦懿行母姑嘉式曰其宗姻循蹈矩墨􅄌柔恕惠芬楙閫閾䝯諸里閭撫濟艱棘積報在子外科列職曁登于朝取寵自國軸􅈘囊錦金羅五色天子命書夫人封邑冨木長壽錫􅂌以食夫人承之能自謙抑惟衆所􅃩􅀩祉疇克饗年滋高􅀗疹遂亟命屬以纊告不能息聞之遠邇孰罔不衋彼䌓之陽在益以北夫也良兆同歸其域稡次徽範琅然秘刻期千萬年廼名之泐張夫人墓誌銘夫人張氏其上世爲武信軍大姓少喪父以孝謹事母兄有聞里巷宗族凡穪道夫人者必日是性固所有不待訓戒而後能也年二十嫁始平先生希元希元有才名夫人旣歸之人皆以嘉耦賀兩家然恨巳失舅姑不得以滫髓從事希元舊結廬墓側夫人與同去不入城市凢十年撤紈綺屏脂澤慘慘朝暮奠饋有法希元以經史敎子弟夫人亦班班成誦之講解義訓無不通曉希元喜接士賔客日滿門下終歲未嘗獨執七筯以食夫人多自調絮和齊供儗無少倦至猝遽無有乃解裝構物以治其具惟恐一缺不能相屬者生四子正巳正雅正卿皆不許視家事督之學常以願成汝父之志勵之故正符以春秋學爲龍圖閣􅀡學士刑部侍郎知梓州何公取其書聞朝廷正雅以明經正卿以進士爲郡國所貢一門佳士鄕人仰伏夫人力也三女長適鄕貢進士王賁次適進士賈端次適前靑石縣令陳公錫治平元年三月十日夫人以疾卒享年五十八以三年四月十四日葬于小溪縣永壽鄕鳯凰山之先塋曾祖德權祖昉父奎皆不仕正符以余與其父子游見余哭且拜求銘夫人之墓余銘之曰幽閑而爲女柔婉而爲婦􅄌嚴而爲母是皆有令譽余豈愧銘其墓兮華陽縣君楊氏墓誌銘宋治平二年十月二日故太原先生太子中舍致仕閻君諱路字蹈之之夫人以疾卒享年七十九明年正月十一日葬于普安鄕沙坎里與先生之穴同焉其子灝以同爲同年進士來求文誌其墓同故采其善狀以書夫人姓楊氏華陽人父諱元吉安道守節鄕里信慕有善人君子之穪夫人少􅀌外祖張崇文春卿攜養於其家春卿爲孟昶時秀才通五經博極羣書鏗然有聲干當年昶歸朝春卿留蜀畏遠仕遂爲西南士人文章宗師旣老無子止有女及夫人在左右恭愿柔懿動嚮禮法薫漬善術該渉文史徽德婉行聞之閭里成都多豪宗巨家有以媒求姻接跡于門者春卿毎拒之日是女與孫循服素儉甚巳深矣蓋非可以侈麗華靡之好以化其所嗜者吾將求朴茂淸粹嘉才美業之士以歸之且當其意爾後果以女妻國子􅂇教周式而以夫人配先生者焉式講道著書爲詩書名儒先生􅂂尚簡潔學問無厭常以易禮春秋左氏傳名其家居陋巷坐黌舎敎諸生與二子四時弦誦風􅀨不廢夫人亦以章句字畫訓誨諸女及里中内外親表之甥侄毎佳時令節車交馬集衣冠擁會立􅀱牆宇隣􅁫巷帔招約呼引帬裾次次羅列梱内修弟子之禮爲經師教姆之賀如是者凢三十年遠近穪仰之先生素貧窶衣椸食困無有贏􅄛而夫人服敝惡享麤淡怡如也雖華章美品之在側未嘗以我之無有耻之性孝且􅄌奉養舅姑無闕禮撫育諸叔一盡乎仁愛生二子旦暮督其學長曰温景祐元年進士及第以職方員外郎通判戎州代歸逆江上至嘉州舟覆溺死次曰灝中皇祐元年丙科遷秘書丞授雅州名山縣縣在層巒複嶺之中林莾隂鬱嵐霧日發殊不與高年者起居相宜灝重其行部刺史知之使假蜀之永康縣夫人至縣才七月病乃作灝言之復得就藥成都九月二十四日至私第歷請諸醫卒不效遂啓手足矣夫人旣知書逹理道不若尋常婦人女子之所爲親見温湛没不救收泣抆淚一斷以命不復更嗟悼爲不可活之計􅀍疾歸圍兒女與語無戚戚愛戀難舎之意此儻非盡通事物當爾之說雖烈丈夫吾固知其未能必矣失人以温封華陽縣君四女適無錫唐棐崔庶幾劉繹孫二人仲㬢仲韙銘曰惟夫人出甲族粤在少失所育祖外氏恤之獨養而教性渾淑鍼縷餘親簡牘配先生保邕睦執閫範端且肅固窘陋安水菽以書史化邑屋生二子勤其讀並入仕及以祿夫人者備五福數云盡瞑就木歲時吉問歷卜彼東山地高陸從先生關陵谷刻銘章慰子􅂘仁壽縣太君李氏埋銘宋治平三年丙午春正月壬午太常博士宋璋與其弟瑄葬其母夫人仁壽太君李氏於犀浦縣金砂下村從其父贈殿中丞諱某字易從之神域也夫人于元年閠五月二十三日以疾卒享年七十有九惟其懿德徽行宜所以表之于墓者皆具於興元太守集賢校理楊君繪之文博士復俾其友廣漢郡尉秘閣校理文同謹歲月之實納壙中以告其後人同乃系以辭云藏于此者誰歟是爲母歸而有令嘉之穪于其宗族鄕黨者成紀夫人爾後千萬年兀者夷缺者闐而瑑者或不漫而泐也嗣人其知之矣噫此博士所以屬余渠渠者之志耶書以薶諸幽丹淵集卷四十終
