front:
  text: 陳眉公先生訂正丹淵集卷十七
  hash: sha256:297a72c5419b151a18ff11df1ec3530781caf4f68948d183d080b1807f12b251
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_017-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳吳一標建先詩五十二首徃年寄子平徃年記得歸在京日日訪子來西城雖然對坐兩寂寞亦有大笑時相轟顧子心力苦未老猶㺯故態如狂生書􅈧􅀞壁恣掀倒脫㡌禠帶隨縱橫諠詉歌詩嘂文字蕩突不管鄰人驚更呼老卒立臺下使抱短簫吹月明淸歡居此僅數月夜夜放去常三更别來七年在鄕里巳忝三度移􅀟旌今兹惛惛意思倦加以跕跕疾病嬰毎思此樂一絕後更不逄人如夜行贈日新禪師嶣嶤祝融峯􅌄窱􅂴瓉巖師也西南人甞居彼巉巉十年不下山煙雲爛衣衫借問爾何爲法味見愈饞妄萌將軋然卽以惠刃芟旣乆闢門戶不須更封緘龍神護水缾􅀑物扶經函疊足坐蒼石放身依古杉一日望劔門歸心瞥如㠶過我􅀞㦸前淸晨投短衘欣然揖師坐未語巳不凡再勘自不破誰敢分酸鹹大朴本無痕巧者強削劖師如捉􅀛拂定不空諵諵送竇僉判同年氷霜滿淸漢此地送君歸天涯作遠别懷抱殊依依短亭臨灙水楊柳長條稀道傍有寒梅幽香撲人衣折以持贈君愛之含春暉酒罷不可留晚鴻隨馬飛拙詩六韻奉寄興州分判誠之蒲兄武興山水郡左右有佳處仙巖蟬兩殻何賈二眞人佛字玉一柱神坑孕金礫口金穴靈竇􅂥瓊乳鄭都縣泉乳柱石窟寺不辨文字古浦閣􅗛銘主人好事者乃我詩酒侶安得陪後乘放蕩此歴覩依韻和滿誠之春日卽事輕煙漠漠􅀨斜斜無事常敎放兩衙問客江邊求好石倩人山裏覔奇花新􅂼宛宛生晴圃淺溜㳙㳙出暖沙入夏盃盤須准備繞畦親灌邵平􅀲和提刑子功喜􅀨時􅀨巳可喜况當春發生入地如流膏浸灌萬物萌眞宰毎自惜􅂊灑復􅁍晴常時稍霑濕庶彚亦巳榮昨宵忽盛下攔宇翻瓶罌高原與庳陸旦可一尺盈尋觀太陽起紅光吐崢嶸萬里洗氛濁四顧蒼煙平羣農悉就野上下羅晨耕父老荷鋤鍤林間笑相迎盡言此美澤天意恤下甿麻麥固巳定預見禾􅁰成且幸賦輸辦敢望求他􅑿次苐還與官口復甘别營願常􅀗豐稔自覺所取輕言罷乃散去溝壠紛縱橫使者有職事其喜誰與并高齋聽淙淙不􅄰逹五更豈不省文移頼此一夕傾天明作浩歌滿􅁓編和聲謝夏文州寄金線狨天地生奇獸朝廷寵近臣覆鞍須用此投網爲何人梨栗恩雖厚雲山夢想頻煩君遠相惠時爲一沾巾依韻和子駿雪山圖一甲溪山六幅中其間雪意與雲容君應記得飛仙下颷馭亭前此數峯此樂吏散收簿書公舘如山居歸來換野服携䇿將焉如園亭極瀟灑隂森脩竹下拂石坐終日徙倚不知夜山月照我明林風吹我淸口誦太古文往來池上行露下覺微凛南􅈧歸就枕心閑神自安逹旦得酣􅃦亂曰􅈸守􅈛何爲日日常若斯爲言我自爾此樂非汝知百舌鳥衆禽乗春喉吻生滿林無限啼新晴南園花木正繁盛小小大大皆來鳴藏枝映葉復誰使不肯停住常嚶嚶就中百舌最無謂滿口學盡羣鳥聲自無一語出於巳徒爾嘲􅑜誇從橫朝朝泊我高柳上呌破一􅈧殘月明幽人穏睡正酣美無計可奈遭爾驚少年挾彈彼誰者安得爲我來五更莫掃花莫掃花從敎花滿地縱然堆積亦何害留之且重東君意君不見昨朝枝上正芳菲今日庭前巳憔悴中間得好能幾時用此請君窮物理一榮一謝兩皆空若了非眞本自同但對落英開酒盞毎年如此任春風詠竹一字至十字成章竹竹森寒潔綠湘江濵渭水曲帷幔翠錦戈矛蒼玉心虚異衆草節勁踰凡木化龍枝入仙陂呼鳳律鳴神谷月娥巾帔靜苒苒風生笙竽淸蔌蔌林間飮酒碎影揺罇石上圍棊輕隂覆局屈大夫逐去徒悅椒蘭陶先生歸來但尋松菊若論檀欒之操無敵於君欲圖瀟灑之姿莫賢於僕詠石石石隂黑陽白岸肧肧山骨骼天地鎔鑄􅀑神刻畫鯤鯢張怒眼虎兕交闘額􅃻如温玉聲淸洗似精鋼色碧花邊矹爾盡奇品林下礴然無俗格冰霜􅃤冽堅操不移塵土昏􅁳􅀌標自隔嶤矹獨立見到侍中家磊落羣居在牛丞相宅昔時大士常命汝曰聽徒今日襄翁且對君爲佳客深渡前日寒食在綿州牡丹盛開海棠落今巳逾旬過深渡山桃一枝橫曉閣此花平川最爲早何乃於此才破蕚化工豈爾用功偏蓋爾所生居絶壑一年春事但自了勿較後先嗟寂寞嘉川嘉川之西過新棧幾里朱欄繞靑壁我行落月尚在水水影照人襟袖白繁英雜綴脩蔓上緑錦纈帶􅂷百尺淸香滿馬去未休頼爾春風慰行客靑烏靑烏客館之東軒前對長江隔層嶂欹危一徑入林外竹柵茅簷儼相向愛其生事亦自足牛羊縱橫雞犬放安得與爾號比鄰爲作野歌供吹唱木􅀲園驅馬下高崗吟鞭只自揚溪山過新霽草木發淸香浩蕩來江闊縈紆去棧長春風去欲盡樽酒嘆何甞長舉山色滿西閣到江知幾層峯巒李成似澗谷范寛能闊外晴煙落深中晚靄凝無由􅀞奇絶巳下更重登水磑激水爲磑嘉陵民􅌟高穴深良苦辛十里之間凡共此麥入􅋗出無虚人彼甿居險所產薄世世食此江之濵朝廷遣使興水利嗟爾平輪與側輪長舉驛樓爽氣浮空紫翠濃隔江無限有奇峯君如要識營丘畫請㸔東頭第五重正月八日峽中新花深碧長條淺紫芽曉叢無數傲霜􅂠只應耻在江梅後未着葉時先放花贈淘金􅅱濯石淋沙不自勞抉光挑屑甚么麽世間有客能胠篋比爾元來得校多過靑泥鐵山正月雪交加欲探東風未有涯􅂊過靑泥春便好水邉林下見梅花過大散寄子駿􅂊過嘉陵心自喜歸來一夜冩君書明朝便送曾氷底定有西行􅀟鯉魚飛仙石溪愛此潺湲任濺衣獨尋幽石坐多時日斜徒御應相笑底事敎公上馬遲籌筆諸峯君㸔籌筆驛江邉翠壁蒼崖起晝煙正是峽中佳絕處土人休用作畬田柳池贈丁絪場屋聲名四十年五車書誤一囊錢老來山驛爲監吏相對春風但惘然偶題􅁂雲􅀟墮給明珠窄窄羅裙短短襦閑把花枝起新様滿調金粉􅀞文輸天漢橋風吹兩岸菰蒲乾日灑一汀鳬鶩寒夜深霜月照湖水須上此橋憑􅀞欄望雲樓南山北嶺遠如層朝雲暮􅀨濃若烝樓高百尺見萬里更有底事須來登灙泉亭竹列蒼㦸枝􅆬稠亭開翠幄窓戸幽下分灙水入渠口正坐小塌臨淸流此君庵斑斑墮籜開新筠粉光璀璨香氛氲我常愛君此黙坐勝見無限尋常人二樂榭㬊山北來聳峨峨漢水東下流滔滔開軒􅀡可望百里最愛此榭凌雲高漫郞亭鑿城爲洞深且長㳂壕開逕閑復荒有亭如許入蒙密誰比次山稱漫郎涵虚亭雲外衆􅄘簷際橫竹間飛泉窓下鳴欲徃二樂卽歇此胷懷巳自如冰淸菡蓞亭日高過竹湖水光風長入座荷花香交紅映緑滿渠下各有意態隨低昻篔簹咎池通一谷波溶溶竹合兩岸煙濛濛尋幽􅀡去景漸野宛邇不似在塵中王氏北溪榮州石􅀛州北羣􅄘起一去距城無十里煙嵐秀氣䕶巖扄松菊淸香泛溪水輕裘肥馬正榮耀春韮秋菘任凋毀待將底物勒移文谷口濃雲白如􅁓雋老水墨之人勃海後所尚亦瀟灑不承春秋學乃好水墨􅀞鵞溪吾鄕里有絹滑如砑君凡幾多筆爲我秃數把李堅甫淨居雜題一十三首并序堅甫旣得請太平宮遂於長安里第營治亭舘爲逍遥種種之樂巳而作詩十三篇遠來見寄且使余亦爲之余愛其趣尚淸遠因以累句附其所題之末慙非精工聊以塞命云爾何事當淸世歸來詠考槃近聞新住處不似在長安右靜居米塩辭劇務宮觀得淸資自取閑官樂爭敎俗客知右靜叟將何冩幽意有此古桐聲爲問好彈處誰來聽蠏行右琴室身閑無可奈惟此度晨昏與客正爭局聞誰休叩門右棊室縑緗羅几格無限有奇書想在中間坐渾如􅆩祭魚見義山别録右書齋試品齋中􅀞曾無第二流頑礓與亂篠應挂在當頭二􅀞余之筆因戯及之右􅀞齋日光明駘蕩天氣暖氤氳草木徧庭檻淸香朝暮聞右春軒淸颷動蕭瑟翠樾减婆娑􅁍愛夜來月滿窓寒影多右秋軒鐵石枝梢勁氷霜節目圓淨揺風苒苒閑映月姢姢右竹軒翠羽攅何密靑丸綴實繁誰知人與木俱是太淸孫右檜軒寒溜日㳙㳙縈紆小檻前不知明月下誰與㺯潺湲右水亭未老先求退題庵乃自呼有才須進用能保此名無右退庵淨居都葺了餘地蓋斯堂不用栽萱草無憂可得忘右北堂丹淵集卷十七終
