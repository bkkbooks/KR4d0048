front:
  text: 陳眉公先生訂正丹淵集卷一
  hash: sha256:834835f8abaf6f7a9c99a040329e39bd7cf49acff989d3af7c8688163e86a7d8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_001-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳吳一標建先詞賦超然臺賦方仲春之盎盎兮覽草木之菲菲胡怫欝於余懷兮悵獨處而無依陟危譙以騁望兮丘阜嶊崣而參差窮莽蒼以極視兮但浮陽之輝輝忽􅀭颷以晦昧兮灑氛霾於四垂躓余心之所行兮欲溷溷其安之蛻余神以遐騖兮控泬寥而上馳闢晻曖以渉鴻洞兮揮霓旌而掉雲旗導長彗以夭矯兮從宛虹之委蛇曵采旒以役朱鳯兮駕瓊輈而驅翠螭渉橫潢以出没兮歷大曤而蔽虧羾萬里以一息兮俯九州而下窺有美一人兮在東方去日乆兮不能忘凛而㓗兮岌而長服忠信兮􅀍文章中皦皦兮外琅琅蘭爲􅁭兮桂爲裳儼若植兮奉珪璋戢光耀兮秘芬芳賈世用兮斯卷藏遊物外兮肆猖狂余將從之兮遥相望回羊角兮指龍肮轉嵎夷兮蹴扶桑倚㤗山兮􅂓徜徉下超然兮拜其旁願有問兮遇非常勿掉頭兮告以詳使余脫亂天之罔兮解逆物之韁已而釋然兮出有累之場余復僊僊兮來歸故鄕石姥賦上嶜崟之飛泉兮披薈蘙之榛莽骭倦􅓈而膺喘兮窮其巓於絕岨爰有石而跂跂兮旁無他而相伍色黤黕而骨勁省兮具支節而帶文縷其遠晲之若人兮迫猶疑其蹲虎里俗神而甚恭兮號相尊其曰姥謂遽亟而丐况兮縁其求而下予忽旱陽赫而上􅋹兮飛光流而燎土燀多稼以巨甗兮烹羣命于碩鬴走群靈而莫答兮後率歸而此愬役稚耄而竭蹷兮來號呶而嘂謼會諸力以掀揭兮使轉移其常處靈歘然而見景怪兮衆外愕而中怖慃堀堁而下發兮鬱黯靉而上布憺砰礚而中作兮漭滂沱而四注回極熾而施大潤兮曾不暇乎旋歩已復還其故立兮各再拜而引去問其端而何從兮年皆失其幾許吾聞懷澤之與符陽兮亦有石爲牛皷彼民釁而擊之兮常以旱而取􅀨宛其於爾爲􅀋兮彼又載于國譜噫惟皇之大職兮繫隂陽之煦嫗奚磊砢之頑質兮輙矯權而自主事豈無於適然兮而惑者槩從而爲語皇忽寤而震恚兮烈罪目而爾數訶星士以施棓兮勑雷將而揮斧赫電火而􅁅爾兮皷箕風而蕩汝閴大空而泮散兮一摩抏其處所俾愚􅀺之偭正兮識惟皇之覆露皇未寤而民尚惑兮徒吾髀之長拊蓮賦彼芳蓮之紛敷兮乃橫湖之繡繪挺濁淤以自潔兮澡淸漪而逾麗纖空其上下兮細理周其向背甘液凝而露浥兮淸香馥而風遞向氷筋與玉骨兮外吐心而露肺承寶座之千趺兮䕃琱輿之萬蓋張翠帷於月下兮列綵仗於煙際容鷗鷺之徙倚兮取龜魚之芘賴旣怗水以不競兮復㳂涯而自退實華蘤之上品兮豈草木之一槩松賦度衆木而特起兮有高松之可覿擢􅀟幹以旁逹兮聳千尋而上擊怪難入於圖􅀞兮老莫知其歲曆含古意以茫昧兮􅀒天材而岑寂柯磅礡而如枹兮葉徹掾而若冪停餘雪而暖溜兮棲􅀫􅀨而晴滴險穴聚乎魑魅兮隂枿藏乎霹靂蒙煙霧之灑潤兮傲氷霜之慘戚榮枯繫乎所托兮用捨由乎見覔敢並名於􅂎梓兮甘取誚於樗櫟問神詞并序丙申歲夏五月南􅃎大旱土人走寧之要冊池取神水者如市旣得各就其社祀以禱􅀨然踰旬不應民甚恐懼禾稼焦枿不得食以死且疑神何不若嚮時之􅄩驗也群口咨嗟余聞之爲作問神辝使歌之凡三篇如左一惟歲之旱兮叩群靈而寂然蠒踵汗顙以歷它疆兮俾趨神之所淵飾盎􅇲以借餘潤兮輦護以歸期監乃􅂨之䖍兮少悼民之凶飢巫歌覡舞兮舌橋而腕垂原呼野召兮翁走而嫗馳奉新絜以羅庭戸兮日屢薦而益祗吾將問神兮不閔此而曷爲二寧山之環兮寧水之灣吾神宅茲兮幾千百年土民所仰兮重如一天凡旱取􅀨兮易若手然潤逐灌洒兮隂隨􅡒煙盡秦之境兮歲無赭田茲夏隴之槁渴兮風燥而日煎吾將問神兮豈或不職而累前三神嘗以功兮荷天之福衮􅀞藻火兮冕垂蠙玉樓殿轇轕兮楹廡聮屬炫熀煜兮盤山結谷幄帟之下兮雲藏􅀨蓄宜以其潤兮惠吾百榖胡爲自嗇兮肆魃之酷吾將問神兮寵其爲辱去陵度巃嵸兮外岑崟宛詰竭兮辝高而謁深望􅑬嵼之危堞兮隱重闥于幽林石塗齬齬而􅀡注兮盤苔磴乎千尋問守居之何所兮凌絕壑而繚層巒櫩廡鬱其䊸絀兮觀閣緣乎孱顔嗟余胡爲棲此兮日儔伍乎群山歲月淹其兩周兮悵何時而當還熇兮爀􅉃兮慄若寐之覺兮疾而復承詔易守漢上兮幸旋轅于夷陸側身東望兮掣余思而太息山中不可以乆留兮無四時而蕭瑟秋望愴嶷立兮臨曾顚極延迤兮睇遥川杳營營兮其何之馳滉漭兮浮寥然彼美人兮在一方望泊鬱兮蔽雲煙期將邁兮殫所思念莫致兮勞且悁零露濛濛兮促其歸灑涕涙兮紛如泉送李道士雲離離兮風漻漻群山空兮萬木凋水滉瀁兮大野平天泬寥兮新霜晴送先生兮歸鵝池晨霞鮮兮明羽衣乘靑騾兮度南岡荷瓊笈兮袐雲章先生去兮來何時上三嵎兮余之思閑居靈嵓兮摛錦詞有鶴可使兮其致之哭仲蒙二章􅉃憭栗兮臨淸秋懷坌憒兮紛予憂拂其弭兮乆復留念將焉適兮升高丘問胡然兮予之思絙予心兮不解以繆謂遐闊兮願如其宫悵西南兮川塗􅃡脩已忽寤兮往甞此以訃蓋子之生于世兮期爲已休萬感芸然兮䀌予之中魄幹漂潰兮索其若抽念子一去兮不可以復見顧予之於道兮尚胡爲而此謀欲子似兮取友但寥寥兮安求孰識子兮予深當何人兮與侔彼徒以文行兮爲子之高其不爲賤正體而貴余肬如刻畫兮妄以累子􅀋神珠兮釁天球知子之末兮尚可以表世其不能究者兮彼又何尤巳矣乎子之存兮在予憶子之疢兮將何時而可瘳歛予恨兮暮來歸煙雲飄蕭兮奉予以愁右臨高念子將歸兮于嵩之陽彼山之中宅群僊兮欣得子而翺翔冠芝英兮佩蘭芳躡暐曄兮服熒煌執瓊笈兮披錦囊遡天風兮誦霞章神君揖兮登寶牀玉女進兮奉瑜觴予浩歌兮頌靈休瑤瑟差薦兮相與子之獻酬客下緱嶺兮飄霞旒人來頴陽兮駕琳輈蟠桃春兮白榆林雲開月皎兮桂嵓之幽子之樂兮千萬億年下視此世兮不肯還猿噑鸖哀兮怳惝乎空山相望何所兮杳莫可攀右懷嵩仲蒙爲人無所不備采摘一二以爲其美行累之多矣劉元平甞論人之賢者曰無長仲蒙似之故同之二章如此熈寧辛亥仲秋癸酉仁壽郡東齋題哭任遵聖覽顥宇之􅄅漭兮悲萬彚之漂搖林薄䬃以殞瘁兮帶原隰之蕭條幨離魂之怫鬱兮紛渙散而孰招悵節物之變易兮付餘懷以無􅂓念先生之生此兮皇曷爲而有之旣誕􅂌以才德兮又復艱其所施使輾轉於偪側兮躓其行而莫馳哀抱憤以遽去兮問誰賢而爾師飽道義兮富文章轟大聲兮發洪光潔如玉兮凝如霜堅不可撓兮凛不可當嗟爾世俗兮曾莫測其所高但輙詆以絕衆兮實自疵于爾曹且勿辨其薌臭兮混蘭藏於􅅾蒿不善擇其至行兮務族譟而叢嘷今巳矣兮想孑立而􅀌居游鴻洞而入奫淪兮乘威鳯而跨鯨魚出入乎無極兮旁羊乎太虚下視夫塵寰兮諒將厭其如帤惟不肖兮有性自天蹈大道以􅀡騖兮繇中􅁤而掉長鞭寧剛折而方毁兮耻從柔而逐圓獲稠人之笑詈兮獨先生之見憐􅀒先生之所與兮羗莫恤乎其它今旣失先生之爲徒兮顧泯泯而奈何茲忽訃以大事兮還英氣于岷峨恨不能撫柩以一訣兮橫涕淚而滂沱亂曰先生之美兮豈衆人之足云兮先生之慶兮有弟賢而子文兮先生之安兮地旣吉而可墳兮先生之壽兮期萬祀而有聞兮夫何憾􅁘哭許駕部曏余登大㟭以回軫兮過君公之故里渉郊坰而歷閭閧兮聆弦歌之盈耳稔德義於洋洋兮時屬君之令此因執名以願見兮遂日親於燕几挹佳論之端潔兮識所存之可喜議爲邑之良術兮欲儷君而無幾復余出守於陵陽兮君亦擁麾于通義封壤相切行不越宿兮朝暮之聞愈美彼􅀖之政素艱其施兮前罕稱乎善治惟君之才力强敏兮條若紛􅁝之就理余改符於漢中兮君復駕題輿於錦水閱月未乆而君以疾聞兮忽遽傳乎君之不起哀哉淑人之云亡兮無由撫棺而問天以死徒臨風以永歎兮何壽夭禍福之反是􅀗河內之來訃兮蒙不鄙於君之子云將歸君于幽宮兮撰吉日而且邇湯湯乎大河之滣兮峩峩乎大行之趾岸磅礴而岡隱轔兮茲有利乎君之所止限川塗之脩􅃡兮阻陪葬乘之末􅁤悼余懷以遐薦兮曾莫殫於累􅁓酌芳椒以盈樽兮寘生芻而在篚遠不能脩此以奠君兮悵音容之巳矣送人風寥寥兮黃葉飛黯栗冽兮寒滿衣歷敬嶔兮山逕微背晨霞兮送子歸子之居兮錦水湄樂莫樂兮奉庭闈凝流塵兮掩瑤徽知此音兮天下希玉女艶明霞兮體霏煙秀婉嬺兮靜嬋娟如龍之矯兮鳳之翩倐見光景兮忽自還乎杳然宅幽宮兮閟靈囦領群娣兮司寶泉福斯民兮千萬億年享豐祀兮期終山登山余將往兮南山路骫靡兮何高昧其適兮茫茫歷崎嶬兮嵯峨枳棘紛兮鉤衣解難進兮前阿指屢血兮險艱翳骨拂兮叢羅地􅚣結兮伺人復虎兕兮群嘷念失足兮安逝其悵恨兮柰何丹淵集卷第一終
