front:
  text: 石室先生年譜
  hash: sha256:d971e9924b5b4155b8df61c9a37a231d37f956e5e829d22004d5e94dbdf85b42
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_044-1a}
body:
  text: 曲沃家誠之冝父編天禧二年戊午先生生按先生墓誌元豐二年正月二十一日卒於陳州享年六十二推而上之實生於是年天聖八年庚午先生年十三按先生墓誌考都官公嘗誨之日吾世爲德汝其起家乎將高吾門於吾廬之東偏以待汝宜勉之公時年十三俛而對曰謹奉教卽是年也慶曆四年甲申是歲按實錄文潞公除樞宻􅀡學士知益州七年擢諫議大夫入政府按先生墓誌潞公守成都譽公所䞇文字以示府學學者一時稱慕之必在是年或五年六年之間也皇祐元年己丑是歲先生登進士第按登科記皇祐元年三月策進士馮京以下四百九十八人先生第五蓋軫􅁚天地賦日􅉴不暇食詩天聽君人之言論考先生墓誌亦同二年庚寅是歲先生赴卭州軍事判官按先生親筆踈篁怪木碑云王成諤力臣文同與可張鎬子京樂褒聖舉皇祐二年六月六日來此命同􅀞四年壬辰是歲先生在卭州攝蒲江縣有移縣學諸生文皇祐四年二月七日司戶叅軍權縣事仇偁立石縣東三十里有忠孝寺柱間有紀行云郡從事文同䣢江李奐太學周之翰進上文􅁚皇祐四年壬辰上巳前一日同遊縣學文作於二月忠孝寺紀行作於三月意仇偁者繼先生攝縣在後方立石耳又按先生留題鶴鳴化壁詩刻後云壬辰歲仲冬月書則先生自蒲江又攝大邑也五年癸巳是歲先生在卭州按先生親筆墨林碑云余皇祐癸巳從事此州因閑爲此後爲好事者所䕶其迹如新嘉祐辛丑來倅郡治平乙巳復權守事一紀之中凡三覽此舊墨令人眷眷又題云余皇祐癸巳從事此州因閑作此二壁嘉祐辛丑自秘閣復貳郡政巳爲好事者欄䕶其蹟如新治平乙巳復權守印再覽舊墨裴回其下計此歲巳十三秋矣又按先生留題鶴鳴化上淸宫詩後癸巳歲季春月題又有重序靜林寺僧惟巳九皐集後云皇祐癸巳下元夜杳杳堂書堂必在大邑縣治今不復存矣然先生有賞豐亭詩刻在今郡圃豐榭乃皇祐五年二月二十一日太守竇平立石不知詩作於何時立石在是年也至和元年甲午是歲先生卭州代還再調靜難幕官當在京師二年乙未是歲冬末先生赴靜難軍節度判官按先生作謝都運傳諫議啓首云􅀩恩授前件官巳於去年十二月二十九日赴上訖又云向官西䣢幸迯過尤此官南􅃎誓謹名節啓必作次年之春則知赴官於此年之冬末也嘉祐元年丙申是歲先生在邠州按先生作靜難軍靈􅄘寺新閣記云嘉祐元年同佐靜難幕紫微山靈􅄘寺者凡出必造焉五月􅀄一日記又作問神詞序云丙申歳夏五月南豳大旱土人走寧之要冊池取神水禱兩不應余爲作問神詞使歌之二年丁酉是歲先生在邠州按公作捕魚圖記後云嘉祐丁酉二月十日新平官舎記又作樗蒲格序後云嘉祐二年丁酉仲冬月十有三日新平官舎序按九域志邠州新平郡靜難軍節度使三年戊戌是歲先生在邠州有送通判張總之都官赴闕序云徃年拜總之於成都及來南􅃎復得預總之職事反覆參視無有欹缺以先生墓誌考之秩滿改太常丞赴官靜難在至和二年之末秩當滿於是年次年則召試矣序蓋作於此時四年巳亥是歲先生召試舘職判尚書職方兼編校史舘書籍按先生墓誌云爾又按先生謝舘職啓云更佐兩郡行周十年近緣公章入改朝序先生於皇祐二年赴卭州判官至和二年赴靜難判官至是蓋十年矣五年庚子是歲先生在朝按先生作道士袁惟正字行之序其畧云予典校中秘書暇日納凉於城南道宇有道士肅予坐堂上以字請其後云嘉祐五年庚子元日謹序又作種柳詩序其畧日楊君灝巨川爲令種柳千根表絡諸道作三詩紀其事和者連章以至大軸携入都下示余屬以序後云嘉祐庚子人日安靜文同序然先生墓誌云以親老請通判卭州先生又作榮州楊處士墓誌云嘉祐五年二月葬以書狀拜道士李有慶來詣山居意先生是年歸鄕矣六年辛丑是歲先生倅卭州按墨林碑先生親筆云嘉祐辛丑來倅郡又作嘉州平羗縣夫子廟記云道士李有慶過卭訪余五月十日記又作成都楞嚴院􅀞六祖記後云予自秘閣校理乞侍親得相於臨卭郡嘉祐六年辛丑五月十五日東園芳洲亭書東園卽今倅㕔之圃也郡圃在西故以東别之同日又作鳯凰山新禪院記鳯凰屬卭之大邑縣思安鎭然按先生墓誌云通判卭州至未幾丁都官公憂則知先生是年必以憂去先生後通判漢州謝成都端明啓云向嘗遂外官之請尋用持先子之憂一居家山四改歲序蓋自是至治平二年公赴漢州四年矣七年壬寅是歲先生居憂在鄕按先生家集有作卭州永福院新修桂華閣記後云壬寅六月十日記必在家時作也今碑巳不復存不可考矣八年癸卯是歲先生居憂在鄕按先生作梓州處士張希澤墓誌云治平改元正月以疾終於家希澤初得疾余持服里居考希澤得疾之初必是年也又按先生作費先生詩集序亦稱嘉祐癸卯東平先生以詩爲示云治平元年甲辰是歲先生在鄕按先生作梓州永泰縣重建北橋記云上卽位之明年永泰縣重建北橋旣成其令佐有請於邑人文同治平元年二月一日記又作東橋記後日同者字與可縣人又作中江縣樂閑堂記後云治平元年五月日記又按先生墓誌服除歸館又以母年請通判漢州蓋在是年二年乙巳是歲先生赴通判漢州又攝守卭州按漢倅題名記治平二年二月五日到任又按墨林碑先生親筆云治平乙巳復攝守事蓋以漢倅來攝臨卭也又作中江縣新堤記云治平二年春河內廖君子孟爲之令貢士賈汝奇等二百人請余求文意此記作於未赴漢倅之時以卭州太守題名記考之嘉祐八年十二月七日張赴以虞部郎中到任治平二年八月二十四日劉介亦以虞部郎中到任張必未滿秩而去先生必攝守於張之後劉之前也又按先生權卭州謝成都府尹啓云爲治中之官殊恐不職行太守之事固非其冝然而一紀之中三來於此自爲從事至攝守十二年矣然先生作羅屯田墓誌首云治平二年九月十日職方員外郎羅公登詣同於成都囘車館手授其先人行狀則先生八月解臨卭歸廣漢道出成都作此誌銘無疑矣三年丙午是歲先生在漢州六月知普州按先生作成都府運判霍侯燕思堂記云旣落之侯謂廣漢都尉文同日無石以載疑事之闕將以屬子子其謂何同日諾治平三年二月十五日記又作仁壽縣太君李氏埋銘云宋治平三年丙午春太常博士宋璋與其弟瑄葬其母夫人仁壽太君李氏於犀浦縣俾其友廣漢郡尉秘閣校理文同謹歲月之實納諸壙中又按先生作綿州李處士墓誌云治平四年十月十五日以疾卒于家嘗憶去年六月自廣漢移守安岳道先生門下入拜於南堂先生與語恐不能乆留於世别未百日而秘書丞君遣使以狀來日先人臨終攬誼伯手屬之日吾死當使普州誌吾墓則知先生是年六月赴普州矣四年丁未是歲先生在普州按先生作成都府學射山新修祠宇記云龍圖閣􅀡學士趙公治平二年夏四月􅀍詔守蜀明年春三月上巳來遊學射山四年初五日記此記疑作於普州又有普州三亭詩日均逸日東溪曰碧崖然按先生墓誌云賜五品服知普州丁仁壽憂服除熈寧三年知太常禮院則是年必以憂去官矣熈寧元年戊申是歲先生居憂在鄕二年巳酉是歲先生居憂在鄕按先生題黄氏易圖後云熈寧巳酉孟冬望日墨君堂書又有夏日閑書墨君堂壁詩云先人有弊廬涪水之東􅁁我罷漢中守歸此聊息焉則墨君堂在先生所居明矣十月十五日又作茂州汶川縣勝因院記十一月十五日又作彭州永昌縣治巳堂記三年庚戌是歲先生在朝按先生墓誌云熈寧三年加太常禮院兼編修大宗正司條貫又作送朱郎中詩序首云熈寧三年庚戌三月癸丑同自蜀還臺宿臨潼華淸道館朱康叔引名見訪又作利州羊模谷仙洞記云熈寧庚戌春予還朝利州通判冦諲爲予言云云記後九月二十三日四年辛亥是歲先生歸鄕赴陵州按先生作陵州謝表云臣巳於三月五日赴任訖又作榆隂詩自序云熈寧辛亥歲春予自京師赴陵州因過家省墳墓云云又有辛亥孟秋虹下飮古井詩五年壬子是歲先生在陵州按先生作送朱康叔郎中詩序有云五年同守陵州康叔之子雒縣尉瞻之遣使致書後云壬子中元平雲閣序閣必陵之州治也又作仁宗皇帝飛白書序其略日太子賔客掌公禹錫時預此集乃􅀩帝子之殊渥焉熈寧五年十月其孫文紀爲陵州貴平縣令願將刋鏤見求短引以著其下初八日謹序又謝知府吳龍圖薦章乞召還書殿以備諮訪啓云自從登科以至遊宦二紀於此一節不回先生以皇祐元年登科至此二十四年啓必作於陵州又以先生集考之先生後知興元奏乞差洋州狀云􅀩恩除臣陵州得一年十箇月因改州爲監復􅀩就差知興元府則先生於是年冬罷去矣又按先生作張思孺挽詞云昔在天彭郡僑居過一冬感君常見訪無日不相從意先生罷陵州寓居彭州四年方赴漢中也孟冬猶作䊸竹記六年癸丑是歲先生自天彭赴漢中按先生作提刑張公射中金錢詩序云公因作詩大尹以下咸屬和焉馳寄於同使序其略熈寧六年正月甲子謹序又作送趙大資再任成都府詩序云嘗欲有所論譔以紀公之休懿㑹赴官興元道出門下公因授以送行詩一篇俾爲之序熈寧六年上元日謹序又作彭州胡氏三遇異人記云熈寧六年春余寓天彭成都承天僧敏行無演在焉又作彭州張氏􅀞記云予寓彭累月居甚閑暇後書熈寧六年中秋日謹記以是考之先生必於是年之春至成都辭臺府復回天彭乃赴興元也又作送敏行無演序云無演自成都來爲余設㓕緣之梯引除妄之綆一日忽語余以西還之期書此贈别熈寧六年癸丑季冬甲申書此必無演訪先生於興元耳七年甲寅是歲先生在興元按先生作拈古頌序後云熈寧七年甲寅五月戊子謹序雖不言作序之所度前年巳赴興元後年上元作送張嘉州序於甚美堂此年必在任爾又按先生奏乞差洋州狀云􅀩恩除臣知陵州一年十箇月因改州爲監復􅀩就差知興元府今到任巳及一年五箇月替期非遠切慮差官代臣赴闕乞再差知洋州一次奏當作於此時八年乙卯是歲先生在興元按先生作送張益孺學士知嘉州序後有云朝中士大夫以詩餞之視事之明日卽走書興元求余爲序熈寧八年上元甚美堂書堂必興元之府治也又作靈夢記云興元府唐安寺戒壇院六臂大悲觀世音菩薩者乃通判軍府事太子中舎盧洪徽之之夫人長安縣君朱氏之全節也後云熈寧八年歲次乙卯二月十五日丁丑記又按先生將赴洋州書東谷舊隱詩其間云昨從漢中歸於此度炎燠還當武康去就養若雞鶩又作夏日墨君堂詩云先人有弊廬涪水之東􅁁我罷漢中守歸此聊息焉是時五六月赤日烘遥天又云行將佩守符復爾趍洋川又種榆詩序云熈寧辛亥春予自京師赴陵州過家省墳墓見所居長衢比戶競取榆栽列植官道後移興元滿替復歸待洋州闕始四年爾而榆巳高大䌓茂深宻可愛予正得此過一夏􅀩庇厚矣詩盖作於是年之夏意公歸鄕度夏方赴洋州耳九年丙辰是歲先生在洋州按先生題魯肅簡公尺牘後云熈寧九年丙辰七月癸酉洋州守居灙泉亭記十年丁巳是歲先生在洋州按公墓誌洋州代還判登聞鼓院蓋先生赴洋州於八年秋冬之間至是秋滿還京師考之實録不見除判鼓院之月日而墓誌止言數月乞郡疑是年冬赴京師皷院之命或在元豐元年之春也元豐元年戊午是歲先生在朝按先生墓誌判登聞鼓院數月乞郡東南除知湖州又按神宗實録元豐元年冬十月壬寅朔戊午以判登聞鼓院司封員外郎集賢校理文同知湖州蓋十月十七日也又按先生寄題湖州沈秀才天隱樓詩云自念乆不偶歸老東南州地名水精宮家有天隱樓詩蓋作於此時又有湖州提轉先狀云已謀便道之行卽次提封之下此亦必作於是年之冬二年巳未是歲先生卒按先生墓誌元豐二年正月二十一日以疾卒於陳州之賔館蓋先生自京師赴湖州至陳而卒也石室先生年譜終
