front:
  text: 陳眉公先生訂正丹淵集卷八
  hash: sha256:863e6560f9fe550937418f547995cb75ddea792e25060ae0c650eecb8b2a07a6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_008-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳吳一標建先詩五十一首卭州東園晩興公休時得岸輕紗門外誰知吏隱家闘鴨整群翻荇葉乳烏無數墮松花携琴秀野彈流水設席芳洲詠落霞向晩雙親共諸子相將來此樂無涯秀野芳洲二亭名雨過側調隂車飛空載急雨雨過林塘若新換檉花浮波魚誤食松子落屋烏驚彈白雲挂樹乆不起靑煙泊草殊未散東園傲吏愛高竹把卷倚風頭髮亂題象耳山寺轉谷縈巖路始窮隔林遥望一門通溪山俱在見聞外臺殿盡藏懷抱中像閣罘罳明海日經幢瓔珞撼天風勞生又逐輕舠去珍重高僧解苦空題晉原舒太博淸谿閣危閣飛空羽翼開下蟠波靣影徘徊光揺畫板月深淺聲遶曲欄風徃來暝色四郊煙莾蒼曉雲千嶂雪崔嵬主人好事民無訟日夕登遊對酒杯縣樓獨酌向晚無公事身如太古閑縣樓明夕照罇酒對南山放意利名外遊心天地間生來不能飮到此學酡顔殘秋郊外蕭蕭風色弄寒威見盡郊原向晩暉昨夜星霜和月落滿林紅葉隔煙飛巳嗟北渚蓮初老更惜東籬菊漸稀休感歲蕐傷節物眼前罇酒重相違郊外城市壓塵土高原聊振衣晚雲多淺碧秋樹半深緋江氣雜輕靄山光明落暉因成求好景更就野橋歸靜林詩僧已老七十吟中老淸風滿舊林倚笻秋岸遠圍衲夜房深未得雲空在將成月巳沉生平苦如此誰是識師心高堂山兠率寺孤絕不可狀此山餘舊聞因官多暇日與客到深雲門外一塵斷座中千里分勞生當自去繚繞下西曛閑居院上方晚景繞岩縈谷到禪扄更上危㒹最上亭風攪亂鵶盤古木雨催羣鷺下寒汀秋田溝壠如棊局晚岫峰巒若畫屏詩巳就成終夕去遠村燈火一星星李道士惠琴軒集二首驅役精魂入大幽滿編奇絕盡冥搜不教天地畧容隱應與鬼神同訪求海藏光芒開寳三羽林鋒刃立戈矛蕭臺自好携歸去莫向人間苦暗投其二壽寧孫老畫壁下當日偶同君此行是時衆裏畧一揖自爾乃得君詩名風馳雨絕十五載此地忽爾相逄迎見投琴軒兩大集寳匣金鑰緘瑶瓊未開試使道所有毛髪寒竪肝膽驚歸來燒燈讀至曉句險字硬才力獰君身長不滿三尺萬象何術獨手擎嗟我氣俗音韻淺不敢與君相和去鳴聊書短歌報佳惠它日願將朝七瓔彭山縣居公館靜寥寥園亭景物饒溪光明短彴樹影䕃危譙山鳥忽雙下池魚時一跳主人王事簡文酒日逍遥下金雞山峽束幾重煙山分數尺天岩猿與溪鳥一似過飛仙過金雞關關頭氣象古關下風煙淡春深草木活嵐重坑谷暗禽聲著部奏花色成窠勘歸鞍雖若水留此亦能暫夜靜獨登小閣有所見因書危閣横空蔽野扉夜深來上乆忘歸水光㶑灔和煙動雲色䙰褷夾月飛隔岸葦村聞笛遠背灣松塢見燈微此間自得吟中樂不覺霜蕐滿盡衣送黃夢得去年輕舳過巫山今日羸驂度劒關孤客毎嗟隨斷梗慈親常把夢連環蘭陔歲晚雖堪采桂窟春深正好攀决取榮科歸舊里板輿迎侍且承顔送郭方叔南充簿六月東山道炎風滿去鞍譙周之舊里仇覽此初官簿領無煩壅圖書好燕安淸朝名路闊愼勿學長歎送張郭二秀才赴舉二子共齎刀翩翩去意豪負才皆萬選入守定雙高上道梅薫袖還家草映袍須知本鴻鵠終不在蓬蒿謝人寄蒙頂新茶蜀土茶稱盛蒙山味獨珍靈根託高頂勝地發先春幾樹𥘉驚暖羣籃競摘新蒼條尋暗粒紫蕚落輕鱗的皪香瓊碎䰐鬖綠蠆勻慢烘防熾炭重碾敵輕塵無錫泉來蜀乾崤盞自秦十分調雪粉一啜嚥雲津沃睡迷無鬼淸吟徤有神氷霜疑入骨羽翼要騰身磊磊眞賢宰堂堂作主人玉川喉吻澁莫惜寄來頻謝許判官惠茶圖茶詩成圖畫茶器滿幅寫茶詩㑹說工全妙深諳句特奇盡將爲遠贈留與作閑資便覺新來癖渾如陸季疵雨後㸔山因憶黃世南先生詩以相招新霜夜落羣梢鳴羣風刮天爲早晴南山向曉盡張列頺嶺斷壑當空橫開軒一見喜無量走上高閣臨飛甍層欄倚遍不能下狀貌秀活圍雙睛奔騰遠近若波浪愛極擬去中間行此時只恨少佳客相共呌笑誇崢嶸我思黃子者奇士趣向超越無俗情手提詩筆若椽大到處詠物物有名我今此縣頗幽僻復在歲杪天氣淸溪中魚蟹易尋覔林下梨栗新收盛子如訪我住旬浹此品可備盤與觥遂馳僕馬去邀子願子爲我聊出城私心不獨徒見子亦願播此山之聲子如不見不爲詠可惜此山虗此生送楊議卿赴舉寒日照殘樹新霜結衰草有客奉高薦策馬奔遠道聲名近轉大文字素已好壯歲雖可恃榮科亦宜早勉自報春暉高堂親髪老和楊仲軻春難度三首春難度紅梢梢尋縷縷朝披煙暮結雨勸君飮酒莫用訴春難度其二春難度歌滿闋酒萬舉喉欲破膓欲腐風光滿天巳不暮春難度其三春難度池浮花墻擁絮枕書睡樹隂午日長幾何萬尺許春難度和何靖山人海棠爲愛香苞照地紅倚欄終日對芳叢夜深忽憶高枝好把酒更來明月中訪李奐山人隱居多暇無所適故來尋隱君搴開壓屋樹觸散擁門雲狀貌不妨古言談何太文令人重高趣歸去毎斜曛冬晚書事倚杖立亭臯寒威向曉豪雪乾山色老風烈樹聲高殘日千鵶舞孤雲一鴈號自然成感物不覺首重搔晚次江上宛轉下江岸霜風繞人衣翩翩渚鴻墮冉冉林鵶歸前壑已重靄遠峯猶落暉孤舟欲何處劃浪去如飛十月梅花十月凍墻隈英英見早梅應從九地底先領一陽來紫膜紛紛脫黃膚迤迤開得風渾自變與雪欲成堆細暈輕檀口濃粧膩粉腮月娥身解冩靑女手能裁冷豔浮氷沼淸香落玉杯只憂融乳酪不惜露瓊瑰避妬情堪重禁寒術可猜有誰憐寂寞盡日獨徘徊共語誠無計將題耻不才東隣夜夜客莫放笛聲哀吉祥院欹危一逕通下馬轉深叢便是塵寰外可憐煙塢中修篁寒滴雨老栢靜吟風日暮庭前樹歸鵶自遶空書鸖鳴化壁晚氣隂隂别作寒夕陽林下動歸鞍忽然人報後出雪更上上淸宮上㸔題鶴鳴化上淸宮秘宇壓孱顏飛梯上屈盤淸流抱山合喬樹來雲寒地古芝英折岩秋石乳乾颷輪遊底處空自立層壇寄題何靖山人隱居門外鋪寒水墻頭立好山先生忘勢利高隱寄中間鳬鶩應同樂煙雲巳共閑幾時能少暇携酒到松關寄楞嚴大師錦官城裏寺一室若雲峯水縮秋吟鼎霜低夜講松住齋塵入鉢出定蘚生笻曾聽三摩義居常夢曉鐘揖山閣一問此孤高蒼蒼欲上摩有時臨縹緲盡日對嵯峨絕底秋隂重危層晚照多無由從隱者空自愧雲蘿杳杳堂杳杳堂何者余常此養愚放身依曲几忘慮若枯株莊老題書冊喬松列畫圖客來休見問非爾識于于安仁道中早行行馬江頭未曉時好風無限滿輕衣寒蟬噪月成畨起野鴨驚沙作隊飛揭揭酒旗當岸立翩翩魚艇隔灣歸此間物象皆新得須信詩情不可違竹閣囘廡抱曾閣蕭然深且虗畫欄慿曲曲高竹愛踈踈塵滓外不到衣襟淸有餘毎來聊自適幽意滿琴書尋春馬行如疾輪十里去尋春盎盎日光麗鮮鮮雲色新樓臺出花木道路夾松筠欲買前村酒陶然作醉人太博孫公遊火井因寄七盤雲道與雲浮下見高林壓縣樓覽景莫能陪後乘臨風空自憶前遊已聞去日謀詩席更羡歸時就釣舟好句定知酬不得盡將奇詭入冥捜墅居林下覽淸曠此懷殊不覊散行輕幘便獨酌小甌宜自可追三樂何須作五噫世情歌笑外紛擾竟何爲靣川亭幽亭最孤絕直入亂叢間近晚獨來此有誰相與閑卷簾通大野臨檻數前山便欲教携酒陶然踏月還南亭晚衙𥘉散吏人歸獨立南亭着道衣淺酒小詩聊自樂此心渾欲外輕肥北郭繞樹埀蘿䕃曲堤暖煙深處亂禽啼何人來此共携酒可惜拒霜花一谿讀史不得熒陽遂失秦始知成敗盡由人可憐一擲嬴天下只使黃金四萬斤夜學巳叨名第雖堪放未到根原豈敢休文字一牀燈一盞只應前世是深讐畫眉禽盡日閑牎生好風一聲初聽下高籠公庭事簡人皆散如在千嵓萬壑中鸎濃染羽毛深畫眉曉來風日正晴時只應自道新聲好啼遍後園花萬枝佛頭地名也此中山水絕隹公暇常來此處遊碧波蒼巘解相留翩然又向城中去囘顧溪山只自羞丹淵集卷八終
