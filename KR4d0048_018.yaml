front:
  text: 陳眉公先生訂正丹淵集卷十八
  hash: sha256:787b129c98bd996517d85cb1d03713c4a27c7425b8eebb27cece8a0e19a94385
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_018-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳吳一標建先詩五十六首晉銘長安鬻碑者遺我古鼎銘不知其所來有眼實未經凡百十九字詭怪摹物形縱橫下點畫不類子與丁試考諸傳說其源已㝠㝠宣王石皷文氣韻殊飄零始皇嶧山碑骨骼何竛竮我恐鬼哭時正爲此物靈安得不死神提去詢大庭爲我譯其辭讀之駭群聽秦詔山流濯幽阮銅篆發古耀我行奉天縣叟以百錢糶讀之廼二世元年所刻詔謂法度量者盡始皇帝造辭止曰皇帝乆逺若爲道乃命斯去疾具述紀其右文章旣精簡字畫亦佳妙亥爾何等人敢作萬世調其爲者非是所累纔一廟區區頌微末囘首皆可弔郡兵厭寳玉得此只揮掉漂流落荒壤千載厄潜奥乃知天宇內事有不可料此物今何爲惟助觀者笑問陳彦升覔古瓦硯魏主用死力􅌟彼銅雀臺當時臺上瓦百澄爲一坯燒成比堅玉翠甲橫崔嵬西陵旣歸後此地日以摧後歷典午朝群雄力相豗兹臺旣巳傾此瓦只自堆歲乆岸谷變埋沒深蒿萊𥘉誰得耕人刳之研松煤其理宻且潤端歙眞可咍彦深所有者一一皆珍材自言欲􅌟時經歲無一枚琴紋與錫花此乃如瓊瑰前日秘閣下重匣手自開示我者佳絶恰用一樸裁形模甚古野用可資怪魁歸來作詩乞願致無遲囘謝楊侍讀惠端溪紫石硯學文二十年語氣殊未成所以文房中四譜無一精豈不願收貯恐竊好事名自愧中槁然敢假外物榮前日下秘閣謁公來西城公常顧遇厚待以爲墨卿延之吐佳論出口無雜聲語次座上物硯有紫石英云在嶺使得渠常羙其評因取手自封見授囑所擎倉皇捧以拜其喜懷抱盈歸來示家人衆目歡且驚言並我所有瓦礫而瑶瓊貴價市珍煤風前試寒泓磨知宻理潤點覺浮光清洗濯鑑面瑩彈扣牙音鏗遂剪十襲巾加以重篋盛客來有欲觀稍俗不敢呈願傳之子孫更重金滿籯作詩敘嘉貺慙比毫毛輕西岡僦居出官在秦蜀始末凡十年所治得公宇靡不完且堅中堂與挾廊角翼相鈎聮領屬僅十口出處皆安便冬夏惡風日侵薄曽無緣今年歸中都職事叨磨鈆未免僦屋住敢謂須華鮮西岡頗幽僻愛此逺市㕓問得王氏居十楹月四千牀榻案几外空處無一椽匽溷及井竈坼壁皆相連經庳須俛首過隘常側肩所謂十口者日繞蝸殻旋前時大暑中幾不禁袢延鬱若鼎釡炊局如狴犴攣走蝎過亂蟻飛蚊劇群蟬今日幸過之復畏明日然喜見白露節相賀肌肉全如何下淫雨曉夕常綿綿瓦破榱棟漏柱䧟墻垣穿惟供改席坐豈暇安枕眠中庭止數歩深已可載船盡室徒跣行一起復一顛京師費耗地居止實重遷俸料計月入外得無㡬錢却思巳過分僅免親犁田自望於古人若地而升天小廬焦生高陋巷顏子賢引之諭妻孥吾道宜此焉猶勝比鄰者寒突無晨煙閿鄕値風烈風吹華隂古槐若長呼高沙起黃磧四望如一鋪上馬低便面據鞍兀長途日晚過潼關行客亦巳疎守吏索姓名沸亂如䖝蛆兩目不可開說之使自書夜至閿鄕縣僮僕相欷歔困定卽洗濯泥土捫短鬚草草具盤飱零落飯與蔬恨無姜少府爲膾黃河魚積雨京師値積雨浮淖皆滿城况當淘决時左右羅深阬有客南河居旦夕隄上行病僕挾羸馬十歩八九傾職事有出入長抱落膽驚都人素豪怒小官常見輕排闢要穩道歛避不敢争試欲效呵止圜目根姓名徃徃被濺汚直落舌與睛歸來事洗濯袍袴紛縱橫仰首問天公春澤當早晴幸有好日月何惜施光明大熱過散關因寄里中友人六月日正午大暑若沸鑊時行古關道十歩九立脚煙雲炙盡散樹木曬欲落喉鼻喘不接齒舌津屢涸檐血僮破領鞍汗馬濡膊幽坑困猿狖宻莾渇鳥雀至此因自謂胡爲就名縳所利緣底物奔走冐炎惡塵心日夜迫欲住不能略因念吾故園左右悉林薄昔我未第時此有文酒樂長松借高䕃飛瀑與清濯層崖對僧詠大石引客酌畏景雖赫然無由此流爍于今只夢想欲徃途路邈所效殊未立期歸尚誰約徒爾發短歌西首謝巖壑問景遜借梅聖俞詩卷前日讀子詩快我煩病軀若坐大暑中瓊盃飮琳腴辭嚴意清絶敢謂人所無子乃不自高尚爾尊聖俞爲我誦佳句實亦郊島徒遂云有家藏兩軸如椽麄我方嗜此學常恨失所趨願子少假之使之識夷途秋居覽景因感所事閑居閉窮巷拙者誠所宜掩書坐前楹黙與天理期是時新雨收物物含秋姿疎簷正殘日曲几方凉颸群雀下空堦逐逐顧且隨微蟲出幽隙繞繞行復飛疎篁挺堅勁不並草木衰叢蘭吐芬芳豈畏霜露知觀此動與植一一全天資因念物禀生有性各異持夫人爲靈者仁義實所尸胡爲智巧役所有日夜隳不能保其元妄事紛擾爲汲汲以就死所耗無纎釐還本旣不完何用冠且衣余因激所遇攬筆成此詩庻哉學者心讀已而悟玆彥思示望南山詩因答余於岐雍間屢走官道上終南百里近不得迂馬訪徒常飫雙眼引首旦夕望群巒突天起氣勢頗豪王余名愛山者所見亦無量嵩華最魁傑詩之豈曽譲至此覺才弱不敢輒名狀世謂秦土強捨是孰爲壯彦思奇偉士雅志同所尚近自山中來滿幅以詩貺凡是山勝絶鈎罥付心匠驅聮以大語句度實奔放豁若展圖畫壓𥿄千萬嶂讀之未云徹早自肝膽䘮試欲効其說無迹可依傍坐見山所有巳若一携杖何當俯清渭解帶濯塵坱掉手入巖谷琴樽樂幽曠浩􅐯八極大冥心恣飄颺此意殊未諧臨風一悽愴嘲中條荆山赴太華百萬如走駝觜尾不相殊前後翻海波旣至擁而蹲仰首争列羅大華勢愈尊引手欲下摩中條從北來亦願依巍峨豈知隊伍弱只類馬與臝奔騰氣力盡群伏飮大河飮巳只南望岌然將柰何寄題威勝軍守居高明榭石侯守銅鞮暑居念煩愀營基切城角列礎出樹杪窓橫四野外轉目可俱了長風落霄極萬里吹縹緲主人白羽扇日日上清曉琴樽嘯佳侶以樂軍事少晴煙抹闤闠暮角送禽鳥語客莫遽歸前林月將皎仙禽送景遜赴階州監稅肅肅彼靈羽英英下瑶臺楊翹俗采暗振響仙籟囘凡鳥只歛避衆人亦驚猜羅以萬目網離以雙翼摧十載困塵土一身伏蒿萊晦色不敢耀藏音豈能哀飢膓金屑實渇吻瓊漿開俛首事澡刷一飛遊九垓送呂希彥司門通判河陽行父須生公相家修㓗不類在紈綺豈惟浩蕩愛古學實亦縱橫曉時事孟州之民爾何幸一旦得此賢半刺定知未幾政清簡日日案頭詩滿𥿄河陽花開酒休䛏太行雲飛樓好倚若因行縣至盤谷爲訪其間隱君子送周介之學士通判定州紫垣之東蕃群宇合四翼天家積圖史編簡何萬億介之才藝選此地典文墨縱橫四部內騁驟千古力乆爲光禄校頗倦承明直嘗言石渠樹五見㺯春色前自啓君相得請均外職翩然駕别乘去矣大河北又河北扼虜要定武承其咽分道宿勁兵望之爲中權朝廷倚注地擇用須材賢黠獫讋所聞射獵不敢邊兹焉勢愈重豈謂甲馬然將軍廟堂老御史蓬瀛仙合謀運潜略勝氣壓古燕惟當陪緩帶壺觴鈴閣前送柳才僉判蔡州翩翩河東孫豪邁有祖德二十補楚掾能用口破賊歸來入京寺不借推挽力驕夸固其宜了不見顏色題輿蓋本乘入幕乃屈職淮西號劇府君也兹歛翼朝廷選材吏聞下前日勅奉詔者云誰此章君可塞送張宗益工部知相州學術深沉乆未施晩登臺省世方知詩章好奏周文廟字法宜磨魏武碑禁掖便當提大筆名藩猶自擁高麾應憐共試金坡者答颯渾如鄭鮮之送王恪司門知絳州絳守園池天下誇紹述有記詞聱牙蒼官青士左右樹神君仙人高下花逺水依然尚鈎帶舊門想已無鞾檛自憐俗狀不能到此去羡君專宴衙送蒲霖中舎致仕歸閬中急趨長拜倦勞勞自笑風埃滿綠𫀆官味十年如水薄歸心一日共雲高毫釐巳悟蝸争角文彩須知鳯得毛且喜還家收拾在錦屏山下舊東臯送劉立之著作歸長安因赴安定知縣西郊晴霧曉霏霏囘首京塵一拂衣上國莫嗟爲客乆高堂初喜改官歸洛城氣候花纔動㶚水風光絮恰飛恨不同遊曲江岸與將歌酒䛏春暉送張正夫監簿歸漢州知巳非不遇其如才命違宦名疑在夢親禄只徒歸道路盤危棧家山指落暉好將綿竹頌重拂八關衣潞公門客奏不出官新霜新霜着庭樹葉下如猛剉蕭然物容改有若懼凌挫砌下丹橘落墻邊紫榴破精光竹勁徤沮䘮柳怯懦覽景惜向暮感時驚忽過勝事實可樂閑愁本堪唾何當共佳客對此酌香糯答馬子山節推見寄曽陪參畫從􅐤鞬文雅當時最盛傳玉挂好風橫飮簟翠漪明月漾吟船石渠金馬余何者綠水紅蓮子尚然好養江邊鴻漸翼詔書非乆下菑川紅樹萬葉驚風盡卷收獨餘紅樹擬禁秋已疑斷燒生前嶺更共殘霞入逺樓楓岸最深霜未落柿園渾變雨初休勸君莫上青山道粧點行人分外愁彥思惠榲桲因謝秦中物專羙榲桲爲嘉菓南枝種府署高樹立婀娜秋來放新實照日埀萬顆中滋甘醴醸外餙素茸褁彥思摘晨露滿合持贈我復侑以佳句再拜極所荷珍之不敢盡玩巳卽深鎻兹焉遂名產沙苑忽么麽彥思有北樓見寄之作依韻和答峩峩守居城上樓最宜登覽群物秋層簷高搴礙翠嶺采檻直出橫清流煙中島嶼逺歷歷風外巖壑寒颼颼主人好事客意樂日夕幸此忘幽憂閑居秋日書事秋雨晚蕭蕭端居閑寂寥雀饑争朽穗蟬病落寒條雲過茶煙沒風歸硯水揺惟當䛏圖史閑日底能消寄題湖州沈秀才天隱樓自念乆不偶歸老東南州地名水精宮家有天隱樓收捲勢利心欲與汗漫遊出處固以義無爲子光羞酬仲幾秦州道上見寄送子入秦處紛紛黃葉間孤舟渡野水疋馬轉遥山明月毎夜望清風何日還新詩慰牢落爲一破愁顏入谷馬上四首宛轉入深谷一林還一丘揺鞭㺯新霽把筆韻高秋翠巘雲長合寒潭煙自浮因成憶猿鶴聊此爲遲留其二亂竹圍清宻埀蘿䕃屈盤晴林風色淡晩水日光寒樹石因誰好烟雲只自漫群峯若相待滿眼碧㠝岏其三北谷氣象佳有景乃天設峯巒牙虧蔽湍瀬相綰結珍條拂埀袂芳草留去轍自顧塵滿纓安能住深絶其四群山護秦隴轉去轉幽深嵐氣重壓眼秋光清徹心凭鞍吟絶壁解帶坐高林愛此嵓泉好臨流浣俗襟將至隴城縣數日山林間嵬眼復傾耳煩襟一以換飄若方外士今朝出谷口已覺俗慮起可惜身上衣斑班遂塵滓囬首林下游何年赤松子宿雲屏山寺翠嶺聳雲端巉巉走復蟠客從塵外入僧向畫中看月上千嵓碧風生萬木寒平明惜歸去猶待一􅻍欄寒食蜀客寓秦城寒威怯夜生火床功甚小酒榼力何輕月外天無色霜中地有聲王章龍具漙數徹郡樓更寄彥思時在長安言遊終南日日望車馬君當何日還談諧思衮衮篇什愛關關大道風埃惡長河氷雪頑相招早來此擬欲問南山寄景遜别後西城上來須到日曛目迎秦塞鴈心過隴山雲寡合無如我高懷少似君相思只相望徒爾託云云聽天台處士彈琴處士得琴要誰師師自然爲言秋思好因聽夜聲圓耳出淫哇外心揺寂寞前廣陵君且止不欲慢商絃鳴玉亭籌筆之南層崖高百尺亭卽層崖下飛泉若環珮萬縷當簷㵼坐可脫赤熱聽宜徹清夜亭前樹膚剥爲繫行人馬思歸鳥左右掩作峽中足啼鳥醆鄒不可㑹其道思歸者雄鳴卽雌對前壑雲漸起後山月已背行人畏聞汝一聲一心碎夜發散關風吹古關口萬木響如裂凄凉異鄕客騎馬關下月板道霜鑿鑿石梁溪咽咽怪來曉寒重御愛山頭雪宿山寺高峯浮雲際古寺高峯上秋來巳瀟洒雨後益清曠坐隨明月轉吟伴寒蛩響待曉出松關幽襟謝嘉貺中秋月二首隔林灔灔生寒浪倚漢岧岧數亂峯記得舊山曽此夕碧嵓千尺坐高松又望外物容澄似水坐中秋力凛如刀此身直願乘雙翼飛上三峯第一高二里溪濯足暑氣沉晚樹晴光滿遥川下馬古道側濯足清溪邊勝事樂水石幽懷託雲煙還來振衣起囘首徒悒然稠桑見荆山萬嶺鬰叢叢盤雲氣勢雄縱橫誰畫筆屈折自屏風倒樹出斷外亂雲生掩中無由更停馬此意恨如蓬白鶴寺北軒圍棊祗園隱城角開軒極幽䆳日影轉不到居常抱秋氣余兹度炎燠一局忘萬事擾擾門外人誰知此中意太常致齋閑書寺壁晩日微明㺯雨餘竹隂桐影共蕭疎旋移小榻中庭坐讀盡扶桑太帝書景遜以詩招棊因答待闕官期逺僑居客思多許時閑日月願與局中磨初入二里樹色交山色蟬聲雜水聲客懷殊不倦信馬此間行又送劉著作北地戎馬後凋殘今幾年邊民此天幸縣令若君賢况自儲蓄乆定知摩撫全好須圖善政能爲作詩傳送張樸翁歸盩厔二首一覺落天夢遂吟招隱詩携家異鄕去變服散人爲郿塢雲開後圭峯月上時清秋此高興琴酒問同誰其二山曲水曲處其間皆羙田夫君别桑􅎚此地卜林泉壯歲可立事明時方尚賢何當再就詔便忍說終焉丹淵集卷十八終
