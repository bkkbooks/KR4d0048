front:
  text: 陳眉公先生訂正丹淵集卷九
  hash: sha256:d452e204228067660c762b7978a24defd8a1fab0625cd59d46a27a1b9104592b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_009-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同參吳吳一標建先詩三十五首和子平弔猿去年汶山花平僧求得匡猿遠相寄來時野性巳馴熟趫捷輕便殊可喜呼來遣去會人語一成巳絶歸山意置之眼前看不足解去絛索令自恣月明木杪倚風嘯天暖花隂向陽睡兒童圍繞賔客惜倒挂橫跳衒嬉戲豢夫每日費提舉未始時節虧飮飼前時忽來報之病抱立階前自臨視與之柿栗不肯顧局腳埋頭交兩臂毛焦色暗肉攣縮斗覺精神變憔悴尋常忽然遇小疾不過蜘蛛噉三四咽喉才下即無恙何此不效況頻餌今朝霜風冷入骨早遣之問云已斃人情不免為傷怛退自悔恨中且愧重巒復袖本其樂大薄長林違爾志苦將韁鎖強維摯不究天年良有自遣人包裹瘞深僻不使筋骸屬螻蟻西鄰子平最好事聞之搏髀歎無巳再三慘怛來訪問歸作長篇踰百字其詞讀之甚悽愴亦謂一鬱歎其死復推物理重相慰聚有散無皆偶爾把之庭下讀復讀仰望高株一㱆欷和子平悼馬生來未嘗畜良馬近得此駒誠可嘉骨節權奇毛肉好此種無乃真渥窪健蹄駸駸穩而疾歷目一過如飛霞自歸官下少出入惟是芻粟意轉加前時相期好天色往返百里馳平沙誰謂兵奴踠其足針烙尉裏成瘢痂立多氣毒憤入肺雙膁攢縮兩鼻呀庸工謬藥久不效倒死櫪下鬃髟髿敝帷一區瘞以贈惜爾命薄如萎花子平平時最愛爾對客滿坐常洪誇今朝見爾忽斃踣重以好詩形歎嗟嗟余逐貧官職小此馬豈合居余家從今但只跨欵假壞轡破鞍仍短檛冷瓶海南有陶器質狀矮而􅤚云初日炙就煆鑠不以火水壺醜突兀酒甒肥磊砢山罍頸微腫石鼎足巳跛圓如鴟夷形大比康瓠顆華元腹且皤王莾口何哆蕃胡入中國萬里隨大舸携之五羊市巾匱費包裹侏儷講其效㵼辨若炙輠課以沸泉沃氷雪變立可炙𫾣療中渴其用豈么麼君凡幾錢得不惜持遺我曾將對佳客屢試輒亦果勿云遠且陋幸可置之左中秋夜試院寄子平憶初我來時夜色如墨障心常念明月幾日西南上松梢倚樓角一玦偃相向漸見輪中物依稀吐形狀今宵東嶺外灔灔金波漲人間重此夕一歲號佳賞而我督秋試鎖宿密如藏細務紛滿前約束甚鞿鞅無由奉朋侣徹曉坐清曠之人富才華筆力趫且壯誰陪把樽酒露下與酬唱南墻咫尺地使我起遐想人生此良會可惜巳虛放獨立中夜歸俯首入書幌贈城南觀音院菴主廣師簿領日嬰薄紛然汨幽襟駕言出城南聊欲清此心平岡見淨剎石徑鬱以深中有苦空人峭健奇骨森十年一菴下形迹了莫尋兀如擁敗褐口吐衆妙音時下寂照堂聲絶響亦沈默矣蓋自得其誰知少林送韓震都官監渭州酒韓近悼亡士師每失官未始有憂愠園吏既喪婦何嘗復嗟憤二子道義勝一與天理順之人乃其徒心迹兩相近區區赴窮塞而使賣官醖胸中浩然者俗口不得問好軍此開府遇士以恩信若訪禦戎策請為講三陳時仲儀帥渭成都楊氏江亭汀州煙雨卷輕霏遙望軒窗隱翠圍萬嶺西來供曉色一江南下載晴暉鳬鷗慣入闌干宿魚蟹長隨舴艋歸我亦舊多滄海思幾時如此得苔磯漢州王氏林亭短彴疏籬入野扄竹煙松露滿襟清奔湍激險飛寒響弱蔓穿深挂晚英惜去更觀曾畫壁記來重注舊題名門前便是紅塵道誰肯同過洗俗纓春雪呈知府龍圖朧朧玉魄沉霄彩蔌蔌瑤花破曉隂和氣所蒸緣異政豐年之兆慰羣心畫樓卷白歡聲洽遊騎障泥樂意深太守安間民訟息錦城無限好園林同蘇祕丞子平登延暉故亭城端有亭餘故基吏曰舊榜題延暉行穿蒙籠倚孤陴霜風飄蕭吹我衣高林滿郊目四圍雲起日落晴煙飛感今念往聊久之埤堄昏黑羣鴉歸金桃雨染煙蒸萬實垂丹硃為骨菊為衣客疑麗水新淘得人向瑤池舊帶歸只恐壓枝星欲落最憐和菜露初晞銀瓜玉李君休並此品仙家亦自稀房公湖一頃清波四靣平宛然唐相舊經營高秋林木形容老落日樓臺綵繪明有景可尋蘭棹遠無幽不入竹橋橫二年所得官居樂肯厭頻來緩帶行錦雞高原濯濯㺯春暉金碧冠纓綵繪衣石溜㵼煙晴自照巖枝橫月夜相依有時勃窣盤􅘐舞忽地鈎輈格磔飛寄語人間用繒繳瑤臺鸞鳳好同歸竹棕秀幹扶疏綵檻新琅玕一束淨無塵重苞吐實黃金穗密葉圍條碧玉輪凌犯雪霜持徑節遮藏煙雨長輕筠此名未入華林記誰念西南寂寞春無為山寺一絙危磴繞峥嶸上徹幽深入化城煙外川原誰繡畫雲中樓閣自隂晴老僧高論都無著古佛真身宛若生聞道軍持新呪水願傾涓滴灑塵纓劍州東園羣峰高擁碧嶙峋亭宇清華氣象新兩岸煙雲先向日一林花木暗藏春溪明夜閣軒窗月風斷晴橋井邑塵好酒滿樽詩滿軸主人曾不倦行人運判南園瞻民閣青都高與紫霄通獨此危欄望不窮萬嶺過雲秋色裏一峰擎雪夕陽中櫩楹曉落天蒼月窗戶晴吹石闕風民吏安間財賦足管絃時復在層空讀淵明集吏人已散門闌靜公事才休耳日清窗下好風無俗客案頭遺集有先生文章簡要惟華衮滋味醇醲是太羔也待將身學歸去聖時爭奈正升平張次公大博歸閬中制詔頻來試玉京清途猶自滯豪英策高三道竟何用恩拜二親方爾榮嵇阮襟懷終曠逹儀秦才術本縱橫閬中勝事知無限且向城南爛熳行寄成都監庫石屯田遠叔一年同住夾城中小圃高齋幸見容吟盡物題春唱和講窮人事夜過從尋芳待去門前約訪古邀回道上逢别後西樓不堪倚滿川林木暮雲重宿隆平精舍萬木羅靑蓋雙峰敞翠屏風埃愁客路鐘鼓喜禪扃下馬穿蒙密隨僧入杳冥俗襟如見濯試為㵼銅瓶弭蓋亭弭蓋長亭下軒窗慰客心田塍交遠日水堋㵼清襟北道雲千里西山雪萬尋塵衣無奈拂去騎復駸駸什邡道中驅馬下遙川殘陽促晚鞭高林夾廣道亂水入平田村落晴如畫桑林晝起煙飛鴻正南下歸意滿雲邊夜思寄蘇子平祕丞亂竹敲風遠高松過雨涼檢書防落燼下幕恐遺香好月娟娟上輕雲苒苒長端令阻佳客不得共清觴西湖丞相淹回地光容滿落暉池塘存舊夢城郭歎前非煙靄隂晴出鳬鷗遠近歸松風殊有意猶欲下金徽猿岷嶺高無敵來從第幾層攀緣殊不倦趫捷爾誠能晚嘯思危石晴懸憶古藤王孫非汝類只可以文憎幽沼促促開幽沼涓涓引細渠無由安島嶼才可活龜魚秀荇新宜食圓荷淨好書時來坐高柳濯足蔭扶疏步月掩卷下中庭月色浩如水秋氣涼滿襟松隂密鋪地百蟲催夜去一鴈領寒起靜念忘世紛誰同此佳味中秋對月懷寄鳳凰山鄧道人有客千巖萬壑中緑毛丹臉紫方瞳不知今夜西樓月幾處飛山下碧空秋日晚晴呈同院秋風淅淅吹碧虛白雲鱗鱗如臥魚共君今夜賞明月興來誰欲騎蟾蜍戲呈鳳凰長老用師七十頭陀會語言舌根流利口闌珊羅浮居士最難奈穩把無絃琴與彈郡學鎖宿長柏高柟蔭廣庭夜涼人靜夢魂清不知山月幾時落每到曉鐘聞雨聲子平棊負茶墨小章督之睡憶建茶斟瀲灔畫思兖墨潑淋漓可憐二物俱無有記得南堂棊勝時長安李晦叔醉老菴醉老名菴晦叔為菴中長是醉淋漓扶頭未得日過午門外萬端俱不知和邵興宗棊聲二客與棊酬寒聲滿側楸急因隨行發斷為見遲休花下鶯翻翼林間鶴轉頭丁丁竹樓下不獨在黃州丹淵集卷九終
