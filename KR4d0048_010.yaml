front:
  text: 陳眉公先生訂正丹淵集卷十
  hash: sha256:beb994e830bdc70faae66a44257464bf57aaaedd79a49bef07c3303faee5af88
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_010-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳吳一標建先詩二十三首續青城山四詠昭慶觀琳崖盤玉霄彩翠接歩武雲霞不可畫泉石固難譜神幢逾百尋帝轍歷萬古靈瀑誰與窮長飛六時雨天倉山威儀觀群峯削瓊瑶老蘚抹古綠應朝大㟭去簮笏儼相逐珠宮秘仙仗錦笈藏寳籙上帝此爲倉其田堪種玉飛赴寺平林露層巘上獨置孤寺群仙馭飛駕徃徃赴於此風高幡影亂日落鐘聲起誰可謂詩豪興來吟萬𥿄香積寺道險轉詰曲山深愈㠝岏行松耳目清入竹襟袖寒殿閣紅芙蕖嵓巒碧琅玕高僧把金字擁衲對雲看夏秀才江居五題枕流亭愛此煙景佳開軒故臨水晴暉照寒浪飛影動牕𥿄倚檻見魚游卷簾知鴈起憔悴笑湘纍區區詠蘭芷闘碧亭雨餘山景鮮風定水光好晴陽破宿霧秀色濃可掃平時一樽酒野客共傾倒朝暮山水閒年華不知老天隱洞層崖削青瑤誰昔此鐫鏤潭潭闘孤洞中可百人受㠝岏列岫繞洶湧大江漱虞卿方著書入此幾年就直鈎磯盡知人鈎曲獨見君鈎直年年此磯上萬掣無一得持竿只自苦吞餌何嘗識試効人所爲君魚不勝食醉經庵埀茅緝爲庵有類穹廬形之人伏其中日醉乎群經世俗安爾知但謂長不醒寄此語二豪渠非彼劉伶寄題杭州通判胡學士官居詩四首鳯咮堂太史書言官居在鳯凰山下此山眞如鳯有兩趐趐上各建一㙮而鳯觜正落所居池上舊有一堂在山欲落處近葺之謂之鳯咮堂因而求詩四詩爲子瞻賦今易以胡侯豈黨禍未解故竄易失眞歟胡侯外𥙷來錢塘所居之山名鳯凰不知元本發何處虵頸魚尾盤高岡婆娑欲下大江飮萬里一息頭低昻誰將屠蘇壓兩趐直使帖地不得翔前人眼俗不知顧㑹有賢者來形相怜汝困欲共汝語故近汝咮營斯堂起居飮食不離上外孰有耳聽琅琅應云汝德未衰在旦暮可起鳴朝陽濺玉齋又言山上草中多恠石近取得百餘株於東齋累一山激水其間謂之濺玉齋石林森座隅激水注射成飛渠寒音琤然落環珮爽氣颯爾生庭除主人清標自可敵底處勝槩爲能如想君不欲時暫去其餘滿案堆文書方庵又言堂後有屋正方謂之方庵同按釋名庵圜屋也衆人庵盡圓君庵獨云方君雖樂其中無乃太異常勸君刓其角使稱著月牀自然制度穩名號亦可詳東西南北不足辨左右前後誰能防願君見聽便如此䑕蝎四面人恐傷月嵓齋又言累石爲山上有一峯穿竅如月謂之月嵓齋詩中子平卽子瞻也月爲太隂精石亦月之類月常寄孕於石中事理如此何足異天地始分判日月各一物旣名物乃入形器安有形器不消沒况此日與月曉夜東西走珠流璧轉無暫停豈與天地同長乆其爲勞苦世其知惟是月有生死時旣然須常換新者人但不見神所爲日須天上生月必地中產君不見􅉑州朱陽縣之山谷間纔成未就知何限石有不才者徃徃其卯􅖁靈媪棄置不復惜任人取去爲珍玩佳者留之待天取藏滿庫樓千萬許彥瞻愽物天下稱更無定不以予之說爲寱語予恐世人不知嵩丘嵓洞中中有八萬二千修月戸其人所食盡玉屑昔有王生見之滿襆提斤斧應是當年靈鷲山直自天竺飛落西湖前其上有石姙月月巳滿此人朅來就彼剜剔歸上天所以此石拆疈不復合至今神胞所附之處其痕圓抛擲道傍凢幾歲風刷雨淋塵土穢子平一見初動心輦致東齊自摩洗更選他山相擁列就中獨爾一峯最奇絶毎至瑶魄流光下照時玉柱橫欹無少缺子平謂我同所嗜萬里書之特相寄邀我爲詩我豈能窓前累日臨空𥿄遥想嵓前寳穴通玉蟾從此去無蹤請君爲我細書字側名爲月母峯寄貟文饒屯田英英文饒江漢士何者天教䘮眸子用心專一性轉明無所不知餘兩耳能爲樂府勝張籍暗誦史書過杜顗弃官新自荆渚歸萬里逆風衝峽水峩峩全家載巨艑坐臥吟詩滿千𥿄自言從此生事足可了芋粟及麻枲數椽舊屋蔽風雨一榻蕭然容隱几丘明國語浩如雲子夏門人紛若蟻向人問口誇舌在道義文章吾豈巳自知俗事無所觀便落雙晴君亦喜奉送少訥還青神濕雲堆空洩淫雨日與三嵎氣相軋春陽沈伏不得動萬木屈蘖草藏茁叢岡複嶺誰敢度旦暮寒鷄呌泥滑少訥胡爲犯此苦特念我困來省察延之累日對佳話如侍大饗聽控掲彦瞻弟兄别巳乆使我心胸昏莫刮天將少訥愈我病次第爲取蹊茅拔長編巨軸冩治亂筆墨揮灑何撗猾詞章直如子長徤辯論不比仲連黠我慙無琴類師曠鶴誤銜珠投二八酌泉煑蔬共家饌敢用俗禮費烹殺少訥忽爾道其去歸轅在途不可揠此懷作惡定數日憒憒巳覺漸磨戞欲留少訥意無盡更爲逡廵柅西轄送無演歸成都曾讀契嵩輔教編浮屠氏有不可忽後於京師識懷璉彼上人者尤奇倔余嘗從容問其友璉復爲余道居訥是三大士才過人所畜豈肯吾儒屈文章汪洋道義富不止區區事其佛余思此等更誰似蜀有人焉頗超越成都敏行字無演所謂萬星中一月想嵩璉訥見須避不爾往往𬒳呵咄通禪曉律兩無碍前㑹定預耆闍崛群經列史固汗漫獨泛其深仍出沒外之所精者書畫不問不語常若吃計其夏臘殊未㡬在大衆中誠突兀余守陵陽至窮陋雨浸一春泥汨汨英磎磽磝磴道嶮行客欷歔上崷崒無演衝冐獨不顧來欵余門手持謁呼之使前見己喜相㒵圓滿藏神骨退之送澄觀詩有坐睨神骨空潸然之句清譚坐乆愈飄灑頓遣塵襟落如拂新詩古文覽嘉貺氣格俊徤凌霜鶻觀其衮衮出論議收歛便可與簮笏試將邀之使從仕笑指此頂安更髪日招與語自無厭何乃告去苦倉卒西城曉日照高嶺倒搭乾陀入深樾師歸常宜見嘉祐此老心中巳無物好音相與頻寄惠余在空山正伊鬱閻君見示岷山賦因爲小詩謝之大岷西南鎭嵓壑天下秀厥初造此者以作神仙囿相如子雲沒李杜繼其後欲賦俱未敢於詞怯輕構閻君通方士才力誰可闘驅聮入徤筆萬狀無一漏駸駸語趫勁駿馬雜馳驟太華楊巳拙天台孫亦謬示余讀數過驚聳肩縮脰勉爲成短章聊酬君意厚閻生談黃庭茫茫誦靈文誰爲抉乆瞽不能辨三一豈復更知五方迷得眞指忽悟有奇覩自此日相親赤龍交黒虎送范堯夫遝遝走閭巷都人起中宵相擁候府門惟恐失此朝盡言來送公車馬城北橋橋邊脂轄亭大尹此相邀歌管盛宴集簮裾合群僚四座酒旣行相顧魂巳銷亭前有楊柳秋風减長條折以持贈公莫猒霜葉凋節物雖謂晩比春情更饒逓起勸公飮雙呼金翠翹豈徒要公醉恐公遽乘軺借問何爾爲重公若瓊瑶羙質未省變與人存乆要旣莫不可留征衫遂飄飄鳴騶過昇遷群甿閙如蜩感公來二年免我於無聊今公舎我去何由借諸朝願君富且貴壽命等松喬直似先令公巍巍佐唐堯涕涙逐公行不憚公更遥公誠上下通和如奏笙簫所以得如此人情不相遼嗟同繆與公一時赴弓招于今二十年不見有所超前日荷君相與印埀之腰使歸守山郡藏伏甘寂寥聞公將治行乃心日夜揺恨不能送公俛首類酸痟徒爲送公詩有如草蟲喓強勉冩之去憂來立危譙推官惠李庻子鄂州篆字天下有奇篆陽氷書鄂州異獸呀五口狂咬掉三頭磥砢玻瓈盌詰屈珊瑚鈎愧無希世寳何以爲子酬和提刑度支王店鷄詩王店有郵吏養鷄殊可笑昻然處高襟不肯以時嘂官有宿此者西征待初曉鷄竟不一鳴問吏吏巳告云此㝡荒絶左右悉蓬蓼狐狸占爲宅恣橫不可道前此三四鷄一一遭其暴尋聲卽知處盡獲爪牙禍自後始得此其若有人教東方或未明群醜尚騰趠此鷄但鉗結直伺太陽耀雖然謂失旦似得保身要官曰此何用不然則宜糶不見不鳴鴈先死蓋自召天下巳明白豈假更喧閙徒爾費稻梁曽莫知所報吏云官言是且願勿嘲誚知是本在人此物何足校送李道士先生若孤雲兩在隆山見清標痩彌聳秀骨老愈徤高談吐深詣大句冩精錬忽起憶鵝池嵒飛石泉濺送韓山人昌黎山人抱藜杖三度訪我於三隅端然入座更誰顧談辯衮衮如流珠靈丹嘗凝日月鼎至寳自產乾坤爐要行撇起不可逐安得雙舄爲飛鳬丹淵集卷十終
