front:
  text: 陳眉公先生訂正丹淵集卷四
  hash: sha256:63f9931c1e71281ab8671090163588c85973b3c56800c3ee4f57c96187d7280c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_004-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同參吳吳一標建先詩五十一首蒼溪山寺正午風色高遂泊蒼溪縣層崖抱林木有寺藏蔥蒨出船步危磴蔭密頗縈轉上到金仙家緣空列臺殿修篁挂懸溜坐覺炎暑變老僧曉經論言語何貫穿引我上高閣闌干俯江面寥寥百里內山水盡奇觀誰謂羇旅中所見皆所願汀洲白鳥聚井邑青煙散樂此暮忘歸踈鐘起岩畔徙倚下松門尚怪舟人喚五里三灘群石壅水成哀湍五里之地凡三灘船如走丸勢不住力敵萬弩雲濤盤門窗掩塞怕飛浪巳倒床座翻杯槃長年三老色自落捩眼不敢窺波瀾捎渦撇漩出九死衆命幸免魚鱉餐須臾出才繫高岸競以好語相慰安是時左右有觀者應亦為我心曾寒咱公溉晚泊咱公溉船頭餘落暉携家上岸行愛此風滿衣村巷何蕭條四顧煙火稀問之曰去歲此地遭凶飢斯民半逃亡在者生計微請看林木下墻屋皆空圍好田無人耕惟有荆棘肥至今深夜中鬼火流清輝衆稚聞此語競走來相依錯莫驚且哭牽挽求速歸王會之秀才山亭盤盤翠城山君在城中住溪流第縈轉岡勢復回互蒼林無春冬啼鳥常旦暮漠漠嶺頭雲霏霏岩底霧中間列亭榭佳景實天付物象皆自然人巧誰能寓浮生欲何事有此即樂處況君弟兄賢信道各卩固詩書誨兒姪觴豆燕逢遇敢問彼簪裾何如此巾屨謝友人寄畫客從長安來厚𥿄封小軸題云此奇畫寄贈公可蓄開之挂高壁爛絹止一幅中有兩駱駝氣韻頗不俗大駝載半髀正面頸愈曲小駝方就乳蹲身腳微局一馬立其後才露頭與足三犬乃子母共臥􅋦臠肉老胡抱朱旗狀貌何狼愎端然立高岸勢若不可觸定是虜中酋華旃蓋鮮服不知何所來隨從無一僕𥘉誰作此畫精妙亦可録應餘右方在次第不止獨更願君訪來我肯萬錢贖夏日間書墨君堂壁二首先人有敝廬涪水之東邊我罷漢中守歸此聊息焉是時五六月赤日烘遙天山川盡慘燥草木皆焦燃塵襟既暫解勝境乃獨專高林抱深麓清蔭密石綿層岩敞戶外淺瀨流窗前邀客上素琴留僧酌寒泉竹簟白石枕穩處只屢遷忽時乘高風遠望立雲煙野興極浩蕩俗慮無一緣氣爽神自樂世故便可捐却憶為吏時荷重常滿肩几案堆簿書區處忘食眠冠帶坐大暑顙汗常涓涓每懼落深責取適敢自便安間獲在茲恍若夢遊仙行將佩守符復爾趍洋川山中豈不戀事有勢外牽尚子願未畢安能賦歸田其二歸來山中住便作山中人冠帶亦自間纍月不著身散髮層岩阿濯足清澗濵石蘚黏簡册松風墮衣巾鄉里多舊遊不厭過從頻山肴與野釀待我如佳賔有召即走赴愛其愛我真常恐禮數乖取問吾交親正此一夏樂忽茲遘蕭辰還愧擁千騎又走西道塵送馮允南倅梓去年父老送督郵衣上淚痕猶未變今年吏民迎別乘馬前歡聲挽不斷梓州城中十萬家家家盡喜見君面以君鄉里最相近物態人情素諳練況復才力強且明中理之的無漫箭從來府政號少事今更得君愈清簡太守李公詞掖老淘汰心源無滓澱時携賔從訪山寺惟以高談侑清宴蒼崖素壁多自書是處新詩題欲遍君今到彼亦爾為異日唱酬知幾卷宿東山村舍是秋粟為白蟲所食蟲復為群鴉所食八十雪眉翁燈前屢􅒣欷問之爾何者不語惟抆淚良久云老矣未始逢此事種粟滿川原幸巳皆茂遂喜聞欲登熟近復失所冀有蟲大如𧖟日夜囓其穗群鴉利蟲食剪摘俱在地驅呵力難及十止餘三四供家固未足王稅何由備塉土耕至骨所得幾何利又令遭此禍不曉上天意在世幸許年必以飢饉死聞之不敢誥但愧有祿位移燈面空壁到曉曾不寐季夏巳亥大雨黑雲推空天地昏風勢猛惡山嶽掀怪電燒爇嗔霆喧鯨海起立星漢翻玉竿銀索傾瓶盆豪威怒力凌乾坤川陸浩渺同一源泛濫直欲浮高原澗谷洶湧龍蛇奔溝渠溪壑相吐吞土肉刮盡惟骨存漂蕩秋稼無一根天生蒸民主仁恩覆露養育生理蕃誰持害鑰開禍門絶滅黍豆災元元無路能去陳九閽此事是非安可論謝任遵聖光祿惠詩常念文選詩最愛顔光祿君今作此官詩亦顔之躅尋常得君詩如隼飢見肉凡當憂憤際不可不取讀我自山南歸幽居值炎溽六月久不雨萬物蒸煮熟正在墨君堂流體汗可掬單絺與圓素豈解療煩毒聞君有詩至猛起捧大軸拆開得纍𥿄半日了一幅使我困病除如藥清頭目把詩坐前軒憤惋幾欲哭君也實高才徑庭無骫曲六十尚為縣不自耻碌碌近聞移小麾所用愈局促安得長康莊走此老驥騄哲士甘藜藿鄙夫厭梁肉天理不可問長吁倚喬木謝任瀘州師中寄荔支有客來山中云附瀘南信開門得君書歡喜失鄙吝筠奩包荔子四角具封印童稚瞥聞之群來立如陳競言此佳果生眼不識認相煎求拆觀顆顆紅且潤衆手攫之去爭奪遞追趂貪多乃為得廉耻曾不喧閙俄頃聞咀嚼一時盡空餘皮與核狼籍入煨燼霹靂六月四日有父子被震者君不見前時忽疑天地坼萬里一聲晴霹靂彼某氏者爾何人敢自欺誣被誅磔子爛華容神火燎父碎梓潼靈劈惟震與曜今曉然誰對君親肆姦逆後溪新晴揉藍染溪色我愛常來坐溪側一林竒石宛如畫兩岸野花殊不識蟬鳴盡日競何事鷺下多時猶未食細觀物理須靜中歸去無辭更昏黑黃功垂祕書嵐城閣群峰繞高軒四望如城密晴嵐逼窗戶淨若新洗尉杳杳其中人衣襟照寒碧臨風設橫几蕭灑坐終日門前車馬道擾擾亂如蝨轉眼不復觀長歌傲簪紱鳳山古祠林木摧折堂廡傾其中塑像猶縱橫狂巫騰踏野老拜瘦雞薄酒邀神明形容詭怪蛇虺亂聲音醜惡鴟梟鳴災牛禍犬亦可作世有此事何由平靜中吟客去復掩戶高松下淸隂微風動其間對語雙珍禽幽人獨憑几聽此古意深起來南窗下𬒳以朱弦琴彈之代佳話俚耳誰知音送黃庶先岷州赴舉朝庭取士及洮西君今去就岷州薦男兒致身自有地六月萬里君莫憚君也經術三十年此發必中后羿箭聲名大抵重文章慎莫便從班定遠大熱見田中病牛壠上病牛良可悲皮毛枯稿頭角垂兩鼻谽谺只自喘四蹄屴岌曾不皮牧童默坐罷牽挽耕叟拱立徒嗟咨朝驅暮使氣力盡爾死主人安得知呈里中諸友君莫怪我不讀書君莫笑我不飮酒更精文史豈足用漸老歡娛復何有負郭安得二百畝舉家巳聚三十口且來伴我數月間未幾區區又西走寄彰明任光祿遵聖軒軒任公子本是釣鼇人手把虹霓竿一舉百萬鈞得鼇謂無用坐卷千丈綸却自絓蚯蚓淺瀨收纎鱗悠悠世上兒不識此有神但將俗士眼下視窮水濵庶先北谷路自西溪入園當北谷開月亭詩作客雨館睡為媒摘果衣霑露尋泉屐漬苔間居正無事莫問我頻來謝王庶軻秀才見贈諸篇覽君山中詩多有贈我篇感此意愛厚使我將澘然世態日衰薄交道君獨全豈若賤丈夫心醜貌甚妍我已嬰組綬君方傲林泉出處雖有殊所樂同一天前溪獨遊溪水碧溶溶紆餘短彴通小灘晴靄外獨鶴夕陽中倚仗對清瀨披襟當好風幾時歸住此長下釣魚筒書緑帷亭壁喬木繞舍如緑幃群山四面寒參差春禽入秋啼自别早雲到暮歸常遲庭前好菊勸飮酒案上佳𥿄邀吟詩間居數月興便野渾忘簿書相聒時靑山道冥冥青山道叢木含古煙遠客事行役未晚不敢前乳虎正養子采食大路邊但顧巳所急其誰辨愚賢野老野老扶白頭耕墾事田壠豈無兒與孫凍餒實我恐地産止數出財用知幾種食肉與衣帛賢者何言冗誰氏子縹眇誰氏子學道要升仙人世豈不樂何苦求上天反首顧我語子豈得謂賢智如朴燈蛾甘就膏火煎秋興二首晨風吹茂林夕露下芳畹秋容變憔悴復此白日短蕭蕭歲華暮冉冉節物換浩歎倚前楹使我心曲亂其二百蟲感秋隂入夜聲更切問爾苦何事到曉啼不歇盈庭不可止蓊薉藏萬穴會是天使然相將送凋節書平泉草木記後二首衛公當國日力與天地均平泉植草木取盡四方春海嶽欲必得亦能役鬼神可笑身未泠巳聞屬他人其二公豈不聰明嗜好乃如此若非以私餌是物安至止彼致者何人定非端潔士草木固為塵醜名終未巳重過舊學山寺當年讀書處古寺擁群峰不改歲寒色可憐門外松有僧皆老大待客轉從容又下白雲去樓頭𫾣暮鐘書隱者壁枳棘分三徑猿猱結四鄰茂林修竹地枕石漱流人看雨搘藤杖迎風缷葛巾我來懷愧甚衣上有紅塵訪古寺老僧不遇書壁寂寂復寂寂門前苔蘚積巾鉢定何之禪房封屈膝蛛絲網窗戶蝸涎篆墻壁欲去重遲留空中望歸錫村居日影滿松窗雲開雨𥘉止晴林梨棗熟曉巷兒童喜牛羊深澗下鳬鴈寒塘裏田父酒新成瓶罌饋鄰里宿田家日落雲四起牛羊下高原今夜宿何處孤煙生遠村寥寥岩狖響擾擾林鴉喧危坐欲終夕此意將誰論大熱大熱早復暮幽居如火圍更無風稍快只有汗頻揮袒露憂生客沾濡怕熟衣何當生兩翼直近廣寒飛間樂晝睡忽過午好風吹竹牀溪雲生薄暮山雨送微涼粉裛衣裳潤蘭薰簟席香歸來間且樂多謝墨君堂寄楊歸一出處久異矣居常勞所思煙霄惟子未鬢髮已翁為世故豈須問人生當自知林泉聞幸好足可樂明時行李載書成詠於世巳無用何苦愛讀書自笑身許大所處如蟫魚編簡補斷爛卷軸收殘餘又鎖十餘篋作數隨行書還友人詩卷作詩所患格不高君今卩得詩中格吾鄉風物最清麗君向其間作詩客定餘絶景在幽深更欲煩君用刀尺上亭北軒對月吹笛得才元舍人昭華引醉霜月草堂吟皆詩譜也三首瀲灔金波瀉碧空隔霜寒影下征鴻夜深一笛昭華引吹滿千岩萬壑中其二群山暝色煙開後遠水寒光雨過時今夜何人醉霜月臥聽緱嶺玉參差其三涪江東岸有雲林巒嶺縈回澗谷深何事遲留未歸去強顔猶唱草堂吟苗子居運判歸宿州同赴武康西縣道中奉寄二首霜風舞征袂有客去符離斜谷雪晴後曲灘水滿時亂山誰對酒孤驛獨吟詩不得陪清絶悵然空所思其二漢中為會失兼程雨雪曾無一日晴拗項橋頭聊立馬使車應卩過褒城孫懷恱𥿄本亂石孫老抱竒筆臨𥿄恣揮灑從頭掃亂石磊砢隨墨下焦頑與圓潤無一不精者誰信萬鈞重卷之不盈把熙寧辛亥歲春豫自京師赴陵州因過家省墳墓是時見所居東西長衢比戶競取榆栽列植於官道左右者後移興元滿替復歸待洋州闕始四年爾而榆巳高大繁茂深密可愛豫正得此過一夏旦夕與諸親友優遊於其間蒙庇厚矣間因作詩示諸君昔我去守陵陽日門前夾道𥘉種榆今年我自山南歸向椽大者皆柱粗兩邊合隂若深洞滿地清影繁如鋪是時暑氣正炎酷無處容此煩病軀書搖清風夜篩月日日不可離群株間邀親友坐其下左右間設琴與壺人生適意乃為樂此樂巳恐他更無霜颷未起枝葉在且與諸君同此娛旱雷夏旱亦已久衆懼非常災茫茫太田中赤風起炎埃密雲徒滿空甘澤竟不來但聞南山下日日喧怒雷久不雨喜見晚雲晚雲萬丈如銀山日光返射紅孱顔莫誇突兀在天上且放雱𩃱來人間雷公施力已憤怒風伯壞事休庸頑我將待之至夜半慎勿更似前時慳丹淵集卷第四終
