front:
  text: 陳眉公先生訂正丹淵集卷三十
  hash: sha256:ed0322f38004bf781abad9570f3c66645539973ce0c9803b59e837c048476d40
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_030-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳呉一標建先啓謝趙龍圖舉自代右某啓近見本州進奏官報狀竊承知府龍圖舉某自代者心隨驚飛汗與愧落自已不稱人其謂何伏念某氣識甚蒙材品至下毓質辟陋逢辰盛明起地讀書變家登第衮衮從宦斤斤勵躬唯循廉隅敢越涯分進􅊢儒館蓋緣科名累遷郞曹實用恩例曾不僥兢重防詆訶高㝷前人下逺浮俗半通五兩得毎自安數粒一枝居無别望幸官鄕郡竊芘使麾事親之心大恐不至好古之道深虞未淳豈謂某官愛其所存忘是不肖因遷羙秩遂啓中宸謂某竭力慈闈行著鄕里玩心聖壼譽高儕流退謂不如引而自代某愚何者公意乃然大雅所爲固云謙抑小人當是能不悚兢念蒙此章將底云報唯當益謹素節上酬深知限守詔條阻趨麾㦸引領門下無任感佩激切之至謝館職伏蒙聖恩授充前件職者程文禁林幸𬒳詔寵列職秘館謬叨恩榮度衷枵孱撫已慙懼伏念某出自逺蜀生於窮閻逢時之文從事于學性自樸鄙才非淹長唫磨簡編力不逮古撰綴辭語强無由高名聞寂寥跡緒奇蹇退守舊業田園皆荒進于榮途道地愈逺嚮繇選藝閭里偶塵薦書外名殿廷誤中科級是後更佐兩郡行周十年近緣公章入改朝序尚兹僣妄敢爾僥希攀援前人引列著令愚悃上逹宸音下俞委之耆儒較以舊學並取者衆獨知㝡艱洎試淵題加多穴思小巫未進靈氣巳銷大匠在前汗顔不止飛景將入蕪音僅成機杼不工痕疵固滿猥當奏覽常待報聞敢期清流亦用微品竊謂圖書之府英儁所躔亡似而居有􅌤其靣静惟之致良有所階此蓋伏遇某官奬育微才推揚介善言辨臧否人爲重輕眷兹單平隂所提振是致懦品亦升華階惟精乃心以辦厥職庻酬巳目無玷恩陶卑情無任感荷激切之至謝提刑度支近見本州進奏官報狀伏蒙提刑度支舉某不次擢用者無狀之人本自丼於散外不訾之舉期特卑於褒陞被眷優隆省衷愧負伏念某生地至逺如人且微起家學文擢第從政殊無才術之可用但守勤愚而自將圖書之淵謬陪於俊茂禮樂之府竊玷於班聮居常懷慙敢自謀進嚮以親闈之便得兹鄕郡之歸職事沈迷廩食尸素幸諸公之在上顧匪人而若存無責其癏重爲之地此者豈謂某官大與芘頼隂相薦論謂宜召還不次擢用施此眄睞屬之孱庸慮聞于他或議其過斯蓋某官常賜延納屢交語言察某之性椎鈍而少文揆某之心歛黙而畏動持此之見抗然以言况如某之所爲實在時而不肖旣不能激昻以取夫榮耀又不能潜伏以休于幽深徒容其身以累於世然而伯陽所尚者知止仲尼之與者有常仰惟高明用此采錄敢不益敦素節勉尚清修惟堅所爲以俟其報謝運判舉陞陟伏審運判職方同罪保舉某不次陞擢者聞命之初撫躬而愧竊念某生無肖似起自單平偶然讀書遂爾登第止知公忠清愼曰涖官之本不能矯曲憸媚効隨時之爲用諸公之薦而升朝闈蒙先帝之召而入文館常淡厥進以安其愚兢兢自持黙黙無競向求鄉郡視寢親闈得芘公庥巳深天幸運判職方一見如舊二年于兹故常掩覆其不能未始督責其無狀巳荷寛假敢期薦論兹佩德之至深復何言而可謝唯將愚節上答巳知卑情無任云云謝成都府尹并三司因權卭州近奉臺移俾承郡乏巳兹涖政常爾兢懷伏念某學術非深才具至短其資選懦所向拙方爲治中之官殊恐不職行太守之事固非其宜然而一紀之中三來於此事體素習民情相諳雖若偶人之臨猶爲編戸之信止循舊貫敢立奇名但勤學製之工庻免代傷之醜惟煩厚芘以保孤蹤引企門闌某無任系戀云云謝府尹并二司因磨勘交子嚮者領帥府之召置校財簿之虛盈留連幕中將逮一朞之滿出入門下何嘗三日之疎威采霽上官之嚴文儀簡屬吏之禮曾無督責常與撫存凡燕游之地許其來從有詞章之事多以見屬仰被慰録他無間言某自知非木石之頑公埀眷有丘山之重事巳還治心焉嚮仁前此違離實深感愴此蓋某官神襟浩粹德量淹宏扶持草茅毀去崖岸周旋接下不以勢力而自高𣢾曲推誠蓋存信厚以相待遂使庸妄居嘗傾依里堠裁一昔之行門䦨若千里之邈惟勤職業以答愛忘庚伏在秋嚴漸邇伏乞上爲宗社精調寢興某卑情無任云云謝夏宮苑右某嚮聞幢節之行敢用竿牘之獻以道榮幸得依羙庥豈期照存忽賜還答顧此孱陋當之悚兢此蓋知府太博蚤相矜憐厚自謙抑禮鈞於下情感于中卽歛迹以瞻依但盈懷而聳躍卑情無任佩荷之至謝宋國博伏承某官寵被宸恩榮關郡治側聞休命竊抃鄙悰將馳慶牋以謝芘覆或領珍牘何勝悚兢伏惟通判殿丞資猷敏明操履沉厚乆從仕治夙著官稱嚮疇邑課之殊兹貳藩條之重車音未及輿意相歡某幸以瑣材獲依巨䕃臨風以企與日爲深卑情無任感荷抃躍之至謝慶州焦推官右某伏審較能省部賛畫戎藩修禮未皇飛文見及蒙此厚眷惕然鄙悰伏以推官秘惕儒術通明吏事疆敏蚤伏士論尚淹賔筵署事云初先書以貺過相存録深用感銘未遂瞻依所期將護謹奉狀賀兼謝謝寧州雍屯田右某忝名鄕關幸宻壤土蓋用晩末未由趋瞻常傳風徽自益景慕向題輿之道此獲歛板以拜前傾聞話言慰滿志願邇㳙辰而署職先屈禮以飛文過爲謙冲重俾慚慄恭以通判屯田履尚端潔襟期粹和待人以誠納巳於道居賛貳之秩尚鬱於羙才用薦論之章卽陞於清貫某所系賤局甚遙高軒深希保調用對旌寵卑情無任企望之至謝夏宮苑右某伏審顯奉宸綸榮持郡節凡叨巨䕃舉集驩悰恭惟知府宮苑太博世襲公忠天資毅勇才明以斷德厚而溫屢更軍律之雄進領使權之重時惟景服上所眷求䕶苑丘之兵巳聞㝡入布豳國之政實自選行兹承治裝匪逺戒道同幸以蒙愞獲居庇存瞻趨有期企聳以俟某無任系望欣躍激切之至謝三泉知縣賛善狀右某此者袛膺朝檢移領郡章巳試薄才輒臨庻務方馳誠而徃謝忽遣介以見存伏惟某官出忠孝之家禀禮義之教夙成懿德休有令名尚綰邑符固淹輿論下眷僻藩之守特修鄰士之歡佩荷惟深紀銘曷盡謹奉狀謝謝諸郡右某忝奉邦恩俾臨郡治㳙辰以吉視事云初退省巳以無堪實懷慙而甚厚心之所恃賢者相依幸託庇於鄰城敢晞風於懿範某官志勤育德義切成人儻拙政之有聞願羙言而見教感所磨礪存諸鏤銘尚逺瞻趨徒深跂引謝韓少卿伏審榮奉制音寵移漕命郡縣聞此吏民驩然恭惟慶慰伏以運使少卿性禀淳明才周敏給自歷揚於羙仕皆夙著於休庸有忠績上簡於帝心有惠術下充於民望蜀之列部太半𬒳於矜存邦之要權未幾聞於召用西南爲地漕運須人豈無餘敝之未安卽見良謀之盡講某猥臨支郡託在洪庥雖勉居於千里之封實徼幸於二天之庇限居守印阻謁使旌引望車塵敢通郵訊云云囘蜀州王郞中親老待養求侍於慈闈君仁推恩許臨於鄕郡至官以近屬事之叢常欲爲諸公之書謝所不逮卒未有少時之暇致之無由静念稽違深懷悚戢敢期存齒之厚特徃封幐之先乃眷甚隆其謙益至伏惟某官全守正重端持公忠自歷榮涂皆揚顯譽而能敦奬士之節厲樂人之風雖此么孱亦蒙顧與布詞以麗將意其勤荷德殊優爲顏巳厚正嬰官守之冗阻奉賔從之遊引首使麾無任企向云囘嘉守楊郞中向者某官持節爲州驅車過郡獲瞻符采甚慰乆傾之勤𣢾奉燕談益資寡見之陋遽爾去德缺然爲書視禮之疎撫躬而愧邇承撰日榮此臨官將効馳誠先蒙賜教厚自䧏接雅存謙尊某官冲量粹溫令猷淹茂文章貴係簮組名家兹假長才屈爲逺守方成踰月之政已布載涂之謠伏兾勉輔生經寵綏多福囘郭國慱德容啓伏審𬒳中宸之恩進上庠之秩聞命將慶貽書忽先蒙禮見存揆衷且愧某官禀才端厚挺質粹溫早歷榮階洊著休績兹膺帝渥實奬年勞未獲瞻依豈勝係戀囘彭守鮑郞中啓伏審某官𬒳命作藩㳙辰視事將馳慶幅先墜華函雅意謙冲鄙懷慚懼某官寛𥙿宏偉端方勁嚴蚤著殊能薦揚膴仕惟天彭之古郡乃井絡之名區民俗淳和壤土饒沃訴訟甚簡幾至於鞠扉教化易行豈煩於餘刃將疇善課卽見褒遷咫尺壃圻睽逺風度敢祈葆毓以慰傾瞻囘茂州吳郞中啓卭州聞風舊矣奏記缺然嚮服才猷徒傾於翹館輸馳懇素莫置於行郵使由奥屏之來惠有榮函之及布詞且麗將意甚勤某官學有本元術兼權立向繇劇邑選委遐藩蓋慿綏輯之才果布循良之政卽程懿績就服褒恩某仰德雖深蒞官有制未諧㑹晤嘗積瞻凝丹淵集卷三十終
