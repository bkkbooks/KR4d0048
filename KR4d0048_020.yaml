front:
  text: 陳眉公先生訂正丹淵集卷二十
  hash: sha256:29517a651f925528c7f0c44cb11e5851be48b38976a11b9cf74409229c021952
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_020-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同參吳吳一標建先挽詩仁宗皇帝挽詩十首并狀同前在草土伏聞大行皇帝奄棄天下號慕摧咽無以勝處竊念同本逺方巖野之人偶用詞業以干仕進大行皇帝親考其藝賜之科第尋得召試擢置館閣憐其親老又與便地俾得榮祿以給供養不幸前歲遽罹家禍解官去職持服鄉里居常自謂同也何人草茅之姿螻蟻之命叨𬒳恩澤如此深厚但恨未有死所不能上報萬一昨者大諱之日以故不得隨從列辟朝夕哭臨臣子之心實為大痛伏見山陵擇日在近同羸病初起復不能奔走匍匐執役斥土荷鍤負畚以先徒衆謹齋戒撰成永昭陵挽詩十首繕寫共一軸非所以盡五內屠裂之意聊以助天下昆蟲鳥獸悲吟哀􅑧之一聲云緒業承三聖規模盛一王朝廷周禮樂庠序漢文章殊俗皆歸往蒸民盡樂康帝功如此大宜享壽無疆右一徇速承王後聰明復辟初恩波同海浸刑網比天疏屢有搜賢詔曽無諌獵書惟餘封禪事應恨缺蒲車右二求治親垂詔觀文自著圖何曽慿喜怒未省蔽讒諛塵世留徽號煙霄返舊都悠悠增策驗難問鬼臾區右三寶輅嬉遊少珠宮藝學優仙毫媚風帛睿藻煥星鈎天極推神曆兵防演祕謀飈流今巳矣長共穀林秋右四政殿咨丞弼經筵引俊髦未嘗耽逸樂終是過焦勞歸路三山逺遺臺萬古高小臣無分去定擁墮髯號右五神鼎猶烘藥夷槃已實氷留恩均器服下詔約山陵影殿虛綈几皇堂掩􅃮燈蕭蕭拍城下空有暮雲凝右六浮世期云盡清都位欲傳秉圭徒請命脫屣遂登仙遺澤流天下重光照柩前幾時來甲觀更待一千年右七被衮才慿几躋階忽受同哀文鋪帝業諡册講仁功竭蹶趨群后號咷動兩宮銘旌來鞏浴萬里卷悲風右八幡翣離三殿簫笳接兩都堯殂如考妣禹葬省人徒豈並遊韶石應同去鼎湖愁聞下竹使海外走哀符右九史祝周壇日人憂𣏌國時飮池無善效頮水有遺辭仙仗朝三后蕃儀集四夷從今河與浴長㵼鳯臺悲右十正肅吳公挽詩育虎節歸兵日麟符命使年帝將還二府人巳哭三川清議誰違者高風自凛然佳城空萬古一壙掩寒煙右一眺董文章重夔龍德業尊簡編成故事穹壤與長存風旐飄寒陌霜笳咽晚原誰人碑有道應不愧斯言右二張中允先生挽詩三首善頌堂中客華嚴會裏人生為天所祐沒與佛相親祖送逾千兩哀號動四鄰宜祠瑞筠社永配蜀江神右一鄉校咨撫範閨門慕典刑愛看高士傳欲注淨名經素節標家牒芬情勒冡銘近誰瞻碧落應見少微星右二文行俱高妙聲名五十秋君恩來草澤子舍上瀛洲有相身須盡無誰淚不流庭前雲蓋石長伴影堂愁右三張思孺祕校挽詩二首昔在天彭郡僑居過一冬感君常見訪無日不相從逺寺携棊局高亭把酒鍾誰知三載後孤冡列新松右一人前常奉詫張也好堂堂處衆謙和甚居官志力強當時君壯健在座我蒼浪今日翻相哭無言問彼蒼右二呂惠穆挽詩四首文靖登庸久朝廷政教隆相門無或議子舍有如公恩澤非徼幸官榮悉治功至今清論在常滿縉紳中右一帝御皇圖後公居右府時開陳諸議論感發止嗟咨自此傾宸眷方將正宰司胡為便淪謝天意固難知右二憶在南卭日家君此忽亡公時帥本道力為濟歸喪賤息將何報深恩不可忘如今每念及惟有淚浪浪右三自出公門下常蒙禮意勤相看如子姓交政為郎君每望中書入俄驚逺訃聞何時高冡上永日哭寒雲右四張林宗司勳挽詩三首司勳自夔州運判移梓州路提刑召為開封府判官出知華州至華二日而死巫峽乘軺去涪江擁節還方來赴京兆又出領潼關髀肉川塗瘦顚毛案牘斑音容今遂巳清血為公澘右一候騎排弓箙牙門換戟衣使麾方報入神柩已云歸關吏驚來往鄉人歎是非生平幽石在誰為刻珠璣右二素節鄉評重清芬世閲傳謝家兒姪盛穆宅弟兄賢展矣兹良士嗟乎不永年西風寄哀調願為唱新阡右三張道宗比部挽詩三首比部有學術司勳弟也自省判為廣西轉運使聞兄死華州一哭而死學富詞章妙才高志力強帝方知可用官欲漸難量始得西原使才終右省郎念公今止此無語問蒼蒼右一見説聞西訃危腸已似刀撫膺成一慟復魄遂三號舊館州名桂新居里曰蒿九泉休負恨蘭玉滿兒曹右二憶在南岐日于今十二年宦途聊邂逅賔館重留連正喜謀黃洞俄驚葬圃田無由執行紼徒爾淚如泉右三石左藏挽詞二首世澤傳清範戎韜演祕謀雄藩未賜節大壑忽移丹謝氏胡床在羊公羽扇收光華歸令子何恨掩泉丘右一昔年陪宴上崏臺一聽新歌一舉杯此會如今嗟巳矣擬將何調寄餘哀右二丹淵集卷二十終
