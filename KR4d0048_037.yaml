front:
  text: 陳眉公先生訂正丹淵集卷三十七
  hash: sha256:e154fb7df7d5199728d1f3677489447dac12dccf749a30dfc758d05b9639c07d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_037-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同參吳吳一標建先墓志都官員外郎錢君墓志銘亡友去私諱衮姓錢氏懷安軍金堂縣人生七年而孤其世父良絶器之教養若巳子去私性淳篤寬言笑嗜學諸兒挽引與戲不過略就其處巳復還几案對簡册爾嘗寱誦詩書終卷不亂既冠文章道誼鴻麗通博翕然聞兩蜀間士大夫爭求交之慶曆𥘉舉開封府進士試廷下不中遂歸曰吾術其未至耶郊居外人事盡取所有書日夜考究騰高入深裒攬剔抉無所不得以為其所有猶曰未也是歲秋賦尚不肯應書太守集賢林侯槩力起之且緩期以待去私為出並諸生試侯取去私為第一人明年遂中甲科調江陵節度推官老姦夙黠不敢侮妄時故相劉公沆臨府剛嚴峭徑少所推借嘗謂去私曰君始仕而論事多與法合豈少習之耶去私言是安假習法與人情何嘗甚相遠若處之平心自可決不疑矣公是之他日見其所為文歎曰君事業有如此簿書豈可久相仍哉薦之再授京兆府掌書記晏元獻最愛去私嘗召與語終日文潞公來雍以賔佐自隨朝廷改去私定國軍幕潞公留之屢試以難劇皆辦稱其才文章奬奏遷著作郎知河南府登封縣縣有嵩陽書院師席久倚生徒盡散落去私盡料邑人子弟之良者遣往教之四方之士來者皆留其中嵩陽之學至今為盛蓋去私至後始能如此京洛之民窳墮事末利不重墾稼去私為遍詣田間相視指度溝泉壠壤藝食桑稻以法授其民飽暖之頴許之人轉流而占籍者歲歲加益嵩少天下山水最佳絶處巒嶺澗谷幽深奧邃道祠佛宇布若聯罫前朝高爽傲逸之士遺迹如昨今祕書監劉公几與去私為泉石之友間常步入以極其勝連月忘返而縣無廢事遷祕書丞簽書興州判官廳公事州在崎嶇山壑之中民吏椎質諸不如事向官此者但務一切去私為其整比次娖條理巨細無有違矢興遂名治郡至今襲用其術改太常博士屯田員外郎賜服五品鳯翔盩厔縣望遷澤置馬務監牧使舉去私主之兼知縣事縣介岐雍土田演沃民高資常以雄橫相鎮迮素號難治去私一以至誠治之久而其下不敢以毫髮不可事徼幸於去私治平刺陜西義勇其法不問衣冠與下戶皆籍人甚駭恐去私為白府免不聽移書轉運使為奏朝廷從之衆始安嘗有兩詞詣去私辨客有紿其所不直者厚納其金陽為將以言於去私所易其獄去私理之自如其人出逼客復取金去私知但默笑待客如平時外人益信去私之公且謂去私仁人長者而指客不若犬彘閭巷籍籍交口頌罵客竟以羞死改都官員外郎今韓大參為三司使奏去私通判其府事未報而去私卒治平三年六月十七日也享年五十三去私為人情地夷曠無有徑路而所與之遊者無賢不肖皆得其歡心而去私胸中辨其所以為賢不肖者實皎然爾事世父孝謹尤篤嘗以其所當遷官具情以聞上且曰臣伯良有大恩於臣願求授之天子嘉焉命遂下廪給之贏盡分致其族以至及其故舊所不能自濟者其於自奉裁足而巳器服玩好散置几格人所欲得隨其取去未嘗有一言之吝其臨政明敏愛恕不務巧刻辨詰訴訟儻無深非重過皆講解使去初若寬簡不斷然而淹久浸漉於人盡愜其所素意蓋本不欲相疵䀶而後可使復為完好者也故每去人必思之罷登封纍年嘗復過之邑人扶老提稚相與出郊候拜留連不忍輒去左右送之復如此既死二曲人有訟不得其所伸者知其無可奈何則必詣去私殯室瀝酒燒幣號泣告訴具道其所以如此不能復見去私為其區處之者反覆丁寧而後去此古人得循吏之稱班於簡册者未必有能過於此宦意尤泊然不顧計劉丞相晏元獻文潞公最為知去私者是數公其力儻略施於去私則可以度越倫輩為顯官貴人而去私未嘗輒一開口以希其有所進拔人語之去私終不為易其所存同嘗以長期遠約待去私者久矣且不謂遽然至於如此嗚呼哀哉去私曾祖諱贊祖諱緒父諱照贈職方員外郎世世皆用儒學倡於蜀以春秋名其家毋王氏贈遷居縣太君夫人耿氏婉靜端素儀度可法自歸去私相與營飾家事外齊內明資去私於學以至得第從官在雍嬰疾遂去世再娶江氏刑部郎中集賢校理同修起居注林復之女封長安縣君賢而有文去私沒後家甚貧長安安之不戚戚惟督諸子為學期以復興門戶為意男六人端甫端夫端履端衡端誠端懿女四人長適進士侯去非餘尚幼去私有文集二十卷大抵淳重明自長於議論以熙寧四年二月丙寅葬于盩厔縣仙遊鄉黃龍原耿夫人祔焉端甫昆仲以同於其父交遊為最深者來哭求銘同辭之非矣既泣且銘之曰嗚呼去私其可謂當世之淑人君子者也寬𥙿和懿才明敏給政事文學皆有能譽而其官其壽兩不能獲夫天之報效於人所以必然用善惡之行者同嘗論之精且密矣今於去私又使人置疑於其間也竟何如哉去私所有巳不自愧於人其子孫復能嗣其業當有復能興大之者嗚呼去私想固無恨矣銘去私之墓者同也去私聞之乎嗚呼哀哉屯田員外郎羅君墓志銘治平二年九月十日職方員外郎羅君登詣同於成都回車館手授其友進士張簡所為其先君行狀一通且曰登將以十一月二十九日葬先人于晉原文井鄉富饒里伏念先人為人終身之大端於世可無愧非以文字載而藏諸墓則恐不知於後人登罪逆愈深矣敢以此纍左右願哀其衷諾之同屢以不敏讓不得退而按其狀以書其辭云君諱致恭字奉之其先蒙於三國時自襄陽來為廣漢太守其子憲後有功於晉室封西鄂侯諡曰烈子襲復守廣漢兄之子尚又為益州刺史值時擾攘遂家于蜀厥後纍世不顯至君之高曾皆居於卭之安仁自大父始遷干益之雙流君既生七年而孤與毋閻依外氏于唐安由是為其郡人順賊叛唐安先遭兵君始九歲其外兄閻太古擕君遁逃伏匿草野賊誅太古收斂其所藏書與君日夜講讀君能暗誦尚書自堯典至秦誓一起不絶太古每稱愛之授以左氏春秋盡通其學君復以其所能勉勵太古之子顒故有文行為西南名人君事母孝閭里以為法𥘉徙唐安也雙流有良田三百畝毋以君幼且屬其親句氏者主之句氏無賴以酒壞其産又反君毋之所託比君冠一塍亦無有也君問求不得遂絶口不道人詰之君曰始謀欲其為吾幹視此田者乃吾毋之不疑其為人而諉之耳今其既人有異吾母之所不疑吾將爭之詎不傷吾毋之心乎吾不為矣義者深歎之性剛嚴惡人之不以正直奉其身尤諱方外怪妄之説與夫鬼神荒惑之事有語者輒折之不少容故鄉里憚焉築室北城外使子弟學求名儒為之師友自身督其業日考其進否為勸沮景祐中職方君一舉中進士第郡人爭欲以文學大其門戶者以君為之標榜焉君以慶曆元年三月二十日以疾卒于家享年五十九纍以子官贈屯田員外郎曾祖諱毅祖諱遵道父諱顯君之配曰樊氏封長壽縣君君生男二人長職方君也行誼粹敏居官人德之次曰懿為學有守女二人一適四門助教張中正一適進士樊厚早世孫四人曰貽孫彭孫壽孫冝孫銘曰君裔本顓瑣後以國得姓三世守蜀一絶不續幾千載無聞人君少時艱難遭盛明始以文訓子弟子巳仕漸顯君亦躬受其榮自此復綿綿以興矣嗚呼君無恨也咸陽主簿任君墓志銘君諱某字某性沈敏儀神端厚自入橫舍遂好學凡五經未十歲悉通誦造詞章謹嚴如其為人兩舉進士皆首送治平二年與其弟更俱中第南臺調主京兆府咸陽簿縣居要劇凡西北使車兵籍往來之所求索者日月不廢領戶復繁夥以曲直來廷下祈取裁辨之者旦暮相纓紼君始至會令尉缺能獨當其事巨細區處各中其會殊不若以經營而纍其中者上官咸咨之君嘗期更共舉賢良方正會得符徙管義谷稅幸以暇習科業晝夜不自休重㞃因得疾求歸管城中開元佛寺萬藥進不效乃革召其孥諭之曰是理吾固巳知之矣唯父毋官塞上遠不得一訣此為恨持入于地下無窮矣言訖乃告盡享年三十六治平三年六月𥘉八日也秦蜀之人聞者皆衋然涕洟談其為人娶雍氏生男子二人一忠恕年十一歲一小字遺慶君沒一月始生女子四人許嫁廖氏黃氏王氏一方三歲有文集二十卷皆講道濟時之術久必傳者君之先本長安萬年人十二代祖壁自江州移閬州刺史卒以世亂不歸乃家新井縣八代祖畹與其兄疇唐元和中繼登進士既貴遂改所居鄉里為二龍鄉三溪為桂枝村七代祖椿徒梓州郪縣木瓜莊今為郪人曾祖某不仕祖某贈尚書職方員外郎父某屯田郎中通判原州毋某縣君雍氏𥘉君赴官從郎中至歧留五日别去上馬屢顧大泣且戀戀郎中心異之謂與常殊也後一年郎中表致政得請還里中乃與其柩歸始悟其長辭巳去年矣於是以某年某月某日葬於鹽亭縣石闊里西山祖夫人之塋次郎中以某知君俾其志君墓銘日於惟彥安來將胡為志大莫充才不以施三紀遽去颷驚電馳吾從而文以永爾悲後萬千年讀之者誰殿中丞杜君墓志銘君諱某字某其上世長安杜陵人曾祖知權唐廣明中與公孫俗者同以醫侍僖宗幸成都後以劒南山水佳秀愛之乃留居遂為普安郡人祖昭少有懿行家饒財里人多從之假貸久而有不能自償者見其人愈慰以好語計終不可責則盡取其劵投諸火不復問衆咸德之父震性端重喜立風節太平興國詔書取天下善士為鄉里所稱者將官之守臣以震聞既至闕下辭不願仕以歸識者咨其高然好學不倦自六經歷伐史以至曲説小傳皆手寫極精楷校對無少謬日夜督君從事其中君沈敏強博無所不覽凡見古人行事卓然有在人所以不能為之者未嘗不拊巳嗟誦賞激再三起而疏之於屏壁窗戶日自省閲又以教子孫復為其親友良子弟説是人者所立有如此但人自不能勉爾勉之何獨其人耶嘗曰豫不能仕矣有子行吾能使為之兩蜀文士無不延致俾其子與之遊行遂善其學慶曆中一上中進士今為都官員外郎君凡從其子官率以忠義仁恕教其為政故行所至以治稱君力矣君生平爽健少疾嘉祐五年八月二十日在同州之官舍忽告病漸革以至不起太子賔客趙公良規時將州素與君往來甚厚聞君卒走臨君喪哭之慟為文祭之極哀州人無少長皆下泣曰善人死矣享年七十四君先娶公孫氏乃其先所與同入蜀名俗者之後先卒贈滎陽縣太君再娶何氏君亡未幾亦卒贈新安縣太君行以治平四年五月十三日葬君於華州華隂縣保德鄉仙谷口之北二里二夫人者從焉君以子恩為大理評事致仕再贈殿中丞一子中都君行也二女長適綿州進士蒲檢次適閬州進士蒲臯孫若干人中都君與同有閭里之舊同常愛中都君之為人和粹溫厚見屬銘其父之墓不敢辭為之銘銘曰祖蒔之父薅之子獲之而君擁其資以自燕
