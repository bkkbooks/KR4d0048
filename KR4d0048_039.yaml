front:
  text: 陳眉公先生訂正丹淵集卷三十九
  hash: sha256:76ddf219f57432d93dade6d8774ebc449df7c771b3ded5b2966df87e4a00ae6e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_039-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同參吳吳一標建先墓志龍圖母公墓志銘公諱某字某其先河東人鳳翔天興令贈太子中舍諱某之曾孫汾州介休令贈比部員外郎諱某之孫國子博士贈刑部侍郎諱某之子也母裴氏纍封長壽縣大君比部既倦官未六十脫簮笏以去愛鄠杜美田望紫閣並圭峯築室灌園與其人上下擊鮮釀醇相招延為林野之歡遠近附從之遂為其土人侍郎雖宦遊四十年而資尚恬泊不競回視其先人之高亦自引避居故廬讀書吟詩教其子為學公之昆弟時甚少巳皆有才名傾動關陜識者悉曰母氏慶門也不在彼此矣公生而聰悟不煩師訓閲經史造詞章能盡至其精工應天聖八年進士中其等調原州軍事推官州倚邊凡所處輕重索謀慮適當乃無事不爾或紛亂至有可以為憂者殊與內郡政令不相若其將既用武人少曉此得公佽助裁講至去民夷帖帖無他議轉運使李紘剛嚴介急遇其下未嘗相從容獨以公為才能渭州酒稅常課屢缺紘怒主吏不職議逐去且薦公領之公至以巳所入補前之不足主吏因免戾善罷公尚以其最得大理寺丞乃知京兆府櫟陽縣縣民橫猾好犯法號難治苐一而公以易術治之民自信約不得妄入公之廷下遷殿中丞移知卭州蒲江縣滿歲知黎州黎為西南絶境越嚴道濵大渡連山如墻中斷一道州正扼其口乘高見卭部川聚落如餖掌上實朝廷所挂慮而擇人以為守長之處韶書常以本道按察使視其部吏有長才善撫馭者薦充之故公得以行焉百蠻都王城歲驅馬過河抵公城中與中國相貿易摩撫有術則靡耳柔服如人一不厭其欲則嘷呼搏捽羣輩跳蕩閭閧不能止此其常也公既示以恩信其鷔桀不馴者擒戮之衆憚且愛二年無敢輒以疆語附譯者以及公轉太常博士以侍郎憂去職服除還本官通判乾州林瑀守成州放手受賕不顧傍他鎖姦鍵惡密不可發包拯為轉運使以威察自名顧無如瑀何然疾之甚願必以誅死請公攝其州得狀即置之獄公往見瑀以數語伏其罪不務竒中而與法正相等瑀無􅢯衆咸允之遷屯田員外郎通判鳳州改都官員外郎移坊州州自唐涉五代節度使粗武暴橫訾用不法下禍部邑征稅關渡多設虛算斂以殘虐因仍至今役鄉戶使典領其人得此即破産以至一縷盡輸之官而未償者公曰桀法也吾豈忍若前人坐視之耶上章極言請别立新課以下救危亟朝廷從之坊人所以獲疽癤斷潰而肌肉完好者公惠也未幾召入為侍御史嘗賜對便坐公言帝王治國之本職在專求公相以自羽翼杜衍范仲淹不幸早去陛下左右自後所得如衍仲淹者幾何人雖有可用者皆𬒳散使在外竊恐陛下風教自此無如先時仁宗大悟連復其所可用者朝論翕然嘉之二年除三司鹽鐵判官尋為言事御史明年拜起居舍人知諌院淮南京西轉運使以賦外它錢貢上曰羡餘請不隸大農給中上將議賞公曰是兩道比他財用尤為不支苟非誅取慘橫安所出此如恩之是借吏手以推剝吾民之膚髓耳不可遂罷近歲士大夫多營占民田以自膏潤幸民向役出下估盡所有納之相尚無制而其諸所以徭於官者負愈重去瘠取沃鐫蠧益暴公請限其頃畒各以官品裁約之議行上下以便國朝任子之令比前世最為優典凡得以官歲上其名者數百矣入流既繁仕路紛雜公深疏其敝章下近臣會議類皆顧已謂久今遽更之不宜公持之益堅道利害上前卒得淸無慮歲減三百員其源少淸孤平者獲敘進公之建説有大體可行之為良法皆類此長夀從其少子官南岐且疾公亟請省視獲告日夜馳往至即以居喪聞終制用前官充兩浙路轉運使未行改兵部員外郎直史館知邠州數月授直龍圖閣知梓州歲餘乞內郡得涇州轉工部郎中移充成都府路轉運使拜刑部郎中蜀土醲演諸産極冨夥官之府庫日入歲受泉幣流溢公嘗謂戍兵曰爾得賜帛與易之以錢也何利衆云帛亦貨諸市利莫如以錢便諸用外所售往往與官賈不相直得錢且幸公曰吾募願者兩可矣用是凡得十數萬匹今上即位大布恩賞事出不素它道悉配入民下旦暮高直踴數倍百姓歡擾急欲求死而公部中以所嘗居者當之閭里靜野無苛求猛督之禍事帖然濟矣永昭調用多目有司欲天下之財應所費疾若星火公以法移蜀之積錢百萬衮衮相屬陸走三千里旦暮副其急大計以辦已而公且遘疾矣嘉祐八年十二月二十八日卒于宫舍享年六十公性端重寬碩質狀嚴偉望之岌然使人肅恭戒飭不敢慢墮而與之語議雍容委靡色和而氣溫久不能舍而去之也其為郡邑專務究極隱敝與人興起長利故所去未嘗無餘思居臺奏正皆中外所望以為言者用諫𥿄不肯書奇譎么瑣事以瀆上聽總大端發正論兾君相默用之不設痕聲以夸露於巳也既而一落外官頻年不歸視當年朋流巳翩翩上薄霄漢人悉以用公為不當然而公亦自無一語為戚戚先帝升遐日夕涕泣遂以病病遂以死而公嘗所蒞之郡邑與常所往來之人無不哀慟號􅑧云善人何負天天奪之也何遽而不少假矣公既死朝廷遣其弟沆乘驛迎其柩歸權厝於鄠縣以治平一年某月某日葬公于某所祔先侍郎之塋夫人王氏纍封永安縣君男二人軻太廟齋郎十二歲輒試祕書省校書郎若干歲女一人若干歲沆以都官郎中為陜西轉運判官好學有義行奉公之夫人與公之諸孤居長安事如母教如巳子愈于公之存以某嘗獲逰於其伯仲之間來請銘銘曰鎮東儉以忠殉魏後惡禍去丘為民積流藏晶入幽閟宜發其裔洪以熾惟公生實世所兾厥中端完外恢粹學焉久充道少試君蒙其休民𬒳利眇然權財用曷既卒以不幸歡衆欷馳詞窮天浩無寄其將興之比賢嗣太子中舍王君墓志銘治平二年三月二十日有以笈携書而進立于庭下者問之曰長安王氏之僕來時主戒云汝亟往廣漢問所題官居納之自去彼凡十二日走四十驛而至此矣余曰事必有不可緩者命受其書視其所以遠來見諭之意日希明不幸先人以去年三月十四日得疾棄諸孤于家今年某月某日欲舉其柩從祖母以葬于萬年縣龍首鄉鳳栖原之先塋竊念先人祿位不甚顯使志業不克燀耀于當時今巳矣若非有以善文載其事置諸壙中以信于人以傳于後世為人之子者之所為心乎如聞執事常以文章論撰人父祖之生平其子若孫得以實自以為事父祖之道無忝矣希明雖未嘗一見左右敢遣㒒持先人行狀以聞求數語以銘其墓使先人之靈不鬱鬱於地下希明死幸矣唯執事哀憐之其詞始未悽楚讀之殆不忍聞其所以云云者余曰噫斯人也耶嘗憶皇祐初余在卭州幕時有以強幹為轉運使所委往來卭蜀間辦公事者此君耳余蓋嘗識之今其死而其子幼不知余與其父有一日之素能踰重關越險棧於二千里外以是事見屬或拒之于情可乎乃為綴次以慰其子云君諱紳字公儀其上世太原人唐未因官居閬中後復以官居長安三代矣君生十年以父蔭為太廟齋郎自少喜讀書記問精博為詞章有條理舉進士不第遂調鳳州梁泉縣主簿初仕巳籍然以廉勤聞滿授漢州德陽縣主簿令老且惛都不省職事羣吏驕恣翻亂文法以欺枉吾民民不堪矣而君且至數日視案牒閲租賦考徭役盡暴蔽隱悉伏其罪而一縣乃治轉運使張公掞明毅端肅少所推擇獨稱君才而數任之綿州百姓馮仁美兄弟訟田十年不能決公以此獄纍君未浹日其情得爭語遂息雖其本郡邑之吏嘗歷手者悉曰是善治此吾不及也公又俾其市五州絶戶遺田不數月獲錢四百萬內諸庫而民恬然無驅督之擾代歸授其州長豐令未幾以市田令轉大理評事知絳州正平縣會縣人行守事者有産占君籍中其鄰民張順探守意詣州言狀謂可鑿渠以引其水溉吾村地若干頃甚便守從之下縣如其議君亟至守所建利害百一于前謂不可行守怒趣君去決令開渠君抱笏徐起顧守曰渠則不可開令頭可斷也既而守亦悟遂使罷君歸一鄉之民擁馬首謝曰我輩非公壓抑且死矣願為公刻石以示吾子孫俾知公為其父母衣食之也纍遷衛尉寺丞大理寺丞知鳯翔岐山縣君之父度支嘗治此彼人德之遺矩餘範君一守無易故居四年而民不敢以不可治之事干君去之日老幼婦女皆奔走涕泣謂君何時復當此來也今上即位轉太子中舍賜緋衣銀魚入朝授通判乾州事還長安遽得疾不起享年四十一君性孝友事母兄有聞千里閭􅍭光門有大第乃唐官寺之遺址老株巨石氣勢甚古偃蹇崷崒羅立如畫亭觀臺榭號一城之甲名公巨卿才人豪士往來過雍未嘗不下馬入門登覽嘆愛君少時與兄中隱君出入迎候遊陪不厭人咸喜之君素博給好辨論尤不喜狂詭而絶重氣節在岐山時有妄人鄒僅稱先生者自言八百餘歲歷遊公卿之門好談人前世事立禍福以搖撼人人信畏之謂神人云不知凡幾年負此術行於世矣過縣謁君君與語察其怪謬訶下麾左右縳置獄問狀悉伏誣誕門外要官重臣交書下救君置之一不省械送府恐懼以死訖無他異君故人國子博士劉祺自蜀解官歸至縣寓僧舍且病其子赴舉京師顧前後皆孱軟無一人可任事君親為煮藥視食旦暮伺候且纍日無少懈既卒凡喪事一切具辦無有不如其至親欲奉其死者之意聞者嘉之君大氐所為類此亦足可紀也曾祖彬贈光祿寺丞祖識贈刑部侍郎父瀆任尚書度支員外郎三司度支判官母高氏封長安縣君贈尚書令瓊之女見君死遂寢疾後一年亦卒君娶舅氏引進使繼隆之女生五子日希明希傑希正希亮希益女三人銘曰於乎公儀命誰君尸與其才良而不壽宜人之于官其幾謂能如君之為死有可稱身大位微奚足比方陵磨谷闐銘發愈光龍州助教郭君墓志銘君諱友直字伯龍其為人也和𥙿淳懿畛岸曠闊兩蜀士大夫與四方從宦於西南者於伯龍無有不識非伯龍之求之也而其人自以為苟不識伯龍則為徒至于此矣蓋伯龍善與人交又喜藏書書至萬餘卷謄寫校對盡為隹本伯龍無不讀人問之者伯龍無不知所以人多與之遊伯龍亦未嘗輒厭見其人所以善譽聞於天下將五十年景祐中𬒳薦試尚書省不第遂歸不復就舉成都學舍為諸郡之冠聚生員常數百十人伯龍典事其中凡三十年教導揖納上下信愛事繼母朱氏至孝朱嘗病痺軟不立伯龍訪諸術士力求巳之遇隱者得火龍水虎之法轉授其母行之遂起體輕如風享年八十四而卒於兄弟尤友順不相狠鬩分隸資産獨占其至下者後雖有所不足亦自無一語之愠有識義之治平詔求遺書伯龍所上凡千餘卷盡祕府之未有者熙寧四年四月朝廷以伯龍景祐進士恩授將仕郎守龍州助教一日忽召其子大年等曰吾生平以儒術承家巳而自知於祿位固不可以強干所以不求宦逹退居田里今天子念吾之老特賜一命吾其遂止此乎是年十月果以疾卒千家𥘉一日也伯龍既為纍世令族之後內外親戚交友甚盛凡遠近慶弔伯龍未始後他人而至者才智敏給善酒戲辝吐如射坐客不能當至有叢吻急擊爭欲勝之者伯龍左右酬對愈辨而愈精四坐笑伏歎其俊鋭死之日無不嗟悼之春秋六十四所著書有劔南廣記四十卷毛詩統論二十卷歷代沿革樂書十三卷曾祖某祖某考其皆不仕母楊氏夫人宇文氏乃蜀之大姓某之女年二十一歸于伯龍閨閫儀範鄰里矜式相夫以義教子以學正順慈嚴無有未至先伯龍卒生四子大年大方大亨大受皆舉進士有名稱女二人長適太常博士李彤封壽安縣君次適進士文惟幾孫男八人女八人大年以六年二月十日葬伯龍於華陽縣升仙鄉俱利里先塋之次舉夫人之葬祔馬大年等以同為姻家來求銘伯龍之墓為之銘曰學無不深行無不淑夭胡嗇之弗卑以祿鸞羽鳯翼斂不得張有翾者微高鶱遠翔神道難知人理亦悖吾於伯龍一付茫昧所不巳者郁然淸芬更千萬年有信此文祕書丞馮君墓志銘君諱某字某其先始平人在僖宗朝有官於蜀者廣明之亂唐統紊裂視世濁溺留避於此子孫蕃衍有居于普者五世祖紹卿於五代時以宗族門地雄于一州高祖諱光偉佐東川節度曾祖諱嶠祖諱元晏並潛隱不仕父諱某少舉進士以苦學𬒳病遂不顧舊業專治養生之術作詩百章道其事自號丹珠子年過八十無疾而終子三人君其長也君生而頴慧不喜他技未冠求師於成都是時任玠溫如李畋渭卿皆以道義文章教授諸生君執業門下並為其高苐歸將試藝於其郡廷以干薦書而豪士惡子競以財賂占壓寒素不得一步進于其下乃退而嘆曰是等也我安能與之以力相較耶於是收斂退縮芟去仕意僻居靜處討究羣䇿經深史隱鉤擲藏詣馳詞吐論坐者常屈閭里訟訴槩先詣君所平決以至不復更由官治而兩講解矣教諸子事業悉有端次慶曆中其子今中都外郎如晦用其法一舉中進士君曰是吾門戶之大望自此子爾嘉祐𥘉以子官授大理評事致仕三遷為祕書丞賜緋衣銀魚嘗即其居盛創亭宇榜之曰滎恩自作記道其所以獲當世為人之甚幸者鄉人景慕之治平二年春中都為晉原宰君以雙輿就其養晉原之治高出一道君實有所誨助間則吟詩飮酒日日不倦一旦召中都語之曰官居之樂誠樂矣然而吾之舊廬近常往來於吾懷也汝當具吾歸裝宜無吾留十月促就道中都遂假檄侍還其家既至亟遣去曰汝速往無以吾纍汝汝當憂民愼毋吾憂也自是日召鄉里故舊聚飮歡呼嘯歌愈益精健諸子立左右忽顧之曰父母之年古人謂可以喜懼者汝等當知之吾受祿養幾二紀名復挂朝籍人能如吾者幾何此可喜也然吾春秋巳高汝能無所懼乎家人聞之錯遌皇惑問何以及此體中有覺不如平時者何所但俯首嘻笑不答又數日食飮漸不進求就枕瞑目良久以纊候其氣巳不屬矣遂終焉十一月十二日也享年七十五夫人趙氏同郡之甲族婉懿有善譽宗黨模其閨法四封為壽光縣君生男六人三早夭次中都也次處晦用晦并舉進士有文行聞其朋流女五人適昌元解惟正都官員外郎景思問郡人周著進士景思永歸思問者先卒後繼之以其娣封永壽縣君孫男十人某某皆嚮習文藝孫女九人其十始嫁河南趙仲遘其孤將以三年二月某日葬君於樂至縣普安鄉之西山從先塋也中都與同有場屋之舊走僕詣同求銘其墓為之銘銘曰孰不種善君穫其多奄然而歸所少謂何子官曰榮學者愈侈君所常望久焉益偉人生世中超跌百端如君𥘉終十八尤完老安先廬沒集舊兆更萬千年銘永其詔丹淵集卷三十九終
