front:
  text: 陳眉公先生訂正丹淵集卷拾遺上
  hash: sha256:b6ae50928a04961342c55e1e3c358349ed7ce9bda034292433f6046f5cc8837c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_042-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同參吳吳一標建先詩卭州賞豐亭並序賞豐亭太守竇公為而名之也摸景畫意羣賢皆榜詩其上同忝隸大莫理亦當有紀述遂為此百五十言塵于其間然句斷甚俗而文辭不深者蓋欲使溝壠之下耕夫餉婦讀易曉誦易記用而歌太守之德也易傅爾故不懼人之指笑而敢以獻云人之創亭意大率繇巳便夫何我公者所作異他見臨卭郡東北井井畫羣甸其民喜施力無歲不登衍公因到城上有此多稼羡而云彼嘉榖誠我民所擅如其每用此豈不鄉土戀伊我牧其衆胡爾懼流轉遂兹謀棟宇顯顯向一面題為賞豐字義不止營繕常時命僚侶于時歌管薦高談詫上瑞衮衮莫之倦擎酒揖大野指顧一欣忭田夫各相語我輩誰曰賤太守亦為我今日又張宴卭州倅廳三省堂將欲言治人必先由正身身正人自治此化行如神總總羣聖書論説尤諄諄後賢守為法不敢忘逡巡有欲著其迹更假他物伸或取几杖明或用盤盂陳或則銘於座或則書於紳此皆貧道者欲巳日夕親涵泳既滋久盛德光璘璘魯侯相門子佩義而服仁來乘别駕輿齒髮何靑春開口議政事條件皆有倫春露與秋霜畏愛其吏民尚懼有片缺不使其質純乃於廳事側開軒承甲寅題曰三省堂大構高榜新地古物象野水竹淸衣巾公暇每居此寂默如隱淪冥心以自觀外揣復內循一有所不逮補綻無纖塵既巳自作詩文理相彬彬宛轉示明戒欲使風俗淳愚重侯所存再拜無辭頻待已固如此賢哉君子鄰常願此基構永不罹荆榛有壞則請修使之名不泯題何靖山人隱居靖蒲江人錦屏山下何夫子鐵帶麻衣真古人苦學詩來偷鬢老樂為儒後却家貧酒中酌月江村夜琴上彈風鸖寺春君巳歸尋舊間味肯騎肥馬入紅塵右一因循失計下靑山却恨溪雲占斷間黃卷聖賢欣對語靑雲岐路秪低顏月墻槐影侵階暗雨檻秋花滿目斑自愛蕭條真吏隱心淸不纍有無間題兜率寺簿領迷人喜暫間聊尋古寺陡孤巒柏藏一徑中間窄雲斂千峰四面寬遠目巳將飛鳥過寸心更乞老僧安若為借得禪房宿臥看龕燈一點殘題鳳凰山後巖此景又奇絶半空生曲欄蜀塵隨眼斷蕃雪滿襟寒澗下雨聲急巖頭雲色乾歸鞍休報晚吾待且盤桓子曕戲子由依韻奉和子由在陳窮於丘正若淺港橫巨舟每朝升堂講書罷緊合兩眼深埋頭才名至高位至下此事自屬他人羞猶勝俁俁彼賢者手把翟籥隨羣優笈如老鸖立海上退避不與鶖鶬遊文章豈肯用一律獨取無間有神術所蓄未嘗資巳身榾榾恰如蜂聚蜜有時七日不火食支體雖羸心不屈陵陽謬守卑且勞馬前空愧持旌旄平生讀書若奊詬老大下筆侵離騷貧且賤焉真可耻欲撻羣邪無尺箠安得來親綘帳旁曰與諸生供唯唯須知道義故可樂莫問功名能得幾君子道遠不計程死而後巳方成名千鈞一羽不須校女子小人知重輕依韻和子瞻遊孤山跨明越壓蘇湖錢塘風物天下無玉峰孱顏石穿漏雪海浩蕩潮喧呼舊嘗持之詫吾孥會挈爾去相與娛宦遊若不來此都腰間綵組徒云紆子瞻鳳咮新結廬日哦其間興不孤平生美志自償足休問滿眼生雚蒲有物可比中鄙夫蜉蝣朝生死於晡公攘顯奪入能篋驕稚無乃非良圖子瞻之樂固有餘辨説是非從魯蘧我今有索君勿逋歸日好景為我摹再和問子瞻何江湖乃心魏闕君豈無胡為放浪檢束外日與隱者相招呼藍輿往往從以孥靈運石壁無此娛窮深極險興未巳豈復更憚梯登紆過客休誇衡與廬天下此景君勿孤欲將文字寫物象當截無限尋江蒲登高能賦屬大夫遊覽未厭嗟巳晡安得世上有絶筆盡取君詩粧在圖此身之外何嬴餘成然而寐其覺蘧請看湖上人名逋此子形相誰解摹和陳基載大雨黕黕雲如湧淙淙雨若傾驟翻銀漢濁勻灑玉繩明雷怒無停勢風豪有遏聲危樓已初伏猶謂夾衣輕和張推官荔枝長嗟珍果滯遐方好種華林奉帝王夏簟滿風羅秀色曉梯乘露摘新香潑霞乍染愁將變烹玉才凝忍更嘗正在臨卭病痟甚忽蒙佳惠敢相忘贈李仲祥道士不見先生已數年相思惟是誦嘉篇因來守郡空山裏又喜通名畫戟前抵掌劇談猶矍鑠堆胸豪氣尚蜿延近聞買得鵝池住且向人間作地仙賀陳基載重陽日文酒尋常不厭求坐中須得賈長頭幸逢九日稱隹節宜對三嵎賞素秋歲月但看隨葉落利名當信與雲浮慿君且學龍山飮一醉能令萬事休寄張郎中常愧無才動有權十年鄉里但留連飬成答颯人應笑學得支離自謂賢三館舊遊層漢上一麾今守亂峰前幸逢别駕如張軌免對蘇章説二天贈蘭溪先生黃森字君嶠依政人南䣢黃夫子平生氣凛然吟詩舊有癖寫字近方顚可惜空山老須為後世傳蘭溪修禊否願續永和年遊間居院乘暇訪間居臨行欲所須急沽龍口酒忙打佛前魚丹淵集卷拾遺上終
