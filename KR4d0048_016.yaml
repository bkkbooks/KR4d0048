front:
  text: 陳眉公先生訂正丹淵集卷十六
  hash: sha256:eecbcf036dc8b604f36e6a40a5dabc27930d9f85a010806a03524467b37b6380
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_016-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳吳一標建先詩四十七首送提刑司勳同昔分符守興元公始杖節來武信因而出入在門下未有三日不親近臺移希疎獄讞少凛凛淸風滿墻仞乘閑毎許陪後乘好寺名園遍遊盡惟擕茶具賞幽絕新胯珍團曾不吝或因議事閱書畫止用小肴并淺醖淸歡雅興自無厭妓樂喧煩誰願進開張胷懷脫覊檢顔色何甞形喜愠使威歛霽官况樂瞥過二年如一瞬後同先滿去涪上數月復來爲屬郡再將厚䕃蒙舊物掩蔽不才寛責問同常自念性偏僻凡取交游最精愼雖然衆中事汎愛仁者與親餘不認生平所得無幾人旣已得之心自信公家兄弟何磊落一一光華如美瑾顧同質狀似頑石輙簉其間襲温潤令昆强季没巳乆公獨康莊馳駔駿朝廷要人辦繁劇昨下詔書催入覲連城衆口惜公去不問鯢鮐與髫齓煙開漢沔曉光薄雪下褒斜寒力峻嗟同不得送行斾回視腰間綰雙印灙城西北有危樓徒望高鴻寄長韻翡翠淸晨有珍禽翩翩下魚梁其形不盈握毛羽鮮且光天人裁碧霞爲爾縫衣裳晶熒炫我目非世之靑黃愛之坐良乆常恐瞥爾翔忽然投淸漪得食如針鋩如是者三四厭飫巳一肮旣飽且自嬉飜身度回塘飛鳴逐佳匹相和音琅琅是時鳬與鴈狼藉島嶼旁滿腹釀腥穢紛紛曬晴陽鶖鶬最麤惡觜大脚脛長入水捕虵鱓淤泥亦􅋦將想其見爾時一啄亦爾傷其心肯謂爾被體凝華章勸爾愼所止好醜難同鄕淸溪多纖鮮亦足充爾膓江海深且闊所獲未可量爾當事澡刷帝囿參鸞凰平阿馬上依韻和圖南巳下共五首江山相引轉平臯滿馬詩情擁敝袍鳴鶴不知誰使怨飛鳶何謂爾能高嵓頭亂木森如㦸澗下繁雲涌似濤才到郵亭便沈思向來佳景待吾曹過朝天嶺雙壁相參萬木深馬前猿鳥亦難尋雲容杳杳㫁鴻意風色蕭蕭行客心山若畫屏隨峽勢水如衣帶轉巖隂生平來往成何事且倚鈎欄擁鼻吟晚泊金牛一襟初覺晚霜淸短鞚垂頭任馬行斜日歛回疎木影急風收㫁落泉聲望窮好景畨畨别題徧新詩闋闋精終是敎人伏潘令許多才調賦西征金牛相别呈誠之出則相與望橫參露浥幧頭冷逼簮驛在金堆隨澗遠路經銅冶入煙深過橋住馬應回首上嶺聞猿想動心勝事莫過文酒樂此時銷得各沉吟大桃途次見菊英英寒菊犯淸霜來伴山中草木黃不趂盛時隨衆卉自甘深處作孤芳其他爛熳非眞色惟此氤氲是正香却念白衣誰送酒滿籬高興憶吾鄕弄珠亭下柳江柳早春前濛濛弄紫煙未容長作帶巳見亂飛綿遠外分晴島深中泊暮舡惟應漢水色柰爾一年年弄珠亭春日閑望弄珠亭上客來想弄珠人野草迷晴岸垂楊暗晩津天涯覉旅地村落寂寥春何處皤然叟扁舟下釣綸寄子駿運使時按西鄕西鄕巴嶺下嶮道入孱顔使騎到荒驛野禽啼亂山問民靑靄裏訪古白雲間幾日南城路新詩滿軸還寄景孺提刑江由嵓嶮地萬木與雲齊弭節山中宿思歸夜半啼麝香霑野草虎跡滑春泥到此須憑酒何人手可擕公舘公舘晝沈沈煙雲晚作隂琴軒氷沼淨書閣火爐深默坐自有得閑行誰可尋還應上高閣㸔雪一千岑襄晩襄晚得洋川勞生只自憐文移供盡日心力付流年咄咄空書字便便聲晝眠其如昏嫁在了卽賦歸田欲雪山城蔽層隂晩照空外滅天低雲氣暖此意欲作雪歸鵶煙慘澹斷鴈風蕭屑樽酒聊自持同誰感時節晴山東北橫群峰新過夜來雨扶空立屏障浩翠小萬古豈無短齒屐擕手誰我侣欲往殊未能舊集闕末句臨漢亭危亭俯絕岸漢水望天表遥源瀉金穴高浪灌朱鳥紆餘轉荆楚萬里合浩渺誰知嶓􅜗下悸然如帶小雪中三章寄景孺提刑城頭高榭陟嶙峋坐㸔江郊灑玉塵恨不同來對淸絕擬將佳景待何人晩雪湖上寄景孺朔風吹雪滿橫湖衆鳥歸栖日欲晡獨坐水軒人不到滿林如挂暝禽圖暝禽圖景孺所藏之奇畫也齋宮玉龍噴霧碧霏霏鈿枕珠衾照百枝自與侍書人一處此中全不管岷之詠柳二首風外挂簾誇輭甚雨中盤砌奈長何一般草木緣何事聽唱驪駒爾最多其二綠蛾緣條立春後金蛹抱花寒食前行人折罷自欲去更罥長梢留客鞭郡齋水閣閑書六言湖上湖上雙禽泛泛橋邉細柳垂埀日午亭中無事使君來此吟詩獨坐不報門前賔客巳收案上文書獨坐水邊林下宛如故里閑居湖橋湖橋北頰花塢水閣西頭竹村霏霏薄霧紅暖漠漠輕煙翠昏推琴點點新萍帖水濛濛亂絮縈風盡日推琴默坐有人池上亭中靜觀十許紋魚弄水一雙花鴨眠沙靜觀只恐驚去無語慿欄日斜亭舘亭舘翛翛度日園林寂寂經春且遮新笋誇客莫掃殘花悶人流水四首秦僧絕論一篇楚客離騷讀罷却彈流水先生此興尤高報國報國無忘竭節居官勿用論功莫問誈誈趨樂不煩咄咄書空聞道聞道幸非曲士讀書甘作陳人爲文自怪逆俗好畫誰知入神相如相如何必稱病靖節奚須去官就下其誰不許如愚是處皆安彭澤彭澤先生未去武陵太守常貧上官幸且容巳下鬼休來笑人憑几列傳日逢佳士群書時得微言自對古人憑几不煩俗客登門衰後衰後常親藥餌憂來頗憶林泉身坐謝莊小閣心游沈約東田自悟自悟空王理勝因知辯士辝窮但了一忘六解休論四異三同鷺鷥避雨竹間點點迎風柳下翻翻靜依寒蓼如畫獨立晴沙可憐蓮子綠實塡房未滿黃茸繞殻方開爲問因誰勸酒一時齊側金盃采蓮岸幘客來橋上濺裙人在湖中桂揖蘭橈甚處蓮花荷葉無窮翡翠見諸長喙須避得少纖鱗便飛爲報休來近岸有人愛汝毛衣朱槿含露方矜杳裊揺風旋見離披湖上先生笑汝朝開暮落何爲靑鸛常惡靜時鳬騖不驚飽處鰕魚與吾閑正相似問爾樂復何如車軒平湖靜處朱閣垂柳深中畫橋隱几香煙露濕投竿衣帶風飃偶書犢去食苗莫問烏來攫肉休知物須以信相感事忌於心有爲北岸曲榭紅蕖影上圓庵綠篠隂中門外何人會畫故來寫作屏風自詠㸔畫亭中默坐吟詩岸上微行人謂偷閑太守自呼竊祿先生再贈鷺鷥頸若瓊鉤淺曲骰如碧管深翹湖上水禽無數其誰似汝風標閑書逐出堪羞子溥歸來可重淵明試問七松處士何如五柳先生丹淵集卷十六終
