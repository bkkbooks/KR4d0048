body:
  text: 丹淵集拾遺卷跋人知愛湖州之畫而不知愛其文非文有不工於其畫也人之所見之不至也且畫之奇怪本出于文章之餘而文之高古又出于其人之胸懷本趣是豈有兩法哉湖州之文一出東坡兄弟皆敬而愛之前輩大老如文潞公亦為之延譽司馬溫公則至于心服趙淸獻公則至于歎服荆公蜀公又皆形之歌詠湖州之為人可知矣湖州三仕於卭筆墨遺迹甚多後一百三十年誠之𬒳命守卭凡故舊之相屬者必湖州墨林是求而不及其文焉則知湖州之文者能幾哉東坡嘗贊其墨竹日其詩與文好者益寡有好其德如好其畫者乎又贊其飛白田始豫見其詩與文又見其行草篆隸以為止此矣復見其飛白則豫之知與可者固無幾而其所不知者蓋不可勝計也然則自當時知之者巳寡况後世乎卭舊有湖州墨林堂誠之既為並祠堂上以致卭人不忘之意又刋其集以廣於世庶幾因其文以知其人徑正豪邁不獨在于區區之踈篁怪水也雖然湖州之文散落不存者多矣石林先生云東坡倅杭與可送以詩有北容若來休問事西湖雖好莫吟詩之句及詩禍作世以為知言而東坡亦嘗移書湖州趣其賦黃樓二者集中皆無之間有詩與坡往還者輒易其姓字如杭州鳯咮堂坡所作也則易以胡侯詩中凡及子瞻者率以子平易之蓋當時黨禍未解故其家從而竄易斯文厄至于如此可勝歎哉今伹掇拾其遺亡數篇以附于後後有同志者或又能訪其遺餘尚可以續編云慶元元年五月既望曲沃家誠之跋
