front:
  text: 陳眉公先生訂正丹淵集卷一
  hash: sha256:834835f8abaf6f7a9c99a040329e39bd7cf49acff989d3af7c8688163e86a7d8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_001-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同參吳吳一標建先詞賦超然臺賦方仲春之盎盎兮覽草木之菲菲胡怫鬱於余懷兮悵獨處而無依陟危譙以騁望兮丘阜嶊崣而參差窮莽蒼以極視兮但浮陽之輝輝忽揚颷以晦昧兮灑氛霾於四垂躓余心之所行兮欲溷溷其安之蛻余神以遐騖兮控泬寥而上馳闢暗曖以涉鴻洞兮揮霓旌而掉雲旗導長彗以夭矯兮從宛虹之委蛇曵采旒以役朱鳯兮駕瓊輈而驅翠螭涉橫潢以出沒兮歷大曤而蔽虧羾萬里以一息兮俯九州而下窺有美一人兮在東方去日久兮不能忘凛而潔兮岌而長服忠信兮𬒳文章中皎皎兮外琅琅蘭為襟兮桂為裳儼若植兮奉圭璋戢光耀兮祕芬芳賈世用兮斯卷藏遊物外兮肆猖狂余將從之兮遙相望回羊角兮指龍骯轉嵎夷兮蹴扶桑倚泰山兮聊徜徉下超然兮拜其旁願有問兮遇非常勿掉頭兮告以詳使余脫亂天之罔兮解逆物之韁已而釋然兮出有纍之場余復仙仙兮來歸故鄉石姥賦上嶜崟之飛泉兮披薈蘙之榛莽骭倦􅓈而膺喘兮窮其巔於絶岨爰有石而跂跂兮旁無他而相伍色黤黕而骨徑省兮具支節而帶文縷其遠晲之若人兮迫猶疑其蹲虎里俗神而甚恭兮號相尊其曰姥謂遽亟而丐况兮緣其求而下豫忽旱陽赫而上爇兮飛光流而燎土燀多稼以巨甗兮烹羣命于碩釜走群靈而莫答兮後率歸而此訴役稚耄而竭蹶兮來號呶而嘂呼會諸力以掀揭兮使轉移其常處靈歘然而見景怪兮衆外愕而中怖慃堀堁而下發兮鬱黯靉而上布憺砰礚而中作兮漭滂沱而四注回極熾而施大潤兮曾不暇乎旋步已復還其故立兮各再拜而引去問其端而何從兮年皆失其幾許吾聞懷澤之與符陽兮亦有石為牛鼓彼民釁而擊之兮常以旱而取雨宛其於爾為類兮彼又載于國譜噫惟皇之大職兮繫隂陽之煦嫗奚磊砢之頑質兮輒矯權而自主事豈無於適然兮而惑者槩從而為語皇忽寤而震恚兮烈罪目而爾數訶星士以施棓兮勑雷將而揮斧赫電火而灰爾兮鼓箕風而蕩汝閴大空而泮散兮一摩抏其處所俾愚黎之偭正兮識惟皇之覆露皇未寤而民尚惑兮徒吾髀之長拊蓮賦彼芳蓮之紛敷兮乃橫湖之繡繪挺濁淤以自潔兮澡淸漪而逾麗纖空其上下兮細理周其向背甘液凝而露浥兮淸香馥而風遞向氷筋與玉骨兮外吐心而露肺承寶座之千趺兮蔭雕輿之萬蓋張翠帷於月下兮列綵仗於煙際容鷗鷺之徙倚兮取龜魚之芘賴既怗水以不競兮復沿涯而自退實華花之上品兮豈草木之一槩松賦度衆木而特起兮有高松之可覿擢雙幹以旁逹兮聳千尋而上擊怪難入於圖畫兮老莫知其歲曆含古意以茫昧兮負天材而岑寂柯磅礡而如枹兮葉徹掾而若冪停餘雪而暖溜兮棲宿雨而晴滴險穴聚乎魑魅兮隂枿藏乎霹靂蒙煙霧之灑潤兮傲氷霜之慘戚榮枯繫乎所托兮用捨由乎見覔敢並名於𣏌梓兮甘取誚於樗櫟問神詞并序丙申歲夏五月南豳大旱土人走寧之要册池取神水者如市既得各就其社祀以禱雨然踰旬不應民甚恐懼禾稼焦枿不得食以死且疑神何不若嚮時之速驗也群口咨嗟余聞之為作問神辝使歌之凡三篇如左一惟歲之旱兮叩群靈而寂然繭踵汗顙以歷它疆兮俾趨神之所淵飾盎缶以借餘潤兮輦護以歸期監乃衷之虔兮少悼民之凶飢巫歌覡舞兮舌橋而腕垂原呼野召兮翁走而嫗馳奉新潔以羅庭戶兮日屢薦而益祗吾將問神兮不閔此而曷為二寧山之環兮寧水之灣吾神宅茲兮幾千百年土民所仰兮重如一天凡旱取雨兮易若手然潤逐灌灑兮隂隨􅡒煙盡秦之境兮歲無赭田茲夏隴之稿渴兮風燥而日煎吾將問神兮豈或不職而纍前三神嘗以功兮荷天之福衮畫藻火兮冕垂蠙玉樓殿轇轕兮楹廡聮屬炫熀煜兮盤山結谷幄帟之下兮雲藏雨蓄宜以其潤兮惠吾百榖胡為自嗇兮肆魃之酷吾將問神兮寵其為辱去陵度巃嵸兮外岑崟宛詰竭兮辝高而謁深望􅑬嵼之危堞兮隱重闥于幽林石塗齬齬而直注兮盤苔磴乎千尋問守居之何所兮凌絶壑而繚層巒櫩廡鬱其紆絀兮觀閣緣乎孱顔嗟余胡為棲此兮日儔伍乎群山歲月淹其兩周兮悵何時而當還熇兮爀􅉃兮栗若寐之覺兮疾而復承詔易守漢上兮幸旋轅于夷陸側身東望兮掣余思而太息山中不可以久留兮無四時而蕭瑟秋望愴嶷立兮臨曾顚極延迤兮睇遙川杳營營兮其何之馳滉漭兮浮寥然彼美人兮在一方望泊鬱兮蔽雲煙期將邁兮殫所思念莫致兮勞且悁零露濛濛兮促其歸灑涕淚兮紛如泉送李道士雲離離兮風漻漻群山空兮萬木凋水滉漾兮大野平天泬寥兮新霜晴送先生兮歸鵝池晨霞鮮兮明羽衣乘靑騾兮度南岡荷瓊笈兮袐雲章先生去兮來何時上三嵎兮余之思間居靈嵓兮摛錦詞有鶴可使兮其致之哭仲蒙二章􅉃憭栗兮臨淸秋懷坌憒兮紛豫憂拂其弭兮久復留念將焉適兮升高丘問胡然兮豫之思絙豫心兮不解以繆謂遐闊兮願如其宫悵西南兮川塗𬗟修已忽寤兮往嘗此以訃蓋子之生于世兮期為已休萬感藝然兮䀌豫之中魄幹漂潰兮索其若抽念子一去兮不可以復見顧豫之於道兮尚胡為而此謀欲子似兮取友但寥寥兮安求孰識子兮豫深當何人兮與侔彼徒以文行兮為子之高其不為賤正體而貴余疣如刻畫兮妄以纍子類神珠兮釁天球知子之末兮尚可以表世其不能究者兮彼又何尤巳矣乎子之存兮在豫憶子之疢兮將何時而可瘳斂豫恨兮暮來歸煙雲飄蕭兮奉豫以愁右臨高念子將歸兮于嵩之陽彼山之中宅群仙兮欣得子而翺翔冠芝英兮佩蘭芳躡暐曄兮服熒煌執瓊笈兮披錦囊遡天風兮誦霞章神君揖兮登寶牀玉女進兮奉瑜觴豫浩歌兮頌靈休瑤瑟差薦兮相與子之獻酬客下緱嶺兮飄霞旒人來頴陽兮駕琳輈蟠桃春兮白榆林雲開月皎兮桂嵓之幽子之樂兮千萬億年下視此世兮不肯還猿嗥鸖哀兮恍惝乎空山相望何所兮杳莫可攀右懷嵩仲蒙為人無所不備采摘一二以為其美行纍之多矣劉元平嘗論人之賢者曰無長仲蒙似之故同之二章如此熙寧辛亥仲秋癸酉仁壽郡東齋題哭任遵聖覽皓宇之渺漭兮悲萬彚之漂搖林薄颯以殞瘁兮帶原隰之蕭條幨離魂之怫鬱兮紛渙散而孰招悵節物之變易兮付餘懷以無聊念先生之生此兮皇曷為而有之既誕卑以才德兮又復艱其所施使輾轉於逼側兮躓其行而莫馳哀抱憤以遽去兮問誰賢而爾師飽道義兮富文章轟大聲兮發洪光潔如玉兮凝如霜堅不可撓兮凛不可當嗟爾世俗兮曾莫測其所高但輒詆以絶衆兮實自疵于爾曹且勿辨其薌臭兮混蘭藏於蓬蒿不善擇其至行兮務族譟而叢嘷今巳矣兮想孑立而孤居遊鴻洞而入奫淪兮乘威鳯而跨鯨魚出入乎無極兮旁羊乎太虛下視夫塵寰兮諒將厭其如帤惟不肖兮有性自天蹈大道以直騖兮繇中軌而掉長鞭寧剛折而方毁兮耻從柔而逐圓獲稠人之笑詈兮獨先生之見憐負先生之所與兮羌莫恤乎其它今既失先生之為徒兮顧泯泯而奈何茲忽訃以大事兮還英氣于岷峨恨不能撫柩以一訣兮橫涕淚而滂沱亂曰先生之美兮豈衆人之足云兮先生之慶兮有弟賢而子文兮先生之安兮地既吉而可墳兮先生之壽兮期萬祀而有聞兮夫何憾耶哭許駕部嚮余登大岫以回軫兮過君公之故里涉郊坰而歷閭閧兮聆弦歌之盈耳稔德義於洋洋兮時屬君之令此因執名以願見兮遂日親於燕几挹佳論之端潔兮識所存之可喜議為邑之良術兮欲儷君而無幾復余出守於陵陽兮君亦擁麾于通義封壤相切行不越宿兮朝暮之聞愈美彼邦之政素艱其施兮前罕稱乎善治惟君之才力強敏兮條若紛絲之就理余改符於漢中兮君復駕題輿於錦水閲月未久而君以疾聞兮忽遽傳乎君之不起哀哉淑人之云亡兮無由撫棺而問天以死徒臨風以永歎兮何壽夭禍福之反是獲河內之來訃兮蒙不鄙於君之子云將歸君于幽宮兮撰吉日而且邇湯湯乎大河之滣兮峩峩乎大行之趾岸磅礴而岡隱轔兮茲有利乎君之所止限川塗之修𬗟兮阻陪葬乘之末軌悼余懷以遐薦兮曾莫殫於纍𥿄酌芳椒以盈樽兮置生芻而在篚遠不能修此以奠君兮悵音容之巳矣送人風寥寥兮黃葉飛黯栗冽兮寒滿衣歷敬嶔兮山徑微背晨霞兮送子歸子之居兮錦水湄樂莫樂兮奉庭闈凝流塵兮掩瑤徽知此音兮天下希玉女艷明霞兮體霏煙秀婉嬺兮靜嬋娟如龍之矯兮鳳之翩倐見光景兮忽自還乎杳然宅幽宮兮閟靈囦領群娣兮司寶泉福斯民兮千萬億年享豐祀兮期終山登山余將往兮南山路骫靡兮何高昧其適兮茫茫歷崎嶬兮嵯峨枳棘紛兮鉤衣解難進兮前阿指屢血兮險艱翳骨拂兮叢羅地􅚣結兮伺人復虎兕兮群嘷念失足兮安逝其悵恨兮奈何丹淵集卷第一終
