front:
  text: 陳眉公先生訂正丹淵集卷三十二
  hash: sha256:8163affc911dde3b4d8d8338f9647a85b4f0d08c80e76764f3d5f92fa7c277b8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_032-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳吳一標建先啓賀延州經略待制右某伏審榮奉制函進陞延閤竊惟建廣內淸切之地於此藏眞皇制作之文厥初命官最號盛選自匪稱職寧容濫居恭以經畧待制全文武之才洞天人之學嘉言讜論簡沃淸衷宻畫沉謀震憺醜落爰登禁近之職實副詳求之心某乆荷眷存遠形抃躍未由瞻倚徒切傾瞻云云賀運使學士術業通明器宇凝厚優游華貫馳騁重名忠義有先正之風才謀當廟堂之眷嚮居諫首言聳動於本朝今總漕權課殊尤於道左賀成都知府資政右某伏審換平凉之使節分右屬之戎符夷落騷邊敢煩於我武朝廷命帥無易於公賢豈惟紓北闕宵衣之憂實以免西州塗地之患列郡仰止聞風驩然恭惟判府安撫資政宗廟笙鏞明堂柱石高文大册蚤冠擢於賢科奥學淵謀乆參陪於國論出入更乎二府休戚繫於一身雖均外官常簡中眷屬坤維之絕徼有汶嶺之孤城妖冦跳梁重揺遠俗銳兵翦撲當委宗工卽聞區處之行旋見蕩除之報西南所慮指顧而平某假守偏州隷員屬部限嬰短紱阻拜高牙某無任引系激切歡歈之至謹奉狀賀謹錄狀上賀提轉冬至右某伏以氣應黄宮灰飛緹室羲經示卦復其見天地之心吕令謹時靜以待隂陽之定賢明所履福祿其宜伏惟運使郎中道義深淳文章粹美冝爾付絲綸之任尚兹持金榖之權行業有聞神靈是佑諒乘佳節克擁殊祥某限以官守所拘不獲詣前爲壽云云賀利州知郡虞部啓洋州右某伏審重膺堂帖榮易藩符顧惟才力之高實恊輿言之允恭以知郡虞部文章俊裔忠孝名家揚歷仕途宣昭政績出於廊廟之論授以襟喉之邦僉言得人誰復置議某嚮官漢上巳忝隣封今守洋中又同當道先煩惠教過沐撝謙未遂瞻依徒深企詠云云賀正隣郡知通啓右某伏念五始端元三朝表正陽和發歲巳彰生物之仁賢德乘辰茂集履祥之吉伏惟某官淸淳禀質寛𥙿凝懷自陞顯仕之塗皆著冝民之績歷夫令序受此殊休某限寓它藩復拘遠道不獲詣前爲壽但增祝頌之至謹奉狀賀謹錄狀上賀冬隣郡知通運提勾啓右某伏以七日有期一陽云復信動於內物由以生賢德所乘福履增𥙿恭惟某官立誠中正抱質淸淳才大業隆天相神佑諒涉佳辰之吉必膺䌓祉之休坐遠門闌無任虔祝之至謹奉狀賀賀正益梓提轉知府啓右某伏以一氣逓時三陽履旦歲元肇正曆紀惟新推德爲生盡蒙於幽隱儲仁曰福先相於賢明恭惟某官端莊敏文敦愿寛懿挺此秀時之具布爲康世之才憲獄犴攸司多存仁恕神明所佑卽卑休祥諒接漕持金榖之權且資碩畫下絲綸之命卽見褒陞諒接成都知府殿邦西南巳著于蕃之効還帝左右卽膺爰立之權諒接梓知府領劒外之雄藩最書屢上掌禁中之宻命舊物當還諒接天之新元必受國之重詔羣情仰祝比屋同辭某限守遠官阻臨高屏其諸頌詠但此傾翹賀興元府通判禮上啓右某伏審攷擇剛辰朅臨美任恭惟慶慰伏以通判秘丞東南秀氣詩禮名家參郡務於蓬山巳彰善績貳藩條於漢水猶抑宏才某幸守隣疆遠依巨䕃限嬰組紱阻造階除卑情無任喜抃之至賀提轉知倅某啓元正令序伏惟某官乘此三陽之候倍迎百福之休某限以守符不獲詣左右爲賀下情但深祝頌之至云云賀蓬州楊簽判某接鸞鵠之羣昔預九霄之侣簉鵷鴻之列今同一道之官至此歷年自知㩻倦役於多事殊失音題遽蒙啓訊之先怳發愧尤之甚敦隆契好度越儕流無似當之不遑深矣某官同年才猷敏邵文藻道華四世三公遠襲慶源之大一日千里早聞令譽之馳著籍朝閨僉謀郡慕方在急賢之㑹卽膺舉德之求某限守藩符阻趨賔闥云云賀東川知府朱少卿伏承顯拜恩章出臨藩鎭涓辰布治與衆更新伏惟慶慰恭以某官德重行方識周才貫聳朝倫之風望練政理之夲原棘位辨名中參九列之峻竹符分寄外殿一方之雄遲舉化條散爲民福某叨從别乘竊迹隣邦惟是先廬得依大庇屬居官之有制顧授謁以無階瞻引旌麾機揺魂幹云云賀利州王郎中狀右某近蒙高旌前過敝邑迎候之禮一愧空無暌違以來乆失裁謝此者伏審榮臨㑹府盛布寛條吏民歡呼道路傳播恭惟某官學有本末政知後先比郡聲稱游揚正甚外臺薦辟施設尤殊卽聞美課之陞行有褒恩之及某限紆守紱阻集賔階引領崇閎云云賀提刑司勲狀漢中右某伏審𬒳明廷之詔㫖按當道之刑書佳音布聞羣論欣愜惟是中梁之舊域曾經太守之行春里巷相驩吏民胥慶矧茲蒙顧之舊益用抃懷之深伏惟某官博學精醇負才敏給持誠恕厚涖事通詳藉夫正信之才委以平亭之職提封之下治廨所存某嚮詣賔階接辭巳幸今居使部承教當先日佇郵音前臨馬首卑情無任云云賀巴州知郡郎中狀右某伏審宸綸就䊸郡組褰帷入境撫几臨民嚮輟藩條來參漕柄殊尤之績巳當考最之書顯要之涂卽應陟明之典云云賀提刑度支轉官啓右某伏審提刑度支榮膺顯制寵進名曹凡託按臨之休舉增慶抃之劇矧蒙厚眷實倍常情恭惟某官器業自將風力兼茂充中以道炳外其文蚤在妙齡巳著翹然之譽薦躋膴仕衆推卓爾之才上心簡求衆論諧愜右川重委方倚屬於讞疑左省襃遷復延登於主計用雖未旣恩蓋非常卽聞奏課之尤當有任能之召某幸棲美䕃良動懽懷所限佩守符之微無由趨使節之下引領臺府云云賀趙龍圖上任啓伏審某官涓選良辰視臨美政居庥者衆竊幸焉深恭惟某官道貫二儀才周萬變高猷映世亮節端朝會遇聖神之知躋陞侍從之列蜀所巨鎭益云要藩上欲用公詔煩爲守䁀席如缺玩印而有求鋒車下臨趨節而先起前是數相一新稚耋之瞻大布慈和之政隣城仰式它道胥傳伏惟某官資禀端淳才猷敏邵仕榮揚歷官最殊尤嚮題漢水之輿佳聲未冺今剖巴江之竹善譽先馳方裂素以通誠忽慿郵而賜教眷存所厚佩服良深云云賀洪雅知縣陳秘丞狀右某徃年南岐榮治之下獲誦雄編去歲東蜀旅郵之中復傾高論心常景伏迹但暌乖而况處鄕關甚宻之鄰預牓籍同升之契故當無遂廢之書簡所恨有相違之宦途向者抗牘而屢請小麾幸此蒙恩而歸守支郡遽承占問之及良荷記存之深某官同年文章高於衆人誼行比於前軰治一同之地難乎盡展驥之才居四徹之山冝矣任和鈆之職卽聞美召行踐華途未遑奉左右以周旋實亦望東南而旋倚願勤善飬俯慰虔祈何由瞻依用究悃幅賀運判都官啓盛世雄英華門嗣慶蚤奮深湛之學亟陞高妙皆從此塗某兹處末僚自慙冗器日期大用願託巧陶所限繋題輿之微無由伏齋几之下云云賀正東川朱少卿一氣逓時三陽履旦歲元肇正曆紀惟新推德爲生盡蒙於幽隱儲仁曰福先相於賢明恭惟某官端莊敏文敦愿寛懿挺此秀時之具布爲康世之才獄犴攸司多存仁恕神明所佑卽俾休祥諒接天之新元必擁國之厚寵羣情仰祝比屋同辭某限守遠官阻臨高屏其諸頌詠但此傾翹賀懷安知軍轉官伏審近蒙均恩榮進中秩伏惟慰慶恭以某官挺質高爽持才敏明禀規賢門登仕聖世尚屈臨於遠國卽召置於華途此而榮遷漸以要用某幸隣善部阻拜崇墉春輝正深道味益勝云云回漢州郎中近奉宸俞就遷州寄遽然拜命惕若兢懷某逈蒙朝廷假守仁壽謂僻陋至微之郡冝迂踈不肖之人逮至此時云爲多故文移坌集事目交紛行雖躬親處實迷誤無偃仰棲遲之暇有喧囂之煩巳幸報成猶虞罪去念將滿歳當趣還朝轉徙有道涂之憂偪仄餘昏嫁之累敢持愚懇洊扣嚴聰奏牘旣行秪虞於重譴詔綸忽下尋𬒳於鴻恩以李固解綬之鄕爲阮咸出麾之地求雖有自得豈無緣某官素與鄕評隂加士論常見匿瑕之美曲揚剖垢之光遂使孱庸獲叨除委更煩慶問之賜益荷朋遊之深紬味妍詞銘藏陋腑未皇展晤徒切翹凝回漢州知郡伏審近奉宸綸再留使節藉乃厚德慰諸羣心豈惟増閭里之光抑亦重朋遊之喜某官託姿粹茂賦量淹宏以儒學踐巍科以吏事陞峻秩還鄕爲郡布政冝人是故河內父老願借於冦恂淮平吏民爭乞於侯覇九重是與千里相歡方議馳書忽蒙賜誨仰承眷錄深負感藏丹淵集卷三十二終
