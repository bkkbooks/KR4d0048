front:
  text: 陳眉公先生訂正丹淵集卷二十四
  hash: sha256:0e52af52eec00f39677525b94742f2e1c8abef9ef289a7d16fa128386e3724ff
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_024-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳吳一標建先記靜難軍靈峯寺新閣記嘉祐元年同佐靜難幕是時邊警不動歲穀屢熟居惟奉詔書謹約束之外無一事可領但攜引僚友窮高遠探古舊發爲詠歌以度閑日紫微山靈峰寺者凡出必造焉寺居城中據山之險有閣北嚮下臨闤闠官居民宇池園觀榭閭市喧合坊陌斜委平坐俯矚無不盡在外之高原大野環擁趨集周之城隍漢之壁壘唐之丘壠凄凉毀落咸㑹目下當時猶恨其主者用智未深不能飛楹走櫩直跨嶄絕若是則左九嵕右崆峒不起席上皆得髣髴毎一來此雖曛黒尚不忍去自𬒳召供職秘館或佳辰令節未甞不懷念向時相從於是之樂五年冬奉使歸蜀以故復至此郡授館之後接賔客奉燕飮日日不暇巳復遽去卒不能一到此寺但徃來馬上據鞍仰首憶前事感故迹而巳時太守都官郎中解公指之而謂同曰是昔君侯之所常遊者惜其未甚顯快不稱其地今將授以䂓制而改新之君侯宜以文紀其上他人不知詳矣同曰是素所喜命安敢辭六年四月公以書來謂同閣巳成磨石乆矣將受代須得記乃幸同把書東望注想良乆心與境絶莫得名狀竊謂公之淸修雅潔凡有建置蓋出俗外爲是閣也必能瓌宏偉壯卓立特出蹲蟠高虚埶力走動東泉之幽曠南園之邃密西莊之冶麗北湖之淸勝宜然四面低色飮氣伏不肖於其下矣同繫官在遠不能陪賔從之末與公燕賞使遠近景物後來所得者無由採摭以就鄙詞之壯觀聊執筆以應前日之命儻後㠯幸見尚遺略者期爲公以他文補之五月初一日記卭州鳳凰山新禪院記臨卭郡西北皆大山所叢衍迤旁薄深蟠遠走直注大渡限迾蠻詔欝如雲煙涌如波濤晴光隂嵐明昧一屬其間孤峯崒然傑立豪峙首領臨惜此伽藍遂入民籍乃以狀聞于大帥端明殿學士宋公祁願㠯本郡白鶴山中谿禪師淳用主之公隆法嚮善樂受乃請盡舉其地以卑於師師梵行高特有聲南土持大法眼回矚鄕社迅機敏語導接無倦拂蒙去蔀領㑹者衆受山之日遠近白黒咸此赴助景氣明霽嵓谷軒豁若有神物踴躍衞䕶螺皷之㑹遂不虚日禪悅法樂皆自滿慰方便之化城解脫之道塲於是乎在師以余昔從事此郡甞歷覽勝境今復倅州事具曉本末謂記此者莫余之詳署狀丐辭所懇精至因語之曰道以人存地由法盛增福持慧圖爲永傳師固巳知之矣余何暇􅱷􅱷哉其或叙山之靈勝述累世傳山之人紀師爲第一代住持此畧備矣嘉祐六年五月十五日記茂州汶川縣勝因院記繇玉壘南下過笮迤西循皂江左折越大平渡行深入曲無慮六十里至茂之汶川有地曰柘平羣山却立大陸𥘉露畦麻㽪稻杳遠空濶披壖帶麓壤土鮮潤景物瓌麗人物純篤就其佳處有院曰羅漢昔有頭陁德欽戒操甚嚴歲臘居乆其徒委散是身獨在常懼其所將底墮落願擇高行屬㠯香火得永康軍大中祥符寺僧義海者付之至惟簡師凡五世也惟簡性顓潔所趣端慎守僧律作佛事癯形晦面不避風雨遠近四衆咸宗仰之旣至此地乃圖崇飾伐木䥴崖大輯材礎構廣厦設尊像儲秘典納淨侶凡所欲有一一完具殆逾一紀功力方絕以名上列乃錫金號庭堂虛敞檐宇飄動丹明碧照繢繡嵓谷誠歸嚮之福地而莊嚴之道塲也惟簡余之邑人遠來求紀其事間甞謂余曰靑城諸峯惟大􅡠最爲高厚然丈人上淸之望者乃世俗之所能見爾如吾所居正向其面脉絡表裏披歛出沒澗壑鈎蔓巒嶺屈折高林巨樾巍崗險頂晨霞夕靄染漬輝耀湍瀑淙激禽䖝啼響一日萬狀無有窮極嵬服傾耳不知厭倦此方外淸絕之境世間奇偉之觀而惟簡輙擅有之山林之人所獲多矣安得君之車馬一至其地㠯幸吾言之不誣余聽其說衮衮令人喜聞囬視此身若處泥穽何時濯洗以從師傲兀於其間哉因命筆綴次其事使歸瑑諸嵓石遂以爲記云熈寧二年十月十五日記成都府學射山新修祠宇記龍圖閣直學士趙公治平二年夏四月𬒳詔守蜀明年春三月上巳來遊學射山主民樂也故事有張栢子者甞居此學道以是日得帝詔駕赤文於菟籋雲衢羾天關以去後凡其時兩蜀之人如以戒令約不赴而有所誅責者奔走㑹其上詣通眞觀禱其神從道士受秘籙以歸一年禍福率指此日惰與恭之所招致也自昔語如此人益起信逮今遠近以期而致者愈無鞅數成都燕集用一春爲常三日不修巳云遠甚然各有定處惟此山之㑹最極盛太守與其屬候城㠯出鍾皷旗斾綿三十里無少缺都人士女𬒳珠貝服繒錦藻繢嵓麓映照原野浩如翻江曄如凝霞上下立列窮極繁麗徜徉徙倚直暮而入公旣至喜遊人之遝然復愛其地距城不一舍而孤嶺橫出夷陸景氣殊曠絕但謂宫室獨與物不比稱明日召知縣事李君弼賢語之曰此隷治下載譜籍寔號勝處而模矩制量諸不如所說柰何議者其咎將付之于守宰歟予與君其欲對人不愧中在謀其完矣遂授之宜所㠯當然者君曰公所命弼賢能爲之乃調匠度材悉以良法不煩公不傷私未逾時而巳云事畢矣爲三淸殿爲張先生祠堂爲道宫齋館爲燕宇便室與凡所以可爲之屋者一一無不有亡慮三十楹開咍延連輝顯華兀干雲際動干林表誠樓眞之秘夏而合宴之佳觀也自是日有來者嗟頌顧矚聚吻而談曰此地不知化爲榛墟者凡幾年一日爲賢者所經慮芟舊而掲新之詎偶然耶豈神靈所居不可廢待其人而後俾興之耶不然何歷歲滋乆而無一有所問者耶蓋屬之於我公也盍延其傳以附地志公因使同文之爲紀其觕四年正月初五日記衢州龍丘縣重脩徐偃王廟記惟天之性人以仁其端本完重植深而培固凡所以設于事爲顛沛反復非㠯衆𬒳利則未甞以妄施或罹遇不幸至委國動民猶不俾一命自我以死而獨㠯身負之者旣沒其精魂更億萬年亦不冺然與膚駭漫潰隨土壤化去必將憑依其地吐發靈氣關隂陽主水旱導宣天心以蒙福于一方有人焉偃王是巳衢州龍丘縣有王廟退之甞爲之碑言王事至悉此不復書自唐元和時其裔孫放爲州刺史卽其居侈大之今數百祀不知凡幾易至此近歲凶沴忽作他走蔑效遠近赴嚮必以王得鮐背雅齒拜列庭下祝語未旣祥報巳集田甿野婦歲飫稔食不信殣殍泰然自處蓋甞語王以爲一天云而棟宇墻級乆廢不治騫摧陊爛貌衞蒙没失於靖密與事不對進士毛維周等視此懼悼咸謂非稱循不脩餙民恭以惰誠薄禮觕積嫚王饗乃相與具材選工改化舊制天落地湧內外輝潔民之心由是益䖍而王之威神愈爲崇嚴矣維周因龍圖閣直學士趙公抃遠來匄文刻㠯示後同不能免因爲紀其大畧又繫以辭使祀者歌之以答王之休烈其辭曰穆旣不道兮王爲民而遠驅國覆身殞兮其靈徘徊而游於吾衢王之去此兮歲凡㑹其幾元名與日新兮怳然若王之常存惟皇之生元元兮獨厚王其㠯仁死不俾磨兮顓以福尸于斯民皇命王之甚重兮王亦報以其職水以之暘兮旱以之澤民𬒳札毒兮王心以惻烖害攘却兮休嘉翕習牲醳兮醇醲肴蔌兮潔豐歛羣誠兮端莊外與物稱兮進于王堂奉祀以時兮王德敢忘王其安此兮天地與長嘉州平羗縣新脩夫子廟記頊川道士李有慶過卭訪余謂余曰漢嘉屬邑曰平羗者其令尉相與增脩夫子廟成欲君侯之文以紀歲月且未敢使有慶候君侯可否應之曰予何者敢當此雖然二君與余無一日之舊不以屬他人而獨見諉於余意特厚或辭焉缺其望矣但未䏻知其所以廢起之由爲此復何讓道士曰聞之其先有屋數椽惟春秋二丁其令始一過其闑爲行釋奠禮者旣出乃闔戸不復顧風掲雨灌虺䑕鐫潰液爛頽壓墟落如也嘉祐元年令始平馮君玠創殿一區塑夫子像圖十哲於壁後晏君升卿用安靜掾薦者治此景君思誼以才侯子試吏爲之佐二君幹敏而文智參謀同臬地繩基復圖補完縣之秀民吕甄等趨善向敎就集厥事願進材用交章委䓢起五年季冬之甲子訖六年仲春之癸亥不費公不暴私凡若干楹內外悉具虛敞深靖崇􅋻有制蜚移連連巍譙鶱鶱藏爼豆儲典籍召良師延美士於是邑人之佳子弟抱書楚楚來立門下願隷業于其間者二君咸與之進勸敎不倦其大抵如此余曰是能爾耶賢哉其爲也今夫仕進者不自計其中之所有而所治才𥚹辟則嗟悔怨懟一切放堕不事事或倚上官視聽不相及恣用貪狼推剝其下以厭巳之欲是此等天下常不少矣今二君所涖之邑在蜀無與較其小而能先務敎本以篤其俗使詩書禮樂之術日薰染其耳目是知爲政之大端也簿書期㑹之末略解事者皆能之豈足爲二君美哉道士待余文持去故述其所言然甚略是年五月十日記卭州永福院新修桂華閣記唐紐絕五代易璽爲旦暮建知祥將蜀幸中原紛潰遂反側不脩職貢輙竊號井底旣苟且上下日驚恐延死命豈復議興黌舍訓厲賢俊雖秀頴布列亦自然樸縵無理致暗翳昏蔀坤文乃落眞主出羣僞纍首闕下四海一治風敎宣浹字育涵煦刮濯鐫鏤章聖朝典禮大具陛下御世光耀益烈卭爲要州地物繁縟俚師陋士亦備文采章逢彬蔚實愈他郡天禧初計君用章始繇鄕書奏賦高第是後累詔翩翩繼起至嘉祐某年凡得若干人永安浮圖遵古好從吾人遊嚮學樂善因建大閣飾素壁咸冩厥象罔不惟肖榜甲相序簮笏聮映端儼矜肅若集朝㑹郡人仰止悉自規敕曰子曰弟勉䇿晞慕上人此舉爲勸實愽余意迺後來不可禦梓匠增制繢工肆巧常願與上人從事上人宜勿用廣多爲厭壬寅六月十日記自然水石記陵陽守居負山悉石西尤砌層崖餘地丈許平夷可屋因植四楹面午橫楣闢幽軒正對大林高株缺間視遠峰若畫工引淡墨作巒嶺嶷嶷時與煙雲相蔽虧愛此有佳趣復靜密公事少休卽至宴坐伏息日計數取多乃去外俗不得知旁頺巨礓如瘤宜鑱刻遂磨治將紀建置歲月沃水盪拭見􅉳理若髮狀傾灘平波瀰漫骫迤複疊先後倫次窪淵聳浪左右役目自非天冩神摹人巧孰能爲是必由融結固巳有堅包厚藏待子始發章物蓋顯晦信在時人理疑亦然苟逹此與知命何遠雖爾旣有形必復壞倘後人加䕶則傳乆未易泐因書側示方來期與子志壹所尚且俾爲仁壽異聞丹淵集卷二十四終
