front:
  text: 陳眉公先生訂正丹淵集卷二
  hash: sha256:72da9bf360e1d31c5d0fbd557ab8dfe6f7bdeec2d4f62326f34a2a2761629118
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_002-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳呉一標建先樂府雜詠秦王卷衣咸陽秦王家宮闕明曉霞丹文映碧鏤光采相鈎加銅螭逐銀猊壓屋矜蟠拏洞戸鎻日月其中光景賒春風動珠箔鸞額金窠斜美人却扇坐著落庭下花閑弄玉指環輕冰扼紅牙君王顧之咲爲駐七寳車自卷金縷衣龍鸞蔚紛葩持以贈所愛結歡期無涯殿前生桂樹童童彼芳桂藹藹生廣內靈根浹和液柯葉冬不改日月最臨照雨露偏汪濊願保剛勁質與君同萬歲臨高臺臨高臺望故鄕地千里天一方極目外空茫茫孤雲飛不我將安得羽翼西南翔自君之出矣自君之出矣弔影度晨夕中門一歩地未省有行迹閨闈足儀檢常恐犯䋲尺欲寄錦字書知誰者云的東門行士有失所偶難甘蓬蓽微拔劔出東門感憤不顧歸賢哉彼嘉匹逐逐牽其衣願同此饘粥節義安得違況今謂清世不可復爲非西門行盛年可愛重芳辰宜嬉遊金甕釀醇酒玉盤炙肥牛青春九十日不可一日休勿自汨浩氣滿胷藏百憂君莫惜黃金黃金身後讎自古貪與吝常爲賢者羞塘上行寒塘漲新雨灔灔翠波滿沙晴歩聲澁風引羅帶緩蒲牙妬舌利荷葉歡心卷生平玉衣夢至此神亦誕徒誦小星篇無人覺腸斷釣竿霜刀裁綠筠桂餌掛輕緡歛迹天地間側身江海濱悠悠寳帳夜寂寂烟波春何時投竿歸再與君子親烏生八九子南山有烏鳥生子層崖巔戢戢新羽成相將弄晴烟朝饑集壠上暮渇來嵓前託居深林中自足終爾年胡爲去所依無乃甘棄捐却愛庭樹好群飛投碧圓高枝踏未穩身巳隨潜弦因知萬物理主者持黙權凢云愛此命生死期巳然出入旣有定何歎於後先野田黃雀行搥鼉鏗鯨宴瑶臺紅鵶弄翼春徘徊和風入坐賓主樂金觥玉豆天中來勸君劇飮莫自訴暗中光景能相催試看庭前好花謝枝下落多枝上開人生不厭苦行樂勿用蹙促相驚猜賢愚貴賤各有命此理悟者眞賢哉苦寒行上太行兮高盤盤日將暮兮歲巳闌入谷口兮出林端風慘慘兮吹骨寒冰霜結兮玉㠝岏光上照兮天色乾紛橫委兮草樹殘黯慄烈兮烟雲􅟎僕足皸兮馬蹄抏望所舍兮摧心肝囊立空兮衣且單嗟道途兮胡艱難苦熱行黃人頓駕留天中金鵶吐火燒碧空炎光染雲聳岌岌旱氣爍土飛蓬蓬龍揺乾胡不作雨虎裂渇吻無生風安得有術擘海水入底一扣鮫人宮俠客行紫髯圍碧瞳勇氣炙坐熱生平脫覉羈少小服義烈堂堂吐高論牙齒若嚼鐵寳劒壓䏶橫誰耻我可雪酣歌入都市當靣洗入血常言荆軻愚毎笑豫讓拙事已不受謝門前車馬絶自謂取功名焉能由筆舌巫山高巫山高高凝烟十二碧簮寒挿天危嵓絶壁巳飛動況復下壓萬丈之蒼淵波衝浪激作深井虎眼徹底時一漩長風澒湧發灔澦惡色怒勢因誰然我欲截中流虹梁莫得施􅠠蜷東西相遠望不到兩目欲斷心將穿回看高唐廟下灑靈雨遣我歸意常翩翩水仙操嗟哉先生去何所兮杳不可尋捨我於此使形影之外兮唯莽蒼之山林仰圓嶠之峩峩兮俯大壑之沉沉長波澒涌以蕩潏兮群鳥翻翻而悲吟寂擾擾之煩慮兮納㝠㝠之至音先生將一我之正性兮何設意之此深我巳窮神而造妙兮達眞指於素琴先生盍還此兮度明明乎我心大垂手華堂合樂轟春晝鳳呌龍嘶畫鼉吼瓊猊壓地開組繡美人舞兮獻君夀紅婆娑兮翠蚴蟉雪飜花兮風入柳曵輕𥚑兮揚綵綬金鸞飛兮玉麟走入急破大垂手香檀扎扎江雨驟情凝力定方舉袖烟收霧歛曲徹後錦盈車兮珠滿斗採蓮曲綠纈襠紅繡裳衫盤蜂蝶裙鴛鴦雕瑰錯寳垂鬢長紫冐翠盖行新粧蹁躚曲堤下回塘畫橈送入波中央羅袖卷起金釧光揺輕撼脆𫾣短芒丹瓊紺玉低復昻霑裛薄粉撲嫰黃𧖟腰蛛腹絲飃揚列坐綵舫求比方笑聲吃吃動明璫挨蒲拂蓼次㟁旁風吹落霞供晩涼西城鵶鵶啼女墻歸來索酒酌滿觴呉屏蜀帳圍象床困臥不起燈燭張琉璃盎缶叢生香對酒朝廷皦如日區宇清若水殊方文敎達微品德澤被伊人復何幸遇此栗陸氏茫然大虚內烝鬰盡和氣眞風浹敦俗無所容一僞唯宜對罇酒酣飮樂無事人間此昭世得偶須自貴無爲名所勞區區取愚謚白頭吟憶昔宴華堂金徽導幽意雖知取名賤越禮奉君子相期本同穴誰復耻犢鼻一見茂陵人烟霄與泥滓願言保新愛妾以甘自棄恩義薄所終多生於富貴芳樹庭前有芳樹穠隂滿軒碧莫惜更携酒醉此青春色朝來見鶗鴂飛鳴繞其側光景不可留徒遣君歎息武溪深嶠南之武溪其深不能測潭潭滀瘴癘水色重如墨昏然潦霧作上下毒氣塞仰視高飛鳶跕跕墮兩翼交州惡女子制馭費銜勒伊余繆兵寄得總浪泊役常甘馬革死持此期報國臥念少逰言從之何可得走馬引群蹄踏空山半夜若風雨平眀卽其地巳復天上去惟予迫大義盍免以名捕蟠蝸入寒殻此豈謂安處脫身入浩渺固有神物護禮謂不戴天天知天亦許起夜來曉牕明綠紗蜀錦壓春臥橫腮虎魄冷驚起新夢破玲瓏轉條脫縹緲梳矮墮高軸響銀床時誤君車過長安道長安道隋唐宮殿生秋草若使皆知嗣業難爭得行人望中老王昭君四首不惜將黃金爭頭買顔色妾貌自可恃誰能苦勞力其二絶艶生殊域芳年入內庭誰知金屋寵只是信丹靑其三幾歲後宮塵今朝絶國春君王重恩信不欲遣他人其四極目胡沙滿傷心漢月圓一生埋沒恨長入四條絃吳趍曲萬頃平湖水晴光射早霞紅裙闘畫楫相結採荷花又㟁上相將疊鼓催青翰齊上碧波開鵁鶄屬鳿不驚起慣見蘭橈日日來又蕩漾水中舟徘徊㟁邊馬相看兩不語密意待誰寫劉生歷古推任俠彼劉生者何提搥擊朱亥引劒刺荆軻飮肆扶頭出歌樓棹臂過無人繼義勇關隴氣消磨紫騮馬翩翩紫騮馬爛爛黄金鞍流水四蹄急飛星雙目寒擁頭青玉釳蔽臆綵絲鞶誰取交州鼓摸將骨去看驄馬鬐鬛擁如雲西人號乞銀更逢桓御史特地起精神丹淵集卷二終
