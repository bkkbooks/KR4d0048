  text: 陳眉公先生訂正丹淵集卷三十八
  hash: sha256:93f38d6e5df7015d36d71b6bc0e644573db4612f90bffc96171d3b8a1c929bc4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_038-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳吳一標建先墓誌試秘書省校書郎趙君墓誌銘治平二年五月十三日龍圖閣直學士吏部員外郎知成都府天水趙公某之子新授將仕郎試秘書省校書郎知杭州於潜縣事監西京粮料院名屼字景山以疾卒于洛陽之官舎卜以某年某月某日載其柩歸衢州葬於某縣某鄕某里某原龍圖公一日召其部吏廣漢郡尉文某語之曰余之子不幸蚤棄世余常觀其所爲宜有以舒發流聞于後者今巳矣使其志不克就嗚呼余識子且舊子可爲余誌其墓同被命唯唯退自念同文字樸澁何足以綴緝於潜君之美行告于無窮然辱龍圖公眷愛之重當勉强無以辭乃按於潜君之叔著作佐郎楊之狀云君之生風度竦秀寡言笑旣毀齒性益聰悟誦書畫字無一日不加進龍圖公友愛羣弟多攜之官毎退食卽便舎相與磨講道誼爲文章而君常入諸父行謹謹就業未始略遨嬉不滿其所程淳粹和厚無毫髮兒姪之過一家欣愛之年十六舉進士不中歸自閉嘿愈奮厲增力極取游太學事先生胡援授諸經鉤探擿抉造詣深隱纂譔辭語精簡渾重援獨常稱之同舎生三十人君最少動有儀法衆以君不敢燕惰廢所事兩就天府貢禮部輙落龍圖公爲益州路轉運使用祫享授君太廟齋郎嘉祐中鏁試嘉慶院復得是時埸屋方議以策論取士天下豪俊並挾藝京師無一人肯自以爲吾不如某人而願下之者南宮主司皆禁林鉅公亦審愼戒飭以待多士旣試文卷坌入悉高譚劇辦磊磊可畏而柬次其可以應當世之所宜用者上之以君當奏名第六於是都下烜然馳聲稱遂遠聞龍圖公嚮在臺諫論事不少避權貴風威逼人海內駭伏人至是得君名皆曰趙氏復有此子矣中第御前調憲州司理參軍或謂曰君盛年有令譽從宦邊藩榮途自此遠矣君曰雖然吾安念此吾親之側無它兄弟以侍且旦暮去左右豈所云樂耶因留不之官今皇帝改元之二年春龍圖公自河北都轉運使移成都朝廷以君爲縣令假局河南府且使視其家未治事得疾藥不効寢革毋夫人在旁日夜憂泣無所問計君徐起安坐怡顔色如平時曰死生固有定期自昔人誰逃者願毋自苦恐耿耿祗以累阿􅭊因索𥿄爲書將留訣成都裁數行復裂之此又重吾大人之傷也遂投筆以卒時年三十一噫君之事其止此耶君旣爲名臣子早以文行知於人死之日中外士大夫與其所徃還及龍圖公嘗所臨之吏民無不嗟悼以泣且疑夫天地鬼神以禍福考善惡而施之者於君殊未爲可諒矣君博學喜辯論雅善鼔琴平居入静室爲雍容閑澹之音以揄揚其和易之性聞之者皆泊然忘世慮擾其中好黃帝書曉診法明藥品之所以能爲功與病之可治不治之狀嘗被羸疾懼其親爲憂隂自療之至愈不以告有文數十篇語氣浩蕩皆可與當時號能爲詞章者較上下餘未就君之先本㑹稽人上有官于衢州者因留不去今家焉曾祖諱某廬州廬江縣尉善吟詩其語淸深險峭不類近世作者有集行人間人争誦之祖諱某廣州南海縣主簿贈給事中君娶時氏生女子四人長十三歲餘尚㓜男子一人名河北郎始三歲毋安定郡君徐氏見君物故聞君語一悟遂自解不邑邑銘曰惟君之生蹈慶之基慿堅乗完孰憚以危爰初橫經在勤弗嬉道妙聖眞取深其師乃試天官汪洋發詞下動諸公争收競持籍名於高盛譽四馳獲第入銓犴獄是司曰吾之親有子止斯敢名宦游去左右爲遂留其旁氣下聲怡餘力於行學問愈滋帝用成都疏恩淋漓居君洛陽廩事以尸乃進爾資乃便爾私曾不乆焉得疾莫醫遂至奄然羣啼衆嘻於嗟乎君命曷若兹回誼之亡君齒與差何天於賢不假以耆紛紜妄庸夀或介眉當在其嬰百福承之太末之墟舊兆纍纍君歸其丘列祖是毗山磨水淤名豈卽衰刻詞茫茫以慰永思梓州處士張公墓誌有篤行君子姓張氏名温其字希澤居梓州城中六十五年治平改元正月日以疾終于家閭巷田野之人凢見聞其所以爲人者皆涕泣相弔曰天胡爲而遽奪若人之壽耶如是者累月矣希澤少喜儒術經傳百家曲學小說無不盡讀旣讀無不盡曉其大抵舉進士不中乃放肆自得與世俗俛仰浩然若不可以法制收歛之者性明悟內行孝謹知是身不足以爲巳有故投之於自然之域而不以貧賤富貴累其心謂捄人疾苦其惠利爲無涯故顓嚮醫藝而大究其精巧父母死日夜膜拜西方聖人自閱十二分敎者數過以圖報罔極至老無少倦赴人病急雖風雨道途之阻未嘗輙以辭旣而不復計校其所以爲謝死之日使人攀慕哀戚者以此好飮酒至頽倒而語言不亂善談謔亹亹可聽人多記去以娛其坐賔與人交終身常恐有毫髮之缺而不得其歡心也人或非意侵之曾不以恨至胷中遇之如平時其人乆亦自悔年未三十喪其配遂終身不娶慶曆中余始自永㤗來應舉是時郡中諸君未甚識余然槩以疏外闢之希澤一見余於稠人遂引其友陳顒信臣詣余於邸退相謂曰吾軰有子常患無良師友以磨切之者今見其人矣於是二人者各遣其子以從余遊待余二十年日日益㳟希澤初得疾余持服里居遣人候之希澤報曰我無狀子最爲知我者今病革不復見子願得子之文以記我死死瞑目矣旣死其子以某年某月某日葬於某鄕某里余方在京師不得哭送輤車之後又不得以文與俱薶於幽壌誠所恨矣歸而其子擇交以其先人嘗見累於余也叙其理命屢以抵余且曰陳臯希古先生旣巳誌先人之墓矣其所以謂之表者非君也其誰爲之余乃具次希澤之生平如此復系以辭而哀之云禀完而弗駮又輔以學性其渾矣檢諸身動不夫倫何疵咎之或履得於是陶然自貴可以謂之君子天胡以壽卑彼厚而獨嗇於此嗟乎希澤魂安所適兮一世云巳秘書丞陳君墓誌銘君諱叔獻字元之蜀州新津人其上世由頴川從僖宗入蜀因不歸籍此縣東北鳳皇岡有丘墓十許世深林巨木蔚然有豪宗大姓氣象而自五代巳降無仕者君生而聳慧始讀書一歷目而遂貫於心不廢忘下筆走詞語駸駸不可止遏其徒尊畏之中皇祐元年進士第爲萬州司戸參軍居官如故習老黠吏不敢肆其巧忠守缺轉運使以君攝其事乆之郡政大治人盡服察舉得令移郴縣郴湖南小邑民吏雜擾牒訴日日堆几案索裁決君始視事睨廷下忽取一人者鉤詰之本䖍民也寓於此凢二十年受賕出入鄕市搆兩訟以亂令治謂君新至故雜稠人觀君聽㫁是否期中之得情如此具對聞之安撫使流它郡自是惡少相語以君爲神不知某用何術也獄辭遂省縣之粟移于衡徃反數百里下戸不能獨去人有倍歛其酬爲輸之者徃徃遁避不可求遂至再納此弊尤甚君擇高貲附其直與并幹之故賦入辦先諸縣里民有各失一犢者踰年甲始獲於乙乙拒益堅詣縣辨君俾引其㹀使視犢躍就其乳乃還甲争遂定一邑嗟尚之馬氏僣竊多横賦毎丁歲有常率幾百年仁宗朝有詔一切除之而郴道衡永桂陽監不諭旨督歛尚急君建言轉運使悉免忘慮數萬萬而方二三千里之民始得擲去重壓而舒四體矣羣口邕邕頌君不休同年陳啓期過縣聞之作詩與君有巨刃秋霜寒之句及罷民遮道涕挽極謝乃得行入朝授著作佐郎知綿州魏城縣遷秘書丞賜緋衣銀魚魏城之政大抵不甚力而自占八邑之最歳滿以太夫人年高乞便地復得巴西縣未赴因臥疾熈寧元年七月某日遂卒于其家享年五十一君素羸㾪平時常喘喘畏風蕭然骨立若不能朝暮人也然臨事講利害决是非氣厲而語壯短長見前不可屈蓋剛果內蓄以學術輔之而吐理明白也性孝友事太夫人毎懼以巳疾爲憂常强飯設精神以立左右問之答亡恙太夫人乃喜姉二人貧且孀君指腴田二頃賙之終身以及其甥又爲經營其家使其族之狠忿暴戾者不敢犯與人交簡介若不相密而遇有所急難冐鋒刃入湯火肯爲也死之日無誰不沾泣初病革其弟叔達問所以欲爲君曰我何所言但佩恨入地而不能泯滅者使老母不及封而哭我矣雖然願得與可文納吾壙中乃幸也淚數行下氣遂絕曾祖某祖某考某母唐氏年八十君娶樂氏再娶周氏男一人君軫女一人適太學進士勾龍􅨈孫女二人以某年某月日葬於某鄕某原叔達以君之見屬其書遣介來道君之語求銘其墓同乃君之同年進士與游甚熟泣而銘之曰奄奄其息兮嶄嶄其形人視之而不知其中兮但常惜其不能以乆生然其論議之高兮區處之明蓋受於所禀兮而發於所行胡不錫以永年兮中道以傾伊神理之茫昧兮善惡安足以講評嗚呼元之兮吾何忍而此銘李公澤墓誌銘君諱愼從字公澤曾祖諱某父諱某其先八世祖諱遠本京兆府萬年縣人廣明中隨駕入匿爲晉原令後遂不去家成都之温江今又遷爲郫人至大父始不仕父贈太常少卿毋文氏其縣君少卿有子五人盡使學進士敎導有法自成童悉與它兒異至有未勝冠而能中其科等者愼修愼交也愼微後亦取皇祐元年高第二巳物故惟愼惟修今爲都官郞中君性精敏自皆其氣骨巳岌然秀爽讀書不廢忘爲文辭皆具曉大端不煩其師少卿厭世諸兄旣從宦弟幼各未立君視家事缺然亡它羸以待供索乃脫身治產設次第積居與時遂未幾號饒益督其弟愼用日夜從于學不客墮游嘗語之曰爾勿與我事凢婚嫁一主於我爾自動爾之所當爲勿中休給遠資近上下究足無間言愼思亦登皇祐五年進士先卒而君獨享優游之樂於其里閭爲善人君子衆雖景慕之而不可以力致第嗟咨信嚮而退自恨其不能如也君復和裕堅正內外親友以至墟落鄰閧之人無不相與驩遇其有所未善不屑正之無不改以謝凢吉凶燕集未有一日忽在衆人之後客子游仕至其邑有所求須先詣君君爲之推引裁處各稱其所欲以去故其善譽寖聞于人人賢之蓋用此也張少愚明勁辯博少所推借走海內識人無限而毎謂君疆果通幹生於自然不假增修而皆詣當處它不能及也少愚將有所欲爲而尚尤豫者必更取君講解辨折然後乃定其於治事明審能厭人意也如此君平時嘗謂人云吾夀巳自知不能乆於世問之但笑不道其所以能得自知之者故於易老莊釋之書必亹亹再三研玩其極深之論而有意於其間者焉某年某月忽得疾雖甚革而神意不亂治後事尤委曲至某日遂不起享年若干君娶申氏生五男曰某某娶王氏皆好學整飭不務敖盪人皆曰公澤宜有後也三女長適何氏二許嫁某等將以某年某月某日葬君於某鄕某原謂某於君爲親且密知君最詳來求銘君之墓某泣而爲之銘銘曰於乎公澤之爲人也外雖夷易而中甚端勁故其接乎物也以和而處乎事也以正惜其名位有遺其才謀而鄕黨止述其誼行胡爲善不得其酬兮卒閼之以所命甫五十而遂沒兮夫何遘兹乎不幸推其無所欿然兮有後之盛何以知其然今曰元昆之顯而諸嗣之今卭州處士郭君墓誌銘余少時與郭周田蟠叟同學西州交游甚熟知其父處士者之爲人常愛之處士今旣死蟠叟求余銘其墓處士諱某字某自言本汾陽忠武之後子孫流落居蜀不知凢幾世占名于卭家素饒財處士少任俠儻遏無畛域善格五意錢之戲毎入市羣豪朋來從隨上下酣飮謳歌器謼擊鞠㺯鷹犬罷卽入隱坊與其徒投五木争繒綵金貝一擲不盧遂推去不顧藉時亦勝人不貲爲寒士巧乞盡卑之不以爲巳物故義聲錚然不瑣瑣治家事人語之處士曰爾焉知我但我業此而所恃者我有子矣異日敎之使立千萬人上令曉道義善文章者争來推高之視此詎不若爾曹占田藏鏹之無涯哉我豈欲效里閭庸人旦暮齪齪經營後時不使寒餓計耶於是出蟠叟令力學蟠叟才冠便知名四方所友皆當世才傑處士之高識自此愈遠聞處士晚好讀書尤於班馬二史爲精深與人議論牽引證據甚可聽治平三年四月十一日忽被病遂不起年七十五其配文氏生蟠叟後一年亦卒年若干治平四年十月一日蟠叟葬之于臨卭縣思君鄕豐義里息頭山蟠叟蓬頭蠒足披風露踐泥潦晝夜號哭負土爲墳凡三年遠近觀者日日來不絶歎喟嗟悼而去銘曰人生常患巳之所欲樂爲而禮法從而攖之攌然如囚曾不得恣肆而自嬉若處士者少脫略而無羈敖盪一世而胷中不置乎險夷以壽而返兮羣口爲之齎咨發其慶以昌後兮其子宜之榮州楊處士墓誌銘君諱某字某榮州榮德人其上世官族見紫微石公楊休龍圖李公絢爲其考虞部郎中見素妣崇德縣君袁氏之墓銘君少敏惠嘗授經於唐安羅勉先生通博善講議辯者不能敵晚工於詩旣乆且精意詞高新無所得其迹於父母昆弟一盡其孝友崇德病累亟君再剔髀肉以饌進悉愈郎中好接賔客兩蜀聞人無不至門下君善治産致資以贍給其用多寡稱之楊氏所以義聲滿天下實由君振之也間嘗語羣弟曰家事不可以累大人予其主之爾曹第力學予將資爾異時求有以昌大門戸者是後屢有繇郡舉試禮部而若冲者遂中其第今巳入尚書爲郎矣君性方亷重許諾視人有不類輙耻遇之如一善可喜則奬勵稱述亹亹不巳宗族鄰里婚喪之用所不能足者君咸爲辦之賴遠别業爲一郡之冠其林巒之秀澗谷之異圍擁列立若設圖畫君於其間築室百楹裒輯古今書史萬卷引內外良子弟數十人召耆儒之有名業者敎之其子約果登皇祐五年進士授遂州小溪縣主簿先君卒餘皆摐摐號稱佳士者君以至和二年九月十五日以疾不起享年若干娶王氏生男子五人綱約絪紀紘女子六人壻普州進士汝某資州資陽縣尉袁某進士勾某袁某張某著作佐郎知綿州魏城縣張某孫男十人某曾孫某君以嘉祐五年二月二十五日葬於崇德縣榮川鄕南坦莊錡以書并狀拜道士李有慶來詣同山居始求銘君之墓同亦與錡識故爲之銘銘曰古語有之天道難論吾今於君以爲知言種善殖德所穫未蕃中夀亟亡人聞而冤何以慰君有文諸孫綿州李處士墓誌銘先生諱某字某綿州巴西縣人曾祖某仕孟昶意其國不能以乆復位下無所信道遂解官以去就閑居焉祖某善計策廣政末年兩川搶攘郡邑多冦盗能用之以庇䕶族黨獲亡恙鄕人以才豪名之父某博學有智思尤深於診劑人遠近頼其術而不夭枉者無幾數然未嘗蘄之來以賄爲謝者有問之曰吾求以此德遺後人生先生遂使被儒服先生少通敏才辯傾給自嚮師學專精講問一力不厭橫波絕浪大渉經史時出其語以聳坐客雖其朋流率無不下之者景祐初就進士舉試禮部旣不得歎曰吾不能是矣吾有子宜其爲之於是歸敎其子及里中良子弟晝夜相臨隨自不少懈不十年其子文藝益精凢兩偕計吏一試大廷下遂中皇祐五年第蜀人常謂先生意與物出入相應効乃如此性孝友家饒財不自靳嗇養同產常使厚於巳歸二甥於良家奩盝所與視巳子一槩獨不異寳元蜀旱大饑朝廷遣貴臣撫諭發私峙合程者卑赤牒先生曰民困蹙上憂之若此豈幸之以徼身名時耶吾所蓄雖不能如其格忍自閉以視元元捐瘠乎悉倒廩輸之官無德色在位咸高之士有來綿者未授館悉先詣先生所先生從之游無問風雨相驩至去皆滿意不戚戚故其好事之聲聞四方也以此所居西偏構月軒常隱几其中端静凝黙人不知其所以爲時復論譔有書號百一者凢十卷大抵明古意述世務自言此書百分廑有一能補於吾道者乃名耳好吟詩逮千餘篇語近而意高皆不徒爲之者治平四年十月十五日以疾卒于家病已革尚能作詩以與其交親爲訣其日起索冠帶坐求筆疏𥿄曰不爲不道不爲不正裁八字氣漸短目瞑筆落遂化去一城之人無誰何皆奔走哭嘂相屬道上春秋六十有六矣娶文氏生一男三女男誼伯爲秘書丞知卭州大邑縣女適周氏范氏文氏周范二女先亡孫若于人卜以某年某月日葬先生於某鄕某里祖塋之東嗚呼同嘗憶去年六月自廣漢移守安嶽道先生門下入拜先生於南堂先生與同語時有不任被病恐不能乆留於世之說同解之先生笑曰事當然者何足異矣别未百日而秘丞君遣使以狀來且謂同曰誼伯惡逆深重而遽喪所天先人臨終攬誼伯手屬之曰吾死當使普州誌吾墓幸矣愼無忘誼伯敢持遺訓以累君誠死罪同讀巳曰噫善人也今死矣其治命尚能以予文爲求於予厚矣肯不爲之銘之歟遂爲之銘銘曰山蟠於離而水走乎乾之維中有墓兮蹲而巍問焉居之者云誰成紀先生之所歸先生之生兮爲鄕里之所師宜其遺光餘耀兮愈華而不衰吾恐綿人世世之子孫兮望者趨之而過者拜之刻載善行無愧辭嗚呼先生安所虧丹淵集卷三十八
