front:
  text: 陳眉公先生訂正丹淵集卷二十二
  hash: sha256:f8347c9ec090b43dffb807e9e30143e008f0b153b28818fc8e9cb5f726b4f57e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0048_SBCK_022-1a}
body:
  text: 宋蜀文同與可撰明吳毛晉子晉蜀李應魁務滋同叅吳吳一標建先記成都府玉局觀新建五符幢記事有絓于荒忽茫昧之中繇曠古及下世無俗書以傳凡智解狹􅐯不能究度至詆忌蔽人令弗通思慮所該外物語者率謂狂矞罔誕非經見乃用擯笑不講錄是皆蒙塞自淺豈寥然壹盡大方之理者歟其有導神幾宣靈謀混淪焉行于亡形以鎭養乎元元使怪厲不作消祓摧殄不得横悍以肆其姦是術也凡王侯保土社芘羣品當知嚮服而尊高之渠可嫚忽耶其所謂蓋太上洞眞靈寳五老赤書云按元始至眞肇探於太樸之先凝神火庭尋詳曲折煥譯妙勢爲天奥寳告瑞發應秀映靈都神杖封固長依跬息大道君玉帝諸眞懇請恭受反復難遴傾倒切至始賜矜諭敇詣紫微居齋九旬後肯付卑然猶戒禁勿得布下是天所貴重若此不記從何刼運漏墜人世有聖研極鐫胎剖魄識其倪緒取安諸隅廣㝢泰寧傳云東京完水壽時正一道陵患魖魅恣雜闢人鬼使異行植幢㟭山誓刻嚴毒自是判然幽明不殽至黄唐文缺重瑑置昭慶道祠歲乆巋然頗剝爛幾泐無所考宋五世天子英文明睿陞用賢畯命侍臣趙公抃鎭蜀公致治未朞民物宜順暘潤孔時川隰生楙𧖟饒糓登體腹温飫薔訛勃疫淪伏不起冦兵弭消寂無纖譁頌公平循聲辭邕邕公固以爲未然復訪悠遠安保方域俾無虞戾之深計顯効休功件巳設施事可託神亦圖崇修原掾陳汝玉學廣知博古公具前躬摹秘符解鈲論辯公得且喜告下趣輯廼相玉局衍基潔爲靈埸築垣繕宫就完種勝初伐石西山􅒸地深窅材洪執鉅輓致殊力工徒愁嗟求策迷所一昔暴洚涌發漂䃂下磵出道平夷遂可筏行旣至正晝矞雲叢飛滃然下覆天光明麗景氣晏恱晻藹高眞䬃若來况都人觀繞驚歎喜蹈回頸望公祝若父母云護我等亭育撫燾心精神虔祥報昭露明日授匠矩尺礱爲觚幹恭肖神畫鑱勒其上科禁周具供所祈納大坤之維永永蒙祐噫大霄妙章上靈秘篆何此羣兆幸焉覯覿常爲投依以挹厥休千萬億年公惠無冺一日公戒部吏文同使紀其事同謹再拜撰辭以獻復類而爲詩以與蜀人使長言之無窮其辭曰於未物前有氣混茫擴無端崖滉􅐯汪洋中函神胞孕此威章靈鋩决分飄靑墮黄布照大空流精發光乃時玉符獲于元皇自然秘文盤葩屈芒支交歧聮蜿䊸結張皇執焉嘻練于洞陽瑩煥九霄瑞應蔚彰書簡刻金煇燭焜煌大陽靈洞俛仰是將惟時諸眞嘯命以蹡詣皇咨觀祈必願償命入太空九光華房擴開金扄動决靈囊戒勿下傳上館乃當何刼墜流降奠五方完志未朝㓜獝肆狂虎冠道師得焉其詳植石摹形大㟭之傍隂怪震驚掃㓕伏藏後多歷年復治于唐迄今巍如鏤蹟劣亡治平之君堯舜禹湯詔用趙公付之蜀疆公來民宜齧暴呴尫太和熏烝百體具康肌燠贏𥜗腹果衍糧境殄萑蒲獄朽桁楊沸舌頌公壽福熾昌願公光華衮衣繡裳移蜀之爲天下以滂公聞曰噫是志曷荒有及後人乃利也長或告眞文本先圓蒼可圖營之福招禍禳流䕃西南𬒳頼無央公喜趍爲日不暇遑牙譙西隅玉宇是望髙宫翼如綵枅繪梁覆幢其間崪然百常先時堪輿與公効祥水媵雲幪異孰爾量蜀人其承永隔害殃公德之深萬世曷忘杪哉末兮峴碑陜棠利州綿谷縣羊摸谷仙洞記熈寧庚戌春余還朝過利州通判冦諲恭甫爲余言近季按朝天驛人云去此七八里巖谷中有神仙常出見洞口因徃觀之自龍洞閣具舟西下過小峽有山嶤然崛起萬仞翠壁如削中闢大門可五六丈時正晴日光下照有二童子先出次有一人白衣皂巾曵杖垂長髯襟帶隨風翩然徃來下視乆之左右數靑衣從行有物若雞犬若虎若鹿者先後之又有執扇與繖者隱隱若繪畫甚可愛人之長者裁尺餘舉止詳緩如人行二十里許乃不見問其下居民云相傳五代時土人有王姓者種山下盡室歛穫於此因遣婦去求水婦汲還路有病僧創穢甚滿身腥腐不可近輒前索飮婦惡之且懼未始見弛檐走僧遽就噐飮殆半遂去婦不能易之隱其事置水田上其家人無長少一來飮盡之婦以故獨不霑口晩又俾婦致饟旣至其所得僧飮餘水者盡飛入此洞婦旣不見但號哭奔走嘂謼跳盪如狂人忽聞在洞中呼婦者婦仰應不得去懊恨至死自後蕘童牧叟常慣見不以爲異近年毎至天色開霽則出出必盡日就中山間花木盛發時出尤屢冦乃取畫圖示予余曰嚮嘗讀封禪記見祥符中利州路轉運使李允元奏綿谷縣羊摸谷內山洞中有神仙見自言嘗徃見凡三數人或立或行衣裾皆有異光至日暮方没蓋此地爾因求其圖之别本以歸壬子秋余移守興元有新府從事賈君瑄自南榮訪余於陵陽見圖屏上乃言其向官洋川時常與太常博士陸丕考較進士於寧武亦聞之歸日與丕詣洞下同立良乆其見果不妄指圖之澗壑巒嶺谿谷磴道曲折出没一一盡如此俞侯之彥座中遂卷圖去命工摹之且俾余次其事列之圖上余爲記此九月二十三日記彭州胡氏三遇異人記熈寧六年春余寓天彭成都承天僧敏行無演在焉爲余言北城有胡氏者名釗字倚天國𥘉時號爲高貲修積善行嘗奉事異僧四王羅漢者置寺住之後有詔俾倚天赴闕將授以官倚天不願仕辭之在京師出入起居與西還之期王日日預言於其家巳而究驗盡合無少荖者初倚天去彭在道中以至都下人徃徃見道人𬒳破褐狀貌怪偉常在倚天左右忽問他有不能見之者以語倚天倚天但笑而不答自知王之於此隂護持之爾術士嘗言倚天壽不滿四十倚天過華山謁希夷陳先生先生甚喜乆留其居爲造藥一鼎使携歸餌之後教以度世延年之法倚天旣歸如其訣行且乆其身枵然若將翩翩隨風而起云鄕人異之一日有晨叩其關者遣視之不見其人但以杖十七莖倚門而去倚天收之卒不知其所以致之者自後胡氏之門愈盛逮今累世矣倚天至七十八歲乃卒余因與演詣其家觀其所謂杖與藥者杖非世間所有之木色紺紫堅潤可愛藥大如彈丸赤黄有光隱雜寳其中重若金玉余歎曰倚天人不能知其所以然者隂行甚宻矣所以三異人者常相與逄遇如此警動之倚天雖巳去世亦自與斯人游風塵外爾豈俗士哉其孫靖爲進士端厚淹粹爲鄕里所稱余因謂無演曰靖佳士也於以見胡氏子孫承藉其祖之光靈慶嗣綿綿無有窮極者巳無演曰然是可記也自余來興元靖遣人千里致書且求記其事余爲記之彭州張氏畫記蜀自唐二帝西幸當時隨駕以畫待詔者皆奇工故成都諸郡寺宇所存諸佛菩薩羅漢等像之處雖天下能號爲古蹟多者盡無如此地所有矣後歷二偽至國初其淵源未甚遠故稱繪事之精者猶班班可見近世所習淺陋寂然不聞其人此亡它蓋苟於所利而不自取重其所爲之技爾獨天彭張氏能嗣守道人之學用筆設色氣韻標置未嘗輙自奔放惟一謹於良法不爲世俗之心所怵誠可尚也予寓彭累月居甚閒暇日與承天僧敏行游凡出於張氏之手者觀賞殆徧信乎他人之不能相與較其後先矣敏行乃其俗裔也俊慧通博亦善於此聞予嘉歎其父祖之所爲磨石請予道所以然熈寧六年中秋日記成都府楞嚴院畫六祖記僧惟中字慧雅本隷蓬州開元寺後遊成都不復歸其鄕者凡四十年性孤㓗不妄與人合精禪律之學善吟詩氣格淸謹其徒許之與可朋相上下常呼之曰詩伯可朋蜀僧之能詩者復通吾儒書學者從質其義日滿座下羸形垢靣破衣敗屨見者不知其中之所有能如是者俗年六十示㓕於大慈之甘露道塲慶曆五年乙酉五月九日也前時盡傾其槖中得八萬錢諉其所常徃來者楞嚴道人繼舒曰我將去矣生平之餘止此爾其爲我命奇工繪六祖像於爾院之釋迦殿雖然用此𬒳唾罵我不敢辭矣且欲使來者見是相知是心以是知見故能祓除諸妄而泯相忘心我爲是功德之意也道人諾之㑹廣漢劉允文有名於時遂召使圖其事采飾殊絕鋪置有序叩問傳付宻義相屬一花五葉先後交照信法苑之勝緣而畫評之善品者也予舊與惟中討論五經大義甚重之畫此時予亦觀允文下筆後十七年予自秘閣校理乞侍親得相於臨卭郡道人使予記諸石嘉祐六年辛丑五月十五日東園芳洲亭書靈夢記興元府唐安寺戒壇院六臂大悲觀世音菩薩者乃通判軍府事太子中舎盧洪徽之之夫人長安縣君朱氏之所完飾也𥘉夫人自熈寧年庚戌歳狀若娠者凡五年不得免夫人日夕恐惧世所謂祈禳禱禬之事與夫但有可以爲􅓼救之術者無少時不孜孜於此逮癸丑冬徽之移官至自閬中一夕夫人忽夢遊一大寺經行殿廊下見壞像偃於壁金彩晦剥手足損墮夫人佇立嗟悼者乆之有叟皓然來旁謂夫人曰此功德凡歷百千萬人所視其間未嘗有一人肯爲修之者夫人對曰兒不幸累年姙子在胞善惡殊未辨願欲莊嚴此像庶慿藉威力使早得就蓐免茲憂惱可乎叟曰爾果如是自獲靈報遂覺用言于徽之然但莫知其於何所而能見也十二月余與徽之至寺爲懿德皇后忌因過此院見舊塑一軀頺委于曲室余方召主者譙責之徽之遽曰是若洪之室人向所夢之者具道其一一徽之歸語其夫人夫人曰儻似是矣遂來觀之曰果然也乃擇日移置前廡命工如事澡祓垢坌𥙷綴諸缺更日未乆物物嚴備相好圓滿百福端麗邦人競集圍繞讃歎後夜夫人復夢叟持藥一匙付之曰可煑此飮遂如其言裁下嗌良乆嘔出大小黑白者無筭溲血如煤几數外驚窹流汗漬浹舉體窽然如弛重壓翌日徽之亟詣余以喜告余曰固有之矣嘗聞是大士者昔于無數恒河沙刼時在觀世音如來所聞證妙法獲二殊勝上與十方諸佛同慈力下與一切衆生同悲仰以無作妙力施諸無畏觀其音聲下救諸苦自非誠􅈤堅固信嚮深切詎能如此感格妙慧以取勝樂者耶以夫人精意愿篤勤服佛事匪惟今日魔蟲妖惡欲害於巳者卽時散㓕抑亦自此以徃當獲福德智慧之吉祥者無疑矣噫彼世之昏頑庸戾心生懈慢者來覩聖像得不起信心而反善道歟自利利佗斯莫大之因緣耳徽之俾余次其事刻石置之側熈寧八年歲次乙卯二月十五日丁丑記捕魚圖記王摩詰有捕魚圖其本在今劉寧州家寧州善自畫又世爲顯官故多蓄古之名蹟嘗爲余言此圖立意取景他人不能到於所藏中此最爲絕出余毎念其品題之高但未得一見以厭所聞長安崔伯憲得其摹本因借而熟視之大抵以横素作巨軸盡其中皆水下宻雪爲深冬氣象水中之物有曰島者二曰岸者一曰洲者又一洲之外餘皆有樹樹之端挺蹇矯或羣或特者十有五船之大小者有六其四比聮之架轆轤者四􅟐而網者二船之上曰蓬棧篙楫缾盂籠杓者十有七人凡二十而少二婦女一男子之三轉軸者八持竿者三附火者一背而炊者一側而汲者一倚而若窺者一執而若餉者一釣而僂者一拖而揺者一然而用筆使墨窮精極巧無一事可指以爲不當於是處亦奇工也噫此傳爲者尚若此不知藏于寧州者其譎詭佳妙又何如爾豳有郭煥者善搨冩余亦令爲之郭之平畫有尺寸其可愛與余爲此尤盡其所學其樹石則出於余之手也劉名繼勲爲左藏庫使知寧州嘉祐丁酉二月十日新平官舎記丹淵集卷二十二終
